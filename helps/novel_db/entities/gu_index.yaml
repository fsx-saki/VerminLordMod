gu:
- name: 希望蛊
  aliases: []
  summary: 用于开窍的蛊，寄居在月兰花中，能帮助人开辟空窍。
  rank: 普通蛊虫
  first_appear_title: ''
  details:
    appearance:
    - 微小的光点，发出微弱的白光。
    - 发光的蛊
    ability:
    - 汇成光流进入人体，在腹中凝聚成团，炸裂后开辟空窍。
    - 散发希望之光，鼓舞人心
    rank:
    - 普通蛊虫
    - 未知
    background:
    - 传说中人祖的三只蛊之一，能带来希望。
    - 出自《人祖传》
    source:
    - 这每一个光点，都是一只蛊。蛊名为希望。
    - 希望蛊汇成一束光流，已经进入了方源体内。
    - 希望蛊的光辉却没有吓走眼前的这头困境。
- name: 力量蛊
  aliases: []
  summary: 传说中人祖的三只蛊之一，能赋予力量。
  rank: 传说级
  first_appear_title: ''
  details:
    appearance:
    - 未描述
    ability:
    - 赋予使用者力量。
    rank:
    - 传说级
    background:
    - 人祖用青春少年供奉此蛊。
    source:
    - 人祖先用自己的青春少年，供养了三只蛊中最大的那只，那只蛊带给了他力量。
- name: 智慧蛊
  aliases:
  - 九转仙蛊
  - 九转智慧仙蛊
  - 九转智慧蛊
  - 野生智慧蛊
  summary: 天地间独一无二的蛊虫，无价之宝，可提升智慧。方源欲以此与琅琊地灵交易。
  rank: 传说级
  first_appear_title: ''
  details:
    appearance:
    - 最美丽的一只
    - 无固定形态，可化为光飞走。
    - 未描述
    ability:
    - 赋予使用者智慧和思考能力。
    - 提供智慧，与人祖交易可暂时听从命令。
    - 智慧深不可测，能解答问题。
    rank:
    - 传说级
    - 概念级
    - 未知
    background:
    - 人祖用中年供奉此蛊。
    - 从规矩网中逃脱，知晓规矩二蛊的名字。
    - 与太日阳莽有交情。
    source:
    - 第二只蛊带给了他智慧。
    - 智慧蛊听了哈哈大笑：“我记住了，原来这两只蛊的名字叫做规矩。”
    - 智慧蛊找不到，我们可以去见思想蛊。它是智慧蛊的母亲。
- name: 月光蛊
  aliases: []
  summary: 古月一族的标志蛊虫，一转蛊虫，寄居于蛊师右掌掌心，可催发月刃攻击。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 蓝水晶般的弯月形状
    - 未详细描述，但召唤时手中浮现出水蓝光辉。
    - 发出蓝色光辉如水。
    ability:
    - 不详（作为本命蛊使用）
    - 催动月刃进行攻击。
    - 磨搓石料，解石时使泥土成粉落下。
    rank:
    - 一转
    - 一转（一品）
    background:
    - 古月山寨常见的本命蛊选择
    - 学堂学员常用的基础蛊虫。
    - 常见解石工具蛊，方源用于赌石解石。
    source:
    - 月光蛊是一枚弯弯如月的蓝色水晶
    - 她们手中都浮现出一层水蓝的光辉...
    - 一转初阶真元催动的月刃，若真的印在人体，最多也只能割开巴掌长的血口子...
- name: 月影蛊
  aliases: []
  summary: 四转蛊虫，古月英雄用于暗算花酒行者
  rank: 四转
  first_appear_title: ''
  details:
    appearance:
    - 不详
    ability:
    - 最擅隐藏，有限制元海真元之能
    rank:
    - 四转
    background:
    - 古月英雄使用此蛊限制花酒行者的真元
    source:
    - 此蛊名月影，最擅隐藏。虽然只有四转，却有限制元海真元之能。
- name: 留影存声蛊
  aliases: []
  summary: 用于记录影像和声音的蛊虫，花酒行者用它拍下古月四代族长的丑态。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 不详（隐藏在石壁中）
    - 未知
    ability:
    - 刻印影像和声音，并投射出来
    - 记录并播放影像和声音。
    rank:
    - 一转
    - 未知
    background:
    - 花酒行者布下此蛊以记录真相
    - 被花酒行者使用，将画面拍在石壁上形成影壁。
    source:
    - 这将影像声音留在石壁上的手段，应该是花酒行者布下的留影存声蛊。
    - 花酒行者用留影存声蛊，记录下了古月一族四代族长的丑态。
- name: 酒囊花蛊
  aliases: []
  summary: 一转花草形态蛊虫，可分泌花蜜酒
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 花蛊，花朵中央可分泌花蜜酒
    ability:
    - 生产花蜜酒
    rank:
    - 一转
    background:
    - 花酒行者催生此蛊用于治疗，后枯死
    source:
    - 酒囊花蛊，和饭袋草蛊。
- name: 饭袋草蛊
  aliases: []
  summary: 一转花草形态蛊虫，可生长出米饭
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 草袋状，可生长出香喷喷的米饭
    ability:
    - 生产米饭
    rank:
    - 一转
    background:
    - 花酒行者催生此蛊用于治疗，后枯死
    source:
    - 饭袋草蛊。
- name: 癞土蛤蟆
  aliases:
  - 蟾蛊
  summary: 二转蛊虫，稀有的癞土蛤蟆，可炼成宝气黄铜蟾。
  rank: 二转
  first_appear_title: ''
  details:
    appearance:
    - 浑身黄不拉几，肚皮淡黄，背部褐黄，疙疙瘩瘩，长满蟾蜍特有的疣粒，巴掌大小，如同托着鸡蛋。
    - 蛤蟆形态。
    ability:
    - 每顿食用一斤黄泥，黄泥越肥沃越佳；是炼成宝气黄铜蟾的必须主蛊。
    - 未详述。
    rank:
    - 二转
    - 一转
    background:
    - 从紫金石中解出，被方源当日炼化并售予贾金生，市价五百块元石。
    - 青茅山时期获得。
    source:
    - 开出来的，是一只蟾蛊。它浑身黄不拉几...
    - 癞土蛤蟆，二转蛊虫，每顿食用一斤黄泥...
    - 方源在贾家商队中赌出癞土蛤蟆的事情
- name: 黒豕蛊
  aliases: []
  summary: 一转珍稀蛊虫，能从根本上增加蛊师的力量，市价六百元石。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 黑色，具体未描述。
    - 黑色瓢虫一般
    ability:
    - 根本性增加蛊师的力量。
    - 增强宿主力量
    rank:
    - 一转
    - 二转
    background:
    - 市场上难以寻觅，被贾金生用臭屁肥虫冒充出售。
    - 方源用遗产购买，通过喂养野猪肉提升力量。
    source:
    - 黒豕蛊能从根本上增加蛊师的力量，是多么珍稀的一转蛊虫...市价比酒虫还要贵...
    - 黑色瓢虫一般的黒豕蛊，在绕着悬停着的赤铁舍利蛊周围，不断地振翅飞旋。
    - 靠购买野猪肉，喂养黒豕蛊，增强自身力量。
- name: 臭屁肥虫
  aliases: []
  summary: 毒道一转蛊虫，形似黑豕蛊，常用以假冒黑豕蛊。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 黑黝黝的，具体未详。
    - 形似黑豕蛊
    ability:
    - 普通，无特殊能力。
    - 毒道能力，具体不明。
    rank:
    - 一转
    background:
    - 被贾金生以两百五十元石冒充黒豕蛊卖给青年蛊师。
    - 盛产于腐臭烂泥山，常被奸商用来假冒黑豕蛊。
    source:
    - 这哪里是什么黑豕蛊，明明是最普通的臭屁肥虫！
    - 臭屁肥虫是毒道的一转蛊虫，形似黒豕蛊，常在蛊师市场中被奸商用来假冒黑豕蛊。
    - 和臭屁肥虫很相近的，还有臭屁蛊。
- name: 一气金光虫
  aliases: []
  summary: 用于撑起淡金色气罩防御雨水，需要持续消耗真元。
  rank: 一转（推测）
  first_appear_title: ''
  details:
    appearance:
    - 全身闪着金豆般的光，撑起半球形淡金色气罩。
    ability:
    - 形成气罩，弹开雨水。
    rank:
    - 一转（推测）
    background:
    - 商队常用运输防御蛊虫。
    source:
    - 蛊师双手高举，各悬空漂浮着一只一气金光虫。青铜真元如水汽升腾，灌注到一气金光虫的体内。
- name: 青丝蛊
  aliases: []
  summary: 一转蛊虫，使头发疯长成蓑衣，一次性消耗三成青铜真元。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 头发疯长，根根伸长成五六米，纠缠成黑发蓑衣。
    ability:
    - 形成临时防水蓑衣，一次性消耗真元。
    rank:
    - 一转
    background:
    - 可晋升为二转黑鬃蛊。
    source:
    - 一些蛊师则催动了体内的青丝蛊。在青丝蛊的力量下，蛊师的头发疯长起来...
- name: 水蛛蛊
  aliases: []
  summary: 形成水衣覆盖身体，雨滴融入水衣中，可定期排水。
  rank: 一转（推测）
  first_appear_title: ''
  details:
    appearance:
    - 身体覆盖一层薄薄的淡蓝色水衣，表面水流汩汩流转。
    ability:
    - 吸收雨水增厚水衣，可排出多余水分。
    rank:
    - 一转（推测）
    background:
    - 商队常用避雨手段。
    source:
    - 商队中的许多蛊师选择了水蛛蛊。可以看到，这些蛊师的身上，都覆盖着一层薄薄的淡蓝色水衣。
- name: 千里地狼蛛
  aliases: []
  summary: 五转坐骑蛊，花酒行者所有，被血狂污染后自我封印，方源唤醒后发狂。
  rank: 五转
  first_appear_title: ''
  details:
    appearance:
    - 体型庞大，具体未描述。
    - 漆黑如钢铁，三对螺旋钢足，胸板背甲粗硬
    ability:
    - 钻土地遁，快速移动。
    - 快速挖掘地道，速度快，坐骑用途；被污染后不受控制。
    rank:
    - 五转
    background:
    - 花酒行者的著名坐骑，但在传承秘洞中并未出现，疑被四代族长算计困杀。
    - 花酒行者逃跑时挖洞的工具，后自封石茧。
    source:
    - 花酒行者手中有一头著名的千里地狼蛛。这可是五转坐骑蛊虫，体型庞大，极为擅长钻土地遁。
    - 千里地狼蛛！
    - 它全身都是漆黑，散发着金属光泽
- name: 竹君子
  aliases: []
  summary: 四转蛊虫，青玉为躯，白华覆体，以真诚为食，天生测谎能力。
  rank: 四转
  first_appear_title: ''
  details:
    appearance:
    - 竹节虫形态，碧玉颜色，指甲盖长度，表面散发白光。
    ability:
    - 测谎：寄宿在至诚君子空窍中可感应谎言，若谎言则身躯变色。
    rank:
    - 四转
    background:
    - 贾富年少时解石所得，被用来测试方源，因被春秋蝉镇压而失效。
    source:
    - 青玉为躯，白华覆体，这是竹君子啊！
- name: 冥路蝶
  aliases: []
  summary: 追踪蛊虫，能散发魂香种在蛊虫上，通过魂香追踪。
  rank: 未说明，推测三转或四转
  first_appear_title: ''
  details:
    appearance:
    - 蝴蝶形态（推测）
    ability:
    - 追踪：种下魂香后可循迹找到对应蛊虫或族人。
    rank:
    - 未说明，推测三转或四转
    background:
    - 贾家族内使用的追踪蛊虫，贾富曾使用但无果。
    source:
    - 贾家有一种追踪蛊虫冥路蝶，能散发魂香，种在蛊虫上。
- name: 足迹蛊
  aliases: []
  summary: 能显示最近三万步足迹的蛊虫。
  rank: 推测二转
  first_appear_title: ''
  details:
    appearance:
    - 形状像人的一只脚，半透明冻乳，表面黄绿荧光。
    ability:
    - 显示最近三万步的足迹。
    rank:
    - 推测二转
    background:
    - 贾富用来验证方源的行踪。
    source:
    - 足迹蛊形状十分特别，就像是人的一只脚。
- name: 宝气黄铜蟾
  aliases: []
  summary: 可乘骑的蛊虫，纵跃快速，能克服地形。
  rank: 推测三转
  first_appear_title: ''
  details:
    appearance:
    - 黄铜色的蟾蜍（推测）
    ability:
    - 每次纵跃百米，跳跃式前进，适合山地。
    rank:
    - 推测三转
    background:
    - 贾富一行人乘坐此蛊离开古月山寨。
    source:
    - 宝气黄铜蟾每一次纵跃，都足足有一百米的距离。
- name: 规蛊
  aliases:
  - 规矩蛊之规
  summary: 概念蛊虫，可变成无穷大的圆，与矩蛊配合捕捉万蛊。
  rank: 概念级（无具体转数）
  first_appear_title: ''
  details:
    appearance:
    - 可变化为无穷大的圆（概念形态）
    ability:
    - 捕捉万蛊，每次命令增加一条规矩。
    rank:
    - 概念级（无具体转数）
    background:
    - 被人类后人祖降服，后因智慧蛊知晓名字而受限。
    source:
    - 规蛊变成无穷大的一个圆，囊括了宇和宙。
- name: 矩蛊
  aliases:
  - 规矩蛊之矩
  summary: 概念蛊虫，可变成无穷大的方，与规蛊配合捕捉万蛊。
  rank: 概念级
  first_appear_title: ''
  details:
    appearance:
    - 可变化为无穷大的方（概念形态）
    ability:
    - 捕捉万蛊，每次命令增加一条规矩。
    rank:
    - 概念级
    background:
    - 与人祖交易后被降服。
    source:
    - 矩蛊变成无穷大的一个方，涵盖了大世界。
- name: 态度蛊
  aliases: []
  summary: 八转传奇仙蛊，记载于《人祖传》，可凭心力操纵态度，是见面曾相识杀招的核心。
  rank: 概念级
  first_appear_title: ''
  details:
    appearance:
    - 未描述
    - 像一张面具。
    - 未直接描述
    ability:
    - 体现态度，被贾富引用。
    - 反映态度，但使用需要有一颗心。
    - 伪装情感，让他人信以为真，耗费心力。
    rank:
    - 概念级
    - 未知
    - 仙蛊（转数较高，使用条件极低）
    background:
    - 人祖网中三蛊之一，被赌中抓到。
    - 人祖获得的蛊之一。
    - 原是黑楼兰的蛊虫，方源暂时借用。
    source:
    - 因为态度能说明一切啊。
    - 人祖得了态度蛊。态度蛊就像是一张面具
    - 态度蛊的作用，就是伪装内心的真实情感，表达出虚假的态度，但却能让他人信以为真。
- name: 小光蛊
  aliases: []
  summary: 一转光道辅助蛊虫，体型袖珍如五角星，散发乳白色微光，用于照明驱散黑暗。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 乳白色五角星图案，寄居掌心
    - 乳白色的五角星形状。
    - 体型袖珍，只有指甲盖的一半大，像五角星，散发着乳白色的微光
    ability:
    - 与月光蛊配合，使月刃体积和攻击力扩大一倍
    - 增幅月刃一倍攻击力（但两只不能叠加）。
    - 照明，驱散黑暗
    rank:
    - 一转
    background:
    - 方源炼化的辅助蛊虫，用于提升月光蛊威力
    - 用于合炼月芒蛊的辅助蛊虫。
    source:
    - 小光蛊炼化之后，也寄居在右掌，形成一个乳白色的五角星图案。
    - 乳白色的光芒融入到月光当中，原本只是一小团的月光，顿时膨胀了一倍之大。
    - 剩下的小光蛊。
- name: 玉皮蛊
  aliases: []
  summary: 一转防御蛊虫，用于合炼白玉蛊和月霓裳。
  rank: 一转
  first_appear_title: ''
  details:
    appearance:
    - 外形如臭虫，又扁又宽，头很小，淡绿的身体呈现椭圆形状，散发着一层玉色光晕。
    - 使皮肤如玉质般坚硬。
    ability:
    - 提供防御，使用时表面浮现翠绿玉光。
    - 增强防御，抵挡物理伤害。
    - 防御。
    rank:
