locations:
- name: 青茅山
  aliases: []
  summary: 古月山寨所在之地，盛产青矛竹，势力格局有古月、白家、熊家三寨。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 春雨绵绵，悄无声息地滋润着青茅山。
    - 青茅山的后山，是一道大瀑布。
    - 青茅山太小了，装载不了他的野心...
    background:
    - 山中有竹林、瀑布、河滩等
- name: 家主阁
  aliases: []
  summary: 古月山寨中央的建筑，高达五层，是权利中枢，内供先祖牌位。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 家主阁就处在山寨的正中央，高达五层，飞檐翘角，重兵把守。
- name: 地下溶洞
  aliases: []
  summary: 古月山寨地下的天然溶洞，有钟乳石和灵泉，开窍大典在此举行。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 顺着打造好的石梯，就进入地下溶洞。少年们纷纷发出惊叹之声。
- name: 花海
  aliases:
  - 月兰花海
  summary: 地下河对岸的月兰花海，用于开窍测试，希望蛊栖息其中。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 河的对岸，是一片花海。这是古月一族有意栽培的月兰花。
- name: 灵泉
  aliases: []
  summary: 古月山寨地下溶洞的灵泉，产出大量元石，是家族根基。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 古月一族从中土迁徙到南疆，在这青茅山驻扎下来。就是看中了这里地下溶洞的一口灵泉。
- name: 白家山寨
  aliases: []
  summary: 青茅山另一势力，与古月山寨相邻
  rank: ''
  first_appear_title: ''
  details:
    background:
    - 位于青茅山瀑布旁
    source:
    - 深潭旁，就是白家山寨，势力雄浑，和古月山寨只强不弱。
    - 白家山寨，势力雄浑，和古月山寨只强不弱。
- name: 客栈
  aliases: []
  summary: 方源暂居的客栈，位于古月山寨
  rank: ''
  first_appear_title: ''
  details:
    appearance:
    - 两层竹楼
    source:
    - 他回到客栈。
- name: 学堂
  aliases:
  - 家族学堂
  - 古月学堂
  summary: 古月一族培养年轻蛊师的机构，学员在此学习基础战斗和修行。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 就去学堂，领取头名奖励！
    - 学堂家老眉头扬起，笑了起来...
    - 学堂大门...
    appearance:
    - 位于古月山寨内，有教室和宿舍
    background:
    - 方源、方正等学员在此学习，家老主持考核
- name: 山壁秘洞
  aliases:
  - 秘洞
  summary: 花酒行者尸骨所在的隐秘山洞，位于山壁内
  rank: ''
  first_appear_title: ''
  details:
    appearance:
    - 约八十平方米，红光照亮，石壁潮湿有青苔和枯藤
    background:
    - 花酒行者最终葬身之处
    source:
    - 一个大约有八十平方米的空间，展现在方源面前。
- name: 白骨山
  aliases: []
  summary: 南疆一座高耸入云的山峰，山石均为骨质，呈惨白之色。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 倒是附近的白骨山，有一位正道的四转蛊师秘密立下的力量传承。
    - 很接近白骨山了。
    - 在他的记忆中，白骨山中藏有一个密藏传承，乃是一位正道四转蛊师所设，留待有缘人。
- name: 贾家寨
  aliases: []
  summary: 贾家家族的本寨，贾家家主白手起家建立。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 贾家寨的这些破事，又不是什么机密...
- name: 石缝秘洞
  aliases:
  - 金蜈洞
  summary: 方源发现的秘密洞穴，内有甬道和密室，是花酒行者力量传承的所在地。
  rank: ''
  first_appear_title: ''
  details:
    appearance:
    - 有赤光笼罩，甬道昏暗，底部有巨石挡路
    background:
    - 方源用于藏匿兽皮地图和修行白豕蛊的秘密基地
    source:
    - 回到赤光笼罩的秘洞中，方源随手将两个野猪牙抛在了角落里。
    - 他径直钻进了甬道，再次来到甬道底部。
    - 他准备再入石缝秘洞！
- name: 地下石林
  aliases: []
  summary: 青茅山内的地下空间，充满石柱和玉眼石猴，面积三十多亩。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 而是一片宽敞的地下石林。
    - 这片地下石林的面积，至少有三十多亩！
- name: 山脚村庄
  aliases:
  - 村
  summary: 江鹤所在的村庄，靠近古月山寨。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 直接来到山脚下的村庄
- name: 北大门
  aliases: []
  summary: 古月山寨的北门。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 方源来到了山寨北大门
- name: 狼巢
  aliases: []
  summary: 电狼的巢穴，正在壮大。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 狼巢那边闹得有点凶
- name: 酒肆
  aliases:
  - 东门酒肆
  summary: 方源继承的酒肆，位于古月山寨东门，是方源的重要产业，也是方源与各种人物会面的地点。
  rank: ''
  first_appear_title: ''
  details:
    background:
    - 方源父母留下的产业，方源在此经营，曾发生蛮石闹事事件。
    source:
    - 东门的酒肆。
    - 酒肆中有些冷清。
    - 酒肆门口。
- name: 会盟坡
  aliases: []
  summary: 三族斗蛊大会举行地点，后成为三族会盟地点。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 会盟坡上，蛊师们的三大家族阵营，已经再不像之前那般泾渭分明。
- name: 天然元泉
  aliases:
  - 元泉
  - 泉眼
  summary: 白家禁地中的天然元泉，是家族屹立的根本，可产生元石供给修行。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 这里难道就是元泉？
    - 每一个家族屹立的根本，就是一道天然元泉，可以凭此产生的元石供给修行。
- name: 血湖墓地
  aliases:
  - 血湖
  - 血湖战场
  summary: 地下巨大的血湖空间，古月一代的巢穴，铁血冷与古月一代激战之处。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 血湖不断地掀起滔天血浪
    - 血湖中央，一个漩涡
- name: 三族大比战场
  aliases:
  - 山坡
  - 百里范围内
  summary: 三族大比预选赛的野外战场，方圆百里，方源与白凝冰在此激战。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 这是三族大比武的战场！
- name: 黄龙江
  aliases: []
  summary: 南疆第三江，全长八千多公里，流经青茅山、白骨山等多山。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 黄龙江，南疆第三江，全长八千多公里，发源于黄果山，流经玄冥山、龟背山、青茅山、白骨山、雷磁山等，最后流入到海。
    - 黄龙江水流湍急，黄水滔滔。
- name: 螺旋骨洞
  aliases: []
  summary: 白骨山内的山洞，壁上有螺旋骨刺，为传承入口。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 山洞壁周围长着尖锐骨刺，螺旋状，是机关入口。
- name: 肉囊秘阁
  aliases: []
  summary: 传承终点密室，墙壁由肉笑蛊构成，内含藏蛊的嘴巴。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 密室上下左右皆为肉壁，肉壁上镶嵌无数张嘴，发出笑声。
- name: 紫幽山
  aliases: []
  summary: 南疆山脉，方白二人逃亡中途经之地，村庄所在地。
  rank: ''
  first_appear_title: ''
  details:
    appearance:
    - 远望一片暗紫色，幽静神秘
    background:
    - 常有商队途经，盛产紫枫叶
    source:
    - 远望，紫幽山上一片暗紫色，幽静而又神秘。
- name: 商家城
  aliases:
  - 商量山
  - 商家的山城
  summary: 南疆第一面积的城市，建立在商量山上，分为内城和外城，有美食区、斗蛊区等众多区域。
  rank: ''
  first_appear_title: ''
  details:
    background:
    - 商家大本营，商心慈最终到达并被父亲相认之地
    - 商家大本营，商燕飞曾在此居住小院，后传给商心慈。
    source:
    - 看来只有到商家城，再行采购了。
    - 运到商家城去，能卖出高达一倍的价钱。
    - 在他们的视野中，出现了商量山。
    appearance:
    - 星星石建筑，星光连绵，第三内城寸土寸金
    ability:
    - 无
- name: 黄金山
  aliases: []
  summary: 金家寨所在的山，盛产黄金油灯等特产。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 在这黄金山，你却能卖出好价钱。
- name: 金家寨
  aliases: []
  summary: 金家族的聚居地，位于黄金山。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 在金家寨停留了多日后
- name: 啸月山
  aliases: []
  summary: 南疆狼群聚集的山，有各种狼群。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 我们已经进入啸月山的地段
- name: 象牙山
  aliases: []
  summary: 有白羽飞象的山，山脚雨林，山腰雪林。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 象牙山高耸入云，栖息着大量的象群。
- name: 墓碑山
  aliases: []
  summary: 南疆的山区，商路必经之地，多僵尸和二代僵王传承。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 墓碑山位于南疆最重要的三大商路之一
    - 墓碑山中的一处山洞
    - 我如果墓碑山十几次
- name: 沼泽山
  aliases: []
  summary: 二代僵王所在之地，丁浩的目标地点。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 前往沼泽山，正式成为师父的弟子了！
    - 可去沼泽山拜师
- name: 双将山
  aliases: []
  summary: 双子峰，中间隔着悬壁山谷，商路中的一处险地。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 他们来到双将山。此山是双子峰，中间隔着一道悬壁山谷
- name: 血泪山
  aliases: []
  summary: 山上有赵家寨，有人烟。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 过了双将山之后，就是血泪山。
    - 血泪山上有赵家寨
- name: 千窟山
  aliases: []
  summary: 商路中的一座山。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 接连越过千窟山、巨人山、绿藻山等六座大山
- name: 巨人山
  aliases: []
  summary: 商路中的一座山。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 接连越过千窟山、巨人山、绿藻山等六座大山
- name: 绿藻山
  aliases: []
  summary: 商路中的一座山。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 接连越过千窟山、巨人山、绿藻山等六座大山
- name: 阴潭
  aliases: []
  summary: 五角星状阴潭，丁浩洞府旁，用于标记。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 那阴潭呈五角星状，十分独特。
- name: 演武区
  aliases: []
  summary: 商家城中的一个区域，有数十种演武场，是商家选拔人才的途径。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 这里是演武区，有大大小小的演武场八十多所。
    - 演武区是商家对外选拔人才的一个途径。
- name: 第三内城
  aliases: []
  summary: 商家城内的区域，有大型赌石坊。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 虽然是在第三内城，但身边却形成了人流。
- name: 第四内城
  aliases: []
  summary: 中档演武区所在的内城。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 在第四内城的演武区，净胜八十场，就可升入第三内城。
- name: 楠秋苑
  aliases: []
  summary: 商心慈在商家城的住所，方正和白凝冰也居住于此。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 方源一路思量盘算着，走回楠秋苑。
    - 回到楠秋苑。
    - 楠秋苑的小广场上，星星石铺成。
- name: 第五内城演武场
  aliases:
  - 演武场
  - 演武
  - 超大型演武场
  summary: 商家城内供蛊师对战、切磋的场所，有主持蛊师防止死亡。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 学堂的演武场上，三个擂台都已经搭建好。
    - 你得先从第五内城的低档演武区开始打起。
    - 演武场的规矩中有一条，胜利者能从失败者的手上，选取一只蛊收为己用。
- name: 平凡深渊
  aliases: []
  summary: 传说中从未有生物能飞跃的深渊，充满平常风和凡俗尘。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 平凡深渊可以出去，只需要得到名声蛊就好了。
    - 从未有生物能飞跃过去。
    - 被困在平凡深渊。
- name: 细语密林
  aliases: []
  summary: 孤峰上的密林，树木无叶，但风声像树叶沙沙作响，是细语声。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 原来这片密林，是细语密林。
    - 他曾经听到的树叶沙沙的响声，是密林中的细语声。
- name: 湖中亭
  aliases: []
  summary: 楠秋苑内的亭子，方源与白凝冰下棋处
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 小亭金砖朱梁，珠帘画栋
- name: 三叉山
  aliases: []
  summary: 位于左家冷颤山和车家飞来山之间，三王传承的开启之地。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 整个三叉山开始震荡起来。
    - 三叉山的某处山腰，一场激烈的战斗，已经步入尾声。
    - 第一百三十八节：见死不救
- name: 火炭山
  aliases: []
  summary: 南疆半死不活的火山，盛产火炭石，是三叉山必经之路。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 第一百三十六节：白狐蛊仙传承
- name: 中洲
  aliases: []
  summary: 中央地域，幅员辽阔，元气充裕，门派林立，实力最强。
  rank: 域界
  first_appear_title: ''
  details:
    source:
    - 第一百三十五节：仙鹤门，方正
    - 中洲十大古派之一的灵缘斋，他还是听过的。
    - 狐仙福地在中洲
    background:
    - 中洲是十大古派所在，天庭核心区域。
    - 天庭总部，十大古派所在。
    - 十大古派林立，天庭主导。
    rank:
    - 域界
    appearance:
    - 大陆中心，修行文明最发达。
- name: 飞鹤山
  aliases: []
  summary: 仙鹤门所在地，悬空大山，云雾缭绕，有万鹤栖息。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 第一百三十五节：仙鹤门，方正
    - 中洲，飞鹤山。
    - 中洲，飞鹤山，仙鹤门。
- name: 天梯山
  aliases: []
  summary: 中洲山脉，白狐仙子传承出现之地，被蛊仙包围。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 第一百三十六节：白狐蛊仙传承
    - 狐仙福地也是六转仙窍，但种于天梯山。
    - 天梯山上，迎来了两位蛊仙。
- name: 蛊仙福地
  aliases:
  - 福地
  - 仙之福地
  - 霸龟福地
  - 神秘蛊仙福地
  summary: 依托于大世界的小世界，由上古蛊仙留下，被三王改造用于布置传承。时间流速约为外界的数倍。
  rank: ''
  first_appear_title: ''
  details:
    source:
    - 三王的传承之地，就是当初他们意外发现的上古蛊师的福地。
    - 福地就是一个单独的小世界。
    - 方源此时置身的，已经并非是大世界。而是蛊仙福地——一个依托在大世界中的小世界。
- name: 巫山
  aliases: []
