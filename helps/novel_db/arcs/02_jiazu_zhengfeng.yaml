id: 02_jiazu_zhengfeng
title: 家族争锋篇
chapter_range:
- 118
- 221
rank: 二转
summary: 家族争锋篇。主要角色：七煞元君、七皇子、万紫红、万良翰、万追青；关键蛊虫：万我仙蛊、三秋黄鹤台、九转火蛊、书生蛊、仁蛊
major_events:
- 影无邪、白兔姑娘，都在妙音仙子的仙窍中暂存
- 影无邪状态极差，完全不能指望和依靠
- 纯梦求真体也因此被天意时刻关注着
- 原为太白云生所用，后落入方源之手。
- 方源连续催动这只宙道仙蛊，为自己和他人治疗
- 将武遗海的命牌蛊、魂灯蛊，都通过宝黄天，给我送过来
- 隐藏身份和气息，配合见面曾相识伪装。
- 除了一只方源的暗渡仙蛊外，其余的蛊虫就都是南疆正道之物
- 源自星宿天意，能侵蚀梦境，影响蛊仙行径。
- 原来，凤九歌遭遇方源，都是星宿天意的安排！借助天庭之手，让凤九歌追逐偷道仙蛊偶遇方源。
- 天意就算布了局，又能怎样？只要方源本身实力足够，就算影响再多的人心，关键时刻求生的本能也会占据上风。
- 原为男性魂魄，使用纯梦求真体，后因斗志昂扬恢复战意，被换魂至女性肉身。
- 影无邪还用着那具纯梦求真体的肉身，但是他受到的打击太大，战意彻底沦丧。
- 影无邪重振斗志，不仅使得方源这边的战力暴涨，而且还能带动另一个人。
- 影无邪点点头：唉，只能如此了。快开始吧！
- 像一只鹅蛋，蛋壳半透明，内有碧绿光气，散发刺骨寒意作用于魂魄。
- 影无邪当即盘坐下来，开始灌输仙元。
- 一个在关键时刻，提醒凤九歌的声音，自然是她紫薇仙子。
- 不要挣扎啊，凤九歌，我乃天庭蛊仙，特来援助于你，你可以称呼我为——黄史上人！
- 地脉的全面震动，影响了整个南疆，重点区域更是天翻地覆。
