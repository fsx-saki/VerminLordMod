id: 02_jiazu_zhengfeng
title: 家族争锋篇
chapter_range:
- 118
- 221
rank: 二转
summary: 家族争锋篇。主要角色：七煞元君、七皇子、万紫红、万良翰、万追青；关键蛊虫：万我仙蛊、三秋黄鹤台、九转火蛊、书生蛊、仁蛊
major_events:
- 将武遗海的命牌蛊、魂灯蛊，都通过宝黄天，给我送过来
- 方源虽有道可道仙蛊可以侦查蛊仙身上的道痕
- 武庸能够到达那里，却是用的铁家的仙蛊屋烽火台
- 监天塔速度极快，迅速从白天跨越两域，回到了中洲
- 原来，凤九歌遭遇方源，都是星宿天意的安排！借助天庭之手，让凤九歌追逐偷道仙蛊偶遇方源。
- 影无邪还用着那具纯梦求真体的肉身，但是他受到的打击太大，战意彻底沦丧。
- 这只仙蛊形象奇特，像一只鹅蛋，蛋壳半透明，从外面望去，可见里面氤氲的碧绿光气。离得近了，还感到一阵刺骨的寒意，从这只仙蛊中散发出来。
- 从外形上看，这是一只独角仙。方源托在手掌中心，感觉到它沉甸如石。
- 至尊仙胎蛊本身是仙蛊，仙蛊就需要喂养。至尊仙胎蛊的食物，便是仙胎。
- 玉清滴风小竹楼只分解了一些边角，速度极快。
- 这是西漠中，比较有名的沙漠之一。
- 没有料到天庭出手，居然是帮助方源这个魔头！
- 这招燃魂爆运杀招，采用的是魂道仙蛊魂啸。
- 纯梦求真体乃是由砚石老人所创，身负梦道道痕，砚石老人想要创造出十一绝体。
- 这是一只七转仙蛊，好似蟅（zhè）虫，人们通常又称之为土鳖，它有婴孩的拳头大小，身体十分扁平，散发着钢铁般的光泽，给人极为坚固的感觉。
- 方源又用了胆识蛊，让他魂魄伤势全数消弭，重回巅峰。
- 七转仙蛊阵旗，这不正是方源之前急需的仙蛊之一嘛！
- 他不需要面对仙蛊屋玉清滴风小竹楼。
- 就算是九转仙蛊屋监天塔，也不敢进入梦境。
- 宙道的治疗法门，方源只有人如故仙蛊。可惜这只仙蛊，只对人族方有良效。
