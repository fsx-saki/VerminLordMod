id: 01_qingmao_shan
title: 青茅山篇
chapter_range:
- 1
- 117
rank: 一转
summary: 青茅山篇。主要角色：丁浩、七星子仙僵、七海蛇女、万寿仙子、万寿娘子；关键蛊虫：一心三用蛊、一指流鲨、一死一生蛊、一气金光虫、七香酒虫
major_events:
- 酒虫体型如蚕宝宝，通体散发着珍珠一样的白光，有点胖胖的，外形很可爱。
- 人祖先用自己的青春少年，供养了三只蛊中最大的那只，那只蛊带给了他力量。
- 这每一个光点，都是一只蛊。蛊名为希望。
- 春秋蝉的作用，就是逆转时光。在十大奇蛊排名中，能名列第七。
- 这是春秋蝉？！看到这只蛊虫，方源彻底的震惊了！！
- 此蛊名月影，最擅隐藏。虽然只有四转，却有限制元海真元之能。
- 这将影像声音留在石壁上的手段，应该是花酒行者布下的留影存声蛊。
- 他本来剩余两块元石，又新得十五块，统共十七块。
- 真元海面上，漂浮着一只白胖可爱的酒虫。
- 春秋蝉在方源的调动下，已经再次隐藏，在沉睡中修养去了。
- 她们手中都浮现出一层水蓝的光辉...
- 漠颜迈着大步，踏进客栈。身后跟着一群家中豪奴。
- 蛊师双手高举，各悬空漂浮着一只一气金光虫。青铜真元如水汽升腾，灌注到一气金光虫的体内。
- 酒虫团成一团，散发出来的酒气如飘渺之白雾。
- 花酒行者手中有一头著名的千里地狼蛛。这可是五转坐骑蛊虫，体型庞大，极为擅长钻土地遁。
- 方源再次催动月光蛊，五指磨搓，进行解石。
- 商队中的许多蛊师选择了水蛛蛊。可以看到，这些蛊师的身上，都覆盖着一层薄薄的淡蓝色水衣。
- 花酒行者用留影存声蛊，记录下了古月一族四代族长的丑态。
- 开出来的，是一只蟾蛊。它浑身黄不拉几...
- 这哪里是什么黑豕蛊，明明是最普通的臭屁肥虫！
