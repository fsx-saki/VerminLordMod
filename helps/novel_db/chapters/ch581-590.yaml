- chapter: 583
  title: 第五百八十六节：俘虏
  content: '第五百八十六节：俘虏

    　　万山苍翠连绵，苍穹晴朗无云。

    　　忽然天光乍现，奇光散发又旋即收敛，化成一位身材高挺的奇人。

    　　这人有一对雪白细长的眉毛，眉梢一直延伸面额之外。雪眉下的双眼却是紧闭。他身着一身白衣，纤尘不染，衣袍上以及他的皮肤、毛发，都散发着一丝丝的光晕。

    　　这种光晕并不耀眼，却衬托得他宛若神明。

