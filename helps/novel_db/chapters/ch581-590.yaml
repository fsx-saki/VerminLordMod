    　　不过方源却是性情谨慎，并没有大肆出手。他第一波敲诈勒索的对象，只是三家。

    　　夏家毫无疑问，是排在第一位的首先。太上大长老夏槎，又是夏家唯一的八转蛊仙，堪称夏家之根，太重要了。夏家根本损失不起，一旦失'
