- chapter: 590
  title: 第五百九十三节：紫薇的不安
  content: '第五百九十三节：紫薇的不安

    　　天庭。

    　　宇殿千重，仍旧是那样的光明堂皇。

    　　大殿中，紫薇仙子缓缓睁开双眼，她的美眸中紫光一闪即逝。

    　　随后，她微微皱眉，语气空灵，呢喃自语道：“定空仙蛊自毁了。”

    　　紫薇仙子执掌星宿棋盘后，乃是当今蛊仙界前三的智道大能，此次派遣刘浩、君神光对付方源，怎可能不防备方源的大盗鬼手呢？

