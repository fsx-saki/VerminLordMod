- chapter: 585
  title: 第五百八十八节：春夏秋冬
  content: '第五百八十八节：春夏秋冬

    　　至尊仙窍时间，数日之后。

    　　方源的宙道分身，再次来到小绿天中的仙阵前。

    　　“小心一点，我要开始了。”宙道分身满脸肃穆之色。

    　　“嗯。”阵灵显形，连忙点头。

    　　一旁还站着一位蛊仙，正是影无邪，此时也是满脸的紧张之色。

    　　一位纯梦求真体，进入梦境，不一会儿，他就抓住夏槎的脚，将她拖出来。

    　　整个过程，都是小心翼翼。

    　　夏槎仍旧陷入沉眠之中，没有丝毫的感觉和异'
