    　　在这宫殿群落的最中央大殿，夏飞快双足踏地，行色匆匆。

    　　他是七转蛊仙，专修光道，战力稍弱于武家的武雨伯，十分不俗。只是因为修行了某个仙道杀招，导致性情急躁。

