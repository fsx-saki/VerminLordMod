- chapter: 584
  title: 第五百八十七节：囚禁人质
  content: '第五百八十七节：囚禁人质

    　　真相已经被勾勒出了大致的轮廓，显现在南疆群仙的心中。

    　　“这些年兽当中，很可能就有太古年兽，并且数量还不少。借助这些年兽，方源的确有很大可能，对战我们的追辑队伍。并且方源这魔头，继承了影宗，真传无数，建设出一座宙道大阵，困住我们的人，也在他的能力范围之内。”

    　　池曲由说到这里，又皱起了眉头：“只是我还有一事不明白。若说是仙窍落地，隐缩一点，蛊仙无法察觉，十分正常。'
