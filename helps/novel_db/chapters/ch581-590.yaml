- chapter: 587
  title: 第五百九十节：勒索的门道
  content: '第五百九十节：勒索的门道

    　　方源在忙什么，自然不言而喻。

    　　俘虏了南疆群仙，方源已经牢牢掌握着主动权，占据的优势极其巨大。

    　　如此价值连城的人质在手，敲诈勒索起来，堪称恣意妄为，随心所欲。

    　　不过方源却是性情谨慎，并没有大肆出手。他第一波敲诈勒索的对象，只是三家。

    　　夏家毫无疑问，是排在第一位的首先。太上大长老夏槎，又是夏家唯一的八转蛊仙，堪称夏家之根，太重要了。夏家根本损失不起，一旦失'
