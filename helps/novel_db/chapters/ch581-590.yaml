    　　不过接下来，方源盗取仙蛊的工作，还不得不暂缓一下。

    　　仙元不足了。

    　　之前就已经显出枯竭的趋势，最近又铺设仙阵，一场大激战，回到至尊仙窍，又铺设仙阵，屡屡催'
