- chapter: 586
  title: 第五百八十九节：一百万块仙元石
  content: '第五百八十九节：一百万块仙元石

    　　南疆。

    　　延寿山。

    　　夏家大本营见闻福地。

    　　福地中，凡蛊屋广厦万千，形成绵连宫殿，锦绣恢弘。

    　　在这宫殿群落的最中央大殿，夏飞快双足踏地，行色匆匆。

    　　他是七转蛊仙，专修光道，战力稍弱于武家的武雨伯，十分不俗。只是因为修行了某个仙道杀招，导致性情急躁。

    　　方源伪装成武遗海，曾经和他交手，并定下五年之约。如今方源身份暴露，又有八转战力，这个五年之约夏'
