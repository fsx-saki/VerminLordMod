- chapter: 589
  title: 第五百九十二节：蛊如故雏形
  content: '第五百九十二节：蛊如故雏形

    　　商家。

    　　“八部玉三千两，最迟三天时间，我要拿到手。”方源语气强硬。

    　　商家方面表示很为难：“八部玉乃是八转仙材，宝黄天中也往往只是百两之内的交易。一下子让我族拿出这么多来，实在是为难。”

    　　“呵呵呵，我相信贵族的实力。商家，谁不知道是南疆第一富庶势力啊？”方源冷笑，任凭接下来商家如何谈判，开出的条件没有丝毫的改变。

    　　巴家。

