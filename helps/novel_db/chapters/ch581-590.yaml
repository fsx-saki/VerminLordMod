- chapter: 582
  title: 第五百八十五节：夏扇
  content: '第五百八十五节：夏扇

    　　越来越多的年兽，闯入战场，和南疆群仙们绞杀在一起。

    　　时间逐渐流逝，南疆群仙们的战斗状态，在不知不觉间，又悄然下滑一大截。

    　　这些年兽，他们都要杀吐了，但杀不胜杀，绵绵不绝。原本针对方源而精心准备的杀招，还有蛊仙之间的绝妙配合，都用在了这些愚蠢的年兽身上，叫人无奈至极，又疲累欲死。

    　　年流伏诛阵可算是三阵合一，而这里的光阴支流，又规模庞大，再加上方源等人全力主持，威'
