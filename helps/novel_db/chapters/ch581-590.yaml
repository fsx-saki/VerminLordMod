  title: 第五百八十四节：春剪
  content: '第五百八十四节：春剪

    　　南疆群仙士气大振，影宗等人则是眼皮子跳动，面色微沉下来。

    　　陆畏因不愧是乐土传人，举重若轻，一击之下，就将一头凶猛的太古年虎轻松擒拿。他虽然没有攻伐手段，但就这一手段，就深不可测，令人敬畏。

    　　嘶嘶嘶……

    　　一头太古年蛇，拖动漫长粗壮的蛇躯，吐着猩红的蛇信，钻出漩涡巨门，进入战场。

    　　第三头太古年兽！

    　　这一次，不管是陆畏因，还是夏槎的脸色，都变了。

