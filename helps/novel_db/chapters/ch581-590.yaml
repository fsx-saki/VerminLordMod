- chapter: 588
  title: 第五百九十一节：三种方案
  content: '第五百九十一节：三种方案

    　　至尊仙窍。

    　　小赤天。

    　　方源宙道分身刚一出现，就立即引起无数年兽的察觉。

    　　啊哦哦！咯咯咯！吼吼！

    　　无数的年兽发出兽吼，纷纷向方源扑来。大量上古荒兽，将荒级年兽挤到一旁，目光中流露着渴望。

    　　但很快，一头太古年鸡雄赳赳、气昂昂地扇翅过来，一路上荒级年兽、上古年兽都慌忙避让，场面一片混乱。

    　　太古年鸡跑到方源宙道分身面前，顿时低下头，露出温驯之状。'
