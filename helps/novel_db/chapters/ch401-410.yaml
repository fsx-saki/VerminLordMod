- chapter: 404
  title: 第四百零五节：打得凤九歌吐血！
  content: '第四百零五节：打得凤九歌吐血！

    　　方源径直地杀向凤九歌。

    　　当然，他的身上早已罩着一层仙衣，仙衣波光粼粼，又有长长弯曲的绶带，环绕方源的腰际和手臂。

    　　随着方源冲袭而去，仙衣绶带也随之飞扬摆动。

    　　仙道杀招——逆流河护身印！

    　　“又是这一招。”凤九歌见此，心中一叹，他对这一招很是头疼，非常无奈。

    　　所以，凤九歌直接选择后撤。

    　　很轻松的，他就和方源拉开了距离。

