- chapter: 407
  title: 第四百零八节：钓年兽
  content: '第四百零八节：钓年兽

    　　这片天空极其辽阔，并且充斥着鲜红的光，仿佛朝霞漫空。

    　　原本这里空无一物，但此时此刻，却漂浮着一座巨大的仙道蛊阵。

    　　这座仙道蛊阵，逸散出磅礴的宙道气息，很明显是一座宙道仙级蛊阵。

    　　在这座大阵里面，方源、白凝冰、黑楼兰、白兔姑娘、妙音仙子、影无邪都已经严阵以待。

    　　这座宙道仙级蛊阵，已经持续催动的了很长一段时间。

    　　它是以七转年蛊为核心，八转宙道仙蛊似水流年为'
