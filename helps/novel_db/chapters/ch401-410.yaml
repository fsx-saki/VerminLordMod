- chapter: 409
  title: 第四百一十节：入河
  content: '第四百一十节：入河

    　　至尊仙窍，小绿天。

    　　一大片朦胧的七彩梦境，静静地悬浮着，随着时间缓缓流转。

    　　一股我意驻足于此，面目和方源一致，栩栩如生。

    　　在我意当中，还有一小堆红枣仙元，以及蛊虫若干。

    　　“这是目前最后一次尝试。”方源我意口中呢喃，紧接着他便开始动手。

    　　红枣仙元迅速消耗，与此同时，自爱仙蛊、爱意仙蛊都被催动起来。随之而后的便是数只辅助凡蛊。

    　　很快，大量的我意暴涌而出，'
