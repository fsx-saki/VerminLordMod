- chapter: 403
  title: 第四百零四节：再炼净魂仙蛊
  content: '第四百零四节：再炼净魂仙蛊

    　　北原，琅琊福地。

    　　昼夜开工，已经持续了数个月的炼蛊大厅中，火光映照在毛六的脸上。

    　　他满脸烟灰，双眼更是充斥血丝，死死地顶着熊熊燃烧着的剧烈火焰。

    　　炙热的温度，烤炙着周遭，使得毛六全身的毛发都发焦微卷，但毛六不管不顾，一心投注在眼前。

    　　炼蛊已经进入到了最后的关键步骤。

    　　“不愧是运道，辅助炼蛊绝佳，又到了这一步了！这一次一定要成功！！”

    　　毛六咬牙'
