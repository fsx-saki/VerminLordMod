- chapter: 408
  title: 第四百零九节：再添八转战力
  content: '第四百零九节：再添八转战力

    　　太古年兽钓来阵的防御很强，遭受太古年猴重重一击，仍旧不动如山。

    　　但这更加激发了太古年猴的凶信。

    　　轰轰轰！

    　　它高举双拳，不断打砸下来，拳头宛若流星，一次次暴击钓来仙阵。

    　　仙阵开始摇晃，内部更是剧烈的震动，伴随着太古年猴的每一次重击，都会损失大量的凡蛊。

    　　白兔、黑楼兰、影无邪都在迅速地补充凡蛊。

    　　有些蛊阵，损失一成的蛊虫，就会崩溃。有些更优秀的蛊'
