- chapter: 410
  title: 第四百一十二节：野蛊来投
  content: '第四百一十二节：野蛊来投

    　　传闻中，这世界上有一条长河，名为光阴长河！

    　　它从过去发源，流经现在，向未来奔腾。

    　　世间万物都若河中之鱼，河流湍急，几乎所有的鱼都只能顺势而下。

    　　若无这光阴之河，世界将完全静止，成为画面。有了这河，一切才可变化，世界才能生动，或是衰减或是繁华。

    　　“再次来到光阴长河之中了。”方源感慨无比。

    　　他举目四望，只见河面辽阔至极，虽是称之为光阴长河，却好似海面一'
