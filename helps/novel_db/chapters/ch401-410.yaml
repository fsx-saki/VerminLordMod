- chapter: 405
  title: 第四百零六节：凤九歌主动撤退
  content: '第四百零六节：凤九歌主动撤退

    　　吼吼吼！

    　　方源张开蛟龙巨口，喷吐地喷吐出剑光龙息。

    　　龙息仿佛是一道道的银色闪电，以迅雷不及掩耳之势，暴射喷涌，袭向凤九歌。

    　　凤九歌催动一曲阳关不断闪避。

    　　而当他催用出一曲阳关杀招的时候，往往就意味着变招一曲之士的出现。

    　　双方从地下深处，一直杀到高空中去。

    　　你来我往，彼退此进，龙啸声声，鼓钟阵阵。

    　　碧玉歌士！

