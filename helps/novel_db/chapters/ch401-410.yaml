- chapter: 406
  title: 第四百零七节：谋取红莲真意
  content: '第四百零七节：谋取红莲真意

    　　橘黄色的光辉，在凤九歌的身上，猛地一闪即散。

    　　这个迹象表明，凤九歌的仙道杀招一曲阳关，已然到了时限。他想要再度运用，非得等过七个时辰。

    　　但这都不是重点。

    　　凤九歌已经彻底脱离的战场，一曲阳关到没到时限，都没有关系。

    　　这位中洲千年难得一出的人杰，此刻双足缓缓落到地上，仰头望着苍穹。风采依旧的脸庞上，却是眉头微皱，良久，凤九歌发出一声感叹。

