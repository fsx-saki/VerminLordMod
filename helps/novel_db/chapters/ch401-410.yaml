- chapter: 401
  title: 第四百零二节：战后成果
  content: '第四百零二节：战后成果

    　　方源此时身上的道痕，早已是七转巅峰。万蛟杀招，受到他身上的变化道、剑道等道痕增幅，威力暴涨，骇然登顶七转杀招的极限。

    　　群蛟凶猛，围剿四大曲士。

    　　碧玉歌士周围，倒下无数玉石蛟龙，但支撑不了片刻，他就被彻底淹没。

    　　天地歌士攻势堂皇，一举一动都带着威压，奈何群蛟势众，终究被一头剑蛟吞下。

    　　俯首歌士支撑得最久，竟能策反一些上古剑蛟分身，可惜的是，难挡大局。'
