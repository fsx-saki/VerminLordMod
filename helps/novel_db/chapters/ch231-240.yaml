  - '仙尊第一世的时候，开创了运道，但究其一生只有运道一种流派。因此他对运道十分保密，仅仅为了资助方源以及家天下的野望，这才在八十八角真阳楼、琅琊地灵处勉强留下一部分的运道真传。

    　　他死后，千方百计地借助分身之'
  - '着实不想杀你。可惜了，你的心性决定了你的结局。我是不得不除掉你。若真任由你发展下去，总有一天，你会从己运真传出发，染指众生运、天地运。越早除掉你，越是容易。”

    　　巨阳仙尊对方源有惜才之意，但更有忌惮之心！'
  - '，伤害就越是猛烈。就算停止了这个杀招，仍旧会有不断的伤害，只是伤害逐渐减弱。

    　　方源曾经在一头太古年兽上尝试过此招。

    　　只是几个呼吸，方源就停止了这个杀招。

