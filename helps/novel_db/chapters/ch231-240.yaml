    　　方源催发五禁玄光气，让星宿仙尊时刻处于反噬之中。偏偏星宿仙尊还要压制无极锁链，强行融合，简直是保护了方源。

    　　星宿仙尊深深一叹。

    　　饶是她身为智道第一人，此刻也捉襟见肘起来。

    　　站在她的角度来看：巨阳仙僵乃是生平最强敌人，必须留足精神对付。相比较起来，方源威胁低一点，但也绝不能放任。毕竟他得到诸多尊者投资，就连当初魔尊幽魂炼制至尊仙胎蛊时，星宿意志也投注了一手呢。'
