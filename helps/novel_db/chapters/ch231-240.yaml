- chapter: 232
  title: 第二百三十二节：大惊变
  content: '第二百三十二节：大惊变

    　　原本在这大同风幕中，蛊虫群死气沉沉。

    　　现在大同风幕被砍出一道巨大的伤口，贯通北原外界，这些蛊虫群像是疯了一般，疯狂地朝伤口涌去。

    　　无相手蜂拥而至，在沿途中大抓特抓。

    　　几乎一半的蛊虫，都落入到无相手中，随后又被无相拳破空带走。

    　　但仍旧还有大部分，顺利地冲出伤口，逃出大同风幕这个绝境，进入外界北原。

    　　“收，给我收！”

    　　“好多的蛊虫，嗯，那是一只仙蛊？'
