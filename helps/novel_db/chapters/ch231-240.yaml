    　　“放心吧，太上大家老既然答应了黑月挑战，岂会临阵避退？你我耐心等待便是了。”昊震环保双臂，倚在墙壁上，面容沉凝。

    　　他中年模样，络腮胡子，身材魁梧，他和仇老五乃是好友，两人联手有一记招牌杀'
