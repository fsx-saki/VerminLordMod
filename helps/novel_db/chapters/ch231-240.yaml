    　　此招囊括木道、毒道、暗道、炎道四大流派的奥义，能够侵蚀一切，在内部造成严重的破坏。时间拖得越久，伤害就越是猛烈。就算停'
  - '“火鸟山蛊仙求援！”

    　　“针林雪原燃起鬼火，若不及时阻止，鬼火将烧尽整个针林雪原。”

    　　“毛民大陆均遭受雷霆轰炸，其中一座已经被海啸淹没！”

