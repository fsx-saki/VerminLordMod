  content: '第二百三十五节：方源误我

    　　这是盗天魔尊炼制出来的赌博蛊，为了炼制此蛊，他自削身上的偷道道痕！

    　　本身赌博蛊就是结果随机，不能人为影响。

    　　盗天魔尊是特殊的，他是天外之魔，身怀异世道痕。盗天空间的建立，根植于他身上的异世宇道道痕，那么赌博蛊便来源于他身上的异世偷道道痕。

    　　赌博蛊本身没有杀伤，不论结果如何，徒惹一笑。但以此为核心的赌运杀招却是风险极大，结果根本不受掌控。

    　　忽而成功，忽然'
