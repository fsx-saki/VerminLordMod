  title: 第二百三十一节：惊变
  content: '第二百三十一节：惊变

    　　救太白云生，还是夺回人如故？

    　　这一瞬间，方源不免陷入犹豫。

    　　人如故这只蛊，在凡蛊之时，方源就早闻大名。如今晋升成仙蛊，自然威能更高。

    　　根据太白云生之前所言，凡蛊时，人如故能将凡人蛊师的状态，回到过去某刻。成了仙蛊后，人如故不仅能影响他人，更能影响自己。

    　　这个自己，自然指的是太白云生。

    　　太白云生乃是蛊仙，不难推测，仙蛊人如故能对蛊仙有效！

    　　一个能令蛊'
