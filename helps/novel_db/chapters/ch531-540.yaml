    　　而在她的周围，是一片开阔的空地。原本恢弘的八转仙蛊屋镇魂殿，已经全然消失！

    　　荡魂山乃是天地秘境，有着海量道痕，能媲美九转仙蛊。

    　　它一自爆，爆发出来的威能，恐怖到难以想象的地步。可怜镇魂殿根本没有反应的时间，而且爆炸又是从内部发生'
