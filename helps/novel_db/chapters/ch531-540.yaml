- chapter: 540
  title: 第五百四十三节：巅峰盛景
  content: '第五百四十三节：巅峰盛景

    　　这是炼道流派的最高追求之一——将种种杀招，统合成一只蛊虫！

    　　举个例子，凡道杀招我力。

    　　此招乃是力道杀招，北原蛊仙苏仙儿为自家女儿黑楼兰开创出来。它的核心是力道，但也涉及魂道、气道，一旦催动出来，就能打出人力虚影，虚影形象逼真，是蛊师潜意识中的描绘。

    　　并且，这种力道虚影能够能自动追敌，富有灵性。

    　　组成这个杀招的蛊虫，一共有四五十只。

