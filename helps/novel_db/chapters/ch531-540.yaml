- chapter: 539
  title: 第五百四十二节：炼道准无上！
  content: '第五百四十二节：炼道准无上！

    　　战斗也要分和谁打。

    　　方源若是战胜那些六转、七转蛊仙，没有人会为此惊讶。

    　　但对手是历史上有名的八转强者雷鬼真君，那就不是一种概念了。

