  title: 第五百三十四节：炼道真意
  content: '第五百三十四节：炼道真意

    　　“换什么？”方源淡淡一笑，继而道，“自然是炼道真意了。”

    　　“啊！你居然知道我派中藏有炼道真意？！”琅琊地灵震惊地差点跳起来，这可是琅琊派最大的秘密，也是所有的库藏中最深最有价值的宝藏！

    　　什么是真意？

    　　真意其实就是一种意志，智道有三元要素，讲究念、意、情。真意便是三元中的“意”，当然不只是真意，还有假意、特意、故意、刻意、敌意、战意等等，不胜枚举。

