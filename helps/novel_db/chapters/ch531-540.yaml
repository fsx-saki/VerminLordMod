- chapter: 537
  title: 第五百四十节：撤
  content: '第五百四十节：撤

    　　方源催动最强攻伐手段！

    　　龙鸣声中，银鳞如海。万蛟奔腾，向地面深坑中央孤零零的井斓凶残地围剿过去。

    　　“可、可恶……”井斓咬牙，眼中的怒意简直是熊熊烈火。

    　　刚刚的一击之后，她的气息陷落谷底。万蛟扑来，被她悉数轰杀。

    　　“这些小蚯蚓，根本不算什么！方源，你这个懦夫，来吧，我们真身对战！”井斓大吼。

    　　方源冷笑，真身缩在角落里，深深隐藏。

    　　万蛟！

    　　万蛟！'
