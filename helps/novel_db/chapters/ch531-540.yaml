    　　她虽然是八转修为，战力极强，但一生都活在幽魂魔尊的阴影之下。在天庭中，她因为荡魂山自爆而惊醒，看到魔尊幽魂负隅顽抗，心中埋藏在最深处的情绪都因此激荡而起。

