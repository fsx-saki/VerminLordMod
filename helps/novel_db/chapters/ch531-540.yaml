    　　琅琊地灵沟通宝黄天，迅速和方源完成一笔有关仙蛊的交易。

    　　两人交接的速度很快，几个眨眼之间，就功成身退。

    　　“这就是道可道仙蛊？”琅琊地灵打量着手中的仙蛊。

