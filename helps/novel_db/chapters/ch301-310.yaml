  title: 第三百一十一节：惊鸿乱斗台
  content: '第三百一十一节：惊鸿乱斗台

    　　双方激战，打得天翻地覆，山河迸溅。

    　　即便是虚影变化，不干涉现实，也叫人动容不已。

    　　战斗渐渐白热化，八转蛊仙壮汉占据上风，仰头狂笑：“吾乃是八转蛊仙，又是大力真武体，你区区七转，居然痴心妄想，想要挑战我的威名？！”

    　　那额头绘有红莲的神秘蛊仙，呵呵一笑，发出中性的声音：“武斗天王，今日你必败无疑。接我这一招！”

    　　话音刚落，七转神秘蛊仙就右手一扬，飞出一座'
