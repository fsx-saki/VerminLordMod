    　　因为光阴流速不同，这里已经有大半个月过去了。

    　　地下洞窟中，方源沐浴在智慧光晕里，一如既往地默默推算。

    　　在这里，他无需催动见面似相识杀招，露出来仙僵原貌。

    　　他一动不动，盘坐着，宛若一块漆黑的礁石。

