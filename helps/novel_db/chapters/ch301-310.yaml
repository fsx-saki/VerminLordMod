  title: 第三百一十节：原来无解
  content: '第三百一十节：原来无解

    　　智汗阵。

    　　池伤再一次布下这座蛊阵，竭尽全力，推演阵法。

    　　但是这一次，他遭遇到了前所未有的挑战！

    　　难，非常的难，就算前两次的难度叠加起来，再乘以十，也不及这一次的难度。

    　　池伤感觉自己就像是一个婴儿，企图攀登一座高山。

    　　“这种难度……难怪那武遗海非常自信！”

    　　“它和之前的两个蛊阵内容有相当的联系。”

    　　“不行，我一定要把握住这个机会，狠狠地羞辱武遗'
