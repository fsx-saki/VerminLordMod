  title: 第三百一十节：棋子白凝冰
  content: '第三百一十节：棋子白凝冰

    　　望着石亭中的砚石老人，白凝冰心中十分警惕。

    　　自从他被提拔成仙，顺便摆脱了困扰他多时的女儿身，他就彻底地意识到砚石老人的深不可测。

    　　白凝冰的冷漠，是他的天性。但他对砚石老人的强硬，却只是一种试探。

    　　甚至，他一心想要对付方源，恨不得吃肉喝血的复仇渴望，也是一种对自己的伪装，以及对砚石老人的试探。

    　　虽然时间才过去几年，但白凝冰已经不再那么在意方源了。

