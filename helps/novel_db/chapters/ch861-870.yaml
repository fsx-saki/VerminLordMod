- chapter: 868
  title: 第八百七十四节：入窍
  content: '第八百七十四节：入窍

    　　“他们怎么会出现在这里？！”花蝶女仙低呼，浑身冰冷。

    　　“若非周围环境险恶，令我察觉到了细微异象，我绝不会发现这些人的踪迹。快走！”曾落子催促道，神色惶急。

    　　“我们之间有内鬼！分头走！”庙明神面色铁青，已经是明白过来。他目光如电，狠狠扫过土头驮、童画、曾落子，尤其在方源的身上停顿了一下。

    　　显然，他最怀疑的就是这位楚瀛，因为他还未能真传探查清楚他的底细。

