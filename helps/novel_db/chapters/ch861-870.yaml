- chapter: 870
  title: 第八百七十六节：除了我还能有谁？
  content: '第八百七十六节：除了我还能有谁？

    　　接引岛并不大，群仙探无可探，毫无收获，很快就集中到了小岛中央。

    　　在小岛中央，他们有了震惊的大发现！

    　　一座高耸的方尖碑，通体宛若黄金制作，散发着柔和晶莹的微光。

    　　八转仙蛊屋——功德碑！

    　　功德碑的表面，有文字不断浮现，介绍了这座接引岛，也介绍了乐土真传的详情。

    　　要获得乐土真传，就必须接取方尖碑上的各种任务，完成之后获得功德。功德越多，能够兑换的'
