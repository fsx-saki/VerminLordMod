- chapter: 862
  title: 第八百六十八节：老祖神威！
  content: '第八百六十八节：老祖神威！

    　　刹那台、今古亭、三秋黄鹤台、恒舟、鲨流撬、日月观。

    　　顾六如、凤九歌、星野望、九灵仙姑。

    　　天庭在光阴长河中投入了庞大军力，对红莲真传势在必得！

    　　反观方源一方，只有一座万年斗飞车，虽是八转，在天庭这样的强大阵容面前，也显得单薄。

    　　天庭六座仙蛊屋、四位八转蛊仙将万年斗飞车重重包围。

