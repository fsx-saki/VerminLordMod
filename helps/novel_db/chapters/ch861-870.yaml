- chapter: 869
  title: 第八百七十五节：楚瀛人呢？
  content: '第八百七十五节：楚瀛人呢？

    　　“这里到底是什么地方？把你知道的都说出来！”沈从声说着，再度向庙明神下手。

    　　结果杀招虽然催动起来，却无故神秘消失，沈从声闷哼一声，鼻孔顿时流血，承受下杀招反噬的伤害。

    　　“太上大长老，且慢动手，这里似乎禁止彼此出手争斗。怀着拼杀的目的，不管是催动杀招还是蛊虫，都会失败。但若是治疗自身，却不受阻碍。”沈潭道。

    　　“你怎么不早说？”沈从声双眼一瞪。

    　　沈潭委屈'
