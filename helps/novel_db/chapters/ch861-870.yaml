- chapter: 861
  title: 第八百六十七节：挑战
  content: '第八百六十七节：挑战

    　　“三层辅阵安置妥当。”一班的蛊仙纷纷收手，他们立即盘坐在仙蛊屋中，开始闭目休整。

    　　二班接替，开始在三层辅阵的基础上，安置八转仙蛊——镇。

    　　二班的蛊仙有八位，七转、六转皆有，诸仙齐心合力，配合默契，一番努力后，终于将镇仙蛊布置下来。

    　　这里是光阴长河，宙道天地秘境，作为律道仙蛊镇，安置下去并不容易，难度很高。

    　　但八转仙蛊镇，乃是镇河锁莲大阵中的核心仙蛊之一，是'
