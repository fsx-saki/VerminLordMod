    　　他来自东海超级势力苏家，名为苏伦，隶属正道。

    　　方源安排的交易顺序，是正道一位，散修一位，两方接连交替。这份规矩明显是照顾到了东海散仙，深得'
  - '绪。

    　　这只是一块小音贝的贝壳而已，算是七转仙材。

    　　音贝是普通的贝壳，蕴含音道道痕。若是成长到荒兽级别，贝壳体积暴涨，成为巨音贝。等到了上古荒兽级别，音贝的体积又骤然缩减，成为小音贝。

    　　巫马杨掏'
