- chapter: 866
  title: 第八百七十二节：大宴终欲入龙鲸
  content: '第八百七十二节：大宴终欲入龙鲸

    　　东海。

    　　哗哗哗！

    　　水浪湍急，击打在小岛上的礁石，炸裂成无数的白沫。

    　　恶风呼啸，天气阴沉。

    　　这座无人的小岛，在偌大的东海中极不起眼，但此刻却潜藏着四位蛊仙。

    　　四位蛊仙人人带伤，其中一位躺在地上，生死不知，余下三位各自盘坐在地上，加紧疗伤。

    　　片刻后，忽然一人剧烈咳嗽，吐出大口大口的鲜血。

    　　“大人！”还有神智的另外两仙连忙停止疗伤，关切地围'
