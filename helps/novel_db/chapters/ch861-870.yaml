- chapter: 867
  title: 第八百七十三节：途中异变
  content: '第八百七十三节：途中异变

    　　数日后，东海的某处无名小岛。

    　　八位蛊仙终于到齐了。

    　　庙明神为首，身边鬼七爷、花蝶女仙、蜂将拥护着他。除此之外，就是曾落子、土头驮、童画以及方源了。

    　　“虽然我重生了，但似乎没有过多影响到庙明神这里呢。”方源当然是伪装成了楚瀛，不动声色地观察着。

    　　和上一世一样，庙明神筛选出来的人选，没有任何的变化。

    　　但方源自己却是和上一世截然不同了。

    　　他现在的处境'
