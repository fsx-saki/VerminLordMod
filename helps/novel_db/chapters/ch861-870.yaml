- chapter: 864
  title: 第八百七十节：大宴交易现心血
  content: '第八百七十节：大宴交易现心血

    　　气海大宴。

    　　交易正在进行当中。

    　　一位蛊仙走上台前，他穿着黑袍，乱发披肩。此刻抬起头来，显露真容，乃是东海散仙巫马杨。

    　　乌马杨鹰钩鼻子，目光阴鸠，他似乎有伤在身，咳嗽了两声，取出了一个贝壳，漂浮悬空。

    　　东海众仙看去，很多人当即辨认出来，流露出失望的情绪。

    　　这只是一块小音贝的贝壳而已，算是七转仙材。

    　　音贝是普通的贝壳，蕴含音道道痕。若是成长到荒'
