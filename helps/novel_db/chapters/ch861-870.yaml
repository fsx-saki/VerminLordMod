- chapter: 863
  title: 第八百六十九节：气漫五域
  content: '第八百六十九节：气漫五域

    　　由方源策划的石莲岛埋伏战，已经结束了。

    　　辉煌的明光仍旧充斥着天庭，但在中央大殿中，却是气氛沉闷。

    　　“关键时刻，顾六如仙友拼死拦截住万年斗飞车，我等这才险死还生。”九灵仙姑说到这里，又咳出一口血来。

    　　她眼眶含泪，顾六如奋不顾身为他们抵挡的身影，又再次浮现眼前。

    　　九灵仙姑容颜清丽，喜好穿大袍，往日里长袖大摆，气势沛然，而今她却是浑身浴血，伤痕累累，大袍褴褛'
