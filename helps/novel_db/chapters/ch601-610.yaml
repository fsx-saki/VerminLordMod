- chapter: 610
  title: 第六百一十四节：阳莽背火衣
  content: '第六百一十四节：阳莽背火衣

    　　方源构建的仙蛊屋雏形，本身就不擅长防御，中招之后，分崩离析。

    　　仙蛊屋内方源等人连忙自保。

    　　大量的火焰，宛若毒蛇，吞噬烧毁沿途一切蛊虫，然后从四面八方，向方源等人围剿过来。

    　　方源大吼一声，催动仙道杀招冬裘，立即他的全身上下都像是披了一层洁白的寒霜。

    　　寒霜不仅是保护了方源他自己，更是在这关键时刻覆盖出去，维护周围宙道分身、黑楼兰、影无邪、白凝冰等人。'
