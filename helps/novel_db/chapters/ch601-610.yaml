- chapter: 603
  title: 第六百零六节：这是陷阱！
  content: '第六百零六节：这是陷阱！

    　　仙窍门户洞开，但吸摄进去的天地二气规模，已经减少许多。

    　　“嗯？大敌就在眼前，诸位何故犹豫不进？”铁家蛊仙扬起眉头，喝问南疆群仙。

    　　许多人脸上微微一红，立即惊醒，当即就有人大叫：“我们一起冲进去！”

    　　“方源这魔头还在渡劫，此战我们必胜！谁临阵脱逃，谁就是我南疆正道的最大耻辱！”

    　　“没错，冲进对方仙窍去。就算是死，我们也要让方源这个魔头损失惨重！”

