- chapter: 606
  title: 第六百零九节：紫薇后怕
  content: '第六百零九节：紫薇后怕

    　　“怎会如此？怎会如此……”南疆战报已经传达过来，紫薇仙子口中呢喃，双眼中竟是迷惘。

    　　以往雄阔空明的大殿，此刻也充斥着疑惑。

    　　方源不仅没有渡劫，而且本身已经达到八转！甚至，他还因此在五界山脉布置了陷阱，俘虏了天庭蛊仙君神光！

    　　南疆蛊仙被方源俘虏的事情，紫薇仙子早已知晓，没想到这么快，同样的遭遇就降临到了她天庭一方。

    　　天庭的蛊仙竟被人活活俘虏！

    　　这是多久'
