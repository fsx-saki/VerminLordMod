- chapter: 607
  title: 第六百一十节：今古亭四旬子
  content: '第六百一十节：今古亭四旬子

    　　“陶铸真传……”

    　　若换做数月前，方源或许还可利用南疆蛊仙，来交换这份传承。

    　　但是现在，他手头上的南疆俘虏，几乎都已经被他吞窍，直接撕票了。

    　　这些南疆蛊仙，无一不是七转强者，至于夏槎更是八转修为。至尊仙窍吞并了这些，还有市井中的诸多遗留仙窍福地，使得方源修为暴涨，一举从七转上升到八转，跨越了七转的最后浩劫。

    　　本来方源打算，在五界山脉继续俘虏南疆蛊仙，然'
