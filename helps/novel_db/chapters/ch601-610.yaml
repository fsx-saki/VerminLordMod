- chapter: 609
  title: 第六百一十三节：石岛陷阱
  content: '第六百一十三节：石岛陷阱

    　　“咳咳咳……”上旬子趴在恒舟的甲板上，不断咳嗽，呛水得很严重，满身水渍。

    　　而在他的旁边，这时下旬子，已然是昏死过去，伤势沉重，状态极为不妙。

    　　八转蛊仙清夜走了过来，面色平静地看向上旬子：“另外两位仙友，已经是被光阴长河卷走，实在搜刮不到。”

    　　上旬子狠狠喘息了几口气，勉强站起身来，看了一眼下旬子，脸色惨白地道：“他二人已经战死，方源魔头实在是厉害！今古亭的残'
