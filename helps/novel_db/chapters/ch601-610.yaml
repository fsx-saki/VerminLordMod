- chapter: 604
  title: 第六百零七节：落魄印
  content: '第六百零七节：落魄印

    　　震撼！

    　　见证方源以一敌众的八转威势，在场的蛊仙均感到了一种震撼。

    　　群仙此来，就是想要阻击方源，干扰他渡劫，防止他成为八转。

    　　但没想到，再一次照面，方源已然是八转修为。

    　　这个变化，打了所有人一个猝不及防。

    　　“他什么时候成就了八转？！”池曲由微瞪眼珠，难以置信。

    　　“能够动用春剪、夏扇并不出奇，关键是这两记杀招受到宙道道痕强烈增幅，挡下所有攻击。就算方源'
