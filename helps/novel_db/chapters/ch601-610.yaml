- chapter: 608
  title: 第六百一十二节：宙道雄威
  content: '第六百一十二节：宙道雄威

    　　根据君神光的情报，四旬子修为一致，都是七转，并且练就了合击之术，威能非凡，就算是面对八转蛊仙都有一拼之力。

    　　当然，也只有一拼之力。几个回合下来，必定会被八转蛊仙所败。

    　　不像是之前的方源，或者凤九歌那样程度的战力，能够力抗八转。

    　　即便如此，这也相当了不起了。四旬子栽培出来之后，一直都被灵蝶谷当做底牌，绝不轻易调动。

