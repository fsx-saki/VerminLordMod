- chapter: 601
  title: 第六百零四节：围杀方源
  content: '第六百零四节：围杀方源

    　　“五界山脉？”君神光顿时心中一动。

    　　方源此次大肆破坏烽火台，搞出来的动静太大，天庭就算在南疆的势力十分薄弱，也查探得出来。

    　　南疆这边集结了众多智道蛊仙，推算出了三个地点，其中包含五界山脉。

    　　而天庭却是由紫薇仙子独自推算，提前就算出了五界山脉。

    　　君神光立即动身，向五界山脉赶去。

    　　与此同时，他的脑海中浮现出有关五界山脉的种种情报。

