- chapter: 602
  title: 第六百零五节：八耳猴
  content: '第六百零五节：八耳猴

    　　一进入五界山脉，南疆群仙顿时感到强烈的排斥或者吸摄之力。

    　　他们催动着杀招前行，又支撑着防御手段，自家仙窍无不震动，受到仙道杀招的反噬。

    　　“这魔头倒真是选了一个好地方！”当即就有南疆蛊仙咬牙切齿，恨恨地道。

    　　“就算是我这仙窍全毁了，也要将这魔头杀掉，为天下除害！”更多的蛊仙反而战意暴涨，杀方源之心更加坚定。

    　　方源如此狡诈、凶残，对天庭都毫无敬畏之心，胆大妄为'
