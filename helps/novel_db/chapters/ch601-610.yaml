- chapter: 605
  title: 第六百零八节：武庸之败
  content: '第六百零八节：武庸之败

    　　方源的表现，让陶铸意志震惊不已！

    　　这是哪里冒出来的魂道蛊仙？仅仅一击，就让同为八转的蛊仙遭受重创！此等赫赫魔威，当年魔尊幽魂年轻的时候，也不过如此吧。

    　　“这少年郎看起来柔弱清秀的样子，没想到居然如此心狠手辣，手段超绝。他一定制造了不少的杀孽，要不然怎么会引动南疆正道蛊仙如此规模的围杀？”

    　　意识到这一点，陶铸意志顿时怂了。

