- chapter: 885
  title: 第八百九十一节：竟是方源！
  content: '第八百九十一节：竟是方源！

    　　异变就在群仙的眼前发生了。

    　　沈从声接近神秘魔仙，一脸的激动。

    　　“终于，我终于见到了您了，沈伤先祖啊！”沈从声用微颤的声音，叫道。

    　　他来到这里的真正目的，就是拯救先祖沈伤。

    　　沈伤乃是沈家最为杰出的蛊仙，天赋才情之卓绝，当时就被公认。甚至在他还只是六转蛊仙时，就有智道八转大能点评，说他是“百年东仙首，才情是半尊”，意喻沈伤在数百年后，若修成八转，必定是东'
