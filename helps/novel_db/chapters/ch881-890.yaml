- chapter: 886
  title: 第八百九十二节：人道准无上
  content: '第八百九十二节：人道准无上

    　　时至如今，方源早已今非昔比。

    　　天庭成就了他震慑天下的名望和声威。即便他看起来只是七转修为，但是却已能令世间的八转蛊仙感到惧怕。

    　　“先祖。”沈从声递给沈伤一只信道凡蛊，里面有着他所知道的方源的一切情报。

    　　沈伤接过凡蛊，神念一扫，再看方源时完全是另外一番神色了。

    　　“方源？连天庭都奈何你不得，哈哈哈，有趣！”沈伤双目血芒爆闪，狂笑一声，“没想到天下竟生出你'
