- chapter: 882
  title: 第八百八十八节：应声虫
  content: '第八百八十八节：应声虫

    　　阴天恶风，波涛汹涌。

    　　这里正是悔哭海域，而方源和庙明神等人已经深入此地多时。

    　　“我后悔！我不该杀死那么多人呐。”

    　　“我痛悔！我不应该出走追寻力量，我若是能停留在父母身边尽孝多好啊！”

    　　“我忏悔！我欺骗了所有人，藏匿了仙蛊，我让最信任我的朋友背锅，自己得到了好处！”

    　　一声声的哭泣，仿佛仙道杀招，向众仙的耳中钻去，干扰情感心绪。

    　　这里已经是悔哭海域的'
