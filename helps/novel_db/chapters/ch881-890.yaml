    　　尤其是在南疆这块地域。

    　　很多的山寨中，哪怕不是擅长土道的，也会想方设法得到一只三转或者四转的领土蛊。山寨会将这只蛊种在地下，由位高权重的蛊师负责，极大地增强领地的掌控程度。

