- chapter: 881
  title: 第八百八十七节：欺负八转
  content: '第八百八十七节：欺负八转

    　　撞击海流宛若饥饿的猛虎，但是在方源的布局之下，它却成了拱卫五岛岛链的家猫。

    　　当方源做到这一点时，大局便已定了。

    　　接下来就是一些扫尾工作。

    　　这些工作并不困难，但相当繁杂，消耗时间和精力。

    　　方源是看不上的。

    　　于是，方源和庙明神协商，将蜂将、花蝶仙子留在这里，剩下的人则跟他回去。

    　　白光一闪，方源、庙明神、鬼七爷便又回到了接引岛。

    　　任修平正在琢磨功'
