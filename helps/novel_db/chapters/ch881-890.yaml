    　　团队名号并不便宜，需要一百功德。'
  - '新的名号，可以接取更高一级的任务了。这个名号很可能就是——大好人！”

    　　好人名号可以接取中型任务，大好人名号可以接取大型任务。

    　　这个简单的关系，蛊仙们很容易就从名字上能联想出来。

    　　但问题在于，就算想到'
