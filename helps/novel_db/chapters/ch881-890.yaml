  - '出辅阵，悬浮高空：“要跨越这道关口，辅阵需要调整一下，诸位请勿急着动手。”

    　　紧接着，他心念频动，仙元迅速消耗，座座辅阵跟随他的心意，开始转换位置。有的辅阵不断后退，有的辅阵则从后方前移，接近海底大阵。'
