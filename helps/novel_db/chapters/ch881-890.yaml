- chapter: 887
  title: 第八百九十三节：黑火
  content: '第八百九十三节：黑火

    　　道痕不互斥！

    　　至尊仙体的优点也是最大的弊端，在这一刻显露无疑。

    　　一直以来，方源都刻意避免这个缺陷，但此刻沈伤的杀招着实诡异，实在叫人防不胜防。

    　　谁能想到夜歌杀招只是一个陷阱？

    　　沈伤被万年斗飞车追杀，催出这样的杀招来隐藏自己，是非常正常且自然的事情。

    　　若方源不动用侦查手段，就只能任凭沈伤躲藏在黑暗中，攻势陷入僵滞。

    　　方源伤口上的人道道痕在迅速增长！'
