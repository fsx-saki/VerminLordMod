- chapter: 883
  title: 第八百八十九节：领土蛊
  content: '第八百八十九节：领土蛊

    　　悔哭海域，群仙悬立。

    　　庙明神等四人各占据一座辅阵，不断催动，大阵的力量持续渗透到海底大阵内部。

    　　方源正在布置仙阵。

    　　他气息勃发，仍旧是七转层次，浑身笼罩一层淡青光晕，双眼充斥蓝芒，如海如电。

    　　一挥手，大量的凡蛊仿佛蚊群，泱泱一片飞到半空，盘旋飞绕，很快就形成一个辅阵雏形。

    　　随后方源取出一份份的仙材，动用一记记杀招，充实辅阵雏形。

    　　新加入进来的任修'
