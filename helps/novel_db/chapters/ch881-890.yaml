    　　“还有仙蛊，我的天，有八只仙蛊！”

    　　“这些仙蛊大多数都是七转，六转的都很'
  - '，可以将这样的大阵炼化？”

    　　“但若是他炼化不成，我们的任务又该怎么办？”

    　　“是啊，楚瀛虽然是阵道宗师，但推算实际上是智道的事情。他能推算出什么呢？”

    　　蛊仙们心态很复杂。

    　　一方面，方源遇到了'
  - '不少。

    　　比如镇河锁莲大阵中的核心仙蛊镇蛊、锁骨，刹那台中的一刹、那时两只宙道核心，恒舟中仙蛊恒，三秋黄鹤台中的早秋、中秋、晚秋，日月观里的仙蛊日子、月子。

    　　这些仙蛊大多数都是七转，甚至还有八转！

    　　至'
  - '来这片龙鲸乐土，如今被困在这里，悔不当初啊。”

    　　……

