    　　“先祖。”沈从声递给沈伤一只信道凡蛊，里面有着他所知道的方源的一切情报。

    　　沈伤接过凡蛊，神念一扫，再看方源时完全是另外一番神色了。

    　　“方源？连天庭都奈何你不得，哈哈哈，有趣！”沈伤双目血芒爆闪，狂笑一声，“没想到天下竟生出你'
