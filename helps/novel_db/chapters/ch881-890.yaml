- chapter: 889
  title: 第八百九十五节：众人的仙材
  content: '第八百九十五节：众人的仙材

    　　方源的一番话让沈从声沉默。

    　　海风吹拂着他的衣摆，他悬停于空，陷入深思。

    　　方源停下了破晓剑，任由他静静思索。

    　　五域乱战的未来，已经被各大势力预见。沈家贵为东海的超级势力，但在这样的乱局中，也如同惊涛骇浪中的舢板。

    　　沈从声并不昏聩，和他一样，但凡有远见卓识的势力首领都在考虑着自家势力该何去何从。

    　　这是一个大变局，稍不留意，大时代的浪潮会淹没一切不识时'
  gu_mentioned: []
  char_appear: []
  events: []
- chapter: 890
  title: 第八百九十六节：功德倒扣
  content: '第八百九十六节：功德倒扣

    　　看到任修平和童画都不能幸免，将自家仙材交给了方源，庙明神等人的心都提了起来。

    　　若是方源勒索他们，他们该怎么办？

    　　拒绝吗？

    　　恐怕是不成的。

    　　庙明神等人不可能在这片龙鲸乐土中待上一辈子的，他们还要在东海中修行。

    　　尽管方源向他们索要仙材，十分不合道理，本质上就是勒索，但为了今后长远打算，庙明神等人还是会低头的。

    　　这个世界向来是先讲力量，再讲道理。'
