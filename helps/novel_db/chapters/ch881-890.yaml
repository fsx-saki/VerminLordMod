    　　白光一闪，方源、庙明神、鬼七爷便又回到了接引岛。

    　　任修平正在琢磨功德碑面上的任务。

    　　他是奴道蛊仙，手中奴役着许多荒兽，还有少量上古荒兽。这些存在各有千秋，让他的手段'
  - '，更加轻松，收益更大。

