  title: 第三百四十六节：龙公苏醒
  content: '第三百四十六节：龙公苏醒

    　　天庭有着顾忌，但是这层顾忌是什么，星宿天意并没有明确的告知。

    　　星宿天意交代了之后，就消散在空气当中。

    　　“紫薇啊，不要望着我。我虽然寿命悠长，但知晓的秘密，也不是你想象中的那么多。告诉你实话，这是我生平第二次，见到星宿天意的主动降临。”龙公发出深深的感叹。

    　　顿了一顿，他接着道：“我们要相信星宿天意，就按照它所说的做。我们此行必将获胜，这是命中注定的事！”'
