  title: 第三百四十五节：薄青仙僵出世
  content: '第三百四十五节：薄青仙僵出世

    　　方源的问题还有很多。

    　　咨询了琅琊地灵，并未带给他想要的答案。

    　　对于鬼不觉，方源仍然没有确切的线索。目前为止，他只知道鬼不觉是针对魂魄的。

    　　“神不知已经如此绝妙非凡，和它齐名的鬼不觉，应当也不差。”

