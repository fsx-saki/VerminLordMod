    　　“监天塔主，放弃吧，这只仙蛊救不回来了。”碧晨天在旁劝道。

    　　监天塔主没有答话。

    　　此时，他的双手虚拢，散发出一股温暖的橙光。一只仙蛊几乎被劈成两半，被橙光吊着命，气息时强时弱，很不稳定。

    　　炼九生也是满脸忧色。

    　　他是炼道的大能，依他之见，这只仙蛊已经被判处了死刑。就算是炼九生亲自出手，就救不得。

