  title: 第三百四十三节：继承盗天真传！
  content: '第三百四十三节：继承盗天真传！

    　　就连当事人方源，也不知道为什么。

    　　在星宿仙尊的歌声，再次萦绕耳畔的时候，他的心中就莫名其妙地多了一些信息。

    　　这些信息告诉他，就在这落魄谷的某处，潜藏着盗天真传！

    　　方源怦然心动。

    　　同时，又很怀疑。

    　　“这会不会是中洲蛊仙留下的一个陷阱呢？其实并没有什么盗天真传，而是一个智道手段，专门来影响潜入谷中的敌人的心智？”

    　　方源迅速地冷静下来，开始检查'
