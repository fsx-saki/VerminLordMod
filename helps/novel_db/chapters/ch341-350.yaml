    　　其实，仙僵之躯，承载魂魄的极限，还要比普通的血肉之躯更高一些，只是少了滋养魂魄的功效而已。

    　　唯有鲜活的血肉之躯，才能滋养魂魄。死人尸躯之中，魂魄会越见枯萎。

    　　方源的魂魄能支撑到现在，胆识蛊起了最主要的作用。除此之外，他还动用了其他一些魂道手段，辅助滋养。

    　　虽然幽魂魔尊带给天下生灵重创，但也因他魂道鼎盛了一个时代，无数魂道杰出人物纷纷涌现，创造出了海量'
