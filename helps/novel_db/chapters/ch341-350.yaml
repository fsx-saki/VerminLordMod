  title: 第三百四十七节：三气归来
  content: '第三百四十七节：三气归来

    　　龙公说完这话，浑身气势陡然间变了。

    　　他刚刚击退紫山真君，又令影无邪的引魂入梦无功而返，气势惊天，宛若冲霄之巨龙。

    　　但现在他的气势，却开始一点点的向下降。

    　　说是“降”，其实并不妥当。

    　　而是夯实、浓缩。

    　　原本磅礴惊人的滔天气势，越缩越实，几个呼吸之后，龙公身上惊人的气势，全然收敛起来。整个人宛若万丈深渊，深不见底，神秘莫测。

    　　紫山真君如临大敌。'
