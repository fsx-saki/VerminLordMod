  title: 第三百四十七节：八转慧剑蛊
  content: '第三百四十七节：八转慧剑蛊

    　　这只仙蛊只有成人食指大小，通体银白作色，闪烁着耀眼的光泽。它形如蜈蚣，但蜈蚣的百足处，却是一根根的柔软须毛。

    　　“这个好像是……剑眉仙蛊？”

    　　方源想了想，脑海中闪烁一抹灵光。

    　　这是他从凤金煌给与的资料中，得知的情报之一。

    　　剑仙薄青当年有一只七转仙蛊剑眉，并非攻伐之蛊，而是用于剑道修行。

    　　蛊仙催动它，便能令蛊仙本身的一对眉毛改造。每一根细细的眉毛中，'
