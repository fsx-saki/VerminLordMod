    　　方源和影宗之间的关系，可谓是错综纠结。

    　　身为半个天外之魔的方源，曾经是天意安排好的棋子，孤注一掷，回到过去，破坏了影宗的大计。

    　　成功抢夺了至尊仙窍蛊的方源，从此和影宗之间，势不两立，不共戴天。

