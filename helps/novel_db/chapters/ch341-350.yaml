  title: 第三百四十八节：活捉幽魂
  content: '第三百四十八节：活捉幽魂

    　　紫山真君失去了仙窍，也等若失去了修行的根基。没有仙窍经营，他的未来一片黑暗。

    　　不谈未来，就论现在的话，他仙窍离体，便在骤然间损失了巨量的道痕。

    　　虽然他将大部分的蛊虫，还有仙元都收纳在身上，但是没有了道痕的增幅，他的战斗力暴降到了谷底。

    　　但这是没有办法的事情。

    　　一旦天气被抽取出来，紫山真君的仙窍就会骤然崩溃，到时候形成大同风，更加危险，会把性命都送掉。'
