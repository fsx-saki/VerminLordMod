- chapter: 741
  title: 第七百四十六节：紫薇出击
  content: '第七百四十六节：紫薇出击

    　　“方源，你最好过来看看，那些道痕又有了新的变化！”大战刚刚结束，琅琊地灵忽然传音过来。

    　　“什么？”方源诧异了一下。

    　　他连忙离开残破不堪的超级大阵，来到异变之处。

    　　凤九歌遗留下来的不利道痕，存在许多地点，但只有刚刚形成黑暗漩涡的地点最为浓郁。

    　　如今，其他的地方，虽然不利道痕并不多，但却发生了异变。

    　　这些道痕时不时地发出一丝湛蓝的光晕，仿佛天空中的启明'
