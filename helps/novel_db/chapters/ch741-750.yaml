- chapter: 747
  title: 第七百五十二节：池曲由的悲愤
  content: '第七百五十二节：池曲由的悲愤

    　　掠影地沟守卫大阵失陷！

    　　南疆各大超级势力很快就察觉了这个事实。

    　　正道震荡！

    　　掠影地沟处的梦境，乃是南疆中除去义天山之外最大的梦境集结之处。

    　　任何一个流派，都有自己的修行资源。

    　　梦境显然就是梦道修行的独特资源，蕴藏着梦道流派的种种奥秘。

    　　一言仙的“三尊说”预言，早已经深入人心。蛊仙们都知道未来的时代，是梦道的时代。因而任何超级势力，都对梦境十'
