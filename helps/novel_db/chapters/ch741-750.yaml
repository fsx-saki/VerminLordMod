- chapter: 749
  title: 第七百五十四节：池曲由要说服自己
  content: '第七百五十四节：池曲由要说服自己

    　　一片浅薄的深蓝湖泊，在苍翠的青山包围下，安静的宛若宝石。湖泊周围，都是洁白浑圆的石子、石块，形成河滩。

    　　正是南疆池家掌握的中型资源——摄心河滩。

    　　方源将里面的蛊虫都搜刮进自己的仙窍。

    　　五转摄心蛊有三千多只，四转则有五万，三转以下的摄心蛊规模多达百万。

    　　他又动用力道仙蛊挽澜。

    　　和上一世一样，此时的挽澜仙蛊仍旧是六转。

    　　片刻功夫，河水就像是'
