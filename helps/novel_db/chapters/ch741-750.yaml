- chapter: 745
  title: 第七百五十节：退一步海阔天空
  content: '第七百五十节：退一步海阔天空

    　　碧空如洗，白云若雪。

    　　秋日的草原，风声呼啸。阳光下，草地起伏，掀起一阵阵金色的浪潮。

    　　在这浪潮的簇拥之下，坐落着一座庞大的漆黑城池。

    　　若从高空鸟瞰，这座城池布局宏大，结构严谨。

    　　外围的城墙，好似用一个个巨大的石块筑磊，漆黑如墨，石头表面饱经雨打风吹，刻印着时光的沧桑痕迹。

    　　整个城墙是正六边形，雄踞在草原上。城墙周长超过两百里，高近十丈，厚亦有数'
