  - '方源有些后悔了。

    　　刚刚的战斗，不应该拖延时间，营造出两败俱伤的战果。

    　　他应该直接出手，不惜仙元消耗，来迅速解决陈衣。

    　　其实，就算他这样做，快也快不到哪里去。因果神树杀招攻防一体，实在是优秀，'
  - '了好，获得的胜利也是惨胜。

    　　天庭一方最终还能破罐子破摔，将琅琊福地的位置暴露给所有人。

    　　这处毛民圣地，绝对会惹来无数贪婪和觊觎的目光。

    　　长生天便首当其冲！

    　　“该怎么办？”方源开动脑筋，脑门'
  - '灵立即叫道。

    　　“快快开启炼道大阵，依我法门来炼化这些道痕。”方源迅速答道。

