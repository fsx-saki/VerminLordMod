- chapter: 748
  title: 第七百五十三节：异人种族传承
  content: '第七百五十三节：异人种族传承

    　　池曲由这么一大把年纪，平日主持池家大小事务，操心劳累。为大时代的到来殚精竭虑，还要栽培不成器的继承人。

    　　说实在话，池曲由非常不容易，这些流言还给他上了眼药！

    　　池曲由憋着一股夹杂着悲愤的闷气，咬牙切齿地等待着方源再跳出来。

    　　作为罪魁祸首的方源，这些天却活得很平静、安宁并且充实。

    　　他在经营自家仙窍。

    　　仙窍是一个蛊仙的根基，仙窍经营得不好，再强的蛊仙'
