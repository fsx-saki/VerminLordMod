- chapter: 744
  title: 第七百四十九节：吞并异人
  content: '第七百四十九节：吞并异人

    　　至尊仙窍。

    　　小白天，云盖大陆。

    　　“怎么，诸位还未考虑好吗？”方源的六转宙道分身代表本体，来见大战后残存的异人蛊仙们。

    　　这些异人蛊仙中，有雪人蛊仙冰媛，有石人蛊仙石宗、石狮诚，还有墨人蛊仙墨奇异。

    　　因为方源的陷害，只剩下这四位异人蛊仙。

    　　三天前，方源摆脱了凤仙太子的纠缠后，便让这四位蛊仙好好考虑一下，建议他们加入琅琊派，给他们三天时间好好想想。'
