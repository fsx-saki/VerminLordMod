- chapter: 743
  title: 第七百四十八节：评估战果
  content: '第七百四十八节：评估战果

    　　凤仙太子不愿意和太古寒蛟缠，还是以追杀和纠缠方源为主。

    　　凤仙太子极力向寒潭深处潜游。

    　　但随后，寒潭深处又升起第二条太古寒蛟，将凤仙太子挡下。

    　　“这里的寒潭中，竟然藏有两头太古寒蛟？”凤仙太子和方源都吃惊不已。

    　　凤仙太子狂怒，又无奈，他暂时被困住了。

    　　方源大乐，因此钻入寒潭底部，逃脱了凤仙太子的追杀。

    　　他很快就惊讶的发现，这寒潭底部竟有隐秘暗道，'
