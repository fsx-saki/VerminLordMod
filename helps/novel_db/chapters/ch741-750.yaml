  events:
  - '容易经营起来的仙窍，就会发展倒退，空间萎缩，元气稀薄，万物凋零。

    　　仙窍本源就像是一口元泉，蛊仙的仙元就是从仙窍本源中凝聚而出的。

    　　琅琊仙窍原本是八转的洞天，仙窍本源乃是乳白色的一团。

    　　长毛老祖'
  - 了，本体是从盗天魔尊手中得到的这个手段，而盗天魔尊是则从无极魔尊的传承中获取来的。这个杀招的原版乃是律道杀招，名为‘退一步’。后来盗天魔尊大幅度改良，形成宇道杀招，取名为‘海阔天空’。我只不过是将其扭转成
  - '秘的藏兵洞。

    　　对于凡人而言，单是城墙就固若金汤。在北原的王庭之争中，这雄伟的城墙也十数次抵挡住了蛊师大军，从未倒塌。

    　　越过城墙，便是城内的繁华世界。

    　　在这座城市，有超过八十万的人口，各色蛊师。'
  - '坦桑是个人才。”

    　　“我记得五百年前世，这人领袖墨人城，栽培出多位墨人蛊仙，和马鸿运平等合作。趁着五域乱战，不仅拔升自己的修为，而且还将墨人分城扩张了数百座，分布北原！”

    　　“有他执掌墨人城，小西漠中又没'
  - '有宽阔的登城马道。

    　　城墙中还有十分隐秘的藏兵洞。

    　　对于凡人而言，单是城墙就固若金汤。在北原的王庭之争中，这雄伟的城墙也十数次抵挡住了蛊师大军，从未倒塌。

    　　越过城墙，便是城内的繁华世界。

    　　在这座'
