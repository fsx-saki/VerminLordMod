- chapter: 746
  title: 第七百五十一节：八转水炼仙蛊
  content: '第七百五十一节：八转水炼仙蛊

    　　琅琊地灵叹息一声，继续道：“每一位尊者，都是无敌的人物，才情、天赋惊鬼骇神，绝不能用任何的常理来判断他们。这种低估，对于我们自己是愚昧的，对于他们则是侮辱！”

    　　方源点头，他不禁回想起上一世的大战。

    　　每个尊者的出手，几乎都能轻易地改变大局，倾覆所有蛊仙之前一切的努力。

    　　想想龙公是多么的强大，但是遭遇尊者手段，根本一点反抗的力量都没有！

    　　“单论道痕而言'
