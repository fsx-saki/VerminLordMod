- chapter: 750
  title: 第七百五十五节：成竹仙蛊
  content: '第七百五十五节：成竹仙蛊

    　　云竹山脉。

    　　方源高悬于空，仙级奴道杀招四下频发。

    　　中中中！

    　　荒兽云狸在杀招的光晕中，剧烈的挣扎，神情痛苦，不断嘶吼。但很快，这种抵抗就迅速衰减，最终它们一动不动，待在原地，向方源低头。

    　　方源微笑，打开仙窍门户，云狸顺从地钻了进去。

    　　不只是云狸，还有其他海量的生灵，都逃不出方源的魔爪。

    　　云竹山脉，地域广阔，乃是大型资源点，充斥浓郁的云道道痕，孕育'
