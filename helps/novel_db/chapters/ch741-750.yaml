    　　虽然有九转智慧蛊，但方源只能蹭蹭智慧光晕。有八转的慧剑仙蛊，但方源还没有八转仙元呢。有态度蛊，但短时间内，方源怎可能'
  - '圈，看得其他蛊仙俱都心中寒意升腾。

    　　他严厉警告后，迅速飞入自己的云城，一头扎进密室。

    　　天庭，中央大殿。

    　　紫薇仙子盘坐高位，紧闭双目，浑身上下散着强烈的紫光。

    　　这些紫光充斥整个大殿，紫光升腾，浩'
- chapter: 742
  title: 第七百四十七节：凤仙追杀
  content: '第七百四十七节：凤仙追杀

    　　天庭。

    　　中央大殿。

    　　紫霞漫延，澎湃汹涌。忽然，霞光一滞，像是奔流的大河遭遇了大坝的拦截。

    　　紫薇仙子轻咦一声，睁开双眼。

    　　她推算正有进展，徐徐推进，成功在望，但忽然间阻力大涨。

    　　这不同寻常的变化，就像是她之前在推一扇木门。

    　　木门已经摇动，推开大有希望，一旦推开，紫薇仙子就能获知琅琊福地的精确位置。

    　　但现在这扇木门，忽然间变成了一扇沉重的铁门。'
