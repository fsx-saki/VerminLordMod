- chapter: 919
  title: 第九百二十五节：请无极转身
  content: '第九百二十五节：请无极转身

    　　方源如今的本体乃是至尊仙胎蛊所化。

    　　至尊仙胎蛊乃是一次消耗性的蛊虫，可以使任何生灵转变成纯粹的人族之身。因为肉身不是正常的繁衍而得，又具有天外之魔的一半魔性。

    　　至尊肉身和古月方正是完全没有血缘联系的，有血缘联系的就只有方源的宙道六转分身。

    　　但眼下这具分身藏在至尊仙窍之中，和外界分隔开来。难道方正的这个手段已经能够穿透隔膜，感应到仙窍中的事物？

