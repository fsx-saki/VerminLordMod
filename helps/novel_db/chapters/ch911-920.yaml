- chapter: 912
  title: 第九百一十八节：援军赶到！
  content: '第九百一十八节：援军赶到！

    　　“捉住他！”

    　　“别让他跑了！！”

    　　中洲炼蛊大会的最终大比会场中，已经一片混乱。

    　　数位八转蛊仙联袂扑下。

    　　沈伤脸色惨白，破解尊者手段不成，反令他遭受重创。不过看着扑下来的中洲八转，他仍旧冷笑：“就凭你们也想捉我？”

    　　当即，他身形一晃，消失无踪。

    　　中洲八转蛊仙们扑了一个空，同时施展种种侦查杀招，却无法察觉丝毫线索。

