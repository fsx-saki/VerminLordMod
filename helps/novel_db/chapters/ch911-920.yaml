- chapter: 913
  title: 第九百一十九节：方源战龙公
  content: '第九百一十九节：方源战龙公

    　　天庭战场。

    　　“这就是关键之人——方源？”冰塞川口中喃喃，凝神仰望高空的方源。

    　　牛魔、花子皆目瞪口呆：“不是说方源只是七转修为吗？他何时成为了八转？”

    　　“这小子！”毛里球龇牙咧嘴，内心感慨无比。

    　　它上一次见到方源，还是逆流河一役，方源依靠逆流河翻盘。除此之外，实力远逊于毛里球。

    　　没想到这一次见面，他竟然能毁掉元始气墙！

    　　没有了元始气墙，劫运坛宛'
