- chapter: 917
  title: 第九百二十三节：天庭危急
  content: '第九百二十三节：天庭危急

    　　传送大阵的自爆惊天动地，天庭战场亦为之一滞。

    　　随后，北原诸仙爆发出欢呼和呐喊，声浪滔天。

    　　“紫薇！”秦鼎菱大惊失色，身化一道虹光，电射而下，从传送大阵的废墟中救起紫薇仙子。

    　　紫薇仙子昏死，状态极差，需要秦鼎菱立即施救。

    　　秦鼎菱没有犹豫，立即退缩一隅，不打算再辅助龙公作战了。她很有自知之明，知道自己对龙公帮助不大，而紫薇仙子却是天庭智道首脑，位置相当关键'
