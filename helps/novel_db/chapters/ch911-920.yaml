- chapter: 918
  title: 第九百二十四节：血亲心仇
  content: '第九百二十四节：血亲心仇

    　　天庭战场。

    　　“你终于醒了！”秦鼎菱望着缓缓睁开双眼的紫薇仙子，不由地吐出一大口浊气。

    　　“我……”紫薇仙子眼神迷茫，不过旋即就恢复了清明，“现在战况如何？”

    　　“情势不太妙！”秦鼎菱一边沉声回答，一边手掌摊开，演绎金黄光影。

    　　光影之中，正是此刻方源力压龙公、苍玄子的一幕。

    　　仙道杀招——紫金龙形气劲！

    　　使用了这个杀招之后，龙公不管进攻防御，亦或者腾挪'
