- chapter: 914
  title: 第九百二十节：星宿对无极
  content: '第九百二十节：星宿对无极

    　　自开战以来，龙公被打飞出去的情景，在场众仙还是头一次见到。

    　　方源不仅挡下了龙公的重击，甚至还反攻一手，直接把他打飞了！

    　　这一幕远远超出所有人的意料极限。

    　　“他居然这么强了！这是何等惊人的成长速度！！”毛里球长着大嘴，下意识地站起身来，不再趴着。

    　　“巨阳仙尊大人所等待的关键人物……的确，他完全当得起巨阳大人的期待！”冰塞川叹息一声，神情复杂。

    　　不知不'
