- chapter: 915
  title: 第九百二十一节：天庭三英抗方源
  content: '第九百二十一节：天庭三英抗方源

    　　“看来要摧毁天庭仙墓，必须得先破了这个传送大阵！”方源目光如电，紧紧盯住远处大阵。

    　　他脚下的万年斗飞车心随意动，立即如巨型飞剑般飚射而出，冲向大阵。

    　　大阵中央正是紫薇仙子坐镇。

    　　见到方源袭来，她不禁低抽一口冷气，感受到强大的压力！

    　　“方源，有我在岂容你恣意纵横”龙公呼啸一声，挺身而出，拦截住万年斗飞车。

