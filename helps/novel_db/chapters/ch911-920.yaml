  title: 第九百一十七节：天庭雄威
  content: '第九百一十七节：天庭雄威

    　　漫天的白光，宛若大雪飘飞，充斥中洲天地。

    　　最先受益的是帝君城战场。

    　　“强，好强大的力量！”中洲的蛊仙们感觉非常奇妙，全身上下涌动着一股全新的力量。这股力量是如此的浩荡和澎湃，宛若是汹涌的浪潮，不断地冲击心房，又旋即涌向四肢百骸。

    　　一切的疲惫，全都一扫而空。

    　　脑海清明至极，强烈的战意蹭蹭上涨。

    　　不管是六转、七转，乃至八转，尽皆如此。

