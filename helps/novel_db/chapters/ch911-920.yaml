- chapter: 916
  title: 第九百二十二节：棒子变！
  content: '第九百二十二节：棒子变！

    　　东海蛊仙一行八人，已经来到了白天，并且破坏了不少星辰。

    　　他们的战略目标没有南疆、北原、西漠那般巨大，只是想单纯地劫掠一些中洲的资源，消耗中洲的底蕴。

    　　因为担心天庭主力会传送过来阻止他们，他们便将矛头对准了白天中的星辰。

    　　这个策略误打误撞，反而成为了当今整个战局的关键点！

