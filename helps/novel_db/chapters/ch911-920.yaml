  title: 第九百二十六节：安居乐业
  content: '第九百二十六节：安居乐业

    　　帝君城战场。

    　　轰隆隆，烟尘滚滚。

    　　大地开裂，巨大的深沟向前蔓延，吞噬路上的一切事物，直逼帝君城。

    　　帝君城的毁灭就在眼前！

    　　此时此刻，帝君城中纵然还有着数位中洲蛊仙守护，但要在这么短的时间内，救下全城这么多人的性命，这些蛊仙根本是无能为力。

    　　地沟是天然形成的，谁也无法测算出地沟会在哪里出现。惟独方源料到了这一点。

