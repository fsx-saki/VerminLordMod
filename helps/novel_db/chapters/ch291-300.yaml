- chapter: 293
  title: 第二百九十四节：小姨妈，大姨妈
  content: '第二百九十四节：小姨妈，大姨妈

    　　八转气息毫无遮掩，肆意蔓延。

    　　焚天魔女沐浴赤火，环抱双臂，在高空傲立。

    　　焚天魔女高喝道：“黑家四老，你们这套上古战阵青城纵横，残缺得很，也好意思拿出手？百年前，你们因为演练这个战阵，导致彼此之间不能远离一丈开外。你们这一次舍得出来，谁来镇守你们的福地大本营呢？”

    　　青铜巨人昂首凝视着焚天魔女。

    　　一道苍老的声音，从青铜巨人体内传出：“焚天魔女！既然你'
