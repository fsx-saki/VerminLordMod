  title: 第二百九十七节：两方停战
  content: '第二百九十七节：两方停战

    　　“好了，接下来该谈谈你的事情了，方源。”黎山仙子面向方源，笑容中有着冷意。

    　　方源心中一凛。

    　　但焚天魔女却道：“不着急，我还要等一个人。”

    　　“哦？什么人？”黎山仙子诧异。

    　　“是我。”一个突兀的声音，陡然传来。

    　　众人瞳孔猛缩，闪电般转身，面向来人。

    　　来者实力超凡脱俗，若非他亲自开口，他们都还没觉察出有人如此接近了自己。

