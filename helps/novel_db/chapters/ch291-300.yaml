  title: 第二百九十九节：斗诗
  content: '第二百九十九节：斗诗

    　　“好诗，好诗。”天露仙子娇笑起来，“尤其是最后一句，月下花梦佳人处，真美。我想一定是说的我了，嘻嘻。”

    　　她故意插科打诨，一下子让凉亭中的氛围，缓和了下来。

    　　轮飞无奈地苦笑，重新落座：“诸位见笑，一点拙作，难登大雅之堂。”

    　　“轮飞仙友谦虚了，在下亦有一诗。”罗木子道。

    　　“哦？我等洗耳恭听。”乔丝柳微笑着，用期待的目光看向罗木子。

    　　罗木子沉默了一下，继而开'
