- chapter: 292
  title: 第二百九十三节：三战黑城
  content: '第二百九十三节：三战黑城

    　　逃！逃！逃！

    　　一道暗影，像是飞蛇，在蒿草中急速穿行。

    　　片刻后，暗影哗的一声消散，飞势顿消。黑城便跌落下来，直接摔在杂草丛中。

    　　一道清澈的溪流，潺潺流过，近在眼前。

    　　黑城大口喘息着，趴在地上，暂时连翻身的力气都没有。

    　　他此时的状态极差。

    　　浑身上下，伤口无数，有的深可见骨，有的仍旧在汩汩流血。疼痛几乎从浑身袭来，但黑城已经麻木。

