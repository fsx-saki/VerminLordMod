  title: 第二百九十二节：方源谋划
  content: '第二百九十二节：方源谋划

    　　既然得到了生死仙窍重生法门，方源自然想要做到最好。

    　　不管是前世今生，一直以来，修行资质都是方源心中的一抹遗憾。如今能将这个遗憾填补，方源乐意之极。

    　　更关键的是，十绝体的生死仙窍，实在是令人心动，辅助修行的优势太大了。

    　　然而，要取得大力真武仙僵，却是异常困难。

    　　首先十绝体，本身就极为罕见。就算出现，也十分不容易修行。

    　　修行到蛊仙层次的大力真武体，更少'
