  title: 第二百九十七节：斗茶
  content: '第二百九十七节：斗茶

    　　乔丝柳只做了一份柳旋茶，给了方源。

    　　这点做法，顿时让这份柳旋茶的意义变得不同。

    　　方源面色微微一变，流露出一抹受宠若惊的喜色，心中却是一片清明，平静无波。

    　　“可叹。任你多美的红颜，不得永生，终究是枯骨一堆。”

    　　“红颜即白骨，世人却往往留念忘我。”

    　　“不过这个天露仙子，倒真是乔丝柳的好闺蜜，配合得十分出色。”

