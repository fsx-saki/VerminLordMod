- chapter: 291
  title: 第二百九十二节：搜刮广寒峰
  content: '第二百九十二节：搜刮广寒峰

    　　一场切磋，夏家蛊仙失败，直接撤走。

    　　方源便收回变化，重现人形，回到的广寒峰。

    　　广寒峰上的那座凡蛊屋，也被收走了，只剩下一座冰雪山峰，寒气四溢。

    　　方源轻轻的叹了一口气。

    　　他的心境仿若古井无波，这些胜利并不值得他牢记夸耀。所谓的荣誉感，已经早就离他远去。

    　　“说起来此番轻松得胜，也是我占了便宜啊。”

    　　知己知彼，百战不殆。

    　　夏家两位蛊仙不知道方源'
