- chapter: 294
  title: 第二百九十五节：说服老怪
  content: '第二百九十五节：说服老怪

    　　南疆。

    　　细雨纷飞，青山连绵。

    　　方源一身蓝衣，站在山石上，眺望着这大好河山，最终他将目光集中在了其中一座山上。

    　　这座山很特别。

    　　旁边的山峦，都是或高或矮，或险或缓。

    　　而这座山峰，却是圆润有形。

    　　这就是螺母山。

    　　或者说是山螺母。

    　　它本身就是太古荒兽！一头巨大的田螺，贝壳高耸宛若高塔，一层层螺旋上去，青苔满布。

    　　当它静置不动的时候，它的软'
