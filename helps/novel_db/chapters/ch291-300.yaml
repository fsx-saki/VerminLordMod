  title: 第二百九十九节：涅盘火
  content: '第二百九十九节：涅盘火

    　　黑楼兰有焚天魔女罩着，方源已经无法打她的主意。

    　　特等福地不成，上等福地也是很好的。

    　　为此，方源需要大量的普通力道仙僵的尸体。而在北原，还能有谁能比焚天魔女，更有能力搞得到仙僵尸躯呢？

