- chapter: 292
  title: 第二百九十三节：龙鳞海域
  content: '第二百九十三节：龙鳞海域

    　　方源接过一看，清单上林林种种有不少蛊材，当然绝大多数都是凡道蛊材。仙材虽有，但很少。

    　　方源心知肚明，若是他交还出寒玉和玉髓等等，这份奖励就绝不只这么多。

    　　武庸和武罚其实在演一场戏，倒不是算计方源，而是想给方源一个台阶下来。

    　　方源挖掘广寒峰，虽然没有超过底线，但武家还是宁愿有一个原来的广寒峰。

    　　但方源却失踪没有交出来，他沉默了一会儿，这才道：“不知可否将'
