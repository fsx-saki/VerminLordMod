- chapter: 293
  title: 第二百九十四节：收购神鹿果
  content: '第二百九十四节：收购神鹿果

    　　南疆，武家。

    　　修行的密室中，方源悬浮在半空中，满脸肃穆之色。

    　　他的长发飘飞，浑身上下蛊虫的各种气息不断升腾，相互纠缠混杂在一起。

    　　“关键一步……”方源心中呢喃，目光变得犀利起来。

    　　他小心翼翼地驱使出一只凡蛊。

    　　这是金道凡蛊，只有一转级数而已。

    　　单独催动此蛊，自然毫无风险。但是此刻情况却是不同。

    　　砰。

    　　一声闷响，从方源的身上传出。'
