- chapter: 295
  title: 第二百九十六节：恐惧最可怕
  content: '第二百九十六节：恐惧最可怕

    　　中洲，灵缘斋。

    　　山峰林立，云雾缥缈。竹林深处，一道瀑布宛若白丝绸一般，悬挂而下。

    　　凤金煌静静地坐在一株松树的枝桠上，默默地看着眼前的瀑布，泪水无声落下。

    　　这段时间，中洲派遣去北原调查的蛊仙们，已经回来。

    　　但是凤九歌，却没了音讯。

    　　对于凤金煌而言，自己的亲生父亲音讯全无，陷落在外域，自然是凶多吉少。

    　　这些天来，凤金煌茶不思饭不想，修行全无状态，'
