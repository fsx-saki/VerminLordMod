    　　望着螺母山隆隆远去，而那驱山老怪就站在山巅，一副主人翁的态势，方源收回了目光，开始往回走。

    　　山螺母一事，落下了帷幕。

    　　武家以方源为代表，和驱山老怪达成了盟约。驱山老怪获得大部分的螺母山收益，但名义上，这头太古荒兽仍旧属于武家。

    　　武庸下达给方源的任务，保住螺母山。

    　　方源已经保住了，只是保住了一部分，但也算是完成了这一次的任务。

