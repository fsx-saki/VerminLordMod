- chapter: 294
  title: 第二百九十四节：万古愁
  content: '第二百九十四节：万古愁

    　　九转的存在，不管是蛊仙还是仙蛊，都遭受着天妒，难以保存。

    　　所以，人族历史上仅仅只有十一位尊者，并且每一个都有寿命限制。

    　　九转仙蛊现存于世的，也非常少。

    　　巨阳仙尊最后又看了自己的气运一眼。

    　　他不禁微微皱眉。

    　　情况并不好。

    　　比之前更恶化了。

    　　但是根据情报，巨阳仙尊还揣摩不出，究竟这坏运来自于何方。

    　　他心中最怀疑的，当然是天庭。

