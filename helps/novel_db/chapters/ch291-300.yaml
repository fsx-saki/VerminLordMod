  title: 第二百九十八节：月亮节的故事
  content: '第二百九十八节：月亮节的故事

    　　“他奶奶的，有没有搞错！我的九回香，居然连一杯海水都比不过？”罗木子在心中咆哮，表面上则维持着风度。

    　　“可恶！这个武遗海偷奸耍滑，我们是献茶，他是献海水？这脸皮真是够厚啊！偏偏丝柳仙子居然还这么认可他，太气人了，太气人了！”轮飞石桌下的双拳，捏得都要青筋暴起。

    　　天露仙子忙打圆场：“月已高空，茶水既饮，却无诗词，总是不美。”

    　　方源故作不解：“难道真要吟诗'
