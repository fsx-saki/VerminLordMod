  title: 第二百九十五节：怕死
  content: '第二百九十五节：怕死

    　　焚天魔女居然是黑楼兰的大姨妈，这让方源始料未及。

    　　方源的战斗力，最多可以媲美七转。

    　　对付黑楼兰，方源是有优势的，但对方是大力真武体，还需要防备她的反扑。

    　　对付黎山仙子，最多只能算是均势。黎山仙子的仙道战场杀招，一旦发挥出来，方源就要落入下方，所以万万不能中了她这一招。

    　　而应对焚天魔女，劣势之大叫人绝望。方源纵然有许多仙蛊，但六转垫底的修为，和八转修为之间，'
