    　　轰轰轰！

    　　气道杀招轮番爆发，白相躲闪了一小半，另外一小半被仙阵拦下，剩下的则把白相炸得支零破碎。

    　　但旋即，白相又复原如初。

    　　这一幕让剩下的戚家'
