    　　方源的意志，宛若蛟龙腾飞，盘旋于空，随后狠狠地俯冲下去。

    　　轰隆！

    　　方源意志宛若流星陨落，重重地撞在底下的意志海洋当中，一时间大量的意志迸溅毁灭。

    　　然而，这片意志的海洋实在是辽阔深邃，方源这一击所摧毁的，不过是总体的九牛一毛而已。

    　　“我虽然是抢夺成功，霸占了杀招中枢，但这里面却充斥着五相及其后代的意志。只有当我将这些意志剿除干净，才能'
