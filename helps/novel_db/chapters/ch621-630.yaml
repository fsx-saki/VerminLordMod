- chapter: 630
  title: 第六百三十四节：功德方尖碑
  content: '第六百三十四节：功德方尖碑

    　　轰！

    　　一记磨盘大的雷球，狠狠地在庙明神的后背轰炸开来。

    　　噗。

    　　庙明神浑身剧震，大吐一口鲜血，苍白的脸色更加病态。他连忙强振精神，催动仙道杀招，下一刻他消失在原地，直接出现在了前方数千步之外。

    　　但即便是在这里，也是雷电交加，猛兽飞舞，情势已经到了最坏的地步。

    　　“没想到我庙明神居然要死在这里了！”庙明神满脸绝望之色。

    　　乐土真传不是温和的吗？怎么会'
