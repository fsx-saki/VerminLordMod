- chapter: 625
  title: 第六百二十九节：方正升仙
  content: '第六百二十九节：方正升仙

    　　中洲。

    　　天空阴沉沉一片，无风。

    　　古月方正站在一处山巅，仰头望着天，想到即将要渡升仙之劫，心中升腾起一丝紧张的情绪。

    　　察觉到这种情绪，方正便失笑一声，心中暗道：“我紧张什么？真正该紧张的人，应当是仙鹤门的人，或者说，是更幕后的天庭吧。”

    　　“表面上，此次我渡劫只是有一位六转蛊仙护持着，但暗地里应当有许多关注的眼睛。有这些人在，我还担心什么呢？”

    　　尽管方'
