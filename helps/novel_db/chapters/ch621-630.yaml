- chapter: 628
  title: 第六百三十二节：悔
  content: '第六百三十二节：悔

    　　“乐土真传？”五相公共洞天之中，方源接到了庙明神的来信，邀请他参加此次苍蓝龙鲸的探索。

    　　方源眼中闪过一抹思索的光。

    　　庙明神居然和任修平发生了冲突，提前开始探索苍蓝龙鲸，这有点出乎方源的意料。

    　　在他的五百年前世记忆当中，这已经提前了很多。

    　　“或许是我重生归来，改变的种种影响不断扩散，令庙明神和任修平的冲突提前了。”

    　　“也或许我的五百年前世记忆，本身就有问题'
