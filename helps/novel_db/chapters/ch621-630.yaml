- chapter: 626
  title: 第六百三十节：联手压制
  content: '第六百三十节：联手压制

    　　方正福地。

    　　宇道、宙道的资源都超出正常水准，这是上等福地。

    　　福地中的地貌，以平原为主，但每隔一段距离，就会有数座山峦突兀地矗立着。

    　　方正此刻的注意力都一处山谷中。

    　　山谷怪石嶙峋，里面一片血红之色。深入进去就会发现，山谷中已经种植了大片的血花树。

    　　这种树足有数万棵，和寻常树木不同，它是先结果后开花。结出的果实如婴孩般拳头大小，饱满圆润。开花只是一瞬间的'
