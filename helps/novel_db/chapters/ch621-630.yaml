- chapter: 623
  title: 第六百二十七节：大家之气
  content: '第六百二十七节：大家之气

    　　气海洞天。

    　　“咄！”方源本体轻喝一声，伸出右手，五指对着眼前的无量气海轻轻一抓。

    　　顿时，无量气海当中飞射出一股橘黄色的气流。

    　　这股气流十分奇特，熠熠生辉，划破长空时拖出一道长长的尾巴，气流顶端天然萦绕着祥云的形态。

    　　这是运气。

    　　仙材中的一种。

    　　无量气海杀招当中，包括各种各样的气息，运气算是其中比较少有。因为就算是在五域两天当中，如此规模的运气也'
