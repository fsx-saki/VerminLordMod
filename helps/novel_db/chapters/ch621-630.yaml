- chapter: 622
  title: 第六百二十六节：洞天易主
  content: '第六百二十六节：洞天易主

    　　“白凝冰，你莫要欺人太甚！”戚家蛊仙首领戚发怒吼。

    　　白凝冰心中却在冷笑。

    　　白相划破长空，在戚发眼前一闪即逝，留下的则是戚进的尸体，冻在冰块之中。戚进临死前的惊骇神情，都保留下来，在厚实的冰块中栩栩如生。

    　　轰轰轰！

    　　气道杀招轮番爆发，白相躲闪了一小半，另外一小半被仙阵拦下，剩下的则把白相炸得支零破碎。

    　　但旋即，白相又复原如初。

    　　这一幕让剩下的戚家'
