  events:
  - '慕他啊。”

    　　等到数个时辰后，方正渡劫完毕，樊西流的羡慕之情又暴涨了一倍。

    　　因为方正成功地使得本命蛊升炼，成为第二只血道仙蛊。

    　　冷血仙蛊！

    　　数日之后，仙鹤门向蛊仙界公开宣布，方正升仙成功，他曾'
  - '在，方正不会愤怒了。

    　　在过去的十多年里，方正经历了琅琊福地三大陆的延绵战火。为了栽培出战力出色的毛民蛊仙，黑毛地灵不惜代价，令三大陆上的毛民相互内斗，方正也被卷入其中。

    　　在阴谋诡计迭起，血腥拼杀不'
  - '的一场战斗中，他在绝境中迫不得已动用了禁忌的手段，虽然最终险死还生，但空窍受到严重的损伤，充斥裂纹，甲等资质也跌落到了乙等。

    　　方正被凤九歌救走，回到中洲之后，他空窍中的伤势被治好，资质再次回复甲等。只是内'
  - '委派过来，帮助方正渡劫的人选。

    　　方正点点头，沉下心来，立即内视。

    　　他的空窍很快展现出来，里面真元充沛，表明他甲等的资质，而内壁上却是有着许多的裂纹，让人看了有一种心惊肉跳的感觉。要知道空窍对于蛊师'
  - '。若是一个人连成为工具的价值都没有，那他就危险了，往往会被舍弃，沦为弃子。

    　　当然，即便是方正五转蛊师的实力，也有被抛弃、背叛的经历。毕竟他是一个纯正的人族，却生活在满是毛民的琅琊小世界中，遭受排挤和种'
  - '的最脆弱的时刻。

    　　片刻之后，他回过神来，开始往仙窍中投放核心蛊、关键蛊等等。他首先投放的，当然是血仇仙蛊，其次是大量的血道凡蛊。

    　　仙窍福地中，三气逐渐得到了梳理，阴阳调和，天地逐渐稳定下来。'
  - '。

