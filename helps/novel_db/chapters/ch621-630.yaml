  title: 第六百二十八节：七转春秋蝉
  content: '第六百二十八节：七转春秋蝉

    　　至尊仙窍。

    　　炼蛊进行到了最关键的时刻。

    　　巨大的蝉蛹静静地悬浮在半空中，距离地面只有半丈左右的高度。

    　　蝉蛹表面并不光滑，毛里毛糙，有一种金属的质地。

    　　方源深呼吸一口气，将酝酿好的杀招催动出来。

    　　霎时间，蝉蛹周围阴风四起，苍穹中阴云翻腾汇聚，很快密布成一大团，周围光线都黯淡下去。

    　　呜呜呜……

    　　一阵阵渗人的鬼哭狼嚎中，地面腐朽成灰白之色，从地下'
