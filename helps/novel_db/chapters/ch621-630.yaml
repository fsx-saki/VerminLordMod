- chapter: 627
  title: 第六百三十一节：庙任之争
  content: '第六百三十一节：庙任之争

    　　东海。

    　　哗哗哗！

    　　水浪湍急，击打在小岛上的礁石，炸裂成无数的白沫。

    　　恶风呼啸，天气阴沉。

    　　这座无人的小岛，在偌大的东海中极不起眼，但此刻却潜藏着四位蛊仙。

    　　“任修平，你欺人太甚！”庙明神低吼一声，双眼通红，身上带着伤势，流露出浓重的愤怒和仇恨。

    　　他乃是东海著名的散修，七转修为，专修宇道，拥有着可以拓宽仙窍空间的手段。他以此为生计，为许多东海蛊仙'
