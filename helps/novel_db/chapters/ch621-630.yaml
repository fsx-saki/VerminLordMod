- chapter: 629
  title: 第六百三十三节：楚瀛身亡
  content: '第六百三十三节：楚瀛身亡

    　　庙明神面色不动，实则目光正细细观察。

    　　曾落子这一手就在他的安排之中，好让他收集到更有价值的情报。

    　　曾落子的信道造诣，即便是庙明神也十分敬佩。此刻曾落子露出一手，庙明神察言观色，立即有了许多发现。

    　　“此行共有八人。除去我、鬼七爷、蜂将、花蝶女仙四人之外，还有曾落子、土头驮、童画以及楚瀛四人了。”

    　　除了曾落子、庙明神之外，还有童画、土头驮二人不动声色。'
