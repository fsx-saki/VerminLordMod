  title: 第三百二十二节：再重生鬼脸红莲！
  content: '第三百二十二节：再重生鬼脸红莲！

    　　传说中，这个世界上有这么一条河流。

    　　它贯穿始和终，深藏因和果，流淌全世界的每一个角落，无处不在。

    　　有了它的浇灌，世界才得以正常的运转，一切方能变化。

    　　这条河，就叫做光阴长河。

    　　这里是天地秘境，宙道的温床，无数的宙道蛊虫，在这里繁衍生息。

    　　亿万万顷的河水，恣意流淌，从不间断。

    　　河水澎湃浩荡，潮起潮落，波涛翻滚。

    　　每一滴的光阴之水，都是'
