  - '蛊师要作死，故意用错炼蛊手法，那铁定失败。

    　　成功道痕绝非万能之物。

    　　上一世，为什么方源要特意选择星象福地中炼制仙蛊？就是害怕被外力干扰，导致炼蛊失败。

    　　炼蛊一失败，仙材损耗、受伤还是小事，'
  - '义天山附近方圆万里，都被方源所熟悉。

    　　没办法，上一世义天山旷世赌约，方源参加了。随着时间，禁仙绝境的范围在扩大，方源也随着南疆蛊仙们，不断往外迁移。因此对义天山附近的风景，相当熟悉。

    　　义天山！'
