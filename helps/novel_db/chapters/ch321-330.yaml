  title: 第三百二十三节：未动身已掌武家权
  content: '第三百二十三节：未动身已掌武家权

    　　接管武家？

    　　乔丝柳一番话，顿时说得方源怦然心动。

    　　他怎么能不心动？

    　　要知道武家可是超级家族，并且不是一般的超级家族，一直都很强势，在南疆的历史中常年稳居第一的宝座。

    　　武家家大业大，各种资源点林立棋布，底蕴雄浑，库藏丰富。如果能执掌这样的超级势力，成为第一人，那么方源今后修行的资源，基本上是不用发愁了！

    　　要说现在，方源的资产也不小。

