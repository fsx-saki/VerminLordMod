  content: '第三百二十五节：局势恶方源欲动身

    　　朝阳冉冉升起，清晨时分，还带着夜的湿气。

    　　两位侯家蛊仙，站在云端，眺望着脚下方的一片峡谷。

    　　金霄峡！

    　　这座峡谷中，充斥特别的雾气。夜晚，雾气朦胧氤氲一片，毫无特征。而当朝阳的光，映射在峡谷当中的时候，雾气则绽射出璀璨的金芒。

    　　这些琐碎的金芒，并不刺眼，整片浓雾仿佛洒满了金峰，偌大的峡谷金碧辉煌，蔚为壮观。

    　　“这就是金霄峡，盛产金道、云道资源'
