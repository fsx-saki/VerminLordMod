  content: '第三百二十六节：乔家有难兔娘情深

    　　当然，这些天，方源并非碌碌无为。

    　　手头上最大的一批长恨蛛，刚刚售出，方源的红枣仙元储备彻底摆脱了困窘境地。

    　　关于刚背杀招，方源已经改良完毕，只待试验。

