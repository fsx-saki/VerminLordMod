    　　它有两个大缺陷，一个是喂养，第二个是仙元。

    　　仙蛊屋是由许多仙蛊，还有海量的凡蛊组成的，喂养这些蛊虫，必然十分麻烦，而且是巨大负担。'
  - '之后，最令方源心动的是什么？

