    　　这只仙蛊本来就是她的，但因为她渡劫失败，沉迷在梦境当中，后被方源所救。

    　　结果此蛊，就成了方源救下黑楼兰的报酬，交到了方源的手中。

    　　这只我力仙蛊，对黑楼兰非常重要。

