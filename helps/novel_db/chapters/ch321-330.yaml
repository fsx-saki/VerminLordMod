  content: '第三百二十九节：奴隶蛊仙

    　　西漠，绿天碎片世界。

    　　天空带着绿意，清风在这里吹拂，四季不息。

    　　一座洁白恢弘的城池，稳稳地悬浮在高空之中，折射着淡淡的金色光辉。

    　　时至今日，人族成为天地主宰。曾经称霸一时的各大异人种族，已经龟缩在世界的各个角落中，艰难生存。

    　　而这片绿天碎片世界，就是异人种族之一的羽民的世外桃源。

    　　仙蛊屋羽圣城，便是羽民遗族们最坚固的大本营。

    　　此刻，羽圣城中彩旗'
