  title: 第三百二十四节：心思沉玉清滴风楼
  content: '第三百二十四节：心思沉玉清滴风楼

    　　“怎么了？”乔丝柳不解。

    　　方源没有回答，他四处踱步，动用智道手段，陷入深深的思考当中。

    　　眼下局面非常复杂，幕后黑手不出，武庸生死未明，一切都笼罩在层层迷雾当中。但方源却被架在前方，不得不做出反应。

    　　身不由己。

    　　方源深深的感到，自己身不由己。

    　　武家蛊仙，身边的乔家蛊仙，还有南疆大势，幕后黑手，都让他难以继续待在超级蛊阵当中。

