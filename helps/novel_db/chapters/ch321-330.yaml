  title: 第三百二十七节：柴家有人烟
  content: '第三百二十七节：柴家有人烟

    　　开始了。

    　　第一步，方源化作卜卦龟。

    　　第二步，他开始催动大量凡蛊，随后是金刚念仙蛊，然后继续添加凡蛊。

    　　第三步，也是最关键的一步，催动防备仙蛊。

    　　噗！

    　　方源变化的卜卦龟，陡然喷吐出大量的鲜血。仙窍中，大量的凡蛊毁于一旦，好在防备仙蛊结实，没有丝毫受损。

    　　方源头昏眼花，仙道杀招尝试失败，让他内脏受创，内伤相当严重。

    　　幸好他变化成了卜卦龟，上古'
