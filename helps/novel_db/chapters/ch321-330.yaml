  title: 第三百二十七节：新的盟约
  content: '第三百二十七节：新的盟约

    　　和黑楼兰的谈判，前前后后持续了三个时辰。

    　　结束之后，饶是方源仙僵之躯，都感到疲惫不堪，可怜他的仙僵脑子本就不灵光，耗费了不知多少的念头。

    　　黑楼兰也好不到哪里去，她感觉：这场谈判比生死激战还要累人，从骨子里散发出一股虚弱之感，口干舌燥，脑袋发晕。

    　　谈妥之后，方源将太白云生也拉进来，和黑楼兰、黎山仙子签订了全新的盟约。

