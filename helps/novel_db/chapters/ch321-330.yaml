- chapter: 328
  title: 第三百二十九节：方源要杀白兔
  content: '第三百二十九节：方源要杀白兔

    　　方源接着处理闭关以来积压的事务。

    　　“白兔姑娘要见我一面？有什么事情？”方源动用信道手段，向武安询问。

    　　很快，方源就搞明白白兔姑娘的来意。

    　　“不见，让她回去。”方源直接无情拒绝。

    　　一天之后，武家的仙蛊屋就会到来。

