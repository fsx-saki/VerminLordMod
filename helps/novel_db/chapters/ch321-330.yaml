    　　这些仙材都是方源的，他急得差点要抓脸挠腮。

    　　方源笑吟吟地看着琅琊地灵，不管琅琊地灵对他态度有多差，只要这些仙材在手，他就等若扣住了琅琊地灵的脉门。

    　　忽然，琅琊地灵眼珠子一转，反应过来。

    　　他不再急切，而是冷笑道：“哼哼，你这个臭小子，我还不知道你？无利不起早的奸诈家伙！说吧，你这次又想从老夫这里，讨什么便宜'
