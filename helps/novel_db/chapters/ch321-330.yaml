  title: 第三百二十三节：想想都有点小激动
  content: '第三百二十三节：想想都有点小激动

    　　虽然光阴长河中的异变，只发生短短的时间，但却深深地印刻在方源的脑海中，留下深刻的印象。

    　　事关生死胜败，印象不深刻也不行啊！

    　　现在回想起来，方源的心中充满了疑惑。

    　　“鬼脸红莲，代表的是什么？为什么我之前几次使用春秋蝉，都没有碰到过这种情况？亦或者只有使用春秋蝉失败，才会引发？还是……”

    　　缓缓摇头，方源暂时不再思考这个神秘的难题。

