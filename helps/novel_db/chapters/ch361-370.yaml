  title: 第三百六十四节：各自的窘困
  content: '第三百六十四节：各自的窘困

    　　轰隆隆……

    　　气浪卷席，好似掀起万千波涛。光芒万丈，景象恢弘壮美。

    　　在这个光辉当中，一个身影渐渐走出来。

    　　他身材极高，有九尺，身躯雄健，一头黑色长发，又浓又密，宛若披风，披在身后，随着前进的脚步微微起伏。

    　　最为引人注目的，是这位蛊仙额前，长有一对珊瑚龙角，宛若紫金铸就，熠熠生辉。

    　　紫薇仙子早已经等候多时，此时迎接上去，带着欣慰和开怀，行礼道：“龙公'
