  title: 第三百六十五节：灰忆
  content: '第三百六十五节：灰忆

    　　这浩劫地陷，根本就是蛮不讲理！

    　　不仅将渡劫蛊仙，困在地上，而且还影响他们的念头。

    　　没有念头调动蛊虫，蛊仙如何施展手段？

    　　除非是有智道的手段，进行抗衡。

    　　但还有个前提，这种智道手段必须之前就已经布置妥当。否则的话，一旦优先中了地陷，那么蛊仙就算是有智道的后手，也无法施展了。

    　　先下手为强，后下手遭殃。

    　　失去了先手，基本上就完蛋了。

    　　由此可见，浩劫之'
