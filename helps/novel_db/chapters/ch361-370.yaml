  title: 第三百六十六节：食道传承
  content: '第三百六十六节：食道传承

    　　太白云生夹裹着方源，向外一路疾飞。

    　　黑楼兰最后回望一眼漫天的灰雾，幽魂魔尊悲惨的童年，让经历相似的黑楼兰心中充满了感慨。

    　　不知是什么原因，浩劫地陷没有为难他们。

    　　太白云生、黑楼兰死死把握住这个机会，惊喜交加，一路狂奔撤退。

    　　十绝大阵也进入关键时期，没法禁锢周围，太白云生、黑楼兰逃出的过程，十分顺利。

    　　很快，他们就将义天山战场抛之脑后。

    　　半刻钟后'
