  title: 第三百六十六节：武庸杀至！
  content: '第三百六十六节：武庸杀至！

    　　狂风扑面而来。

    　　脚底下方，莽莽群山，郁郁葱葱，宛若无边的象群，不断地朝后方奔腾而去。

    　　上极天鹰的鹰背上，方源等一干蛊仙，却没有丝毫心情来观赏这壮美的河山。

    　　他们此时的情势非常危急。

    　　整个南疆正道蛊仙，都在试图围剿他们。或许还有其他的散修、魔道蛊仙，正潜伏着，看看有没有便宜可捡。

    　　南疆正道已经是无法匹敌，任何一位八转蛊仙，或者仙蛊屋，都能给方源等人'
