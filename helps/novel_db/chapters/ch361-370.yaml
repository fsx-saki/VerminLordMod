  content: '第三百六十七节：天鹰逃窜

    　　“锁风？！”

    　　“我们什么时候中了这个杀招？”

    　　“根本毫无察觉！！”

    　　影宗群仙尽皆惊愕诧异。

    　　这杀招怎么中的，他们从始至终都没有发现。若非是动用上古战阵四通八达效果欠佳，事实摆在了眼前，否则光听武庸的话，恐怕众人都会以为武庸在虚张声势呢！

    　　永远不要低估一位八转蛊仙的手段。

    　　武庸虽然资辈并不高，甚至在南疆蛊仙界中，论资排辈还低于其他八转蛊仙一头。'
