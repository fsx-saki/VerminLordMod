  title: 第三百六十四节：屠亲戮天
  content: '第三百六十四节：屠亲戮天

    　　十万年前。

    　　南疆，悬磁山。

    　　夜幕笼罩，一片漆黑。风雷滚荡，时不时电光照亮一片战场。

    　　悬磁山的山腰之处，十多位蛊师横尸在地。

    　　大雨瓢泼，却冲刷不尽这里的浓重血腥气味。

    　　一场激战已要徐徐落幕，战场上只剩下两人，胜负已经十分明显。

    　　“哈哈哈！”一个青年男子仰天大笑，双眼通红，充满嗜血之色。他一步步向另外一位蛊师逼去。

