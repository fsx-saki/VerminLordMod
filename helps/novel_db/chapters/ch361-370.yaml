  title: 第三百六十九节：方凤战武庸
  content: '第三百六十九节：方凤战武庸

    　　“哈哈哈。”仙道战场杀招当中，武庸蓦地发出大笑声。

    　　笑声中，充满了怒意。

    　　很显然，他对凤九歌帮助方源，非常的生气。

    　　“好。”

