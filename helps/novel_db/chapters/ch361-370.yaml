    　　剧烈的爆炸声中，火焰四下卷席。

    　　炙热的气浪，形成厚实的气墙，猛地向四周排开一切。

    　　一时间，蛊阵中黄沙漫天，烟尘四起。

    　　尘土渐渐落下，显露出一个孤单的身影来。

    　　正是黑楼兰。

    　　此刻，她呼呼地大口喘着粗气，浑身披着一层火焰衣裳。原本绚丽多姿，火焰缭绕，不过此时，这层衣裳就只剩下了点点火苗。

