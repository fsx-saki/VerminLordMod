  title: 第三百六十八节：方源、巨阳战星宿
  content: '第三百六十八节：方源、巨阳战星宿

    　　狂风扑面，星宿仙尊的长发在脑后飞扬。

    　　她眉头微皱，深邃的眼眸中，此刻倒映着天庭的景象。

    　　在她的记忆中，天庭还从未有过这样的狼狈。

    　　星雾越发浓郁，被困在里面的幽魂魔尊不断咆哮，越发愤怒和疯狂，但是仍旧无法脱离星雾的笼罩。

    　　星宿仙尊就是欺负幽魂魔尊毫无神智，若是稍有神智，绝不会这样做。

    　　她现在身处于天庭当中，受到海量智道道痕的栽培，整体完全凌驾'
