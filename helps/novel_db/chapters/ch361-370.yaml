  content: '第三百六十八节：重重岁月

    　　又是一幕。

    　　生死门中。

    　　沉迷死境。

    　　幽魂魔尊已无肉身，展现在众人面前的是三头千臂的魂魄。

    　　他照着湖水，望着自己的容貌，自语道：“很好。我从食道中创出的吞魂之术，不仅让我恢复了巅峰状态，而且更吞食其他蛊仙之魂，得到他们的人生记忆和修行经验！呵呵呵，这也算因祸得福么……”

