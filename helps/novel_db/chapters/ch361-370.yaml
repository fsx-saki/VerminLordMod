  title: 第三百六十八节：这便是凤九歌！
  content: '第三百六十八节：这便是凤九歌！

    　　一位中年蛊仙，出现在方源和武庸的面前。

    　　他一身红白相间的长袍，身姿挺拔，似枪如剑。剑眉入鬓，眼中蕴藏神芒，他嘴角微微泛出温柔的笑意，风流倜傥却又不失昂扬霸气。

    　　不过此刻，他的面色上却流露出一丝惆怅之色。

    　　正是名满天下的中洲蛊仙，灵缘斋的台柱子，音道七转，能力战八转的凤九歌！

    　　他怎么会出现在这里？

    　　武庸、方源免不了惊讶。

