  title: 第三百六十三节：方源炸天庭的阴谋
  content: '第三百六十三节：方源炸天庭的阴谋

    　　这一场大爆炸来得太突然，发生的又太猛烈！

    　　一时间风云激荡，天地变色。

    　　天庭破碎！

    　　大量的洞天碎片四处飞溅，像是火山喷发一般。仙窍门户剩下一半残余，到处都是巨大的漏洞和豁口，坦露在幽天当中。

    　　烟尘滚滚，暂时还看不清天庭当中的景象。

    　　不知道多少蛊仙阵亡。

    　　可以确定的是，那巨大若山的气功果已经消散。

    　　“成功了……”中洲，方源仰望天庭方向，'
