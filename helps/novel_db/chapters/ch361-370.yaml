  title: 第三百六十二节：绣楼难挡魔威
  content: '第三百六十二节：绣楼难挡魔威

    　　探出生死福地门户的这只鬼手，体格十分庞大，好似小山一样。

    　　它的小臂都未完全探出来，仍旧留有大半，在门户里面。

    　　生死福地的门户，似乎已经开到最大，但鬼手也只能漏出小半，似乎被卡着了。

    　　九转的气息，磅礴浩瀚，不断向四周席卷。

    　　方源等人急忙后退。

    　　在九转的气息压制之下，他们都感到呼吸困难，有一种“待久了久要窒息而亡”的惊惶错觉！

