  title: 第三百六十一节：元始重生
  content: '第三百六十一节：元始重生

    　　得到星宿仙尊的这番点拨，当场就有许多蛊仙反应过来。

    　　“现在看来，巨阳仙尊本质上还是正道心思。”

    　　“他的确和方源有很大的区别，不管是行事，还是理念。方源残暴，可以随意牺牲下属，将一切都当做他的工具。巨阳仙尊却是不会，他很护犊子，有着浓厚的亲情。”

    　　“哼，要我说，他是比方源看得更远。他知道如果像方源这样做，就和天庭不共戴天，再难缓和。他已经算计到将来，向元始仙'
