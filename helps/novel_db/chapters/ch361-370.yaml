- chapter: 362
  title: 第三百六十三节：幽魂？幽魂！
  content: '第三百六十三节：幽魂？幽魂！

    　　在场的众仙，简直不敢相信自己的双眼！

    　　琴心劫、星流劫，两场浩劫被魔尊幽魂破解，仿佛易如反掌，喝水一样简单。

    　　“这，这就是九转魔尊的威能吗？”方源心头大震。

    　　魔尊幽魂已死，呈现在众仙面前的，只是他的魂魄。

    　　这个巨大的魂魄，已经脱离人的正常形态。

    　　他高达千丈有余，顶天立地！十绝仙僵无生大阵所化的阴云，只在魔尊幽魂的腰腹之处。

    　　方源等人位于半空，'
