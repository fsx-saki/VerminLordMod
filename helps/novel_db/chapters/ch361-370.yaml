  title: 第三百六十三节：暗里交锋
  content: '第三百六十三节：暗里交锋

    　　武庸也考虑到天庭的消息真假的这一层。

    　　然而，紫薇仙子提供的证据很多，还有当时方源虽然变化了容颜，和黑白等仙，乘着上极天鹰离开战场，也被许多南疆蛊仙目睹。

    　　武遗海的失踪太过突然和诡异，如果武遗海就是方源，那么一切的疑点就都能解释通顺。

    　　“将武遗海的命牌蛊、魂灯蛊，都通过宝黄天，给我送过来。除此之外，还有一些仙蛊，武罚你去内库给我提出来。”武庸站在窗边，俯瞰着'
