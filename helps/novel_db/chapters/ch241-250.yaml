- chapter: 244
  title: 第二百四十五节：宋家有女宋亦诗
  content: '第二百四十五节：宋家有女宋亦诗

    　　方源迅速思考了一番后，决定去帮助太白云生。

    　　太白云生要收取的云线鲨，体型小巧玲珑，不仅可以在海中畅游，而且还可以飞到空中去长期生存，很适合太白福地。

    　　但这种云线鲨，很善于隐藏自身，若非如此，也不能在三大鲨鱼群的缝隙之间，生存在海底宫殿附近了。

    　　太白云生的钓鲨，一开始就遇到了困难。

    　　他的目标直指云线鲨，但神戈鲨、碎齿金鲨、银鳞大宝鲨并非是作壁上观的'
