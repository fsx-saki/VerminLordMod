    　　“哼！老东西，之前受你指派，不过是有所图而已。现在力道仙蛊已经到手，我为什么还要听你命令？”黑楼兰冷笑，娇丽的面容一片傲然、冰冷。

    　　“你这个白眼狼，不孝子孙，居然背叛你的老祖宗！”黄金念头大恨长啸。

    　　“安静一点，别嚷嚷。果然念头过少就无法思考，因此显得浅薄了么？”黑楼兰双臂怀抱于胸，眼神斜蔑，“你'
