    　　乐土点头：“方源仙友所言在理！”

    　　说着，他就动手。

    　　只是他却是没有管方源的安危，而是对一块事实浮冰下手。

    　　事实浮冰被乐土迅速收入仙窍之中。

    　　与此同时，巨阳仙尊也再次对最大的那块事实浮冰出手！

    　　只要得到这一块，几乎就是整个疯魔窟之争的胜利者了。双尊奈何不'
