    　　她的伤势很严重，眼前一阵阵发黑。

    　　不过，万幸的是，赵普已经死亡，因此赵怜云和余艺冶子身上的血尽流仙道杀招，也被解开来了。

    　　若是解开不成，赵怜云、余艺冶子无疑要和赵普一起丧命。

    　　呼、呼……

    　　另一旁，余艺冶子直喘气，也靠着墙壁，站起身来。

    　　待他看到赵怜云时，这位少年蛊仙顿时一愣，变'
