  title: 第二百四十五节：梦魇魔驹
  content: '第二百四十五节：梦魇魔驹

    　　方源杀死一波夜叉章鱼，便有一波攀壁魔猿上来。这些猿猴，同样是地沟中的猛兽，和夜叉章鱼相比毫不逊色。

    　　屠杀了这一波的攀壁魔猿，方源又遭受一大群赤炎蛇的围攻。

    　　“这些兽群，恐怕都是北原僵盟分部掌控。譬如夜叉章鱼，恐怕是七转仙僵夜叉龙帅之物。”

    　　“其余各域的僵盟分部，都遭受打击，惟独北原这边，背靠地沟，得以保存。”

    　　“不只是这些荒兽，结合之前黑楼兰的战斗表现'
