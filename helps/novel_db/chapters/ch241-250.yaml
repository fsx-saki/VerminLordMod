- chapter: 245
  title: 第二百四十六节：故意被发现
  content: '第二百四十六节：故意被发现

    　　秘密筹谋了小半个月后，方源来到一座小岛之上。

    　　东海多岛，方源踏足的这种小岛，在东海有数百万，乃至上千万。

    　　绝大多数的小岛，都是荒岛。不过这座小岛却有着人烟。

    　　岛上有三处渔村，最高修为者，只有三转。

    　　方源隐去身形，顶着烈日，若无其事地在其中一处渔村里闲逛。

    　　周围的人，绝大多数都是凡夫俗子。偶尔有一两位蛊师，一转或者二转的，都会引来凡人们敬畏的目光。'
