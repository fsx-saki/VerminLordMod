  title: 第二百四十二节：吒金艳阳枪
  content: '第二百四十二节：吒金艳阳枪

    　　血道蛊仙！

    　　因为血海老祖等等历史原因，以及血道的流派特征，五域中但凡修行血道之人，都被判定为魔道中人。

    　　之前，楚门和百足家的联盟，对付黄金家族的联合征讨，楚度一方本可能引来一位强援。可惜此人修行血道，楚度立即拒绝，态度十分干脆，毫无任何犹豫。

    　　那是因为楚度想要建立正道势力，一旦和血道搭上了边，那就只能被划分为魔道一方，让楚度的一番心血付之东流。

    　　不过'
