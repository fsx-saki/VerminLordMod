  title: 第二百四十三节：血尽流
  content: '第二百四十三节：血尽流

    　　火焰棍子受了金光一击，竟将这道金光完全吸收进棍身中去。金光在火焰棍身中迅速流转了一遍之后，最后停留在炎棍的一头，渐渐地转变成了尖锐的枪尖。

    　　至此，炎棍彻底转变成了一条赤金色的短枪！

    　　仙道杀招吒金艳阳枪，终于催动成功！

