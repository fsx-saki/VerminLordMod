  title: 第二百四十三节：颠倒黑白
  content: '第二百四十三节：颠倒黑白

    　　“什么？”诸位仙僵听到方源的话，不禁失色。

    　　“你、你、你放屁！”卜单更是急火攻心，恼羞成怒。

    　　鲨魔眯起双眼，望着卜单，又望方源，脸色沉下来：“这到底怎么回事？”

    　　卜单气得牙根发痒，立即道：“鲨魔大人，我敢用自己多年的名声担保，这次动手根本没有任何不妥之处。”

    　　“这星象子看着一副好皮囊！”卜单手指着方源，“实则是个心胸狭窄，嫉贤妒能的小人啊。他定是见我有'
