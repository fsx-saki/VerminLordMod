  title: 第二百四十二节：陷害
  content: '第二百四十二节：陷害

    　　很快，依靠脑海中的星念不断推算，方源又找出了几个蛊虫隐藏的位置。

    　　这些位置，自然是侦察手段发现不了的。

    　　“一、二、三、四，总共有四处地点，有蛊虫隐藏着，但都是凡蛊。隐藏的真是巧妙，就算是我有星道仙级侦察杀招，也观测不出。”

    　　有了上一次的经验，方源没有直接出手，将这些凡蛊都施以毁灭。

    　　他按捺不动，继续观察，不断推算。

