  title: 第二百四十七节：中洲来援
  content: '第二百四十七节：中洲来援

    　　北原，大雪山福地，第一雪峰。

    　　“再来一次。”万寿娘子一步步逼近马鸿运，手中拿捏着一枚雷球。

    　　“你来吧。”马鸿运无所谓地翻翻白眼。

    　　万寿娘子冷哼一声，手中的雷电小球随即抛出，融入到马鸿运的胸口中去。

    　　啪啪啪啪！

    　　电光在马鸿运的浑身缭绕，马鸿运咬紧牙关，竟然在雷电的肆虐中，还保持着清醒。

    　　电光持续了片刻后结束，马鸿运竟然也没有昏迷过去，而是浑身出了'
