- chapter: 243
  title: 第二百四十四节：哭喊
  content: '第二百四十四节：哭喊

    　　人要是拼命了，自然威胁性就暴涨上去。

    　　反观血道魔仙赵普，却是不愿意拼杀，只要耗去时间，他就能获得胜利。

    　　所以一时间，赵普反而被赵怜云和余艺冶子两人压在了下风。

    　　然而，赵普的战斗经验，绝非中洲二仙所能比及。

    　　他滑溜无比，腾挪翻转，赵怜云、余艺冶子愣是拿不下他。

    　　随着时间推移，局势向赵普发生了倾斜。

    　　余艺冶子首先攻势虚弱下去。

    　　他中招远比赵怜云更早'
