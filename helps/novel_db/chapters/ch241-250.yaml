- chapter: 243
  title: 第二百四十四节：酒酣饭饱来钓鲨
  content: '第二百四十四节：酒酣饭饱来钓鲨

    　　酒宴上气氛融洽。

    　　虽然这次攻略玉露福地，让鲨魔等人铩羽而归，但在事后，鲨魔还是极有风度地邀请太白云生，以及方源来他的家园做客。

    　　太白云生的人如故仙蛊，是鲨魔渴求之物。而作为星象子的方源，表现出来的深厚的智道造诣，则让鲨魔、苏白曼看到了他的价值，尤其是在攻略玉露福地上面。

    　　所以，鲨魔邀请方源、太白云生二人，也就不意外了。

    　　鲨魔的住处，名为鲨海。'
