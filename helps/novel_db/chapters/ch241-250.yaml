  content: '第二百四十一节：人生路

    　　大同风幕不断逼近，便是巨阳意志招降方源的主要原因。

    　　若是方源主动投降，献出巨阳真元，一切都好办。

    　　但方源一意孤行，仍旧没有投降的举动，巨阳意志不得不拼死出手了！

    　　“黑楼兰，这是给你的力道仙蛊，解放你的暗道封印，展现出十绝体的真正战力吧。你的大力真武体，恢复力天下第一，远远凌驾于其他九绝之上。你放心，你就算自爆，我也自有手段救你。”巨阳意志说着，交给黑楼兰一只'
