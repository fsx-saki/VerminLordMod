    　　哗的一声，凝聚在一起的黄金意志被砸得粉碎，分裂成无数部分。

    　　但下一刻，意志再度凝聚，体积足足缩减了五分之一。

    　　吃了一个大亏的巨阳意志，刚要愤怒反击。方源却已经后退，重重的力道虚影又将他护住。

    　　看到这一幕的巨阳意志，气得差点再度崩散。

    　　它无法思考更多，否则早就看出这是一个陷阱，因此'
