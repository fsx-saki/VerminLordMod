    　　“误会，这都是误会！！”方源“迫不得已”地显出身形。

    　　见到星象子这个老男人忽然出现在自己的面前，宋亦诗立即惊叫一声。她此刻泡在温泉中，赤身裸体，自是心中最软弱的时刻。

    　　出现的要是女性也就罢了，偏偏是男性蛊仙。

