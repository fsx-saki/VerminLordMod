  - '得没有起伏，可以说是漠然无情。并且将胎壁漏洞，视作最大目标。以身镇压，不顾其他，状态之古怪，宛若……魂兽。”

    　　沈伤则道：“幽魂魔尊为何变成这种样子，我和陆道友早有讨论，但没有成果。就我看来，恐怕几位尊'
  - '披散肩头，正是沈伤。

    　　他专修人道，神帝城中的潜伏是他的一场际遇。从神帝城中突破而出后，他仙窍内的黑火之伤已是彻底痊愈，战力上涨，乃是绝对的亚仙尊战力。

    　　沈伤跨出石门之后，便停留在侧，对后面的蛊仙微'
  - '而出的巨大好奇。

    　　沈从声当然也免不了。

    　　陆畏因、沈伤对视一眼，你一言我一语，带着复杂的神情将疯魔窟之争叙说了一遍。

    　　沈从声听闻之后，久久无声。

    　　无极魔尊的追求，星宿仙尊的筹谋，巨阳仙尊的强势，乐'
  - '魄谷、逆流河组成的杀招。在下想不通，若说其他方面也就罢了，方源在智道上擅长的一直是防备他人推算。他的智慧蛊也在天庭中毁灭。如何能有如此丰厚的杀招成果呢？”

    　　“难道说，他在智道上面也有极其重大的进步吗？但'
  - '能持久。他看似复活，实则并非活生生的蛊仙。至少当他死亡之后，并非血肉，也无仙窍落下，而是还原成了诸多事实浮冰。”

    　　“原来如此。”沈从声点点头，又问道，“第二件事，幽魂魔尊就真放任不管，将他留在疯魔窟第九层'
  - '沈从声取出杯盏，当场为陆畏因、沈伤制茶。

    　　陆畏因看了一会，察觉端倪，不由大感兴趣，问道：“莫非是六声茶？”

    　　沈从声笑道：“微末小伎，在下献丑。”

    　　陆畏因正色道：“沈家六声茶闻名天下，不想今日有这'
  - '免凝重几分。

    　　幽魂魔尊嗜杀，没有恢复理智，只能待在第九层虚空中，无法突围。但若是恢复了理智，恐怕五域两天难以安宁。

    　　沈从声最后问道：“第三件事，那方源成就尊者的一系列阴谋，已是被星宿仙尊、巨阳仙尊二人'
