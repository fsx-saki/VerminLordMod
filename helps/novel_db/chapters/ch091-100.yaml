- chapter: 96
  title: 第九十六节：为了死去的人
  content: '第九十六节：为了死去的人

    　　方源在猪腹中恢复的真元，终究没有用上。

    　　这次兽潮本身就在古月高层的注视中，电狼群的出现只是一次小小的意外。很快，古月高层就做出了迅速的回应。

    　　三位家老亲自带队，以雷霆之势迅速稳住场面。

    　　仅仅十分钟之后，方源在猪腹中听到外面打斗的声音，以及电狼呜咽的惨叫。

    　　他连忙将挡在身前的那女蛊师一脚踢了出去，满身血迹地钻了出来。

    　　方源当然不是担心电狼，而是担心若'
