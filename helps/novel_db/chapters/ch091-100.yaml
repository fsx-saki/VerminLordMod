  title: 第九十八节：进入黑凡洞天
  content: '第九十八节：进入黑凡洞天

    　　一天半之后，上极天鹰载着方源，飞到一处无名地界的上空。

    　　上极天鹰速度骤缓，开始盘旋于空中。

    　　飞绕了一阵后，它似乎是确定了方位，照准空中某处，轻轻一啄。

    　　顿时，方源耳畔响起一声钟磬般的清越激响，随后空间破开，眼前视野骤变。

    　　眨眼间，上极天鹰就载着他，消失在北原上空，进入了黑凡洞天。

    　　“上极天鹰的力量，果然是可以穿透虚空，直接进入洞天！幼年就如此厉害，'
