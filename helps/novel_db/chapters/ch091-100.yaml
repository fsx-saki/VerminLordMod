  content: '第九十八节：东方余亮

    　　“赵家连夜拔营而去？”王帐内，黑楼兰看了看手中的情报一眼，便随手将其抛在案几上。

    　　在他看来，赵家虽然是个大型家族，但却没有一支厉害的精兵，就连像样的蛊师强者都没有一位。虽然赵家族长乃是五转初阶，但是三年前，就被东坡空以四转巅峰的修为，挑战成功。因此威望并不高，执掌赵家这么多年，也没有太大的建树。

    　　若是赵家投靠了东方部族，他兴许还会多关注几眼，毕竟五转蛊师哪怕再名不'
