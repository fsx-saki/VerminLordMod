- chapter: 100
  title: 第一百节：白玉蛊
  content: '第一百节：白玉蛊

    　　转眼，就又过去了十多天。

    　　山体内部，地下石林。

    　　吱吱吱！

    　　数十只玉眼石猴，在半空中闪出模糊的身影。

    　　它们不断地纵跃跳动，向方源发动着猛烈的攻击。

    　　若换做以前，方源必然撤退无疑。但是如今，他站在原地，神情冷漠，岿然不动。

