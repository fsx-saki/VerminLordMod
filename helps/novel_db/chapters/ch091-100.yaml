    　　太白云生哈哈一笑：“师弟法眼无差，的确如此。不妨猜猜我这次有什么收获？”

    　　方源不由奇道：“玉露仙子乃是乐土仙尊座下的近侍女童，她是土道、水道兼修，擅长防御和治疗。你们攻打福地的阵容，我也知道。居然一次成功，直接将玉露福地攻打下来了？'
