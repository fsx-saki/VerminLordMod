    　　这项本能极其厉害。

    　　太古九天之外，皆有浓厚至极的天罡气墙相阻。洞天寄托于穹霄之中，若不主动现身，从外界极难察觉。

    　　但上极天鹰只要去过某个地方，就能遵循本能，穿透虚空，重新往返。

