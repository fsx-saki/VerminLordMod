  title: 第九十九节：复合杀招
  content: '第九十九节：复合杀招

    　　神帝城，壁画世界。

    　　茂密如林的荒草丛中，陡然撞出三头黄豹。

    　　黄豹一公两母，对着中心的叶凡低吼，外露的利齿上还挂着残破的血肉，分外狰狞。

    　　叶凡被包围，心中微凛：“这三头黄豹潜伏能力极强，直到它们发动，我才得知。至于具体战力如何，还得打过才知晓。”

    　　想到这里，叶凡立即抛出几只蛊虫。

    　　砰砰砰。

