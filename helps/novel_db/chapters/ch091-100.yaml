- chapter: 92
  title: 第九十二节：未来遥遥在望
  content: '第九十二节：未来遥遥在望

    　　“方源你坚持住，我们来帮你了！”角三一脸关切的神色，喊了一句后，大步跨入房间。

    　　然而下一刻，他就愣在当场。

    　　房间中空无一人，方源并不在这里。

    　　四人一阵沉默。

    　　“怎么会这样，他人呢？”角三陡然打破沉寂，羞恼交加。

    　　他在门前表演了大半天，感情是独角戏，方源根本就不在房间里。

    　　三人面面相觑，亦都没有料到这种结果。

    　　“这事情有些奇怪，方源既然不在，'
