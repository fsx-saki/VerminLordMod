- chapter: 94
  title: 第九十四节：忽然收力
  content: '第九十四节：忽然收力

    　　“左前方发现病蛇小组，正在和一头大型野兽进行僵持战。”仅隔半秒，赤舌又说了一遍，这次内容更加详细。

    　　“什么情况？”赤山皱起眉头。

    　　“没有错。”赤舌嘴中的蛇信不断伸缩，“角三的那头红岩蟒，只此一家别无分店。正在和一头……是野猪王！”

    　　众人脸色顿时微微动容。

    　　“野猪王，我要合练蛊虫，就需要野猪獠牙。无疑，野猪王的獠牙最合适了。”方源心中一动，事实上他亦早有了斩'
