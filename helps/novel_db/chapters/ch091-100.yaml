- chapter: 91
  title: 第九十一节：方源vs李好（上）
  content: '第九十一节：方源vs李好（上）

    　　一眨眼，五天就过去了。

    　　方源迎来又一场战斗。

    　　“今天你的对手，有些来头呢。”魏央走在方源的身边，叮嘱方源要注意一些。

    　　方源点点头。

    　　他从不打无准备之战，自从和李然成为地下的盟友之后，就从他口中得到了大量的情报。

    　　李然是卧底，潜伏八年，本来就是干情报工作的。对演武场知道的，甚至比魏央还要详细。

    　　“李好这个人曾经也是一个力修，冲到第四内城。他'
