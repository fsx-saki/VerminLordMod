    　　方源盘坐在密室中静修。

    　　动用通天蛊，他的神念在宝黄天中和某位女蛊仙的意志，进行着交流。

    　　“你这丹青香的成色，比蛊仙西子所卖的，要明显低上一层。价格再便宜一些罢。”方源讨价还价。

    　　但那位女蛊仙，并没有像方源这样，亲自散发神念，来主持生意。

    　　她放到宝黄天中的，除了要寄卖的货物之外，就是她的一股意'
