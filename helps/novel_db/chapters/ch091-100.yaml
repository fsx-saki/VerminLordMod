  title: 第九十九节：震慑群仙
  content: '第九十九节：震慑群仙

    　　远处空中，四位蛊仙联袂而来。

    　　方源脸色郑重，一眨不眨地看着。

    　　说实在话，眼前景象，有点超乎他的意料。

    　　“怎么会有蛊仙？”方源看了一眼天灵，问道。

    　　可惜这黑凡洞天的天灵懵懂愚昧，根本毫无反应。

    　　方源的心中不免笼上一层阴霾。

    　　就一会儿，四位蛊仙已经飞近，但没有散发敌意。

    　　方源不动声色，全神戒备。

    　　“罪仙陈尺，拜见本家上仙！”为首的一位，乃是蛊仙'
