- chapter: 93
  title: 第九十三节：小兽潮
  content: '第九十三节：小兽潮

    　　“快走，不要落下了！”

    　　“前方的族人们在浴血奋战，正等待我们的支援呢。”

    　　“都跟紧了，夜间作战容易迷失方向，尤其是新人要特别注意！”

    　　……

