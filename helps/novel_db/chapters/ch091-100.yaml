    　　良久。

    　　方源睁开双眼，光辉缓缓消散，十钧之力蛊只剩下原先一半的大小。

    　　“还能再用两次。”方源默默估算。

    　　十钧之力是消耗蛊，用完这只之后，他便拥有七十钧力道。这样的底蕴，放在四转初阶的力道蛊师身上，也说得过去了。

    　　但全力以赴蛊被压制成二转，若一天不解决此事，'
