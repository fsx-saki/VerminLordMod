- chapter: 98
  title: 第九十八节：拍卖大会（一）
  content: '第九十八节：拍卖大会（一）

    　　青峰高耸入云，顶峰处，一片深潭静谧如镜，映照着天空缕缕白云。

    　　这里是真武福地，北原袁家的根基所在。

    　　袁姓，并不罕见，十分平常，在南疆、东海、西漠等等五域皆有。但在北原，袁姓却更为沉重，代表着的是超级势力，无上的权威。

    　　深潭上空，一位白袍老人舞动长枪，气息浩荡磅礴，掀起阵阵云岚，风动万卷松涛。

    　　老人白发，精神矍铄，身姿变化间，时而迅猛如电，时而静如磐石'
