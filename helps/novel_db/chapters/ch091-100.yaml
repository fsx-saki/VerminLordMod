  title: 第九十七节：天下第一仙蛊屋
  content: '第九十七节：天下第一仙蛊屋

    　　地渊战场。

    　　轰！

    　　被天庭攻势击中，劫运坛狠狠一震，里面的冰塞川面沉如水。

    　　太古传奇毛里球炸毛叫嚣：“让毛爷出去，将这些人轰杀成渣！”

    　　五行大法师则呼喊道：“毛爷，这块地方缺口太大，还请你和我一起出手修复啊。”

    　　毛里球闷哼一声，一边出手修理劫运坛，一边不悦地嘟囔：“一味的挨打，真是难受！冰塞川，劫运坛给你这个小子操纵，你可不能堕了主人的威风啊。”'
