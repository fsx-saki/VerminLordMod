- chapter: 92
  title: 第九十二节：仙僵议事
  content: '第九十二节：仙僵议事

    　　要说议事堂的大门，可是来历非凡，乃是曾经创建北原僵盟的先贤所制。

    　　这位先贤的姓名已经无从考证，但所用的手段的确巧妙绝伦。

    　　大门上布满了各种道痕，甚至有人猜测，是用过消耗类的仙蛊。

    　　只有北原的仙僵，才能得到这扇大门的认可，能够轻易推动。若不是北原升仙之人，仙窍世界蕴藏着其他地域的天地之气，手刚刚搭上，估计就要被反震出去。若只是北原蛊仙，却非仙僵，这扇大门将比山脉'
