  - '的路人大多数都盯着天空的异象，唯有少部分人看到这一幕，皆是惊愕。

    　　女蛊师乃是出了名的炼道大师，在中洲炼蛊大会中排名前百，居然会对一位陌生蛊师如此礼待。

    　　而这位陌生蛊师却是身披长袍，头戴蓑帽，面貌隐藏在重重'
  - '人都不会料想到，神帝城在碧绿玄光的包裹中，不仅已经脱离原址，而且还飞临古魂门，降入地渊，与气绝魔仙、劫运坛展开大战！

    　　仙道杀招——一气群云爆。

    　　气绝魔仙的杀招打中神帝城，但只是激起碧绿玄光表面阵阵微'
  - '天蔽地之势，死死堵住气绝魔仙、劫运坛的逃生之路。

    　　而在后段，是秦鼎菱率领的天庭蛊仙，数座仙蛊屋中诛魔榜冲在最前，担当先锋之责。

    　　激战当中，神帝城忽然传出嘈杂人声，随后碧绿玄光汹涌澎湃，在表明形成一大'
  - '之中。

    　　而趁着这个关键的时间，劫运坛化作一团流光，顺着金芒道路，嗖的一下，迅速撤离了战场。

    　　豆神宫，壁画世界。

    　　轰！

    　　轰！！

    　　两声巨大的轰鸣声，间隔并不长，响彻整个壁画世界。

    　　“怎么'
