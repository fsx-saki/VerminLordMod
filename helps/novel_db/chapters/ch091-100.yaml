- chapter: 99
  title: 第九十九节：是人不是神
  content: '第九十九节：是人不是神

    　　哗哗哗……

    　　真元海中波涛起伏，潮起潮落。

    　　放眼纵览，一片淡红之色，已经不是原先一转的青铜海，而是赤铁海。

    　　空窍四壁是一片光明的薄膜，正是二转初阶的气象。

    　　整个赤铁真元海，占据空窍的四成四。海上半空处，春秋蝉显现出身形来。

    　　通过近一年的休养沉眠，它已经有了起色。

    　　原先它的躯干没有一点的光泽，粗糙暗哑，如同枯朽的木柴。如今却是沾了一点油光似的。'
