- chapter: 91
  title: 第九十一节：九天碎片
  content: '第九十一节：九天碎片

    　　中洲。

    　　白鹭长飞，天高气爽，正是好天气。

    　　三位来自战仙宗的七转蛊仙，却是齐齐聚集于这处高空。

    　　“按照猴王的求援信，应该就是此处地方了。”千竹仙环顾四周，开口道。

    　　他一身青袍，身材欣长，双目深如古潭，波澜不惊。

    　　“此处看来毫无蹊跷，显然信中所言的那道洞天裂缝，已经弥合了。不过真正要确定此处，还得看神母的手段。”身着白袍的命河谷主说着，看向身侧一人。'
