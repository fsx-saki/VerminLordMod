    　　这些天来，因为黑家大举来访，东方余亮主动力邀，导致族中上下分出两派。

    　　这两派争吵不休，一方主张投靠东方部族，化解旧怨。另一方则力争依附黑家，毕竟黑家更加势大。

    　　但投靠东方家族，真的能够化解旧怨吗？一'
