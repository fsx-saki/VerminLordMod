  content: '第一百节：非到末路不甘休

    　　方源手中捏着一只信道蛊虫，蛊虫中记载的正是有关之前追杀战的战报。

    　　大致内容是：天庭大胜，魔尊幽魂阵亡，方源逃窜，气绝魔仙、毛里球被镇压，正元老人被俘虏，影宗紫薇仙子、影无邪在逃，气海老祖、白凝冰、白兔姑娘、妙音仙子失踪，死亡概率极大。

    　　“看来当今天下，即便没有仙蛊屋排行榜，神帝城乃是仙蛊屋第一，也是实至名归了。”方源感叹一声。

