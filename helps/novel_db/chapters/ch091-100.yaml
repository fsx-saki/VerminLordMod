  title: 第九十九节：白凝冰vs铁刀苦
  content: '第九十九节：白凝冰vs铁刀苦

    　　凭良心说，白凝冰还真不认识铁刀苦。

    　　方白二人离开青茅山时，铁刀苦一行人都在他们俩屁股后吃灰。就算是白骨山传承，最后的追击战，方白二人也没有和铁刀苦打过照面。

    　　等到不久前，铁刀苦和百家众人来到商家城后，又第一时间和方源正面相对。

    　　然后方源将他们引到狮子楼里去，一席话后，百家人砸锅卖铁，丢下五十万跑路了。留下铁刀苦一个人，被狮子楼拿住，充作门楼外的护卫。'
