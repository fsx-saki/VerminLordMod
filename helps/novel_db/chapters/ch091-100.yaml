- chapter: 92
  title: 第九十二节：墨狮狂
  content: '第九十二节：墨狮狂

    　　天空湛蓝如洗，地上则一碧千里。

    　　这里的土地，尤其肥沃，水草茂盛鲜美，及人膝盖。

    　　这便是北原有名的玉田，被誉为最为丰美的草场之一，如今这里人头攒动，旌旗飘扬。

    　　玉田的英雄大会，已经持续了半个月之久了。

    　　前七天，各个部族都发出自己的声音，喧嚣尘上，一片纷杂扰乱。但渐渐的，经过合纵连横，各方势力相互组并。到了如今，只剩下两个最强的势力。

    　　一方是刘家刘文武，另一'
