- chapter: 91
  title: 第九十一节：幽魂之死
  content: '第九十一节：幽魂之死

    　　“快，再快一点，尽快！”紫薇仙子不断地在心底催促自己。

    　　她是全场唯一的智道大能，破解战场杀招的大任，自然是落到了她的头上。

    　　紫薇仙子被幽魂改造了魂魄，对幽魂忠心耿耿，这一次推算破解战场杀招，也是拼尽全力。

    　　然而，陆畏因的幻沙转影战场绝非寻常货色。

    　　“这土道战场稳重之余，还有一层朦胧之感。恐怕是以乐土仙尊的战场为根基，后继者推陈出新，进行了改良！”

    　　紫薇'
