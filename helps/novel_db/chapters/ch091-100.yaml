    　　他的确狼狈万分，魔尊幽魂的自爆让他的兮地受损极重。而兮地是他重生以来的最大依仗。他虽然得到了不少优质真传，但改良杀招还未够时间。所以气道杀招'
- chapter: 98
  title: 第九十八节：活捉
  content: '第九十八节：活捉

    　　神帝城中，尽是喧嚣和嘈杂。

    　　城中生活着的数十万居民，此刻几乎都仰望着天空。

    　　神帝城的天空，已被一片碧绿玄光完全遮盖。不仅如此，八方城门也都尽数紧闭，把守层层重兵。

    　　“这究竟是怎么回事啊？”

    　　“你们不知道？城门口早有告示，说过会封闭城门一段时间，期间伴有异象产生，大家不必惊慌。”

    　　“这个告示我也听说了，但没想到居然是如此宏大的异象。”

    　　城中的居民们议论纷'
