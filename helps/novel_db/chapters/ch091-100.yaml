  title: 第九十八节：炼蛊的艰难
  content: '第九十八节：炼蛊的艰难

    　　“什么？那个小子，现在居然是二转蛊师了，还向内务堂申请了分家任务！”舅父古月冻土惊怒交加的声音，在会客堂中回荡。

    　　“的确是这样的。我虽然收了你的元石，但是也不好阻拦他，只能告诉他三天后来取任务。帮你拖延这么多天，已经是我所能做到的极限了。”坐在一旁的中年男蛊师说道。

    　　古月冻土心中冷哼一声，他听出了这位内务堂蛊师的意思。

    　　什么“拖延三天，已经是极限”，说这样的'
