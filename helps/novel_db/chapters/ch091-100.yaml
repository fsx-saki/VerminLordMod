  content: '第九十一节：地丘传承

    　　墨线变化不定，持续了好一会儿功夫，这才渐渐定住，形成一副地形图。

    　　图的中央，是一块隆起的土地。没有山峰陡峭，坡度很缓，上面张开一个豁口，仿佛通往地底的模样。

    　　在这处地方，标注着两个字——地丘。

    　　地丘四周，是沼泽和树林混杂的地形，在西南角上，还有一条河流。

    　　在整个地形图的下方，还有四句——“土中蕴光，芒高万丈，百里天游，咏梅雪香。”

