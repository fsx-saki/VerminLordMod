- chapter: 97
  title: 第九十七节：魔头横行
  content: '第九十七节：魔头横行

    　　内务堂，侦讯室。

    　　冬日的阳光透过唯一的天窗，照在地上。

    　　微尘在光柱中，慢慢地漂浮着，纤毫毕现。

    　　光柱笼罩着一个椅子。

    　　方源就坐在这个椅子上，沐浴着阳光。

    　　在他的对面，阴影和黑暗笼罩的墙壁前，摆着一张长桌，桌子后坐着三位家老。

    　　侦讯已经持续了一个小时。

    　　“方源，你确定你刚刚叙述的毫无差错吗？”一位家老道。

    　　“是的。”方源垂下眼帘，看着自己的脚'
