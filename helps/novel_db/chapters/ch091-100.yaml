  content: '第一百节：拍卖大会（三）

    　　“秦兄，你自去忙吧，我们自己选个单间就行了。”自在书生向秦百胜摆摆手，言语话音中显示出他和秦百胜的关系，亦是不俗。

    　　随后自在书生悠然迈步，和红袖仙子一起进入了一间单间。

    　　在他之后，又陆续有蛊仙进场，或是少数选择单间，大多数人却是选择大厅。至于选择密室的，有另外的秘密通道，直接进入各自密室。却是在大厅中是看不到的。

    　　“秦百胜这人虽是散修，但实力强盛，却又卑己'
