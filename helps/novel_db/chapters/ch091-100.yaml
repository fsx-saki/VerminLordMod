- chapter: 92
  title: 第九十二节：方源vs李好（下）
  content: '第九十二节：方源vs李好（下）

    　　吼吼吼！

    　　兽力虚影疯狂闪现，声势惊天动地，背山蛤蟆痛得呱呱大叫，猛地发力撞向方源。

    　　方源冷哼一声，及时闪过。

    　　背山蛤蟆背负山峰，吨位太重，速度很慢，方源闪避的很轻松。

    　　横冲蛊、直撞蛊接连使用，背山蛤蟆屡次出击，连方源的皮都没蹭到。

    　　众人看得目瞪口呆。

    　　背山蛤蟆一扫众人心中岿然不动的形象，被方源揍得直叫唤。

    　　“这个小子，居然如此凶猛！”'
