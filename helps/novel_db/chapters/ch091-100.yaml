  content: '第九十八节：一蹴而就蛊

    　　“阴云蛊。”

    　　密室中，方源盘坐在蒲团之上，口中喃喃，伸手轻轻一指。

    　　顿时，一只蛊从空窍中，化光而出。

    　　刚飞出来，就是轻微一炸，转为一股墨黑云气。

    　　这股云气迅速下沉，滚滚荡荡，眨眼间，便贴近地面，将方源托在云层上。

    　　方源坐在黑云上，比蒲团要柔绵多了，只是多了层凉气。

    　　他却也不意外，又伸出食指，朝半空中一指。

    　　“阳云蛊。”

    　　一道白光破空而出，'
