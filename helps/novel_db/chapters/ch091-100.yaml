  title: 第九十一节：春晓翠鹂
  content: '第九十一节：春晓翠鹂

    　　鸟鸣清脆悦耳，鸣叫不休。

    　　至尊仙窍中的小北原，原本洁霜一片的荒芜地面，已经泛出无限绿意。

    　　地灾的力量，可谓浩大。十几个呼吸之后，方源附近十多万里，已经化为绿茵茵的草原。

    　　草木丰茂，繁花雕缀其中，简直是天地换了新颜。

    　　方源站在荡魂山巅，满脸肃穆之色，全神戒备。

    　　这一次，是他的第三次地灾。他把荡魂山再次带在身上。

    　　但眼下情景很诡异。

    　　地灾力量所变化'
