- chapter: 92
  title: 第九十二节：巨祸焚木
  content: '第九十二节：巨祸焚木

    　　要铲除这些树人，的确要耗费海量仙元。

    　　这些树人的数目，比第一次地灾时的雪怪还要多，并且它们恢复能力极强。方源已经看到不少的断枝，插在土壤中，眨眼间就能冒出新芽来。

    　　除非用剑浪三叠这种杀招，彻底将这些树人泯灭，这才能消除后患。

    　　否则这些树木生长起来，可是要耗费仙窍中大量的地气的。

    　　但用剑浪三叠，或者飞剑仙蛊，铲除这些树人，是太过大材小用了！

    　　“若我是炎道'
