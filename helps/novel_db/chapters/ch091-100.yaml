- chapter: 91
  title: 第九十一节：方源，我们很担心你
  content: '第九十一节：方源，我们很担心你

    　　一夜未睡，天一亮，方源就出了门，大肆采办东西。

    　　租房简陋，被褥破旧，长久住下去的话，寒气侵体，必会生病。

    　　方源如今虽然元石已经消耗了大半，但是该有的生活用具，还得购买。这种东西不能省。

    　　首先是被褥，要新棉填充的大被子，至少得两张。除此之外还有床单，垫被。

    　　油灯得再买一具，才能足够照明，灯油也得至少存上两壶。

    　　方源想了一下，租的房间虽然面积不大'
