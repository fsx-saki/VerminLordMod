- chapter: 518
  title: 第五百二十三节：感化方源
  content: '第五百二十三节：感化方源

    　　方源暂时被困在胎土迷宫杀招之中，战局一下子稳定下来。

    　　铁面神眼中精芒一闪即逝，直接飞身下来，来到陆畏因身前行礼，主动问道：“这位前辈，接下来我们该怎么斩除方源这个魔头？”

