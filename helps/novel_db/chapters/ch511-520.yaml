- chapter: 514
  title: 第五百一十七节：错爱
  content: '第五百一十七节：错爱

    　　“这人是谁？”叶凡仰望着高空漂浮着的方源，心生疑惑。

    　　此时此刻，他不禁想起师父陆畏因与他所说的话。

    　　“师父说过，这只鹰儿能了却我身上的一桩因果。我一直都很疑惑，难道说这位蛊仙真的是鹰儿的主人，我的因果就是他吗？”

    　　叶凡并不认识方源，因为方源此时此刻乃是至尊仙体的本来面貌，叶凡一直都没有接触过。

    　　叶凡知道的是方源六转宙道分身的容貌，这是他从商心慈身边人打探而'
