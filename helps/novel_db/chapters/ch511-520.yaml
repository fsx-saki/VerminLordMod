- chapter: 519
  title: 第五百二十二节：进攻琅琊
  content: '第五百二十二节：进攻琅琊

    　　北原，琅琊福地。

    　　一座平淡无奇的湿地上，忽然间升腾起无边的华光，光芒如玉，映照得周围一片碧绿。翠芒之中，无数蝴蝶翩跹飞舞。

    　　华光持续了三个呼吸，便都骤然消散，只余下点点玉星飘零闪烁。

    　　与之前不同的是，原平空无一人的地面上，却出现了七位身影。

    　　他们浑身荡漾着中洲蛊仙的气息，为首的一位，身穿红白相间的长袍，赫然便是名传天下，数千年难得一出的惊世人物——凤九'
