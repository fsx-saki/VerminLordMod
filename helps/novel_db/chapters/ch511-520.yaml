  title: 第五百一十四节：叶凡vs铁若男
  content: '第五百一十四节：叶凡vs铁若男

    　　轰轰轰！

    　　剧烈的爆炸声，响彻耳畔。凡道杀招，接连不绝。两道身影时分时散，激烈对拼。

    　　一位是叶凡，气运浓郁，精修变化道、光道，得到商家蛊仙指点，又认神秘蛊仙陆畏因为师。最为难得的是，他不是光靠自身机遇，而是走出自己的蛊修道路。

    　　而铁若男，虽然是出身于超级家族铁家，但幼年颇为坎坷，童年丧母，少年丧父，自立自强，成为铁家八大少主之一，励精图治，允文允武。声'
