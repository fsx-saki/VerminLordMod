- chapter: 513
  title: 第五百一十六节：方源至
  content: '第五百一十六节：方源至

    　　那些倒霉的蛊师，不幸被水柱砰中的，直接被冲爆成一团血肉骨渣。

    　　如此惊变让蛊师们惊骇欲绝，纷纷住手，脱离战场避祸。

    　　“怎么回事？”云层上的三位蛊仙，正要做出应对，就见到这些喷射出来的水柱，忽然在半空中合而为一，形成一个鱼身蛙腿虎头的上古水怪！

    　　水怪咆哮一声，扑向地下的凡人。

    　　它没有多少智慧，觉得是这些凡人蛊师惊扰了它的沉眠。

    　　巨大的蛙腿一踏地，就有无边'
