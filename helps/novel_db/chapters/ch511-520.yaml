- chapter: 512
  title: 第五百一十五节：地底寒心湖
  content: '第五百一十五节：地底寒心湖

    　　铁若男娇喝一声，猛地举拳，迎接上去。

    　　砰！

    　　一声巨响，拳掌相击，爆出璀璨的白光。

    　　光芒暴射，炸得地面土石崩裂。

    　　双方狠狠对拼一记，身影如烟，各自飞退。倒退了十多步后，又各自站定，遥遥对视，狠狠喘息。

    　　此时两人的脸色都非常凝重，均把彼此当做重大敌手，不管有丝毫的大意和轻视。

    　　“真是厉害，这两人战力远超寻常五转，都是蛊仙的种子了！”商心慈心中感叹'
