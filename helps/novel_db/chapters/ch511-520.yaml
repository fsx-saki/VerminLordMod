- chapter: 520
  title: 第五百二十三节：方源爱情
  content: '第五百二十三节：方源爱情

    　　“犯我琅琊，留下命来！”琅琊地灵大吼一声，协同身边一干毛民蛊仙，催动天婆梭罗直接攻上去。

    　　退！

    　　见银色巨人来势汹汹，中洲的蛊仙们都身形如电，纷纷从四面八方暴射撤退。

    　　就算是凤九歌也在退。

    　　不过，他后撤的速度最慢，这绝非他速度比不上其他蛊仙，而是故意殿后。

    　　毫无疑问，凤九歌是中洲蛊仙当中战力最强，也是此次领头大将，此行成败有大半关系落在他的肩头，方方'
