- chapter: 516
  title: 第五百一十九节：方源屠仙
  content: '第五百一十九节：方源屠仙

    　　“不愧是铁面真传。”方源见着沙铁沉浮被铁面神再次施展，威能暴涨一倍，眼中顿时闪烁一道精芒。

    　　他对五域各大超级势力都有所了解，因为影宗情报涉及方方面面。

    　　类似铁面真传这种，是每一个超级势力的招牌传承，影宗也曾谋求，但都被各大超级势力看管得极其严格，影宗得手的次数相当稀少。

    　　铁面真传，影宗就没有夺到手过，只是调查了一些情报，里面的核心仙蛊名为正义，因此继承真传'
