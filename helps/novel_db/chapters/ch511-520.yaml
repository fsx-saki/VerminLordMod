- chapter: 517
  title: 第五百二十节：胎土迷宫
  content: '第五百二十节：胎土迷宫

    　　“师父……”叶凡口中轻声呢喃，望着眼前几乎近在咫尺的陆畏因，满脸都是孺慕之色。

