- chapter: 515
  title: 第五百一十八节：沙铁沉浮
  content: '第五百一十八节：沙铁沉浮

    　　“方源，这名字好像在哪里听过？”

    　　“难道就是那个三王山，炼成仙蛊的小兽王不成？”

    　　“我虽然看不清楚，但恐怕就是他了！”

    　　“他成了仙人了啊？大机缘，这是何等的大机缘！唉，怎么就没有让我碰到。”

    　　三族的蛊师们都炸开了锅。

    　　人们议论纷纷，发泄着自己的震惊、嫉妒等等情绪，令场面变得十分嘈杂喧闹。

    　　这些凡人还局限在过去的消息里，方源的真正威名，只是在蛊仙'
