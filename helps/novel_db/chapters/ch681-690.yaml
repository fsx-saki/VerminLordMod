- chapter: 690
  title: 第六百九十五节：天庭战场
  content: '第六百九十五节：天庭战场

    　　左路！

    　　这是上古时代，一百万年前，无极魔尊在天庭中踩踏出来的路！

    　　起点中天门，经过名牌宫、太阳宫、五神殿、中央大殿、监天塔，忘道湖、最后终止在星驰山最巅峰的一缺抱憾亭。

    　　偌大的天庭，一片辉煌的明光，重重宫殿，亭台楼阁，锦绣恢弘。

    　　劫运坛以碾压之势，一路冲杀向前。

    　　沉寂了无数岁月的天庭，终于在此刻迎来了战火。

    　　劫运坛中，五行大法师居高临下，不断观'
