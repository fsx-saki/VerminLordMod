- chapter: 686
  title: 第六百九十一节：天庭危局
  content: '第六百九十一节：天庭危局

    　　中洲，藏龙窟，大阵。

    　　万蛟飞腾，将东海八转蛊仙宋启元团团包围，形成一个巨大如山的蛟球。

    　　“这些上古毒蛟明明是大阵之力所化，竟然如此灵动，仿佛真的一样！”宋启元一面招架，一面心中思索。

    　　他要铲除这些上古毒蛟，并无多少难度，但问题是解决了这些上古毒蛟，接下来必定还有其他阻碍。

    　　数万上古毒蛟乃是大阵之力凝聚成形的，宋启元唯有毁掉这处大阵，方能够针对根本。否则'
