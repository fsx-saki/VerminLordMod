- chapter: 685
  title: 第六百九十节：南仙众志
  content: '第六百九十节：南仙众志

    　　“不好，以武庸为首的大批南疆蛊仙，忽然出现在了不败福地附近！”天庭大殿中，紫薇仙子陡然变色惊呼。

    　　“哦？终于出现了么。”龙公淡淡一句，仍旧坐定主位，毫无动容之情。

    　　紫薇仙子深呼吸一口气，眉头紧皱，感受到了不同寻常的压力。

    　　因为南疆蛊仙此次行动，非常团结，和之前的那些四域蛊仙四处散开作乱不同。最关键的是，他们冲击的目标非常重要，正是不败福地！

    　　若是不败福地'
