  - '成果。往往这些收获，效用绝妙，威能惊人。

    　　天庭一向自认为是人族领袖，人道正统，天庭积累下来的种种人道手段，正是龙公最大的依仗之一。

    　　正元老人气息微弱地答道：“当年，异人十八魔仙围剿元始仙尊，仙尊无人可'
  - '思绪纠结，不能自已。阅览《人祖传》后，仙尊看破心中迷障，一连创造出芸芸众生、万众一心、同仇敌忾等诸多人道杀招。”

    　　“老朽不过是一枚钥匙，催动元始仙尊遗留下来的手段而已，当不得‘大人’二字，龙公你直呼我名便'
  - '看好。

    　　这人却笑道：“失败又如何？按照上仙们的话，就算是在炼蛊大会中失败了，也对中洲大局有利！对正道有益！那些魔仙千方百计要来破坏我们的炼蛊大会，杀死多少无辜的性命！我们虽然身为凡人，却绝不能放弃抗争'
  - '的仙阵被破坏，里面的赤火石被三位蛊仙联手劫掠一空。”

    　　“有人想要盗取落天河中段的混元沙，被天妒楼特意留下来的一记仙道杀招击退。”

    　　……

