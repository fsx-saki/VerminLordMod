- chapter: 684
  title: 第六百八十九节：万众一心
  content: '第六百八十九节：万众一心

    　　中洲，地气石林。

    　　噗噗噗……

    　　一股股澎湃的地气，从石林内的地洞中喷涌而出。

    　　一棵棵石柱，有大有小，小的如竹笋，大的仿佛古木参天。

    　　西漠土道蛊仙石敢当远远打量着地气石林，神情有些复杂。

    　　这片地气石林产出海量的土道修行资源，其中有一项圆坤石，乃是石敢当苦苦需求之物。

    　　可惜的是，这种圆坤石在宝黄天中，从未被大量地贩卖过。因为掌管这里的乃是中洲十大古派'
