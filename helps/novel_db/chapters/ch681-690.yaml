  - '中洲炼蛊大会中的比试场地。

    　　海选之后，能进入这里比试的，都是炼蛊方面的好手。

    　　广场中有数千位蛊师，每人占据一片地方，各自炼蛊。

    　　整个广场都被笼罩着一层厚实的光膜，七转蛊仙强者吴发亲自坐镇，保护'
  - '蛊大会绝对能进行下去了。”

    　　中洲，法身门。

    　　这个门派乃是风云府太上长老吴发开创，同时也是此届中洲炼蛊大会中的比试场地。

    　　海选之后，能进入这里比试的，都是炼蛊方面的好手。

    　　广场中有数千位蛊师，每人占'
  - '乃是红莲魔尊属意之人。又得到幽魂真传，继承了影宗宗主之位。他还拥有鬼不觉杀招，那是盗天真传。别忘了，八十八角真阳楼倒塌，方源又获得了巨阳仙尊的多少好处？”

    　　“我们对方源已经足够重视，你针对他的举措并无不对。只是我方'
  - '。而其他人却只是受伤撤退了，这其中必有内情。详细战报呢？”

    　　“在这里。”紫薇仙子立即递给龙公一只信道蛊虫。

    　　战报非常详细，因为除去周雄信之外，其余的中洲三位八转都还生还着。

    　　看了战报，大殿中一片沉'
- chapter: 682
  title: 第六百八十七节：暂避风头
  content: '第六百八十七节：暂避风头

    　　白云在身旁穿梭，风在两耳旁呼啸，方源在高空中疾飞。

    　　一丝血迹还挂在他的嘴角，之前和四位八转激战，他不是没有付出代价。

    　　尤其是最后，当他用计斩杀了周雄信之后，剩下的三位八转便决意撤退，他们相互合作，破坏了方源的大阵。

    　　这座大阵并非是方源布置，而是当初影宗暗中出手，结合了附近天地的自然道痕，从而形成的超级大阵。

    　　这座超级仙阵威力不凡，和当初方源坑害夏槎一批'
