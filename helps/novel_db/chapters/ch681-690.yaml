- chapter: 687
  title: 第六百九十二节：帝君城战场
  content: '第六百九十二节：帝君城战场

    　　中洲，帝君城。

    　　“这就是师父曾经说过的仙蛊屋？”叶凡晋升到最后的大比，此刻他仰望天空，满脸震惊之色。

    　　其他参赛的蛊师，也比他好不了哪里去。

    　　“这些仙蛊屋通常是一个超级势力的底蕴，没想到一下子出现这么多。恐怕就算是将来界壁消融，地脉一统，五域乱战，也不会出现这样的大战了。”叶凡心中忽然产生一股明悟。

    　　这个时候，叶凡的身旁忽然传来声音：“叶哥，这一次我们'
