- chapter: 681
  title: 第六百八十六节：同仇敌忾
  content: '第六百八十六节：同仇敌忾

    　　“囚谷的南华荆，遭到神秘蛊仙的偷采，损失大半。”

    　　“红河滩地上的仙阵被破坏，里面的赤火石被三位蛊仙联手劫掠一空。”

    　　“有人想要盗取落天河中段的混元沙，被天妒楼特意留下来的一记仙道杀招击退。”

    　　……

    　　紫薇仙子坐镇天庭，纵观中洲全局，一个个消息传来，令她眉头越皱越紧。

    　　她心中气愤。

    　　偌大的中洲，物产丰富，人文荟萃，乃是天庭领袖中洲十大古派，历经沧桑'
