- chapter: 689
  title: 第六百九十四节：左路无极
  content: '第六百九十四节：左路无极

    　　天庭。

    　　原本的彻白天空中，却是闪烁着七彩霞光。

    　　一座巨大的仙蛊屋横霸高悬。

    　　好一座仙蛊屋！

    　　它是三层圆坛，恢弘大气。坛上望柱重重，白玉栏杆间总有霞光映照。

    　　正是八转运道仙蛊屋——劫运坛。

    　　当年，巨阳仙尊亲创，掌管的三大仙蛊屋之一。

    　　原本劫运坛是镇压长生天的底蕴，但这一次长生天方面进攻天庭，竟是将它都出动参战了。

    　　如此举措，显示出长生天志'
