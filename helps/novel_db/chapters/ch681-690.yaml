- chapter: 688
  title: 第六百九十三节：武庸vs陈衣
  content: '第六百九十三节：武庸vs陈衣

    　　轰！

    　　一声巨响，天地瞬变。

    　　武庸一马当先，率领南联诸仙杀破第五阵，来到第六阵。

    　　第六阵中，一片黑沉之色，一眼望不见边际。

    　　南疆诸仙置身其中，体型渺小如蚁。

    　　“这是宇道大阵！”一位罗家的蛊仙忽然开口。

    　　他一副南疆传统服饰，脸皮青白，神色冷酷，乃是罗家大将，名传南疆，拥有七转巅峰战力。

    　　他姓罗名然，专修宇道，造诣雄浑身后。

    　　“不错，这的'
