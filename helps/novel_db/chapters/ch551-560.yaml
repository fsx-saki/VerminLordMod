- chapter: 554
  title: 第五百五十七节：方源动手
  content: '第五百五十七节：方源动手

    　　陈衣展露出真正的实力，天庭一方局面大优。更让方源忧虑的是，他们这些人显然都未动用全力。

    　　就算是最卖力气的陈衣，也没有祭出因果神树杀招呢。

    　　“陈衣就算不是紫山真君、龙公之流，也是八转中一等一的强者了！紫薇仙子、雷鬼真君亦都如此，凤九歌也绝不容小觑。只有我出马了！”

    　　太古石龙、银色巨人被陈衣一人压制，超级仙阵也抵抗着凤九歌、紫薇仙子，琅琊一方只有方源这个八转战'
