- chapter: 555
  title: 第五百五十八节：阎罗战场
  content: '第五百五十八节：阎罗战场

    　　上古剑蛟变！

    　　魂爆！

    　　力道大手印！

    　　万蛟！

    　　方源几乎爆发了全力，对紫薇仙子施展猛攻。

    　　紫薇仙子哈哈一笑：“方源，你技穷矣。”

    　　她同样连续施展杀招，分门别类，招招精妙，竟是将方源的种种手段都接住！甚至还有克制和破解。

    　　方源的这些手段，都早已经曝光许久。紫薇仙子一直在收集情报，早就做出许多推算，开创了许多专门的克制应对的手段。

    　　这就是智道蛊'
