- chapter: 551
  title: 第五百五十四节：来不及
  content: '第五百五十四节：来不及

    　　时光匆匆流逝，转眼又过了小半个月。

    　　这一天，方源身影从云城中，电射而出。笼罩整个琅琊福地的仙阵，猛地一转，便带出一记金光，将方源罩住。

    　　金光一闪即逝，方源消失原地，再一次出现时，已经远在千里之外的一处荒地上了。

    　　这些天来，方源又改良了超级仙阵，使其拥有挪移他物的威能。

    　　这是因为之前，凤九歌围魏救赵，四处屠戮毛民，琅琊地灵心疼不已，却无可奈何。

    　　琅琊地'
