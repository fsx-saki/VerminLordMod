    　　“好！”见到这一幕，方源大喜。

    　　天庭蛊仙虽然强大，但他们多数在仙墓中沉眠，不到万不得已，绝不苏醒。因为他们几乎用尽了延寿之法，本身寿命有限，活不了多久就会老死。'
