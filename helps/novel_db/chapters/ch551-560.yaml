- chapter: 552
  title: 第五百五十五节：星投
  content: '第五百五十五节：星投

    　　天庭入侵，骤然见到四位蛊仙，方源的瞳孔猛地缩成针尖大小。

    　　饶是他见多识广，经历无数，此刻也感到有些难以置信！

    　　“竟然还有这种手段？一下子将四位八转蛊仙，都传送进来！若非我们第一时间打散那团黑暗漩涡，恐怕还有更多蛊仙进入这里。”

    　　凤九歌虽然不是真正的八转，但一身道痕已经是八转水准，因此方源把他算作八转蛊仙，也未尝不可。

    　　八转蛊仙一身道痕雄浑无比，要传送这样的'
