- chapter: 559
  title: 第五百六十二节：天庭招降
  content: '第五百六十二节：天庭招降

    　　雷鬼真君一回到战场，激战中的双方脸色都为之一变。

    　　天庭诸仙面上皆有喜事浮现，方源等人却都面色一沉。

    　　双方战得难解难分，这个时候，天庭一方增添一个八转战力，且又是一流强者，对于整个战局的影响，无疑是天翻地覆！

    　　但雷鬼真君的汇报，旋即就让紫薇仙子目光阴沉下来：“什么，没有发现智慧蛊？”

    　　智慧蛊虽是被星宿仙尊炼化过，炼化的过程也记载在了星宿真传当中，紫薇仙子'
