- chapter: 553
  title: 第五百五十六节：陈衣
  content: '第五百五十六节：陈衣

    　　银色巨人高大威能，伸开双臂，向中洲四位蛊仙横扫，瞬间掀起一股狂风气浪。

    　　陈衣眼中精芒暴射，冷哼道：“让我来！”

    　　和银色巨人比起来，他身躯单薄渺小，但气势狂涌而出，一瞬间就和银色巨人分庭抗礼。

    　　仙道杀招——捆仙藤！

    　　陈衣伸手一指，无数碧绿光线，蜿蜒流转，迅速攀附在银色巨人身上。

    　　银色巨人拳势威猛，受着一道道的碧绿光线阻挠，速度陡降，方向窜改，轰的一声砸在'
