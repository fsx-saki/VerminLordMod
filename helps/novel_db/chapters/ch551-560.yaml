- chapter: 558
  title: 第五百六十一节：命甲
  content: '第五百六十一节：命甲

    　　“竟然没有死？这是什么仙蛊！”方源双目微瞪，看着漂浮在半空中的凤九歌。

    　　凤九歌七窍都被震得喷血，但身上却是覆盖了一层薄薄的光甲，就是这层光甲将他性命护住，令他在太古阎罗的魂爆之中成功生还。

    　　“八转仙蛊——命甲。”凤九歌咳嗽出声，嘴角裂开，鲜血横流。

    　　方源脸色阴沉如水。

    　　他是第一次亲眼见识到命甲仙蛊，虽然之前凤九歌也在光阴长河中用过一次，但那次方源只是陷害凤'
