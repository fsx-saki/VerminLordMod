    　　“啊啊啊啊！”琅琊地灵咆哮怒吼，领袖一干毛民蛊仙，驱动天婆梭罗。

    　　银色巨人扑杀过去，一记记仙道杀招发出，照准天庭蛊仙狂轰滥炸。

    　　攻势狂猛'
  - '蛊仙一脸懵懂，他们也不知道这张底牌是什么，琅琊地灵则诧异地望了方源一眼：“不错，这就是盗天魔尊的八转偷生仙蛊！你居然也知道？”

    　　方源心头一震，琅琊地灵手中居然就藏着偷生仙蛊。

    　　方源知道偷生蛊，还是在盗'
  - '手之力，雷鬼真君铠甲破散，缩成一团。陈衣、紫薇仙子接连吐血，凤九歌更是不堪，面白如纸，咬紧牙关，依靠命甲仙蛊死撑！

    　　四海皆准杀招，本质上还是炼道，发动整个琅琊福地中的炼道道痕，这是长毛老祖一身的积累。'
  - '住，我方蛊仙也都中招了。”方源看向自己，他也是满头华发，苍老不堪。

    　　不过没有关系，他有四千多年的寿蛊。当即用了多只，又恢复成少年模样。

    　　至于其他异人蛊仙，本身就比人族长寿得多，就算没有延寿法门，也'
