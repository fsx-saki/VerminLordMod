- chapter: 560
  title: 第五百六十三节：雷鬼陨！
  content: '第五百六十三节：雷鬼陨！

    　　琅琊地灵一脸肉疼之色。

    　　他望着不断下降的海平面，眉头紧皱，心在滴血。

    　　这海水看似普通平凡，其实不然，乃是长毛老祖晚年期间，精心打造成的炼水。眼下只是一海的存量，若是有四海，就能通过秘法，使得量变引发质变，形成人造的天地秘境！

    　　为此，长久以来，琅琊福地就寄托在月牙湖中，通过那里的水道环境，再利用仙劫锻窍杀招，引来水道灾劫，为琅琊福地增添水道道痕。

    　　但现在'
