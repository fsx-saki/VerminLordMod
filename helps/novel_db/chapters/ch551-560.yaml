- chapter: 556
  title: 第五百五十九节：方源VS九歌
  content: '第五百五十九节：方源VS九歌

    　　轰隆隆！

    　　超级仙阵运转，催发出无数雷霆，打向紫薇仙子、陈衣。

    　　开战以来，这座超级大阵不是被凤九歌、紫薇仙子联手压制，就是和凤九歌僵持，此刻终于展露威能。

    　　陈衣连忙防御，有些狼狈。

    　　琅琊地灵见机，立即驱动银色巨人，硬抗巨木神像的攻击，猛攻困住上古石龙的古木囚笼。

    　　紫薇仙子迅速思考了一番，选择出手，一面反攻超级仙阵，另一面则是推算阎罗战场，对陈衣不'
