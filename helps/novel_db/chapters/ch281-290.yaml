  title: 第二百八十四节：喜获仙蛊
  content: '第二百八十四节：喜获仙蛊

    　　武家的七转蛊仙武雨伯，败于炎荒仙人之手。

    　　这件事情，在夏家有心的宣传之下，很快就被整个南疆蛊仙界得知，一时间人心浮动！

    　　“武雨伯乃是七转强者，武家著名的战力，居然会败给了炎荒仙人？”

    　　“炎荒仙人本来也战力不低，这一次更是得到了夏家资助，战胜武雨伯并非不可思议之事啊。”

    　　“武雨伯心高气傲，这一次栽在手下败将手中，令人诧异。”

