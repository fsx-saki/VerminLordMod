  title: 第二百八十二节：创造机会入地沟
  content: '第二百八十二节：创造机会入地沟

    　　轰！

    　　一声巨响，爆炸的威力倒是不大。

    　　漫天的星光如翩翩蝴蝶，在密室中悠扬飘飞。

    　　如此美景之下，方源的脸色却是难看得很。

    　　“又失败了。这一次炼制星念仙蛊，居然连三分之一的进度都没有……”方源叹了一口气，长袖一拂，顿时云消雨散，星光骤然消失无踪，偌大的密室又恢复了炼蛊前的平静。

    　　这是北原僵盟分部的密室。

