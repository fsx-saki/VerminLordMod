  title: 第二百八十五节：金刚念
  content: '第二百八十五节：金刚念

    　　这只金刚念仙蛊，有拳头大小，外表宛若琉璃，半透明，闪烁着金灿灿的光，卖相极佳。

    　　方源握在手中，感觉沉甸甸的，仿佛握着一团实打实的黄金。

    　　双方交接很顺利，过程很短。

    　　当方源成功炼化了这只金刚念仙蛊之后，武雨伯的意志就辞别了方源，直接飞走。

    　　就这样获得了一只六转仙蛊，却没有让方源感到意外。

    　　他对武家有功！

