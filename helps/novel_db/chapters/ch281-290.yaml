  title: 第二百八十七节：惊喜收获
  content: '第二百八十七节：惊喜收获

    　　咻——！

    　　方源好似一支离弦之箭，在半空中拉开气浪，飞速前行。

    　　下方，是漫山遍野的仙材，但方源已是看都不看一眼。这些“死亡”的仙材，毫无价值可言。

    　　忽然，方源目光微微一凝。

    　　在地平线上，陡然出现了一头荒兽。

    　　这头荒兽大如小山，趴在地上，一动不动，赫然就是一头藏经鼋。

