- chapter: 282
  title: 第二百八十三节：卜卦龟显威
  content: '第二百八十三节：卜卦龟显威

    　　南疆，武家。

    　　大殿中，不仅有方源、武庸，还有另外一位蛊仙。

    　　他身材欣长，一身黑白作色的大氅，胡须柔顺，垂至胸口。一双眼睛细长，眸中蕴藏神光，周身更是萦绕着微微水汽。

    　　武家蛊仙武雨伯，生性高傲，七转修为，巅峰战力，比起树翁巴德也只差稍许。

    　　“蛊仙炎荒挑战雨伯，实际上却是夏家想要图谋拜月碗。这处地方盛产月道蛊虫，乃是我家最重要的产出地之一，绝不容有失。”'
