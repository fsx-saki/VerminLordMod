  title: 第二百八十六节：仙材的尸海
  content: '第二百八十六节：仙材的尸海

    　　这样的巨型蛊阵，要破解开来，至少数月的时间。

    　　若是只要撕开一个口子，也需得一个月左右。

    　　方源一面手指如花般绽放，无数蛊虫四下飞舞，破解着眼前的蛊阵，一面双耳频频颤抖，侦查手段催至巅峰，夜叉章鱼王已经快要回来。

    　　时间不等人！

    　　争分夺秒！

    　　“就是这一击。”方源眼中突然神光一闪，眼前的空气中忽然散射出氤氲的光雾。

    　　透过光雾，他看到巨型蛊阵中的一角。'
