  title: 第二百八十八节：多重复合蛊阵
  content: '第二百八十八节：多重复合蛊阵

    　　方源按捺住兴奋之意。

    　　手中仙材的品质之高，即便是他前世，也从未得过。

    　　准九转的炼蛊仙材，道痕之多，逸散华光，甚至能肉眼观察出来。

    　　方源炼蛊纵然不是宗师级数，但也明白一点，那就是仙材之所以能够炼成仙蛊，是因为仙材本身蕴含着丰富的道痕。

    　　人是万物之灵，蛊是天地真精。

    　　蛊是大道的载体，为什么能够有威能？就是因为小小蛊虫的身上，蕴含着更多的道痕。'
