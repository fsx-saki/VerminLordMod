  title: 第二百八十二节：卜卦龟变化
  content: '第二百八十二节：卜卦龟变化

    　　南疆，武家。

    　　方源以“武遗海”的模样，踏足南疆之后，便一路兼程，回到武家大本营。

    　　得知他的到来，武家当代太上大长老武庸立即召见。

    　　“兄长，这是之前商借族中的仙蛊，如数奉还。”方源将仙蛊双手奉上。

    　　武庸接过来，身居主位，面带微笑：“二弟此去东海，可还顺遂？”

    　　每个蛊仙都有自己的秘密，尤其是对于武遗海这样特殊身份的存在，武庸也不好过多的探听方源。这番'
