  title: 第二百八十六节：仙蛊名缰
  content: '第二百八十六节：仙蛊名缰

    　　其中有一只仙蛊名缰，乃是罕见的信道七转仙蛊，倒是让方源颇为心动。

    　　毕竟他在信道方面，实在是个弱项，很大程度上制约了他的发展。

    　　名缰仙蛊的效用也很奇特。

    　　催动起来后，它能化成一道缰绳，束缚任何荒兽、荒植，乃至上古荒兽、荒植。

    　　没错，它虽然是信道仙蛊，但却是奴道的效用。

    　　很特殊，也很奇妙。

    　　让方源最动心的是，这只名缰仙蛊的威能，随着蛊仙本人的名望，'
