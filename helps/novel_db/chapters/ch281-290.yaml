    　　它深深地皱起眉头，十多根巨'
  - '在一起。

    　　总价值都一时难以估算，方源只知道这个数字很庞大，很庞大。

    　　若是依靠自己目前月入两千仙元石的速度，去积累的话，花费上千年时间都未必有此成果。

    　　毕竟还要算上修行的损耗。

    　　蛊仙修行越高，'
  - '方源舒了一口气，立即返身撤退。

    　　上古荒兽夜叉章鱼王在地洞中，穿梭得好似地铁。周围滑腻的地沟黑油，让它如鱼得水。

    　　方源几乎和它擦肩而过。

    　　这头夜叉章鱼王回到自己的住处，优先扫视了一番。'
