  title: 第二百八十四节：夜叉章鱼和口蚯
  content: '第二百八十四节：夜叉章鱼和口蚯

    　　在沉默中，方源等仙僵，已经深入到地沟深处，距离地表有四万多丈的距离。

    　　虽然尽量避免去战斗，但大大小小的战斗，也足以进行了十六场。

    　　仙僵们或多或少，都身负了一些伤势。

    　　“不能再往下深入了。”夜叉龙帅道，“这种深度，已经是地壳蜗牛的活动范围，我们往四周探索。”

    　　北原僵盟分部，最多探查到五万多丈的深度。

