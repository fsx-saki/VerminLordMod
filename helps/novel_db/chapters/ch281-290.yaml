  title: 第二百八十三节：终入地沟
  content: '第二百八十三节：终入地沟

    　　地壳蜗牛生活在地沟的极深处，也只适合生存在那里。

    　　依照方源所说，要收集星夜黏涎，必须得深入地沟，寻找到地壳蜗牛，在它身后即时作业，对你地壳蜗牛爬行之后，在地上残留的黏涎进行处理加工。

    　　加工完之后，还必须在很短的时间内，将星夜黏涎收集起来。

    　　这其中的难度，相当大，危险性也很高。

    　　地壳蜗牛，性情温顺，接近它并不困难，甚至可以站在它的背上，对它进行轻微的攻击'
