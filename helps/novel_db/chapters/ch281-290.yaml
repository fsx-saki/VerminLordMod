  title: 第二百八十七节：四季茶
  content: '第二百八十七节：四季茶

    　　天空阴沉，下着绵绵细雨。

    　　方源飞在空中，身边一片云雾缭绕。

    　　“到了。”他心念一动，降下高度，视野中云雾渐消，露出苍莽大地。

    　　南疆多山，方源脚下大地亦是群山林立，数目茂盛，一片深绿。

    　　在这深绿的海洋当中，广寒峰独树一帜，洁白一块，矫矫不群，和周围形成鲜明对比。

    　　广寒峰巅，立着一座凡蛊屋，蛊屋门口，夏家两位蛊仙夏飞快、夏琢磨已感知到了方源的行迹。

