    　　方源故技重施，又将剩下的夜叉章鱼，努力勾引出去。

    　　“糟糕！又来了一头上古级的夜叉章鱼，还有十头荒兽章鱼。它们几乎倾巢出动了！”夜叉龙帅陷落在混战之中，看到夜叉章鱼的援军，简直苦不堪言。

    　　这是什么仇，什么怨？

