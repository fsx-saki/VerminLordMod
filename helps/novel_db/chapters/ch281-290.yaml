  title: 第二百八十九节：切磋
  content: '第二百八十九节：切磋

    　　切磋？

    　　话说的冠冕堂皇，其实就是一言不合，直接干架啊。

    　　但是这次干架，和魔道激斗不同。魔道交战，是打生打死。正道蛊仙，往往都是家大业大，平白无故干什么拼个你死我活？分出个高下即可了。

    　　这也是方源故意拖延，让广寒峰的事情迟迟决定不出结果，所以夏家两位蛊仙便决定用拳头说话，快刀斩乱麻。

    　　其实就算是地球上，谈不拢后，强大的国家也会把军队开过去。

    　　本质是一样的'
