- chapter: 176
  title: 第一百七十六节：牺牲的觉悟
  content: '第一百七十六节：牺牲的觉悟

    　　“方源家老，你残杀王老汉一家的事情，是属实的么？”主位上，古月博沉声问道。

    　　所有的视线都集中在方源的身上，少年家老冷笑一声：“的确是属实的。”

    　　古月方正心情沉痛地闭上双眼。

    　　他虽然斩杀了许多电狼，但从未伤及人命。在他听到方源亲口承认的这一刻，他忽然觉得自己的亲哥哥是如此的陌生和疏远。

    　　这种疏远，有夹杂着狠辣手段的畏惧，还有自己被无辜殃及的愤怒。'
