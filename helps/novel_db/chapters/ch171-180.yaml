  title: 第一百七十一节：骨子里的魔性
  content: '第一百七十一节：骨子里的魔性

    　　“什么，爹，你让我来破案？”少女手指自己，满脸的惊愕之色。

    　　“怎么，你不愿意？”铁血冷微笑着。

    　　“愿意，当然愿意了！”铁若男反应过来，雀跃地道。

    　　铁血冷点点头，轻叹着，语气复杂：“你立志要走上和我一样的路，这几年来你跟在我的身边，也耳濡目染了许多东西。雏鹰只有独立飞翔，才能真正的成长起来。爹我已经老了，受的这伤，也治不好。更不能陪你走完你的一生，一代新'
