  title: 第一百八十节：再看开窍大典
  content: '第一百八十节：再看开窍大典

    　　“时候差不多了，不能再等了。”

    　　夜幕早已降临，黑暗的房间中，方源睁开双眼。

    　　他已经褪下蛊师服，穿了一身黑袍，遮住腿脚。再配合他养起来的黑色长发，走在黑夜里，宛若幽灵。

    　　他在前世，就已经习惯长发。有些蛊虫，需要长发，威力才能体现。譬如黑鬓蛊，钢鬃蛊等等。

    　　长发很方便，有时候需要改头换面，他就会将长发剪短。但短发只能靠蛊虫的力量，才能在短时间内生长。'
