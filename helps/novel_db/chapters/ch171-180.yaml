  title: 第一百七十九节：他死了
  content: '第一百七十九节：他死了

    　　很快，方源就冷静下来。

    　　第二空窍蛊只是一个希望，要想实现它，还得需要谋划和努力。

    　　“炼制第二空窍蛊，不管成功与否，都会将大部分的仙元消耗掉。没有了仙元，就无法抗衡接下来的地灾天劫，也就是说，即便我成为福地的主人，这片福地也已经无法挽救，必须舍弃。”

    　　“所以，第二空窍蛊就是我此行的最大收获。”

    　　但整个事情，并非那么简单单纯。现在方源面对的局面十分复杂。'
