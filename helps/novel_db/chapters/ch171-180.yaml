- chapter: 173
  title: 第一百七十三节：白相仙蛇
  content: '第一百七十三节：白相仙蛇

    　　暮云收尽溢清寒，银汉无声转玉盘。

    　　白凝冰透过窗棂，遥望夜空。

    　　一轮明月，晶莹剔透，悬挂在夜幕之中。远山时不时传来的几声狼嚎，为这月光平添几分凄凉。

    　　书房中，白家族长就坐在一旁，此时脸上显露出失魂落魄的神色。

    　　就在刚刚，白凝冰将北冥冰魄体的事情，告知了他。

    　　“北冥冰魄体……十绝资质……”白家族长口中喃喃不断。

    　　“我已感到时日无多，空窍已经渐渐不堪'
