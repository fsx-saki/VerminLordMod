  title: 第一百八十节：终过关，方源索要仙蛊
  content: '第一百八十节：终过关，方源索要仙蛊

    　　这一次，斗空蛊维持的时间比之前要长得多。

    　　足足半天的功夫，斗空这才消失，庞大如山的飞熊虚像再次出现在众人的眼前。

    　　“糟糕，果然如猜想的那样！”孙湿寒失声道。

    　　“哼！”黑楼兰的表情亦是难看至极。

    　　飞熊虚像浑身无伤，雪白的毛皮上流淌着炫目的光晕。它目光有神，战意高昂，却似完全恢复了状态。

    　　飞熊身上，有一只五转治疗蛊，这是已经探查清楚的情报了。'
