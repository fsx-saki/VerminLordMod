- chapter: 178
  title: 第一百七十八节：黑白灰
  content: '第一百七十八节：黑白灰

    　　曾经，在方正心中，方源如一座高峰，高得无法攀登。

    　　曾经，方正以为，这座高峰的阴影，将笼罩他一生。

    　　但生活带给了他意想不到的转机。

    　　方源的颓废，让方正看到了他的软弱。方正心目中的高峰，坍塌了。

    　　然而——

    　　原来这只是哥哥的一场表演，一场戏？

    　　原本心中已经倒塌的高峰，此刻却仿佛笼罩上了一层神秘的雾。

    　　“哥哥，你究竟是什么样的人呢？”

    　　方正这才发'
