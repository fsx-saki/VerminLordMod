- chapter: 173
  title: 第一百七十三节：地灵——蛊仙之殇
  content: '第一百七十三节：地灵——蛊仙之殇

    　　中洲，狐仙福地。

    　　一座高大的水晶山川，矗立在福地的中央。

    　　它名为荡魂山，通体粉红，散发着梦幻的色彩。

