  - 彭达魂魄迟疑了一下：‘这个东西叫我怎么解释呢？你不是天外之魔，不能理解什么叫做电路。’
- chapter: 172
  title: 第一百七十二节：非方源莫属！
  content: '第一百七十二节：非方源莫属！

    　　酒席上，一时间鸦雀无声。

    　　所有人都愣住，呆呆地看向方源。

    　　他们没有想到方源这么回答，直接承认，还如此坦诚。

    　　“还是太年轻啊，居然这种话都说出了口。”

    　　“哼，这话一说，就意味着整个政治前途的毁灭。”

    　　“今后这方源再也不足为虑了……”

    　　家老们心中思绪翻腾。

    　　狼潮进行到这里，大局已定了。接下来的几个月内，只会有小股狼群出没，并且随着狡电狈的不'
