  title: 第一百七十八节：炼仙蛊！
  content: '第一百七十八节：炼仙蛊！

    　　一群矮小的红蛋人，包围着方源，不断进攻。

    　　“咦？这个天魔是傻子，怎么一动都不动呢？”

    　　“要是天魔都这么傻，就好了！”

    　　“不要掉以轻心，天魔都是极为狡诈的，快把他杀掉。”

    　　眼看着方源就要杀死，红蛋人们都发出胜利的欢呼声。

    　　但就在这个时候，忽然一股无形的力量骤然降落，将方源席卷！

    　　陷入重重包围，已然濒死昏迷的方源，就这样突然消失不见。留下一地惊愕至'
