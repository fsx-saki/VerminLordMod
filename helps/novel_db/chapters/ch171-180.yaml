  title: 第一百七十四节：利大于弊时济运
  content: '第一百七十四节：利大于弊时济运

    　　时济运杀招，虽然不用消耗自身寿命，又能在运道上有所增益，但却有两大弊端。

    　　第一大弊端，便是残魂反噬。因为仙道杀招的缘故，残魂十分凶恶，魂战凶险，偏偏又不能动用任何魂道手段，只能凭借自身魂魄硬磕。因此就算是魂道蛊仙，魂战之后，魂魄往往又会受伤惨重。

    　　第二大弊端，则是仙体经历时间，每一个月只能动用一次时济运。

    　　什么是仙体经历时间？

    　　福地、洞天和外界的'
