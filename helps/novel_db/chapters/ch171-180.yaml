    　　“父亲，你是怀疑方源吗？”铁若男愣了一下，旋即又道，“他是很理智很聪明的人，为我们介绍山寨时，说的每一句话都恰到好处，条理分明。嘶……”

    　　铁若男忽然微微抽了一口冷气。

    　　她皱起眉头：“刚刚没有觉得，但是父亲你现在一提醒，我发现了！这个方源太会说话了，他说的每一句话，都是客观事实，抛弃了个人感情。站在旁观者的角度'
