    　　铁若男读着这行内容，双眼却渐渐地黯淡下来。

    　　“可惜。这花酒行者是被当场击毙，不可能留下传承了。若是他能留下传承，这时间刚好对上呢。”少女心中叹息。

    　　她并不放弃，又将古月史典细心翻看，直到时间耗尽，古月'
