  - '。

    　　李飞乐只是一个引子，接下来的一个月里，陆续有成名的蛊师登上三叉山。

    　　有奴道蛊师章三三，在三转巅峰时，就斩杀了四转蛊师，如今是四转中阶，人称驭兽大师。

    　　有正道高手陶子，手中有闻名南疆的五转治'
  - '仙蛊擅长攻伐，若用出来，就是攻打狐仙传承，却是不美。”

    　　“我虽有保护魂魄的防御仙蛊，但弟子们却无仙元催动。否则，狐仙传承必属于门派。”

    　　“情况还没有定下来。仙鹤门的这个弟子，有了寄魂蚤的帮助，可以'
  - '地当中的人，岂不是很危险吗？”铁若男又问道。

    　　“不错。”铁慕白点点头，“福地消弭的那一刻，会刮起大同风，和天地融为一体，福地中的一切，都会还原成天地间的最基本的元气。此风威能浩瀚，能扫荡一切尘埃，就算是'
  - '仙蛊。

    　　方源前世五百年，成就蛊仙。为了炼制第一只六转春秋蝉，花费了无数时间和精力，刚一炼成，就被正道围攻，主要目的就是抢夺这只仙蛊。

    　　现场的这十大蛊仙，因为背靠各自门派，有些积蓄。但手头上，也只是'
  - 感悟。福地的确在变得衰弱，但距离毁灭还有一段时间。在这段时间里，福地中的天地伟力会越来越弱，对于我们蛊师的限制也会渐渐减少。慢慢地，我们可以动用一两只蛊虫，然后三四只，五六只……到最后阶段，福地漏洞百出，
  - '意进出。”

    　　铁慕白遥望远方，目光深邃，充满了智慧，仿佛已经望见了未来。

    　　“到了最后阶段，才是三王传承的大决战。来自福地的压制，几乎没有了，任何人都可以发挥出自己的全部实力，尽情地去掠夺、战斗。到那个时'
  - '的整个视野，都在天旋地转，灵魂被压榨到极限，他甚至连思考的能力都丧失了。

    　　恍惚间，他听到空窍中，寄魂蚤传来的声音：“好，很好，我的好徒儿，你坚持到了这一步，真的很不容易。你成功了，接下来就看为师的吧！”'
  - '决战。来自福地的压制，几乎没有了，任何人都可以发挥出自己的全部实力，尽情地去掠夺、战斗。到那个时候，三叉山上就远不止三位五转蛊师，那才是真正的风云会聚，龙蛇起陆。”

    　　铁若男灵光乍现，恍然大悟。

    　　她终'
- chapter: 177
  title: 第一百七十七节：方源主动寻死
  content: '第一百七十七节：方源主动寻死

    　　三叉山峰顶，赤、蓝、黄三道光柱，矗立在众人面前。

    　　和原先相比，明眼人都可以看得出来，这三道光柱已经暗淡了许多倍。同时体积也缩减，不足原先的一半。

    　　这道传承于上古的蛊仙福地，已经步入到了黄昏。之前被三王改造，如今渐渐的难以承受，这无数蛊师不断的勘探和掠夺。

    　　它就如一艘正在沉没的船，海水已经淹没了一大半，只剩下旗杆和一些上层的甲板，还暴露在空气当中。'
