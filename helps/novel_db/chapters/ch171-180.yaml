    　　此战的结果，是正魔两道共同竞争三王传承。但明眼人都可以看得出来，铁慕白游刃有余，根本没有使出全力。

    　　“不错，能在这么短的时间内，就掌握'
  - '佩和尊重。

    　　就在半个月前，这位铁慕白老人，以一敌二，大战魔道两位五转强者。

    　　他先是利用五转的点金蛊，轻松地和两大魔头周旋。之后，又动用五转的金汤蛊，使两大强敌知难而退，战意削弱，最后各自罢手。'
- chapter: 176
  title: 第一百七十六节：群雄并现
  content: '第一百七十六节：群雄并现

    　　“想不到连福地都会毁灭……”铁若男听了这般秘闻，轻声叹息。

    　　“天底下岂有不灭的存在？天道循环，万物竞法，在偌大的乾坤之中，我们凡人宛若海底里的一捧沙石，渺小至极。唯有晋升成蛊仙，才算是超凡脱俗，有了根基，成沙石变成海岛，能抗衡海浪波澜。”铁慕白的语气，饱含感慨。

    　　“那福地面临毁灭，身处在福地当中的人，岂不是很危险吗？”铁若男又问道。

    　　“不错。”铁慕白点点头'
