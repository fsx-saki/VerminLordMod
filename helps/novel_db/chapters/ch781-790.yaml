    　　五禁玄光气已经彻底演练纯熟。方源甚至加以'
  - '，更倾向于谋略。他不是一个莽夫，只有需要做拼杀的时候，他才会举起屠刀，并且毫不怯弱畏惧。

    　　当然，蛊师世界和地球终究是有本质上的不同的——通过修行，个人的力量能够凌驾于集体和组织之上！

    　　因此，就有幽'
  - '出现。

