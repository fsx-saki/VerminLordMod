  content: '第七百九十三节：看到天庭

    　　这地脉仙蛊形如蚯蚓，但握在手中，却很沉甸甸，一点都不滑腻冰冷，反而温润暖人。

    　　它通体半透明，就像是一个褐色的琥珀，十分精致。

    　　有了这只七转土道仙蛊，方源就可以组建五界大限阵了。

    　　关于五界大限阵的改良，方源的宙道分身已经顺利完成了。智慧光晕一如既往的给力，同时方源的阵道、律道底蕴也是有力的支撑。

    　　新的五界大限阵，方源不仅增添了地脉仙蛊，而且还有阵灵、阵旗'
