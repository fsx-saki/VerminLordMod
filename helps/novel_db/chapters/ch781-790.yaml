  content: '第七百九十一节：舆情汹涌

    　　顺着光阴支流，方源等人回到了南疆。

    　　尽管群仙状态极好，斗志昂扬，但战后休整还是必要的。

    　　“此战收益其实还不错。”方源检查了一番打捞上来的尸体。

    　　除了八转蛊仙清夜之外，这些中洲七转的蛊仙，大多来自于中洲十大古派，本身还不够加入天庭的资格，所以仙窍也没有贡献上去。

    　　绝大部分的蛊虫都被摧毁了，但这些仙窍却是实打实的。

    　　还有一两只仙蛊，是两座仙蛊屋被毁后，'
