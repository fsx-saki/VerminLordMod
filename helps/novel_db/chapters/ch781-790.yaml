  - '亭的防护，四旬子在方源面前完全丧失了还手之力。不一会儿，就被方源全部杀死。

    　　他们还是七转修为，和刘浩一样，没有加入天庭，保留了自身仙窍。

    　　仙蛊却是已被他们毁掉。

    　　方源刚刚将他们的尸首，还有散落'
  - '九十节：紫薇迷茫

    　　“它冲过来了！”

    　　“快挡住它！！”

    　　“把今古亭的威能催至最强！”

    　　四旬子心头乱颤，将今古亭催得嗡嗡作响，亭中的屏风冒出浓浓青烟，亭子暴射出的光柱简直要凝如实质。

    　　万年斗'
