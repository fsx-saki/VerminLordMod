- chapter: 782
  title: 第七百八十七节：龙人分身
  content: '第七百八十七节：龙人分身

    　　至尊仙窍，小赤天。

    　　一座大阵正在嗡嗡地轰鸣，以白凝冰为首的异人蛊仙们严阵以待。

    　　呼啦！

    　　巨大的潮水声起，随后一头太古年兽冲出大阵绽放出的银白光辉。

    　　“这是一头太古年猪！”白兔姑娘当即兴奋低呼。

    　　“很好，年华池中正缺这种年兽呢。”一旁，妙音仙子神情振奋。

    　　没有什么可说的，大战开启。

    　　众仙驾驭着万年斗飞车，杀向太古年猪。

