- chapter: 783
  title: 第七百八十八节：突破荒魂
  content: '第七百八十八节：突破荒魂

    　　至尊仙窍。

    　　魂道的大阵已是铺设妥当。

    　　这座大阵悬浮在半空之中，大约覆盖了三里方圆的范围。

    　　大阵散发出来的晦暗光辉，仿佛是一个巨大圆饼，边缘厚，中间薄。

    　　阵内阴风四起，温度暴降，而阵外却是一如往常。

    　　方源神念探索了好几遍后，心底满意：“这大阵乃是由魂道杀招改良而出，比杀招更加稳定，人在操纵时也会更加细腻精妙。”

