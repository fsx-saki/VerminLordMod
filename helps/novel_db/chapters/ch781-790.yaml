    　　有了阵灵'
  - '运道方面的实力，收效是显而易见的高。

    　　至于运道仙材，虽然罕见，难以收集，但是方源有着那么多的南疆正道蛊仙可以敲诈。

    　　这些运道仙材筹备过来，方源就让那些毛民蛊仙炼制。

    　　因为不是升炼仙蛊，而是炼制'
  - '超过一半的种数，但未来能否筹集全部，方源也说不准，这点要看运气。

    　　为了增强自身运道，方源开始命令毛民蛊仙，着手炼制运道仙蛊。

    　　方源手中的仙蛊数量很庞大，早已经突破一百大关，但运道仙蛊并不多。'
  - '出乎意料的，魂魄上的伤势并不严重，伤势轻微，只需要上百只的胆识蛊就能治愈。

    　　“看来我拥有了荒魂之后，魂魄质变，能够承受更强的梦境反噬了。”

    　　方源休整一番，便又继续探入梦境。

    　　同样熟悉的场'
- chapter: 789
  title: 第七百九十四节：勒索梦境
  content: '第七百九十四节：勒索梦境

    　　整个气道梦境的第三幕，方源完全沦为了看客。

    　　不过，当这第三幕完成，整个气道梦境也就消散无踪，方源探索全部完成。

    　　“这梦境前难后易，前面两幕需要不断的失败，积累经验，就算是我有解梦杀招，也不太好用。”

    　　“但到了最后一幕，根本不需要我出手，就直接通过了。”

    　　这是方源沦为看客，最为舒服的一次。若是次次都这么“看”过去，那探索梦境该是一件多么美妙的事情。'
