  title: 第七百八十六节：房家力保
  content: '第七百八十六节：房家力保

    　　万家大本营。

    　　“爹——！你死的好惨呐！”哭泣声在议事堂中回荡，震得在场的蛊仙耳膜都嗡嗡作响。

    　　一位少年披着丧服，涕泪交加。

    　　这人便是万追青，有着六转蛊仙修为，是万良翰的亲身儿子。

    　　万追青此刻跪倒在地上，一时嚎哭，谁都劝阻不了。

    　　堂中，万家的蛊仙一个个眉头紧锁，脸色阴沉，保持着沉默。

    　　万家太上二长老性情仁和，不禁叹息道：“事情竟至于此！我族出动三'
