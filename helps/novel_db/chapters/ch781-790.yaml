- chapter: 785
  title: 第七百九十节：紫薇迷茫
  content: '第七百九十节：紫薇迷茫

    　　“它冲过来了！”

    　　“快挡住它！！”

    　　“把今古亭的威能催至最强！”

    　　四旬子心头乱颤，将今古亭催得嗡嗡作响，亭中的屏风冒出浓浓青烟，亭子暴射出的光柱简直要凝如实质。

    　　万年斗飞车逼近今古亭。

    　　“直接撞过去。”方源冷笑，傲立船首。

    　　但一瞬间，今古亭的拼死反抗，令万年斗飞车的冲势变得十分缓慢。

