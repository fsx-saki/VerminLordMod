  title: 第七百九十五节：破晓剑
  content: '第七百九十五节：破晓剑

    　　光阴长河。

    　　方源驾驭着万年斗飞车，刚刚进入不久，顾六如便主动现身拦截。

    　　“你便是方源？老夫天庭顾六如，此次来取你项上人头。”顾六如端坐在轮椅上，脸色病态苍白，眼中却是寒冷如冰。

    　　说着，一团团灰白光芒，仿佛是流星赶月，朝着方源打去。

    　　轰轰轰！

    　　这些灰白光团砸在万年斗飞车上，被这座八转仙蛊屋尽数拦下。

    　　但万年斗飞车也被炸得剧烈摇晃。

    　　“这人居然是'
