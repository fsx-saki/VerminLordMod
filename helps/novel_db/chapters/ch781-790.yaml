- chapter: 787
  title: 第七百九十二节：伐谋、求道
  content: '第七百九十二节：伐谋、求道

    　　天庭，仙墓。

    　　一丝莫名的变化发生了。

    　　一团火光，起先还很微渺，然而片刻之后，火光就暴涨，弥漫开来，将仙墓的上空尽数染红。

    　　火光映照天地，立即吸引了紫薇仙子等天庭成员的注意。

    　　紫薇仙子当即赶往仙墓的入口，又发现火光充盈之间，又浮现出点点的银白光辉，仿佛是无数钻石，点缀在赤红色的幕布上。

    　　火光消散，一位豪迈的蛊仙老者，一身赤红大袍，昂扬大步，从仙墓深'
