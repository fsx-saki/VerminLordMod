- chapter: 784
  title: 第七百八十九节：光阴长河第一战
  content: '第七百八十九节：光阴长河第一战

    　　仙蛊屋万年斗飞车在光阴长河中行进中。

    　　方源傲立在船首，他背负双手，一身青袍，黑发如瀑，俊秀的脸上一对黑幽深邃的瞳眸，看着周边漫漫波涛，面色一片冷漠。

    　　白凝冰等人则缩在仙蛊屋之内，望着方源周身流转着七转气息，在前方装模作样，有人心里发寒，也有人恍然：难怪方源纵横至今。若是自己有八转修为，早就开始称霸一方，激昂峥嵘，而他却是扮猪吃虎，不放过任何一次诱骗对手的'
