- chapter: 794
  title: 第七百九十九节：气道一步登天
  content: '第七百九十九节：气道一步登天

    　　眼前视野大变，白凝冰定定神，打量四周，心道：“这就是五相洞天？”

    　　刚想着，一股莫名的信息就传到她的心底深处，让她明白了五相的布置。

    　　“原来这片公共洞天，是巡天五相各捐赠了一部分的仙窍融合而成。整个洞天分为五块，各域之间不能流窜，只有最中央的山脉是唯一的。天相杀招就在洞天的最中央，只要是得到门楼承认，被传送进来的蛊仙都有冲击至宝的资格。并且沿途当中，还有巡天'
