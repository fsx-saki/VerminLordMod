- chapter: 792
  title: 第七百九十七节：恐怖兽潮
  content: '第七百九十七节：恐怖兽潮

    　　光阴长河上掀起疾风恶浪。

    　　万年斗飞车不断射出破晓飞剑，宛若暴雨倾盆，始终笼罩在三秋黄鹤台上。

    　　三秋黄鹤台中，诸多中洲蛊仙涌起死志，纷纷对顾六如道：“大人，还请您先撤！”

    　　顾六如神色犹豫。

    　　这些人又道：“中洲可没有我等，但不可没有您啊。眼下的战局太过危险，一起撤退都要被那魔头留下。再者，天庭方面也传达了确切的命令！”

