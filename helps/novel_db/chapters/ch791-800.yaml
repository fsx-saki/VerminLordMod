  title: 第七百九十六节：光阴长河第二战！
  content: '第七百九十六节：光阴长河第二战！

    　　万年斗飞车中，黑楼兰等人看得心驰神摇。

    　　场面极其壮阔，年兽大军浩浩荡荡，从四面八方围杀而来。

    　　“好厉害的杀招！”

    　　“难怪这一招一直都没有在至尊仙窍中催动。”

    　　“吸引过来的年兽太多了，若是在至尊仙窍里，必定会引发浩劫，生灵涂炭。”

    　　天庭一方也是震惊不已。

    　　“万年斗飞车……”顾六如咀嚼着这个名字，面色凝重。

