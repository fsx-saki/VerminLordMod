- chapter: 793
  title: 第七百九十八节：可怜戚家蛊仙
  content: '第七百九十八节：可怜戚家蛊仙

    　　太古白天。

    　　一朵白云看似平淡无奇，却是暗中夹裹着戚家六位蛊仙，似缓实快向前疾飞。

    　　“小心一点，这里可是太古白天，常有太古荒兽出没。”

    　　“目前看来这个路线还是安全的，但仍旧要提高警惕。”

    　　“这一次进入那处洞天，我们就能得到天相了！戚家的复兴和昌盛，指日可待！！”

    　　戚家蛊仙暗中交流，皆是兴奋和激动。

