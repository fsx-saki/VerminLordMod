- chapter: 795
  title: 第八百节：消化气海洞天
  content: '第八百节：消化气海洞天

    　　至尊仙窍。

    　　小白天。

    　　龙人分身微笑着，伸出了手掌。

    　　在他的面前，悬空站立着一头幼鹿。

    　　幼鹿在方源的龙人分身前乖巧地低下头，伸出粉嫩的小舌头，轻轻地舔着龙人分身的手掌心。

    　　“主人。”幼鹿开口，却是人的语言。

    　　它当然不是寻常的鹿，而是气相当年的执念，结合了气海洞天的天地伟力，所形成的气海天灵。

    　　气海天灵形如幼鹿，浑身雪白，双眼大大的，泛着金黄色的'
