  title: 第八百零五节：再掌天相
  content: '第八百零五节：再掌天相

    　　“天庭……”秦鼎菱站在监天塔上，遥看天庭远景，面露缅怀之色。

    　　良久，她轻轻一叹：“变化虽大，但依稀有着我记忆中的轮廓。三十多万年了。”

    　　在她身边站着的便是紫薇仙子。

    　　紫薇仙子神情恭谨。

    　　眼前这位女仙前辈，虽然辈分上不及龙公，但也大得吓人。

