  title: 第八百零四节：天地无正义
  content: '第八百零四节：天地无正义

    　　“酒有毒！”陈族长身躯摇晃，愤怒地望着方源：“单副族长，是你献上来的酒，你想干什么？！”

    　　这变化有点突然，方源呆了一呆。

    　　他还未说什么，身边紧挨着他坐着的蛊师，却是站起身来，呵呵冷笑：“做什么？当然是杀了你，除掉陈家的人。这个山从古至今，都是我单家的，不管你们陈家还是聂家，最初时都不过是我单家的奴仆罢了！”

