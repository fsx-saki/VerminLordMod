- chapter: 798
  title: 第八百零三节：剑道宗师
  content: '第八百零三节：剑道宗师

    　　仙道杀招——金丝剑！

    　　方源大吼一声，催出杀招。

    　　刹那间，无数道金丝从他的身上暴射而出，刺猬一般，向四周覆盖，无差别穿射。

    　　嗤嗤嗤嗤……

    　　他身边的三位蛊仙，骇然失色，想要躲避已经完全来不及，被数以万计的金丝洞穿身心魂魄。

    　　扑通通三声连响，三位蛊仙跌落到地面上，毫无生命气息。

    　　方源大喘粗气，这一番苦战，终于杀得强敌，疲累至极。

