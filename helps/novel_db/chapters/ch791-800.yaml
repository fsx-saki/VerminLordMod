- chapter: 796
  title: 第八百零一节：演练气道杀招
  content: '第八百零一节：演练气道杀招

    　　至尊仙窍。

    　　方源演练着气道的杀招。

    　　数只仙蛊盘旋飞舞，随后大量的凡蛊宛若龙卷风一般，围绕着它们旋转。

    　　大股大股的罡气，参与其中。

    　　八转级数的仙元灌输下去，立即将这些蛊虫的气息连成一片。

    　　但杀招却久久未能放出。

    　　方源额头隐见冷汗，终于十几个呼吸之后，方源险险挽回局面，杀招终于酝酿成功，陡然爆发开来。

    　　气道仙级杀招——天罡布衣！

    　　一套灰白'
