- chapter: 797
  title: 第八百零二节：天庭的正义
  content: '第八百零二节：天庭的正义

    　　血气非常容易获得！斩杀一群凡兽，用血道手段进行抽取，就能收获一大批。在仙窍中豢养荒兽，就有源源不断的仙材血气。

    　　正因为血道资源很容易就能获取，血道才显得可怕，最终被五域正道联合禁止。

    　　换做其他仙材，方正或许会求助门派，但只是血气而已，而且方正本身需求量的也不多。

    　　对于方正而言，获得自己需要的血气，不过是过程麻烦一些，时间浪费一些罢了。

