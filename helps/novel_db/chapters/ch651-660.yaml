  title: 第六百五十五节：不要再这么天真
  content: '第六百五十五节：不要再这么天真

    　　“大师，您这番指点，我终身难忘！”鲛人姑娘一脸肃穆之色，后退半步，对方源振重地鞠了一躬。

    　　方源哈哈大笑：“不枉费我一番苦心。可是有时候知易行难，我问你，你现在最想做什么？”

    　　夏琳迟疑起来。

    　　“我想跟着楚大师您！”这句话第一时间就在她的脑海中升腾起来。

    　　但她还未来得及张口，就见方源摇头道：“你还没有想好，将来有时间好好想吧。其实你想什么，我都不关心'
