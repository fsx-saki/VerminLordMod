- chapter: 652
  title: 第六百五十六节：他是古月方源
  content: '第六百五十六节：他是古月方源

    　　方源五百年前世。

    　　海神祭。

    　　天真？

    　　面对寒潮族长的长篇大论，方源陷入沉默。

    　　但他沉默的时间很短，旋即他轻笑一声，传音回道：“你以为我不知晓你说的这些吗？你觉得我是涉世不深的青年？不，这些把戏我都了解，也都清楚。我知道这些事实，也接受这些事实。”

    　　方源从青茅山被迫出走，辗转南疆，又去西漠，再临东海。他在濒死的线上挣扎过，他为一两块元石愁苦过。他把'
