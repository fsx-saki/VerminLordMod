- chapter: 653
  title: 第六百五十七节：悔蛊异变
  content: '第六百五十七节：悔蛊异变

    　　海神祭结束了，结果大跌眼镜，成为圣女的是事先谁都没有想到的人——夏琳。

    　　圣女宫中，锦绣辉煌，奴仆成群。

    　　夏琳已经换了圣女特有的装束，鱼尾盘踞在云朵之上，身披白纱。

    　　此刻，她张开窗口，望着偌大的庭院，那些色彩斑斓的珊瑚群吸引不了她的目光。

    　　她的眼眸失神，没有焦点：“自从海神祭结束已经数天了，楚大师在海神祭当天暗中传音给我后，就再也没有出现。他什么时候会回'
