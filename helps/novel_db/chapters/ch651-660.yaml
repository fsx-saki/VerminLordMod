- chapter: 655
  title: 第六百五十九节：宿命是什么？
  content: '第六百五十九节：宿命是什么？

    　　湛蓝晴空，万里无云。

    　　枫叶城中人流穿梭，热闹非凡。

    　　自城主之子洪亭降生，已经是过去六年了。

    　　这六年来，枫叶城无灾无劫，风调雨顺，规模不断膨胀扩张，早已超越之前十多倍，乃是整个平原里的第一人族雄城。

    　　啾啾啾啾……

    　　不知从哪里飞来的一群灵雀，浑身金光烁烁，大群飞舞而来。

    　　它们灵性非凡，直奔城主府上空时，忽然砰砰爆散，化作点点金芒，洒落而下。'
