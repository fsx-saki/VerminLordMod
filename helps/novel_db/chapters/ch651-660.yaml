- chapter: 660
  title: 第六百六十四节：进展
  content: '第六百六十四节：进展

    　　至尊仙窍。

    　　小中洲。

    　　方源宙道分身在半空中缓缓飞行，将手中最后的一朵花骨朵儿插种下去。

    　　这里的地貌已经被他改造，形成浅滩，移来了大批优质淤泥，非常肥沃。淤泥上还有着膝盖高的清澈河水。

    　　宙道分身拍拍手，最后查看了一遍花骨朵儿，便悠然飞上高空。

