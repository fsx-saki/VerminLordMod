- chapter: 658
  title: 第六百六十二节：红莲真传
  content: '第六百六十二节：红莲真传

    　　大河澎湃，从来处来，往去住去。

    　　方源站在红莲石岛的边缘，望着眼前的光阴长河，脸色平静，眼眸幽幽。

    　　光阴长河可以说是最为特殊的天地秘境。

    　　因为它贯穿整个天地，没有它的存在和运转，整个蛊师世界就会变成一片静止的画面，不存在任何的变化和生机。

    　　方源夺了荡魂山、落魄谷，这两座天地秘境就从此归他一人所有，但他绝无可能夺走整个光阴长河。

    　　这座天地秘境是全天下万'
