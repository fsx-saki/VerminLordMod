- chapter: 656
  title: 第六百六十节：我后悔了
  content: '第六百六十节：我后悔了

    　　“宿命……”龙公叹息一声，脸上涌现出深沉和复杂。他走了几步，做到一块山石上，又拍拍身旁的位置，示意洪亭坐下。

    　　洪亭也学着龙公，双腿盘坐下来。

    　　“你看。”龙公手指着他正坐着的山石一脚。

    　　洪亭连忙看去，只见这处山石的旁边有一小群蚂蚁，它们正排成一队，托举着食物，朝巢穴归还。

    　　“这就是宿命。”龙公继续道。

    　　“啊？”

    　　“你再看。”龙公又手指向天。

