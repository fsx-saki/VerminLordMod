- chapter: 657
  title: 第六百六十一节：仙尊悔而我不悔！
  content: '第六百六十一节：仙尊悔而我不悔！

    　　“你说什么？”龙公没有听清。

    　　“我说，我后悔了。”洪亭再次说道。

    　　龙公眉头顿时紧紧皱起，用严厉的眼神盯住眼前这位他此生最得意的徒弟：“后悔？洪亭啊，不要再说什么胡话。你心里清楚，为了栽培你，将你扶持到现在的修为，在你身边有多少人奉献，有多少人牺牲吗？你说这样的话，对得起从小到大给你资助的那些人吗？对得起你的父母吗？对得起刚刚逝去的柳淑仙吗？对得起帮助你'
