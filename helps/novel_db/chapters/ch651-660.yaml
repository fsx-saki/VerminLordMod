  - '只想帮她。我为什么这么冒险帮她？因为我这个人做人有个原则，那就是有恩必还，有仇必报。”

    　　“我用过寿蛊，我活得时间比你想象中要长得多。我以前希望长生不老，但现在却渐渐厌烦了这个想法。生活变得越来越无聊，'
  - '得我是涉世不深的青年？不，这些把戏我都了解，也都清楚。我知道这些事实，也接受这些事实。”

    　　方源从青茅山被迫出走，辗转南疆，又去西漠，再临东海。他在濒死的线上挣扎过，他为一两块元石愁苦过。他把腰弯下，在强'
  - '个世界上，不容易！

    　　鲛人也同样如此。

    　　别看寒潮族长这么位高权重，他更不容易。

    　　他头上还有鲛人圣城的族老会压着他，他底下有那么多的下属，有的再勾心斗角，有的再觊觎他的位置。他子女成群，嗷嗷待哺，妻妾'
  - '方源这个人能创出如此曲目，真的是有仙性！”

    　　今生。

    　　龙鲸洞天，鲛人圣城。

    　　海神祭。

    　　夏琳登场，第三首歌。

    　　沧海一声笑，滔滔两岸潮。浮沉随浪，只记今朝。

    　　苍天笑，纷纷世上潮。谁胜谁负'
