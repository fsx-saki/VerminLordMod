- chapter: 659
  title: 第六百六十三节：升炼仙蛊
  content: '第六百六十三节：升炼仙蛊

    　　至尊仙窍。

    　　小中洲。

    　　乌云压顶，电闪雷鸣。

    　　方源宙道分身位于高空，目光凝重，神情肃穆，时刻监察着整个炼蛊的过程，防止出现意外。

    　　在乌云之下，原本是一片宽阔的平原，但如今却是布满了深坑。

    　　一道道的闪电，击中在地面，砸出半球形的坑洞。坑洞里土壤被烤制成陶瓷一样，烟气袅袅。

    　　“火候差不多了，本体应该要出手了！”宙道分身刚起这个念头，无数道闪电猛地汇聚'
