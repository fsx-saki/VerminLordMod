- chapter: 654
  title: 第六百五十八节：红莲出世
  content: '第六百五十八节：红莲出世

    　　乌云盖顶，暴雨倾盆。

    　　轰隆隆！

    　　电闪雷鸣，震荡天地。

    　　中洲，枫叶城的中心城主府中，枫叶城主站在一间屋外的走廊中，四处踱步。

    　　他国字脸，不威自怒。此刻，他眉头紧锁，心情就好比这天色，焦躁不安，忧心至极。

    　　忽而，他停下脚步，走到门前侧耳倾听。

    　　排除暴雨声、惊雷声，他听到屋里自家夫人的惨哼，还有几位产婆的叫声：“夫人，用力，再用力一点！”

