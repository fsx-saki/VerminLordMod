- chapter: 189
  title: 第一百八十九节：乐土圣墓
  content: '第一百八十九节：乐土圣墓

    　　方源当然是个例外。

    　　魔音响起，方源早有防备。当初他就能对付魔音，如今的他更是轻而易举。

    　　在魔音的影响下，第七层中同一流派的道痕开始凝聚在一起，形成一大片一大片的灿烂色彩，再不像之前那般驳杂琐碎。

    　　“如此盛景！”陆畏因由衷赞叹，“呃……”

    　　下一刻，他就看到方源取出到了贼巢仙蛊屋。

    　　偷道杀招发动！

    　　大片大片的道痕被直接偷取，在贼巢仙蛊中形成相对应的'
