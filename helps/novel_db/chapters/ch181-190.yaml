- chapter: 183
  title: 第一百八十三节：血海老祖
  content: '第一百八十三节：血海老祖

    　　“等一等，赤土？”

    　　方源看到这里，心中猛然一动。

    　　他伸出手来，抓住身边石壁，用力一扣，就扣出了一块赤土。

    　　这赤土质地松软，散发着微微红光。方源又轻轻用手一捏，毫不费力地就将其捏碎。

    　　“原来如此。”他恍然大悟。

    　　记得第一次，他进入石缝秘洞，就发现秘洞中全是这样的赤土，散发着微光，根本不用其他照明。

    　　他当时就觉得古怪，因为青茅山的土，都是青黑色的土'
