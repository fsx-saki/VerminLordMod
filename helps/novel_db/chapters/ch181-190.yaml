    　　黑柏脸上一红：“惭愧，我只顾着木鸡蛊，却忘了贤侄的情况。贤侄是大力真武体，必须有力道仙蛊，方可晋升蛊仙。信中贤侄也说了此事，可惜还未等到力道仙蛊出现。”

    　　“还没有力道仙'
  - '两位蛊仙十分干脆，立即出发。

    　　不多时，赶到魔血山丘上空。

    　　魔血山丘，乃是北原著名地域，曾经正道中四大部族联手，剿灭了当时，为祸北原数百年的魔道匪帮。

    　　这只魔道匪帮，十分猖狂，皆因背景深厚，有'
  - '置的。

