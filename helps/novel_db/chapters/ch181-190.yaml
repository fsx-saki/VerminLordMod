  title: 第一百八十一节：阴差阳错
  content: '第一百八十一节：阴差阳错

    　　“铁姑娘，你这是什么意思？”方正不解。

    　　铁若男伸出食指，指向墙壁：“你们看他，古月方源！不觉得他有些太过于平静了吗？自己被测出丙等资质，亲生弟弟却反而是甲等资质，换做常人都会有心湖的波动。但是他呢？没有丝毫的动容，周围的赞叹声，嘲讽声，都动摇不了他的内心。你们不觉得很奇怪吗？在整个过程中，他都太平静了。”

    　　铁若男的话，吸引了众人的目光。

