  content: '第一百八十四节：五转激战

    　　“铁血冷，他怎么会突然出现在这里？”方源听出这个声音，不由地心中一惊。

    　　这股巨大的声音，在血湖上空嗡嗡回响，引发汹涌的血浪波涛。

    　　“这是……天地宏音蛊么？”方源咬牙，巨大的声音灌入他的双耳，让他觉得整个脑袋都似乎在发嗡。

