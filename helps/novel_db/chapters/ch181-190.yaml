  content: '第一百八十六节：干点坏事

    　　“吒！”昊震飞腾上空，猛地张开口，吐出一道雷霆。

    　　这雷霆缩团成球，青金颜色，似慢实快地击向昊震的对手。

    　　他的对手，乃是慕容家的蛊仙，身材粗壮，鼻梁宽厚，下巴大，额头小，有点三角形的模样，体格十分强健，浑身肌肉如块块岩石堆砌。

    　　看到雷霆打过来，他居然不闪不避，任由雷霆落到自己的身上。

    　　轰隆一声。

