    　　方源低下头，注视着晕死过去的太白云生。

    　　他便是太白云生昏死过去的凶手。

    　　此刻，太白云生浑身浴血，躺在地上，深陷的眼窝，双目紧闭。

    　　他伤痕累累，雪白的发须凝结着血浆，早已不复北原第一治疗蛊师的风范。

    　　仅仅几步之遥，主殿大门外，海量的血兽咆哮着，嘈杂的声浪不断激打过来。

    　　方源抬起头，盯着它们，轻声开口：“闭嘴。”

    　　霎时间，门外死寂。

    　　血兽们纷纷'
