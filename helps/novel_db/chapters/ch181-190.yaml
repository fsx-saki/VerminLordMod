    　　铁甲狗浑身长着皮甲，黑幽厚重，简直如铁一般。是犬王传承中，前面五十关内，防御最卓越的犬兽。

    　　就在刚刚，骷魔指挥着狗群，打了一场大胜仗。

    　　战果更是丰硕，他用驭犬蛊，将一只碧眼犬王，招揽到了自己麾下。

    　　这碧眼犬王，不仅是百兽王，而且身怀野生'
