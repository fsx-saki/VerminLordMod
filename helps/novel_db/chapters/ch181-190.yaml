  title: 第一百八十八节：力道仙蛊出现
  content: '第一百八十八节：力道仙蛊出现

    　　黑楼兰皱着眉头，走出太白云生的房间。

    　　“强者能胜不骄败不馁，想不到大名鼎鼎的太白云生，也不过如此。”他对太白云生的精神状态，很不满意。

    　　“太白云生可是治疗第一人，如果他状态不佳，我闯关的难度就要激增不少了。”想到这里，黑楼兰仰头，向上方望去。

    　　圣宫顶端，霞光万道，恢弘喷吐。

    　　八十八角真阳楼已然凝聚了六十七层，目前正在初步凝聚第六十八层。

