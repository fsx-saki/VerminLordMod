- chapter: 190
  title: 第一百九十节：天极子盖槑
  content: '第一百九十节：天极子盖槑

    　　蛮荒大世界。

    　　一座雄阔沧桑的暗金宫殿，悬浮中部高空。

    　　正是镇运天宫。

    　　宫中大殿里，冰塞川团座蒲团之上，桌案小几上静静地趴着一只信道仙蛊。

    　　数位蛊仙分列左右。

    　　冰塞川盯着桌案上的信道仙蛊，眉头微微皱起。

    　　方源、陆畏因携手而来，给当下的三大世界之争带来了巨大变数。长生天占据蛮荒大世界，该何去何从呢？

    　　是要先撤，还是要派遣更多的力量出战，试探出方'
