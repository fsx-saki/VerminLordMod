    　　雄蝠和雌蝠之间，外形相似，差别并不大。但方源前世对这种刀翅血蝠蛊，熟悉到了骨子里，只要给他足够的时间，他就能分辨出来。

    　　没有了雄蝠，这群血蝠陷入混乱当中。

    　　方源趁机，挥动锯齿金蜈大杀特杀。

    　　片刻功夫，二十多只刀翅血蝠皆殒灭，可谓战果累累。

    　　但剧烈的激战，也让方源空窍真元消耗巨大。'
