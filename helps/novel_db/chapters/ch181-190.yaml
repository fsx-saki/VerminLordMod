  title: 第一百八十六节：牺牲
  content: '第一百八十六节：牺牲

    　　来到王庭福地这么久，多次出入八十八角真阳楼，方源从未忘记此次北原之行的初衷。

    　　那便是救治荡魂山。

    　　而救治荡魂山，就得需要江山如故蛊。

    　　要得此蛊，困难重重，关键就在一个人的身上。这个人便是太白云生。

    　　从太白云生加入黑家大军以来，方源就一直对其保持关注。

    　　数月前，方源便打探出一个情报：

    　　在黑楼兰获得一角楼主令，可以查探每道关卡奖励后，太白云生就当即找上'
