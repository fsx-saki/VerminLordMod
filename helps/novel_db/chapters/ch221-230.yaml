- chapter: 225
  title: 第二百二十五节：混乱危局
  content: '第二百二十五节：混乱危局

    　　太白云生早就被方源结结实实地绑在战车上，又想到定仙游还在方源的手中，因此方源提出的要求，太白云生只能硬着头皮答应下来。

    　　方源大喜，冲向太白云生，一头扎进他的仙窍当中去。

    　　“糟糕！”看到这一幕，追兵们大惊失色。

    　　“这个贼子太狡猾了，居然躲进了太白云生的仙窍。我们追杀不了了！”耶律桑无奈地大叫出声。

    　　“那就屠仙！杀了太白云生！！”黑楼兰眼中凶芒爆闪，杀机弥'
