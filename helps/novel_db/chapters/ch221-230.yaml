- chapter: 229
  title: 第二百二十九节：大同风幕
  content: '第二百二十九节：大同风幕

    　　成就中等福地，方源却没有任何遗憾。

    　　这样最好不过！

    　　第一空窍中，春秋蝉的压力已经达到极限，第一空窍的窍壁已经满是裂纹。若持续下去，说不定下一刻就要撑爆空窍了。

    　　若是上等福地，还会提炼仙蛊，产生福地内的天灾地劫。

    　　方源的处境，早已经岌岌可危，内忧外患相当严重。若再有仙窍内的天灾地劫捣乱，方源必然顾此失彼，大败亏输是轻的，很可能丢了性命。

    　　“不管怎么说'
