- chapter: 224
  title: 第二百二十四节：无相手
  content: '第二百二十四节：无相手

    　　“方源，你跑什么？”

    　　“胆小如鼠的贼子，你怕了吗？敢不敢和爷爷我大战三百回合！”

    　　“你根本不配伪装成常山阴，你连他百分之一的勇气都没有。”

    　　真传秘境中，方源一路飞驰，身后众人追赶，挑衅不休。

    　　面对这些辱骂和挑衅，方源充耳不闻，神情平淡。

    　　他双目紧紧注视四周，真传秘境虽然空间宽广，但并非坦途，还有许多的真传流星四下乱飞，时而相撞。

    　　之前巨阳意志收回'
