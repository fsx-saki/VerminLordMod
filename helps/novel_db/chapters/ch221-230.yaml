- chapter: 230
  title: 第二百三十节：幽魂vs乐土
  content: '第二百三十节：幽魂vs乐土

    　　有那么一刻，生死门战场忽然停滞住。

    　　愤怒的幽魂魔尊停止了咆哮，无数的巨臂仿佛空间凝滞一般，停在远处，一动不动。

    　　“发生了什么事情？”气海老祖疑惑。

    　　然后，下一刻，幽魂魔尊猛地张开巨口，发出震撼天地的吼声。

    　　吼声中夹杂着愤怒、仇恨，还有大敌当前的兴奋！

    　　“你活了……”

    　　“你也活了！”

    　　“我终于等到了你。既然来了，那就来吧。”

    　　“让我……'
