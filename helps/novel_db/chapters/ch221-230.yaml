- chapter: 230
  title: 第二百三十节：重大抉择
  content: '第二百三十节：重大抉择

    　　王庭福地乃是北原第一福地，底蕴深厚，福泽庞巨。

    　　然而，自方源进入之后，先是福地地灵霜玉孔雀和巨阳意志激斗。

    　　随后又是太白云生、方源升仙，连续抽取福地中的天地二气。

    　　再加上又被十年暴风雪灾肆虐，还有融合了太白云生、方源升仙灾劫之后的恐怖天劫。

    　　霜玉孔雀能坚持这么久，已经极为难得。王庭福地的毁灭，已成定局，形成的风幕，将王庭福地遗址包裹成球，球壁广袤深厚，足'
