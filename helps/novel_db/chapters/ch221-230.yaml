- chapter: 230
  title: 第二百三十一节：长毛老祖的隐秘
  content: '第二百三十一节：长毛老祖的隐秘

    　　天庭。

    　　宫殿重重，光明万丈。

    　　监天塔耸立其间，四大八转蛊仙：监天塔主、白沧水、炼九生、碧晨天，分列东南西北四个方位。

    　　巨大的蛊阵，在半空中描绘出恢弘的光影。

    　　无数的珍稀仙材，宛若市场里最廉价的大白菜，不断地扔到空中。

    　　在炼道蛊阵形成的光影中，这些仙材以极快的速度，被顷刻处理。

    　　至此刻，从不败传承中缴获的成功道痕，已经消耗了一半。

    　　女蛊'
