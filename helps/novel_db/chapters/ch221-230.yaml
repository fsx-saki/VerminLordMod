- chapter: 227
  title: 第二百二十七节：痛并快乐着
  content: '第二百二十七节：痛并快乐着

    　　黑楼兰心中叫苦不迭。

    　　他战力出众，拥有极其强大的力道远战杀招，只是这样一来，便遮掩了他移动不足的弱点。

    　　准确的说，黑楼兰主修力道，兼修暗道，移动能力并不俗。

    　　但在如今的局面之下，只有飞行大师才能艰难生存。黑楼兰的弱点，在无相手的追捕下暴露无遗。

    　　无相手肆虐，黑楼兰身上的蛊虫接连被抢。

    　　尽管他击爆了不少无相手，追回了许多。但与此同时，新出现的无相手'
