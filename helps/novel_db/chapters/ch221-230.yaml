  title: 第二百二十二节：自由蛊
  content: '第二百二十二节：自由蛊

    　　《人祖传》中记载，人祖走在自己的人生之路上，和毛民的首领分别之后，他在绿天中遇到了的羽民。

    　　人祖看到这些羽民，十分高兴。

    　　因为羽民的背后生有双翼，羽民听得懂人祖说的话，双方可以沟通。

    　　人祖便向羽民们请求：“羽民啊，请你们帮助我。我的女儿落在了平凡的深渊里面，出不来。请你们飞下去，把我的女儿带出来，让我们父女团聚吧。”

    　　羽民们哈哈大笑：“人啊，你怎么可以命'
