- chapter: 227
  title: 第二百二十八节：星云磨盘星蛇索
  content: '第二百二十八节：星云磨盘星蛇索

    　　回风子、贺狼子都紧紧盯住眼前的方源。

    　　此时的方源，一身蔚蓝长袍，宽大袖口中时而向外飘出一缕缕的星芒。

    　　他再非之前的魁梧雄阔，而是显得修长挺拔。

    　　他的皮肤不是青铜的僵尸皮，而是宛若婴儿般白净细嫩，透着淡淡的红润。五官也变得清逸脱俗，再搭配一头长而顺滑的白发，活脱脱一位仙风道骨的逍遥高人。

    　　得到变形仙蛊之后，见面似相识杀招效果暴增，让方源大变模样。'
