- chapter: 228
  title: 第二百二十八节：终成蛊仙
  content: '第二百二十八节：终成蛊仙

    　　随着时间推移，方源已再无机会去轰砸无相拳。

    　　在无相手的追捕下，他疲于奔命。

    　　“快将我的蛊虫还来！！”机缘巧合之下，黑楼兰终于堵到方源的前面。

    　　方源冷笑一声，催动风花蛊。

    　　他身上顿时浮现出一朵半透明的风花，带着他迅速转向。

    　　嗖！

    　　有了风花蛊帮助转向，方源速度不变，方向一折，避开黑楼兰。

    　　黑楼兰却是大喜：“也是我时运到了！好死不死，你偏偏要走这'
