- chapter: 221
  title: 第二百二十二节：镇运天宫
  content: '第二百二十二节：镇运天宫

    　　茫茫云海的之上，一个人影驻足悬停，看着眼下云卷云舒，苍茫大地，默然无语。

    　　此人身着青金甲，胡须垂至胸口，身材魁梧，面容苍老，正是南荒仙人。

    　　“药皇参见南荒仙使大人！”一位身影显露出来，正是药家的太上大长老，八转蛊仙药皇。

    　　南荒仙人侧过身来，似笑非笑：“你我皆是八转，称呼仙友便可，无须如此客气。”

    　　药皇恭恭敬敬地行了一礼：“论修为，南荒大人高我数倍。论辈'
