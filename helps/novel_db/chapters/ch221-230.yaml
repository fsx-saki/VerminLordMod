- chapter: 225
  title: 第二百二十六节：一巴掌拍死！
  content: '第二百二十六节：一巴掌拍死！

    　　若说这入侵琅琊福地的七位蛊仙中，方源最愿意碰到的，就是雪松子了。

    　　因为雪松子在他们当中，明显修为最低，战力也可能最低。

    　　同时，方源和雪松子也交过手，曾经一战，雪松子被力道虚影大军追得上天下地，狼狈不堪。

    　　可以说，雪松子是方源的手下败将，方源有经验，也知道雪松子的根底。

    　　“不过此次战斗，却不可大意。”方源满脸肃穆，看着明镜中的雪松子，越来越接近自己镇'
