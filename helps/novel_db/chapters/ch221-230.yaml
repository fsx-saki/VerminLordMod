- chapter: 222
  title: 第二百二十三节：一个人情
  content: '第二百二十三节：一个人情

    　　镇运天宫。

    　　巨阳仙尊居然活生生地出现在药皇的面前。

    　　药皇极为震惊，他感到难以置信。

    　　“南荒仙使，参见仙尊。”这时，南荒仙人已经恭敬行礼。

    　　“不肖子孙药三秋，拜见仙祖！”药皇立即激动得浑身颤抖，当场跪拜下来，老泪纵横。

    　　巨阳仙尊微微笑道：“起来吧。我的本体早已陨落，如今在你们眼前的，不过是一具尸首罢了。”

    　　药皇惊讶地抬起头，他仔细分辨，这才看清楚'
