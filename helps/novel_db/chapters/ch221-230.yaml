- chapter: 223
  title: 第二百二十四节：星云风暴
  content: '第二百二十四节：星云风暴

    　　而在外围，密密麻麻的冥蚁蛊中，伫立着无数魂兽的身影，真正是千军万马的规模。更叫人心惊胆战的是，它们气势连成一片，仿佛巍峨群山，不动则已，一动势必石破天惊，如海啸冲刷，山崩地裂。

    　　不仅是魂兽的规模，让人震惊，而且里面不乏上古级、太古极的魂兽。蛊仙们还从中感受到许多野生仙蛊的气息。

    　　“太古魂兽足有五头！”

