- chapter: 222
  title: 第二百二十三节：石龙瞳
  content: '第二百二十三节：石龙瞳

    　　北原，大雪山福地。

    　　天空中云层似盖，白雪如尘。诸峰在雪中默默矗立，山林覆盖着积雪，宛若万千云朵。

    　　一道虹光，从第一主峰处贯穿长空，宛若一颗流星，飞在空中。

    　　大雪山诸峰峰主，几乎都投去目光。

    　　“老祖又发布命令了。”

    　　“不知道这次，又是谁接到采集仙材的命令……”

    　　“但愿不是我。”

    　　虹光在空中划过一道优美的弧线，直接投入第三雪峰之中。

    　　许多峰主'
