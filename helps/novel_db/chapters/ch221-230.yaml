- chapter: 229
  title: 第二百三十节：危在顷刻
  content: '第二百三十节：危在顷刻

    　　方源再定睛一看时，发现自己已经置身在另一座云阁之中了。

    　　方源吐出一口浊气，这是有琅琊地灵帮忙，否则自己脱身恐怕就有危险了。

    　　毕竟对手当中，有一位回风子。

    　　此人号称是当今北原，移速第一人。就算是八转蛊仙，都赶不上他。曾经有过在药皇手中逃脱的惊人战绩！

    　　不过危险，并不代表不可能。

    　　方源手中有定仙游，只要争取三息时间，就可逃出生天。就算回风子速度再快，也不'
