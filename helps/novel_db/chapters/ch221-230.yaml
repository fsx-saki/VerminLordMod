- chapter: 222
  title: 第二百二十二节：十大凶灾乱歧牙
  content: '第二百二十二节：十大凶灾乱歧牙

    　　清辉之天气，黄金之地气，越来越多，缠绕方源周身。

    　　黑楼兰等人徐徐退去。

    　　长河巨阳意志，怒吼连连，一时间却也不敢莽撞上前。

    　　它和方源激斗大战，体积不足原先一半。

    　　它心中焦急万分：“可恶！除非有主体意志支援援兵进来，否则单靠我是收拾不了方源的。”

    　　战场陷入短暂的安宁。

    　　方源见局势终如自己所料，如重释负地吐出一口浊气。

    　　八十八角真阳楼之争，'
