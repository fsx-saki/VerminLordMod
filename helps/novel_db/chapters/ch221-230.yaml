- chapter: 226
  title: 第二百二十六节：发财
  content: '第二百二十六节：发财

    　　六指无相手出现的太突然，方源只来得及仰头望去。

    　　淡蓝色的光辉，映照在他的脸上。

    　　他的整个视野，都被巨大的淡蓝巨手充斥着。

    　　无相手毫无停顿，用力抓下，捏紧成拳，将方源的身形彻底笼罩。

    　　“师弟！”太白云生大声惊呼。

    　　但下一刻，这只六指无相拳又松开来，摊成手掌。

    　　方源的身形，则在五百步的不远处显现。

    　　原来六指无相手抓空了。

    　　是烁蝺蛊！

    　　此蛊乃'
