- chapter: 226
  title: 第二百二十七节：以一敌二
  content: '第二百二十七节：以一敌二

    “你杀了对方一位蛊仙？好好好！”方源刚刚从黄玉狮子的身体内钻出来，耳中就传来琅琊地灵的声音。

    　　方源第一个想到的就是：看起来，这琅琊福地中的音道道痕挺多的啊。

    　　琅琊地灵传音如此方便，狐仙地灵、星象地灵都没有这种能力的。可见琅琊福地中，有着大量的音道道痕。

    　　对于方源能斩杀得了雪松子，地灵大感意外，一连说了三个好字。

    　　这是对方进攻一来，第一次减员！

    　　“方源小'
