- chapter: 221
  title: 第二百二十一节：升仙！
  content: '第二百二十一节：升仙！

    　　此刻。

    　　真传秘境。

    　　马鸿运、赵怜云相依为命，处于运道无上真传的保护之下，惊惶地望着。

    　　方源和太白云生，则控制着代表八十八角真阳楼归属的无上真传。

    　　两者之间，黑楼兰等人阻隔在中间，组成一道坚固防线。

    　　在方源、太白云生背后，则是长河巨阳意志和飞熊虚像纠缠着。

    　　而在更外围，巨阳主体意志包裹着八十八角真阳楼，硬抗恐怖的天灾地劫，保护着巨阳遗藏的安全。'
