- chapter: 223
  title: 第二百二十三节：枭雄黑楼兰
  content: '第二百二十三节：枭雄黑楼兰

    　　真传秘境中，方源被浓厚巨大的三色气团笼罩，身形彻底掩盖。

    　　“师弟，你可千万要把持住啊。我不担心你应付不来情绪的波动，只是怕你年轻壮志，贪图大道奥妙，忘记了底线，过多地融合天地二气。”太白云生目光担忧。

    　　天地二气已经扩散到他附近，他不得不慢慢地飞离方源。

    　　和他争夺无上真传归属的巨阳意志，此时步伐却似放缓。

    　　太白云生压力稍减，处境渐好。

    　　“该死的小贼'
