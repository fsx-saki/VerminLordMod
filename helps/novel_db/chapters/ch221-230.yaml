- chapter: 223
  title: 第二百二十四节：参加琅琊攻防战
  content: '第二百二十四节：参加琅琊攻防战

    　　方源得到变形仙蛊之后，又将其融入到见面似相识仙道杀招之中，如今已经可以变化任何事物。

    　　但他要再次混入北原僵盟，情势却不大妙。

    　　因为沙黄身份暴露，导致北原僵盟十分警惕，重复第一次的行动，是无法顺利混进僵盟的。

    　　于是，方源便打起其他僵盟成员的主意。

    　　只要秘密打杀其中一位，再变作这个倒霉鬼的样子，混入北原僵盟就是可行的。

    　　方源在北原升仙，浑身都是北'
