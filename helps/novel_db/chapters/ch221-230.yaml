  title: 第二百二十五节：静待来敌
  content: '第二百二十五节：静待来敌

    　　方源皱起眉头，脸上流露出十分为难的神色。

    　　秦百胜、姜钰、黑城、雪松子、贺狼子，还有两位他认不出的神秘蛊仙。这当中只有雪松子、姜钰两位是六转蛊仙。其余皆是七转蛊仙。

    　　那两位神秘蛊仙，方源不知跟脚，也就算了。

    　　剩下的秦百胜、贺狼子、黑城这三位，都是积年七转。

    　　黑城是超级势力黑家的蛊仙，虽然身坏暗疾，似乎使不出仙道杀招，战力下降得厉害。远不是他的巅峰状态，但'
