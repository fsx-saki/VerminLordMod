  content: '第四百四十节：与方源联姻

    　　北原，北部冰原。

    　　寒风呼啸，冰川上大雪飘飞。而在这冰川之下，亦有一场氛围凝固如冰的谈判。

    　　生活在这里，隐姓埋名的两个异人种族——石人和雪民，在不久之前，因为一场领地的纠纷，而展开谈判。

    　　如今，这场谈判已经持续了六天六夜。

