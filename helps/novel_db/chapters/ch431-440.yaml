- chapter: 437
  title: 第四百三十九节：光照菌生意
  content: '第四百三十九节：光照菌生意

    　　茫茫东海，波涛翻滚。

    　　风浪冲击着远处一座无名的小岛，还未至傍晚，天色却已然黑了。

    　　女仙童画一边疾飞，一边抬头望去，只见头顶上正是乌云密布，一场暴风雨即将来临的征兆。

    　　她心中烦闷，但脸上平静无波，很快就飞临到无名小岛的上空，便见到一人，正站在岛上的最高峰处，眺望着海和天。

    　　“任仙友，有劳你久等了。”童画落到那蛊仙的身后，微微一礼道。

    　　神秘蛊仙缓缓转'
