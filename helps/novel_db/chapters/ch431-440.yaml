  title: 第四百三十三节：三大卖方
  content: '第四百三十三节：三大卖方

    　　东海。

    　　浅显海域。

    　　一座玉亭，独立在海水深处，散发着六转仙蛊屋的气息。

    　　玉亭中，蛊仙谢宝树招待着他的知己好友游仙子。

    　　望着玉亭之外，一大片一大片的沧桑树，游仙子感慨道：“又到了年蛊收获的时节了啊，这些沧桑树的长势，明显是比前一年要更加旺盛了。可见宝树你栽培这等资源，又有了新的突破了。”

