- chapter: 439
  title: 第四百四十一节：百万人魂
  content: '第四百四十一节：百万人魂

    　　天庭，镇魂殿。

    　　紫薇仙子望着眼前缩成一团的幽魂本体，眉头微蹙：“幽魂啊，到如今，你还不认清现实么？”

    　　幽魂没有答话，如同石块般沉默。

    　　紫薇仙子冷笑一声，开始催动这座八转级数的仙蛊屋。

    　　立时，铁链上闪耀出紫色的雷电光辉，被铁链死死束缚的幽魂本体，开始微微颤抖起来。

    　　他的记忆被强行抽取出来，化为斑斓的光影呈现在紫薇仙子的眼前。

    　　那是过往的一幕。'
