- chapter: 435
  title: 第四百三十七节：双喜临门
  content: '第四百三十七节：双喜临门

    　　“终于结束了，这一场商战也是别开生面！”赵怜云心中惊叹。

    　　围绕年蛊的角逐，以方源获胜而告终。这个结果，让绝大多数的蛊仙都为之惊诧。

    　　很少有这样的情况发生，新来的人居然击败了老字辈的三大巨头。

    　　原本众人还以为：新来的是一头狼，而那三大巨头如同狮虎。结果没想到，新来的不是狼而是一头龙。三大卖家都不是对手，惨白亏输，他们手中的年蛊至今都没有卖出去过。

