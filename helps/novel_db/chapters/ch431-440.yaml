- chapter: 434
  title: 第四百三十六节：胜利者
  content: '第四百三十六节：胜利者

    　　荣欣心中那点残留的希望彻底泯灭了！

    　　因为他知道，对方肯定不是如他一样的情况了，对方的货物一定很充足，因为这个价格绝对会引发一场年蛊收购的热潮。

    　　“这一次，我败了。”荣欣苦笑，但没有办法，谁叫他货量不足。

    　　不要提什么理由，失败都是有理由的，但这个世上人们看的不是理由，他们甚至不需要理由！

    　　他们向来只看成败。

