- chapter: 433
  title: 第四百三十五节：宝黄天震动
  content: '第四百三十五节：宝黄天震动

    　　降价了！

    　　随着方源的降价，谢宝树等三大卖家支撑了数天后，也只好跟着降价。

    　　不过，他们降低的价格，也不高，且步调都很一致——就是和方源一样的价格。

    　　“我在年蛊生意上只是一个新人，身份不明，来历神秘，相比较我而言，谢宝树、荣欣或者王明月，都是声誉上佳，经营多年，深得他人的信任。所以他们三人只要降下的价格和我的一样，那么那些有意购买年蛊的人，首先会选择的，仍旧'
