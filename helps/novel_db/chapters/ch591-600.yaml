- chapter: 597
  title: 第六百节：你信命吗？
  content: '第六百节：你信命吗？

    　　至尊仙窍，梦境迷离。

    　　方源已是进入了梦境之中。

    　　夕阳下。

    　　“你信命吗？”

    　　一位人族女仙，肤若白雪，一身黄衣，弯弯的柳眉下，一双烟雾笼罩的美眸，忧愁地遥望着那美不胜收的残霞。

    　　方源扮演的则是一位石人蛊仙，却是不受他的掌控。

    　　梦境在自行推演，石人蛊仙瓮声瓮气地道：“我土基修行律道，自然是信命的。自从我见到若离仙子您，我就知道您就是我命中的注定，是要用一'
