- chapter: 594
  title: 第五百九十七节：继续腾飞
  content: '第五百九十七节：继续腾飞

    　　至尊仙窍。

    　　仙道杀招——搜魂！

    　　澎湃的力量，狠狠地射在夏槎的魂魄之上，但旋即，夏槎魂魄上骤然亮起一道道的宙道道痕，将方源的搜魂杀招尽数遮挡。

    　　但方源并不放弃，继续灌注仙元，一刻不停。

    　　过了好一会儿，仿佛是用一双肉手艰难地掀起钢板的一角，夏槎魂魄上的宙道道痕出现了漏洞，令方源的搜魂杀招终于起效。

    　　大量的信息在这一刻，被方源贪婪地汲取。但宙道道痕并不承'
