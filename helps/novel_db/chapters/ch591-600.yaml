- chapter: 598
  title: 第六百零一节：我不信！
  content: '第六百零一节：我不信！

    　　灿烂的光影在石室中徐徐消散，凤金煌深呼吸一口气，丹凤眼目光炯炯，一眨不眨地望着眼前。

    　　此刻，在她的面前，有一个光团仿若蚕茧，只是有磨盘大小，静静地悬浮在半空中。

    　　“最后一步了。”凤金煌深呼吸一口气，蓦地掐动双手十指。

    　　刹那间，十指如莲花绽放，无穷的光影斑斓闪烁，映照着整个石室明灭生辉！

    　　凤金煌的手法是如此的娴熟，哪怕是炼道宗师见了都要面露凝重之色。'
