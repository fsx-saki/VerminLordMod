- chapter: 600
  title: 第六百零三节：方源渡劫
  content: '第六百零三节：方源渡劫

    　　数月后，南疆。

    　　一处无名的普通山谷。

    　　“嗨！”六转女仙巴桃断喝一声，身上气息澎湃。她双手高高举起，像是支撑着万斤重物，很快就满脸赤红之色，身体微颤，吃力不已。

    　　“快一点。”巴桃催促道。

    　　另一旁，同样有一位蛊仙，也在催动杀招。

    　　此人六转修为，青年模样，来自铁家，姓铁名义，乃是铁区中之子。

    　　一块块的赤色光球，盘旋上升，猛地轰然一声，化作冲天的赤色光柱'
