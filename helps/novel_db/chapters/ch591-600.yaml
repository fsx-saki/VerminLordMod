  - '。”主位上坐着一位老者，身材魁梧，白发张扬，宛若狮鬃，正是房家太上大长老房功。

    　　房家太上二长老、智道大宗师房睇长，太上三长老房化生，以及房芝、房沉、房棱、房云，皆在厅内。

    　　众仙一一阅览，各个神情不一。'
