- chapter: 592
  title: 第五百九十五节：威胁整个南疆正道
  content: '第五百九十五节：威胁整个南疆正道

    　　“要赎回仙蛊？怎么可能！”方源呵呵冷笑。

    　　仙蛊唯一！

    　　这种东西，天底下独一份儿。方源拥有，就代表其他人没有，因此价值难以估量。

    　　虽然方源也曾经卖过仙蛊，收购海量鹰兽。但那时是情况危及到生命，不得不这样做。

    　　方源拥有海量杀招，无数仙蛊方，绝大多数的仙蛊他都能利用起来。

    　　唯一麻烦的是喂养负担。

    　　但之前，方源已经基本解决。现在虽然得了一大批的'
