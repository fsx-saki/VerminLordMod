- chapter: 599
  title: 第六百零二节：南联
  content: '第六百零二节：南联

    　　天庭。

    　　大阵发出阵阵的嗡鸣之声，刺眼的光辉宛若根根尖针，深深地插在魔尊幽魂的身体上。

    　　尽管他缩成一团，尽全力抵抗，但仍旧难以抵挡大阵的威能。

    　　紫薇仙子双目微闭，一边全神贯注地操纵大阵，一边凝神接收着从魔尊幽魂身上搜刮出来的种种情报。

    　　直到大阵发出不堪重负的声音，紫薇仙子这才意犹未尽地停下来，深深地看了魔尊幽魂一眼。

    　　即便是死敌，紫薇仙子也不得不佩服魔尊幽'
