- chapter: 593
  title: 第五百九十六节：搜魂
  content: '第五百九十六节：搜魂

    　　方源的话，虽然令南疆正道恼怒又惶恐，但还是实现了方源的目的，他成功地说服了南疆正道。

    　　虽然这种坦诚，让南疆正道无不更添对方源的憎恨，但他们都选择相信方源在这方面的“诚意”。

    　　事实上，他们也愿意相信这种诚意。

    　　因为，对于他们来讲，失去一位蛊仙，损失更大！

    　　若是六转蛊仙，才干普通的，也还罢了。关键是被俘虏的这群蛊仙，一个个都是七转强者，乃是招牌人物。夏家的夏槎'
