    　　在方源周围，影无邪等人已经准备就绪。

    　　“开始罢。”方源招呼一声，身上蛊虫气息蓦地升腾起来，一瞬间仙元剧烈消耗，手中的八转仙材漩涡晨曦猛地一爆，覆盖周围百里方圆。

    　　几乎与此同时，影无邪等人出手，将这漩涡晨曦定住，不任由它扩散下去。

    　　漩涡晨曦的延展性极佳，被扩展了百里，虽然光彩不再'
