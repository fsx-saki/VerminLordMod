- chapter: 596
  title: 第五百九十九节：关键灾劫
  content: '第五百九十九节：关键灾劫

    　　一颗颗的魂核，如同鸡蛋大小，通体深蓝，近乎黑幽，从半空中洒到荡魂山上。

    　　魂核乃是一头魂兽的精髓所在，魂兽死后，尸体无用，会化为烟灰散去，只会留下魂核。

    　　魂核凝聚了大量的魂道道痕，乃是上佳的蛊材。

    　　魂核有大有小，普通魂兽的魂核只有米粒大小，到了六转才如鸡蛋。七转更大一些，八转级数的太古魂兽所拥有的魂核，一个个都大如车马。

    　　房家经过一番商议，最终暗里答应方'
