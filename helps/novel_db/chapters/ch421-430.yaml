    　　这冰层十分纯净，透明无暇，散发出一阵阵的寒意。这种寒意，并非是冰风彻骨的冷酷，而是春天的风寒，尽管是冷，但却蕴藏着勃勃的生机。

    　　这种七转仙材，方源也是第一次接触，亲'
