  title: 第四百二十六节：真凶方源？
  content: '第四百二十六节：真凶方源？

    　　慕容青丝拼尽全力，不顾一切的举动，立即吸引了其余家族蛊仙的注意。

    　　“发生了什么事情？”

    　　“看慕容青丝的神态，似乎有些不太妙！”

    　　“青丝等等，你因何事如此惶急？”

    　　有家族蛊仙询问，但是慕容青丝却没有回答，她一门心思飞冲，心中充斥着惊惶恐慌，急于求证事实真相。

    　　“走，一起去看看。”

    　　“今天就是那酝良来提亲的日子，慕容青丝又是如此焦急，莫非……”'
