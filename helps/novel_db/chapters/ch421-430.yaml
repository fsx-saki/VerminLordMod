- chapter: 428
  title: 第四百三十节：赊借仙元石
  content: '第四百三十节：赊借仙元石

    　　眼前地貌平缓，一望无垠。

    　　赵怜云的神念不断扩散，最终将她的整个福地纵览无余。

    　　不久前，她成功升仙，成为灵缘斋的智道六转蛊仙，成就了眼前这片上等福地。

    　　怜云福地。

    　　总计八百六十万亩，大型光阴支流，与外界时间流速为一比三十三，仙窍福地中每年可自行产出三十多颗青提仙元。

    　　“一半的草原，一半的平原么。”赵怜云口中呢喃。

    　　福地地貌和蛊仙个人具体情况有着关'
