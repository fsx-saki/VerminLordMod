- chapter: 429
  title: 第四百三十一节：一百七十三万！
  content: '第四百三十一节：一百七十三万！

    　　“哦，楚度借了我十五万的仙元石？”

    　　方源很快就得到了楚度的回信，并且楚度借出的仙元石数目，有些超过了方源的预料。

    　　而在楚度的回信当中，他言辞委婉，先是回顾了往昔愉快的合作经历，又述说命运弄人，彼此间的身份差异，处境尴尬。并且借出十五万仙元石，已经是能力极限。而归还时限，则让方源来定。

    　　“看来，楚度仍旧是想与我继续合作下去的。毕竟狂蛮真意，还是相当诱人'
