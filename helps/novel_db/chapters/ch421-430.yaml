- chapter: 422
  title: 第四百二十四节：净魂终成！
  content: '第四百二十四节：净魂终成！

    　　“这就是雪莲花精？”方源望着手中的仙材，啧啧赞叹，目光中流露出赞叹的情绪。

    　　雪莲花精非常精美，它只有成年人的拳头大小，粉红色的花瓣，嫣红的花蕊，整朵花的表面，都覆盖了一层小指甲那么厚的冰层。

    　　这冰层十分纯净，透明无暇，散发出一阵阵的寒意。这种寒意，并非是冰风彻骨的冷酷，而是春天的风寒，尽管是冷，但却蕴藏着勃勃的生机。

    　　这种七转仙材，方源也是第一次接触，亲'
