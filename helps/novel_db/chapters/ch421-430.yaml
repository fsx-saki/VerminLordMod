- chapter: 423
  title: 第四百二十五节：青丝成空
  content: '第四百二十五节：青丝成空

    　　净魂仙蛊。

    　　它形如蝌蚪，但有方源的拳头大小，通体灰白，此时悬浮在方源的掌心上方。

    　　“终于是炼出来了，不容易。”方源心中感慨不已。

    　　蛊仙炼蛊，真的是一场豪赌。

    　　方源尝试了近三十次，这才勉强成功。当中耗费的资源，已经是一笔非常庞大的数字。

    　　方源当然拿不出这样的资源，而是拿着影宗的传承，换取琅琊派的门派贡献，再用这些门派贡献，来从琅琊派的库藏中，换得充沛'
