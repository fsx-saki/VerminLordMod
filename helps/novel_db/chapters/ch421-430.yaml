- chapter: 427
  title: 第四百二十九节：鬼官衣
  content: '第四百二十九节：鬼官衣

    　　改良后的仙道杀招鬼官衣，以七转换魂仙蛊，六转净魂仙蛊为核心。方源经过几次失败之后，将其成功成功催发。

    　　他从至尊仙躯中，直接遁出魂魄。

    　　他的魂魄悬浮在空中，并不是很凝实。

    　　魂魄底蕴因为燃魂爆运，消耗多次，如今只是百人魂级数而已。

    　　不同的是，在他魂魄的表面，覆盖着一层宽大的衣裳。长衣袖，衣摆拖至脚背。

    　　这就是鬼官衣杀招所形成的效果。

    　　泛称为鬼官衣，若'
