- chapter: 426
  title: 第四百二十八节：失而终复得
  content: '第四百二十八节：失而终复得

    　　方源盘坐在地上，打开仙窍，取出八臂仙僵肉身。

    　　然后，在琅琊地灵的注视之下，他遁出魂魄，钻入这具仙僵肉身当中。

    　　仙僵肉身缓缓睁开双眼，站立起来。

    　　方源看了一眼至尊仙体，随后便转身面向智慧蛊。

    　　“智慧蛊啊。”他开口道，声音沙哑，非常难听，“你可还记得我们之间的约定吗？”

    　　智慧蛊原本在玩耍，听到这话，它顿时停住了动作，悬浮在半空中，静静地看着方源，一动'
