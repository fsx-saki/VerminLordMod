    　　“终于是炼出来了，不容易。”方源心中感慨不已。

    　　蛊仙炼蛊，真的是一场豪赌。

    　　方源尝试了近三十次，这才勉强成功。当中耗费的资源，已经是一笔非常庞大的数字。

