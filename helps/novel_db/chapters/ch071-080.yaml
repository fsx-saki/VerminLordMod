  title: 第七十二节：我拒绝
  content: '第七十二节：我拒绝

    　　琅琊福地，云盖大陆。

    　　第一云城之中，琅琊地灵招待方源坐下。

    　　“来，方源，喝口茶。这可是有名的火虹茶！”琅琊地灵热情洋溢地笑着。

    　　方源接过杯盏，只见这杯茶水，红彤彤的散着光。仔细分辨，里面又有一道虹光，像是游鱼一般，忽左忽右，时上时下，欢快跳脱得很。

    　　方源有五百年前世经验，眼界开阔得很。

    　　寻常的好茶，要细细品味，浅尝辄止。但此茶却是个例外，要一口气喝掉。最'
