    　　龙宫勉强散发着橙金光辉，仍旧困于黑烟涡流之内，艰难抵御着外界的汹涌攻势。

    　　被魔尊幽魂策反的太古年兽，已经只剩下三头。

    　　其余的都被吴帅操纵着龙宫一一击落。至于这些年兽尸躯坠落到地，如何撞毁山峦，连累多少无辜性命，交战双方都管不着，更顾不上什么凡人少年王小二的人生颠覆。

    　　仅剩下的三头太古年兽身上的黑烟逐渐消散后，又恢复了神智，重新转向和魔尊幽'
