- chapter: 71
  title: 第七十一节：万灭雷森
  content: '第七十一节：万灭雷森

    　　白凝冰、影无邪等人相继入阵，最终紫薇仙子缓缓飞入大阵中央，催起大阵。

    　　推算开始了。

    　　但气海老祖却未动身，仍旧停留在原地。

    　　“我若是强行动手，袭击这座大阵，是否能给本体带来帮助？”气海老祖分析着，估算着成功的可能。

    　　大阵一旦被重创，乃至摧毁，阵中的蛊仙定然会被波及。但战果有多少，气海老祖并不能肯定。

    　　而且，若是气海老祖独自出手，他是方源分身的秘密恐怕也就'
