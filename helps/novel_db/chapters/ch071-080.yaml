- chapter: 75
  title: 第七十五节：魔道的觉悟！
  content: '第七十五节：魔道的觉悟！

    　　树屋中方源念头翻腾不定。

    　　凭借着前世经验积累出来的智慧，方源察觉到了王大的存在。

    　　那么王大的实力是如何的呢？

    　　方源没有见过这个王大一面，但是单凭眼前的这些东西，就足以让他分析出很多情报来。

    　　“勇气都是建立在实力的基础上的，他收集了我的资料，仍旧要向我展开报复，如此有把握，看来他的修为必定超过一转！”

