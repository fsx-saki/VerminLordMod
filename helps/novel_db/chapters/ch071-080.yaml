- chapter: 71
  title: 第七十一节：力可扛猪思低调
  content: '第七十一节：力可扛猪思低调

    　　时间过的飞快，似乎是弹指一挥间，就到了六月中旬。

    　　夏夜，金色的月轮高高地悬挂在空中，普照青山大地。

    　　风一阵阵地吹着，树叶和月光一起浮动。蝉鸣蛙鼓齐齐上阵，偶尔，也会有一声狼嚎，从很远的地方传来，在青山上回响。

    　　一处河滩，溪水冲刷出一片白色的圆滑岩石。在河滩旁，一场战斗在进行着。

    　　一只山猪浑身都是细长深邃的伤口，它四脚踢踏，再度冲向方源，伤口处血液飚射'
