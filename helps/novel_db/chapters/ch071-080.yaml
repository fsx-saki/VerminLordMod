- chapter: 80
  title: 第八十节：战力大涨
  content: '第八十节：战力大涨

    　　秋风萧瑟，红叶飘零。

    　　野草枯黄，树枝上挂着通红或者橙黄的颗颗野果。

    　　“哼吼！”黑色的野猪，身上的鬃毛直竖起来，四蹄在地上狂奔。

    　　山上的地面，积了一层厚厚的落叶。

    　　野猪冲撞而来，夹裹着一股风，落叶就在它身后飞舞。

    　　方源静静地站立着，看着野猪越来越近，脸上一片冷酷。

    　　杀！

    　　他忽然向前一大步跨出，然后双腿轮番迈步，竟然不闪不躲，悍然冲向野猪。

    　　野猪'
