    　　他在用自己的性命死撑，但难挡大局。

    　　“和天地之威相比，我纵然是八转蛊仙，又算得了什么？”战兽王老者在至尊仙窍中勤修苦练，眼界大开，实力大进，自信十足。但此刻在万劫之下，他充分感受到了自己的微渺和弱'
