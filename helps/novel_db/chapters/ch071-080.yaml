  content: '第七十五节：吃苦吃亏

    　　《人祖传》第五章，第三十二节。

    　　人祖继续赶路，只是过了一会儿，就有一头极其巨大的困境闯入人祖的视野当中。

    　　困境的身上寄居着强蛊，强蛊大笑：“人啊，我又回来了。我这次请来了帮手，看你还能怎么样！”

    　　人祖只好停下了脚步，眼前的困境是那样的高大，但他并不慌张。

    　　早在很早之前，人祖就被一群困境追得东奔西逃，但当他将本心交给了希望蛊，那群困境最怕希望，便慌忙逃窜了。'
