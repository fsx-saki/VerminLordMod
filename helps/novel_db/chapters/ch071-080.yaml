- chapter: 72
  title: 第七十二节：走肉树
  content: '第七十二节：走肉树

    　　上古荒兽气罡飞天猪的尸体，就在眼前。

    　　黑楼兰、方源二人虽然心动，却是都没有动弹。

    　　二人不约而同地抬头，望向上空。

    　　只见高空中，第八星殿阵阵颤抖。轰轰的爆炸声，野兽的嘶吼声从殿中传出。

    　　砰的一声巨响，星殿狠狠一颤，一道璀璨的炎柱，从星殿屋顶喷涌而出，将屋顶都冲破一个大洞。

    　　星殿并非实体，乃是洞天气象凝聚。屋顶破损的位置，开始散发点点星光，缺口不断向外扩散。'
