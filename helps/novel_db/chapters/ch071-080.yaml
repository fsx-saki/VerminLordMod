  title: 第七十三节：尸龙
  content: '第七十三节：尸龙

    　　走肉树乃是传说中的植物，记载于《人祖传》中。



    《人祖传》第三章第十六节有曰：

    　　人祖所生第三子——北冥冰魄，因为意外蛊复生，流落在外。遇到古月阴荒，赋予二姐全新的人生意义。

    　　而后，在智慧蛊的指点下，姐弟俩结伴来到蓝海，寻求能复活父亲人祖的生命宝石。

    　　结果古月阴荒察觉到生命的奥秘，主动牺牲了自己，将自己还原成一块残缺的生命宝石。

    　　北冥冰魄怀揣着生命宝石，企图回'
