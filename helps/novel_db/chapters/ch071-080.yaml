  title: 第七十八节：不出算计收获丰
  content: '第七十八节：不出算计收获丰

    　　厅堂中，族长古月博面无表情，双眼深邃，高居在主位。

    　　其余的十多位家老，则各自端坐着，眼观鼻鼻观心，只用眼角的余光隐晦地扫视左右，企图从周围人的表情上分辨出些线索。

    　　气氛一下子微妙起来。

    　　“方源能夺得第一，其中蕴藏的深意绝不简单。他居然说途中捡到一个藏着野猪牙的袋子，这话也太假了。”

    　　“这袋子只可能是有人暗中准备好的，单靠方源一个人是不可能完成的事情。'
