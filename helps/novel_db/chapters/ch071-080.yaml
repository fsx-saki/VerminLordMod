- chapter: 77
  title: 第七十七节：阴差阳错
  content: '第七十七节：阴差阳错

    　　一只如同大象一般巨大的野猪，栖息在泥坑当中。

    　　它闭着双眼，半跪半躺着，一对獠牙泥垢不沾，雪亮如刃。

    　　黄昏的光，映照着它的深黑毛皮。它巨大的肚子却是白色的，一起一伏，随着每一次呼吸，发出哼哼的响声。

    　　野猪王！

    　　方源距离它足有数百米远，但仍旧小心翼翼地在下风口行走。

    　　“我现在虽然能够斩杀野猪，但是面对这头野猪王，只有逃跑的份。就算是一般的二转蛊师，也杀不了'
