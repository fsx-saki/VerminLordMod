    　　野猪王！

    　　方源距离它足有数百米远，但仍旧小心翼翼地在下风口行走。

    　　“我现在虽然能够斩杀野猪，但是面对这头野猪王，只有逃跑的份。就算是一般的二转蛊师，也杀不了'
