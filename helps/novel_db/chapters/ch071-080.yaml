- chapter: 74
  title: 第七十四节：智窥迷雾现杀机
  content: '第七十四节：智窥迷雾现杀机

    　　树屋的空间并不大，里面的东西却很多，一眼望去显得杂乱无比。

    　　中央的地板上，铺着一张暗黄色的厚实毛毯。

    　　屋内靠着墙壁，是一个烧木柴的铁炉子，炉子上还架着一个铜水壶。炉子中有着黑色的灰，旁边则是一小堆未烧的干柴。

    　　别看是夏天，在这山中的夜晚，照样阴冷。铁炉子虽然小，升上火，就能保持整个树屋的温暖。

    　　树屋开着两扇窗户，两三根麻绳绕着一侧窗户的外沿，横穿树屋'
