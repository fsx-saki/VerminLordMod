    　　它们冲势很猛，完全不顾及自身安危。

    　　这些都是魂兽，大量的荒级魂兽，上'
  - '化。天道道痕可以变作任何流派，所以才有了飞霜跳雷劫、四炎云盖劫、龙吟劫、天鼓雷音劫、风花劫、雪月劫、玄白飞盐劫……

