- chapter: 71
  title: 第七十一节：我意蛊
  content: '第七十一节：我意蛊

    　　方源的魂魄在落魄谷中游荡。

    　　他并不游走太远，只在方源肉身周遭范围。

    　　在这里每隔一段时间，就有一阵迷魂雾自行飘来。

    　　方源魂魄沐浴在迷魂雾中，像是书本泡在水中，渐渐松散开来。

    　　“越是凝实的魂魄，就越不容易松散。在这里修行了这么多天，魂魄的凝实程度，是以前的十多倍，可谓进步神速！不过，和魔尊幽魂比较起来，还是天地差距啊。”方源暗自评估，难免又想到义天山大战的情景。'
