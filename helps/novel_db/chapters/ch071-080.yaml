  title: 第七十二节：内外交困
  content: '第七十二节：内外交困

    　　方源一时间眉头紧锁，仿佛一块巨石压在心头，脸色凝重。

    　　他并没有料到居然会有万劫产生。

    　　八转蛊仙是傲立仙界的存在，但对于每一位八转蛊仙而言，万劫都是一道难关。

    　　当今蛊仙界，大多数的八转蛊仙，都未渡过一次万劫。诸如百足天君、药皇如此，哪怕是凤仙太子也不例外。

    　　当初雪胡老祖为什么千方百计要炼出鸿运齐天蛊？不就是为了应付他人生当中的第一场万劫嘛！只可惜如此大动干戈'
