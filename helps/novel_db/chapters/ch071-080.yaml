    　　他的胸膛、双臂、双腿、腹部，都有了明显的肌肉群。

    　　这些肌肉并不向石块那样凸出，而是呈现一种流线型，搭配方源渐渐长高的身躯，以及白皙的肌肤，让人看了有一种青春的，充满活力的感觉。

