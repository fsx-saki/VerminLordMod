  title: 第七十二节：五转敛息蛊
  content: '第七十二节：五转敛息蛊

    　　一天一夜之后，方源一脸疲惫，走出荡魂行宫。

    　　他来到荡魂山上，经过这段时间，荡魂山上又长出了许多胆识蛊。但数目比第一次采摘时，要少了一半。

    　　方源将其一一捏碎，大部分的胆识蛊因为和稀泥仙蛊，对方源毫无用处。

    　　但方源此次屠戮严家，收集了不少的魂魄，胆识蛊数量不少。靠着庞大的基数支撑，方源的魂魄还是因此得到了不少的提升。

