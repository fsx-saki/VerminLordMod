  title: 第七十九节：万劫变
  content: '第七十九节：万劫变

    　　“方源，你到此为止了！”魔尊幽魂追逐一阵，再次出手。这一次却是自信十足。

    　　一时间，阴风呼啸，黑云漫天，好似一堵雄浑至极的城墙拦截在了龙宫前方。

    　　“这是……快撤！”这一刻，吴帅面色变得十分紧张。他辨认出来，这是魂道战场杀招！

    　　黑云蔓延滚荡而来，龙宫、气海老祖纷纷后退。

    　　仙道杀招——魂狩战场！

    　　这是魔尊幽魂最出名的战场杀招。

    　　魔尊幽魂凭此残杀了无数敌手。'
