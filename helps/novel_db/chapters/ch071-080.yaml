    　　因为这个任务的报酬，被琅琊地灵压得实在太低。

    　　经营仙窍不行，熟练变化道手段也是勉为其难，方源却没闲着，他动用智道手段展开许多推演。

    　　只是没有智慧光晕，让方源感受到巨大'
  - '源可谓是罪魁祸首之一。

    　　回顾一下事情发展。

    　　方源弄塌八十八角真阳楼，捣毁了王庭福地，使得北原正道无比惊恐震怒，千方百计想要找出他来。

    　　但那个时候，有影宗帮助遮掩，方源又自身努力，欺瞒一时。'
  - '于他，最稳妥的方式。

    　　时间不断流逝，很快半个月过去，宝黄天仍旧不见任何动静。

    　　毛六上蹿下跳，毛民蛊仙们对方源的态度，越发恶劣。

    　　甚至有人当众指着方源的鼻子，谩骂他包藏祸心，虽然加入琅琊派，但不'
  - '下心，正是如此。”楚度赞叹一声，旋即说明来意。

    　　原来，他想要从方源手中，得到仙灾锻窍之法，好引出狂蛮真意灌体，辅助他修行。

    　　和仙窍锻窍一法相比，他之前栽培力道蛊师成仙的法子，显得太过笨重，效率太低。'
  - '东方长凡斗气，输了他不止一筹。第一之名，还是休提，休提。”

    　　这位田下心智道蛊仙，本是一位凡人，连蛊师都算不上。

    　　但机缘巧合之下，得了一场好大仙缘。

    　　最终，继承了历史上赫赫有名的智道大能田园老仙'
  - '焚天魔女击退了黑家太上四大长老的青城纵横，而雪山老祖趁机在黑家大本营偷盗仙材，大发一笔。

    　　最后，义天山大战，影宗灭亡，无人替方源掩护，天庭又将方源秘密公之于众，使得王庭大案真相大白。

    　　北原蛊仙当然想要铲'
  - '次王庭争霸的游戏，嘿，还挺刺激！总之正道荣昌，黄金家族雄霸北原，大局不容撼动。

    　　但王庭福地毁了，八十八角真阳楼倒塌，这一切的美好物质基础，彻底崩溃倒塌。

    　　真凶找不到，从犯也找不到，那就找黑家罢！

    　　谁叫黑楼兰'
  - '式，但楚度联络，总不得回应。偶尔方源回应几下，也是敷衍之词。

    　　楚度越发焦躁。

    　　尤其是数月前，宝黄天关闭，让楚度彻底失去了和方源的联络方式。

    　　楚度也是期盼宝黄天开启的蛊仙之一，但他细细一想，又觉得就算'
- chapter: 80
  title: 第八十节：两道真传
  content: '第八十节：两道真传

    　　“黑家如此处境，我究竟要不要掺和一手？”方源仔细考虑，这当中的可行性。

    　　黑家虽然是超级势力、黄金家族，但是在北原各大超级势力当中，还是属于势弱的。更何况，它如今四面楚歌，面临的几乎是整个北原蛊仙界！

    　　它的结局自然不言而喻，必定是家破人亡的下场。

    　　黑家就算不甘，但以一家之力，反抗整个蛊仙界，怎么可能？

    　　除非有八转蛊仙护持，但黑家却是没有这样的存在。

    　　黑家四'
