    　　二人运用定仙游，从繁星洞天撤退后，就直接来到了这里。

    　　黑楼兰环顾左右，发现这里疑是一处地底溶洞，或者山体中空的内部。光线稀少，一片晦暗，又有怪石嶙峋，湿气极大，不过空间倒是颇为广阔。

    　　“这里便是地渊了。”方源淡淡地回答道。

    　　“地渊？”黑楼兰向方源投来诧异的目光。'
