- chapter: 73
  title: 第七十三节：神秘的红圈标记
  content: '第七十三节：神秘的红圈标记

    　　“你说方源此次勒索学员，虽然打败了方正、赤城还有漠北三人，但是却放过了他们，没有收取他们的元石？”听到侍卫的禀告，学堂长老露出了微微诧异的表情。

    　　“不敢欺瞒大人，的确是这样子的。”跪在地上的侍卫立即回答道。

    　　“嗯。”学堂长老不置可否，挥手道，“此事我知道了，你下去罢。”

    　　“属下告退。”

    　　侍卫走过，学堂家老立即陷入了沉思。

    　　原本他关注此事，是担心方'
