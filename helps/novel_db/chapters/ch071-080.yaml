- chapter: 72
  title: 第七十二节：任何组织都需要忠诚
  content: '第七十二节：任何组织都需要忠诚

    　　夏日炎炎，山风透着热烈，青茅山热气蒸腾。

    　　转眼间，已经到了六月末期。

    　　“古月方正！”学堂中，家老叫着名字。

    　　古月方正便从座位上走了出来，来到学堂家老的面前。

    　　在周围同龄人羡慕的视线注视下，方正接过一袋子沉沉的元石。

    　　“方正，你是第一个晋升高阶的，这都是你的奖励，做的不错，继续努力吧。”学堂家老欣慰地笑着，拍拍方正的肩膀。

