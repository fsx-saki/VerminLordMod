- chapter: 71
  title: 第七十一节：气泡鱼
  content: '第七十一节：气泡鱼

    　　通天蛊镶嵌在半空中，镜面中轮番闪现着狼的身影。

    　　忽然画面定格，显现出一头龟背万狼王。

    　　龟背狼体格宽厚，浑身墨绿，狼眼幽蓝。狼如其名，每只龟背狼的背上都长着一个乌龟似的甲壳。

    　　甲壳十分沉重，龟背狼大约有三分之一的重量，都集中在里面。作用除了防御之外，还类似于驼峰，有着存储营养的功能。

    　　在普通的野狼当中，这种狼的防御最强。

    　　而通天蛊中，显现出来的这头万兽狼王'
