  title: 第七十六节：幽魂尊位
  content: '第七十六节：幽魂尊位

    　　雷声轰鸣，震撼摧残着至尊仙窍。

    　　小南疆在万灭雷森的肆虐之下惨不忍睹，无数山峦倒塌，大地被劈得龟裂，坑洞无数。战兽王一直浴血奋战，他的身上伤势越来越重，处境越发艰难。

    　　他在用自己的性命死撑，但难挡大局。

    　　“和天地之威相比，我纵然是八转蛊仙，又算得了什么？”战兽王老者在至尊仙窍中勤修苦练，眼界大开，实力大进，自信十足。但此刻在万劫之下，他充分感受到了自己的微渺和弱'
