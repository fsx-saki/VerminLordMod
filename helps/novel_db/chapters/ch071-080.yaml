- chapter: 71
  title: 第七十一节：商燕飞的酬谢
  content: '第七十一节：商燕飞的酬谢

    　　“女儿？”

    　　一干少主皆流露出惊异的神色，彼此相视。

    　　商睚眦恍然大悟，一拍额头，原来是这样子。因为如此，父亲大人才礼遇这两人！

    　　神秘的面纱剥去，商睚眦看向方源的目光，隐藏着深深的仇恨。

    　　他已经不再惧怕。

    　　如今已经知道你的底细了，待我渡过这次考评，缓过气来，再来慢慢地对付你们俩个王八蛋！

    　　一时间，小院中一片安静。

    　　商燕飞含笑，目光扫视周围，留给'
