- chapter: 76
  title: 第七十六节：后悔吗
  content: '第七十六节：后悔吗

    　　“杀！”王大低吼一声，猛地从树梢上凌空飞扑而下。

    　　眼看着就要接近仇敌，忽然三道月刃飞骤然射而来，拦截在半路上。

    　　“怎么还有第四位蛊师？”王大心头猛地一沉，在半空中强行扭转身躯，险险地避过其中的两道月刃，还剩下一道，实在避免不过，正中他的左腿。

    　　砰。

    　　王大砸落到地上，低头看了一眼自己的左腿，左腿上一道伤口又深且长，已经是鲜血淋漓。

    　　“可恶……”王大咬牙切齿'
