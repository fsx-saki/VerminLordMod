- chapter: 703
  title: 第七百零八节：人中豪杰
  content: '第七百零八节：人中豪杰

    　　天庭战场。

    　　前线如火如荼，龙公领袖天庭诸仙与北原一方，厮杀一团。

    　　而后方因为气墙阻隔，却显安静。紫薇仙子统领全局，时刻关注着各个方面。

    　　“嗯？”鸡笼犬舍即将撞上帝君城的一幕，顿时令紫薇仙子心头一紧。

    　　“正元前辈，快快出手，救下帝君城！”她瞬间做出决定，口中高喝，神色不可避免的有一丝紧张。

    　　正元老人微微点头：“仙子勿忧，人意已然积蓄足够了，而我的使命也'
