- chapter: 709
  title: 第七百一十四节：局势
  content: '第七百一十四节：局势

    　　武庸、药皇等人都有些微的茫然。

    　　九九连环不绝阵，这可是星宿仙尊布置下来，专门为了对付无极魔尊的大阵。根据传闻，当年的无极魔尊也是连破百阵之后，才脱困而出。

    　　凭他们实力，如何能突破这等天堑绝关？

    　　更让人心中焦躁不安的是，他们必须争分夺秒，时间可不等人，一旦宿命蛊彻底修复，就再无胜利的希望。

    　　“怎么办？”百足天君皱起眉头。

    　　“这是星宿仙尊手笔，难怪！难怪！'
