- chapter: 710
  title: 第七百一十五节：五界大阵
  content: '第七百一十五节：五界大阵

    　　不败福地战场。

    　　宛若天柱的飓风，卷起无边风浪，碾压着天庭大阵。

    　　留守在外的凤仙太子、巴十八凝神盯着远处天与地的交界处。

    　　在那里，两道光虹划破长空，逐渐显露出两位八转蛊仙的身影来。

    　　正是厉煌和清夜。

    　　“终于赶到了！”

    　　“没错，还不晚。”

    　　厉煌、清夜联袂杀至。

    　　“方源那贼子究竟在哪里？”厉煌一双眼眸闪烁着橙红色的火光，不断侦查。

    　　他对方'
