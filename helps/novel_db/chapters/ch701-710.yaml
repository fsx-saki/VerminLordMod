- chapter: 708
  title: 第七百一十三节：九九连环不绝阵
  content: '第七百一十三节：九九连环不绝阵

    　　因为药皇等人的提前告知，武庸对方源的到来，也早有心理准备。

    　　他是枭雄本性，尽管和方源有着深仇大恨，但此刻天庭才是大敌。对付天庭，阻止对方彻底修复宿命蛊才符合武庸的最大利益，所以为了这利益，武庸可以暂且抛弃情仇，和方源联手。

    　　“武庸仙友，果然是深明大义。”药皇点头赞道。

    　　随即，池曲由等人也齐声附和：“不只是武庸盟主大人，我南疆各大超级势力，也愿意放弃前'
