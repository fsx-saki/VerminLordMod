- chapter: 704
  title: 第七百零九节：四大龙将
  content: '第七百零九节：四大龙将

    　　帝君城战场。

    　　一番艰难的游斗，方源逐渐看出了一些端倪。

    　　人中豪杰这样强大的杀招，效果简直是要逆天，但不是没有代价的。

    　　厉煌、清夜身上的白色光晕，总是在迅速削减，消耗得极快。

    　　不过与此同时，白色光晕又始终得到补充。

    　　天空中的白色光芒，宛若恒河沙数，仿佛无穷无尽一般，不断地汇聚到厉煌、清夜等人的身上。

    　　方源多次出手尝试破解，毫无成效。

