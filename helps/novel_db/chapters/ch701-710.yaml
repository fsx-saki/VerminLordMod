- chapter: 706
  title: 第七百一十一节：杀方源为民除害
  content: '第七百一十一节：杀方源为民除害

    　　方源的成就，是他自己的努力成果，也有许多前人的资助。

    　　天庭、中洲同样如此，能够防御住方源和西漠诸仙的进攻，并不奇怪。这是实力和底蕴，是中洲、天庭无数代人的努力。

    　　这种努力，不管是现在还是曾经，都是无法否认的。

    　　“事不可为，只有撤了。”方源心道。

    　　厉煌、清夜一直努力纠缠着方源，不过依凭方源的手段，他自信还是能够突围的。

    　　对于帝君城，方源已无摧毁'
