- chapter: 701
  title: 第七百零六节：七极荒都
  content: '第七百零六节：七极荒都

    　　龙御上宾杀招使得龙公越来越强，每一个呼吸都比之前更强大。

    　　望着天空中的光阴长河幻景，龙公的眼眸中浮现出复杂的光，他轻声叹息：“红莲呐，你的前有古人，后有来者，为师都看到了。现在就让你见识一番为师的龙御上宾！”

    　　龙公的话，让北原强者无不着恼。

    　　他明显是不把北原诸仙放在眼里，他的眼中只有红莲魔尊一人。

    　　北原诸多强者无一不是历史留名的人物，自然有着心气和傲性。'
