- chapter: 707
  title: 第七百一十二节：愿和方源联手
  content: '第七百一十二节：愿和方源联手

    　　不败福地战场。

    　　“这是什么阵？”武庸问道。

    　　在他身边，是翼浩方、池曲由两位八转，以及南疆的一干七转精英。

    　　而在不远处，则是药皇领袖，百足天君、楚度等北原诸仙。

    　　在商议后，双方达成了短暂的盟约，一齐联手，进攻天庭。

    　　但双方到底只是第一次合作，盟约比较松散宽泛，彼此之间还有戒心。但武庸其实已经非常满意。

    　　“北原、南疆合作，这在历史上都尚属于首次'
