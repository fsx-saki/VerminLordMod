- chapter: 705
  title: 第七百一十节：命运歌
  content: '第七百一十节：命运歌

    　　华彩云不禁苦笑。

    　　原来这一切，看似成功在望，不过是天庭精心策划的一个巨大陷阱！

    　　“正是如此。”张阴等人从容而笑。

    　　青岳安等人反应过来。

    　　“为了让我们安心，你们居然任凭我奴役了悲风老人，真是居心叵测。”沈从声寒声道。

    　　“这并非是我们的打算，也并非是龙公大人的谋划。”张阴摇头，俨然是四人之首，“你们可知，你们的一切行动都未逃过紫薇仙子的推算。令我等潜伏，也'
