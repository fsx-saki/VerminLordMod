- chapter: 702
  title: 第七百零七节：致命一击
  content: '第七百零七节：致命一击

    　　插翅刀声威赫赫，乃是北原蛊仙界公认的第一攻伐手段，就连大同风都能暂时劈开，可想而知它的恐怖威能。

    　　“避开了？”紫金龙形气劲一闪，龙公忽然现身在远处，脸上有着惊疑。

    　　呃！

    　　下一刻，他便看到自己额头上的龙角，缓缓下坠，在他面前掉落。

    　　关键时刻，龙公勉强避开了插翅刀，但他的右边龙角被直接斩断大半。

    　　龙公动容。

    　　就在这时，黑金巨人对龙公伸手一勾。

    　　仙'
