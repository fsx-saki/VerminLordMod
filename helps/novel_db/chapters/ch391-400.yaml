- chapter: 395
  title: 第三百九十六节：红云追来
  content: '第三百九十六节：红云追来

    　　方源无奈。

    　　他无法逼迫琅琊地灵做什么。

    　　现在，卡在这里，即便他想要继续推算仙阵洁身自好，没有关键仙蛊，当然不行。

    　　“关键是，我还需要借助琅琊派的力量，帮助自己炼蛊。”

    　　方源得了紫山真君的遗藏，缺少很多仙蛊，未来他在炼蛊方面，有着一大堆的计划。

    　　如果琅琊地灵思考良久，仍旧拒绝方源，该怎么办？

    　　这个问题，方源早已经想过。

