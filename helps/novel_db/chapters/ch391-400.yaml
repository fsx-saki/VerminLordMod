- chapter: 394
  title: 第三百九十五节：固运
  content: '第三百九十五节：固运

    　　“主人，你切不可将整个蛊阵拆掉。这蛊阵一毁，我也就陨灭了。”这时，阵灵开口，关照红云舞娘道。

    　　红云舞娘点点头。

    　　这个阵灵，的确是优秀实用。

    　　之前蛊阵崩溃，无人主持，换做通常情况之下，就彻底土崩瓦解了。但是因为阵灵，反而将一部分蛊阵统合起来，形成一个小型的残阵，苟延残喘，坚持到底。

    　　就像是地灵，会修补有了漏洞的福地一样，阵灵也有同样的作用。

