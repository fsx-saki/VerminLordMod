- chapter: 397
  title: 第三百九十八节：暗算成功！
  content: '第三百九十八节：暗算成功！

    　　“交易？”方源微微扬起眉头。

    　　他顿时明白了，千变意志的想法。

    　　千变老祖获得了狂蛮真传，这些年来，又经营有加，完全有底蕴和方源交易，哪怕他最近刚刚渡劫，损失惨重。

    　　但也正是因为渡劫的缘故，千变老祖并不想开战。一旦他答应和方源的联盟，那么就必然会对上天庭的蛊仙。

    　　千变老祖可不蠢笨，怎可能在这样的时刻，被方源等人当枪使唤？

    　　不过……

