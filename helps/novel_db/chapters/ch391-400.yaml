- chapter: 399
  title: 第四百节：影宗群仙战九歌
  content: '第四百节：影宗群仙战九歌

    　　凤九歌一身红白相间的长袍，玉树临风，此时望着影宗群仙，温和地笑着，更显得风度翩翩。

    　　他浑身毫无战意或者杀气，但影宗众人，却无不感到巨大压力。

    　　“凤九歌……”方源越众而出，口中呢喃。

    　　他风姿卓绝，白袍如雪，面冠如玉，双眼如点漆，深不可测。

