  title: 第三百九十二节：红云舞娘
  content: '第三百九十二节：红云舞娘

    　　一朵妖娆的红云，在高空中飞行。

    　　“前方就是青鬼沙漠了。”红云舞娘躺卧在红云之上，微闭双眼，意态悠闲。

    　　她身材凹凸，曲线有致，此时穿着一身黄线红纱的舞衣，露出雪白的肚皮、手臂以及脚掌。

    　　在她的手腕和脚腕上，各戴着一个金丝玉镯。

    　　手指上，有不少宝石戒指，蓝色、绿色、红色，交相辉映。

