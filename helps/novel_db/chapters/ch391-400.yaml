- chapter: 398
  title: 第三百九十九节：纯梦求真立功
  content: '第三百九十九节：纯梦求真立功

    　　“好了，先把影无邪救出来。黑楼兰，看你的了。”方源一边吩咐，一边打开仙窍门户。

    　　黑楼兰点点头，遁出她的魂魄，旋即钻入到方源仙窍中。而她的肉身，则悬浮在空中，闭目不动。

    　　很快，另外一具纯梦求真体飞了出来。

    　　正是黑楼兰。

    　　黑楼兰飞进梦境当中去，不一会儿，就将影无邪拽了出来。

    　　影无邪还曾经在梦中，没有清醒。

