- chapter: 393
  title: 第三百九十四节：真传易主
  content: '第三百九十四节：真传易主

    　　红云舞娘乃是主修云道，但自从幽魂魔尊之后，搜魂的手段因为简浅易学，成为了每个蛊仙的必备手段。

    　　此时，她搜刮韩立的魂魄，顿时了解到了韩立修行的大体经过，自然韩立在蛊阵中的历险，也曝了光。

    　　“有意思！”红云舞娘一把抓住韩立，然后遁入沙漠当中，很快就来到了那处地下沙洞。

    　　地下沙洞几乎已经彻底崩塌，不过，红云舞娘竟意外地，在角落里发现了一个小巧的蛊阵。

