    　　在她的述说中，她是想要寻找西漠僵盟分部的遗藏，结果遭遇到了天庭的蛊仙。

    　　天庭的蛊仙对她似乎也比较熟悉，认出她是千变老祖的妻妾。

    　　尽管，翠波仙子搬出了千变老祖的名头，但是天庭蛊仙却反而敌意更浓。

