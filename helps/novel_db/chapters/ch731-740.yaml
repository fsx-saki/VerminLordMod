- chapter: 738
  title: 第七百四十三节：我等你已久！
  content: '第七百四十三节：我等你已久！

    　　雷鬼真君只感觉天地颠倒，左右紊乱，忽然间就视野骤变。

    　　下一刻，她消失在天庭，出现在一处大阵空间之中。

    　　“嗯？！”她定睛一看，便看到方源就站在她的面前，手中的杀招早已经蓄势待发。

    　　“方源你来得好！！”雷鬼真君立即大吼一声，正是仇人相见分外眼红。

    　　方源却是淡淡一笑：“雷鬼真君，我早已等候你多时了。”

    　　话音刚落，他手掌轻轻一甩，便将落魄印照准雷鬼真君'
