- chapter: 739
  title: 第七百四十四节：优势太大
  content: '第七百四十四节：优势太大

    　　星投杀招虽然强悍无比，完全是影响五域战略平衡的杀招。但只要是招数，便会有缺憾和弱点。

    　　方源对星投杀招知道的不是很多，但关键的一点他是明白的。

    　　星投杀招需要引子。

    　　这个引子就是凤九歌上一次入侵琅琊福地后，遗留下来的不利道痕中的某一部分。

    　　上一世，这部分的不利道痕忽然形成黑暗漩涡，将陈衣、雷鬼真君、凤九歌、紫薇仙子投放进来。

    　　幸亏当时方源和琅琊地灵反应'
