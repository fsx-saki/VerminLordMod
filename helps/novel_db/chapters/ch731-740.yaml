  events:
  - '如今的实力和影响力，举足轻重，远远超越之前的任何一次重生。

    　　这样的实力和影响力，导致他重生归来，墨水效应更大。

    　　方源一面出手，严格执行着自己的大计，一面也在全身心地戒备可能出现的问题。

    　　不出方源所'
  - '八大主材，都交给琅琊地灵。

    　　琅琊地灵辨识之后，确认仙材无误，没有什么猫腻之后，便和方源以及其他的毛民蛊仙一起运用炼道杀招，不断地揣摩和熟悉这些仙材。

    　　如此准备了几天，琅琊地灵见时机成熟，便带着方源'
  - '的资源，非常困难！

    　　方源却是有的放矢，早就知道哪里有收获，直奔那里而去。

    　　这都有赖于前世，他特意收集这方面的情报。

    　　地沟的成形，根本没有规律，对于绝大多数的蛊仙，这些情报毫无价值。但是对于方源'
  - '仙的野心！上一世，四域蛊仙齐攻中洲天庭，这些地沟中的资源在幕后起到了重要作用。五百年前世，之所以发生五域乱战，五域动荡不定，地沟资源和梦境带来的境界暴涨，都是主要缘由。”

