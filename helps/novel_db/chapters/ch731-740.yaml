- chapter: 735
  title: 第七百四十节：你心里还没数？
  content: '第七百四十节：你心里还没数？

    　　方源算了算时间。

    　　还蛮充裕的！

    　　尽管他已经将蒙屠、睡姑都杀了，还跑了一趟光阴长河，获取了红莲真传，更远去南疆，将那只计划中的野生仙蛊拿了来。

    　　做了这么多的事情，此刻距离上一世张继贩卖浮生火，竟还有几天的空余。

    　　“主要还是因为上一世，我为了推算阎帝、阎罗子这些杀招，耗费了几个月的时间。”

    　　“而这一世重生，我直接就出发了，节省了许多时间、精力。”'
