- chapter: 740
  title: 第七百四十五节：死后还背锅
  content: '第七百四十五节：死后还背锅

    　　定仙游仙蛊终于到手了！

    　　如此一来，方源将来晋升八转，未来身杀招无效，也不用担心损失定仙游这类的手段。

    　　定仙游是用来移动的仙蛊，效果相当强大，会带给方源很多便利。

    　　上一世，方源推算出了杀招，以定仙游为核心，即便是八转修为，也能勉强带动他满世界乱窜。

    　　有了这只仙蛊，就意味着有了极其强大的机动性！

