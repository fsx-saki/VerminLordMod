  - '黄史上人虽然折了，但天庭已经查明，是红莲真传的力量，也分析出了方源此时的宙道实力。

    　　旬果子妙眸一转，嬉笑起来：“放心吧，放心吧，就算三位哥哥都战死了，只要有我旬果子在，你们一定能再活过来的。”'
  - '的天然仙阵。

    　　随后，他步入仙阵中去，身形消失在原地。

    　　和南疆相差不多，这里同样也有一处天然的光阴支流，影宗发现之后，动用阵道手段，结合这里的天然道痕，布置出仙级大阵，将这里隐藏起来，无人发觉。

