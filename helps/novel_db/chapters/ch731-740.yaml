  events:
  - '他走出大阵之后，便催动定仙游仙蛊，直接去了南疆。

    　　这个时间段，方源怎么会有定仙游仙蛊？

    　　仙蛊唯一，定仙游仙蛊当然还在凤九歌那边。

    　　事实上，方源利用的是杀招未来身！

    　　这个宙道杀招非常奇妙，它'
  - ：“是啊。当初星宿仙尊似乎就曾经这么干过。她虽然不是宙道蛊仙，但是智道手段非凡，模拟出宙道威能，通过光阴支流，推算出未来的种种情形。她预知到绿龟七人众开创出历史上第一座蛊屋——龟房，便创造出了星宿棋盘。”
  - '是从地球上穿越过来，在地球上有一个名词，称之为蝴蝶效应。

    　　方源现在陡然明白，对于这个蛊世界而言，墨水效应更能准确地阐述重生后的影响。

    　　“当然，我能够轻易改变其他的事物，是因为宿命蛊并不完好，更关键的是'
  - '易。一直以来，都没有什么收获。

    　　上一世，就快要有收获的时候，还被方源破坏了，最终凤九歌不得不动用大同风杀招，摧毁了石莲岛。站在天庭角度来看，也蛮悲催的。

    　　方源踏足的这座石莲岛，一直静立在此处，有数百'
  - '不气馁。

    　　这种情况，也在他的估料之中。

    　　今古亭。

    　　四旬子遭遇了一个小麻烦。

    　　一头上古年兽正在攻击今古亭，今古亭绽射玄光，岿然不动。

    　　很快，在四旬子的合力出击下，这头上古年兽阵亡。'
  - '有大量的宙道仙材，其中八转级数的仙材占据绝大多数。

    　　红莲真意——能够让一位蛊仙的宙道境界飙升到准无上大宗师的境地。

    　　还有以春秋蝉为核心的各种仙道杀招，春秋必成就是其中之一。

    　　最后还有一招红莲魔尊特意'
  - '宗师的境地。

    　　还有以春秋蝉为核心的各种仙道杀招，春秋必成就是其中之一。

    　　最后还有一招红莲魔尊特意留下的手段，名为未来身，能够让蛊仙拥有未来七转巅峰的状态。

    　　缺少的是悔蛊。

    　　这只八转仙蛊还留'
  - '忆，方源先把甜头给尝了！

    　　“没有悔蛊，暂时也不要紧，毕竟眼下的难关是天庭入侵琅琊福地，距离我大批升炼仙蛊还有不少时间。”

    　　“先利用好杀招未来身罢。”

    　　方源将影无邪等人都放出来，让他们在石莲岛上修行'
