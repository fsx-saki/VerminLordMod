  - '的突泉能陷杀八转蛊仙。又比如光阴斑斓，这种苍白光斑能削减寿命，任何蛊仙都要深深忌惮。

    　　还有常见的年兽。光阴长河中多的是荒级年兽、上古年兽。

    　　一路潜游过来，方源遭遇了至少三次太古年兽。

    　　幸亏他来'
