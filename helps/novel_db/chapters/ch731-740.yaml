- chapter: 737
  title: 第七百四十二节：天庭来攻
  content: '第七百四十二节：天庭来攻

    　　琅琊福地，长毛炼道大阵。

    　　血光逐渐消散，血道小阵缓缓打开，一前一后的走出方源和琅琊地灵。

    　　方源的阴谋得逞了！

    　　在上一世，琅琊地灵曾经令紫薇仙子都猝不及防。后者打杀了黑毛地灵，却轮到白毛地灵登场。

    　　黑毛地灵富有野心，尽管知道琅琊福地和长生天的求援约定，但也不想动用。

    　　白毛地灵登场后却是干脆利落，直接向长生天求救。

