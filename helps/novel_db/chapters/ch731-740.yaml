    　　影无邪等人都留在了石莲岛上，熟悉未来身杀招。

    　　方源重生归来，自然省略了这一步骤。

    　　未来身对方源最大的帮助，并非修为、战力等等方面，而是定仙游。

    　　有了未来身杀招，方源就能利用它，在五域两天中四处转移。

    　　当然，像是龙鲸乐土这样的地方，是无法直接进去的。

    　　仙蛊唯一，此时此刻真正的定仙游仙'
