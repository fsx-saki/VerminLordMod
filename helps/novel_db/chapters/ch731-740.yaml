    　　“这个时间，七转的定仙游应该在凤九歌身上吧？”

    　　上一世，方源就是在琅琊保卫战中，动用大盗鬼手盗取了凤九歌身上的七转定仙游蛊。

    　　这只蛊虫带给方源不少帮助。

    　　即便方源后来修'
  - '定音，所以只能依靠大盗鬼手出奇制胜，或者动用万蛟、阎罗子来消耗战，处境尴尬。

    　　这种尴尬接连导致了蒙屠自爆，琅琊守护战中方源败北逃生等等结果。

    　　上一世，方源为了落魄印杀招，不顾艰难险阻，闷头推算，耗费了'
- chapter: 733
  title: 第七百三十八节：方源的未来身
  content: '第七百三十八节：方源的未来身

    　　方源再次登上石莲岛。

    　　更准确地说，是今生第一次，但上一世他已是登上过。

    　　一踏入石莲岛，方源就沉浸在红莲魔尊的记忆影像之中。

    　　这在他上一世就已经参阅过，今生只是重复，但方源依旧有些触动。

    　　“红莲魔尊算是最特殊的一位尊者了。他本有九转修为，但利用了春秋蝉重生，算是舍弃了九转尊位。”

    　　“但若是他不舍弃的话，他就无法回到过去，改变事实，弥补心中的悔恨和'
