- chapter: 731
  title: 第七百三十六节：杀仙夺财
  content: '第七百三十六节：杀仙夺财

    　　北原。

    　　秋刀原。

    　　一位蛊仙赤脚行走在草地上。

    　　他身材魁梧，皮肤呈现红铜般的色泽，穿着马甲，露出肩膀，裤腿挽起，露出小腿。

    　　每当他踏出一步，他都会在草地上留下血液形成的足迹。

    　　他便是蒙屠。

    　　刀道准大宗师，七转蛊仙，巅峰战力，蒙家七转中名列前三的强者！

    　　为了突破刀道上的境界，蒙屠自愿镇守秋刀原，效仿人祖终年苦修，几乎不问世事。

