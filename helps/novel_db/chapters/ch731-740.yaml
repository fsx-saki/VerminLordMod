- chapter: 736
  title: 第七百四十五节：恩将仇报！
  content: '第七百四十五节：恩将仇报！

    　　“方源你竟然真的敢，你实在是太无知无畏了！竟然敢在琅琊福地算计我！我要让你明白你究竟犯下了何等严重的错误！！”

    　　琅琊地灵大吼，满脸的愤怒，仿佛是即将喷发的火山，下一刻就要岩浆滚滚，将方源当做渣滓融化。

    　　然而下一刻，琅琊地灵动作顿止，脸上的怒意陡然一僵，旋即变成了深深的惊愕。

