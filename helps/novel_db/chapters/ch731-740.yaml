    　　除此之外，还有海量的凡级刃蛊。

    　　仙级的刃蛊就不要想'
- chapter: 732
  title: 第七百三十七节：再收红莲真传
  content: '第七百三十七节：再收红莲真传

    　　北原。

    　　一片普通的贫瘠草原，荒无人烟。

    　　忽然，天空中闪过一道奇光，闪现出四个蛊仙来。

    　　正是方源、影无邪、妙音仙子、白兔姑娘四人。

    　　重生到这个时间段，妙音仙子、白兔姑娘还有潜伏在琅琊派中的间谍毛六，都未牺牲，仍旧活着。

    　　“好了，你们回去继续修行。”方源打开至尊仙窍门户，让三位蛊仙钻了进去。

    　　眼下影宗这些残余蛊仙，都龟缩在方源的至尊仙窍中修行。'
