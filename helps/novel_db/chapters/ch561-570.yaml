  title: 第五百六十四节：该撤了
  content: '第五百六十四节：该撤了

    　　“井斓前辈！”紫薇仙子发出一声悲鸣。

    　　陈衣、凤九歌二人的脸上亦都流露出悲伤、仇恨、愤怒等等情绪。

    　　井斓的死，出乎他们意料。因为他们也没有料到，琅琊福地当中竟然还收藏着偷生仙蛊！

    　　“不是说，盗天魔尊在神秘失踪之前，感念偷生蛊太过厉害，落到别有居心的人手中，会遗祸世间，便连同蛊方一起毁了吗？”紫薇仙子紧皱眉头。

    　　很显然，这是一个错误的情报，但却被天庭误以为真'
