- chapter: 563
  title: 第五百六十六节：屠杀
  content: '第五百六十六节：屠杀

    　　“怎么回事？”

    　　“仙道战场……这，这个玩笑可不好笑啊。”

    　　“方源大人，我们可是自己人！”

    　　惊呼声迭起，石人和雪民蛊仙口中呼喊，同时目光中都透射出深深的戒备之色。

    　　当今天下，人族称雄，这些石人、雪民作为异人，在北部冰原苟延残喘，面临着巨大的生存压力。在这种环境下生存下来，并且成就蛊仙的异人，自然不会是废物。

