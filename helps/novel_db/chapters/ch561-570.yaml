- chapter: 570
  title: 第五百七十三节：劫掠和建设
  content: '第五百七十三节：劫掠和建设

    　　轰！

    　　方源衣袖一拂，黑色的雾气卷席八方，正是魂爆杀招。

    　　这是七转巅峰的手段，立即将池家建立在云竹山脉上的仙道大阵最核心之处，摧枯拉朽地炸毁。

    　　轰隆隆。

    　　又是一阵轰鸣，大阵核心瓦解，其他地方的部分仙阵也紧随其后，接连崩散。

    　　至此，整个云竹山脉大阵彻底宣告瓦解。

    　　“果然是走了。”望着空无一人的核心之地，方源目光幽深，却无一丝意外之色。

