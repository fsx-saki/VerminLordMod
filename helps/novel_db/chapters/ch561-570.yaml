- chapter: 569
  title: 第五百七十二节：云竹山脉
  content: '第五百七十二节：云竹山脉

    　　“收。”方源悬浮在半空中，打开仙窍门户。

    　　大量的野生摄心蛊，被无形而又温和的力量牵引起来，汇集到空中，仿佛是一股亮丽的云雾，纷纷投入到方源的仙窍当中去。

    　　这个过程，足足持续了半盏茶的功夫。

    　　方源略微估算了一下：“五转摄心蛊有三千多只，四转则有五万，三转以下的摄心蛊规模多达百万。”

    　　摄心蛊形如雨花石，不同转数之间，颜色和形态都不一样。它是智道蛊虫，用了之'
