- chapter: 568
  title: 第五百七十一节：强攻
  content: '第五百七十一节：强攻

    　　曾经的方源，需要伪装和遮掩，但现在面对南疆正道的诸多蛊仙，他却没有必要这么做了。

    　　方源主动现身，让南疆正道蛊仙们都十分震惊！

    　　曾经，方源伪装成武遗海，在梦境大战中收获颇丰，成为影宗宗主，最后被南疆正道联合追杀，都能扬长而去。

    　　天庭通缉，也没有拿方源怎么办。

    　　数月之前，方源忽然出现在南疆，杀了侯家、商家两位蛊仙，若非是乐土传人现身阻止，铁家铁面神都要阵亡。'
