- chapter: 562
  title: 第五百六十五节：牛魔花子
  content: '第五百六十五节：牛魔花子

    　　“太上大长老，你这怎么说！”长生天来人对方源恶意满满，方源一边爆退，一边逼视琅琊地灵责问道。

    　　琅琊地灵冷哼一声，没有给方源好脸色：“我还没有和你算账！就是你别有居心，推波助澜，让黑毛一错再错，这期间你得到的好处还不够多吗？！”

    　　琅琊地灵翻脸了。

    　　方源面色阴沉下来：“你就不怕盟约……”

    　　“当初是黑毛与你们定下的盟约，可不是我！”琅琊地灵立即回道。

