- chapter: 564
  title: 第五百六十七节：方源境界
  content: '第五百六十七节：方源境界

    　　这一处的梦境，规模并不大。

    　　方源之所以能够准确地寻找到此地，正是因为这里的梦境，就是他自己亲手丢下来的。

    　　当初，他伪装成武遗海，混进正道，偷偷入梦，提升境界。后来大战爆发，天庭插手，紫山真君战死，方源继承影宗，携带着大量的纯梦求真体走上了逃亡之路。

    　　在这一路上，方源屡次利用纯梦求真体，对抗强大的追兵，终于使得自己脱离险境。

    　　但他身上的纯梦求真体，也因此'
