- chapter: 566
  title: 第五百六十九节：鬼手杀人
  content: '第五百六十九节：鬼手杀人

    　　轰轰轰！

    　　一连串的轰鸣炸响，五颜六色的光影，宛若烟花绽放。金、木、水、火、土、智、力、魂、毒、星、炼……各种流派的招数，被方源信手拈来。

    　　攻势之下，一座仙道大阵的虚影，浮现而出。它厚重得仿佛一座碉堡，洁白的光影重重如山，挡住方源的全部攻势。

    　　“哈哈哈，雷声大雨点小，就你这些手段，华而不实，根本不能动摇我方阵脚！”仙阵之中，羊家蛊仙羊三目大声地嘲笑道。'
