- chapter: 567
  title: 第五百七十节：勾心斗角
  content: '第五百七十节：勾心斗角

    　　“居然死了？”方源见到这样的战果，也是微微一愕。

    　　“看来，这个羊三目的运气真是不太好。居然连续两次，让我偷盗了杀招中的核心仙蛊。”方源神情平淡，摇了摇头。

    　　这就是运势上的压制。

    　　之前没有压得住凤九歌，凤九歌乃是护道人，运势和方源相差仿佛。但羊三目就普通得多，所以死在了大盗鬼手之下。

    　　方源忽然发现，其实运道、偷盗之间搭配起来，也相当厉害。虽然他的运道真传并'
