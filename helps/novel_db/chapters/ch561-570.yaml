- chapter: 565
  title: 第五百六十八节：雪晶阵
  content: '第五百六十八节：雪晶阵

    　　两位纯梦求真体进入至尊仙窍，深入小绿天中，便暂且安置下来。

    　　至尊仙窍同样分有五域九天，在所有的小九天里，小绿天是方源建设最少的地方。所以，这里就成了方源安置和囤积梦境的地方。

    　　影宗成员影无邪、白兔姑娘、黑楼兰、妙音仙子，以及白凝冰则在小黄天中，各自潜修着。

    　　琅琊大战，层次太高，参与者几乎都有八转战力。就算是异人蛊仙，也是依靠超级仙阵参加大战，仙阵一破，他们就'
