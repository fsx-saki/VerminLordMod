    　　因为他需要不断地去往河面上换气。

    　　这一点，方源并不如死去的沐凌澜。后者是水道蛊仙，身上有特殊的水道道痕，能让他在水底自由呼吸。

    　　反观仙僵本身，却是无所谓呼吸的。因为仙僵本身，就是个死人。

    　　“哼！”方源攻击不下，忽然转移目标，对准了影无邪怀中的紫山真君。

