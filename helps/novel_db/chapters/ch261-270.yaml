    　　这些天道仙材被消耗之后，方源的全身上下就会覆盖一层新增的天道道痕，宛若渔网。

    　　每当有他人推算、侦查方源，这层天道道痕组成的渔网就会迅速形变，编织渔网的线条不断伸'
