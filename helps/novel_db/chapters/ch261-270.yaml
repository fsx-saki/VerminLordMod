  title: 第二百六十二节：只手拿龙鱼
  content: '第二百六十二节：只手拿龙鱼

    　　“该死的古魂门，居然为了阻止我们，不惜将荒兽龙鱼惊动起来！”

    　　此时，湖心小岛上，天妒楼的一群人被困住，阻碍了去路。

