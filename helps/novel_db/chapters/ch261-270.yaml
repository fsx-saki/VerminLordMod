    　　天妒楼五位蛊师，各个眉头拧成疙瘩，望着湖面，心中气愤又无奈。

    　　通过湖水，他们甚至能隐隐看到，在湖水深处，有一个庞大的怪物身躯，疯魔似的游荡。

