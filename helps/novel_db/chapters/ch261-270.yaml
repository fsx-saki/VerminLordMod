  content: '第二百六十六节：境界暴涨

    　　“我来帮你们！”方源解开手中的风结草后，主动走到最近的一位孩童面前。

    　　“嘿嘿，小崽子，你还想救其他人？可以！但是你……”兽人首领冷笑。

    　　但他话还未说完，就被方源打断。

    　　“知道了。救不了他们，我也不会走的，你们就吃了我吧！”方源挥挥手，很随意地道。

    　　“呃……”兽人首领一噎，说不出话来。

    　　周围的孩子们，则用看待英雄的目光，希冀且又崇拜地仰视方源。'
