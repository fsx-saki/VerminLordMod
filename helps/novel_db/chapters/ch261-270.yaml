    　　小东海。

    　　碧绿的水流，庞大如蛟，在海面上飞速流窜。

    　　数位六转蛊仙围追堵截。

    　　“快，水流朝你那边去了。”

    　　“看我的！”

    　　轰。水流激荡，掀起十丈高的海浪。

    　　“挡下来了！不，小心。”

