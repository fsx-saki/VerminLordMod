  title: 第一百四十四节：叶凡vs白凝冰
  content: '第一百四十四节：叶凡vs白凝冰

    　　“呼……”方源看着眼前一片黑色的腐臭坑地，长长地舒了一口气。

    　　“第五次地灾，总算是渡过去了！”

