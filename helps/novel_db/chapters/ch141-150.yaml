- chapter: 141
  title: 第一百四十一节：古月青书VS白凝冰（中）
  content: '第一百四十一节：古月青书VS白凝冰（中）

    　　三转蛊虫的力量下，青书的双眼变成了翠绿之色。

    　　这一刻，他的气息陡变。从活泼的人气，转变成了深幽静谧的森林气息。

    　　“嗯？”白凝冰也不由地露出微微的惊异之色，他满不在乎地扯动嘴角，“看来很长时间没有和你交手了，你也有了一些有趣的手段。”

    　　冰锥蛊。

    　　他意念一动，凭空就凝结出了五只尖锐的冰锥。

    　　“去。”白凝冰手一指，冰锥便激射而出。

    　　啪'
