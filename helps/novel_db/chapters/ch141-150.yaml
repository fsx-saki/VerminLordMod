  title: 第一百四十四节：牺牲常在，而信念不死
  content: '第一百四十四节：牺牲常在，而信念不死

    　　“我对他说，一个人活着，会有千千万万的理由。你为什么活着，我回答不了，只有你自己才能够回答。自己去寻找罢。”古月博答道。

    　　“那么族长您自己的答案是什么呢？”方正疑惑地眨眨眼，问道。

