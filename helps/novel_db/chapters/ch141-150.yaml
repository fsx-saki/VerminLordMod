  title: 第一百四十三节：第五次地灾
  content: '第一百四十三节：第五次地灾

    　　“百足天君拥有入侵洞天的手段，但本体似乎不能，只能差遣分身。”

    　　“黑凡洞天空间广阔，黄钟地灵又被柳贯一毁了，我无法查看全局，不知道此时此刻，百足天君的分身，究竟来了多少！”

    　　“每当我要斩杀对方时，就有新的战力出现。这只能说明一点，那就是对方的分身，绝不只眼前这三个，必定有其他分身，早就成形，只是不现身参战。只有等到我摸清楚敌方手段，占据上风，就要痛下杀手时，'
