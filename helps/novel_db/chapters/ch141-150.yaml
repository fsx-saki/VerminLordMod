- chapter: 141
  title: 第一百四十一节：攻防较技孰更强
  content: '第一百四十一节：攻防较技孰更强

    　　血幕牢牢罩着墟蝠尸体，顶住魔道蛊仙们的狂轰滥炸。

    　　未料到血幕这般结实，情急之下，皮水寒大喊一声：“都闪开，让我来！”

    　　他是七转蛊仙，在魔道中早就名声广传。众人纷纷飞离，给他让开空间。

    　　水道、冰道杀招——流川！

    　　皮水寒仙窍中，上万只蛊虫调动起来，七转的红枣仙元一颗颗迅速消耗。

    　　哗啦！

    　　无边的浪潮，从皮水寒周围数百步的空中，凭空激射。

    　　惊'
