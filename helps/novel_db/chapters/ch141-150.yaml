  title: 第一百四十九节：铁鹰福地突袭战（下）
  content: '第一百四十九节：铁鹰福地突袭战（下）

    　　尽管铁鹰福地被百足家接手过去，但经营时间毕竟比较短，虽然有些起色，但距离黑家那会儿肯定是不能相比的。

    　　“嗯？”方源眼冒精芒，看到空中却有好多鹰巢漂浮。

    　　“地面上资源稀疏，但天空中却至少有上百座鹰巢。看来百足家的策略，是充分发挥铁鹰福地的特长，要全力豢养铁冠鹰等荒兽了。”方源心中顿时了然。

    　　这个策略显然相当正确。

    　　豢养出荒兽，拿到宝黄天中贩卖'
