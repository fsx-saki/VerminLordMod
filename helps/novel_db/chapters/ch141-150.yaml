  - 宿命蛊早有启示，人族当败，龙人当兴。
  - 随着龙公之死，五域彻底连通，新时代开启。
  - 这一刻，包裹着五域的界壁彻底消弭，地脉勾连，原本隔绝的五域彻底统合一体！
  - 龙公微微一笑，用对未来满怀期待的情感轻声道——‘啊……大时代，来临了。’
  - 方源在战场上被龙公杀死，但春秋蝉带着他的意志重生到更早的时间点。
  - 就在刚刚，方源的宙道分身告诉了他一份万分珍贵的情报。 ‘分身重生了？’
  - 方源本体被杀死，宙道分身自爆，春秋蝉动力远胜前例，自然就重生到更早一些的时间了。
- chapter: 148
  title: 第一百四十八节：局面
  content: '第一百四十八节：局面

    　　两道巨幡在风中飘荡，猎猎作响。

    　　一道是战功榜，如今方源已位列前十。一道幡面上，记录着各种物资，都需要战功才可兑换。

    　　但此刻，人来人往的广场上，众多蛊师的视线却被一道刚刚颁布的法令通告吸引住。

    　　通告的内容大意是：狼潮凶猛，家族蛊师死伤情况日益严重。为了加强治疗的能力，药堂勒令所有拥有九叶生机草的蛊师们，都将手中的九叶生机草暂时上缴给家族。药堂会组织人手，进行统一'
