    　　韩不留极力抵挡，努力想要扳回局面。但方源每次都看破他的打算，破析他的战术，让他每一次的反抗，都被镇压。每一次的努力，都无功而返。

    　　半个时辰后，场中只剩下八只野犬，都是方源所有。

    　　韩不留脸色惨白，满脸大汗，头昏脑涨地立在原地。

    　　扑通。

