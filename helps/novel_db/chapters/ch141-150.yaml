- chapter: 142
  title: 第一百四十二节：何等的穷凶极恶！
  content: '第一百四十二节：何等的穷凶极恶！

    　　天梯山，乃是中洲第一山。又号称是传承之地，圣贤之山。

    　　它高达近百万丈，山势雄伟，气度宏大至极。山峰直插苍穹，隐于霜雪云雾当中。

    　　非常奇特的是，在这山上，嶙峋怪诡的山石并不多。

    　　一块块的方形巨石，横卧着，从山脚一直延伸往上，形成一副阶梯。

    　　但这阶梯规模是如此巨大，以至于中洲中有古老传说，称此山可上达仙界，是天和地之间沟通的桥梁。

    　　围绕着天梯山'
