  - 他拥有春秋蝉，乃是红莲魔尊属意之人。
  - 让我们捣毁不败福地，夺走所有的成功道痕，让天庭功败垂成！
- chapter: 144
  title: 第一百四十四节：牺牲常在，而信念不死
  content: '第一百四十四节：牺牲常在，而信念不死

    　　“我对他说，一个人活着，会有千千万万的理由。你为什么活着，我回答不了，只有你自己才能够回答。自己去寻找罢。”古月博答道。

    　　“那么族长您自己的答案是什么呢？”方正疑惑地眨眨眼，问道。

    　　古月博呵呵一笑，在他眼中，方正和青书的形象似乎重合到了一起。曾经，古月青书也问了相似的问题。

    　　族长沉吟了一番，回忆了一下，然后重复了当年的答案：“一个组织总会有牺牲'
