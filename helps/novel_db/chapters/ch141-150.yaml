- chapter: 141
  title: 第一百四十一节：打成肉渣
  content: '第一百四十一节：打成肉渣

    　　三叉山原本无人问津，是车家、左家的交接之地。

    　　但自从传承，就变得热闹非凡，山林中时不时出现窜动的人影。

    　　小冲突时常发生，目前还是三叉山比较平和的时期。

    　　每一次光柱开启，进入的人数都有限。到那时，三叉山上必然都会爆发出一场腥风血雨。

    　　为了争夺进入传承的机会，蛊师们都选择驻扎在山上。

    　　这就导致了一个现象。越强大的蛊师，便越靠近山峰。这叫近水楼台先得月，'
