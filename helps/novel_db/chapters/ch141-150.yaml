  - 只有我这样的特殊体质，才能去阻挡。
  - 红莲真意浮现而出，凝聚成红莲魔尊的虚幻样子，对泥脚少年微笑道。
  - 地脉震荡的情况，没有丝毫的停息和减缓，愈演愈烈。
  - 紫薇仙子终于得到了突破性的进展！
  - 灾劫难以想象，但最终洪亭仍旧成功了。
  - 形如蝴蝶，五光十色，躯干部分好似一个赤裸的白嫩小人儿。
  - 源自太白云生，最终追溯到紫山真君，方源利用悔池将其升炼。
  - 七转人如故仙蛊和六转之间的区别...外形都是蝴蝶，但七转人如故显然更加光彩夺目。
- chapter: 142
  title: 第一百四十二节：古月青书VS白凝冰（下）
  content: '第一百四十二节：古月青书VS白凝冰（下）

    　　方正站在远处，看得大气都不敢喘一声。

    　　此战已经到了最关键的时刻，谁胜谁负就看这一次对拼的结果了。

    　　“青书大人，加油啊！”方正紧张得浑身颤抖，他知道自己过去只会添乱，只能大声地为古月青书鼓气。

    　　仿佛是听到了方正的声音，冰刃风暴越来越小，硬生生地被青书压制下来。

    　　“该死，我竟也能碰到真元不足的情况……”白凝冰咬着牙，越转越慢，但他真元的恢复'
