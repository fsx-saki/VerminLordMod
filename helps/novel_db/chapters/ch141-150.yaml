  events:
  - 重生，能助蛊仙穿越光阴长河，是红莲魔尊所用蛊虫之一。
  - 春秋蝉是方源从重生所得，如今已是七转，且是宙道核心仙蛊。
  - 方源拥有春秋蝉，本身便是红莲真传的正统继承人。
  - 八转仙蛊屋，橙金色光虹，宫殿形制。
  - 攻伐防护威能优异，拥有梦道仙蛊，能反击逃脱。
  - 龙宫出世后，规定继承者必须是龙人身份，引发天庭、东海等多方势力争夺。
  - 八转仙蛊屋龙宫在东海的天空中疾飞，气息毫无掩饰，已经惹得天翻地覆，无数势力、蛊仙强者都在密切关注。
  - 龙宫灵性十足，没有再飞上空中，而是顺势潜入海水更深处。
- chapter: 143
  title: 第一百四十三节：答案
  content: '第一百四十三节：答案

    　　随后，方正也赶了过来。

    　　“青书大人！”他带着欣喜的神情，无知无畏地奔向古月青书。但紧接着就被一阵松针打了回来。

    　　“组长，是我方正啊！！”他惊疑地叫喊起来，第一次意识到不妥。

    　　但古月青书哪里会答应他。

    　　“哥哥，青书大人到底怎么了？”方正迷茫和惊惶之下，只好求助方源。

    　　但方源根本不理他，而是半蹲下来，伸出右手虚握成爪，对着白凝冰的方向。

    　　强取蛊！'
