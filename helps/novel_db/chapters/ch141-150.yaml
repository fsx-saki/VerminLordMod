  title: 第一百四十六节：捷足先登也无功
  content: '第一百四十六节：捷足先登也无功

    　　碧潭福地，便是东方一族的大本营，东方长凡的老巢。它的历史相当悠久，被经营了数千年。

    　　这种福地，又和寻常的福地有许多不同。

    　　寻常的福地，乃是蛊仙的仙窍，为一人所有。等到蛊仙修为提升到八转，仙窍福地就会提升到洞天。

    　　而类似碧潭福地，却不是某位蛊仙的独有之物。它的形成，是由众多蛊仙分别割舍自家一部分的福地，然后拼凑而成的。

    　　福地之间，本就可以相互吞并。'
