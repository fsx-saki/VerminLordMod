  content: '第一百四十七节：初入犬王传承

    　　投身光柱当中的那一刻，方源就感到一股强烈的失重感。

    　　待他视野一定时，他发现自己已经立身在一处空旷的荒野当中。

    　　环顾四周，只见天空是一片灰蒙蒙的白。

    　　大地上，灰白岩石组成的矮小土丘，像是一座座的坟。

    　　灰色的地面并不肥沃，有些干巴巴的硬，长着稀稀疏疏的褐色的小草。

    　　天的白，大地的灰，枯草的黄，组成这个世界的三原色。

    　　除此之外，似乎再无其他色彩。'
