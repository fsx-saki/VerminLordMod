- chapter: 143
  title: 第一百四十三节：答案
  content: '第一百四十三节：答案

    　　随后，方正也赶了过来。

    　　“青书大人！”他带着欣喜的神情，无知无畏地奔向古月青书。但紧接着就被一阵松针打了回来。

    　　“组长，是我方正啊！！”他惊疑地叫喊起来，第一次意识到不妥。

    　　但古月青书哪里会答应他。

    　　“哥哥，青书大人到底怎么了？”方正迷茫和惊惶之下，只好求助方源。

    　　但方源根本不理他，而是半蹲下来，伸出右手虚握成爪，对着白凝冰的方向。

    　　强取蛊！'
