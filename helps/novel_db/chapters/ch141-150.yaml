  - '他能轻松地驾驭各道蛊虫，并且精通各道蛊虫间的精妙搭配。这其中，又以奴道造诣最为深厚。

    　　但是要解决奴力双修这个偏僻的千古难题，要走在历史的前沿，做出创新和大胆的尝试，那么这些底蕴就不足了。

    　　尽管方源现在'
  - '敲侧击，只是广泛涉猎而已。

    　　如果可能，方源也想速成血道蛊仙。但自从他重生以来，情况就不同了。他的本命蛊，不再是血道蛊虫。

    　　成就蛊仙的关键之一，就是本命蛊。

    　　本来，方源得了第二空窍，也有了新的机会'
  - '出在大蜥屋蛊中，都能听到窗外呼啸的风声。

    　　大蜥屋蛊内，温暖如春。催动它在这样的环境下前行，消耗的真元比之前要足足多出五六倍来。

