  title: 第一百五十节：风雷吼
  content: '第一百五十节：风雷吼

    　　好在百足卫并非像之前无气可撒。

    　　他追得汪大仙四处乱跑。

    　　汪大仙变作一头落星犬，速度很快，一边跑一边大叫：“你光追我干什么？我连一座鹰巢都没收到手中，全是那柳贯一干的！你眼睛是瞎的吗？你到底有没有脑子啊？”

    　　“你们都要死，你们都要死！！”百足卫已经出离了愤怒。

    　　他找不到方源的真身，只好找汪大仙下手。

    　　汪大仙实力是很不错的，但不敢对百足卫下杀手，只好疲于奔'
