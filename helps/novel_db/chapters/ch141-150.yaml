    　　电光从强盛到衰落，最后消散无踪。

    　　雪胡老祖面色一沉。

    　　电炼马鸿运失败了！

    　　若是成功的话，马鸿运哪里还能剩下肉身？而是直接被电化，皮毛骨骼都没有，只提炼成一团金灿灿的气运精华了。

