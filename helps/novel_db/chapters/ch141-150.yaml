- chapter: 141
  title: 第一百四十一节：渺小者的前行
  content: '第一百四十一节：渺小者的前行

    　　车辚辚，马萧萧。

    　　浩荡的队伍，多达百万，一路向着北原中央的王庭地区前行。

    　　风雪在屋外肆虐，压得大胃马都抬不起头来。

    　　地上的白雪，深可及膝，令人每一步的跋涉都比往常要艰难得多。

    　　一只只的蓝田蛞蝓蛊，在蹒跚而行。它们的肚子里塞满了各类物资，将它们原本只有大象三倍大小的体型，撑到有小山丘般巨大。

    　　一队队的马车，跟在蓝天蛞蝓蛊的身后。后者为这些凡人遮挡'
