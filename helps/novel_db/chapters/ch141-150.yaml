  - 琅琊保卫战后，天庭败北。紫薇仙子虽然隐瞒了陈衣、雷鬼真君阵亡的消息，但却承担责任，并将天庭入侵琅琊福地失利的结果，公布于众。
  - 空间传送，可带动八转修为蛊仙，但需辅以杀招。
  - 方源重获此蛊后名望大涨，用于突袭池家资源点。
