  content: '第一百四十六节：横冲直撞蛊

    　　当初方源选择横冲蛊、直撞蛊，作为自己的移动蛊时，就考虑到了四转时的情景。

    　　横冲蛊、直撞蛊，便是合炼横冲直撞蛊的两大主要材料。

    　　以这两只三转蛊为主体，再辅助蛊师本身的真元，一些辅料等，便能合炼出横冲直撞蛊。

    　　合炼横冲直撞蛊过程，并不困难。

    　　方源准备的相当充分，再加上本身这道秘方的成功率也很高。

    　　两天之后，方源合炼成功，得到了一只全新的蛊虫——横冲直'
