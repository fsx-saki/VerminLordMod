  title: 第一百四十九节：谋算艰难生不易
  content: '第一百四十九节：谋算艰难生不易

    　　这是一座塔楼。

    　　形如春笋，挺拔瘦削，笔直伫立。

    　　塔身影影绰绰，七彩斑斓，仿佛是一团塔楼形状的彩墨液体，在不断晃动。

    　　“这才是八十八角真阳楼的初形，等到外界风暴万里、雪覆北原，王庭福地中一座座的小塔楼沉入地中，八十八角真阳楼才会一层层稳定下来。到那时，才能进入其中，进行探索。”方源站在居所的门口，仰头遥望着圆顶方向。

