  title: 第一百四十四节：借力雪蝠御天青
  content: '第一百四十四节：借力雪蝠御天青

    　　就这样，方源又连续飞了三天，却仍旧不见地平线上冒出圣宫的影子。

    　　方源暗忖：“看来我进入王庭福地之后，被送到很远的地方。否则以我的速度，还不至于三天，都未到达圣宫。”

    　　这一路上，方源也碰到过不少蛊师，以及凡人。

    　　他们都是黑家联盟的成员，进入福地之后，有能力的都向中央圣宫汇聚。没有能力的，则就近选择地方，居住下来。

    　　王庭福地并不安全，有着大量的野生虫'
