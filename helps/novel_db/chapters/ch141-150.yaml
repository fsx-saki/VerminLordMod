- chapter: 146
  title: 第一百四十六节：强势
  content: '第一百四十六节：强势

    　　江牙看着身旁脸色铁青的古月野，心中隐隐有些快意。

    　　这个老头强势地逼迫自己，让自己带他到这里来。江牙只有一转修为，又是晚辈，天生比古月野低了一头，因此不得不带他过来。

    　　现在居然如此丢脸，江牙心中颇为羡慕方源的潇洒。

    　　古月野很想扇方源无数个大巴掌，好好教训一下这个狂妄的晚辈。但是为了生机叶，他只有忍气吞声地道：“方源小友，话可不能这么说啊。你还年轻，不懂人脉关系的'
