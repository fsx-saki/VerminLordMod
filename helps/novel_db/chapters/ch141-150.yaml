  title: 第一百五十节：取舍进退见真雄
  content: '第一百五十节：取舍进退见真雄

    　　一共四只力道巨手，悬浮在半空中。

    　　对面两位魔道蛊仙，不自禁地齐齐后退一步，方源带给他们的心理压力，实在太大了点。

    　　情势比人弱，为之奈何？

    　　魔道蛊仙脸色一阵变幻，终于还是认怂，将得到的长恨蛛都转交给方源。

    　　方源接手之后，立即飞走，再没有继续纠缠下去。

    　　两位魔道蛊仙顿时松了一口气。

