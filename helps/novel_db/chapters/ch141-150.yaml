  title: 第一百四十二节：追命炎威无可挡
  content: '第一百四十二节：追命炎威无可挡

    　　仙道杀招——追命火！

    　　残阳老君满脸肃穆，手掌缓缓展开，露出一点微弱的火。

    　　这火焰摇摇曳曳，呈现昏黄之色，微弱无光，仿佛要随时熄灭。

    　　残阳老君的双眸中，却是绽射精锐神芒，望着手掌中的这点火，他的脸上涌现出一抹自傲于世的神色。

    　　这是他赖以成名，威震中洲的绝技！

    　　“追命火，去罢。”残阳老君手掌轻轻一抖，追命火焰嗖的一声，急射而出。

    　　星意连忙开出'
