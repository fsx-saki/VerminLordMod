  title: 第一百四十三节：幽火蟒穴藏传承
  content: '第一百四十三节：幽火蟒穴藏传承

    　　当方源睁开双眼的时候，眼前的景象已经有了翻天覆地的变化。

    　　天空是淡金色的，大地如春，有青绿的梯田，有静静流淌的河流，有低缓的丘峦，视野一片开阔。

    　　这是宁静祥和的世界，和外界风雪交加，形成鲜明的对比。

    　　这里便是北原最大的庇护所——王庭福地，每十年开启一次，专门奖励给北原的王者。

    　　方源环顾周围，发现只有他一人。

