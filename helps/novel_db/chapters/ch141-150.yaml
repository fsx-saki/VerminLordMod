- chapter: 142
  title: 第一百四十二节：楚度vs百足天君
  content: '第一百四十二节：楚度vs百足天君

    　　北原，黑凡洞天。

    　　楚度悬浮于半空之中，身上仙蛊气息四处洋溢，仙元剧烈消耗着。

    　　“开！”

    　　忽然间，他舌绽春雷，双目精芒暴射，雄躯猛震一下。

    　　距离他脚底数丈的大地，在他的仙道杀招下，猛地裂开一个口子。

    　　随后，这个口子迅速扩张，前后绵延出去，十丈、百丈、千丈！

    　　几十个呼吸之后，黑凡洞天的这处地面停止了震动，大地上形成了一个长达数千丈的巨大沟壑'
