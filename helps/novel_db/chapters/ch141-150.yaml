- chapter: 141
  title: 第一百四十一节：魂道陷阱
  content: '第一百四十一节：魂道陷阱

    　　试用了一番道可道仙蛊，时间又到了方源去修行魂魄的时候。

    　　他飞出云城，去往落魄谷。

    　　不过，对于道可道仙蛊的运用，还未终止。

    　　方源分心两用。

    　　至尊仙窍，小南疆。

    　　稀疏的森林，再无当初的荒芜景象。一座座的普通山峦，屹立各处，平均分部在小南疆之中。

    　　一位力道仙僵，被方源操纵，携带着一些仙元，还有道可道仙蛊，飞驰在半空中。

    　　片刻之后，它速度缓缓降下来'
