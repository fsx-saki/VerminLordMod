  title: 第一百四十三节：彪
  content: '第一百四十三节：彪

    　　“什么，小兽王要挑战我？”甫一听到这个消息，薛三四犹自不信。

    　　她心想，自己和黑白双煞八竿子都挨不着的关系，自己又没有得罪他，甚至连见面都没有过。他怎么可能，会无缘无故地来找自己麻烦？

    　　但很快，薛三四调查出来，这消息货真价实！

    　　“怎么会这样？这个小兽王，脑子里究竟装的什么浆糊！几天之后，三王传承就要开启了，他居然还有闲心来挑战我？我招你惹你了，你来找我麻烦？！”'
