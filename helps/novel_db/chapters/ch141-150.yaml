  title: 第一百四十九节：群狼袭寨
  content: '第一百四十九节：群狼袭寨

    　　药乐目送着熊骄嫚一行人走出大门，渐行渐远。

    　　但这场分别极其短暂，仅仅是一刻钟后，熊骄嫚等人又再次回到了竹楼。

    　　“运气不好，赶上狼潮了。”熊骄嫚苦笑着，解释道。

    　　竹楼中的蛊师，听了这话，均神色一紧。

    　　熊骄嫚这群人，人多势众，都要被逼得退回山寨，可见狼潮的规模。

    　　“大家快准备一下吧，电狼群很快就要冲击山寨了。”熊骄嫚又道。

    　　她话音刚落，当当当的警报'
