    　　第十四轮……

    　　第十七轮……

    　　第十八轮……

    　　方源一关关地闯下去，手中的犬兽数量不断增加。到了第十九轮结束，他积累到了八十多头犬兽。

    　　其中有四十多头菊花秋田犬，二十多头电文犬，十九头刺猬犬。

