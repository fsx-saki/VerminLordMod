- chapter: 148
  title: 第一百四十八节：黑楼兰你太丑
  content: '第一百四十八节：黑楼兰你太丑

    　　万兽混彩天。

    　　万族都聚集在了田月高坡。

    　　“万族祭典就是在这里举行？”黑楼兰望着眼前一片荒地，语气有些失望。

    　　每一届的万族祭典，都在田月高坡。

    　　但就黑楼兰看来，这里一片荒芜贫瘠，到处都是黄土，除此之外，空无一物。风一吹就掀起呼呼的沙土，使得烟尘滚滚。

    　　“万族祭典和千族祭典不同，是涵盖整个万兽混彩天的旷世大典，每隔万年举办一次。我也是第一次来这里。'
