    　　黑楼兰神情愈加振奋，连忙回道：“小姨妈放心，我已经深入水潭，在地下打洞了！”

    　　高空中，黎山仙子陡然吐出一口鲜血，这是盟约的反噬，但还在她承受范围之内。

    　　她随手擦去血渍，继续向黑楼兰秘密传去消息：“好，我就在高空为你侦察，你悄悄潜过去，注意不要叫其他蛊仙发现了。尤其是方源那个家伙，他城府极深，工于心计，就连皮水寒都被他玩弄于鼓掌之间。我们和他定下雪山盟'
