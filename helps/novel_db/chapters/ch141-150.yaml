  title: 第一百五十节：我只是帮自己
  content: '第一百五十节：我只是帮自己

    　　金色的圆月高悬在空中，浮云朵朵，投下阴翳。

    　　明亮的月光，对于蛊师们来讲，是个大大的好消息。

    　　山寨外，是惨烈的战场。

    　　狼尸从陷坑堆叠起来，已经接近寨墙的一半高度。这给后来冲锋的电狼群，提供了良好的借力平台。

    　　一些普通的电狼，靠着跳跃和抓挠，甚至能直接越过寨墙，跳到寨内来。

    　　但这些电狼，往往先是被高度落差，摔个趔趄踉跄，然后第一时间就被严阵以待的蛊师'
