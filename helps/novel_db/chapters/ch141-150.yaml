- chapter: 142
  title: 第一百四十二节：古月青书VS白凝冰（下）
  content: '第一百四十二节：古月青书VS白凝冰（下）

    　　方正站在远处，看得大气都不敢喘一声。

    　　此战已经到了最关键的时刻，谁胜谁负就看这一次对拼的结果了。

    　　“青书大人，加油啊！”方正紧张得浑身颤抖，他知道自己过去只会添乱，只能大声地为古月青书鼓气。

    　　仿佛是听到了方正的声音，冰刃风暴越来越小，硬生生地被青书压制下来。

    　　“该死，我竟也能碰到真元不足的情况……”白凝冰咬着牙，越转越慢，但他真元的恢复'
