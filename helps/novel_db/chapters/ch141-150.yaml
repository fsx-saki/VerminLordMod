- chapter: 145
  title: 第一百四十五节：都鼓励牺牲
  content: '第一百四十五节：都鼓励牺牲

    　　作为当事人，方源自然受到了家族的调查。

    　　但这调查并不深入，家族高层被越来越严重的狼潮，吸引了几乎全部的注意力。方源的地听肉耳草、隐鳞蛊都仍旧隐藏着，但就算是暴露出来，方源也可以将其全部推到商队的身上。

    　　反正狼潮之下，交通已经断绝，商队也不会到来。这种情况下，家族得不到商队那边的确认，调查只会拖延下来。

    　　真正能有调查结果的时候，那方源早就修行到三转，走出青'
