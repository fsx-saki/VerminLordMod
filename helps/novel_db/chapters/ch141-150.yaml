  title: 第一百四十二节：寻觅成功
  content: '第一百四十二节：寻觅成功

    　　方源翻开《人祖传》，其中就有着记载——

    　　人祖陷入死境，跌落到落魄谷内，不得而出。

    　　古月阴荒，为了救回父亲，亲上成败山，企图攀登顶峰，获取那只唯一的成功蛊。

    　　只要向成功蛊许愿，古月阴荒就能救回人祖。

    　　但是古月阴荒刚到山脚，就遭到了石人的阻碍。

    　　原来人祖的二女儿，来到成败山时，惊扰了爱情蛊的美梦。

    　　爱情蛊出于愤怒，便点化了石人，要干扰古月阴荒。'
