  title: 第一百四十九节：勒索敲诈长恨蛛
  content: '第一百四十九节：勒索敲诈长恨蛛

    　　方源弹服了荒兽鱼翅狼，便将其收入自家仙窍。

    　　这头鱼翅狼神智已经崩溃，很快就陷入昏迷当中，也不能控制麾下的鱼翅狼群。

    　　方源没有什么好方法，只能任由那些普通的鱼翅狼四下溃逃。

    　　他也不觉得有多可惜，活捉了荒兽鱼翅狼，已经是一笔丰厚的成果了。

    　　接着，他继续四下搜刮，不过遇到的深潭，都是普通资源，虽然量大，却乏善可陈。

    　　东方部族的大本营中，肯定有不少好'
