- chapter: 541
  title: 第五百四十四节：阎帝！
  content: '第五百四十四节：阎帝！

    　　“静眠电蟒！”琅琊地灵怒吼一声。

    　　下一刻，电光激闪，交织如水，很快凝聚成一头庞巨似龙的电蟒出来。

    　　雷电是阳，蟒蛇是阴。雷电组成的巨蟒，蕴含阴阳，消去了雷电的狂暴，反而显出温和的样子。

    　　因此，电蟒并不狰狞，反而透着优雅和可爱。

    　　它蜿蜒游动，缓缓盘踞在一头大象模样的石头山。蟒身不断蹭动石头，将石头磨碎成最细微的粉末。

    　　炼道上有公认的四大仙招，最能够处理仙'
