- chapter: 546
  title: 第五百四十九节：正反狙神针
  content: '第五百四十九节：正反狙神针

    　　“线索到达这里，就断了！”蒙家的仙蛊屋问鼎院倏地悬停于空，驻足不前。

    　　蒙家的两位蛊仙面面相觑。

    　　蒙自在望着前方，便见一片山谷，郁郁葱葱，和周围草原形成鲜明对照。

    　　按照自然规律，不会有这样的山谷成形，不过蒙家两位蛊仙却都不意外，蒙家太上二长老用低沉的声音道：“这是睡姑的神针谷啊。”

    　　蒙自在皱起眉头：“难道是她？”

    　　蒙家太上二长老沉吟不语。

    　　睡姑'
