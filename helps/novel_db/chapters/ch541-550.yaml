- chapter: 543
  title: 第五百四十六节：还行吧
  content: '第五百四十六节：还行吧

    　　眨眼间，方源已经被无数刀道虚影围困得死死。不仅如此，就连整片天空，都被亿万刀光充斥，笼盖四方八面，隔绝内外。

    　　“不管你是何人，你这防御杀招，的确厉害！”蒙屠被重重刀道虚影包裹护卫，他望着方源，目光阴沉，笑了笑，同时手上揉搓，舒缓刚刚自己那一击带来的酥麻。

    　　“但是！”蒙屠微微扬起头颅，仰望着高耸的阎帝，眼神中却露出怜悯之色，“你千不该万不该，来秋刀原里找我的麻烦。'
