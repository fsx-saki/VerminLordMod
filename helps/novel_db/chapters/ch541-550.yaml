- chapter: 549
  title: 第五百五十二节：万我仙蛊！
  content: '第五百五十二节：万我仙蛊！

    　　琅琊福地，云盖大陆。

    　　琅琊地灵深呼吸一口气，然后低吟出声：“大阵起——！”

    　　像是万千蜜蜂疯狂起舞，嘈杂的嗡鸣声中，炼道超级大阵缓缓催起。很快，就有一大片的白金光泽，扩散而出，充盈这方天地。

    　　“入阵！”琅琊地灵又一声下令，与此同时，他的身影首先进入仙阵之中。

    　　随后，毛六、毛三、毛四、毛七等诸多毛民蛊仙，也接连入阵。

    　　方源则站在仙阵边缘，作为旁观者。'
