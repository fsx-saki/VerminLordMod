- chapter: 547
  title: 第五百五十节：睡姑吐血
  content: '第五百五十节：睡姑吐血

    　　“现在我需要蒙家给我一个解释！否则，我睡姑虽是散修一人，也决不罢休！”睡姑猛地转头，双目鼓瞪，看向蒙家二仙。

    　　她这一次的损失，实在是太惨重了。因此气急攻心，愤怒至极，即便是对方是蒙家也杠上去。

    　　不像方源，方源失去了胆识蛊贸易，还有龙鱼生意，还有灵蛇贸易、长恨蛛买卖、幽火龙蟒等等。

    　　睡姑失去了这个正反狙神针后，就直接失去了经济支柱。尽管刺神猬还在，但要重新培养'
