- chapter: 544
  title: 第五百四十七节：硬是逼死
  content: '第五百四十七节：硬是逼死

    　　之前方源在青鬼沙漠一役，就用大盗鬼手，盗取了八转仙蛊魂兽令。

    　　大盗鬼手杀招本身，只是七转层次，核心乃是七转大盗仙蛊。但借助阎罗杀招，威能一跃而上，能够从传奇太古魂兽青仇身上盗出八转仙蛊来。

    　　但当时的大盗鬼手，施展距离非常短，需要方源本体亲自出动才行。

    　　方源改良阎罗，将大盗鬼手杀招也融入其中，形成全新的杀招阎帝。此时方源施展出来的大盗鬼手，不仅是施展距离变得'
