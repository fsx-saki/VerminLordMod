- chapter: 542
  title: 第五百四十五节：蒙屠
  content: '第五百四十五节：蒙屠

    　　在北部冰原的东南，墨人城以北，腐毒草原的西北方位，蒙家势力的南端，有一处地方，名为秋刀原。

    　　这里地貌平坦，寸草无生，乃是自然生长出的一块奇地。

    　　蒙屠一步步行走在秋刀原上。

    　　他身材魁梧，皮肤呈现红铜般的色泽，穿着马甲，露出肩膀，裤腿挽起，露出小腿。

    　　没有穿鞋，他正赤脚行走。

    　　一步又一步，平实的地面却锋利如刀，蒙屠踩踏在这层银白色的土壤上，就像是行走在刀山'
