- chapter: 548
  title: 第五百五十一节：五成！
  content: '第五百五十一节：五成！

    　　宝黄天。

    　　一大团的透明火焰，在静静地燃烧着，散发出的宝光厚重恢弘。

    　　火焰一经上市，就吸引了许多蛊仙的注意。

    　　大量的意志，还有少许神念，都被吸引过来。

    　　黑天寺的蛊仙张继淡淡而笑，他正是这团透明火焰的主人。

    　　“没想到这一次，外出探险，居然收获了这么一批稀罕的七转仙材。贩卖出去后，正可补足我的仙元储备啊。”

    　　他一面思考，一面回应其他人的问价。

