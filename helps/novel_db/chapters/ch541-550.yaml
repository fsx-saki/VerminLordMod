- chapter: 545
  title: 第五百四十八节：蒙家追凶
  content: '第五百四十八节：蒙家追凶

    　　两位蛊仙在空中疾驰，他们俱都相貌粗犷，身形魁梧，正是蒙家蛊仙蒙自在、蒙召。

    　　正如方源所料的那样，在他首次现身的时候，蒙屠便将有敌来犯的情报，在第一时间传了出去。

    　　至于后来，蒙屠掀起刀道道痕，将整个秋刀原置入类似仙道战场的环境中后，至死他的消息就再不能传出去。

    　　有敌来犯，又如此堂而皇之，蒙家方面自然不会轻视，立即调动了一位七转蛊仙蒙自在，一位六转青年蛊仙蒙召'
