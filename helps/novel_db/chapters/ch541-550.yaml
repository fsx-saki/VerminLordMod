- chapter: 550
  title: 第五百五十三节：落魄印？
  content: '第五百五十三节：落魄印？

    　　琅琊福地，云盖大陆。

    　　仙道杀招——万我大手印！

    　　方源漂浮在半空之中，浑身气息陡然爆发开来，轰隆一声，一道巨大的手掌，凭空产生，势大力沉地向地面拍去。

    　　刹那间，气浪翻滚，巨掌如山峦倾倒，狠狠地拍打在云泥陆地上。

    　　云盖大陆乃是琅琊地灵亲自主持设计，全都是云泥浇筑构造，能悬浮在高空永不坠落的神奇陆地。

    　　这种云泥却是不够坚厚，方源的万我大手印却是有着七转层'
