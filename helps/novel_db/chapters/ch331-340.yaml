  title: 第三百三十四节：黑白威风
  content: '第三百三十四节：黑白威风

    　　方源原本觉得已是追杀无望，没想到影宗居然自己将这个宝贵的机会，送到方源的眼前来！

    　　因为至尊仙胎蛊，影宗是绝对不会绕过方源的。不把影宗铲除，留给他们发展的机会，说不定方源将来就是马鸿运的下场。

    　　铲除掉影宗，谁能知道方源的身份？将这个大麻烦消灭在萌芽当中，当然是方源的最佳选择，而且连运的弊端也能顺便解决。

