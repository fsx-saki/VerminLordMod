    　　方源精神集中，一丝不苟，正在炼制全力以赴蛊。

    　　大量的仙材，已经融化为一团浆液。

    　　黄褐色的浆液，悬空漂浮着。

    　　方源心念一动，第二本命蛊虫五转全力以赴蛊，就投射出去，射进浆液之中。

    　　“起。”

    　　旋即，方源暗喝一声，伸出手掌，五指张开，照准地面虚抓。

    　　垮啦啦。

    　　一阵响动，地表土石翻飞，将浆液彻底包裹起来，形成一个土球。

    　　这是'
