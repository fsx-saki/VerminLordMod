    　　凤金煌早已经有所准备，正要说话。

    　　方源却将她打断：“如果你还想以仙僵恢复人身的法门，来当做谈判的筹码，那就免了吧。我已经寻找到了合适的方法，当然，不是你之前告诉我的十绝'
  - '三局两胜之后，才能剥除对手占据这里的权利。

    　　凤金煌的身上，虽然有白晴仙子交给她的仙蛊，还有意志、仙元，但她终究是凡人，打不过方源这位仙僵。

    　　凤金煌满脸苦涩地道：“方源你提的这个要求，未免太过强人所'
  - '仙僵恢复人身的法门，来当做谈判的筹码，那就免了吧。我已经寻找到了合适的方法，当然，不是你之前告诉我的十绝体升仙法。”

    　　凤金煌楞了一下，有些猝不及防。

    　　她没有料到方源这么快，就已经找到了适合自己的仙僵'
  - '适合自己的仙僵转生法。

    　　“这样吧，我知道灵缘斋对梦境的研究，走在其余九大古派的前面。我只需要一只梦道凡蛊的蛊方，就让你驻守在这片梦境，任由你探索一段时间，如何？你身负梦翼仙蛊，别告诉你不知道一些梦道凡'
  - '一身道痕无数，若是强挤进去，能直接撑破了这片脆弱的碎片世界。

    　　“这片湖泊范围广大，我记得上一世的荒兽龙鱼，就藏在湖中央的小岛附近，被人利用仙蛊影响，变得十分疯狂暴躁。我现在失去了我力仙蛊，不能催动力道'
  - '，而你修为最高，被安排为最后一位。”鹤风扬沉声道。

    　　没有办法，若是方源提前进去，其他九派都是凡人蛊师，根本竞争不过方源。

    　　当然，从这点也可看出仙鹤门的弱势。

    　　若是仙鹤门能够有灵缘斋这般强大，方'
  - '是知道凤九歌在北原失踪的。

    　　但转念一想，方源还是放弃了这个想法。

    　　“就算前世凤九歌死了，今生百日大战还未落幕，一切皆有可能。况且前世凤九歌的生死，还未真正确定。”

    　　“最关键的是，我之所以要谋害凤金'
  - '大，我记得上一世的荒兽龙鱼，就藏在湖中央的小岛附近，被人利用仙蛊影响，变得十分疯狂暴躁。我现在失去了我力仙蛊，不能催动力道大手印。今生捕捉起来，倒不如前世方便了。”

    　　方源一边回忆，一边飞射出去。

    　　与前'
- chapter: 335
  title: 第三百三十六节：离奇梦神秘歌
  content: '第三百三十六节：离奇梦神秘歌

    　　这里是第三层梦境。

    　　夜色温柔，天空中繁星稀稀点点。

    　　湖水一片平静，方源刚入梦境，就已经置身在湖心的亭中。

    　　他的目光，紧紧盯着亭中的女仙人，心中十分惊异。

    　　星宿仙尊！

    　　古往今来，十大尊者当中，只有红莲魔尊神秘莫测，容颜不可考证。其余诸人，却是皆有音貌流传。

    　　星宿仙尊乃是历史上的第二位尊者，是元始仙尊的徒弟，更是天庭的第二代仙王。

    　　她的丰功'
