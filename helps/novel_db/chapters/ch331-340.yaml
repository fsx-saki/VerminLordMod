  content: '第三百三十九节：星雾笼身掩踪迹

    　　东海，双极海峡。

    　　波涛声透过厚重的浓雾，隐隐传入海峡之中。

    　　宋甲丹盘坐在悬崖峭壁之上，闭目养神。

    　　他的下半身，皆是灰色的石头。而上半身则是老者模样，皱纹丛生，苍老不堪。

    　　忽然，他的眼皮子动了一下，感应到了宋家太上大长老，八转蛊仙宋启元的令牌。

    　　宋甲丹念头一动，迷雾涌动，露出一段空白的甬道。

    　　片刻之后，从甬道中，走来两个身影。

    　　一男一女'
