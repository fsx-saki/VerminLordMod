  title: 第三百三十七节：方源一探登天野
  content: '第三百三十七节：方源一探登天野

    　　天空碧蓝，仅有几片浮云。

    　　方源悬浮在高空，展目远眺。

    　　只见海阔天空，视野中天蓝海蓝，波涛不兴，气象壮阔。

    　　正是东海特有的景象，和崇山峻岭的南疆，完全是两个风格。

    　　平静时候的东海，和豪放粗犷的北原，倒有些相似。待得海面生起惊涛骇浪之时，险恶凶暴，和北原的相似之处也就荡然无存。

    　　东海，因为多水，所以多变。

    　　正是因为这种变化，才造就出这片壮阔的'
