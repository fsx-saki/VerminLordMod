  title: 第三百四十节：方源绝境
  content: '第三百四十节：方源绝境

    　　吼！

    　　左夜灰咆哮，这一次他飞腾上来，悬于半空，向监天塔扑杀。

    　　龙公冷笑，催动监天塔。

    　　虚化！

    　　左夜灰扑了一个空。

    　　整个监天塔，包括内里的蛊仙，统统变作虚化状态。寻常手段，根本无法打击到他们。

    　　“故意的么？是想引我出手？”隐形匿迹的紫山真君，看到这一幕，眼中精芒一闪即逝。

    　　影宗方面，的确有着克制虚化的手段。

    　　但是紫山真君却没有对虚化的监天塔'
