  title: 第三百三十二节：加入琅琊派
  content: '第三百三十二节：加入琅琊派

    　　“可恶，偏偏是在这个时候！”秦百胜紧捏双拳，望着眼前的战局，心中充满了不甘和无奈。

    　　“撤退吧。”半晌，他叹息一声，下令道。

    　　“为什么要撤？”姜钰仙子大为惊讶。

    　　“落魄谷被人攻击，是中洲那群调查八十八角真阳楼倒塌真相的蛊仙。”秦百胜传音道。

    　　“他们怎么可能调查到我们的身上？难道说……是天意？！”姜钰仙子娇躯微微一震。

    　　“天意苍茫浩大，恐怕是如此了…'
