  title: 第三百三十三节：菟舔
  content: '第三百三十三节：菟舔

    　　方源心头顿时一震。

    　　“这是什么杀招？！”

    　　“卜卦龟最硬的地方，就是它的龟壳，但是居然承受不住这招的伤害。”

    　　“即便我这至尊仙体，有着道痕之间不互斥的特性。依照太古荒兽的皮糙肉厚，也竟然落得如此结果？”

