  content: '第三百四十一节：追杀炎煌雷泽

    　　两道身影从落魄谷中突围而出，一前一后。

    　　正是炎煌雷泽仙僵，还有黑城！

    　　方源心中一动，目光紧随着两人，却未急着出来追击。

    　　等了一会儿，落魄谷中始终不见中洲蛊仙追出来。

    　　方源心里猜测：“看来我虽然故意保留了雪松子，但也只是将结果延迟了三天。影宗仍旧败北，目前来看，似乎只有炎煌雷泽仙僵，还有黑城逃出生天。”

    　　其实，有这结果并不奇怪。

    　　决定此战结果'
