  title: 第三百三十五节：惊现星宿仙尊
  content: '第三百三十五节：惊现星宿仙尊

    　　数天后，方源出现在中洲的一座无名山谷当中。

    　　繁星洞天的某个碎块世界，就掉在这里，暂时还是很稳定的。

    　　中洲十大古派都派遣了蛊仙，驻守这处山谷。

    　　见到鹤风扬带着方源来到这里，他们的脸色都不好看。

    　　这一次，要多亏了方源六转垫底的修为，否则也捞不到这样的大便宜。

    　　这里的碎片世界，刚好能让六转垫底的蛊仙勉强进入。但中洲十大古派当中，哪里会有像方源这般低下'
