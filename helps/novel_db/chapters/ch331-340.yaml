    　　成真仙蛊被砚石老人用仙元催动，立即化作一道银光，迅疾非常，飞射上空。

    　　它在空中，绕着梦境不断飞舞，拖出来的银色长尾，在半'
  - '伤势，枯朽如木的右手，颤巍巍地摊开来，露出掌心中的又一只仙蛊。

    　　这只仙蛊正是中洲余木蠢所炼，隶属律道，名为成真。

    　　成真仙蛊被砚石老人用仙元催动，立即化作一道银光，迅疾非常，飞射上空。

    　　它在空中'
  - '耗费了一个多月的时间，终于创出了一记仙道战场杀招！

    　　此招名为星魂战场，以净魂、星痕、星芽、星光、星念为核心，爆发力虽然不强，但胜在绵绵不休，可消耗敌方极大的战力。

    　　“智慧光晕果然厉害，若是要我单独'
  - '而联合焚天魔女，斩杀鲨魔、苏白曼，也不可能。

    　　虽然方源不是僵盟中人，但焚天魔女却是。碍于僵盟盟约，焚天魔女顶多做到打压鲨魔、苏白曼，还不能取其性命。

    　　“不过，焚天魔女还是要找的。我若不找她，黑'
  - '主要还是参考的战魂沙场。”

    　　有了星魂战场，方源就想找个合适的对手试一试。

    　　他很快就想到了那头一指流鲨。

    　　“一指流鲨是八转战力，身上又有三只宙道仙蛊，我的星魂战场可困不住它。更何况对付一指流鲨，必定'
  - '候了。”砚石老人不顾伤势，枯朽如木的右手，颤巍巍地摊开来，露出掌心中的又一只仙蛊。

    　　这只仙蛊正是中洲余木蠢所炼，隶属律道，名为成真。

    　　成真仙蛊被砚石老人用仙元催动，立即化作一道银光，迅疾非常，飞射'
  - '惫万分，又带着欣慰之色，看着眼前的银白光茧，喃喃自语：“接下来，就等着孕育功成了。”

    　　数天之后，狐仙福地。

    　　方源哈哈大笑，从地下石窟中走出来。

    　　他成功了。

    　　在狐仙福地中耗费了一个多月的时间，终'
  - '女进行威慑！”

    　　方源便又回到东海。

    　　东海的鲨魔夫妇，早就对方源望眼欲穿了。

    　　今生他们攻略玉露福地，因为方源，进展大大提前。但最后一关按兵不动，却难如登天。让鲨魔等人无从下手，只能看着仙蛊在眼前飞舞'
