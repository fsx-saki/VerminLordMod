  title: 第三百三十九节：天庭插手
  content: '第三百三十九节：天庭插手

    　　方源还发现了更有意思的一点。

    　　这些纯梦求真体的存活时间，和修为呈反比。修为越高的纯梦求真体，存活的时间越短。反而那些蛊师级的纯梦求真体，至少能活个两三年，对于方源而言，大有利用空间和研究的时间。

    　　“刚刚还在奇怪，若是影宗有大量炼成纯梦求真体的手段，怎么在义天山大战中不用出来？”

    　　“看来，影无邪曾经的纯梦求真体，并不是这么容易炼成的。”

    　　“影宗为了解救魔'
