- chapter: 823
  title: 第八百二十九节：弑父梦启
  content: '第八百二十九节：弑父梦启

    　　吴帅眉头紧皱，满脸苦涩之意：“我现在怀疑的是，若是这只是一个局，针对我和我父，专门陷害我族的阴谋，我该如何是好？龙人当兴，或许只是一个谎言，真凶专门设计陷害我族的虚假措辞。”

    　　古凉沉思片刻，否决道：“这种可能性相当的小。因为按照你父的述说，他能够接触到宿命蛊，真的是许多巧合叠加起来。并不能受到人为的控制，当中很多关键步骤，都是你父的自行选择而已。”

