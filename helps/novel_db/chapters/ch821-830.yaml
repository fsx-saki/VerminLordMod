- chapter: 825
  title: 第八百三十一节：得元始真传
  content: '第八百三十一节：得元始真传

    　　费尽好一番周折，龙公终于和方源谈妥。

    　　东海两位八转沈从声、宋启元目睹全部过程，无法阻止。

    　　龙公不仅赔偿了方源大量的气道修行资源，更重要的是竟是将一份元始仙尊的真传赠与气海老祖！

    　　这让东海二仙无奈之余，也不得不佩服龙公的器量！

    　　当然，现场只是交接了一小部分。

    　　方源伪装的气海老祖和天庭休战，开始和平共处，而天庭会在今后陆续将这些资源补足。至于元始真传'
