- chapter: 830
  title: 第八百三十六节：插手三域
  content: '第八百三十六节：插手三域

    　　龙人分身先钻进龙宫，随后方才驾驭这座仙蛊屋，进入了福地。

    　　福地乃是古族大本营，旁人的地盘，古族族长又是八转修为，非同小可，还是谨慎稳妥一些最好。

    　　一进入福地，便是一片苍茫的大地。这片福地之宽阔，甚至要超过一般的洞天。

    　　在福地中，种类繁多的仙材随处可见，很多竟都是当今早已灭绝之物，令方源的分身也开了一些眼界。

    　　“虽然这片福地底蕴并不如琅琊福地，但也差距不'
