  title: 第八百二十七节：崛起大计盗宿命
  content: '第八百二十七节：崛起大计盗宿命

    　　吴帅积累了上百年，搭建出绝不寻常的七转仙蛊屋龙庭。

    　　随后，他和风云府公开赌斗，利用龙庭，在众目睽睽之下斩杀了松涛子，令他一战成名。

    　　庆功宴上，绿蚁居士、书道阁主的出席，证实了吴帅此战的影响——他已经拥有一些资格，能够和八转的存在平等对话了！

    　　庆功宴的当夜，吴帅就做了一个美梦。

    　　在这梦中，他实现了他所有的理想，他所有的愿意为之奋斗的目标。

