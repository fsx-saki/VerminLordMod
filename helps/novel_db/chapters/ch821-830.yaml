    　　红莲虽然并未成尊，但是却早已注定成为未来的尊者。这虽然只是一个猜测，但蛊仙界的很多人都倾向于这个猜测。若非如此，为何龙公以及天庭都要千方百计地挽留他？当初龙公降临，主动收徒就是一个明显至极的信号。

