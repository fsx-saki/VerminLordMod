- chapter: 826
  title: 第八百三十二节：如梦令
  content: '第八百三十二节：如梦令

    　　“这便是如梦令仙蛊了。”方源视察着龙宫。

    　　如梦令形如蜻蜓，圆脑袋，长身躯，一对粉红宝石般的复眼，有四对透明的翼翅。轻盈的翅膀上细细查看，还会发现有着一层淡淡的七彩斑斓的光晕。

    　　方源心中升腾起一股喜悦之情。

    　　长久以来，他就对梦道的仙蛊抱有期待。他虽有不少的梦道杀招，但事实上梦道的仙蛊一直都是零。

