- chapter: 827
  title: 第八百三十三节：清点收获
  content: '第八百三十三节：清点收获

    　　至尊仙窍。

    　　一座雄阔的紫金宫殿，悬空而立。

    　　仙道杀招——梦里轻烟！

    　　龙人分身驾驭着这座仙蛊屋，立即就散发出大股大股的浓烟。

    　　浓烟所到之处，将一切吞没。方源用以试验，特意迁来的一只太古年兽，根本无法抵抗，只是惊嚎一声之后，就被梦道浓烟卷席了去，不见踪影。

    　　“收。”龙人分身心念一动，梦道浓烟便像是巨蟒回窝，迅速缩进龙宫中去。

