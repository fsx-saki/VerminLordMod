- chapter: 828
  title: 第八百三十四节：新龙人之祖
  content: '第八百三十四节：新龙人之祖

    　　至尊仙窍。

    　　长毛炼道大阵轰鸣作响，大量的白荔仙元灌注进去，形成冲天的火焰。

    　　在熊熊的烈焰当中，龙人分身盘坐着，紧闭双目，面无表情，仿佛沉睡了一般。

    　　而他的身躯却是开始消融，宛若钢铁刚开始要融化成了铁水的样子。

    　　这当然是非常痛苦的事情，但是龙人分身的魂魄却是提前遁出，此刻就站在琅琊地灵的身边。

    　　方源本体亲自操纵这座炼道大阵，而琅琊地灵，毛六等人辅佐'
