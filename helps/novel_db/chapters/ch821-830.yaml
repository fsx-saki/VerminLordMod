- chapter: 829
  title: 第八百三十五节：布局东海
  content: '第八百三十五节：布局东海

    　　东海。

    　　沈家大本营，紫檀万雀岛。

    　　沈家太上大长老沈从声热情洋溢：“气海前辈，此乃我沈家的六声茶，敬请品尝一二。”

    　　方源点点头，看向桌案前的杯盏。

    　　六声茶乃是沈家招牌茶水，非常了得，名传五域，比之灵缘斋的青浦茶，万龙坞的蛟影茶，南疆乔家的奴娇茶，房家的七里香茶都还要超出一筹来。

    　　六声茶并非是一杯茶，而是一套茶水，共有六小杯。

    　　这六小杯茶水的炼制工'
