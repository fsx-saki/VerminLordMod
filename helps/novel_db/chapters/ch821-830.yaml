- chapter: 824
  title: 第八百三十节：一生悲剧！
  content: '第八百三十节：一生悲剧！

    　　期间，吴帅特意回转南华岛。

    　　泰琴终于生了！

    　　“我们俩之间终于有了血脉的延续！泰琴，辛苦你了。”吴帅抱着刚出生的婴孩，高兴地转了好几圈。

    　　随后，他小心翼翼地将婴儿放在床上，泰琴的身边。

    　　他爱怜地看着刚刚生产后虚弱的泰琴，目光温柔无比。

    　　“你说，给孩子取个什么名字为好呢？”泰琴微笑着，充满了母性的光辉。

    　　“我看这孩子一双大眼，灵动非凡，不妨就叫他龙'
