- chapter: 636
  title: 第六百四十节：悔蛊线索
  content: '第六百四十节：悔蛊线索

    　　小屋中，仿佛波涛汹涌。

    　　暗红色的光影，仿佛是一阵阵的浪潮，以方源为中心向四周起落。

    　　方源正在炼蛊。

    　　他的双手十指打开，两个手掌托着一个幽暗的球。

    　　这个球足有脸盆大小，表面缓缓流动，乃是方源从黑油中萃取出来的精华。

    　　炼蛊已经进行到了中后期，最关键的时刻了。

    　　方源心念一动，仙窍门户张开一条细缝，从中取出一片灿烂的金色鳞片。

    　　鳞片射入黑色油球当中，'
