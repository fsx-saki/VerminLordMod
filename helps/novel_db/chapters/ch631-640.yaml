- chapter: 634
  title: 第六百三十八节：采集黑油
  content: '第六百三十八节：采集黑油

    　　隐隐的水波在眼前荡漾，极致的静谧中，一群蛊师逐渐向海底深入。

    　　头顶上的光线逐渐减少，四面八方的海水带来越来越巨大的水压。

    　　开始有人催动水壳蛊了。

    　　由方源开创的水壳蛊，自然是效果卓绝！

    　　几乎在开启的一瞬间，小渔村的蛊师们都感觉到压力骤降，浑身轻松，像是卸掉了百十来斤的重担。

    　　蛊师们的脸上都涌起惊喜之色，哪怕他们早已经在村长的屋中试验过水壳蛊。

