- chapter: 637
  title: 第六百四十一节：海市赌石坊
  content: '第六百四十一节：海市赌石坊

    　　八转仙蛊屋功德方尖碑前，一只信道凡蛊被方源随手丢下。

    　　在这只蛊虫中，方源坦言相告，将自己之前在小海岛处采集黑油的经过，以及对功德榜的验证，都记录在了上面。后续若有蛊仙回来，必定会得到这个情报。

    　　这个情报没有必要藏着掖着。

    　　一来，这些人早已经有了猜测，二来，这种猜测也很容易验证。

    　　与其这样，反不如在他们没有验证之前，让方源揭露出来。

    　　“或者……更明'
