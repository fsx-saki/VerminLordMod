- chapter: 638
  title: 第六百四十二节：夏琳赌石
  content: '第六百四十二节：夏琳赌石

    　　心中的回忆被方源按下。

    　　他步入了金玉屋。

    　　这座赌石坊算得上高档了，大厅内展示着数十块巨石，镇压着场面，大厅后是一个个的小隔间，里面解石的蛊虫一应俱全，满足客人亲手解石的兴趣爱好。当然，老资历的解石蛊师也是配备十足的。

    　　这些石头中是否蕴藏蛊虫，难不倒方源。

    　　毕竟他已经是蛊仙，用仙家手段侦查出凡蛊并非难事。同样的，哪怕石头里封印沉眠的蛊虫再虚弱，仙家手段也'
