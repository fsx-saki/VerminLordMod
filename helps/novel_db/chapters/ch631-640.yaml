- chapter: 639
  title: 第六百四十三节：幕后黑手
  content: '第六百四十三节：幕后黑手

    　　赌石的确是一件看运气的事情，这一点没有哪个人能够否认。不论是蛊师亦或者蛊仙。

    　　但是黄鳞鲛人却对自己很有自信。

    　　因为他早有准备。

    　　这些年来，他开这家金玉屋，也时常自己赌石。多年下来，他不断观摩、揣测、分析，选出了一些石头，对于这些石头中的东西，他有很大的把握。

    　　这些石头中的东西，当然价值不高，若是价值高，他早就迫不及待地自己先开了，不会留到现在，还留在店'
