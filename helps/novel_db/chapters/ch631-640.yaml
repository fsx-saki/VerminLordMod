  - '，救下这么一个凡人蛊师呢？这些年，人族欺负得我们还不够多么！”

    　　“没错，圣女大人，这种蛊师明显是采油蛊师，可是这一片的海域乃是我们鲛人的领地。他就是专门盗取我们黑油的海耗子，无耻至极。我们完全可以任由他'
  - '催发光亮，谁也不知道会引来什么样的猎食者。

