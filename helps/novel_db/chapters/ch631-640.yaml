- chapter: 633
  title: 第六百三十七节：水壳蛊
  content: '第六百三十七节：水壳蛊

    　　数天后。

    　　潮起潮落，击打在礁石上，激起万千的浪花。

    　　用句不好听的话来讲，无名海岛可谓穷山恶水。首先整个海岛的面积就不大，然后便是地沟黑油。正因为这里的海沟中盛产黑油，导致其他流派的修行资源都被压制，物产凋敝。

    　　人的欲望是无穷的，所以人道损不足而补有余，弱肉强食。天道却是损有余补不足，讲究万事万物的平衡。

    　　正因为有黑油这样的仙材存在，无名海岛的其他资源都非'
