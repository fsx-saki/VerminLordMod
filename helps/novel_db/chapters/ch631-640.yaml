    　　隐形匿迹进了渔村，这座小渔村人口并不多，蛊师也只有五六位，最高修为的是一位三转蛊师，完全和青茅山古月山寨不能相比。当年古月山寨的周围，就附庸了这样的村庄近十座呢。

    　　方源直接找'
  - '级很高，产量很多，且易于开采。

    　　这好像是食道流派的一个特征，产量高、物廉价美、亲民。

