- chapter: 631
  title: 第六百三十五节：挑选任务
  content: '第六百三十五节：挑选任务

    　　岛屿虽小，但是蕴藏着的修行资源却不少。

    　　这种密度、储量显然是人为栽培。

    　　方源在内的八位蛊仙一番搜刮后，又进行了分配。方源扮演的乃是楚瀛，变化道的蛊仙，因此收获了不少变化道的仙材。

    　　但因为变化道以一道映射万道，这类仙材种类繁多，包含广阔。比如魂兽的魂核，本身是魂道的仙材，但若是有变化道的蛊仙专门变作魂兽的话，那么魂核也能算是变化道修行的资源了。

    　　方源以变'
