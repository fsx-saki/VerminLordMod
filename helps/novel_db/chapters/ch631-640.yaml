  - '消耗得并不慢。不久后，就达到了警戒点。

    　　“是时候收手，回到海面上休整了。唉，我的资质不够，若是有甲等资质，完全可以再支持更长的时间！”

    　　方源心中暗自可惜，同时果断地停止催动蛊虫，积极撤离。

    　　但就在'
  - '时间缓缓流逝，方源时刻保持着高度的警惕。

    　　他不仅是对周围保持着侦查，同时也关注着自家空窍中的真元储备。

