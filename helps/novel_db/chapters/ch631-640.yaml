- chapter: 632
  title: 第六百三十六节：前世至爱
  content: '第六百三十六节：前世至爱

    　　依照方源的侦查手段，这座海岛在他眼下几乎毫无秘密。

    　　他发现被功德碑传送过来的这座小岛，十分普通、平凡。小岛上的物产并不多，驻扎着一个小渔村，有着一些人生活着。

    　　有渔村，自然就有一口元泉。其中当然是有蛊师，但按照这样贫瘠的环境和人口，能够有个四转蛊师那就顶天了。

    　　方源此次接受的是采集海底地沟黑油的任务，果然在他的侦查中，很快就发现海岛的边缘就有黑油外溢的一丝'
