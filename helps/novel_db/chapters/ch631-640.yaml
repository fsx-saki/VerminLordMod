- chapter: 640
  title: 第六百四十四节：报恩
  content: '第六百四十四节：报恩

    　　第五场的结果出来，黄鳞鲛人呆滞地站在原地。

    　　他眼珠子几乎要瞪出眼眶。

    　　若非亲眼所见，他绝不会相信眼前的这一切！

    　　他清楚地记得，自己制造假石的蛊虫残骸，但为什么？为什么！

    　　为什么这只蛊虫残骸，不在自己的手中，而在对手的手里呢？

    　　黄鳞鲛人一万个想不通。

    　　“难道这一切都是幻觉不成？”他被逼得要发疯，惨白的脸上忽然涌起一抹潮红。

