- chapter: 635
  title: 第六百三十九节：方源被救
  content: '第六百三十九节：方源被救

    　　到了这种深度，海水几乎是漆黑一片。

    　　不过在方源的视野中，都是幽绿之色。

    　　“好，新换来的这只蛊还是蛮有用的，有了它，我就能在深海中勉强视物了。”方源心中微喜。

    　　深海中情况复杂，很多时候不能盲目地催发光亮，谁也不知道会引来什么样的猎食者。

    　　在一片幽绿当中，有着那么几股深沉的黑色。

    　　自然是黑油。

    　　这些黑油相互交错、纠缠，仿佛是一群怪异的巨蟒。近乎静止'
