  title: 第一百一十四节：三方互赢
  content: '第一百一十四节：三方互赢

    　　“解谜仙蛊……解谜仙蛊……”方源口中喃喃不断，手指头敲击在扶手上面，发出咚咚的响声。

    　　大厅中，喊价声不绝于耳。在整场拍卖大会的最后时刻，竟然杀出了赤煞神舟这样的重宝，这是出乎意料的惊喜。

    　　普通的散修，独行者就不用想了，唯有超级势力的七转蛊仙，以及八转大能才有一争之力。

    　　尤其是超级势力，仙蛊屋对于超级势力的诱惑，是绝大的。

    　　价格以极快的速度，猛烈攀升。虽'
