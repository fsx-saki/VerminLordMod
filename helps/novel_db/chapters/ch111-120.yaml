- chapter: 118
  title: 第一百一十八节：吞江蟾的传说
  content: '第一百一十八节：吞江蟾的传说

    　　据说，每一只吞江蟾的肚子里都存着一条江河。

    　　方源前世并没有用过吞江蟾，但是这只蛊他印象很深刻。这都源于一人。

    　　一个普通人，一个家奴。

    　　前世的两百多年后，出现了一名极特殊的蛊师——江凡。

    　　他的存在，让蛊师们大跌眼镜，让凡人们争相传诵。

    　　他一出现，就成了传奇。

    　　造就他的，就是一只吞江蟾。

    　　江凡本是一介家奴，独自一人替主人掌管了一片渔场。有一'
