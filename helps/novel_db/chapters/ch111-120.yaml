  title: 第一百一十四节：别来碍事
  content: '第一百一十四节：别来碍事

    　　砰！

    　　一声闷响，落星犬狠狠地撞在钻熊的身上。

    　　钻熊虽然只是六转荒兽，但身躯硬实无比，像是一堵墙死死堵住落星犬。

    　　它被落星犬一撞，倒退五六步，仍旧站稳。落星犬倒退了一步，却有些头晕眼花。

    　　它晃晃脑袋，清醒过来。

    　　趁着这个时机，五六发杀招，从巨人草间遥攻过来，接二连三地打在落星犬的身上。

    　　落星犬痛得嚎叫一声，被打得皮开肉绽。

    　　方源冷眼旁观。'
