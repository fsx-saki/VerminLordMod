  content: '第一百一十五节：鹰犬

    　　鹰犬！

    　　狼身鹰首，背上生长着一对鹰翼。头颅、脖颈、翅膀都覆盖黑色羽毛，狼身和四肢都是灰色狼毫，浑身上下暗道道痕最多。

    　　这是一种比较特殊的猛兽。

    　　通常的荒兽、上古荒兽等，繁衍生机，都是通过雄雌两性的互动。但鹰犬却不是这样。

    　　鹰犬的繁衍，是通过侵染。

    　　鹰犬的毒液，会对任何一种犬类、鹰类的猛兽，造成影响。当这种影响足够程度的时候，中了鹰犬之毒的犬类、鹰类猛兽'
