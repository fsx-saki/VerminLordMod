- chapter: 112
  title: 第一百一十二节：潜魂兽衣蛊
  content: '第一百一十二节：潜魂兽衣蛊

    　　方源若要将苦力蛊、费力蛊、横冲直撞蛊晋升为五转，将是一个浩大的工程。需要用大量的材料和蛊虫来堆。

    　　因此，往往只有坐拥福地的蛊仙，才有这种资本，收集到成套的五转蛊。

    　　对于凡人而言，根本难以承受这样的代价。

    　　所以，在凡俗中，很多五转蛊师手中，都没有一只五转的蛊。只有类似黑楼兰、东方余亮这样的人物，因为背后的势力扶助，才有一两只五转蛊。

    　　而在东窗蛊的信息中'
