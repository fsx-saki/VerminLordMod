- chapter: 115
  title: 第一百一十五节：晋升中阶
  content: '第一百一十五节：晋升中阶

    　　光膜透亮，淡红色的真元海面，波涛生灭，潮起又落。

    　　海面上，两只白胖胖的酒虫在吸水。海面上空，黑色瓢虫一般的黒豕蛊，在绕着悬停着的赤铁舍利蛊周围，不断地振翅飞旋。

    　　白玉蛊如鹅卵石一般，沉在海底深处，一动不动。

    　　春秋蝉则隐了身形，仍旧在沉眠休养。

    　　“是时候了。”方源心念一动，海浪顿起，一股真元逆冲而上，直接灌入到赤铁舍利蛊当中。

    　　赤铁舍利蛊顿时摇摇飞升'
