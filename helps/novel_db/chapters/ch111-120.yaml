  title: 第一百二十节：试仙蛊
  content: '第一百二十节：试仙蛊

    　　狐仙福地。

    　　一座晶粉大山，屹立在狐仙福地中央，正是《人祖传》中有载——荡魂山。

    　　此时，方源悬浮在荡魂山的上空，化为原形，身高三丈，青面獠牙，虎背熊腰，八只怪臂狰狞可怖。

    　　不过如此身形，和荡魂山一比，却宛若蝼蚁般渺小。

    　　方源双目绽放神芒，紧紧盯着下方的荡魂山，忽然轻喝一声：“拔山！”

    　　下一刻，一股无形的磅礴力量，从他体内迸发而出，迅速向荡魂山挪去。'
