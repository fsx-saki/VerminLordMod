  content: '第一百二十节：不听不信

    　　宙道仙级杀招已经悄然在至尊仙窍中发动起来。

    　　上极天鹰受到杀招的影响，身上的时间流速暴涨无数倍，让它迅速成长。

    　　上极天鹰鸣叫不断，感到极为难受。

    　　一方面是身体的快速生长，另一方面是——饿！

    　　它每天都要食用不少的天晶，来填饱肚子。现在它的时间，一个呼吸就相当于过往的一天，再加上身体不断成长，能不饥肠辘辘么？

