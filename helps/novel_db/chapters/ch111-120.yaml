- chapter: 114
  title: 第一百一十四节：洞中有猴王
  content: '第一百一十四节：洞中有猴王

    　　商队离开山寨的三天后。

    　　山体石林，晦暗的红光充斥其中。

    　　一根根的巨大石柱，从洞顶延伸下来，宛若倒长的巨木，组成一片巍然的灰色石林。

    　　方源在石林中且战且退。

    　　吱吱吱……

    　　一群石猴瞪着绿色的圆瞳猴眼，对方源紧追不舍。

    　　“月芒蛊！”方源念头一动，右手朝着猴群的方向，轻轻一劈。

    　　呼。

    　　一片幽蓝色的月刃，足有脸盆大小，骤然形成，穿透空气，直接切'
