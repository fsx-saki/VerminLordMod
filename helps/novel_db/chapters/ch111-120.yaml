  - '满意的人选。

    　　寿蛊难寻，纵然东方部族乃是超级家族，北原最庞大的势力之一。

    　　当然，这其中，也有正道蛊仙私下联合，禁止对东方长凡出售寿蛊的原因。同样的，对于惨遭东方长凡算计的魔道蛊仙们，更对东方长凡恨'
  - '绝代，可谓百年难得一出的奇才。”

    　　“前辈记得不差，晚辈佩服。”

    　　东方长凡缓缓摇头：“我们智道蛊师，既要推衍，便会注重每一个情报的收集。不过刘一峰虽是光彩夺目，但到头来却冲击蛊仙境界失败。那一届的风'
  - '负，打了个平手。

    　　当夜幕降临时，黑楼兰一声令下，发动了总攻。

    　　夜晚来临，夜狼的战力随之暴涨。狼潮一波又一波，在方源的指挥下，对东方大军最后的防线展开冲击。

    　　东方大军士气低落，人心散乱，即便东方'
  - '自己。

    　　东方家和黑家，皆是超级家族，拥有蛊仙不止一人。

    　　两个庞然大物的较量，不过是一场名为“王庭之争”的游戏。主要的目的，是通过战争，来削弱他族，扩张自家，筛选和吸纳人才。

