- chapter: 111
  title: 第一百一十一节：运道真传精髓
  content: '第一百一十一节：运道真传精髓

    　　双方暗中迅速交接，交易完成的时候，秦百胜已经在拍卖下一只仙蛊了。

    　　凤九歌脸上面无表情，看着手中的乐山乐水仙蛊，目光有些闪烁。

    　　他心中不妥之感，仍旧萦绕不散。

    　　“费了连连波折，终究是将这只仙蛊得到手中。纵然花费不菲，但论及门派任务奖励，却足以弥补，甚至还有超出。”

    　　“吃力仙蛊虽然珍贵，但只有对于力道蛊仙，才有用途。”

    　　“就算牺牲了见面似相识，也只'
