    　　窗外风和日丽，时不时的，远远传来战马或者驼狼的嘶鸣。

    　　这反而更增添营帐中的静谧。

    　　身为马家少族长的马英杰，此刻正盘坐在蒲团上，伏案垂首，帮助父亲，处理着盟军要务。

    　　自从马家施展突袭，将费家灭族，英雄大'
