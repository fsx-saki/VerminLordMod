    　　若单独只催动过往来动这招，成功的可能十之八九。

    　　但落实在实战中，就不一样了。

    　　譬如方源，要时刻催动血染征袍、见面曾相识、三息后现等等这些仙道杀招，这些杀招涵盖了大量的蛊虫，牵扯了庞大的心力。

    　　在这种基础上，催动“过往来动”这种还演练不纯熟的仙道杀招，能够在第三次才运用失败，已经说明方源的运气足'
