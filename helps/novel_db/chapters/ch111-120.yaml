- chapter: 112
  title: 第一百一十二节：拍卖马赵二人
  content: '第一百一十二节：拍卖马赵二人

    　　惨烈的竞价，终于告一段落。

    　　最终，八转蛊仙之一的五行大法师，以一只七转金道和一只六转金道仙蛊为主，附赠其余数种仙材，成为最终的胜者。

    　　五行大法师，兼修金木水火土五道。因此金道仙蛊，拥有不少。

    　　不过这一次出手，对他而言也是忍痛割爱，为了肉包子舍弃粗馒头。

    　　方源颇为遗憾，却是毫无竞价的资本。尽管他手中有着蛊仙俘虏，但就价值而言，仍旧无法和唯一性的仙蛊媲'
