  title: 第一百一十四节：方源的气运
  content: '第一百一十四节：方源的气运

    　　至尊仙窍中过去了两个多月，全新的煮运锅终于呈现在方源的眼前。

    　　它浑身金光灿烂，是一口大锅。仔细看的话，锅内外时不时闪过一抹白金之光，有着强烈的富贵之气。

    　　锅边相当厚实，有儿童的拳头般厚度。

    　　在锅的外沿，有八条雕龙，每一条都是栩栩如生。

    　　八条雕龙的龙尾齐聚锅底，相互缠绕，又延伸下去，形成八爪的支架。

    　　八条龙尾，又分别对准东、南、西、北、东北、东南、'
