  title: 第一百一十四节：只是一场游戏
  content: '第一百一十四节：只是一场游戏

    　　逆雨福地。

    　　一道纤细的碧玉长廊，在湖面上延伸出去，直至一座孤亭。

    　　亭外，细雨霏霏，凉风轻抚。

    　　和外界不同的是，这里的雨是从下往上落的。逆雨之名，由此而来。

    　　继女蛊仙谭碧雅之后，福地中迎来了新的客人。

    　　“晚辈黑柏，见过东方前辈。”来者一副普通中年男子的模样，却是货真价实的六转蛊仙。

    　　“你我有七十年没见了吧。那时候，我记得你还是黑家的族长，险些'
