  content: '第一百一十二节：搜刮个底朝天

    　　接下来的数天内，方源的足迹几乎遍布整个黑凡洞天。

    　　他的神念，时时刻刻笼罩周围，不断观察，悉心研究。

    　　有时候，方源觉得，这仿佛是黑凡在隔着光阴长河指点他。

    　　黑凡真传中有巨细无遗的讲解，眼前的黑凡洞天则是实例，具体到可以触摸，可以挖掘，可以考察。如果有什么变迁的地方，方源就对那些蛊仙俘虏进行搜魂。这更让他了解到：在漫长的时间里，无数物种兴衰的过程和秘密。'
