  content: '第一百一十九节：身份暴露

    　　方源催动定仙游，回往狐仙福地的时候，在北原的某处战场中，一场较量已经尘埃落定，分出了胜负。

    　　十几位蛊仙，包围着中央的两人。

    　　秦百胜落在地上，佝偻着腰背，强撑着膝盖，没有软跪下去。

