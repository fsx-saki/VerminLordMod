  events:
  - 因广寒峰归属之争，夏飞快挑战，方源以卜卦龟和刚背杀招防御获胜。
  - 切磋？话说的冠冕堂皇，其实就是一言不合，直接干架啊。
  - 十招之后，夏飞快劳而无功，方源的龟壳上只有一些浅浅的伤痕罢了。
  - 铺设龙鳞土，布置凡道蛊阵，并催动丰年杀招，形成大规模养殖基地。
  - 方源花费了大量的精力和时间，铺设龙鳞土，然后又在当中建设凡道蛊阵。
  - 事情已成，这一次的仙窍建设，是方源有史以来，第一个大手笔。
  - 方源借机中饱私囊，使广寒峰底蕴大损，但符合正道潜规则。
  - 搜刮结束了，方源飞到半空中，最后看了这座广寒峰一眼。
- chapter: 113
  title: 第一百一十三节：闷声发财
  content: '第一百一十三节：闷声发财

    　　“竞争真是激烈啊，不知道谁才是最终的胜利者。”

    　　“我站在这看了一刻钟，就陆续有十多位蛊师，往柜台里投了纸片。”

    　　“唉，这都是有钱人的游戏，我们这些人连竞争的资格都没有。”

    　　树屋二层，蛊师们围着中央柜台，议论纷纷，感叹连连。

    　　临近傍晚，针对赤铁舍利蛊的争夺，达到了高峰。许多一直在暗中观望的二转蛊师，都抓住最后的这段时间开始出价。

    　　有些蛊师甚至连续出了'
