  content: '第一百二十节：风云急变少猛将

    　　北原历，六月中旬。

    　　本是盛夏的季节，但是十年暴雪的气息已经浓郁。天空时常阴沉，寒风吹拂，霜气日益凝重。

    　　而遍及北原的王庭之争，正进行得如火如荼。

    　　镜湖方面，马家大军和宋家盟军开战。马家优势巨大，一连击破宋家两道防线。

    　　期间，宋家盟主宋清吟身先士卒，率军反攻，马家遭了埋伏，不得不让出一道防线。

