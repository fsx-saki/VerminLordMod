  title: 第一百一十三节：八转狗屎运
  content: '第一百一十三节：八转狗屎运

    　　“我池家此次遭遇困难，巴家可没有什么表示。甚至我要上位的关键时刻，巴家还在暗处干扰，想要扶持池须芝。可恨这池须芝自从娶了巴家女仙，野心一天比一天大。”池谤回忆起来，语气含恨。

    　　说着，他一拍桌子：“我意已决，答应武家的结盟，至于巴家……我会书信一封，给予解释，希望他们能够理解。”

    　　池谤答应结盟的消息，传到武庸这里。

    　　武庸哈哈大笑：“池谤小儿，不足为虑！”'
