    　　她高举双臂，锋锐的冰刃就是她手臂的延展。

    　　她化身冰晶，有一种冷酷的霸气。朝气蛊化为一股暖流，流窜在心、肝、脏等处，保住一股生机，防止白凝冰彻底成了冰晶人。

    　　朝气蛊还有一项好处，那就是一经催动，就化为朝气暖流，自行运转，无须再劳神操纵。

