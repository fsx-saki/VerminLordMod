- chapter: 111
  title: 第一百一十一节：元石不过身外物
  content: '第一百一十一节：元石不过身外物

    　　“奶奶，这只是什么蛊？”少女指着三层的中央柜台，好奇地问道。

    　　这树屋中，分三层。其中第一层，专买一转级别的蛊虫。第二层，贩卖二转蛊虫。第三层，则卖着三转蛊虫。

    　　越往上层，蛊虫越少，价格也越高。

    　　当然，能摆放在树屋中出售的蛊虫，都是比较珍稀的。

    　　古月药姬顺着孙女的眼光看去，只见一个圆桶状的高瘦树墩，树墩上生长着五条枝叶，好像是人的五根手指，又在中间'
