    　　惨烈的竞价，终于告一段落。

    　　最终，八转蛊仙之一的五行大法师，以一只七转金道和一只六转金道仙蛊为主，附赠其余数种仙材，成为最终的胜者。

    　　五行大法师，兼修金木水火土五道。因此金道仙蛊，拥有不少。

