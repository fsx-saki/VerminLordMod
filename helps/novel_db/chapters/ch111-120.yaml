  - 这是一只骨道六转仙蛊，名为骨刺。
- chapter: 111
  title: 第一百一十一节：你这个无耻小人！
  content: '第一百一十一节：你这个无耻小人！

    　　转眼间，三四天过去。

    　　“苦力蛊……”书房中，商睚眦看着手中的蛊虫，眉头拧成一个疙瘩，心中泛起一股冲动——想把这蛊捏死！

    　　但他又不得不忍耐下来。

    　　这苦力蛊，毕竟是他花费了八十一万的高价买下来的。捏死了，叫他心疼。

    　　但每每看着这玩意，商睚眦的心中又十分郁闷。

    　　这只苦力蛊，好像是无声的嘲讽，无时无刻的不停地提醒商睚眦他的愚蠢！

    　　几天前的那场拍'
