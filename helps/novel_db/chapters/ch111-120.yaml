  title: 第一百一十九节：成尊的四个条件
  content: '第一百一十九节：成尊的四个条件

    　　在这个蛊师的世界中，从现在往前回溯，三百多万年的悠悠岁月当中，有这么十位蛊修，傲立在乾坤之巅，俯瞰万灵，横蔑苍生。

    　　漫漫历史长河中，五域两天曾涌现过无数的天才、豪雄。若说这些人是天上的繁星，交相辉映的话，那么这十位蛊修，就宛若太阳一般，耀眼夺目，横亘长空。

    　　他们的光辉经久不衰，他们的传奇不断流传。

    　　他们就是十大尊者！

    　　从古至今历数下来，分别是——'
