  content: '第一百一十二节：先对运道下手

    　　两天中的这些洞天，普遍拥有海量道痕。

    　　这些道痕的主要来源并非渡劫，而是历代蛊仙们的奉献。

    　　比如安魂洞天的道痕，就多达七百多万！这么多的魂道道痕，导致洞天中拥有大量的超级资源点。

    　　最初的安魂洞天，只有十万多的魂道道痕。它吞并了一大块九天碎片后，从此无灾无劫。

    　　受到天意扶持照顾，安魂洞天中产出蛊仙，一代又一代。

    　　这些蛊仙都是人族，虽然可以随意选择修'
