- chapter: 111
  title: 第一百一十一节：四元方悔血炼池！
  content: '第一百一十一节：四元方悔血炼池！

    　　至尊仙窍，小中洲。

    　　方源长达数月（仙窍时间）的布置，已经到了关键时刻！

    　　一座正方形的池塘中央，落座着一个池中小亭。

    　　随着方源念头，一只蛊虫缓缓飞向小亭。

    　　这只仙蛊浑圆如珠，有鹅蛋大小，珠子上无数氤氲光纹，不断萦绕变化，似万莲盛开，又似流云翻涌。

    　　正是血本仙蛊！

    　　此蛊乃是琅琊地灵结合了宝黄天中的一些血道蛊方，独自创新出来的蛊。

    　　血本仙'
