  title: 第一百一十六节：变化道蛊仙
  content: '第一百一十六节：变化道蛊仙

    　　第三头上古鹰犬，身上藏有仙蛊。

    　　若非如此，怎么可能挡下方源的仙道杀招剑痕索命？

    　　方源心中顿时热切起来。

    　　此一时彼一时。

