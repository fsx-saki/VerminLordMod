- chapter: 117
  title: 第一百一十七节：苦贝酒和吞江蟾
  content: '第一百一十七节：苦贝酒和吞江蟾

    　　大厅内气氛凝重至极。

    　　一众家老默默地坐着，脸色或是冷漠，或是阴沉，或是沉重。

    　　族长古月博坐在主位上，亦是难掩眼中的忧愁：“三日前，山脚的村庄附近，出现了一头吞江蟾。此蟾似是从黄龙江逆流而上，无意间流落此处。它现在堵住一处河道，睡在里面。若是放任它，山寨就要时刻处在危机当中。在座的诸位家老，有什么良策，能驱赶了此蟾？”

    　　家老你望我，我看你，一时间无人说'
