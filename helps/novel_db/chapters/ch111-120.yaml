- chapter: 111
  title: 第一百一十一节：接管黑凡洞天
  content: '第一百一十一节：接管黑凡洞天

    　　仙蛊方的记载之后，便是凡蛊方。

    　　凡蛊方数量更多，密密麻麻，方源看得都有些心惊。

    　　值得他注意的是日、月、年蛊这三种凡蛊方。

    　　依照这些凡蛊方，方源完全可以采集凡材，自己炼制凡级的日蛊、月蛊和年蛊。

    　　“这样一来，我不仅可以在宝黄天收购这些凡蛊，而且另外一方面，也可以自行炼制。这无疑将极大地缩短我准备的时间。不过自己炼制得不偿失，不如委托给琅琊派的那些毛民'
