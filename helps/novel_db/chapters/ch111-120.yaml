  title: 第一百一十五节：各方行动
  content: '第一百一十五节：各方行动

    　　经过一番激烈的争夺，最终百足天君成为最终的胜利者，获得赤煞神舟的全部资料。而作为幕后交易的受益者——方源，亦成功地取得解谜仙蛊。

    　　对于这场交易，方源十分满意。

    　　百足天君成为众所瞩目的焦点，而除了几位关键人物之外，没有人知道解谜仙蛊落到了他的手中。

    　　赤煞神舟算是一个意外，掀起了拍卖大会的最后高潮。

    　　大约两个时辰之后，这场囊括诸多英豪的拍卖大会，终于结束。'
