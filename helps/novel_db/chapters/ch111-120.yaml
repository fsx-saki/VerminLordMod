    　　“梦境？”太白云生听方源这么一说，目光闪烁，脸色浮现出凝重之色。

    　　之前，方源和黑楼兰联手，共探繁星福地，在星宿仙尊梦境中遇险。这件事情，方源早已经简略地告知了太白云生。

    　　因此，太白云生听到梦境这个词，立即意识到了严重性。

    　　他轻吁一口气：“难怪黎山仙子、黑楼兰，没有参加拍卖大会，原来是被梦境所困。我之前还在猜测，是否因为黑楼兰渡劫导致的麻烦。”'
