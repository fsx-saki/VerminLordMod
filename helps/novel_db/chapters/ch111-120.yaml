- chapter: 119
  title: 第一百一十九节：此子顽劣，需要打磨
  content: '第一百一十九节：此子顽劣，需要打磨

    　　“古月方源？”一听到这名字，众家老不禁面面相觑。

    　　他们却很清楚这人，事实上，自从一开始，古月方源的名字，就时不时地回响在他们的耳中。

    　　尤其是开窍大典之后，展开了蛊师修行，此子越加能折腾了，时常都会闹出一些事情来，惹人瞩目。

    　　“哦，我有印象。前段时间，就是此子卖了双亲的遗产，买了一只赤铁舍利蛊吧？”一位家老恍然道。

    　　古月赤练、古月漠尘听着这话，'
