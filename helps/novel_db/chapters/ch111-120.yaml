  - 影无邪点点头：唉，只能如此了。快开始吧！
  - 像一只鹅蛋，蛋壳半透明，内有碧绿光气，散发刺骨寒意作用于魂魄。
- chapter: 120
  title: 第一百二十节：得来全不费工夫
  content: '第一百二十节：得来全不费工夫

    　　秋高气爽，风和日丽。

    　　瓦蓝的天空，如水晶般澄澈干净。

    　　风徐徐地吹着，拂动方源的发梢。

    　　远远望去，附近的村庄已经人烟稀少。近处，小山一般的吞江蟾沉睡着，卡在河床中。方源站在河岸处，和这只五转的巨型蛊虫对比起来，就仿佛是大象身边的小猴子。

