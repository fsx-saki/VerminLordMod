  events:
  - 切磋？话说的冠冕堂皇，其实就是一言不合，直接干架啊。
  - 方源花费了大量的精力和时间，铺设龙鳞土，然后又在当中建设凡道蛊阵。
  - 搜刮结束了，方源飞到半空中，最后看了这座广寒峰一眼。
  - 整个卜卦龟通体深幽，龟壳上各种痕路纵横，成千上万。
  - 方源巧妙地将坚持仙蛊添加进去，作为第一辅助蛊虫。
  - 这记仙道杀招的核心，当然就是六转仙蛊金刚念了。
  - 这些寒玉是在积雪的最底下，隐藏在山石的深处。
  - 龙鱼本身似乎是食道的创造，对于很多的蛊虫，都可以取代一部分，进行喂养。
- chapter: 112
  title: 第一百一十二节：其实我是个善良的人
  content: '第一百一十二节：其实我是个善良的人

    　　商睚眦鼻中喷着粗气，越骂方源越是愤怒。

    　　“啊！”他咆哮一声，终于忍耐不住，猛地将石桌掀翻。

    　　棋盘上的石子飞溅，石桌差点砸到方源的脚背，幸好他及时起身闪避。

    　　商睚眦则倒退三步，头晕目眩，两股猩红的鼻血流淌下来。

    　　“商睚眦，你还是冷静一点好。毒誓中有规定，你我皆不能动手伤害对方。感谢我吧，幸好我刚刚躲的及时，要是被石桌砸了脚背，你受的伤将更加严重'
