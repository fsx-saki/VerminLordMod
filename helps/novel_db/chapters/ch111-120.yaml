  content: '第一百一十五节：方源的分身气运

    　　除了气海分身之外，其次就是吴帅气运了。

    　　他的气运规模削弱了很多。

    　　因为龙宫摧毁，短时间内难以搭建，四大龙将尽皆陨落，甚至帝藏生至今仍旧被镇压在天庭内部。

    　　现在的吴帅气运，仍旧是一条飞龙形态。这和吴帅分身的龙人身份密切相关。

    　　仔细深看，就会发现吴帅的飞龙气运，好似由一只只的蚂蚁构成的。

    　　数不清的蚂蚁，凝聚一体，形成蚁龙气运。

