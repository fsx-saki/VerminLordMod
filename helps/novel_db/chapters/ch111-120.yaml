  title: 第一百一十一节：战功榜
  content: '第一百一十一节：战功榜

    　　半空中，火红的云烟翻滚蒸腾，带给方源一阵阵灼热之感。

    　　方源盘坐在蒲团上，双目紧闭，但心神则已经维系在火云当中。

    　　“火候差不多了。”他心中默算着时间，缓缓睁开双眼，取出一个酒坛。

    　　酒坛中，装满了幽蓝色的水液，散发着月下海水般的光泽。

    　　“落。”方源轻轻一喝，半空中的火云，便悠然落下，全部灌注到了酒坛当中去。

    　　一时间，水火交融，产生黑色的浓烟。

    　　黑烟迅'
