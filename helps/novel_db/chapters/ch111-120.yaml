  - 我这里有一只七转的卜卦龟背仙蛊。
  - 七转坚持仙蛊，方源得到手后，自然少不了对它的了解和揣摩。
  - 具有炼化、改变态度等威能，具体未详述。
  - 至此，他终于将这只传奇的八转仙蛊，真正掌握手中。
  - 汲取光阴长河的河水，用于宙道手段。
  - 我这日蛊，会自行汲取光阴长河的河水，无须劳烦喂养的问题。
  - 这是一只骨道六转仙蛊，名为骨刺。
- chapter: 112
  title: 第一百一十二节：真是好魄力
  content: '第一百一十二节：真是好魄力

    　　虽然说是继承了双亲的遗产，但是对于方源来讲，积累的时间还是短了一点。

    　　催生生机叶，他也不是每天都进行，毕竟很损耗时间。往往催生出九片生机叶，大半天的时间就消耗殆尽了。

    　　方源思考了一下，这枚赤铁舍利蛊的出售时间，只有一天。要在这么短的时间内，筹措到这么一大笔元石，唯一的方法就是将自己手中的酒肆或者竹楼抵押出去。

    　　这也没有什么可惜的。

    　　一年之后，就是狼潮'
