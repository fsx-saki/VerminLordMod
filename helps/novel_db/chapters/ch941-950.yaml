- chapter: 942
  title: 第九百四十八节：凤九歌的红莲真传
  content: '第九百四十八节：凤九歌的红莲真传

    　　命运歌声笼罩战场，但这一刻，凤九歌却是对天庭下手。

    　　不管敌我双方的震惊和疑惑，凤九歌沉浸在自己的歌声里，同时，心头的记忆也再度浮现。

    　　第二次进攻琅琊福地……

    　　方源在福地中布阵，凤九歌和陈衣被大阵隔离。

    　　凤九歌单独对战方源。

    　　“我的蛊虫的确是莫名其妙的消失了！怎么会这样？这种手段，应该是偷道的手段。只是不知道这是方源出手，还是这个超级大阵的威'
