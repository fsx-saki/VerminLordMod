- chapter: 943
  title: 第九百四十九节：红莲之死
  content: '第九百四十九节：红莲之死

    　　“为什么？我怎么会变成这个可怕样子呢？”

    　　曾经的洪亭，对于柳淑仙的死，哀痛至极，悔恨交加。会死死地抱着柳淑仙的尸体，半跪着，心中哭泣哀嚎。

    　　但是现在呢？

    　　面对柳淑仙的死，面对柳淑仙只想在生命的最后一刻，和爱郎最后温存的期待，红莲居然转身就走！

    　　难道这个柳淑仙，不是真正的柳淑仙吗？

    　　当然是！

    　　红莲非常清楚这一点。

    　　她还是她，还是那个柳淑仙，不'
