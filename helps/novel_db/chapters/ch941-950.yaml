- chapter: 941
  title: 第九百四十七节：我有命运仙蛊方！
  content: '第九百四十七节：我有命运仙蛊方！

    　　“哇，这个人从河中走出来了！”

    　　“为什么在天空会有一道河流啊？”

    　　“这个走出来的少年长的真俊！”

    　　“我还是觉得那个披着红披风的仙子好看。”

    　　因为众目睽睽杀招的关系，五域的凡人们都看到了这一幕，议论纷纷，评头论足，吵吵闹闹。

    　　凡人和蛊师们或许不太清楚事情的严重性，但是蛊仙们大多清楚神秘少年的身份。

    　　一时间，五域蛊仙身心狂震，宛若有灭世的飓'
