- chapter: 945
  title: 第九百五十一节：大时代！
  content: '第九百五十一节：大时代！

    　　“凤九歌！”龙公咆哮，直奔凤九歌杀来。

    　　仙道杀招——龙爪击。

    　　仙道杀招——回旋龙牙。

    　　爪痕浮现而出，纵横近十丈，割裂大气，所向披靡。龙牙纷飞，宛若穿花利刃，盘旋飞舞，杀气凛然。

    　　凤九歌一边徐徐飞退，一边仍旧高唱着命运歌。

    　　他身边涌现出数位分身，皆是他的模样，却各有奇妙威能。

    　　正是仙道杀招——一曲之士！

    　　碧玉歌士能玉化一切，天地歌士有镇压威能'
