- chapter: 944
  title: 第九百五十节：仍是凤九歌
  content: '第九百五十节：仍是凤九歌

    　　石莲岛上，凤九歌将红莲留下的记忆完整地浏览了一遍。

    　　他重新回到现实当中。

    　　红莲意志宛若真人，栩栩如生：“除了这份记忆之外，我还有两样东西交托给你。一份是八转杀招未来身，另一份则是命运蛊的仙蛊方。”

    　　接着，红莲意志又详细地解释道：“八转层次的未来身杀招，能够让你转瞬之间拥有亚仙尊的实力。毕竟你是命中注定的大梦仙尊的护道人。历代的护道人只要成长起来，几乎都是这'
