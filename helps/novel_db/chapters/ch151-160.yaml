  title: 第一百五十四节：仙尊意志
  content: '第一百五十四节：仙尊意志

    　　炼化八十八角真阳楼，乍一听异想天开，但其实并非妄想。

    　　事实上，方源也不是“第一个”炼化八十八角真阳楼的人。

    　　在他五百年前世，中洲蛊仙攻破王庭福地，就是先派遣的蛊师混入到八十八角真阳楼的秘藏阁中。

    　　事成之后，他们将整个过程，都用蛊虫存放起来，然后布告天下。

    　　王庭福地乃是北原蛊师的精神象征，意义非凡。记录着攻破王庭福地的影像，在五域流传，不仅是彰显中洲实力'
