  title: 第一百五十七节：血月蛊
  content: '第一百五十七节：血月蛊

    　　第二天，密室。

    　　彩光在白玉盘上聚焦，形成一篇秘方——

    　　血月蛊。

    　　利用二转月芒蛊和血气蛊相互合炼，形成的三转蛊虫。

    　　一经催发，月刃通体血红，脸盆大小，若形成伤口，有血流不止之效。

    　　“就是它了。”方源目光上下扫视，将这秘方记在心中。又闭上双眼默默回忆，然后又睁开双眼对照之，如此反复三五次，他确信将这秘方统统记在心中，没有半点差错。

