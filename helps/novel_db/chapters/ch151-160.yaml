- chapter: 151
  title: 第一百五十一节：竟是蛊仙传承！
  content: '第一百五十一节：竟是蛊仙传承！

    　　砰！

    　　黑楼兰抬起一脚，将族人黑旗胜踢翻在地。

    　　“无能的东西！”黑胖子大声咒骂，脸色横肉抽动，目光凶残暴虐。

    　　大堂内噤若寒蝉，黑家的蛊师们都不敢吭声。

    　　黑楼兰人称“黑暴君”，性情暴虐残酷是出了名的。尤其是当他被第五十四关，连续阻碍六次，脾气就像是个火药桶被点燃了。

    　　“族长大人，是属下无能，属下该死！”黑旗胜匍匐在地上，五体投地，大声告饶不绝。'
