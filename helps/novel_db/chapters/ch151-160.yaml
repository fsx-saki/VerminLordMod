  title: 第一百五十一节：死局
  content: '第一百五十一节：死局

    　　上古战阵被破，百足家的蛊仙们受到了强烈的反噬。

    　　“卫大人！！”有人哀嚎哭泣。

    　　百足卫乃是主阵的关键人物，上古战阵破开，他承受了巨大的伤害，竟让他当场失去了性命。

    　　百足卫可是百足天君之下的第一人，百足家蛊仙的核心。

    　　没想到在百足家建立之后，就要风光无量的时候，陨落在了大本营的附近。

    　　这个惊变，不仅让百足家的蛊仙们悲伤至极，还让进攻铁鹰福地的方源等人心中一'
