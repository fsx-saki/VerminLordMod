- chapter: 154
  title: 第一百五十四节：气得吐血
  content: '第一百五十四节：气得吐血

    　　古月漠尘心中很沉重。

    　　他原本是想招揽方源的，但是因为他的资质而收手。

    　　现在他的老对头古月赤练，居然已经和方源勾搭上了。甚至种种迹象表明，一年多前赤练就已经开始投资方源。

    　　如今，投资得到了回报，赤脉新添了一位家老。这叫他心情怎么能不沉重？

    　　只是除了凝重之外，漠尘又有些疑惑。

    　　他是古月赤练的老对头了，从年轻时就相互攀比作对，对他的了解简直是到了内裤喜欢'
