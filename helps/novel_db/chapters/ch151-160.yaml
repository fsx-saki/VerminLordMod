  title: 第一百五十一节：能力蛊
  content: '第一百五十一节：能力蛊

    　　三人杀向困境，这是一番真正的死战！

    　　三人的实力早已经不足，而这头困境的实力，则出乎意料的强大。

    　　灾劫不断，三仙拼尽全力，掏出压箱底的东西，压榨出了每一丝潜能。

    　　黑楼兰的幽都力虎图腾都被打残了，黄钟族长的金钟图腾足足损伤了八成，修补代价极其高昂。至于那位七转蛊仙，身怀雨鹰图腾、雷鱼图腾，双双丧失了战斗威能，但好在这位七转蛊仙竟有手段，能将这两个残破的图腾相互组'
