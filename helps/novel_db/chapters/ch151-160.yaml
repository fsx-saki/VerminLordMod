    　　乌光照耀在方源的身上，透射过皮肉，对他的全身骨骼产生影响。

    　　方源原先已经动用了铁骨蛊，他的骨架漆黑，坚硬犹如铁石。但在这只蛊的作用下，他的骨骼渐渐变得更加坚硬。

