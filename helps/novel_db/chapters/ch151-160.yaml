    　　黑熊似乎不愿意吃肠子，以及少女的脑袋。但方源不想看到这样的事情发生。

    　　按照人兽葬生蛊的秘方，野兽将人吃掉，吃得点滴不剩为最佳。这样才能最大程度的保证成功。

    　　要炼出这人兽葬生蛊，需要材料近十种。

    　　其中最主要的两种，就是人和兽。

