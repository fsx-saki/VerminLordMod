  content: '第一百五十五节：疯魔之约

    　　从疯魔窟归来的行程，比去时要少很多。

    　　数天后，方源便来到黑凡洞天之中。

    　　“没想到楚度竟然也掌握着超级蛊阵，而且已经搭建起来，可以传送蛊仙出入黑凡洞天。”方源不禁在心中赞叹楚度的未雨绸缪。

    　　这是一条退路。

    　　只要铺设在外界的传送蛊阵，没有被发现，楚度等人就不会被百足天君围堵在黑凡洞天之中。

    　　由此可见，楚度抵抗百足天君，强硬的态度并非一味的勇悍莽撞。'
