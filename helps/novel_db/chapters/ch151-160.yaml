  content: '第一百五十二节：大而化小压群魔

    　　原来，在太丘战场，自从方源等人走后，东方长凡渐渐压住内患，令战局有所起色。

    　　他老谋深算，方源走后不久，他就立即意识到了这个情况。他当即就猜到，这三位神秘的黑袍蛊仙极可能去攻击他的老巢。

    　　不过，他在碧潭福地中，早就有所布置，并不担心，反而乐见这些魔道蛊仙分兵，好让他能够安心从容地对付自在书生！

    　　但很快，他惊骇欲绝地发现，自己竟然和茅草屋失去了联系！'
