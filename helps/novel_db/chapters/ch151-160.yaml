  title: 第一百五十一节：狗胆蛊
  content: '第一百五十一节：狗胆蛊

    　　眼前迷雾重重。

    　　方源在雾中缓步行走，在他的身边，环绕着一大群的犬兽。

    　　十一头的刺猬犬，一百三十二头的电文狗，十七头菊花秋田犬。除此之外，还有一只百兽王——大电文狗。

    　　受到天地伟力的拘束，这群犬兽默默地跟着方源，安安静静，乖乖巧巧，不发出一点声音。

    　　迷雾的世界，一片沉静。

    　　安静到方源的每一次呼吸，都能清晰可闻。

    　　虽然过了第二十轮，手中的犬兽数量达到'
