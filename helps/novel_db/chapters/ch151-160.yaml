  title: 第一百五十二节：疯魔窟
  content: '第一百五十二节：疯魔窟

    　　黑凡洞天之中。

    　　数以万计的百足天君，悬于高空，俯瞰下方的楚度。

    　　百足天君的脸色、态度，已经和之前完全不一样，一个个的脸色都是沉肃至极，气势凝重。

    　　“楚度！交出杀害我百足家的凶手，献上黑凡洞天，本天君可以饶你不死。”

    　　数万人一同开口，恢弘的声音在黑凡洞天之中阵阵回荡。

    　　楚度站在地面上，仰头望去。

    　　和高空中数万的百足天君相比，他显得形单影只，势单力孤'
