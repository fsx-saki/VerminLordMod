  title: 第一百五十四节：雷猪、岩鳄
  content: '第一百五十四节：雷猪、岩鳄

    　　山洞中。

    　　李闲将方源请到座位上，并且坐在了他的旁边。

    　　“请喝茶。”李闲伸出粗短的五指，手指一张，便有一份香茶，出现在他平摊的手掌上。

    　　方源看着茶水，并不动弹，没有接过来，而是叹息一声：“东海的苍空蛊果然好用。此蛊不仅容量广阔，远超同级，而且取用迅速方便。”

    　　“哦？想不到小兽王阁下，却是认得此蛊。”李闲目光不由地微微一闪。

    　　他并非南疆之人，而是从东'
