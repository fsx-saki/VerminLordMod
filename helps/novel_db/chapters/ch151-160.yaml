- chapter: 160
  title: 第一百六十节：满堂叫好
  content: '第一百六十节：满堂叫好

    　　轰隆一声，狂电狼仿佛巨象一般的身躯，倒在了地上。

    　　它嘴巴大张着，双眼失去了聚焦点，生命已经离它远去。

    　　它的身上，布满了伤口，鲜艳的狼血不断地往外流淌出来，染红了周围的地面。

