  title: 第一百五十四节：群魔战退正道仙
  content: '第一百五十四节：群魔战退正道仙

    　　方源上前相帮，和黎山仙子合作，挡下残阳老君。

    　　方源乃是仙僵，并不惧怕追命火，犹是如此，他仙窍中的力道虚影大军却是被火烧得十分迅猛。

    　　激战片刻，方源不由暗暗心疼。

    　　原来他催出力道巨手，并不多耗仙元。皆因力道巨手，乃是通过无数群力蛊，将力道虚影的力量结合起来，外显而出。

    　　从根本上而言，每一只力道巨手，只是十万力道虚影在出手。

    　　而力道虚影，早就耗费'
