  title: 第一百六十节：众人蜂拥各有意
  content: '第一百六十节：众人蜂拥各有意

    　　八十八角真阳楼的惊变，让圣宫上下大为惊震。无数人为此日夜牵挂，提心吊胆，惶惶无措。

    　　好在八十八角真阳楼一层坍塌不久后，情况就稳定了下来。

    　　七彩霞光也不再缩减，而是重新开始持续的增长。

    　　许是被刺激的缘故，这一次霞光增长扩张的速度，比之前还要快上三分。

    　　几天之后，浓郁如水的霞雾，重新凝聚出八十八角真阳楼的第一层来。

    　　一彻底成形，黑楼兰等人便立即火急'
