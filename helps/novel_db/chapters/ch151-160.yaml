  title: 第一百五十二节：一心多用蛊
  content: '第一百五十二节：一心多用蛊

    　　两支狗群相互对峙。

    　　方源这边，以蓝色的电文狗群位置，辅以灰色的刺猬犬，橘黄色的菊花秋田犬等。而铁甲狗群那边，则是一片沉重的黑色。

    　　方源将大电文狗调到前线，手轻轻一挥，狗群便分出前锋，首先发动了攻击。

    　　大铁甲狗汪了一声，看到大电文狗出现，也动身下场。

    　　它身边的铁甲狗群，紧紧地跟随着它。黑压压的一片，好像是一团乌云，从山丘上飞下来，气势迫人。

    　　狗群撞'
