    　　古月赤钟新官上任三把火，这一次主动找上方源，就是想要说服方源上缴九叶生机草。

    　　“上缴九叶生机草，也不是不可以。”方源沉吟了一番，道。

    　　有一句俗语说得好：此一时彼一时。

