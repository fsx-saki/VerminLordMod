  title: 第一百五十一节：魔性
  content: '第一百五十一节：魔性

    　　“什么？”古月药乐闻言，不禁一愣。

    　　方源已闪电般出手，手掌往少女细嫩的脖颈上一切，便将其击昏。

    　　少女软倒下来，方源手臂快速一捞，将其拦腰夹住。隐鳞蛊催动起来，他俩的身影消失在原处。

    　　当古月药乐模模糊糊地睁开双眼时，她发现自己身处在一个阴暗的山洞里。

    　　她甩了甩昏昏沉沉的脑袋，下意识想站起来。

    　　但她很快发现，自己被五花大绑着，绑在一块石头上。

