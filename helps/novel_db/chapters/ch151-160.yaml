  title: 第一百五十三节：随手杀了
  content: '第一百五十三节：随手杀了

    　　山风徐徐吹来。

    　　在三叉山的山腰，一个不起眼的竹林中，忽然空间破碎，光芒绽放。

    　　光影一闪即逝，在空无一物的草丛中，现出一人。

    　　这位少年黑发黑眸，脸色平静，手中捏着一块令牌，正是方源。

    　　“从犬王传承中出来了……”方源只觉得眼前一花，下一刻就置身在陌生地点。

    　　他目光一扫，确定周围没有危险，而他自己正处在三叉山的某处山腰上。

