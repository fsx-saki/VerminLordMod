  title: 第一百五十三节：疯魔三怪
  content: '第一百五十三节：疯魔三怪

    　　当然，楚度既然邀请方源出手，亲自去疯魔窟请人，在信中也给了方源一些防护魔音的方法，还有魔音强弱的规律。

    　　“不管如何，我都是要去一趟的。”

    　　楚度和百足天君相互争夺黑凡洞天，这事情的源头就出自方源。并且他和楚度利益相关，突袭铁鹰福地也有他一份。总之牵扯很深。

    　　方源雷厉风行，立即动身。

    　　通过超级蛊阵，他传送出琅琊福地，便一路往疯魔窟赶去。

    　　中途并无意外发'
