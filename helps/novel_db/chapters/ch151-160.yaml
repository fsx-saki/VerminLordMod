- chapter: 152
  title: 第一百五十二节：三等通关可为上？
  content: '第一百五十二节：三等通关可为上？

    　　方源只觉得浑身一紧，在撞进塔楼的瞬间，一股压力压迫他的身心。

    　　但旋即，压力一空。

    　　他彻底进入真阳楼内，眼前是一片湖。

    　　天空湛蓝，湖水波光粼粼，周围则是朦胧的青山墨影。

    　　手中的来客令，化为一滩冰凉的铁水，顺着他的手指缝洒落下去。

    　　来客令只能用一次。

    　　方源甩甩手，将铁水完全甩干净。

    　　他环顾四周，发现自己置身在湖中心的小岛上。身边站着一人'
