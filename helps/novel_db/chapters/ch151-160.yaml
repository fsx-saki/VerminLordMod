  title: 第一百五十三节：巨阳大局晶中宝
  content: '第一百五十三节：巨阳大局晶中宝

    　　方源置身在水晶长廊之中。

    　　眼前光华流转，四壁均是晶莹剔透的晶壁，可照人影。

    　　方源目光逡巡一圈，后方、左右皆是墙壁，只有前方道路可走。

    　　“终于来到了秘藏阁。”方源的嘴角翘起一个微小的弧度，迈开步伐，朝前走去。

    　　水晶长廊修长通透，不出五步，方源便看到左右的晶壁中，出现了一件件蛊虫，或者蛊方等等，仿佛是琥珀中的虫子，静静地位于晶壁之内。

    　　这些都是秘'
