    　　若是让他知道，原来这一切都是方源在捣鬼，恐怕冒着性命危机，他也要撕破暗渡仙蛊施加在他身上的封印，和方源拼个你死我活了。第一百五十九节：伟力逆流惊圣宫'
  - '事情，难道还少么？

    　　而且这最后一步，动静颇大。是最容易出现问题的环节。

    　　方源手中早已暗扣一只臭屁蛊，此刻手一甩，轻轻飞入洞中。

    　　顿时，地洞中就飘出一股异香。

    　　异香无风而散，旋即蔓延出去。'
