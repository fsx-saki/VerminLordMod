  title: 第一百五十四节：不在乎
  content: '第一百五十四节：不在乎

    　　“哦？”方源听到胖山的回答，心中惊讶不已。

    　　最近一段时间，他自己苦苦追寻的解除盟约的方法，没想到在这种情况下，出现在他的眼前。

