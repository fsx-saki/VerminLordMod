  title: 第一百五十三节：一意搜刮勾内患
  content: '第一百五十三节：一意搜刮勾内患

    　　“你，你怎么可以如此自私？”自在书生手指着方源，斥责道。

    　　“我的散文鲤鱼群，我的鱼群啊！”周千怒吼不止。

    　　“我们在这里艰难作战，你却在背后收好处？占便宜？”皮水寒眼中阴芒闪烁，语气冰冷。

    　　“我的散文鲤鱼群，还我的鱼群啊！”周千吼声中，夹杂着哭号之音。

    　　“当务之急，就是杀了东方长凡。到时候，不就什么东西都有了？！”黎山仙子的语气也带着隐隐指责的意味'
