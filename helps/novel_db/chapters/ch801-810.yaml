- chapter: 810
  title: 第八百一十六节：天庭察觉
  content: '第八百一十六节：天庭察觉

    　　天庭。

    　　秦鼎菱悬浮长空，面容严肃凝重至极。

    　　这一记杀招，她已然是酝酿了三天三夜。

    　　“着！”下一刻，她终于爆发，催出一道恢弘的金芒。金芒如五尾孔雀，轻啼一声，展翅高飞。

    　　待这金芒飞到某处天空，忽然炸裂开来，散成无数的点点碎芒。

    　　碎芒当中，一个巨大的通道隐隐显现。

    　　秦鼎菱身旁的紫薇仙子顿时失色：“竟然真有这样的通道！”

    　　秦鼎菱七窍缓缓流血，身躯'
