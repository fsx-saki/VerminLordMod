- chapter: 806
  title: 第八百一十二节：入梦操蚁
  content: '第八百一十二节：入梦操蚁

    　　龙人分身收刮梦境的举动，引来了四大龙将。

    　　若是人族蛊仙，四大龙将必然群起而攻之，但方源的龙人分身却是货真价实的龙人，不管是肉身还是魂魄，都是地地道道，毫无破绽可言。

    　　四大龙将因此表明身份，这个秘密让方源暗暗吃惊。

    　　他在上一世，只是在最后关头，瞧到了白凝冰驾驭龙宫、帝藏生，参与最终大战，没有看到四大龙将。

    　　“原来容婆这四位八转蛊仙，居然是龙宫的奴仆，被龙'
