- chapter: 807
  title: 第八百一十三节：父子交心
  content: '第八百一十三节：父子交心

    　　再仔细一看，龙人分身恍然。

    　　出现在他面前的，虽然是一位龙人蛊仙，但并非龙公，只是面貌酷似而已。

    　　“即便如此，此人恐怕和龙公也是关系密切。只是不知道，是否是我这个身份的父亲呢？”

    　　方源正想着，这位龙人蛊仙走到了他的面前：“吴帅！你好大的胆子，我告诉你多少次，不要惹是生非，不要招惹他们！你倒好，居然这一次又赢了他们。你可知道，那张双、陈副都是本门太上长老的嫡亲'
