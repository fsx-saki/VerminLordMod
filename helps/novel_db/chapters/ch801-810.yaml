- chapter: 809
  title: 第八百一十五节：操蚁对决
  content: '第八百一十五节：操蚁对决

    　　方源立即动用全力，去奴役这些蚂蚁。

    　　泰琴同样如此。

    　　这些蚂蚁乃是绿蚁居士发明，他择徒的比试内容，自然就是比拼双方操蚁的能耐。

    　　方源驾驭了三十八头工蚁，六头兵蚁后，立即心念一动，挥动全部军势，朝泰琴杀奔过去。

    　　泰琴也有三十多头工蚁，五头兵蚁，她采取的战术和方源不同，乃是运用工蚁铸就蚁巢，兵蚁护卫。

    　　方源兵力略处小优，战术也非常激进，令场中少年们纷纷惊'
