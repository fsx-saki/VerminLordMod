    　　总体上而言，运气分为黑、灰、白、赤、黄、青、紫这七种颜色。也有其他杂色，但基本上是这七种颜色的混合。

    　　运气的形态堪称千奇百怪，和具体的人，以及人物身处在具体的环境、本身的状态有关系。

    　　就拿方源自己而言，他和他的分身各个的运气形态、颜色都大相径庭。

    　　方源掌握了完整的巨阳己运真传，还有部分巨阳众生运'
