    　　“学生李小白，参见二位师长。”李小白走上台来，很有礼貌。

    　　申大才子微笑地看着他，点了点头。

    　　而私塾的姜先生则问道：“小白，可有诗词？”

    　　姜先生的眉宇间，有一丝隐约的担忧。这个李小白才智中庸，但愿他平时有着什么积累，否则依照他平时的水平，难免会令人失望。

    　　平日里叫自己失望，也就算了。但如今却是在申大才子面前……尤其是这场文斗的前中期，已是精彩绝伦，必定会扬'
