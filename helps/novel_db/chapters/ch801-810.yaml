- chapter: 802
  title: 第八百零七节：煮运锅
  content: '第八百零七节：煮运锅

    　　太古白天。

    　　方源驾驭着随意祥云，在空中疾驰。

    　　天相白鹤就跟随着他，不断盘旋飞舞。

    　　随意祥云杀招，是方源当初从黑凡洞天攻略中缴获而得的战利品。后来经过了他的一些改良，用于移动。

    　　但祥云的方向，并不随着方源的意志而动，而是遵循着运道的奥妙。

    　　祥云所行的路径，必定是运气颇佳的路线。

    　　随意祥云和天相杀招相互搭配，相得益彰，方源在上一世就从中获益，接连发现了'
