- chapter: 805
  title: 第八百一十节：龙宫考验
  content: '第八百一十节：龙宫考验

    　　蔚蓝的海面，波涛滚滚，潮起潮落间，鸥鸟飞旋。

    　　扑通。

    　　一声水响，一位蛊仙就钻入水中，直往下潜去。

    　　百丈、千丈、万丈……

    　　这里的海水极深，并且有着大量的凶猛海兽盘踞。

    　　当深达十万多丈后，就开始出现了太古级的海兽。

    　　当然，奇珍异宝也是不少。

    　　“东海资源不愧是五域第一。”蛊仙心中感叹，一味地朝下深潜。

    　　足足上百万丈后，在无边的黑暗深海中，出现了'
