- chapter: 801
  title: 第八百零六节：魂穿两天
  content: '第八百零六节：魂穿两天

    　　“按照我的记忆，应当就在此处。”方源悬停在太古白天的某个方位。

    　　这里空无一物，但方源依照上一世的记忆，却是知道那兽灾洞天就在这里。

    　　洞天门户关闭，寄托于虚空当中，怎么瞧都瞧不出端倪。方源上一世却是依赖天相杀招，发觉了兽灾洞天的存在。这一世则根本不用这么麻烦，直接跑到兽灾洞天的门口来。

    　　“去吧，天相。”方源心念一动。

    　　天相杀招乃是一只独脚白鹤，浑身羽毛洁白'
