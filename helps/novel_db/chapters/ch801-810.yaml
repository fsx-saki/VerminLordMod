- chapter: 808
  title: 第八百一十四节：绿蚁收徒
  content: '第八百一十四节：绿蚁收徒

    　　东海。

    　　潜藏在云层之中的方源本体，忽然神色一动：“嗯？分身的气运又有了变化！”

    　　方源放眼望去，只见煮运锅旁的有一大团的浓重黑云气运。

    　　黑云气运当中，各有四团异象，代表着四位八转蛊仙，镇守这股黑云气运。

    　　象征方源分身的紫色小龙气运，被黑云气运团团围住，在里面盘踞低吼。

    　　小龙精神比之前还要振奋，一丝一缕的青紫气运，不断地从黑云气运中转化，增添到紫色小龙'
