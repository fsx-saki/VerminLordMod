  - '续下去，方源将狗屎运、气运、察运、连运、时运等诸多运道仙蛊，都融入其中。

    　　他的运道境界是大师级，阵道境界是宗师级，都已经产生了直觉。

    　　所以，搭建的过程中，一旦有什么不妙的感觉，方源就立即警惕起来，'
  - '化，他看到了自己的气运，不断地流淌到煮运锅中。

    　　不一会儿功夫，煮运锅里的气运就已经蓄满。

    　　“察运仙蛊只有六转，而我已有八转修为，单靠这只仙蛊无法查看我的运气。”

    　　“煮运锅也只是六转层次，所以我只能'
