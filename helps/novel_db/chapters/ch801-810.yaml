  - '不能承载蛊仙作战，体积很小，另有妙用。

    　　比较起来的话，和星宿棋盘的确有些相似。

    　　方源当即灌输仙元进去，煮运锅嗡嗡作响，立即化为一道金光，扑到方源头顶上空去，随即隐没不见。

    　　即便是方源，单凭肉眼'
  - '，比如食道仙蛊煮。但核心的运道仙蛊，皆是六转，所以这座仙蛊屋的品级有点低。

    　　这座仙蛊屋记载于巨阳己运真传之中，又经过方源宙道分身的改良。很显然，这是一座运道的仙蛊屋。

    　　它不能承载蛊仙作战，体积很小，另'
  - '要对此施展运道手段。

    　　还有一团运气，仿佛是一层粉色雾气，漂浮在锅边，绕着锅旋转。

    　　这是方源的梦道分身的气运象征。

    　　粉色雾气缥缈虚弱，不断变幻，仿佛一层微弱的光影。

    　　只有梦道分身晋升六转之后'
  - '它有三对触脚，最前面的一对最为强壮，张开来时，仿佛是一个厚实的铁钳。

    　　仙蛊煮，却是方源敲诈了南疆正道而得。

    　　时至如今，方源基本上已经将南疆群仙的肉身、魂魄都归还过去，开始和南疆各大家族互换仙蛊。'
  - '心中大喜，当即就分出大部分的心神，投入到自家仙窍中，开始了组装。

    　　太古白天中，其实十分危险，太古荒兽横行，时常还会遇到太古荒兽群。寻常八转蛊仙在这里探索，都是小心谨慎。一些七转中的罕见强者，有时候也会'
  - '，乃至毁灭。

    　　所以，方源都是小心翼翼，谨慎无比。

    　　就这样继续下去，方源将狗屎运、气运、察运、连运、时运等诸多运道仙蛊，都融入其中。

