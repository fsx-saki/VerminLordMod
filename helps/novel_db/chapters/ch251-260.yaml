  content: '第二百五十六节：星念仙蛊

    　　这是一场和时间的赛跑！

    　　如果鲨魔等人先撑不住魂兽的攻势，那么这次攻略就会以失败告终。

    　　若是在此之前，蛊仙们先将战场杀招破解，那么他们将收获胜利。

    　　轰！

