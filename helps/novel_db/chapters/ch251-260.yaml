- chapter: 251
  title: 第二百五十二节：什么东西？
  content: '第二百五十二节：什么东西？

    　　义天山大战结束之后，方源就曾经在路上测验过这具身体的底细。

    　　他徒步奔跑，矫健如飞，快若奔马。

    　　轻轻一跃，就有三丈。

    　　从五十八丈跳下，用头部着地，只会感到头皮一阵酥麻，脑袋有点晕。两三个呼吸后，这些症状就会消散。

    　　并且力气很大。耐力十足，连续奔跑了一刻钟，都没有感到任何的疲惫之感。

    　　还有五感强大，动态视觉，简直优秀到了极点！视野极其广阔。遥看万步之'
