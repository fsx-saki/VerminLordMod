  title: 第二百五十八节：狗尾续命貂
  content: '第二百五十八节：狗尾续命貂

    　　砰！

    　　逆命祭炼子阵传来一声闷响。

    　　洪极子已经再不意外，投去一瞥之后，又转移了视线。

    　　这么一会儿工夫，蛊阵爆发出来的光柱，已经陆续缩减了五成。

    　　“这个蛊阵有点意思。”就在这个时候，一个古怪的声音，轻轻地传入洪极子的耳畔。

    　　“什么人？！”洪极子大惊失色，蛊仙气息猛地爆发出来，就要施展强烈手段。

    　　“小娃娃，不要紧张，更不要乱动。”刚刚那个古怪的声音'
