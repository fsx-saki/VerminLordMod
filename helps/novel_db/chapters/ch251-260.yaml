- chapter: 258
  title: 第二百五十九节：和宋家交涉
  content: '第二百五十九节：和宋家交涉

    　　和之前方源第一次加入北原僵盟相比，方源这次加入东海僵盟，反而更宽松一些。

    　　原本，方源还有些担心身份暴露，毕竟东海僵盟中可有好几位八转仙僵坐镇。

    　　为此，方源在之前狐仙福地里时，就利用智慧光晕，不惜耗费大量星念，将星痕仙蛊也融入到见面似相识杀招当中。

    　　有着吃力、变形、星痕三大仙蛊，充当核心之后，方源转变成星道蛊仙或者星道荒兽，更加逼真了。

    　　但此次加入东海'
