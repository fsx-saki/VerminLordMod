  content: '第二百六十一节：冲刷

    　　逆流河静静地流淌。

    　　越是上游，河面就越是平静。

    　　然而在跋涉者的心中，逆流河却流淌了进来，掀起万千波涛，逆反任何继续上游的思想。

    　　毁灭肉体不可怕，可怕的是毁灭思想和精神。

    　　当初的人祖，也在逆流河中败北。如今这些蛊仙，似乎要重蹈人祖覆辙。

    　　“可恶，坚持不住了！”下一刻，余艺冶子终于到达了自己的极限，无法前行，被逆流河水很快地冲刷下去。

