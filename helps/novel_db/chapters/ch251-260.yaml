- chapter: 256
  title: 第二百五十七节：惨胜
  content: '第二百五十七节：惨胜

    　　“坚持，坚持下去！”

    　　“成败在此一举，只要坚持就能得到胜利！”

    　　玄冰残屋中，众仙嘶吼大叫，已经失了风度。

    　　在玄冰残屋外，魂兽密密麻麻，宛若铺天盖地的蚁群，将玄冰屋死死地包裹在最中央。

    　　“还有多少隐藏点？”鲨魔大喝。

    　　“一百七十八个！”卜单立即汇报道。他虽然破解的能力不行，但到了此刻，战魂沙场已经接近崩溃，魂兽已经不能再产，卜单的侦察能力也足以窥视出整个'
