- chapter: 253
  title: 第二百五十三节：不，我是大爱仙尊！
  content: '第二百五十三节：不，我是大爱仙尊！

    　　末了，房睇长又强调道：“纵观五域，北原、中洲、东海皆有尊者领袖，南疆也有一个正道联盟。惟独我们西漠，仍旧是势力割据，一盘散沙的状态。”

    　　“可以说，我们西漠在五域当中是最为弱小的一方。”

    　　“在这样的情况下，我们切不可主动挑头，做什么表率。”

    　　“若是由其他势力招揽我们，我们便左右逢源，暗中投靠，以我族利益为先。之前我们房家遭受围攻，是因为获得了神帝城'
