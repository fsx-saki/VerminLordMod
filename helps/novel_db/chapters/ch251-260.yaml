  - '的福地？我可记得，我事先和你讲过，借我这套仙蛊可不便宜。就算念及你帮助我防御强敌的份上，也需要两千块仙元石的吧？”

    　　方源便取出两千块仙元石，递给地灵：“你看，我都已经准备好了。”

