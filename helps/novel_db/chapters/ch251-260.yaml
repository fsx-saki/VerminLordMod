    　　在中洲炼蛊大会之后，方源展现出强大的炼蛊造诣，鹤风扬亲自邀请他去仙鹤门看看去，这是仙鹤门方面对方源态度的明显转变。'
  - '某种智道仙蛊当中，并且按照地灵交付的具体方法，开始推算。

    　　两股星念飞速前行，猛烈对撞，掀起漫天的星云风暴。

    　　风暴中，无数的星念不断闪烁，有的在合并，有的则开始分解。

