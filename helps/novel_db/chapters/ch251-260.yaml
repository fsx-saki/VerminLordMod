- chapter: 252
  title: 第二百五十三节：仙蛊爱意
  content: '第二百五十三节：仙蛊爱意

    　　方源将这个水母样子的仙蛊，拿到自己的手上，放在眼前端详。

    　　下一刻，他双眼一亮。

    　　这是一只仙蛊。

    　　但具体是几转，方源并不清楚。

    　　因为在这个逆流河中，任何的蛊虫都无法运用。落入逆流河中的这些蛊虫，就仿佛是沉眠在化石之中，自我封印起来，一丝气息都不泄露出去。

    　　这就导致了方源，刚刚没有将这个水母样子的仙蛊当回事。

    　　直到碧晨天忍不住出声提醒，方源才惊觉醒'
