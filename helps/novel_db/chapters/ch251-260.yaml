    　　方源按照小阵图，将四只仙蛊分别安放在这头刺脊星龙鱼的身'
  - '福地门户散发出的光，只能照耀周围一圈。地渊里十分昏暗，一片寂静。

    　　这是地渊的深处，就算是拥有者中洲十大古派之一的古魂门，也还未探索到这里。

