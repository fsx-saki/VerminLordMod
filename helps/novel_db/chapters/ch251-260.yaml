- chapter: 254
  title: 第二百五十五节：脚踹八转大能
  content: '第二百五十五节：脚踹八转大能

    　　方源双手扑空，连忙顺势举臂，左右手齐抓。

    　　左手抓了个空，右手却抓住了碧晨天的一条腿。

    　　碧晨天撤退受阻，另一条腿宛若恶蛟出洞，又狠又急，向方源的太阳穴袭来。

    　　这一击势大力沉，若是击中，必定让方源头昏眼花，碧晨天逃脱再无关隘。

    　　但方源又在此刻，掏出爱意仙蛊，举在眼前。

    　　碧晨天郁闷得想要骂娘，腿势顿时一顿。

    　　方源争取到关键的反应时间，忽然把头往后'
