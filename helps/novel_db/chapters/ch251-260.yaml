- chapter: 251
  title: 第二百五十二节：向琅琊地灵借蛊
  content: '第二百五十二节：向琅琊地灵借蛊

    　　当即，方源再不迟疑，利用定仙游前往琅琊福地。

    　　琅琊福地已经面貌大变。

    　　汪洋大海上，三大陆地相互对望。高空中，漂浮着一片由云泥构造出的第四大陆。

    　　曾经因为激战而损毁的福地，经由太白云生出手，已经恢复了旧貌。

    　　太白云生虽然没有机会参加攻防战，但在战后修复的工程中，也收获了不少报酬。

    　　当然，因为组成炼炉的某些仙蛊丢失，导致福地内部空间收缩。这些消失'
