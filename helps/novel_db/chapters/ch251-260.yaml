- chapter: 253
  title: 第二百五十四节：水战八转
  content: '第二百五十四节：水战八转

    　　若是有可能，方源也想用爱意仙蛊，换取其他仙蛊，更加适合自己。

    　　但在逆流河中，进行交易当然是不行的。

    　　因为任何蛊虫都用不出来，也就无法用信道手段，约束双方和平交易。

    　　方源想换其他仙蛊，碧晨天也拿不出仙蛊来。因为蛊虫在逆流河中沉眠若死，不算仙窍中的，就算是寄生在蛊仙体内的仙蛊，也丝毫不响应任何的呼唤。

    　　所以，碧晨天手中并没有交易的筹码。

    　　碧晨天当然知道'
