- chapter: 257
  title: 第二百五十八节：黄泉海域不死国
  content: '第二百五十八节：黄泉海域不死国

    　　虽然破解了战魂沙场，但因为战场杀招八门迷宫的阻碍，鲨魔一行不得不暂时撤离玉露福地。

    　　和其他智道蛊仙分道扬镳之后，方源和太白云生则紧随着鲨魔、苏白曼，再次来到鲨海，被鲨魔夫妇设宴款待。

    　　“星象兄，不知道你对破解八门迷宫，有多少把握？”酒席间，鲨魔直言不讳地问道。

    　　方源脸色微变，目光凝重地摇头：“惭愧，在下没有丝毫的把握。”

    　　“就连你也没有把握么？”'
