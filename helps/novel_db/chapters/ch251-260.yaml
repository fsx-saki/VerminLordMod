- chapter: 253
  title: 第二百五十四节：重点建设星象福地
  content: '第二百五十四节：重点建设星象福地

    　　方源进入星象福地。

    　　星象福地经过这一顿搬迁，天地二气动荡，一场打地震随即在星象福地中产生。

    　　直到星象福地再次落下，才汲取了源源不断的地气，重新稳固下来，地震渐渐停歇。

    　　此时，方源放眼望去，只见广袤大地，裂痕满布。火焰燃烧，黑烟袅袅缭绕。

    　　方源心微微一沉，深深叹气。

    　　这是没有办法的事情。

    　　因为要仙窍移植，不能干扰到两套仙蛊阵的运转。所以，'
