- chapter: 258
  title: 第二百五十九节：慷慨赴死！
  content: '第二百五十九节：慷慨赴死！

    　　“沐凌澜！”在雪胡老祖身后，威灵仰仰头怒喝。

    　　沐凌澜早已经有了觉悟，他狠狠一咬牙，动作比赵怜云还快，将孱弱的赵怜云推到马鸿运的怀里。

    　　“好好活着！”

    　　抛下这句话，他返身一振，一把抱住雪胡老祖的腰。

