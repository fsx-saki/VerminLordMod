- chapter: 255
  title: 第二百五十六节：小人的坚持
  content: '第二百五十六节：小人的坚持

    　　“真是厉害啊，这座蛊阵居然能够控制住逆流河。”洪极子仰头望着光柱，真心实意地开口称赞道。

    　　但玄极子却摇头：“这并非控制。我只是布置出子母逆命祭炼大阵，就相当于挖开了一个河道，让逆流河在河道中奔流而已。只是河道是我们挖的，因此逆流河流动的方向，我们也就可以影响了。”

    　　“待我们收取了这条逆流河，长生天中就又多出了一块天地秘境了。”洪极子展望未来。

    　　玄极子再次'
