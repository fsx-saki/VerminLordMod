- chapter: 256
  title: 第二百五十七节：马赵相会
  content: '第二百五十七节：马赵相会

    　　洪极子认为，坚持蛊只是《人祖传》中杜撰的蛊虫。

    　　但玄极子却摇头，道：“坚持仙蛊，并不是子虚乌有的蛊虫。事实上，它的确存在过。”

    　　洪极子大感讶异：“我怎么不知道？”

    　　“这是我在北原游历时，无意中获知到的消息。曾经炼出坚持仙蛊的人，正是大名鼎鼎的元莲仙尊。也是他进入生死门，将逆流河带来世间。他应该就是逆流河的第一代主人。”玄极子道。

    　　“元莲仙尊！是这样吗？'
