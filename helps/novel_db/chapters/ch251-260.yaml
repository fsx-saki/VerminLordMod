  title: 第二百五十六节：星念仙蛊
  content: '第二百五十六节：星念仙蛊

    　　这是一场和时间的赛跑！

    　　如果鲨魔等人先撑不住魂兽的攻势，那么这次攻略就会以失败告终。

    　　若是在此之前，蛊仙们先将战场杀招破解，那么他们将收获胜利。

    　　轰！

    　　方源挥摆长袖，一记智道凡级杀招甩出去，将附近七八个隐藏的蛊虫，都炸成碎末。

    　　之前他破解战魂沙场这个战场杀招，一击之下顶多只能摧毁五六个隐藏蛊虫，但现在一击之力能毁七八个。由此可见，这段时间之内，他窝'
