  title: 第一百二十六节：策反楚度？
  content: '第一百二十六节：策反楚度？

    　　泪冰并非仙材，但也比较珍贵，广受蛊师、蛊仙的喜爱。

    　　泪冰源自雪人。

    　　雪人生存在雪地冰冷的环境中。一般不会哭笑，眼泪更是难得。绝大多数的雪人，终其一生，都未有喜极而泣，或者悲伤痛哭的经历。不过一旦流下泪水，都会在瞬间凝结成泪冰。

    　　雪人一生中，顶多流三次泪冰。加起来不超过六十颗。每流一次泪，雪人就会寿元大减，本命精华亏损良多。雪人流下泪冰过多，将会迅速老化，'
