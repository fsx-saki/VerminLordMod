- chapter: 125
  title: 第一百二十五节：哦，那我认输
  content: '第一百二十五节：哦，那我认输

    　　“传统霸主的古月一族，新进崛起的白家寨，不容小觑的熊家寨……”方源目光逡巡，站在人群中，纵观全局。

    　　古月族有青书、赤山、漠颜，熊家、白家同样有出色的二转蛊师精英。

    　　再加上石楼上，各族的族长以及当权家老，会盟坡上可以说是群英荟萃。

    　　“不晓得哪一位是白凝冰呢？那个象征着白家崛起的男人！”

    　　“白凝冰已经三转修为，肯定不在二转蛊师里面了。”

    　　“貌似石楼'
