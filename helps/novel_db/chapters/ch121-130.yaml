- chapter: 126
  title: 第一百二十六节：木魅之殇
  content: '第一百二十六节：木魅之殇

    　　认输……

    　　方源的话，还回绕在众人的耳中。

    　　一时间，石楼下几乎所有的二转蛊师，都将惊异的目光集中在方源的身上。

    　　方源视若无睹，抱臂立在原地，一脸平静。

    　　“认输？居然直接认输了，我没有听错吧？”

    　　“那个就是方源？连出手的胆量都没有，呵呵。”

    　　“不得不承认熊力的气势，的确强大。但即便是输，总也得走个过场才是。直接认输，不仅是自己懦弱，更丢家族的脸面啊'
