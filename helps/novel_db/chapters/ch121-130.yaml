  - 梦境大战，让方源收获了许多纯梦求真体。
  - 治疗人族蛊仙的伤势，对非人族无效
  - 宙道的治疗法门，方源只有人如故仙蛊。可惜这只仙蛊，只对人族方有良效。
  - 掌控宿命，使一切存在受命运束缚，不受天外之魔影响。
- chapter: 123
  title: 第一百二十三节：天地我在独行
  content: '第一百二十三节：天地我在独行

    　　“有什么事情？”方源看着赤山。

    　　即便是在冬天，他仍旧赤裸着上身，赤红的肌肤散发着暖意，让人仿佛觉得靠着一只火炉。

    　　白雪飘落在他的身上，瞬间就消融掉。

    　　这是因为他体内的空窍中藏着一只双窍火炉蛊。

    　　火炉蛊是二转蛊虫，蕴藏火气，用于进攻。御寒只是一个附作用罢了。

    　　赤山的眼神有些复杂，他盯着方源沉声道：“你知道这些天，熊家寨的熊力，要找你比拼力气的事情'
