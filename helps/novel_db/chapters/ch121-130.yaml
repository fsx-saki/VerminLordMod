  title: 第一百二十一节：得南疆乐土真传
  content: '第一百二十一节：得南疆乐土真传

    　　“原来这就是尊者的无敌之秘……”方源心中喟叹。

    　　来到菇人乐土这一趟，真的是不虚此行！

    　　方源获悉了大量的有关尊者的秘密，同时他对乐土仙尊的目的，也有了一定的猜测。

    　　至此，方源之前察运的种种猜测，都得到了侧面证实。

    　　他的气运，宛若一道纯银光柱，虽然细小但修长高耸，一股笔直冲天之势，似乎要贯通苍穹。

    　　在这紧密的纯银光柱的底层，有一团黄气包裹，仿佛尘'
