    　　中洲，狐仙福地，荡魂行宫。

    　　方源缓缓睁开双眼，赤红的双眸闪烁着凶厉之芒。

    　　查看自身一番，方源满意地点点头，口中不禁轻赞出声：“已经用了不知多少次了，这胆识蛊果然是壮魂极品。我在黑楼兰的梦境中，受着如此严重的魂魄损失，在这么短的时间内已然痊愈了。”

    　　他深吸一口气，真乃神清气爽，一扫之前魂魄伤重时的颓废昏沉。

    　　“地灵何在？”方源忽的唤道。

    　　“主人，主人，你'
