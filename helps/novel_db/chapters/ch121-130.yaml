    　　就在这时，忽然有魂兽的兽吼声传来。

    　　陈淫道有些奇怪：“这郁八光勾怪的功夫见涨了啊。”

    　　但是很快，他们发现不对劲。

    　　勾动魂兽来到这边的，并不是郁八光，'
