  content: '第一百二十三节：自己来争！

    　　水汽呼啸，云光中三位蛊仙疾驰而来。

    　　“快，快，快！”为首的蛊仙赫然便是灵缘斋的太上大长老。

    　　包括太上大长老在内的灵缘斋三仙，各个面色焦急不安。

    　　原来，赵怜云强行送走了看守炼蛊密室的五转蛊师，这五转蛊师被送到外面，心中惶恐不安，连忙通讯，告知灵缘斋的高层。

    　　得到消息，太上大长老等人都坐不住了，立即起身，就往这里赶！

    　　凤金煌不能出事！

    　　之前，虽然'
