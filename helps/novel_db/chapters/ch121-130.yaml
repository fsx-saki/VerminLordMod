- chapter: 121
  title: 第一百二十一节：诈唬糊弄
  content: '第一百二十一节：诈唬糊弄

    　　双枪蛊仙杀向方源！

    　　“异人……果然是一根筋的家伙么，还是天意的影响？哼！”方源目光阴沉，看着双枪蛊仙杀来，他却是不闪不退。

    　　轰！

    　　下一刻，他打开至尊仙窍的门户，将一个庞巨至极的猛兽放了出来。

    　　“啊！这，这是！！！”双枪蛊仙就感到一股磅礴至极的气息，在瞬间狠狠地碾压他的身心。

    　　他的冲势戛然而止，斗志在刹那间溃不成军。

    　　皆因方源放出来的，不是别的，'
