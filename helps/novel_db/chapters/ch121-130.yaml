- chapter: 122
  title: 第一百二十二节：梦道大师
  content: '第一百二十二节：梦道大师

    　　此时摆放在方源手掌心中的梦道仙蛊，宛如一颗浑圆如球的红宝石，然后又被劈成了一半。

    　　这只圆滚滚的半球形蛊虫看起来就十分可爱，并且朱红的色彩也非常瑰丽。

    　　它的头部，只占整个身躯的一成。巨大的背部表面圆润光滑，有着黑色的纵横纹路，让人联想到了龟壳。

    　　这是梦道七转仙蛊——梦甲蛊。

    　　它是防御性的梦道仙蛊！

    　　方源手中的仙蛊有很多，但梦道仙蛊只有一只，就是八转如'
