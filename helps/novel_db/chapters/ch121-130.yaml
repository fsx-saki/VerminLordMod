  title: 第一百二十八节：严冬不肃杀，何以见阳春！
  content: '第一百二十八节：严冬不肃杀，何以见阳春！

    　　山体石林仍旧充斥着一片晦暗的赤光。根根石柱从洞顶垂下，如倒长的参天巨木，蔚为壮观。

    　　“距离上一次进入这里，已经是一个多月了吧。”方源心中想着，有些无奈。

