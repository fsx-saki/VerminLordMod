  title: 第一百二十六节：大战（上）
  content: '第一百二十六节：大战（上）

    　　北原的清晨，越加寒冷。

    　　片片白霜，凝结覆盖在草地之上。人们呼吸间，吐出一团团的热气。

    　　两只大军，数十万人相互对峙。

    　　旌旗飘扬，军士如林。

    　　在第一次交战之后，刘家和黑家休整了十数天，便下战书，于今日双双出营，再度开战。

    　　“二哥，上次是你出战的，这次该轮我了！”墨狮狂早就蠢蠢欲动，大吼一声，迫不及待地冲上阵前。

    　　墨狮狂雪发高扬，墨肤豹眼，气势汹汹'
