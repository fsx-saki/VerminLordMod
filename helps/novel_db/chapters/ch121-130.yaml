  content: '第一百二十七节：大战（中）

    　　一时间，就算是高扬朱宰和墨狮狂、欧阳碧桑的战局，也被浩荡的人流搅乱。

    　　两只大军彻底地纠缠在一起，喊杀声、呐喊声连绵一片，震荡云霄。

    　　水瀑蛊！

    　　混战中，水魔浩激流猛地一推双掌，爆发出磅礴的湛蓝激流，将面前的蛊师不分敌我，一概冲刷。

    　　大龙卷风蛊！

    　　一道巨大的深绿色龙卷风，高达十数丈，卷席战场。所到之处，不论人兽，皆被狂风卷得高高抛飞出去。

    　　龙卷风'
