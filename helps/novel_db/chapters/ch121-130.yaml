  content: '第一百二十七节：暂时的休整

    　　方源的神念在宝黄天中穿梭。

    　　“咦？”他的神念微微一顿。

    　　一个蛊仙的意志，驻留在一边，在其身后是小山的货物。

    　　“这些都是滑土？”方源主动上前询问道。

    　　韩玉的蛊仙意志立即从沉眠中醒过来，见有顾客，连忙回答道：“都是滑土！”

    　　报了价格之后，他又道：“这位蛊仙大人，你是要买多少？”

    　　滑土是一种五转蛊材，土质相当肥沃。

    　　方源心中点头，对方的出价很是'
