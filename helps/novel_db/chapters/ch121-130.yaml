    　　此刻的大堂中，灯火辉煌，歌舞在表演，丝竹声流淌。众人觥筹交错，氛围正烈。

    　　“好。”商囚牛坐在主位上，向商一帆举起酒杯，一仰脖子饮下这杯酒。

