  title: 第一百二十二节：副使大人
  content: '第一百二十二节：副使大人

    　　“贼子，你往哪里走？”夜叉龙帅率领三位仙僵，飞在空中，速度之快，宛若四道闪电。

    　　追杀的不是别人，正是凤九歌。

    　　他伪装成仙僵身份，企图混入北原僵盟，不想却在最后关头，受阻于议事堂的道痕大门。

    　　因此，不是北原蛊仙的秘密暴露出来，惹得阴流巨城的三巨头之一的夜叉龙帅，亲自率人追杀。

    　　忽然，凤九歌停下身形，转身面对四位追兵，面含淡笑：“诸位追得辛苦么？不妨停下来'
