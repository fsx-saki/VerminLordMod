  content: '第一百二十九节：乱流海战（上）

    　　刘青玉便又将之前的话复述一遍。

    　　影无邪的脸色迅速阴沉下来。

    　　方源从南疆一路迁移到北原，动用了见面曾相识杀招，遮掩了容貌。但是见面曾相识并不能这样仙蛊的效果，或者是仙道杀招。

    　　在东海时，方源曾经和刘青玉、汤诵、周礼三位蛊仙交手，不可避免的就有各种行迹暴露出来。

    　　影无邪虽然不知道方源当时的相貌如何，但是却从刘青玉的描述中，感知到一抹熟悉的感觉。'
