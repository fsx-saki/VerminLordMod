  title: 第一百二十二节：我……欢喜啊！
  content: '第一百二十二节：我……欢喜啊！

    　　北部冰原，地下深处。

    　　洞窟大厅中，石凳、石桌围成一个圈，粗藤攀附周壁，青草生长在石缝间。

    　　三堆火焰，在大厅中央熊熊燃烧。

    　　据说，这是上古时代就流传下来的风俗。异人族群中来了贵客，就要设宴款待，并燃起三堆大火。

    　　雪人、石人、毛民以及方源，诸多蛊仙，在这里齐聚一堂。

    　　火光映照在每个人的脸上，都见笑容。

    　　各种瓜果摆卖了个人面前的石桌上，很快，又'
