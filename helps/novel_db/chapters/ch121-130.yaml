  content: '第一百二十三节：沉默和叹息

    　　轰！

    　　剧烈的爆炸声中，贺狼子仿佛一滩肉泥，摊在巨坑中心。

    　　他奋力挣扎，想要爬起来，但身体宛若被一座无形的大山镇压着，千万钧的重量压得他动弹不得。

    　　贺狼子双目赤红，面容扭曲，嘶吼连连。

    　　秦百胜双手自然垂下，面无表情地站在巨坑边缘，看着挣扎不止的贺狼子。

    　　“一招，只是一招，就让贺狼子无还手之力！”雪松子的眼中，是一片惊骇之色。

    　　黑城眯起双眼，掩下'
