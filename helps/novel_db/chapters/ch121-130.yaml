  content: '第一百二十七节：所谓的道德和感情

    　　一直到傍晚时分，斗蛊大会这才将将结束。

    　　会盟坡上，蛊师们的三大家族阵营，已经再不像之前那般泾渭分明。蛊师们布满了整个山坡，只是隐隐残留着三个较为密集的人群。

    　　斗蛊切磋，是一种发泄，亦是一种妥协。

    　　在这个以力量为第一价值观的世界里，有了力量就能得到尊重，才有合作的基础。

    　　自从熊力挑战过方源之后，就再也没有蛊师来找他。

    　　方源只是个新人，还没有和'
