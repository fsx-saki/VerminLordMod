  content: '第一百二十四节：我不需要理解

    　　“原来如此。”方源摸摸下巴，却又摇摇头道，“我这酒虫是不卖的。既然药姬执意要收购，不妨去找那位买了酒虫的蛊师去。”

    　　听了此话，青书顿时一朵愁云罩脸，他深深叹息道：“唉，也不知道是哪个族人，收购了这只酒虫，一直秘而不宣。我们是调查不出来的，总不能随意探索其他人的空窍吧？这是侵犯隐私，犯忌讳的事情。为了酒虫这么一件小事，惹了众怒可不好。不过也可以理解这个族人，有了'
