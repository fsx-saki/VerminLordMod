- chapter: 122
  title: 第一百二十二节：商家城喧腾
  content: '第一百二十二节：商家城喧腾

    　　“以三转巅峰，对决四转，方正居然胜利了。不仅以弱胜强，更战胜了巨开碑这样强大的存在！真是少年有为啊！”

    　　“这是一场毫无疑问的大胜。巨开碑更是施展了杀招巨灵变，结果仍旧被方正给干趴下了。甚至主动认输。”

    　　“八大兽影的攻击，真是恐怖……想不到方正居然有力气蛊。他运气也太好了，据说这只力气蛊，是他原先家族中的珍藏。”

