- chapter: 121
  title: 第一百二十一节：四味酒虫
  content: '第一百二十一节：四味酒虫

    　　“古月一族……”熊力站在山坡上，遥望着远处的古月山寨，脸上浮现出一丝复杂之色。

    　　秋风飒爽，徐徐吹来。

    　　此时望去，秋意染遍山峦。

    　　树叶红黄交杂，野果累累。唯有青矛竹，碧绿如玉，依旧挺立。

    　　“曾几何时，古月一族就像是这山上的青矛竹，四季常青，第一霸主。现在嘛，竟有一种落魄。”熊力的嘴角扯动出一丝冷讽的弧度。

    　　但是很快，他又想到自家的山寨，嘴角的弧线抹平'
