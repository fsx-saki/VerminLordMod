  content: '第一百二十八节：欲取信道传承

    　　大风迎面吹来，夹裹着海水的咸味。

    　　方源端坐在一朵祥云之上，一边赶路，一边分出心神，探入手中的信道凡蛊之中。

    　　这凡蛊，来源于冰卓。

    　　那位手持双枪，擅长近战的雪人蛊仙，在信中告知方源：泪冰对于雪人一族的意义，绝非单纯的蛊材那么简单，而是表达爱意的定情信物。

    　　“哼。”方源冷笑一声，随手将这只信道凡蛊捏碎。

    　　洁白的祥云载着他一路飞驰。风吹得他一头长发飘'
