- chapter: 121
  title: 第一百二十一节：修罗欧阳两败伤
  content: '第一百二十一节：修罗欧阳两败伤

    　　边丝轩走到阵前，并不多话，和欧阳碧桑迅速交手。

    　　两人交手的情形，吸引了无数人的密切关注。

    　　若论声名，影剑客将欧阳碧桑能甩出几条街去。但论修为实力，欧阳碧桑是四转巅峰，可越一大阶斩杀五转强者。而影剑客则还只是四转高阶罢了。

    　　影剑客身上的蛊虫，搭配得很好，并不存在短板，同时又在移动方面，有所侧重。

    　　只见她身化黑影，绕着欧阳碧桑不断游走，时而催动多重剑'
