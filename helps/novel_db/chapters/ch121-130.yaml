- chapter: 121
  title: 第一百二十一节：一飞冲天
  content: '第一百二十一节：一飞冲天

    　　眼看着方源就要被追到，商心慈整个心都揪起来。

    　　方源伤势沉重，被巨开碑三龙象力击中，就是死亡！现在是巨开碑强势，方源若被近身，必定凶多吉少。

    　　但偏偏，方源移动速度，不如巨开碑。除非他有强力的远程攻击手段，牵制住巨开碑。

    　　“方正，你败了。”巨开碑跨步而来，他知道方源手中有一只血月蛊。但这种弱小的远程攻击，怎么能挡他前行？

    　　寻常的远程攻击，根本不能阻挡他。纵'
