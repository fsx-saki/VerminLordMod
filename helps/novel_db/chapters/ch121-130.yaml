- chapter: 121
  title: 第一百二十一节：炼制梦道凡蛊
  content: '第一百二十一节：炼制梦道凡蛊

    　　细雨飘扬，青茅山在雨中更显得苍翠葱茏。

    　　方源静坐在屋中，面对着弟弟方正。

    　　“哥哥，你为何还执迷不悟呢？舅舅舅母这些年来，含辛茹苦地养育我们，你却将他们告到族中长老会中去，这简直是忘恩负义啊！”方正昂首挺胸，站在方源的面前，义正言辞地斥责着。

    　　方源面色平静，目光如冰，环视左右，心道：“这处梦境却也逼真。”

    　　随后，他又视察自身，只见三转空窍中，藏着酒虫'
