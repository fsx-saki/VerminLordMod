- chapter: 129
  title: 第一百二十九节：锯齿金蜈
  content: '第一百二十九节：锯齿金蜈

    　　方源一觉醒来，已经是第二天的中午。

    　　头已经不疼了，剧痛已经消失。

    　　他下意识地摸了摸自己的耳朵，触感和先前别无二致。仿佛昨夜的割耳的事情根本就没有发生的一样。

    　　他从床上爬起身来，首先是寻了镜子，照了一下。

    　　镜子中，显露出一个少年的面目，并不英俊，但是一双漆黑深幽的眸子，却让他脱于凡俗，泄露出一丝不同寻常的冷酷魅力。

    　　少年的双耳一般大小，别无二致。'
