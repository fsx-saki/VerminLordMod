  events:
  - 意味着方源极有可能拥有着雄厚的食道造诣。
  - 木盒，体格小巧，宛若成年食指大小和长宽。
  - 吃香仙蛊形如木盒，体格小巧，宛若成年食指大小和长宽。它的作用很是鸡肋，只是帮助蛊仙吃取香气，填饱肚皮。
  - 而方源的运道仙蛊，则有狗屎运、气运、察运、连运、时运，清一色的六转。
  - 方源在食道方面只有一只仙蛊，名为小吃。
  - 令蛊仙重生（六转只能重生六转蛊仙）。
  - 六转的春秋蝉只能令六转蛊仙重生，方源如今修为高达七转，必须要有七转的春秋蝉。
  - 不管是胆识蛊还是落魄风等等，在本质上都是给方源的魂魄增添魂道道痕。
- chapter: 127
  title: 第一百二十七节：所谓的道德和感情
  content: '第一百二十七节：所谓的道德和感情

    　　一直到傍晚时分，斗蛊大会这才将将结束。

    　　会盟坡上，蛊师们的三大家族阵营，已经再不像之前那般泾渭分明。蛊师们布满了整个山坡，只是隐隐残留着三个较为密集的人群。

    　　斗蛊切磋，是一种发泄，亦是一种妥协。

    　　在这个以力量为第一价值观的世界里，有了力量就能得到尊重，才有合作的基础。

    　　自从熊力挑战过方源之后，就再也没有蛊师来找他。

    　　方源只是个新人，还没有和'
