  title: 第一百二十六节：梦道先驱
  content: '第一百二十六节：梦道先驱

    　　西漠。

    　　“噗——！”蛊仙唐妙陡然娇躯一震，睁开双眼，吐出一口逆血。

    　　“又失败了。”唐妙脸色惨白如纸，比起身上的伤势，她更对此次探索梦境的失败结果而绝望。

    　　唐妙魂魄重创，此时头昏眼花，身躯沉重，心中哀伤：“哥哥，小妹无能，救不出你！甚至此次探索梦境，都没有找不到你。”

    　　她缓缓闭上双眼，凄苦的泪水滑落脸颊，形成两道泪痕。

    　　片刻后，闻讯而急忙赶来的唐家蛊'
