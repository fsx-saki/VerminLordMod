  title: 第一百二十三节：真武秘辛等支援
  content: '第一百二十三节：真武秘辛等支援

    　　销魂福地。

    　　浓郁的阴云永久笼罩在这里，地面上生长着女体树。

    　　这些树，长相奇特，树干委婉，树枝纠缠，宛若女子赤身，做着各种妖娆的姿势。

    　　女体树连绵一片，形成森林。

    　　在森林的最深处，矗立着一株最大的女体树，高达百丈，树根扎根土壤，覆盖方圆万里。

    　　这株女体树王，却不妖媚，反而散发出丝丝圣洁之气。

    　　树王主干笔挺，带着昂扬奋发之意。两根巨大的树枝组'
