  title: 第一百二十三节：竞争压力
  content: '第一百二十三节：竞争压力

    　　商睚眦继续道：“我是输了，但是我还没有彻底失败。父亲将我流放到捕奴大队里去，三年！三年之后，我还会回来的。不过在此之前，我有一些东西要送给你。”

    　　说着，商睚眦递给商一帆几份文书。

    　　商一帆接过手，扫视一眼。文书上记载着商睚眦的秘密资产，布置的暗线棋子，还有一些得力的亲信人手。

    　　“睚眦哥哥，你这是……”商一帆做出惊讶的表情。

    　　“一帆老弟，你是所有兄弟姐妹当'
