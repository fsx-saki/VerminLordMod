  - 由砚石老人创制，为十一绝体试验品，有巨大弊端。
  - 纯梦求真体乃是由砚石老人所创，身负梦道道痕，砚石老人想要创造出十一绝体。
  - 纯梦求真体有一个巨大的弊端，就是有时限。时限一到，就会自爆成梦境。
  - 逆流河堪称九转仙蛊一级，乃是《人祖传》中记载的天地秘境。
- chapter: 122
  title: 第一百二十二节：人生几多风雪
  content: '第一百二十二节：人生几多风雪

    　　嗤嗤嗤！

    　　接连三片脸盆大小的月刃，在空中划出幽蓝的光线。

    　　嚓嚓嚓。

    　　顷刻之间，就有十六七只玉眼石猴当场死亡。

    　　追击方源的石猴群，顿时就少了一小半。

    　　方源站在原地，并没有后退，而是再次举起右掌，劈空三次。

    　　又是三道月刃，直直地撞入石猴群中，所到之处石猴翻倒一片。

    　　石猴的尸体摔在地上，摔成一块块的碎石。眼球所化的玉珠，也滚跳在赤红色的地上。'
