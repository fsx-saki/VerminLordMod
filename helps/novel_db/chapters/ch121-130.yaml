  title: 第一百三十节：还是族人可靠
  content: '第一百三十节：还是族人可靠

    　　天空上乌云密布，阴影笼罩住整个青茅山，一副风雨欲来的架势。

    　　在一处偏远的山坡之上，十几只健壮的电狼，咧着嘴，发出一声声的低吼，包围着方源。

    　　这些狼，都四肢健全，再不是先前的残狼。

    　　若换做其他的二转蛊师，独自一人到陷入如此包围当中，必是绝望。但是此刻，情形却是恰恰相反。

    　　方源立在原地，淡定从容。而包围他的这些电狼，在神色中，却隐隐有一种紧张、忌惮。'
