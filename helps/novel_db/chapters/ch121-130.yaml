- chapter: 126
  title: 第一百二十六节：王小二失忆
  content: '第一百二十六节：王小二失忆

    　　悲风山脉。

    　　一个平平无奇的小山洞中，中洲四大淫贼选择在这里暂做休整。

    　　东淫陈淫道，西贱郁八光，南骚施暴，北荡樊春耀俱都是四转修为，在中洲的蛊师界也算是恶名昭著得很，坏了不知多少良家女子的贞操和性命。

    　　但此刻，这四个大男人却围成一圈，盯着一个躺着的昏迷的少年进行研究。

    　　“他怎么还没有醒啊？”

    　　“这些天来，他一直在沉睡，从未吃喝，却仍旧生机勃勃。”'
