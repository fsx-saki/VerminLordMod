  title: 第一百二十二节：一心求胜顾狼王
  content: '第一百二十二节：一心求胜顾狼王

    　　王帐内，氛围压抑得很，包括黑楼兰在内，几乎人人带伤。

    　　平日里傲然风光的蛊道强者们，此刻却显得狼狈不堪。

    　　“刘家攻势实在太猛，刘文武、罗伯军、聂亚卿皆是五转强者，墨狮狂、欧阳碧桑都是四转巅峰，媲美五转战力，还有裴燕飞、常飚等等猛将……这样的阵容，纵观前十届王庭之争，都较为罕见啊。”狈君子孙湿寒叹息道。

