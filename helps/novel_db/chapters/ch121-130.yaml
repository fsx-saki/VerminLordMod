  title: 第一百二十三节：一朝炼蛊风云动
  content: '第一百二十三节：一朝炼蛊风云动

    　　雪静静地落着。

    　　无风。

    　　雪峰连绵，一片静谧。

    　　一对夫妇相互偎依着，打开窗，看着雪景，均都沉默不语。

    　　空气中，酝酿着温馨氛围。

    　　妻子容颜端丽，发间已见白霜，她偎依着丈夫的臂膀，怀念地道：“好久了，没有和这般你如此静静地看着雪景……”

    　　他的丈夫已经显出老态，不过精神矍铄，他伸出枯手，安慰地拍拍老妻的手背，缓缓开口道：“我愿一直陪着你，看着雪花'
