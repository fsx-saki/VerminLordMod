  title: 第一百二十七节：九眼酒虫
  content: '第一百二十七节：九眼酒虫

    　　时间一天天的流逝，围绕着三王传承，三叉山一代风起云涌，动荡不定。

    　　许许多多的魔道枭雄，正道人物，三教九流，都汹涌而去。

    　　起初，是商家掌控局面，不断增兵，霸占了传承入口，展现出了对传承的势在必得之心。

    　　然后是武家出动，打破商家封锁。

    　　再之后，消息传出。三王传承之地就是当年六转蛊仙的福地，世人大哗，无数人朝着三叉山蜂拥而去。其他几个超一流家族，也都被惊动，'
