  content: '第一百二十六节：仙之福地

    　　“短短十天，平均每天赚两万。十天下来，我们手中的十万元石，已经翻了三倍，足足有三十万！”望着手中的账簿，商心慈又惊又喜。

    　　竞争少主之位，这才十天，商心慈手中十万的本金，就翻了三番，一下子就领袖群伦了。

    　　三十万，还只是竞争少主这块的本金。方源、白凝冰也投了许多钱下去，如今都赚得瓢盆满钵。方源手中一个元老蛊已经不够用，又添了两个新的。资产已经上涨到两百四十多万。'
