- chapter: 856
  title: 第八百六十二节：李小白要上位
  content: '第八百六十二节：李小白要上位

    　　方源端详着手中的变异仙蛊。

    　　这只仙蛊形象奇特，有天牛样的身躯，蜘蛛样的八爪，头部翘起独角仙似的角，背部是蝉翼，身前还有两只螳螂的刀臂。尾部发光，好像萤火虫，但发的是彩光。

    　　变异仙蛊乃是千变老祖之物，但这难不倒方源。

    　　方源脱离战场不久后，就在半路上将这只八转仙蛊炼化。

    　　不提那边千变老祖感应到，再次恨死了方源，方源尝试几次催动，大体上摸清楚了变异仙蛊的'
