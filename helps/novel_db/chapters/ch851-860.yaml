- chapter: 854
  title: 第八百六十节：不顾大局
  content: '第八百六十节：不顾大局

    　　惊变陡然发生，几乎令所有人猝不及防。

    　　夜煞女竟变成千变老祖，一出手石破天惊，当场斩杀了天庭八转蛊仙卫风！

    　　随后，这位千变老祖又左手一挥，打开仙窍门户，将阵内昏死过去的众女仙，尽皆收入窍中。

    　　他右手还抓着卫风的脑袋，此刻猛地用力，噗的一声，就将卫风的脑袋捏爆！

    　　顿时，红的白的飞溅，像是西瓜被捏碎了般。

    　　“这就是你们所有人的下场。”千变老祖咬牙切齿，神情'
