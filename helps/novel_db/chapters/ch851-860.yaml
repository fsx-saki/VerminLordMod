- chapter: 858
  title: 第八百六十四节：局势
  content: '第八百六十四节：局势

    　　东海。

    　　龙宫。

    　　方源分身吴帅盘坐在龙椅上，操纵着眼前的军团蚁。

    　　经过这段时间，军团蚁已经发展出了一定的规模。

    　　此刻，密密麻麻的军团蚁足有近亿只，宛若暗金色的河流，在半空中盘旋飞绕。

    　　吴帅取出一份八转仙材。

    　　乃是一把鸟的羽毛，这羽毛宛若石质，一丝丝的毛栩栩如生，笼罩着一层灰白的淡淡光晕。

    　　仔细闻一闻，能闻到一些尸臭气息。

    　　这是太古荒兽尸皇鸟的'
