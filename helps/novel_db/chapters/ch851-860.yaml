- chapter: 860
  title: 第八百六十六节：开端布阵
  content: '第八百六十六节：开端布阵

    　　东海。

    　　颠簸海域之东，烧烤群岛之西的地方，有一片奇特浩大的海域——气海！

    　　气海中没有点滴海水，而是无数的气流交织纠缠，形成亿万的气流漩涡。

    　　在远古时代，气海在全天下蛊仙的心中，占据着无上的崇高地位。

    　　那个时候，气道昌盛至极，乃是蛊修的主流，其余皆是偏门。

    　　万般皆下品，惟有气道高。

    　　气海的规模更是浩瀚，内有乾坤，无数气流穿梭其中，生灭不断。那个时'
