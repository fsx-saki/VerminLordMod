  title: 第八百五十七节：战千变
  content: '第八百五十七节：战千变

    　　西漠。

    　　方源并未掩藏踪迹，背负双手，傲立于万年斗飞车之上。

    　　万年斗飞车宛若一柄锐利银剑，刺破长空，兵峰直指高空中的一朵淡黄云团。

    　　“方源，你居然还敢回来！”淡黄云团中顿时响起一声娇斥，显露出声音主人的愤怒和仇恨。

    　　表面上平淡无奇的淡黄云团，实质上是一座仙道大阵。

    　　大阵中包裹着一层梦境，梦境中困着仙蛊变异，还有一位蛊仙红云舞娘。

    　　主持大阵的则是青岚'
