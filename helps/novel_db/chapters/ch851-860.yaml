- chapter: 853
  title: 第八百五十九节：天翻地覆
  content: '第八百五十九节：天翻地覆

    　　万年斗飞车宛若冲云箭，一飞冲天。

    　　似乎方源就要真的突出重围，就在这时，万紫红嘻嘻一笑，娇媚地道：“方源小贼，你走不了啦。”

    　　下一刻，方源头顶的天空陡然变作苍茫大地，万年斗飞车原本冲霄而起，结果一瞬间，变得直冲地面而去。

    　　方源连忙止住万年斗飞车。

    　　万年斗飞车速度惊人，但船底的光阴长河虚影却是起到了巧妙的阻碍作用。

    　　在撞到地面之前，方源成功停下了仙蛊屋'
