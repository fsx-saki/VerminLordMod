- chapter: 852
  title: 第八百五十八节：天庭埋伏
  content: '第八百五十八节：天庭埋伏

    　　千变老祖气愤不已，恼恨方源不知大局。

    　　方源心知肚明，放声大笑：“天庭若来，我便斩杀他们。来一个，斩一个，来两个，杀一双！”

    　　千变老祖听得瞠目，不禁暗想：“这方源究竟连胜几场，成了骄兵狂妄了，还是真有底牌，所以如此自信？”

    　　原来，当初千变老祖渡万劫，险死还生，暗中休养。恰逢翠波仙子被方源干掉，千变老祖察觉此变，却伤重在身，只得派遣红云舞娘前往查探。又担心自己'
