- chapter: 855
  title: 第八百六十一节：西漠大局
  content: '第八百六十一节：西漠大局

    　　方源暗中传音：“千变老祖，你不要追我了。我能破解出一道出路，这样，我带你走，你将变异仙蛊当做报酬给我。如何？”

    　　千变老祖冷笑，回道：“哼，痴心妄想！你开辟出道路，归还仙蛊，我兄弟二人就饶你一命。”

    　　他恼怒之后，也想到了方源夺蛊的举动，说明他有恃无恐。之前的狂怒是真，之后的狂怒却是演技居多。

    　　万里变通大阵被破，千变老祖想要脱离这里，借助方源之力是最好的选择。'
