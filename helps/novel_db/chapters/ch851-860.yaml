- chapter: 857
  title: 第八百六十三节：救世主小渡
  content: '第八百六十三节：救世主小渡

    　　兽灾洞天，圣鹰城。

    　　论规模，圣鹰城远比山崖城要大得多。山崖城只是分城，而圣鹰城却是主城之一。

    　　上一世，方源强攻兽灾洞天的时候，化身牛魔，首先降临的就是此城。

    　　这一世到了现在，圣鹰城的境况也非常糟糕。

    　　整个城池几乎成了泽国，一只只的黄泥鳄鱼，在沼泽中潜伏穿梭，不断猎杀城中的子民。

    　　镇守这里的巨鹰勇士实力颇强，但此刻却是身受重伤。

    　　击伤他的乃是一'
