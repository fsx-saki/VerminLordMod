- chapter: 859
  title: 第八百六十五节：天庭议事
  content: '第八百六十五节：天庭议事

    　　天庭。

    　　银白苍穹，仙殿林立。

    　　议事大厅中，十多位蛊仙已经济济一堂。

    　　最高层坐着龙公，其次是紫薇仙子、秦鼎菱。之后，白沧水、从严、车尾、袁琼都、周雄信等人亲自到场。

    　　除此之外，便是顾六如、万紫红、凤仙太子、星野望、君神光等人的意志。这些人因为任务在身，不能亲自来参与此次天庭的议事。

    　　每隔一段时间，天庭诸多成员之间，都会举办一场议事，相互讨论，各抒己见'
