- chapter: 204
  title: 第二百零四节：白兔投怀（下）
  content: '第二百零四节：白兔投怀（下）

    　　武辽并不理睬武安，他直接对着大殿的门深深一礼，高声嚷道：“武安此人居心叵测，武辽求见大人，举报此人！”

    　　武安的心，立即提到了嗓子眼。

    　　他害怕，他恐惧。

    　　他生怕眼前的这道殿门在下一刻，轰然打开，然后白兔姑娘被赶出来，双眼垂泪的样子。

    　　那他武安就完了。

    　　但是没有。

    　　殿门静悄悄的闭合着，似乎方源没有听到一般。

    　　但这怎么可能？

    　　这里不是普通'
