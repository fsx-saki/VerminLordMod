  title: 第二百零五节：胜负关键
  content: '第二百零五节：胜负关键

    　　蛊师升仙，空窍便晋升成仙窍。

    　　仙窍比之空窍，是质的升华，等若开辟一个全新的小天地。

    　　六转、七转蛊仙的仙窍，常被人谓之“福地”。八转、九转蛊仙的仙窍，则被称之为“洞天”。

    　　蛊仙死后，若留下执念，执念便结合仙窍中的天地之力，形成地灵。

    　　每一个仙窍都是独一无二的，本就是蛊仙身体的一部分。从某种意义上来讲，蛊仙尽管陨落，但留下的地灵、仙窍，亦是他（她）生命的另类'
