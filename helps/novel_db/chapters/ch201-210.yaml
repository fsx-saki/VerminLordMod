- chapter: 203
  title: 第二百零三节：白兔投怀（上）
  content: '第二百零三节：白兔投怀（上）

    　　“奴婢拜见武遗海大人。”女蛊仙盈盈拜倒在方源的脚下。

    　　她身穿一身白色绒毛的兽衣，只围着胸脯和臀胯，露出大面积的雪白肌肤。她双耳如兔，眼瞳如红宝石，琼鼻小巧，容颜精致可爱。单论美貌，只比商心慈、凤金煌稍逊一筹。

    　　此刻，这位女仙跪倒在地上，额头碰触地板，庞大的胸脯也受到了地板的挤压，发生剧烈的形变。而她的臀，高高翘起，引人入胜。

    　　她不是别人，正是白兔姑娘。'
