- chapter: 203
  title: 第二百零三节：三只仙蛊，皆有大用
  content: '第二百零三节：三只仙蛊，皆有大用

    　　整个星象福地形如巨碗，最中央的位置也是地势最低的位置。

    　　在这里，是一片广阔似海的湖泊，命名为碎星湖。而万象星君平时修行之地，也设置在碎星湖底。

    　　深入湖底，方源便发现一座水晶宫殿。规模不大，只有一座主殿，两座副殿。

    　　万象星君的仙蛊，就保留在主殿当中。

    　　方源在星象地灵的带领下，顺利地进入主殿。

    　　一进主殿，他便看到一只飞舞的仙蛊。

    　　这只仙蛊类'
