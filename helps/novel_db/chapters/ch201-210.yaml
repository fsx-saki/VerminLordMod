- chapter: 202
  title: 第二百零二节：伏击巨阳意志
  content: '第二百零二节：伏击巨阳意志

    　　一道炽热如阳的意志，通过琉璃楼主令，向着方源脑海暴袭而去。

    　　意志宛若黄金洪流，横冲直撞，竟然直接闯入方源的脑海！

    　　意志乃是由特定的大量念头组成的，若任由巨阳意志冲刷脑海，极可能令方源失忆痴呆。

    　　“糟糕！快丢掉那块该死的令牌！！”脑海中，墨瑶意志显现出身形来，尖叫出声。

    　　她是蛊仙意志，临死前高达七转，意志底蕴比方源更加深厚。

    　　她和方源一荣俱荣一损俱'
