- chapter: 201
  title: 第二百零一节：苏醒
  content: '第二百零一节：苏醒

    　　天地晦暗，大风呼啸。

    　　一股无形的天地伟力，托着太白云生悠悠飞升而上。

    　　他狂笑着，白须在风中狂舞。毫无平日温和仁慈之色，脸上尽是疯狂和扭曲。

    　　圣宫上下一片惊惶，蛊师们抱头鼠窜，汇集成数股巨大的人流，纷纷向外逃命。

    　　足足逃去万里之遥，人们这才惴惴不安地停住脚步。

    　　蛊师强者们占据山头，或者直接悬浮于空，动用侦察蛊虫，神情各异地注视着圣宫上空的情景。

    　　其余蛊'
