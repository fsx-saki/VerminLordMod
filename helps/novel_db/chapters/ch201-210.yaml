- chapter: 202
  title: 第二百零二节：再度决战
  content: '第二百零二节：再度决战

    　　仇九骇然不已，连忙屏气凝神，竭力鼓动魂魄，屏气凝神冥思，撑住这团黄色光影。

    　　这团黄色光影，由方源的魂力支撑。但他年纪轻轻，魂魄底蕴远不如仇九这位百年老怪。要奴隶仇九，并非是一件容易的事情。

    　　但方源岂会没料到这点，他自有方法。

    　　啪啪啪，砰砰砰。

    　　“停手，你居然敢打我！”

    　　“你再踹我脸，我跟你急啊……”

    　　“妈的，你还踹，我跟你拼了！！”

    　　“别打了'
