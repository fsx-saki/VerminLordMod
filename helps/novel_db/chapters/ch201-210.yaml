- chapter: 201
  title: 第二百零一节：当代仙子赵怜云？
  content: '第二百零一节：当代仙子赵怜云？

    　　九转的爱情蛊。

    　　赵怜云并不认识这只蛊虫，但这并不妨碍她认出眼前蛊虫的不凡。

    　　因为在她的视野中，这种蛊虫仿佛成了天地、宇宙的中心，它浑身上下散发出漫天的霞光，整个蛊虫仿佛世间最绚烂的火焰燃烧。一切的事实，世间的万物都要为其倾倒，都要围绕着它而运转。

    　　“这是……奇迹吗？”赵怜云泪流满面，脑海中浮现出最后一个念头。

    　　随后，她就瘫倒下去，当场昏迷过去。'
