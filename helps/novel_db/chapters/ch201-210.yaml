- chapter: 205
  title: 第二百零五节：再炼仙蛊！
  content: '第二百零五节：再炼仙蛊！

    　　铁若男跨前一步，目光如刀：“方源，你是个聪明人，你也相当清楚自己的处境！”

    　　“我当然清楚我自己的处境。”方源一脸平静，“而且我更清楚你们的处境。”

    　　他的嘴角泛起一丝冰冷的笑意：“仙蛊的确没有大功告成，但也因此我保留下了大批的仙元。足够我绞杀了你们！”

    　　但这时霸龟显现出来，泪流满面，声音哽咽：“没有用的，没有用的。杀了他们，仙元必然损耗过多，再不能支持接下来'
