- chapter: 202
  title: 第二百零二节：正大光明进蛊阵
  content: '第二百零二节：正大光明进蛊阵

    　　南疆。

    　　义天山大战遗址。

    　　“武遗海大人，这边请。”武安躬身弯腰，在前头领路。

    　　方源点点头，在他的面前，超级蛊阵缓缓打开了一个入口。

    　　“请，大人您先请。”武安侧身让开道路，满脸堆笑，十分热情。

    　　武遗海的身份，如今整个南疆的蛊仙界，差不多都知道了。

    　　方源空降过来，立即成为超级梦境这里的武家主导者。只有六转修为的武安对眼前的顶头上司，自然是十分巴'
