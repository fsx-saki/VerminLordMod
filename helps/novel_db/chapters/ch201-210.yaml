  content: '第二百零八节：爱情蛊（上）

    　　迷迷糊糊中，赵怜云被带到一个不大的密室当中。

    　　“这是哪里？”她张开双眼，四处张望。

    　　这间密室非常安静，有一种深入骨髓的静谧，似乎深深地浸入这间密室的每一个砖块，每一个寸墙壁之中。

    　　密室并不光明，一种晦暗的，宛若烛火的光线，如丝如绸，萦绕在其中，勉强让赵怜云看见。

    　　“来这里。”从这光线中，传出一个年迈苍老的声音。

    　　赵怜云依言，走向声音传来之处。'
