- chapter: 203
  title: 第二百零三节：巨阳反击
  content: '第二百零三节：巨阳反击

    　　真阳楼中。

    　　地灵奋起全力，向封印自己的力量，发起了冲击。

    　　嘣嘣嘣！

    　　连续三声轻微爆响，锁在它身上的黑链，直接断去三根。

    　　它身上的青泥，也已经彻底从它的脖颈褪下，甚至两翼上端都无青泥，显露出鲜活璀璨的毛羽。

    　　“小麻雀，你胆敢如此！”巨阳意志勃然大怒。

    　　“巨阳，你死了就死了，居然还囚禁我十余万年。今日我一定要冲破你这个破笼子！”霜玉孔雀发出刺耳的尖啸'
