  - '第二百零二节：人蛊为一

    　　早在方源进入疯魔窟之前，天地秘境人海就已经彻底完善。

    　　为了打造出完整的人海，方源下令屠戮了无数人族，杀孽滔天，双手沾满了血腥，但也得'
  - '，一股淡淡的喜悦之情浮现心头。

    　　所谓人海重生之法，本质上是利用蛊修手段，炼出人身、人魂。这的确是人道手段，但同时也是以蛊炼人！

    　　方源在人体炼蛊这一块，比较欠缺。之前他研究倪家上下，察觉到人体炼蛊之法和'
  - '是不买？”

    　　“何等价钱？”

    　　白凝冰报了价后，那股神念直接道：“买了，这些我都收下了。仙友需要仙元石，还是其他仙材？”

    　　白凝冰报出自己所需的冰雪道仙材。

    　　那股神念笑道：“这些我都有，仙友稍待'
  - '是师法自然，为方源解惑的好机会！

    　　其次，这些蛊仙重修，每一次渡劫，方源都可以帮助他们，从中获取到天道道痕。

    　　最后，说不定这些蛊仙重修后，还能推陈出新，改良杀招什么的。在重修的过程中，他们会更加依赖方源'
  - '种种仙蛊深植在倪家后裔体内。

    　　而与之相反，至尊仙胎、人海重生、生命蓝海等则以蛊炼人。

    　　“炼道无上大宗师的境界版图，恐怕就是这四块了。眼下，人蛊炼法我已经洞悉，只差最后一块‘以蛊炼天地’！而这一块，借助参'
  - '终，量变引发质变，方源意外也不意外地在人海上成功突破。

    　　炼道自古以来，有两大流派。

    　　第一个是毛民的自然炼蛊流派，以自然、道痕炼蛊。

    　　与之相反，无极魔尊以蛊虫炼制天地自然。

    　　第二个是人族的隔'
  - '，以自然、道痕炼蛊。

    　　与之相反，无极魔尊以蛊虫炼制天地自然。

    　　第二个是人族的隔绝流。倪家蛊仙炼道准无上的倪仁，以人炼蛊，将种种仙蛊深植在倪家后裔体内。

    　　而与之相反，至尊仙胎、人海重生、生命蓝海等则以'
  - '切合某个魂魄的至尊仙体肉身。

    　　方源在用人海复活蛊仙，既是凝造人身又凝聚人魂。

    　　再想想太古传奇荒兽青仇，它原本只是一记杀招而已，而后转变成了生命。

    　　推而广之，任何生灵都可以用蛊修之法打造出来！'
