- chapter: 204
  title: 第二百零四节：白凝冰，你演够了吗？
  content: '第二百零四节：白凝冰，你演够了吗？

    　　“杀啊……”

    　　“冲过去！”

    　　“干死这些死狗！！”

    　　喊杀声、呐喊声、惨嚎声、咒骂声、犬吠声连成一片，喧嚣震天荡地。

    　　总攻发起不到一盏茶的功夫，山丘上已经血流成河，横尸遍野。

    　　“仇九先生，我们慢了，这样子冲锋，猴年马月才能进入青铜大殿！”魔无天催促道。

    　　仇九呵呵一笑：“狗群庞大，岂是那么好冲的？我们慢点走也好，让正道冲得深入一些，承担大部'
