- chapter: 202
  title: 第二百零二节：地灵认主，第二片福地
  content: '第二百零二节：地灵认主，第二片福地

    　　得到断臂之后，方源小心翼翼地收入仙窍。

    　　随后，他细心打扫，尽量扫除自己留下的痕迹。

    　　回到狐仙福地，他也没有休息，马不停蹄地开始施为，前后耗费了四天三夜的时间，才将这断臂炼化，最终转变成宋紫星的首级。

    　　然后他利用定仙游仙蛊，去往地渊。

    　　“星象地灵，我带来了宋紫星的头颅！”在幽暗的地下世界，他高喊道。

    　　眼前先是出现了一点星光，旋即星光大盛，宛'
