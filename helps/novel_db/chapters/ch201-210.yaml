    　　他感觉有些不可思议。

    　　武家的人，向来都是行事霸道，隔三差五，就要找找茬什么的。

    　　武遗海作为武庸的同母异父的弟弟，在当今武家的地位，可谓相当的高。居然闷声不吭的选择了潜修，平日里和其他蛊仙来往很少。

    　　巴德缓缓地摇摇头。'
