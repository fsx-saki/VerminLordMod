- chapter: 203
  title: 第二百零三节：一切皆在我掌控之中
  content: '第二百零三节：一切皆在我掌控之中

    　　太光蛊！

    　　天意蛊！

    　　空拳蛊！

    　　杀招——太古光拳！！

    　　萧芒站在三叉山峰巅，悍然催动杀招，整片天空为之一暗。

    　　一个光芒组成的拳头，大如山峰，从天而降，将福地膜胎洞穿。

    　　刹那间，整个福地动荡摇晃，一道巨大的漏洞形成，沟通内外，令蛊师进出畅通无阻！

    　　“冲吧，福地中的一切都是我们的！”

    　　“快去抢，再不抢就来不及了。”

    　　“可惜大头和精华'
