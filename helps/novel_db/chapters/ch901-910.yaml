- chapter: 905
  title: 第九百一十一节：北原反击
  content: '第九百一十一节：北原反击

    　　“快阻止他！”房睇长呐喊。

    　　西漠一方的仙蛊屋拼尽全力向赵山河、玉珠子二人冲杀过去。

    　　但在他们的身前，早有天庭蛊仙严防死守。

    　　吼！

    　　张飞熊化身巨人，奋不顾身地挡下一座仙蛊屋。

    　　啪啪啪！

    　　又有肉鞭仙变化太古走肉树，疯狂挥舞枝条，抽打得仙蛊屋团团乱转。

    　　轰轰轰……

    　　种种仙道杀招爆发，仿佛是大片的烟火暴射，绚烂无比，威力绝伦。

    　　这些都是天庭'
