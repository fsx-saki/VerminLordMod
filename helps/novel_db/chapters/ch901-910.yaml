- chapter: 906
  title: 第九百一十二节：请方源援手
  content: '第九百一十二节：请方源援手

    　　“怎么回事？”

    　　“这些都是历史上，北原著名的强者，居然被召唤过来了！”

    　　天庭蛊仙尽皆惊诧。

    　　龙公沉声道：“诸位注意，这是红莲魔尊的宙道杀招前有古人。可以从光阴长河的上段，召唤出与自身紧密相关的蛊仙来到现在，为自己作战！”

    　　“这就有意思了。”肉鞭仙舔了舔嘴唇，战意狂涌，哇哇直叫，冲了上去。

    　　“让我来。”张飞熊化身巨人，和肉鞭仙一左一右，撞向劫运坛。'
