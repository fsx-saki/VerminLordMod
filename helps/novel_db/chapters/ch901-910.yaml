- chapter: 908
  title: 第九百一十四节：孽龙脱困
  content: '第九百一十四节：孽龙脱困

    　　“世间居然有这等奇阵，能直接克制九九连环不绝阵！”

    　　“想不到竟是我南疆蛊仙陶铸所创……”

    　　“看来我们大大低估了此人呐。”

    　　“方源居然掌握了这等手段，究竟是什么时候的事情？”

    　　南疆蛊仙们迅速交流着，惊叹连连。

    　　方源勒索敲诈过他们，现在却又是方源出手，支援他们，这使得南疆蛊仙心情都颇为复杂。

