- chapter: 904
  title: 第九百一十节：天庭主动
  content: '第九百一十节：天庭主动

    　　啪啪啪！

    　　高耸如塔楼般的太古走肉树，总是冲锋在最前方。万千的章鱼巨怪般的触手枝条，挥舞出凌厉的风啸之音，抡得虎虎生威，西漠蛊仙的仙蛊屋竟都节节败退。

    　　肉鞭仙竟以一己之力，力抗仙蛊屋，不愧是有资格沉眠在天庭仙墓中的八转强者，着实了得！

    　　当然，这也是变化道流派的优势所在。

    　　“让我们来！”关键时刻，董家蛊仙挺身而出。

    　　和上一世相同，这一次董家出动的仍旧是七'
