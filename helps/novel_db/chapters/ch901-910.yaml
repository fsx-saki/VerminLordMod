  - '漠蛊仙兵锋直指帝君城，来势汹汹。但经过我们连番打击，锐气已失。帝君城本身已有重兵把守，更有尊者遗留的人道手段守护。即便遭受摧毁，精英丧失殆尽，也不要紧。过个百十年，就有更多的人杰涌现。”

    　　“最后是藏龙窟。'
  - '他的身躯正在一分分缓缓涨大，面容如铁，身躯雄健，浑身上下的紫金龙鳞防御力极其惊人。

    　　一记记变化道杀招，在他手中随心所欲地施展出来。招招霸道猛烈，将劫运坛牢牢挡住。

    　　不管是劫运坛，还是天庭蛊仙的'
  - '长生天摧毁，那么一切的希望都没有了。”

    　　“其次是毛脚山。如果不败福地被摧毁，我们没有提炼出足够的成功道痕，对我们修复宿命有巨大的影响。但这一点，并不是不可舍弃的。就算不败福地被毁，我们没有成功道痕，宿命蛊'
