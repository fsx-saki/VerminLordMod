- chapter: 907
  title: 第九百一十三节：方源出手
  content: '第九百一十三节：方源出手

    　　巨阳仙尊曾经明确地告诉冰塞川：如果进攻天庭的计划失败了，长生天没有任何希望抢夺得到宿命蛊，那就请关键人物进行支援。

    　　“那么关键人物是谁？”当场，冰塞川就问了这个问题。

    　　巨阳仙尊便回答他：“谁捣毁了八十八角真阳楼，谁就是关键人物。到时候，你一定会清楚的。”

    　　长生天本来的计划是炼制命运蛊，这就需要抢夺宿命蛊。

    　　但和上一世不同，这一世的冰塞川遭遇到了严重挫折'
