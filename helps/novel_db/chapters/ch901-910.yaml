- chapter: 910
  title: 第九百一十六节：沈伤的破解
  content: '第九百一十六节：沈伤的破解

    　　“这里便是中洲帝君城？”叶凡一边跟随着大部队行走在帝君城中，一边回顾四周，细细打量。

    　　他是南疆蛊师，也早已听闻帝君城之名。

    　　这是整个中洲，不，更准确的讲，是整个五域最大的凡人城池。在这里，三转蛊师很是常见，而搁在南疆等地，三转的蛊师通常都是位高权重的家老、族老。

    　　叶凡尚且是第一次来到帝君城。

    　　帝君城果然不愧是帝君城，布局严谨，构架恢弘，没有让叶凡失望'
