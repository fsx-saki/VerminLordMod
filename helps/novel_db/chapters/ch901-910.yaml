  title: 第九百零七节：南联破阵
  content: '第九百零七节：南联破阵

    　　万年斗飞车悬停长空，方源望着眼前的大阵，面露微笑。

    　　他再次亲至义天山，这一次定能将这里的梦境一网打尽。

    　　这个时机真的是恰到好处。

    　　一方面，武庸等人率领南联诸多强者，在中洲动手，南疆陷入有史以来最弱的状态。二来，中洲方面的旷世大战也才刚刚开始，对于方源来讲，这恐怕是最后的一段闲暇功夫了。

    　　“和上一世不同，我这一世屡屡占据先机，击败天庭。我重生的秘密广为人知'
