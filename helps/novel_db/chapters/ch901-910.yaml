- chapter: 903
  title: 第九百零九节：肉鞭仙
  content: '第九百零九节：肉鞭仙

    　　中洲，藏龙窟。

    　　“怎么回事？”东海八位蛊仙迅速发现了苍穹异变。

    　　大白天里，中洲的天空却是星光璀璨，熠熠生辉。

    　　“这恐怕是天庭的手段，就是不知道具体威能是什么。”青岳安皱着眉头道。

    　　“怕什么？兵来将挡水来土掩，依凭我等这番阵容，谁能挡得住？除非是天庭掏出主力来攻。”扬子河哈哈大笑。

    　　“说的是。”青岳安眉头稍稍舒展了一些。

