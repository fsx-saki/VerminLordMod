- chapter: 909
  title: 第九百一十五节：七次郎
  content: '第九百一十五节：七次郎

    　　要继续执行之前的计划，东海诸仙们就得先破解了天庭的手段，否则很是危险。

    　　沈从声仰望白天，暗中想起方源给予他的情报，他开口道：“要破解天庭的手段，也不是没有可能的。天庭在白天中特意布置了大量的星辰，通过这些星辰进行中转，将蛊仙们投放到中洲的任何一处。”

    　　其他蛊仙听闻，纷纷眼前一亮。

    　　“那就破坏掉这些星辰好了。”

    　　“但我们进攻白天，岂不是主动招惹天庭，万一天'
