- chapter: 712
  title: 第七百一十七节：巨阳的伟大
  content: '第七百一十七节：巨阳的伟大

    　　扑通。

    　　一直主持修复工作的袁琼都，双眼一黑，当场栽倒再去。

    　　他本身就有伤势，炼道大阵被破，余波殃及，立即昏死。

    　　没有他出手，虽然成功道痕仍旧在小股小股地输送上来，但是宿命蛊的修复却是立即停滞了。

    　　受到牵连的还有从严。

    　　这位天庭八转蛊仙，原本正和车尾联手，抵抗北原蛊仙牛魔和五行大法师。

    　　牛魔、五行大法师强攻炼道蛊阵，但从严早有准备，将他们对炼道'
