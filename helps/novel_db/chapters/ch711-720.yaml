- chapter: 711
  title: 第七百一十六节：劫运坛反击
  content: '第七百一十六节：劫运坛反击

    　　不败福地战场。

    　　“他们在干什么？”陈衣率先发现方源等人的异动。

    　　凤九歌仍旧脸色苍白，他打量一阵，不禁眉头微蹙：“他们竟是在布阵！”

    　　“阵中阵？”白沧水冷哼一声，“这未免太过小瞧我等了。”

    　　阵中布阵，难度极高。尤其是在敌阵之中布阵，更是难上加难。

    　　和仙蛊屋不同，仙阵一般都对周围的环境有所要求。周围的天然道痕会多仙阵有许多影响。

