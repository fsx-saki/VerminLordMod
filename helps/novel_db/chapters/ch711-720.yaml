- chapter: 715
  title: 第七百二十节：北原上风
  content: '第七百二十节：北原上风

    　　天庭战场。

    　　“杀啊！”

    　　喊杀声震耳欲聋，北原诸仙士气狂飙，攀升至前所未有的巅峰！

    　　这是巨阳仙尊出手，意义非同寻常，他的这些后辈传人无不士气大振，战力暴涨。

    　　“怎么会？”天庭蛊仙惊愕，忽然僵滞在高空，动弹不得。

