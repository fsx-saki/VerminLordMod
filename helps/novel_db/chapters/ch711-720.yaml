- chapter: 716
  title: 第七百二十一节：天庭的底蕴
  content: '第七百二十一节：天庭的底蕴

    　　刘流溜其实早就登场参战，但和他同期的北原强者早已经被击毁，只剩下他一人。

    　　这样的战斗太过惨烈，八转蛊仙的牺牲变得稀疏平常。

    　　刘流溜的手中战果辉煌，交战以来至少有八位天庭成员遭了他的毒手。他早就关注着紫薇仙子，他丰富的战斗经验令他迅速判断出紫薇仙子的重要性！

    　　此刻，他忽然出手偷袭，其实早已经酝酿已久。

    　　刹那间，紫薇仙子汗毛顿竖，致命的危机感觉充盈她的心'
