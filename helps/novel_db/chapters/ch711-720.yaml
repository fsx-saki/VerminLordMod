- chapter: 713
  title: 第七百一十八节：陈衣撤阵
  content: '第七百一十八节：陈衣撤阵

    　　不败福地战场。

    　　九九连环不绝阵。

    　　“对方的这个大阵……”

    　　“我方的蛊仙在受到强烈的反噬伤害！”

    　　“第一阵退下休整，接受治疗，第二阵接替，第三阵准备！”

    　　陈衣、白沧水一边操纵着大阵，一边指挥中洲蛊仙，有条不紊。

    　　“没想到对方竟然会出这样的奇招。”一旁，凤九歌轻轻皱眉，盯着阵中的五界大阵，“这下麻烦了，搞不好九九连环不绝阵会因此……”

