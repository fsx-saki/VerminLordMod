- chapter: 717
  title: 第七百二十二节：元始天庭！
  content: '第七百二十二节：元始天庭！

    　　山洞中的气氛越来越压抑，一位年轻的人族蛊仙勉强笑道：“仙尊大人呐，您现在才不过数百岁而已，还有数千年，甚至上万年的岁月呢。现在考虑这些，是不是太早了点啊？”

    　　元始仙尊的面色顿时肃然，他用平静地目光盯着说话的年轻蛊仙，后者支撑不了几个呼吸，低下头去。

