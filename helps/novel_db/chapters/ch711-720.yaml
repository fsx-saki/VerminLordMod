- chapter: 718
  title: 第七百二十三节：天庭的牺牲
  content: '第七百二十三节：天庭的牺牲

    　　天庭战场。

    　　八转蛊仙间的厮杀，已然惨烈到了极致。

    　　“长生天！你们的表现，实在太令吾等失望！”

    　　“哼，天庭的家伙总是如此大言不惭，做老大做的太久了，看我把你们全部挑翻！”

    　　“你我都是人族，居然内斗到这种程度。北原诸仙，徒具悍勇，却毫无信念。”

    　　“我等的信念你们是不会了解的！”

