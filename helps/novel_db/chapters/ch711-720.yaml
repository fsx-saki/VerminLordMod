- chapter: 719
  title: 第七百二十四节：来因去果
  content: '第七百二十四节：来因去果

    　　“厉煌大人！！！”

    　　“天呐，怎么会？”

    　　“干得好！”

    　　不败福地战场，厉煌的尸体飘落而下，惊呆了无数人。

    　　方源狞笑，一边继续冲向毛脚山，一边冰寒彻骨的声音传遍整个战场：“谁敢阻我，就是这个下场！”

    　　一时间，赫赫魔威，震慑天地，中洲一方士气大减，武庸眼中闪过一丝阴芒，药皇等人皆有惊容。

    　　楚度的神情较为复杂一些。曾经方源六转渡劫的时候，他还在场和方源'
