- chapter: 720
  title: 第七百二十五节：人族战旗！
  content: '第七百二十五节：人族战旗！

    　　方源这一扑，凶狠绝伦，更携带着万一鬼蛟剑，魔威浩荡至极。

    　　陈衣仰望天空，看到如此威势的方源，只觉得天都向他倾轧下来，浑身肌肉不自禁地颤抖起来，挡无可挡，避无可避！

    　　“那就无须挡，无须避了。”已是强弩之末的陈衣淡淡一笑，挺起胸膛，坦然面对死亡。

    　　“陈衣大人！”白沧水等蛊仙大声呼唤，想要过来救援。

