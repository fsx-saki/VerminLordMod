- chapter: 714
  title: 第七百一十九节：巨阳对星宿
  content: '第七百一十九节：巨阳对星宿

    　　不败福地战场。

    　　“敌方都进入大阵，看来是想要充分发挥出五色烟瘴的威能。厉煌他们有麻烦了。”陈衣一直密切地关注着战况。

    　　“我们要出去支援吗？说不定能联合这批援军，击溃敌方大阵。只要大阵一破，核心仙蛊摧毁一两只，他们恐怕就再没有什么翻盘之力了。”白沧水建议道。

    　　陈衣思考了一下，还是摇摇头：“不必犯险，现在大局对我们极为有利。让他们回来，进入九九连环不绝阵中来'
