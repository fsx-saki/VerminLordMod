- chapter: 448
  title: 第四百五十节：太弱了
  content: '第四百五十节：太弱了

    　　炼蛊大厅中，充斥着白色光辉。

    　　光芒万丈，让人不可逼视。

    　　一股浓郁的气息，介于凡蛊和仙蛊之间，显然炼蛊已经到达最关键的地步。

    　　方源沐浴在白光的最深处，将全部心神都投入其中。在他身边，则站立着炼道蛊仙毛六，满脸的凝重和紧张。

    　　“就是现在！”忽然，毛六开口，竟是将整个炼道蛊阵都撤消了去！

