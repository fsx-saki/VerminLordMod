    　　巨人草丛之中，数百条长龙，或是身披金鳞，或是额头生'
  - '是让其他龙头参战，总会力有不逮，双拳难敌四手。”

    　　白凝冰仰望天空，眉头蹙起。

    　　这并非是正常的太丘天地，而是一片阴暗的阵道空间。

    　　万首盘龙乃是阵道太古荒兽，可以营造出阵道空间，就好比上极天鹰能够'
  - '让雪儿忍不住惊呼一声。

    　　只见地面上血流成河，无数的龙躯无力地栽倒在地上，方圆百亩之地竟都成了尸山血海。

    　　那个太古龙头不断地惨嚎，毫无一丝之前的风采。

    　　而方源……到处都有。

    　　“一念化万千。”'
