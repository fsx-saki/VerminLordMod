- chapter: 442
  title: 第四百四十四节：考验雪儿
  content: '第四百四十四节：考验雪儿

    　　方源用俯视的目光，盯着雪儿。

    　　雪儿年轻貌美，身姿高挑，青春靓丽，更有蓝瞳蓝发，冰肌玉骨的异人风情。

    　　那水嫩的肌肤，饱满的胸脯，会让大多数的男性将目光牢牢投放在那里。

    　　她不愧是雪民一族的第一美人。

    　　但方源却对她的动人美色，无动于衷。不仅无动于衷，还开口刁难道：“这就是你雪民一族的诚意么？”

    　　雪儿有些揣摩不透方源的意思，连忙道：“还请方源大人您明示。”'
