- chapter: 450
  title: 第四百五十二节：分魂
  content: '第四百五十二节：分魂

    　　琅琊福地，云城密室。

    　　方源遁出自家魂魄。

    　　他的魂魄早已今非昔比，底蕴方面高达七千万人魂级数。方源牺牲胆识蛊方面的利润，又压榨影无邪等人，再加上全天下最利于魂道修行的两大天地秘境辅佐，魂道方面始终是火箭般蹿升，进步的速度惊世骇俗。

    　　“只差三千万人魂，就能达到亿人魂级了！”

    　　方源打量自家魂魄。

