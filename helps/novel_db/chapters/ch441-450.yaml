- chapter: 443
  title: 第四百四十五节：难怪方源看不上我
  content: '第四百四十五节：难怪方源看不上我

    　　雪儿虽是雪民一族的后起之秀，天之骄女，但是雪民一族资源薄弱乃是事实。

    　　雪儿能够在她这样的年纪，成就六转，这个成绩已经很棒。不过在和影无邪的相处当中，到底是修为比不上七转，雪儿虽然表面上没有显现什么，但心底还是挺压抑的。

    　　现在见到一位六转女仙，她压抑的心情自然随之舒缓了一些。

