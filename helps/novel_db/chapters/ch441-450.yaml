- chapter: 444
  title: 第四百四十六节：实力井喷
  content: '第四百四十六节：实力井喷

    　　琅琊福地，云盖大陆。

    　　方源独自一人，身处在云土空阔地带。

    　　深呼吸一口气，他平复心境，随后开始，缓缓地催动仙道杀招。

    　　“燃念飞石。”方源心中暗道一声。

