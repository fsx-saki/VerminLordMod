- chapter: 441
  title: 第四百四十三节：琅琊任务
  content: '第四百四十三节：琅琊任务

    　　荡魂山上，胆识蛊俯拾皆是。

    　　方源一路拾取，不断壮大自家魂魄。

    　　他的魂魄底蕴开始节节暴涨，须臾功夫后，从原先的一百万人魂，直接上涨到了五百万人魂级。

    　　一种鼓胀至极，即将要被撑爆的感觉，充盈方源的心头。

    　　方源心知已然达到极限，便走出荡魂山，来到落魄谷。

    　　一番修行之后，他的魂魄得到锤炼，仿佛是钢铁在炉火中不断地烤打磨砺，变得越加精湛。

