- chapter: 449
  title: 第四百五十一节：贸易之思
  content: '第四百五十一节：贸易之思

    　　“尽管天意极其想要铲除我这个天外之魔，将七转的天劫威能提升到了极限，可惜仍旧无法奈何我。”

    　　这一次灾劫，方源渡过并不困难。

    　　为了这场灾劫，他做了充分的准备，但大多数的后手都没有使出来。

    　　影无邪等人算是观摩了一场方源的个人武力秀，组团打了一场酱油，得到的是满满的震撼，以及对至尊仙窍的羡慕。

    　　七转蛊仙总共要渡二十四场地灾，三次天劫，三次浩劫。

    　　方源耐心'
