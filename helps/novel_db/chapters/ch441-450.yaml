- chapter: 446
  title: 第四百四十八节：八转的风景
  content: '第四百四十八节：八转的风景

    　　“得救了！”

    　　“方源长老神威无敌！”

    　　两位毛民蛊仙看着方源击败万首盘龙，纷纷叫喊欢呼起来，发泄着幸存下来的喜悦。

    　　影宗群仙却是一片沉默。

    　　白凝冰冷哼一声。

    　　影无邪一面缅怀之色，他再次看到这些智道杀招，不由地联想到了牺牲的紫山真君。

    　　黑楼兰默然无语，方源越强，她脱困的希望就越是渺小。

    　　雪儿连连眨眼，心神震动，望着狼藉的战场，一时间她特别理解'
