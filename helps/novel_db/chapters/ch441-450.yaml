- chapter: 447
  title: 第四百四十九节：冰道晶精
  content: '第四百四十九节：冰道晶精

    　　南疆。

    　　细雨飘摇，寒风中，青葱山峦在昏黄的傍晚，平静祥和。

    　　无名的山峰上，一棵巨大的青松，松盖如亭，从发芽长成，到如今已有六年光景。

    　　“快了，快了，再过半个时辰，我就能炼出七转的松针仙蛊来。六年的苦功……”七转隐仙郑青心中期待着。

    　　他乃是木道蛊仙，此番炼蛊，乃是运用木炼之法。

    　　虽然耗时颇久，但却是采用了元莲仙尊的妙法，因此成功率相当的高。

    　　郑青'
