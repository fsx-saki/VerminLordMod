- chapter: 445
  title: 第四百四十七节：有点弱
  content: '第四百四十七节：有点弱

    　　嗷吼！

    　　一声炸响，宛若雷霆，在毛民蛊仙们的耳中陡然爆炸开来。

    　　与此同时，一个巨大的龙头，宛若小山一般，横压过来。

    　　巨大的阴影，投盖在群仙身上，还未袭来，气浪横飞，汹汹狂猛的气势，让人两股战战，难有抵挡之心。

    　　“完蛋了！”三位毛民蛊仙无不大汗淋漓，其中一人甚至直接瘫倒在地上。

    　　眼看着他们三个就要陨落在此，这时候，忽然三位毛民的耳畔忽然听到一个清冷的声音'
