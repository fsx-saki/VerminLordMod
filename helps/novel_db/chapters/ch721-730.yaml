- chapter: 729
  title: 第七百三十四节：获取偷生仙蛊
  content: '第七百三十四节：获取偷生仙蛊

    　　琅琊福地。

    　　一大群的异人蛊仙，守候在传送仙阵旁，翘首以盼。

    　　忽然，仙阵运转起来，发出璀璨耀眼的光辉。

    　　异人蛊仙当中，站在最前面的琅琊黑毛地灵顿时大喜，开口喊道：“回来了，回来了！”

    　　站在他身后的有雪民、石人、墨人蛊仙，此刻的神情都有些复杂。

    　　琅琊福地刚刚遭受天庭的入侵，碍于四族大联盟的盟约，这三大异人族群都有帮衬毛民，守护琅琊福地，抵抗天庭的责'
