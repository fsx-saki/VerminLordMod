- chapter: 725
  title: 第七百三十节：白凝冰叛变
  content: '第七百三十节：白凝冰叛变

    　　陆畏因虽无攻伐杀招，但其余方面却是强悍非凡。

    　　他轻轻松松挡下南北诸仙的含愤攻潮，即便是方源一时间也拿他没有办法。

    　　“不愧是乐土传人！”诸多天庭蛊仙皆投来重视的目光。

    　　短短时间，陆畏因竟以一人之力，防住了南北众仙的狂猛攻势，战场中的天庭蛊仙几乎无人能做到这种程度！

    　　直至此刻，南北诸仙方才明白陆畏因的厉害！

    　　尽管陆畏因没有攻伐手段，但是综合实力还在厉煌'
