- chapter: 726
  title: 第七百三十一节：星宿的牺牲
  content: '第七百三十一节：星宿的牺牲

    　　即便是监天塔，拥有九转宿命蛊的监天塔，此刻也难以抵挡梦道杀招的侵蚀。

    　　龙宫乃是八转仙蛊屋，拥有八转仙蛊如梦令。由此而来的八转梦道杀招，恐怕是当世第一了。

    　　正所谓一招鲜，吃遍天。

    　　监天塔中没有任何梦道防御手段，因此龙灵一出手，效果立竿见影！

    　　“照此下去，监天塔将不复存在！”

    　　“此招不是单纯梦境的蔓延，而是梦道的杀招，就算是天庭有着纯梦求真变，也无法'
