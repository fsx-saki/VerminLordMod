- chapter: 721
  title: 第七百二十六节：命败
  content: '第七百二十六节：命败

    　　监天塔内。

    　　龙公轻轻地抚摸着宿命蛊，默不作声，泪流满面。

    　　宿命蛊，形如蜘蛛，黑白两色，原本气息微弱，有着一道赤红伤痕，几乎要将它切成两半。这是红莲魔尊所造成的伤害。

    　　但如今！

    　　赤红的伤痕已然消失无踪，完好无损的宿命蛊，静静地趴着，气息健康洋溢。

    　　生死由命，成败在天！

    　　世间万物，都有自定的生命轨迹，不容改变。

    　　这就是宿命。

    　　对于天庭，宿命蛊代'
