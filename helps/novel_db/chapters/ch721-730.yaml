- chapter: 722
  title: 第七百二十七节：最后的机会
  content: '第七百二十七节：最后的机会

    　　“此时再走已经来不及了。诸位，都请勠力同心，反攻天庭！对方已经用过一次命败杀招，短时间之内，绝不会动用第二次。这是我们最后的机会！”冰塞川大吼。

    　　蛊仙们旋即反应过来，咬咬牙，纷纷扑杀上去。

    　　冰塞川说的没错，监天塔的速度极快，他们是无法逃走的。

    　　当然，不是没有人想过利用身边的蛊仙来替自己拖延，从而争取到逃生的时间。

    　　但关键是中洲太大了，他们如今深入中洲'
