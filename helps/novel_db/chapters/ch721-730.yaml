- chapter: 724
  title: 第七百二十九节：陆畏因叛变
  content: '第七百二十九节：陆畏因叛变

    　　不败福地战场。

    　　在这一刻，方源等等南北诸仙都展开了舍生忘死的冲锋！

    　　方源位于最前方，充当最尖锐的枪尖。

    　　他成了南北诸仙唯一的希望，身上肩负着他们的期盼。

    　　“何其讽刺，何其狼狈！此战到了这步田地，我等竟要将赌注压在仇人身上。”南北诸仙的心情都相当复杂。

    　　“和方源同流合污，果然都是一群邪魔外道！”天庭蛊仙鄙夷，围杀过来。

    　　还有什么可说的？

    　　一'
