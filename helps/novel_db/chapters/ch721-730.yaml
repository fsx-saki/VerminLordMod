- chapter: 723
  title: 第七百二十八节：众目睽睽
  content: '第七百二十八节：众目睽睽

    　　中洲，雷峰山脉。

    　　轰！

    　　巨大的炸响，响彻方圆数十里。

    　　三位蛊仙正在厮杀。

    　　“留下电解铁星花，否则就算我死了，也不会让你们两个好过！”中洲蛊仙糜蓝光怒吼。

    　　而他的对手有两个。

    　　一位文士装扮，大袖飘飘的中年男子，另一位则是个头矮小，相貌猥琐的青年。

    　　前者是东海蛊仙大藏仙人，七转修为，专修信道。后者则是中洲本地蛊仙，六转人物剑一生。

    　　大藏仙人'
