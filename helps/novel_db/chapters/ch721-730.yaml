- chapter: 730
  title: 第七百三十五节：我心里有数
  content: '第七百三十五节：我心里有数

    　　方源打量着偷生仙蛊。

    　　这只仙蛊形如蜜蜂，有成人拳头大小，身上斑纹金黑相间，通体笼罩着一层猩红的薄薄光晕。一旦飞舞运动起来，这层猩红光晕将会大盛。

    　　最惹人瞩目的是蜜蜂的尾针，非常尖锐纤细，并且长度远超蜜蜂本身，竟有成人前臂一样的长度。

    　　根据传闻，偷生仙蛊乃是盗天魔尊年轻时获得的第一只仙蛊，来历非凡。

    　　方源看着偷生仙蛊，不免思绪泛滥：“说起来，盗天虽然是'
