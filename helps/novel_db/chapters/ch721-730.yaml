- chapter: 727
  title: 第七百三十二节：龙公的牺牲
  content: '第七百三十二节：龙公的牺牲

    　　虽然摧毁宿命蛊，对于人族还是有害的，但是有着星宿意志，仍旧不会改变五域大局。

    　　因为当宿命蛊不存在时，天庭无法运用，天道同样无法利用。

    　　在双方持平的情况下，人族又拥有如此巨大的优势，怎么可能眼睁睁地看着其他种族崛起？

    　　但是红莲并非天外之魔，怎么能完全摧毁得了宿命蛊？

    　　重生无数次，红莲仍旧找寻不到彻底摧毁宿命蛊的方法，这一次重生便是来劝说龙公，让师父站在'
