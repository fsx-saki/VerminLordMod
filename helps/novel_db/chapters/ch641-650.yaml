- chapter: 644
  title: 第六百四十八节：海神和鲛女的故事
  content: '第六百四十八节：海神和鲛女的故事

    　　尽管谢晗沫明白，方源顶罪的这个提议的确能够解决眼前的危局，但是她却毫不犹豫地拒绝了。

    　　如此一来，谢晗沫等人便陷入被动当中。

    　　转机是在三天之后，一个情报送达到谢晗沫的手中。

    　　谢晗沫看到这个情报，也愣了愣，这才叹息道：“原来秋霜已经不洁。”

    　　她将情报交给赤鳞、蓝鳞侍卫，以及方源观看。

    　　三人看了之后，面面相觑。

    　　秋霜乃是寒潮族长在背后支持的圣'
