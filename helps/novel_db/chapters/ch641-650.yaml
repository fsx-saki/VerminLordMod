- chapter: 645
  title: 第六百四十九节：截胡
  content: '第六百四十九节：截胡

    　　夜里的海，阴风呼啸，浪潮汹涌。

    　　从黑色的海底深处，忽然亮起一连串的光珠。随后激昂的鼓点，清越的琴声，回荡在浪涛声中。

    　　为首的数十位鲛人武士，身着贝壳制作的古典铠甲，托举一块巨大的雪白贝壳，一路上浮。在他们身后，鲛人们载歌载舞，围绕着谢晗沫、冬蕾二女。再更后面，则是无数的鲛人，他们怀着高涨的热情，要见证最后一场考验。

    　　巨贝浮出水面，海浪拍击在巨大的贝壳上，激起漫'
