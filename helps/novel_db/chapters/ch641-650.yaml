- chapter: 642
  title: 第六百四十六节：方源，你是好人
  content: '第六百四十六节：方源，你是好人

    　　方源漫步在鲛人圣城当中，他并未伪装面貌，仍旧是楚瀛的样子。不过气息完全收敛，仿佛一个凡人。

    　　街道上，人流如梭，和方源摩肩擦踵而过的蛊师们，怎么都不会料想到自己竟和一位八转蛊仙擦肩而过。

    　　街道两旁，各个店铺、房屋鳞次栉比，鲛人的房屋有着独特的风格，大多是贝壳、海螺的形状。这里面有许多，就是巨大的贝壳、海螺或者是巨蟹、巨龟的躯壳改造成的。也有少数的蛊屋，每一'
