- chapter: 643
  title: 第六百四十七节：圣女考验
  content: '第六百四十七节：圣女考验

    　　海神祭，圣城中人潮如海。

    　　周围的观众议论纷纷，声音嘈杂一片。

    　　方源在人群中，仔细观察着这些候补圣女，目光幽幽。

    　　在他的计划中，他将选择其中一位，将她扶持上去，成为此代的圣女。

    　　……

    　　“扶持圣女上位？”

    　　“不错，这一次寒潮部族族长耗费大力气，要扶持秋霜姑娘。”

    　　谢晗沫的蓝鳞、赤鳞两位侍卫，听到确凿的情报后，相互对视一眼，均看出彼此的忧心忡忡。'
