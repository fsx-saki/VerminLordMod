- chapter: 647
  title: 第六百五十一节：太天真
  content: '第六百五十一节：太天真

    　　余音散尽，全场的鲛人们这才开始小声地交流起来。

    　　“这是什么曲子，我还是第一次听到，实在是太美妙了。”

    　　“你们发现没有，歌曲上佳，但谢晗沫却反而有失水准，操纵蛊虫配合起来，频频失误。”许多鲛人谈论这一点，脸上神情都很古怪。

    　　真正的原因，就是方源和谢晗沫，根本就没有好好的演练过。若是演练过一两遍，绝不会有这样多的微小失误。

