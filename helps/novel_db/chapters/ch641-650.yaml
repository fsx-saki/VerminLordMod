  title: 第六百四十五节：竞争圣女
  content: '第六百四十五节：竞争圣女

    　　时间匆匆，一晃又是二十多天。

    　　功德碑前，方源背负双手，望着上面的排行。他在功德榜上的名次已经落到了第五。

    　　起初他一直名列前茅，但变化在不久后发生。

    　　有蛊仙发现，只要投入心神往这功德碑中，就能查探到诸多选择。

    　　这些选择明码标价，可以利用自身积累下来的功德换取出来。仙材、仙蛊、仙蛊方、仙道杀招甚至是仙蛊屋，一应俱全。

    　　依照庙明神等人积累出来的功德，只能'
