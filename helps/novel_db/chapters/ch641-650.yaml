- chapter: 646
  title: 第六百五十节：白月光
  content: '第六百五十节：白月光

    　　谢晗沫深深地看了她一眼，缓缓飞上台去。

    　　她刚落到台上，就是一愣。

    　　“你怎么……”她看向身旁的方源，意外至极。

    　　方源打断她道：“我身为你的跟随者，当然有资格登台，为你伴奏了。”

    　　“你快下去……”谢晗沫连忙说道，眉宇间有着一抹罕见的焦急。

    　　“你还想唱相同的歌？就算效果比冬蕾还好，按照规矩也是不作数的。相信我，我有歌曲可以一拼。”方源再次打断谢晗沫的话，传音'
