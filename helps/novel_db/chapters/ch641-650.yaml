- chapter: 650
  title: 第六百五十四节：人生和面具
  content: '第六百五十四节：人生和面具

    　　啪。

    　　方源再次打了个响指。

    　　周围的一切顿时又从静止转为活动。

    　　那对鲛人情侣，手牵着手，继续前行。

    　　店铺中讨价还价的两人之间，飞溅的吐沫终于落到客人的脸上，客人却无察觉。

    　　小狗的三只爪子落到了地面上，它顺利地将身侧的蓝鳞鲛人甩到身后，又继续在腿脚的丛林间穿梭，灵活至极。

    　　夏琳瞪大双眼，充满惊奇地看着这一切。

    　　这真是太奇妙了！

