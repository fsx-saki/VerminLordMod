- chapter: 649
  title: 第六百五十三节：芳心乱跳
  content: '第六百五十三节：芳心乱跳

    　　“拒绝？”监察使顿时皱起眉头，眼中闪烁着冷光，声音也变得强硬很多，“小姑娘你可要想好了。你年纪轻，凡事还是不要太冲动，要知道胳膊扭不过大腿，更何况你连胳膊都不是。”

    　　“我当然知道我无依无靠，小鱼虾一个，所以你们才找我下手不是吗？”夏琳望着监察使，语气嘲讽，又有苦涩和无奈，“不过你放心，我不会吃力不讨好地去反驳，去告状。我接受你们的诬陷，就当是我还清了苏怡姐姐的恩情'
