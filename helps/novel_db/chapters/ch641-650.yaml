- chapter: 648
  title: 第六百五十二节：我拒绝
  content: '第六百五十二节：我拒绝

    　　苍蓝龙鲸洞天，鲛人圣城。

    　　客栈的房间里，气氛压抑凝重。

    　　“怎么办？”

    　　“下一场考验，赵露那边的跟随者就要上场了。那个人可是名扬大海的人物，有他出手，我们根本没有任何的胜算。”

    　　两位嬷嬷皆是面沉如水。

    　　白鳞鲛人苏怡端坐在主位上，手中端着杯盏，看着杯子里的茶水，好似在发愣。

    　　“大小姐，不能再犹豫了呀。”

    　　“是啊，海神祭进行到现在，就剩下我们和赵露'
