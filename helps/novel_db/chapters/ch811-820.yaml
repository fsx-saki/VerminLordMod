- chapter: 816
  title: 第八百二十二节：龙公招揽方源
  content: '第八百二十二节：龙公招揽方源

    　　龙公中了杀招偷生！

    　　但方源却是面色微沉，因为龙公毫无变化。

    　　之前，方源在琅琊福地伏击雷鬼真君，偷生效果立竿见影。上一世琅琊地灵运用偷生仙蛊，也是重伤紫薇仙子、陈衣、凤九歌，杀死了雷鬼真君。

    　　然而这一次，用来对付龙公，方源寄予厚望的偷生杀招，居然没有效果。这实在出乎他的意料。

