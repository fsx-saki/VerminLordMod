- chapter: 812
  title: 第八百一十八节：气海老祖
  content: '第八百一十八节：气海老祖

    　　梦境中。

    　　“师兄，我昨天做的饭菜可口吗？”绿蚁居士授课结束，师妹泰琴赶上前面的方源，期期艾艾地问道。

    　　方源笑了笑：“真的很不错呢，没想到师妹你如此心灵手巧，将来一定是一个贤惠的好妻子，不知道将来谁有这么好的福气能娶得你呢？”

    　　“师兄，你又打趣我。”泰琴脸上顿时升起两朵红云，接着她又用细微的声音道，“师兄你若是喜欢，师妹再给你做一些好了。”

