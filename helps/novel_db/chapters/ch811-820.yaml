- chapter: 815
  title: 第八百二十一节：偷生打龙公
  content: '第八百二十一节：偷生打龙公

    　　梦境。

    　　“这里就是非议峰？”龙人分身望着天空中漂浮着的山峰，面色带着些微奇异，“竟然不是真实的山峰，仿若虚影。”

    　　“是的，兄长。我第一次看时，也吓了一跳呢。”龙人蛊仙黄维伴随在他左右。

    　　此时的梦境，又过了两幕。

    　　现下是蛊仙文秀的洞天，因为受灾太过严重，产生了破损，和外界联通，被人发现。

    　　文秀乃是一代奇女子，信道大能，早已逝去。她是散修出身，资源匮'
