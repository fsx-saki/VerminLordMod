- chapter: 819
  title: 第八百二十五节：龙庭
  content: '第八百二十五节：龙庭

    　　吴帅英明果断，富有远见卓识，更性情强硬，没有绝大多数龙人蛊仙身上的软弱。龙人一族在他的发展下，实力节节攀升。

    　　在暗中，他一直在秘密筹措资源，对于建设一座八转仙蛊屋始终念念不忘。

    　　然而，好景不长，龙人一族的壮大受到人族越来越严重的非议，暗中作的手脚越来越多。很多人眼红不已，事实上，就连吴帅自己也承认，龙人一族变得强盛的原因很大一部分是侵占了人族蛊仙的利益。

