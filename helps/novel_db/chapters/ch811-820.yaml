- chapter: 813
  title: 第八百一十九节：方源战龙公
  content: '第八百一十九节：方源战龙公

    　　“竟然是龙公大人！”方正见到龙公，又惊又喜。

    　　他是知道龙公的身份，事实上，他和龙公也曾照过面。

    　　“若非龙公大人出现，我此刻已经是死了。有龙公大人在，我应当是安全的。”方正再不心惊胆战，感到一阵阵的安心。

    　　他知道龙公是何等人物，这位可是红莲魔尊的师父！

    　　方正再定睛去瞧，打量那位险些要了他性命的人——气海老祖。

