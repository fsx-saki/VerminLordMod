- chapter: 820
  title: 第八百二十六节：名扬天下许未来
  content: '第八百二十六节：名扬天下许未来

    　　东海梦境。

    　　一场大战已经进入到了最关键的时刻。

    　　松涛子浑身是伤，却气势强盛，牢牢压过吴帅一头。

    　　“吴帅，你没有阻止我的杀招，是你此战最大的失误，你给我败吧！”松涛子仰头大吼，浑身绽射出浓绿的绿芒。

    　　这些绿芒包裹着松涛子，迅速蔓延，一缕缕的绿芒仿佛是松树的树叶。一层层、一叠叠，绵绵不绝，无穷无尽似的，向吴帅卷席过去。

    　　吴帅一动不动，躺在地上的深'
