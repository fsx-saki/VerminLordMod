- chapter: 814
  title: 第八百二十节：一把扯断
  content: '第八百二十节：一把扯断

    　　“等一等！这里不过是梦境，我也不是真的吴帅，有什么值得怒恨的？”龙人分身旋即悚然一惊，清醒过来。

    　　他眨了眨眼，下意识摸了摸额头。

    　　可惜他并没有摸到冷汗，却是摸到了一对散发着温热的珊瑚龙角。

    　　这让他更心生寒意！

    　　“兄长，我们现在该怎么做？”那告密龙人蛊仙又道。

    　　方源看了他一眼。

