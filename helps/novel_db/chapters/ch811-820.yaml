  title: 第八百二十三节：都要争取方源
  content: '第八百二十三节：都要争取方源

    　　龙公开出好大的砝码！

    　　但场中无人觉得奇怪。

    　　方源的实力就摆在这里，他的态度很大程度上影响东海，影响中洲。

    　　这就是价值所在！蛊修世界，实力为尊！

