  title: 第八百二十四节：尊者真传当筹码
  content: '第八百二十四节：尊者真传当筹码

    　　“尊者真传？”东海二仙瞪起了双眼。

    　　龙公咬牙：“敢问是何真传？”

    　　“幽魂真传。”方源干脆地道，“龙公仙友若是不信，我完全可以透露一二。”

    　　龙公沉默了一下，点头：“我信。”

    　　同时，他心中沉思：方源这魔头果然是好算计！魔尊幽魂已经被我天庭俘虏，假以时日，搜索出幽魂真传，完全不是问题。这份真传的价值对于方源已经很低，所以他拿出来交易。但是气海老祖没有魔'
