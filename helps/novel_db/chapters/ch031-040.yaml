- chapter: 39
  title: 第三十九节：蛤蟆商队
  content: '第三十九节：蛤蟆商队

    　　五月，是春和夏的过渡。

    　　花香弥漫，大山青青。阳光开始逐渐地绽放出它热烈的一面。

    　　湛蓝的晴空下，白云如棉絮般漂浮。

    　　青茅山上，青茅竹林仍旧是笔直如枪，遥指苍穹。遍地都是野草在疯长，在草丛中点缀着不知名的野花。微风一吹，野草起伏，浓郁的花粉和青草的气息，就扑面而来。

    　　在山腰处，则是大量的梯田。一层层，一阶阶，嫩绿的麦苗栽种了下去，远远看去就像是一片青翠嫩绿的海'
