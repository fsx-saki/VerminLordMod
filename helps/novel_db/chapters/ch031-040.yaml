- chapter: 31
  title: 第三十一节：合作修行
  content: '第三十一节：合作修行

    　　黑暗的屋子内，白凝冰发出一声不悦的冷哼。

    　　方源话锋一转：“不过现阶段而言，商家城是最适合我们的地方。那里商铺众多，完全可以买到适合自己的蛊虫。我们现在的蛊虫，纵然优异，但是却相互不搭调。只有搭配成套，才能发挥出更强大的战斗力，甚至越级挑战都有可能。”

    　　方源此话，令白凝冰无比赞同。

    　　但凡优秀的蛊师，都会有一套成熟的蛊虫搭配。

    　　就比方白凝冰还是北冥冰魄体的时候'
