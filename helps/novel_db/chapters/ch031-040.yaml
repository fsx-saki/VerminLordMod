  title: 第三十七节：既是妥协又是威胁
  content: '第三十七节：既是妥协又是威胁

    　　而此时，在漠家。

    　　“我叮嘱过你什么？看看你做的好事！”书房中，古月漠尘拍着桌面，在大发雷霆。

    　　漠颜就站在这个老人的对面，低着脑袋，眼眸中流露出既吃惊又愤怒的感情。她也是刚刚知道这个消息，高碗居然被方源杀了！

    　　那个十五岁的少年，居然有这样的手段和心志。高碗可是我堂堂漠家的家奴，方源杀了他，简直是不把漠家看在眼中！

    　　“爷爷，您不用发火。这高碗不过是个家'
