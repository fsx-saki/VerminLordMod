- chapter: 31
  title: 第三十一节：双方求援
  content: '第三十一节：双方求援

    　　数日后，南疆武家大本营。

    　　武庸驻足于一处山峰之上，缓缓睁开双眼。

    　　他的面前，站着三五个凡人。他们都被绑在木桩上，陷入昏迷之中，不省人事。

    　　仙道杀招——送友风！

    　　武庸深呼吸一口气，酝酿完毕，催出这一诡奇的杀招来。

    　　也不见什么风，他面前的三五个凡人就开始悄然瓦解，浑身发皮肉骨都好似灰烬随风飘扬。转眼间，这些凡人连带着衣服就都彻底消散，一丝渣滓都没有剩下。'
