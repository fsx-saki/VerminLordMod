- chapter: 40
  title: 第四十节：紫金石中蟾蛊眠
  content: '第四十节：紫金石中蟾蛊眠

    　　越往深处走，越是锦绣繁华。

    　　小地摊越来越少，大帐篷越来越多。

    　　只见红蓝黄绿各种大帐篷，有的搭成方形，有的是圆桶状。有的在入口卷帘处，竖着两根门柱子，有的则挂着大红的灯笼。有的里面灯火辉煌，有的里面却暗淡无光。

    　　方源边走边看，最终在一座灰色的帐篷处停住脚步。

    　　“是这里了。”他抬眼打量，只见这帐篷门口设着两个立柱，立柱上用阴刻手法，刻着一副对联。

    　　左边'
