  content: '第三十四节：压着你打！

    　　方源充耳不闻，一心两用。

    　　他一边汲取元石中的天然真元，一边留心观察空窍。

    　　空窍中原本低落下去的真元海面，随着天然真元的不断注入，已经开始缓慢地回升。

    　　这种回升速度有些缓慢，但是方源也不着急。

    　　修行就是累积，是急不得的。

    　　真正着急的反而是屋外的中年男性个家奴。

    　　大约过了半个小时，方源的青铜真元海又达到了四成四的极限。

    　　不过这还不算完。

    　　此时'
