- chapter: 37
  title: 第三十七节：好人会有好报？
  content: '第三十七节：好人会有好报？

    　　“只是她为什么会在这里？还有，她为什么叫做张心慈呢？记忆当中，她明明是蛊师，怎么其他人却说她没有修行资质，只是个凡人？”

    　　方源心生疑惑。

    　　“难道她并非商心慈，只是长得相像？这未免也太像了！不，等等……”

    　　方源脑海中思绪翻腾，忽然从记忆的深处挖掘到更陈旧的信息。

    　　“这个商心慈，身世坎坷。她是商家族长年轻时，在外游历的私生子。她从小就没有父亲，饱受欺凌。'
