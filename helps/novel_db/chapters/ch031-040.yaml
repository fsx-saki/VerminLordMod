- chapter: 39
  title: 第三十九节：蛮家邀请
  content: '第三十九节：蛮家邀请

    　　在以强者为尊，拳头为大的北原，蛮多居然还受着父亲宠爱，调动家老，挑战整个葛家。足以可见他的手腕和勇气，绝非普通的纨绔公子。

    　　方源眼中含着笑意：“我常山阴有缘在葛家做客，也知道北原上的规矩，本不该多管别人家的事情。但我刚刚听到，这位老弟拿出了十万元石。我最近正缺元石，送上门来的钱财，我能不要么？”

    　　石武听了这话，恨不得立即抽打自己的嘴巴。

    　　“自己这嘴真是欠抽啊。'
