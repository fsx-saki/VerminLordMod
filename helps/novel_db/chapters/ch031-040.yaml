- chapter: 37
  title: 第三十七节：钧力蛊
  content: '第三十七节：钧力蛊

    　　蛮家坐拥红炎谷，近些年打了几场胜仗，扩张得很厉害。

    　　北原和南疆不同。

    　　南疆是山林地带，易守难攻，长途远征，损耗极大。南疆的家族是徐徐经营，慢慢积累，步伐稳健，血统纯粹。

    　　而北原是大草原，征战频繁。北原的家族，兴盛得快，衰败得也快。很可能几场大胜，能让一个小型家族，扩张成中型家族。让中型家族，膨胀成大型家族。也有可能一场大败，就让大型家族分裂成若干小家族。

    　　蛮'
