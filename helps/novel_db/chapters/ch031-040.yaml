- chapter: 33
  title: 第三十三节：方源渡劫（中）
  content: '第三十三节：方源渡劫（中）

    　　方源本就擅能吃一堑长一智，之前在赶往北原的路程中，碰到泥怪、云兽，他连番吃亏，今番渡劫，怎么可能不弥补这处短板？

    　　说起剑痕索命这道仙级杀招，还有些曲折。

    　　方源进入琅琊福地之后，一边为自己疗伤，一边求助琅琊地灵，要求他为自己逆炼飞剑蛊等等七转仙蛊。

    　　他现在是六转蛊仙，运用七转仙蛊，实在过于吃力。

    　　琅琊地灵单纯，觉得方源已经加入琅琊派，成为琅琊派的客卿太'
