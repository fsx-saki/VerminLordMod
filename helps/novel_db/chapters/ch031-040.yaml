  title: 第三十八节：狗屎分运
  content: '第三十八节：狗屎分运

    　　西漠，某一段商路中。

    　　“杀啊，杀了这群畜生，钱财都是我们的！”

    　　“抢了他娘的！！”

    　　“守住，都给我守住，这些货物丢了，主家绝不会绕过我们！”

    　　喊杀声震耳欲聋，围绕着一座低矮的沙丘，一场盗贼和商队之间的血腥拼杀，正在展开。

    　　这只盗贼团伙，常年流窜在沙漠中作案，成员皆是人族蛊师，各个凶残勇悍，久经沙场，身手不俗。

    　　而商队中，人族反而稀少，占据主体的还是'
