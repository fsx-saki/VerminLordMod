- chapter: 32
  title: 第三十二节：探索气绝洞天
  content: '第三十二节：探索气绝洞天

    　　苍穹一色，万顷蓝碧。

    　　大风长啸，杀机凝空。

    　　两座仙蛊屋对峙着。

    　　一座是雄阔宫殿，橙金光辉，华丽壮观，乃是龙宫。另一座双层竹楼，生机盎然，青秀雅致，正是玉清滴风小竹楼。

    　　两座八转仙蛊屋各载着诸多蛊仙。

    　　吴帅端坐主位，大殿中分排站立着两天蛊仙。左手是冰晶仙王等人，右手是刚刚投靠的木道大能小人蛊仙萧荷尖。至于寒灰仙姑、夜天狼君等人，也夹杂其中。

    　　不久'
