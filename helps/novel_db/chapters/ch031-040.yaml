    　　“奇怪，毒须狼群不是只在腐毒草原上活动么，怎么跑到外边来了？”蛊师们感到疑惑不解。

    　　“应该是有蛊师驱动的！”葛光捏着双拳，看着快速接近的毒须狼群，原本绝望的眼眸中又绽放出希望的光。

    　　“少主英明，你们看那边，果然有人！”几个呼吸后，一个蛊师手指着远方大'
