  content: '第三十三节：炼制群力蛊

    　　黑楼兰渡劫，让方源隐隐预感到会有一场大战发生。

    　　黑城乃是资深七转蛊仙，战力超出方源。雪松子坐拥大雪山第七支峰，也绝非易与之辈。

    　　即便没有黑城、雪松子二人搅局，大力真武体渡劫，灾劫之重也要远超常人。

    　　回到狐仙福地之后，方源就立即着手，尽全力战备。

    　　他要在短时间内尽量地提升战力，就应该从四个方面着手：仙元、杀招、仙蛊以及个人战斗造诣。

    　　个人战斗造诣方源已'
