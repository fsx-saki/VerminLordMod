- chapter: 39
  title: 第三十九节：与天庭合作
  content: '第三十九节：与天庭合作

    　　方源看到这半份元始真传，脑海中首先浮起的一个念头，却不是和真传相关的。

    　　“我是否应当趁着这个时机，将天庭的这帮蛊仙一锅端了？”

    　　这个想法很有诱惑力。

    　　秦鼎菱如今是天庭的暂代领袖，失去了她，天庭必遭打击。古月方正是天意布置，专门为了克制方源这个天外之魔的关键人物。方源斩杀了他，自然是挣脱了一份束缚。而同行的凤仙太子、白沧水等人，如今都是天庭的中流砥柱。缺失了他'
