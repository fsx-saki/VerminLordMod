    　　这只盗贼团伙，常年流窜在沙漠中作案，成员皆是人族蛊师，各个凶残勇悍，久经沙场，身手不俗。

    　　而商队中，人族反而稀少，占据主体的还是羽民。

    　　这些羽民'
  - '意。

    　　他连忙动手，跑进山谷。

    　　这山谷其实他早就探索过，只是之前，并不是如此地貌。

    　　原来，义天山大战之前，仙僵薄青出世，从落天河源头河底，暴射出无穷剑光。

    　　有一道剑光，就落到这里，将这里的山脉斩成'
  - '还是我输了……临死之前，老夫就将这一生真传，都付于了你罢。”

    　　中洲。

    　　剑断山谷之中。

    　　“剑气蛊飞到哪里去了？”

    　　“快追！”

    　　“这只剑气蛊是我的，谁都别想抢走！”

    　　一群蛊师大呼小叫，形'
  - '刻之后，他炼化成功，得到一只很古怪的剑道五转蛊虫。黑不溜秋，巴掌大小，像是缩小的铁制剑鞘。

    　　五转剑鞘蛊！

    　　“这只蛊有什么用？我虽然得了五转蛊，但我真元跟不上，根本用不了啊。”洪易正暗暗惋惜，忽然一只'
- chapter: 39
  title: 第三十九节：罐河察运
  content: '第三十九节：罐河察运

    　　罐河，宛若一条修长的玉带，雕缀在中洲东部之中。

    　　罐河的水，永远是这么舒缓的流淌，仿若一首优美长歌，曲调悠扬柔转。

    　　影无邪站在罐河河堤，等待风禅子的到来。

    　　而黑楼兰、石奴、太白云生等人，则隐藏在附近，为影无邪保驾护航。

    　　河水潺潺流淌，河面上一两只蜻蜓，时而悬飞，时而停在罐草的尖端。

    　　罐河中生长着许多的罐草。

    　　这种草，根扎在河底泥泞之中，汲取营养。茎修'
