- chapter: 31
  title: 第三十一节：死在路上也丝毫不悔
  content: '第三十一节：死在路上也丝毫不悔

    　　即便是白天，腐毒草原上也是一片阴沉。厚重的阴云，阻挡了阳光的恩泽。

    　　在低缓的土丘背后，一头驼狼悄悄地潜伏着。

    　　驼狼体型庞大，堪比战马。它浑身长着又黑又长的狼毛，背山长着两块干瘦的驼峰。一对狼眼在昏暗中，闪烁着幽幽的光。

    　　它趴在土丘上，一动不动，宛若石像。它甚至连呼吸都放得极为缓慢，乍一眼望去，仿佛是一块黑铁。

    　　忽然，驼狼的一对修长的狼耳朵，颤动了'
