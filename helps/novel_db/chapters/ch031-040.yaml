  title: 第三十二节：修行得上瘾了！
  content: '第三十二节：修行得上瘾了！

    　　方源吓得连忙停止。

    　　他虽然用过酒虫，但是酒虫也只是洗练真元，将真元品质拔生一个小境界。哪里用过差距如此巨大的雪银真元？

    　　逼不得已，方源只好减少每次调用量，同时减缓冲刷洗练的力道。

    　　“想不到这真元品质太高，也有弊端呢。”方源有些苦恼地道。

    　　黑暗中，白凝冰听到这话，忍不住翻了一个白眼。

    　　这是何等的机缘！

    　　若是让其他人知道了，只怕要气得一巴掌把方源'
