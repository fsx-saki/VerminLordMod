- chapter: 37
  title: 第三十七节：仙蛊血本
  content: '第三十七节：仙蛊血本

    　　三天之后，至尊仙窍中。

    　　至尊仙窍广袤无比，内分五域九天的格局。

    　　至方源渡劫成功之后，他一直待在第一重天里疗伤。

    　　此刻，疗伤已到了紧要关头。

    　　一座覆盖方圆百里的血湖中，方源沉浸在深达数十丈的湖底。

    　　他伤势极重，惨烈的叫人心底发寒。整个下半身，齐腹而断，只剩下上半身，漂浮在血湖之中。

    　　血湖中浓郁的生机，不断地灌注到他巨大的伤口之中。

    　　经过三天的酝酿'
