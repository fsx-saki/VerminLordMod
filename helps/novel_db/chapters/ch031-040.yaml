  title: 第三十二节：九龙护棺运
  content: '第三十二节：九龙护棺运

    　　繁星如钻石，点缀夜空。

    　　江风徐徐吹来，偶尔传来的兽吼鸟鸣，更显得周围越加静谧。

    　　方源耐心等候，但这一夜却没有等到叶凡的出现。

    　　随着时间推移，第二天，第三天，叶凡始终没有出现。

    　　“难道《叶凡传》记载有误？”方源忍不住思考，但很快他又自己否定了这个猜想，“不，江边的蛊师遗藏还在，叶凡并没有取走。再等等看……”

    　　方源并不知道，就在千里之外，叶凡遭遇到了麻烦'
