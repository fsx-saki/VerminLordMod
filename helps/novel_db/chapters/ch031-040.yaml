- chapter: 31
  title: 第三十一节：芝林、地马
  content: '第三十一节：芝林、地马

    　　洪易早已决定，用过得去蛊对付对方的防御蛊。

    　　只要对方的防御蛊不是同时催动两只，洪易突袭之下，轻轻一击就能打中对手肉身，将其重创，进而击败。

    　　若对手有两只防御蛊同时催动，洪易就不急着进攻，采取消耗持久战术。对方同时催动两只防御蛊，真元消耗速度一定比洪易快。

    　　可以说，洪易有此蛊在手，优势极大，十有八九都能获得此次大比的第一。

    　　“只要得到第一，将娘的牌位迁回祖'
