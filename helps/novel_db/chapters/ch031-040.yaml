- chapter: 40
  title: 第四十节：修复战骨车轮
  content: '第四十节：修复战骨车轮

    　　方源看了一眼拜帖，帖子上的话十分客气，用的当然是北原文字，行书看似蛮野却不恣意，落款是蛮家族长的名字——蛮图。

    　　这是蛮图亲自书写的拜帖，以示诚挚之意。

    　　内容表达了蛮家族长对常山阴的倾慕之情，又说之前的事情都是小孩子间的误会，常山阴没有杀死蛮家的外姓家老石武，这样的风度更是令蛮家上下钦佩。

    　　所以，将在今晚摆上酒宴，诚挚地邀请方源赏光。同时这礼盒中，是石武家老冒'
