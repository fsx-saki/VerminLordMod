- chapter: 31
  title: 第三十一节：方源，你大祸临头了！
  content: '第三十一节：方源，你大祸临头了！

    　　“我苦练基本拳脚连续七天，想不到只在方源的手中支持了两招，就被他再次击昏。耻辱，耻辱啊！”古月漠北心中充满了羞愤恼怒。

    　　在家里的院子中，他对着木人傀儡，不断拳打脚踢，打得砰砰作响。

    　　这时一声轻笑传来：“小弟，跟木人傀儡有深仇大恨吗，这么恨它？”

    　　听到这个熟悉的声音，古月漠北脸色一松，停止了攻击，转过头去：“姐姐，你回来了！”

