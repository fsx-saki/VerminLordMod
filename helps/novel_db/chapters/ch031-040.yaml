  - '开来的思绪，都收敛起来。

    　　不得不说，他现在重获新生，思考问题时灵光闪现，游刃有余。完全不是之前的仙僵之躯，能够比拟的。

    　　再加上他智道宗师境界，许多智道手段辅助，比五百年前世时还要思维缜密，灵活聪颖'
  - '了。

    　　这时候，方源就怀念起黎山仙子来了。黑楼兰的这位小姨妈，掌握山盟仙蛊，人脉极其广泛，与魔道、正道、散修都有极多往来。若是她还健在，必定能采集到更多更新的有关楚度的情报。

    　　“琅琊派虽然势大，但也'
  - '一直在用诸多手段，侦查周遭环境。

    　　见方源沉默，楚度主动提出：“仙友，我无意与你为敌，只在意你引动狂蛮真意的窍门。我希望和你进行交易。”

    　　“交易？”方源眼中精芒一闪，以斟酌的语气道，“也不是不可以，只要'
  - '上黎山仙子。信道……这是我的一个短板，我今后得弥补起来。”

    　　方源思绪稍微发散了一下。

    　　他想起义天山大战。

    　　啊，那就是个坑！

    　　方源现在回想起来，还有点心惊肉跳。

    　　他能存活下来，完全是两个巨人打'
  - '以再提高一些，只要增加更多的凡蛊。”方源仔细体悟，总结得失。

    　　“但就算凡蛊再多，直线速度还是不如剑遁仙蛊的。”

    　　剑遁仙蛊是七转仙蛊，这份血漂流仙道杀招，采用的唯一仙蛊，也就是六转的血本仙蛊，速度比不上'
  - '，换做其他蛊仙兼顾两者，必定两头都不讨好。

    　　但方源却是个特例！

    　　他的这具肉身，极为特殊，乃是至尊仙胎蛊所化。一身道痕，五花八门，包含诸多流派，更妙的是互不干扰。

    　　方源完全可以将血漂流、剑遁仙蛊交替运'
  - '边的蛊虫，就跟随他的心念调动起来，四下飞散。

