    　　又想到了琅琊地灵手中的己运真传。

    　　“上一次，我影宗突袭琅琊福地，抢夺了部分炼炉，还殃及了狗屎运仙蛊，无意间毁掉了它。琅琊地灵就'
  - '少，能炼多少次？”黑楼兰的话一针见血。

    　　蛊仙要炼制仙蛊，不是光只准备一份仙材就可以的。

    　　不算毛民天地流，单以人族隔绝流的炼法来论，炼制六转仙蛊的成功概率不到百分之一。

    　　从这个理论数据而言，影无'
  - 冰原渡劫，真是英明举措。天意要对付他，千方百计地想要铲除他，必定借助地灾。但在北部大冰原渡劫，却是让狂蛮真意替代了一部分的天意，大大降低了其中的危险。哼，希望你能活下来，你的这具身体，我迟早要重新收回！”
  - '，将无数生长在河水中的罐草冲刷。一个个的褐色罐果，就被水流带动，脱离草茎，随波逐流。

