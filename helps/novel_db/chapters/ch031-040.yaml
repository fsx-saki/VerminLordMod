- chapter: 40
  title: 第四十节：血漂流
  content: '第四十节：血漂流

    　　北原。

    　　至尊仙窍内，第一重天。

    　　方源缓缓地睁开双眼，精芒一闪即逝。

    　　“耗费数日推算完毕，还是采用原先的名目，仍旧叫做血漂流罢。”这般想着，方源身边的蛊虫，就跟随他的心念调动起来，四下飞散。

    　　数百只凡蛊，在他身边环绕飞舞，宛若硕大圆环。

    　　血本仙蛊就寄生在他的胸口，赤红的印记开始绽射光芒，同时发挥澎湃的热量。

    　　忽然间，一股耀眼夺目的血光从方源胸口绽放。'
