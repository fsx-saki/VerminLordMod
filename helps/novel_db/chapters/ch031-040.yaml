- chapter: 37
  title: 第三十七节：气绝压气海
  content: '第三十七节：气绝压气海

    　　至尊仙窍。

    　　灾难还在持续，整个局势正在逐步滑落深渊。

    　　方源这一次损失很大。为了挽救资源点，他已经将仙窍内的异人和蛊仙分配到了各处，令他们密切关注，全力照料资源，并且大量散发能专门侦查天意的凡蛊。

    　　再加上方源的宙道分身，以及本体亲自出手，四处剿灭诞生演变出来的天意。总算是勉强保住了至尊仙窍各大资源点。

    　　然而，天道道痕只要不被方源炼化，它演变出来的天意就会绵'
