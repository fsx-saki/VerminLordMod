- chapter: 31
  title: 第三十一节：榜上有名，天庭追剿
  content: '第三十一节：榜上有名，天庭追剿

    　　中洲，狐仙福地。

    　　紫薇仙子缓缓睁开双眼。

    　　她一身锦绣紫袍，难掩窈窕身姿。眼若幽潭，眉宇间笼罩一阵哀愁之意。肤若白雪，青丝垂至腰间，浑身八转气息充盈洋溢。

    　　吐出一口浊气，她收回智道杀招，从半空中降下。

    　　“小煌参见紫薇祖师。”在地面上，凤金煌早已经等候多时，见到紫薇仙子，连忙恭谨的跪拜在地。

    　　紫薇仙子嘴角微翘，露出一丝罕见的笑意，顿时眉间哀愁消淡'
