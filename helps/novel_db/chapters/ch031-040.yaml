    　　吐出一口浊气，她收回智道杀招，从半空中降下。

    　　“小煌参见紫薇祖师。”在地面上，凤金煌早已经等候多时，见到紫薇仙子，连忙恭谨的跪拜在地。

    　　紫薇仙子嘴角微翘，露出一丝罕见的笑意，顿时眉间哀愁消淡'
