    　　“当时好多侍卫都看到了，方源追着那人，那人想要求饶，方源不允许，把头直接斩了！”

    　　“不止呢。方源杀了那人，连他的无头尸体都不放过，拖回了宿舍，砍成了肉泥。”

    　　“真的假的呀？”

    　　“真的不能再真了。我今天早上来得早，还看到青石砖缝里残留的'
