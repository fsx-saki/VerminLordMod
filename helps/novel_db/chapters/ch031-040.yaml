- chapter: 32
  title: 第三十二节：风狼王
  content: '第三十二节：风狼王

    　　狼群进食完毕，方源便跨上驼狼的背，开始继续赶路。

    　　“这些天来，我一直按照葛谣指示的方向行走。差不多已经快到腐毒草原的边缘了，再往外走，就会看到人烟。”

    　　驼狼是天然的坐骑，两个驼峰形成舒适的座鞍。

    　　方源坐在两个驼峰中间，一边赶路，一边探查空窍。

    　　空窍中的蛊虫，只剩下十只左右。除去春秋蝉和推杯换盏蛊之外，就是北原的蛊虫。

    　　原本来自南疆、中洲的蛊，都被方源送回'
