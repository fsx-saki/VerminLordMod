  title: 第三十九节：小姐救命！
  content: '第三十九节：小姐救命！

    　　老总管怒气迅速升腾，他决定给方源一个难以忘怀的教训。

    　　他砰的一声，猛地打开门。

    　　然后，方源带着一身的创伤和血迹，出现在老总管的眼中。

    　　老总管被这情形吓了一跳，顾不上发怒，十分吃惊：“你，你这是怎么回事？难道有兽群夜袭？”

    　　“不是的，老总管。是那群狗贼，打伤俺，还把俺的元石都抢走了！老总管，你要给俺主持公道啊！”方源抹了一把血泪，叫喊道。

    　　“呃……好痛'
