- chapter: 38
  title: 第三十八节：揍人
  content: '第三十八节：揍人

    　　许多小摊贩皆向方源投来嫉妒的目光。

    　　方源将卖叶子得来的两块元石揣入怀中，丢下板车，直接和白凝冰离开了小集市。

    　　“依我看，还是直接虏来的好。你想要接近她，可别忘了我们现在的身份。”白凝冰轻声低语。

    　　方白二人如今是陈家这边的帮工，他们靠这层身份混入商队，但如今却无疑成了方源接近商心慈的阻碍。

    　　不过方源心中已有定计，他看向白凝冰，微微一笑：“你说的不错。所以，我现在'
