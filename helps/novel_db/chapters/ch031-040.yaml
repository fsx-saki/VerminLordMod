- chapter: 40
  title: 第四十节：二战黑城（下）
  content: '第四十节：二战黑城（下）

    　　“找到了！”黑城忽然双眼骤亮，狞笑一声，他有侦察杀招，在梨园中发现了黎山仙子的身影。

    　　他立即将暗箭仙蛊催动到极限，三道暗箭破空飞出，直朝目标射去。

    　　梨园暴动，无数树根宛若虬龙一般，探出、延伸、翻腾，拼命阻截这三道暗箭。

    　　值此关键时刻，黎山仙子咬紧牙关，双眸明亮似灯。

    　　她心中暗喝：“地花连藏！”

    　　地面砰的爆炸开来，闪电般钻出一只硕大的食人花。

    　　食'
