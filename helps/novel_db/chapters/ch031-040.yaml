  content: '第三十四节：黑楼兰升仙（上）

    　　“幽冥水母……深海闪电鳗鱼……你居然将这些食料都收集全了。”方源检查之后，诧异地看向太白云生。

    　　太白云生单凭他一己之力，居然不声不响地将浪迹天涯蛊的食料，都搞到了手！

    　　这有点超乎方源的意料。

    　　“我展露出江山如故仙蛊之后，就得到了很多蛊仙的欢迎。他们主动和我结交，目前已经有蛊仙邀请我加入海市福地。不过此事，要经过海市福地的一半以上的长老赞同，才能通过。”'
