- chapter: 40
  title: 第四十节：匪猴山
  content: '第四十节：匪猴山

    　　“小姐，不可。”张柱连忙道。

    　　“小姐，我们张家这只队伍，在整个商队里实力是末流。如果我们收留了他，无疑就要得罪另一家势力。为了两个区区家奴，这很不值得。小姐不为自己考虑，也得为张家这只商队，为身边的其他人考虑才是啊。”张柱劝道。

    　　“这……”商心慈陷入两难之间，难以决断。

    　　“这有什么难的。张小姐，我只是陈家的帮工，还不是他们的家奴。小姐你若是还为难，我有一个办法可以'
