  title: 第三十三节：你骂吧
  content: '第三十三节：你骂吧

    　　“嗯？”漠颜眉头一皱，马脸上怒气顿现，她终于明白自己被方源耍了一通。

    　　“呵，真是狗胆包天，连你家的姑奶奶都敢骗！”说着，她伸出右手，就要进来抓拿方源。

    　　方源一步不退，昂首哈哈一笑：“漠颜你可要想清楚了！”

    　　漠颜动作顿止，她还驻足在门外，伸出的右手悬停在半空中，脸上却闪过一丝犹豫和恼怒。

    　　家族中有相关的明文规定。学员在学堂中是受到保护的，任何人不得擅自闯入宿舍'
