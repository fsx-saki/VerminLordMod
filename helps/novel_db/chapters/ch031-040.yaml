    　　然而，正当他们要得到气绝真传的时候，却遭受到了'
  - '小竹楼！改良之后，我的战力必定回升，甚至还要超过之前的最佳水准。”

    　　就在武庸展望未来的时候，忽有信道蛊虫飞来。

    　　武庸接取一览，眉毛上挑，不禁流露出惊异之色。

    　　原本他还想要独自闭关一段时间，但接到这'
