- chapter: 38
  title: 第三十八节：蛮家挑战
  content: '第三十八节：蛮家挑战

    　　时隔一个多月，葛谣的死终于被葛家人发现。

    　　消息传来，葛家许多人为之哭泣。葛谣平素虽然刁难，但是心性善良，是葛家的族花，人们都喜欢她。她在葛家有众多的追求者。

    　　“我的女儿啊，是为父害了你……”葛家老族长为之神伤，竟然一病不起。

    　　葛光便代理族长之位，其余家老协助。葛家上下一片哀伤之余，心情更是沉重。

    　　葛谣死了，带来的影响很大。蛮家族长的二子蛮多对葛谣一见钟情，'
