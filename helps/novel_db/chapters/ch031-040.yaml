    　　忽然间，一股耀眼夺目的血光从方源'
  - '惕。

    　　此人能屈能伸，是大丈夫！谁若因此轻视他，那就是十足的蠢货。

    　　“你想要赔偿的话，先将我的飞剑仙蛊还来，以示诚意罢。”方源旋即道。第四十节：血漂流'
