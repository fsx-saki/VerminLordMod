- chapter: 33
  title: 第三十三节：一气不绝兮
  content: '第三十三节：一气不绝兮

    　　“好！”

    　　“盟主大人威武啊！”

    　　“这就是我两天联盟的力量！”

    　　龙宫中诸仙士气顿时大涨，纷纷喝彩。

    　　孽龙在前头横冲直撞，凶蛮无比，而龙宫则跟在后方，轻松悠然。

    　　“这个龙人蛮子！”罗家太上大家老罗足眼皮子直抖，咬牙切齿。

    　　玉清滴风小竹楼中两家蛊仙都感到了巨大的压力。身后的孽龙紧追不舍，简直是一座山脉横行无忌，相比起来，玉清滴风小竹楼显得十分娇小。'
