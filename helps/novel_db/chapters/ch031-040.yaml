  title: 第三十九节：二战黑城（上）
  content: '第三十九节：二战黑城（上）

    　　“方源！”耳畔传来太白云生遥远的大喊声，方源猛地睁开双眼，从蛇海中清醒过来。

    　　四面八方，头上脚上，都充斥着蛇，无数的蛇缠绕在他的身上，绞杀他，啃噬他。若非方源浑身发甲防护着，恐怕早已经被这些小蛇钻进了肚子里去。

    　　方源哈哈大笑，却是不惊反喜！

    　　他伸出八只巨手，猛地一握，顿时捏爆了数十只小蛇。数十段的真意，袭上他的心头。

    　　他的意识微微模糊了一下，旋即恢复'
