  title: 第三十二节：方源渡劫（上）
  content: '第三十二节：方源渡劫（上）

    　　“不想又来到了这里。”方源心中感慨，停止疾飞，从高空落下。

    　　眼前是白茫茫的一片。

    　　冰天雪地。

    　　呼呼呼……

    　　耳畔是不绝于耳的寒风呼啸。

    　　凛冽的狂风中，夹裹着无数雪花，甚至是细小冰雹，四面卷席。

    　　因为漫天的风雪，方源的视野大大受到了限制。

    　　并且温度很低，方源不得不催动更多的蛊虫，来保持自身的体温，以及防御寒风。

    　　这里仍旧是北原。

    　　具体'
