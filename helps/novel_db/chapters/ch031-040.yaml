  content: '第三十四节：深深的误会

    　　到了第二天，轮到白凝冰躺在床上，疼得动弹不得了。

    　　方源则恢复了大半，到村东头锄田去。

    　　老婆婆走进房屋，关心慰问。

    　　白凝冰连说无事，可能是昨天干活有点累，休息一天就好了。

    　　老婆婆笑得很有深意：“是干的有点累，这两天你们晚上动静有点大，我都听到了。”

    　　“什么？”白凝冰一时间没有听懂。

    　　“姑娘，你就别瞒着了，大娘我早就看出来了！”老婆婆笑着道。

    　　白'
