- chapter: 38
  title: 第三十八节：天庭援手
  content: '第三十八节：天庭援手

    　　气海之上，白气遮天，汹涌澎湃。

    　　气绝魔仙居高临下，俯视气海老祖，魔威浩荡。他的头顶兮地虚影显露无疑，令他稳稳利于不败之地。

    　　“气海小辈，老夫修为可能向你借蛊吗？”气绝魔仙又开口道。

    　　方源面露沉凝之色。

    　　之前的一番交手，已经令他看出不少气绝魔仙的端倪和底细。

    　　气绝魔仙拥有的种种杀招且不去论，他的底牌显然是天地秘境兮地。依靠这座天地秘境，他能够克制全天下的'
