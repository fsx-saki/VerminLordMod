- chapter: 32
  title: 第三十二节：戏耍
  content: '第三十二节：戏耍

    　　若是寻常人被这中年男子逼视着，恐怕已经心怯三分。

    　　但是方源看了他一眼后，就丧失了兴趣，重新将注意力集中到桌上的饭菜，把身边的这个中年男子当成了透明人。

    　　“那个人是谁啊？一身家奴装扮，也不是蛊师，居然敢质问方源公子？”一位客栈伙计见势不妙，缩在角落力，不解地问道。

    　　“哼，他这是狐假虎威。一看就是漠家的豪奴，仗着背后有靠山，这才敢向蛊师大人叫嚣。若换做其他凡人，谁敢有'
