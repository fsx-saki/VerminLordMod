- chapter: 38
  title: 第三十八节：真意灌体
  content: '第三十八节：真意灌体

    　　黎山仙子继续道，语气感慨：“关押狂蛮魔尊真意的这个传闻，据说来源于当今北原七转霸仙楚度。传说他在三百年前成就力道蛊仙时，就是在这处冰原之上渡劫。只是这么多年来，蛊仙本来就稀少难成。这新晋的蛊仙中，变化道稀少，力道更少得很。因此一直难以证明这个猜想。”

    　　太白云生冷哼一声，不再向方源疾驰靠近。

    　　虽然黎山仙子、黑楼兰欺瞒了他和方源，但毕竟落到了这样的天大好处，太白云生心'
