  title: 第三十六节：兮的碎片
  content: '第三十六节：兮的碎片

    　　太古白天。

    　　彩霞飞舞，绚烂缤纷。

    　　东海七转蛊仙青辉子在漫天的光霞中飞舞，屡屡施展仙道杀招，不断地收取这些霞光。

    　　霞光被他收纳到手中，捏成一颗颗的圆球。

    　　圆球随后又被送入他的仙窍之中，埋在云土里。一段时间之后，这些霞光圆球便能破壳而出，生根发芽，长出一株株的幼苗。再加以雷水、磁音浇灌，最终就能结出流光果。

    　　流光果乃是六转仙材，本身是由浓郁的极光凝结而成。'
