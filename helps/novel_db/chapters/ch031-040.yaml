- chapter: 40
  title: 第四十节：影宗正统
  content: '第四十节：影宗正统

    　　中洲。

    　　“这颗气功果是我的！”

    　　“给老子滚开。”

    　　“休想得逞。”

    　　气潮刚过，一群中洲本体的散仙正激烈争夺十多枚气功果。

    　　对于洞天而言，内中生长出来的气功果乃是心腹大患。但是五域两天中气潮冲刷之后所留下来的气功果，却是蛊仙们人人渴求的宝物。

    　　气潮的持续已经有了一段时间，五域蛊仙们都充分认识到了气功果的良效。

    　　蛊仙不需要什么气道造诣，只要得到了气功果'
