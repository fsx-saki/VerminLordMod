  content: '第三十四节：方源渡劫（下）

    　　三头铁冠鹰，齐齐向方源扑杀而来。

    　　剑痕索命！

    　　方源心中低呼，却不想关键时刻，却掉了链子。

    　　杀招催动失败，反噬之下，让他口角溢出一丝血迹。

    　　毕竟，接触这个剑道杀招的时间还是太短了点。紧急情况下，心神不集中，失误的概率就会节节攀高。

    　　一声鹰啼，刺破耳膜。

    　　左前方的铁冠鹰，首先扑来。

    　　方源连忙躲闪，后背闪烁虚影，轻虚蝠翼出现，勉强躲过雄鹰的扑击'
