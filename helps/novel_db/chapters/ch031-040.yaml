- chapter: 37
  title: 第三十七节：方源师从狂蛮魔尊！
  content: '第三十七节：方源师从狂蛮魔尊！

    　　砰的一声巨响，方源仿佛一只苍蝇被拍飞，猛地倒射回去。闪电一般划过半空，随即狠狠地砸在坚硬的冰面上。

    　　轰隆隆！

    　　冰块狂溅，巨大的力量令方源宛若炮弹，一路贯穿冰层，足足数千步的距离，这才将将止住冲势。

    　　方源浑身重伤，半躺在冰堆中，饶是仙僵之躯，也动弹不得。他全身上下宛若破烂的麻袋，碧绿的尸血缓缓流淌，伤口密布，骨头折断，有的嵌在皮肉里，有的直接突出在体外'
