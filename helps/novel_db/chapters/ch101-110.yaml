- chapter: 101
  title: 第一百零一节：心老人便老
  content: '第一百零一节：心老人便老

    　　依古月冻土的能量，自然查得到方源的住处。

    　　他今天罕见地穿起了蛊师的武服，腿脚上有绑腿，腰间系着赤色的腰带。一身整洁干净，透着淡淡的威仪。

    　　他看着方源慢慢走来，视线往少年的腰带上瞥了一眼，心中自然生出一阵感慨。

    　　“只是丙等资质，就已经在十六岁突破到二转，真是出人意料。真不知道他是如何冲击成功的。不过……这样快的速度，大部分也归功于酒虫吧。可惜酒虫到了二转，就'
