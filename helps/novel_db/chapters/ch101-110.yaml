  title: 第一百零八节：七星灯
  content: '第一百零八节：七星灯

    　　站在双头犀牛的背上，影剑客、飞电两位强者四处逡巡。

    　　战场上一片混乱，原本十几个四转蛊师的战团，已经有三个分出了胜负。其中黑家胜了两场，东方部族胜了一场。

    　　几支精兵还在相互纠缠着，因为之前东方余亮的算计，因此在这方面黑家稍弱于下风。

    　　狼群和鳄群、蟹群、蝠群也处在僵持当中。

    　　方源毫无影踪，不知道藏在哪个角落。

    　　边丝轩、东破空搜寻未果，脸色又黑了几分。'
