  title: 第一百零三节：先挑狼王
  content: '第一百零三节：先挑狼王

    　　魂道的开辟者，傲居蛊师九转巅峰的传奇人物——幽魂魔尊，曾经评价过：

    　　“天下之大，壮魂首选荡魂山，炼魂首选落魄谷。一山一谷若得之，则必可魂道大成，纵横世间不在话下！”

    　　因此，荡魂山、落魄谷并称为魂修二圣地。

    　　这两大圣地，究竟能带给蛊师多么巨大的帮助，方源自从掌握了荡魂山后，就深有体会。

    　　他的千人魂，就是通过催用了荡魂山上的胆识蛊，才修炼而成。

    　　胆识蛊是'
