- chapter: 101
  title: 第一百零一节：拍卖大会（四）
  content: '第一百零一节：拍卖大会（四）

    　　时间的脚步稳定向前，进场的蛊仙渐渐变得稀少。又等了片刻，秦百胜关闭福地门户。

    　　他走上大厅前面的高台，言简意赅地宣布道：“诸位，按照协约，时候已到，拍卖大会正式开始！”

    　　“奇怪，黎山仙子和黑楼兰，怎么都没有进场？”太白云生那边，向方源传来信息。

    　　“是啊，我也在疑惑。按照黎山仙子的秉性，进场之后，应当坐于大厅。但却一直不见其踪影。”方源回道。

