  title: 第一百零八节：那双眼睛！
  content: '第一百零八节：那双眼睛！

    　　江牙见方源有出去的意思，连忙拦住他：“方源大人，好汉不吃眼前亏啊。这个蛮石很强，是曾经能在白凝冰下逃得一命的人物，绝不可小视啊。”

    　　“把败绩当做荣耀来宣扬，这样的人有何可惧？”方源轻笑一声，伸手按住江牙的肩膀：“你坐在这里喝酒就是了。”

    　　“大人……”江牙张口还想再劝，但是却触及到方源冰冷的目光。

    　　方源眼中的冰寒，让他心头一颤。

    　　他结舌无语，手足无措地被'
