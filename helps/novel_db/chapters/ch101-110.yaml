  events:
  - '四颗白色的爱心状斑点。

    　　铭心蛊也是存储类的蛊。

    　　和书虫差不多，存储的是信息。

    　　铭心蛊，从一转到五转都有。一转的铭心蛊，背部甲壳上只有一颗白色心状斑纹。二转的有两颗，如此类推。

    　　魏央掏出来的'
  - '的效果，记忆深刻，如刻骨铭心。

    　　一股淡淡的喜悦之情在方源的心中泛起：“我手中有天元宝莲，但它只是三转。现在用挺不错，但是当我到达四转，它的辅助效果就立马衰弱下去了。如今有了这份秘方，将来若能合炼出天元'
  - '差不多，存储的是信息。

    　　铭心蛊，从一转到五转都有。一转的铭心蛊，背部甲壳上只有一颗白色心状斑纹。二转的有两颗，如此类推。

    　　魏央掏出来的这只铭心蛊，有四颗斑点，这就表明这只铭心蛊高达四转。

    　　不过'
  - '意念操纵下，流光扑到方源的心口，转瞬间消失不见。

    　　立时，方源的心中就涌出一个秘方。

    　　关于如何合炼出天元宝君莲的方子。

    　　合炼前的主料蛊虫，各项辅料，所有的步骤，以及过程中的注意事项，都一应俱全。'
  - '想给周围的人幸福。

    　　“呵呵呵，今年的少主考核已经过去。要等到来年，心慈妹妹才有机会了。不过，竞争少主之位，十分激烈。父亲大人的子女众多，每年只有一个少主的位置，但却有数百的竞争者。”商螭吻微笑着，主动为商'
  - '，而是道：“既然魏大哥已经炼化了它，不如现在就用了，省得我再炼化一次。”

    　　“也好。”魏央点点头，真元灌注过去。

    　　铭心蛊砰的一声轻响，化为一道粉色流光。在魏央的意念操纵下，流光扑到方源的心口，转瞬间'
  - '“难道黑土哥哥手中有天元宝莲？”商心慈也在暗暗思考，却没有问。

    　　她修行的第一天，商燕飞就告诉她蛊师圈子中的许多忌讳。其中就有一条，不得随意询问其他蛊师拥有的蛊虫。

    　　蛊虫对于蛊师来讲，是立身之本，'
  - '大小。通体赤红一片，背部浑圆的甲壳上，印有四颗白色的爱心状斑点。

    　　铭心蛊也是存储类的蛊。

    　　和书虫差不多，存储的是信息。

    　　铭心蛊，从一转到五转都有。一转的铭心蛊，背部甲壳上只有一颗白色心状斑纹。'
- chapter: 101
  title: 第一百零一节：三心合魂
  content: '第一百零一节：三心合魂

    　　一连下了好几天的阴雨，终于停了。

    　　天穹的阴云，正在消散。一道道的恢弘光柱，透过云翳的间隙，照射在湿润的草地上。

    　　天高地阔，逸兴遄飞。

    　　黑盟大军，形成一股洪流，向着草府方向行进着。

    　　前望，人流汇入天际。后眺，乌压压的队伍像是尾巴，拖到了视野之外。但就这还只是中军，除此之外，还有前锋军、后勤军、左卫军、右卫军。黑盟军势之庞大，可见一斑。

    　　一只巨大的双头犀'
