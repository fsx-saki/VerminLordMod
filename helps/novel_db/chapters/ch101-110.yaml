- chapter: 106
  title: 第一百零六节：半生积累成泡影，唯有本命长久存
  content: '第一百零六节：半生积累成泡影，唯有本命长久存

    　　一天之后。

    　　床榻上，方源盘坐着。

    　　一团脸庞大的白光，在距离他脸面一臂的半空中，静静地悬浮着。

    　　方源伸手从钱袋中取出一块块的元石，不断地丢进光团里去。

    　　白光慢慢收缩，却越来越耀眼。

    　　当它收缩到拳头大小的时候，白光变得刺眼，令方源只能眯起双眼观察。

    　　“应该是最后一块了。”方源手中捏着元石，心知到了关键时刻。

    　　他将元石投入光团'
