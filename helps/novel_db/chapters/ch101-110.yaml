    　　沮家到底是屹立数百年的家族，深有底蕴。这些沮家的收藏，让参加拍卖的不少人，都有或多或少的收获，也让许多人开了眼界。

    　　“大家难得欢聚一堂，先都别走，让我来做东。”方源挽留下众人。

    　　酒楼中，玉盘珍馐，佳肴美酒。

    　　“方正老弟，这是你要的秘方。”酒过三巡，魏央将一只铭心蛊取出，交给方源。

    　　铭心蛊，形如'
