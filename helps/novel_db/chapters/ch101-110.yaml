  content: '第一百零七节：风风火火搞修行

    　　至尊仙窍，小中洲。

    　　一座崭新的宙道仙阵，已经布置到了关键时刻。

    　　“去。”方源神念一动，一大团的昙花精蜜，扑洒上去。

    　　这可是八转宙道仙材。

    　　下一刻，玄光爆闪，化为无数光点，又紧接着猛地扩散。蓬的一声，像是银白色的烟花绽放。

    　　光点迅速消散，毫无迹象，仿佛方源费了大力气搭建的大阵，彻底失败了。

    　　然而，当方源催动侦查杀招之后，他就看到了一个水池虚影'
