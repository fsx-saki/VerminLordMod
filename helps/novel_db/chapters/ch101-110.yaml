- chapter: 110
  title: 第一百一十节：老太婆，你太嫩了！
  content: '第一百一十节：老太婆，你太嫩了！

    　　“酒虫……”方源口中轻声喃喃，走到中央的柜台旁。

    　　他只要有了这酒虫，再补足酸甜苦辣四种美酒，就能合炼成四味酒虫。当然这种合炼，自然存在失败的可能性。

    　　但是如果方源手中没有第二只酒虫，他连尝试一下的机会都没有。

    　　人生就是这样，努力不一定有好的结果，不一定成功。但是不努力，一定是失败。

