  content: '第一百零七节：熟能生巧掂元石，酒肆当中恶客来

    　　寒雪梅中尽，春风柳上归。

    　　不知不觉，冬天已过，春天到来。

    　　冻结的山溪，重新开始潺潺的流动。竹楼屋檐下的冰锥，树挂，都在阳光中滴着晶莹的水。

    　　早晨，酒肆中有些冷清，并没有多少酒客。

    　　方源坐在里面，靠近窗户的位置上。应他的要求，位置周围用木板屏风竖着，做成了一个隔间。

    　　一阵微风从窗户外吹进来，夹裹着一阵清新而又芳香的泥土气息，让人闻'
