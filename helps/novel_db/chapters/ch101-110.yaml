  title: 第一百零六节：暗漩云涡
  content: '第一百零六节：暗漩云涡

    　　听到东方余亮的吩咐，鄂玄铭、姜婉姗、魏鑫互视一眼，同时点头，一齐催动蛊虫。

    　　三转，巨灵心蛊，壮大心灵。

    　　二转，心音蛊，催发心声。

    　　二转，和声蛊，心声相合。

    　　三转，飞魂蛊，魂魄离体。

    　　三转，魂链蛊，锁链勾连。

    　　四转，合魂蛊，三魂像连，魄体合一。

    　　杀招——三心合魂！

    　　轰……

    　　一声似有似无的轰鸣，三位蛊师的魂魄飞离他们各自的肉身，在他们头顶'
