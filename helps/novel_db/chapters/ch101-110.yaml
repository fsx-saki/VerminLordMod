  content: '第一百零六节：以杀定局！

    　　双方交战并没有多久，但冯军已经打了退堂鼓。

    　　方源先是暗杀，除去最强的七转血道蛊仙郑驮，随后又两次冲锋，采取了最正确不过的战术，立即奠定了绝对的优势！

    　　冯军不是傻子，就算战斗经验再怎么不足，也意识到自己危在旦夕。

    　　他想要撤退，无疑是明智之举。

    　　蛊仙之间的战斗，斗力更斗智！

    　　“三妹已经情绪失控了，黑城更是七转蛊仙，我们两位六转联手，也不是对手。还是先和'
