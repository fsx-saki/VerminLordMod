    　　中洲蛊仙们一阵哀叹，慌乱逃窜。

    　　“我让你们走了么？”紫薇仙子冷笑，浑身逸散出紫色光辉。

    　　光辉映照半边天，中洲蛊仙们多数惨死，唯有一位逃出生天。

