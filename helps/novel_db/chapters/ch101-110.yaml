  events:
  - '地面上破碎的花瓶碎片，以及蓝色的血迹，都被吞纳。

    　　这就是大蜥屋蛊的方便之处了。

    　　大蜥屋蛊，是三转蛊，是从二转蜥屋蛊晋升而得。

    　　蜥屋蛊已经大如巴士，外形就是一条四腿大蜥蜴。蜥蜴的里面有一条过道，'
  - '花瓶碎片，以及蓝色的血迹，都被吞纳。

    　　这就是大蜥屋蛊的方便之处了。

    　　大蜥屋蛊，是三转蛊，是从二转蜥屋蛊晋升而得。

