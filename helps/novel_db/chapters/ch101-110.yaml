  title: 第一百零八节：拍卖（下）
  content: '第一百零八节：拍卖（下）

    　　“诸位请看，这是一根千年风柳。”女蛊师指着台上的事物，徐徐介绍着。

    　　“风柳这种植株，乃是罕见珍稀的炼蛊辅料。生活环境特殊，需要风的力量，才能持续不断的成长。因为飓风山常年大风不止，因此产有大量风柳。”

    　　“寻常的风柳，只有数十年，上百年。但作为此次的拍品，这根风柳，有上千年的年龄，可用做五转蛊的合炼辅料！底价五万元石，现在开始拍卖。”

