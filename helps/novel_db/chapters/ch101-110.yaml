  events:
  - '但事已至此，害怕也是无用，三人再次齐声道：“一切皆听东方盟主的吩咐。”

    　　东方余亮笑了笑，却是话锋一转，问起三人奴道修行的状况。

    　　“奴道修行最耗资源，虽然一直得到家族的支持，但在下的鳄群也只能维持在'
  - '场的诸位英豪，此战我军必定能以雷霆之势，横扫敌方。”

    　　王帐中，坐着若干的高层，大多都是四转强者，三转巅峰的蛊师都很少。他们轰然大笑，情绪乐观，纷纷附和黑楼兰的话。

    　　唯有一人，高居左手第一位，面无表'
  - '孙湿寒号称狈君子，为人狡猾奸诈，善于阴谋暗算，但偏偏能扯大旗，凡事都能找到冠冕堂皇的借口，深谙正道的游戏规则。因此他人虽有不耻，但不能奈何他。

    　　孙湿寒有四转初阶的修为，但却也知道自己还不够格，直'
  - '。十六对巨柱般的粗腿，轮番迈动，踩在草地上，一个脚步就是一个深坑。

    　　这是四转巨兽双头铁犀，被奴道蛊师操纵驱赶着，彰显出一股威武霸气。在它宽阔的背上，就坐落着黑盟的王帐。黑楼兰端坐在王帐中央，四周的帐幔'
  - '先开口。

    　　“想必盟主也知道我的情况，我早年并非奴道蛊师，算是半路出家。在探险途中，意外开启了一处血海老祖的小遗藏，获得了不少的刀翅血蝠群。这些年一直在积攒相应的奴道蛊虫，进展缓慢。”姜婉姗感慨道。'
  - '中人却是一片沉默。

    　　但很快，一个阴测测的声音响起来：“这个狼王大人……我现在算是明白了，难怪当年常家也容忍不了他。”

    　　众人听了这话，虽然没有什么表示，但脸上的神情却都流露出些微赞同之色。

    　　常山'
  - '压的队伍像是尾巴，拖到了视野之外。但就这还只是中军，除此之外，还有前锋军、后勤军、左卫军、右卫军。黑盟军势之庞大，可见一斑。

    　　一只巨大的双头犀牛，浑身铁甲铮铮，宛如一座移动的小型堡垒。十六对巨柱般的粗'
  - '子，算计得好。”

    　　孙湿寒自得一笑，又接着道：“启禀盟主，就在刚刚在下又想到一策，叫做示敌以弱。那东方余亮刺杀狼王常山阴，狼王受到了魂爆蛊的影响，却没有丧命。东方余亮定然会再设计，布置许多手段针对狼王大人。'
- chapter: 102
  title: 第一百零二节：令人惊喜的盗天传承
  content: '第一百零二节：令人惊喜的盗天传承

    　　赤、绿、黑三色，在半空中疯狂的纠缠。

    　　闪烁不定的光芒，映照在方源的眼中。他满脸都是专注的神色，紧紧盯着眼前的半成品，想竭力稳住局面。

    　　嗤——！

    　　陡然间，一声尖锐至极的嗡鸣，骤然炸响。

    　　音波激荡空气，形成一股猛烈的风，将房间中的桌椅书柜，统统掀翻。花瓶掉落下来，哗啦啦碎了一地，水墨洒下，纸张飘飞。

    　　三色光芒彻底消散，原本的半成品爆炸成一滩蓝色'
