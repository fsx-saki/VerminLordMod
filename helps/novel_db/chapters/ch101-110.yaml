    　　后来两天联盟组织救援，但当时冰晶仙王却心忧自家的冰晶洞天，将大智洞'
  - '。有什么想法？”

    　　武镇顿时面露沉凝之色，分析道：“听它昏死前的那句话，看来凶峡七鬼尽数出动，齐扑尸皇芋顶天，不只是我们的计谋，还有陆畏因在背后推波助澜！陆畏因……他居然能够影响到凶峡七鬼，或许这一点我们可以'
- chapter: 103
  title: 第一百零三节：东海联军
  content: '第一百零三节：东海联军

    　　面对强势无比的方源，异人蛊仙们纷纷咬牙，目光闪烁。许多人四处偷瞟，都希望别人冒头。

    　　可惜，方源如今乃是天下第一魔头，魔尊幽魂都死在他的埋伏之下。魔威正盛之时，异族联盟的蛊仙谁都不敢去触犯方源的虎须。

    　　没有人敢反抗方源，但也没有蛊仙投降，直接将自家大本营双手奉上的。

    　　任谁都能看出这些蛊仙的不甘心！

    　　他们的这些洞天大本营，是他们日夜生活的地方，是家园，心中纯'
