- chapter: 102
  title: 第一百零二节：冬风吹来春天
  content: '第一百零二节：冬风吹来春天

    　　方源到了内务堂，便上缴了黄金蜜酒。

    　　负责接待的中年男蛊师很是惊异，执笔问道：“你这是完成了家产任务？”

    　　“你说呢？”方源反问道。

    　　中年男蛊师顿时皱起眉头，这任务就是他特意挑选的，专为了为难方源。想不到方源这么快就完成了！

    　　他看着方源，眼中厉芒闪烁，严肃地道：“少年郎，我问你什么你就要答什么。语焉不详的话，可是要拖累对你的评价的。我来问你，你这任务是你'
