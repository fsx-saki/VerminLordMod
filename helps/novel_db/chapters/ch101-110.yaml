  title: 第一百零三节：铁若男
  content: '第一百零三节：铁若男

    　　“铁刀苦，你的眼睛怎么了？”铁若男看到铁刀苦戴着黑眼罩，有些意外地问道。

    　　铁刀苦脸上涌现出一抹尴尬之色，实话实说道：“属下的眼睛，是被白凝冰所伤。”

    　　几个月前，他和白凝冰一战，就像是遭受了当头一棒。

    　　失去了左眼，他的战斗力暴降，手刃蛊也被白凝冰无情地选走，他再也不是白凝冰的对手。

    　　但铁刀苦没有放弃。

    　　他心性坚毅，咬着牙扎根下来，靠着演武场作战，还有承接'
