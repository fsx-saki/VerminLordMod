  - 这只野生仙蛊，悠悠飞出来，主动向白凝冰投怀送抱。
  - 但他有见面曾相识，更有暗渡仙蛊。
  - 方源就利用道可道仙蛊，测查过韩东福地中的道痕。
  - 方源从百足天君处商借，用于搜寻和吞并福地。
  - 上极天鹰承载着方源，盘旋几圈之后，带着他洞穿空间，降临到一片陌生的福地中来。
- chapter: 103
  title: 第一百零三节：野心一大，世界就小
  content: '第一百零三节：野心一大，世界就小

    　　酒肆并不大，但位置很好，位于山寨东侧，靠着东大门。

    　　东大门和北大门，是人流量最大的两个寨门。因此每当午后，或者傍晚，酒肆的生意都会不错。

    　　“少东家，您请坐。”一位老汉对方源点头哈腰。

    　　几个伙计将板凳和桌子都用力擦了擦，对这方源谄笑，一脸讨好。

    　　方源摇摇头，并没有入座，而是在这家酒肆中，随意漫步，四处打量。心中暗道：“这就是我的酒肆了。”

    　　这'
