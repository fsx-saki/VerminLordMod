  title: 第一百零一节：七七玄魂鸟
  content: '第一百零一节：七七玄魂鸟

    　　“武八重，快快起来。”武家大厅中，武庸哈哈大笑。

    　　武八重顿时感到一股无形之风，力度坚韧柔和地将他搀扶起来。

    　　“有你相助，我便无后顾之忧了。”武庸态度欣慰。

    　　“惭愧。”武八重垂首抱拳，“属下修为不足，有负大人厚望。但今后只要大人一声令下，属下必定肝脑涂地，报效死力！”

    　　武八重并非逢场作戏，而是心悦臣服。

