    　　魏央的称号，就是白光刀客，他也来了。

    　　“我已经打听过了，你要的苦力蛊，是第十三件拍卖品。不过，商睚眦已经在第五号包厢，听说他特意收拢了手头上的资金，你要小心啊，方正老弟。”魏央走进包厢，特意叮嘱道。

    　　按道理来讲，拍卖品的顺序是不透露的，包厢中贵客的身份更要保密'
