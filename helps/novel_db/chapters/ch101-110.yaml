  title: 第一百零九节：树屋藏酒虫
  content: '第一百零九节：树屋藏酒虫

    　　古月蛮石憾败于新人方源！

    　　这个消息，很快就宣传开来，在二转蛊师当中掀起一阵小小的风浪。

    　　事件的两个主人翁，大家都比较熟悉。

    　　蛮石是小有名气的二转蛊师，两年前，曾经在白凝冰的手下逃得性命，不容小觑。

    　　而方源则是本届的第一，年末考核之时，许多人目睹了他击败方正的情景。而后又因为他继承了遗产，一夜暴富，更让众人眼红嫉妒。

    　　双方的差距应该很明显才对，但是偏'
