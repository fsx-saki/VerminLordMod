- chapter: 104
  title: 第一百零四节：想买酒虫？
  content: '第一百零四节：想买酒虫？

    　　最终，方源没有走下楼，弟弟也没有主动登上去。

    　　两方的坚持，上下楼的距离，似乎也预示着这兄弟俩之间的隔阂越来越大。

    　　交谈并不愉快。

    　　“哥哥，你太过分了！想不到你竟然是这样的人！”楼下，方正站着，眉头紧皱，大声呵斥。

    　　方源却不动怒，反而轻笑：“哦，我是哪样的人？”

    　　“哥哥！”方正长叹一口气，“我们爹娘死后，是舅父舅母收养的我们。他们对我们俩有养育之恩呐'
