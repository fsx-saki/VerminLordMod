- chapter: 101
  title: 第一百零一节：三心合魂
  content: '第一百零一节：三心合魂

    　　一连下了好几天的阴雨，终于停了。

    　　天穹的阴云，正在消散。一道道的恢弘光柱，透过云翳的间隙，照射在湿润的草地上。

    　　天高地阔，逸兴遄飞。

    　　黑盟大军，形成一股洪流，向着草府方向行进着。

    　　前望，人流汇入天际。后眺，乌压压的队伍像是尾巴，拖到了视野之外。但就这还只是中军，除此之外，还有前锋军、后勤军、左卫军、右卫军。黑盟军势之庞大，可见一斑。

