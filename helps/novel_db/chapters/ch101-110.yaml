  title: 第一百零五节：我会输得很惨
  content: '第一百零五节：我会输得很惨

    　　和方源、方正一样，古月青书也是孤儿。

    　　他的双亲，在童年之时，就都牺牲在狼潮之中。

    　　他被族长古月博亲自抚养成人，测出乙等资质之后，又受到古月博的亲自教导。他的资质优异，在乙等中算得上出类拔萃，几乎可称之为“伪甲等”，古月博一直将其作为族长候选人栽培。

    　　古月青书脾气温和，富有亲和力，很受周围族人的好评和欢迎。他对家族十分忠诚，方正的出现，断绝了他继承族长之位'
