  title: 第一百零二节：此蛊何名？
  content: '第一百零二节：此蛊何名？

    　　陈尺老仙缓缓摇头，颇有不动如山的意思：“再晾凉他又有何妨？此事不及。”

    　　陈立志担忧地道：“他是个明白人，我怕拖延太久，会惹恼他。把他逼走，逼到郑驮那边去的话，就糟糕了。”

    　　“小志，勿忧。”陈尺微微带笑，分析道，“真传上的最后考验，要求黑凡洞天中的蛊仙，至少一半支持黑城，黑城方可继承成功。现在这黑凡洞天中，不算黑城他自己，还有九位。我们这边，就有四人，几乎占据一'
