- chapter: 101
  title: 第一百零一节：麻烦的最后考验
  content: '第一百零一节：麻烦的最后考验

    　　石亭中的碑文上写着：不管是本家来人被天灵接引到这里，还是罪民中的凡人一路闯关，来到继仙山巅，想要继承黑凡真传的话，都需要通过最后一重考验。

    　　但这最后一重考验的内容，石碑上却没有说，只是让后来者向天灵讨教。

    　　天灵虽然愚昧懵懂，但却铭记着黑凡的旨意。

    　　于是，方源主动询问。

    　　很快，众仙便听到，黄钟天灵微微一荡，发出一声悠扬的钟鸣。

