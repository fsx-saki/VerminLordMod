  content: '第一百零三节：暗歧杀

    　　陈尺一死，整个宫殿就要震荡。

    　　这个宫殿群，都是凡蛊屋，受到陈尺老仙的掌控。

    　　不过方源早有准备，心念一动，便催动早已准备充分的布置。

    　　一瞬间，宫殿平静下来，一丝震荡都没有发生。

    　　这正是这些天来，方源所做的准备之一。

    　　凡蛊屋对于蛊仙而言，并不算什么。除非是仙蛊屋，但后者这些黑凡洞天的蛊仙怎可能拥有？

