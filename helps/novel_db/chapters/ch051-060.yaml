  - 储备真元，圆洞越多能储备越多越高阶的真元。
  - 二转至五转不等，方源身上以三转、二转居多。
  - 方源从宝黄天整群购买，有近千只。
  - 这些乞丐蛾，乃是用来存储真元的蛊虫。它形如飞蛾，但双翅上分布圆形洞口。这些洞口，让乞丐蛾看上去残破，犹如乞丐衣衫褴褛，卖相不佳。
  - 独角仙形状，长椭圆形，披装甲背壳，脊面隆拱，头部有雄壮独角，三对长足强壮，通体深棕褐色，散发油亮金属光泽。
  - 帮助方源随意发动兽力虚影，是成就力道蛊仙的关键。
- chapter: 55
  title: 第五十五节：要的就是你这番话
  content: '第五十五节：要的就是你这番话

    　　一轮圆月，在浮云中若隐若现。

    　　学堂家老匆匆过地走在路上，他的脸色也随着若隐若现的月光，而明暗不清。

    　　这个世界生存艰难，蛊师失踪是常有的事情。丰富的人生阅历告诉学堂家老，一般而言，这种莫名的失踪往往就意味着死亡。

    　　但谁都能死，惟独他贾金生不能死！尤其是不能在古月山寨这里死。

    　　他身份特殊，父亲是贾家族长，哥哥是贾富，四转之蛊师。

    　　四转蛊师，拥有黄金'
