  - '你，轻而易举。”

    　　丁浩闻言，舔舔干燥的嘴唇，有些畏惧地倒退一步。

    　　“但是……”方源紧接着话锋一转，“临行前，恩师告诉我墓碑山有个丁浩，要我来考察考察，是否有收列门墙的资格。没想到我没找你，你居然主'
  - '示一下咱们这一传承特有的僵心蛊。”

    　　这僵心蛊，乃是僵王一脉特有，形如心脏，有七窍，僵硬如石。位列三转，冰冷如铁，仿佛青铜所制。

    　　僵心蛊能出产二转的赶尸蛊，就类似于焦雷豆母蛊，能产出焦雷土豆蛊。'
  - '，乃是僵王一脉特有，形如心脏，有七窍，僵硬如石。位列三转，冰冷如铁，仿佛青铜所制。

    　　僵心蛊能出产二转的赶尸蛊，就类似于焦雷豆母蛊，能产出焦雷土豆蛊。

    　　二转的赶尸蛊，也是消耗蛊。能作用于尸体上，形成'
  - '二代僵王留下不止一条传承，在前世收了七八个徒弟，丁浩只是其中一个。

    　　后来二代僵王加入了义天山，正道围攻义天山，二代僵王的这些徒弟指挥僵尸大军，大放光彩，一度让正道联军退避三舍。

    　　丁浩听方源这么一'
  - '个孙子似的，对方源不断地点头哈腰。

    　　但方源却没接着提要求，而是问道：“你实话告诉我，你手中有几头白毛僵尸，几头黑毛，几头青毛。可有蓝毛？”

    　　丁浩一脸惭愧之色：“小弟愚钝蠢笨，在墓碑山生活了近十年，却还'
  - '僵尸去？”

    　　“啊，这……”丁浩愣住了。

    　　“这什么这，你以为我杀不了你？”方源适时地展露出雪银真元。

    　　三转巅峰的修为“展露无疑”，丁浩不禁瞳孔一缩，自己还只是三转中阶而已啊。

    　　方源又紧接着道'
  - '，几头青毛。可有蓝毛？”

    　　丁浩一脸惭愧之色：“小弟愚钝蠢笨，在墓碑山生活了近十年，却还未养出一头蓝毛僵尸。就青毛僵尸，也就三头。小弟将一头留在洞府内驻守，其余两头带在身上。至于黑毛僵，有一百二十多头，白毛'
  - '当然看不出石碑的奥妙。恩师神通广大，又岂是你能看出来的？”方源不屑地冷笑道。

    　　事实上，就算是九转蛊师看了石碑，也不能看出其中的“奥妙”。那就是一个普通石碑，但方源在前世，丁浩出人头地之后，回忆自己的奋'
- chapter: 58
  title: 第五十八节：背后一枪
  content: '第五十八节：背后一枪

    　　僵尸群的攻势渐渐缓解下来，场中陷入僵持。

    　　时间一分一秒过去，不时有蛊师壮烈牺牲，或者僵尸彻底倒下。

    　　一个多时辰后，丁浩按照方源的吩咐，陡然间加大冲势，立即冲垮了本就岌岌可危的阵线。

    　　商队众人已经只剩下三十几位。

    　　必须突围了！他们意见完全一致，谁都看得出来：若是突围，还有一线生机。若苦苦死守，必定灭亡。

    　　突围是惨烈的，重重的白毛僵尸包围着，还有黑毛僵尸阻'
