  - '而他身上的蛊虫，也要舍弃。只要方源把它们带着身上，二代僵王就可以找到方源。况且接下来方源要喂养僵心蛊，也极为不便，更会给商家的调查，留下蛛丝马迹。

    　　至于这些僵尸，没有了主人之后，都成了普通尸群。'
  - '夫后，丁浩很懂事的献上所得的元石。

