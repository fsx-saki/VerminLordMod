  title: 第五十一节：商家新族长
  content: '第五十一节：商家新族长

    　　南疆。

    　　商量山。

    　　白日高悬，天光绚烂。商量山上人山人海，声势鼎沸。

    　　四转巅峰蛊师商不离的身影，出现在山巅，立即吸引了几乎所有人的目光。

    　　饶是商不离久经阵仗，经验老道，此时此刻，心底亦有些惴惴不安。

    　　皆因此时此刻，乃是商家盛典，意义十分重大。并且前来参与的各路人马，既有铁家、翼家、武家、侯家等等南疆超级势力的代表，亦有来自魔道、散修等成名强者、枭雄豪杰'
