  - 春秋蝉悬浮于中央，蝉身上交替闪烁着黄绿光辉。
  - 春秋蝉的效果，是将蛊师的全部都献祭，仅仅保留蛊师的意识在蛊虫身上。
  - 散发智慧之光，克制意志，抑制命运，消耗寿命
- chapter: 56
  title: 第五十六节：洗尽嫌疑
  content: '第五十六节：洗尽嫌疑

    　　“开出来的？”古月博深深地皱起眉头。

    　　“不错，事到如今，我也不隐瞒了！”方源像是豁出去了，语气急促，“我在赌石场买了六块紫金石，因为真元不够，当场只解开了五块。还剩下一块，带到宿舍，解开之后，发现是只酒虫。我大喜过望，因为之前查过资料，知道酒虫是能弥补我资质短板的珍稀蛊虫。于是就立即炼化了它。”

    　　“等等，你说你赌石，买了六块。一块赌出了癞土蛤蟆，另一块还开出了酒虫'
