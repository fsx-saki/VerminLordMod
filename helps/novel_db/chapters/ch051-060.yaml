- chapter: 60
  title: 第六十节：壁破现甬道，传承岂易与？
  content: '第六十节：壁破现甬道，传承岂易与？

    　　初夏的夜空是美丽的。

    　　天上没有一朵浮云，晶莹的星星闪烁着动容的光芒。

    　　檀香蟋蟀粉墨登场，取代了龙丸蛐蛐的位置，它们在草丛中、山溪边、树枝上唱着一曲曲抒情的歌。

    　　古月山寨中亮着点点的灯光，似乎在和星空遥相辉映。

    　　一座座碧绿的竹楼在夜风中挺立，星空之下别有一番祥和静谧的悠然氛围。

    　　方源此时却不在山寨中，而是潜进了石缝秘洞。

    　　他半跪在地面上'
