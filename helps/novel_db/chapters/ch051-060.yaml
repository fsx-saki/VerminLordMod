- chapter: 59
  title: 第五十九节：不管三转四转，都是猴子
  content: '第五十九节：不管三转四转，都是猴子

    　　今夜的月亮，特别的圆。

    　　月光如辉如纱，披洒在青茅山上。

    　　宝气黄铜蟾每一次纵跃，都足足有一百米的距离。因为是跳跃式前进，陡峭狭窄的山路并不能对它形成限制和阻碍。

    　　贾富一行人，都坐在宝气黄铜蟾的身上，从古月山寨出来，重新往商队赶去。

    　　耳边的风呼呼作响，视野随着宝气黄铜蟾的纵跃而上下颠簸。

    　　月光照耀在众人的脸上，每个人都沉默着，贾富更是面寒如霜'
