  content: '第五十二节：狼王，你的援军呢？！

    　　老族长对方源越加不满，大吼道：“狼王，你承诺的援军呢？”

    　　“葛老哥不用担心，马上就能赶到！诸位，随我杀，为死去的家老报仇！！”方源大吼着，越众而出，杀向前线。

    　　“快，保护好常山阴大人！”葛光立即大叫。

    　　“狼王大人，你是我们致胜的关键，还请您退到我们中间，我们来保护你！”

    　　“杀，杀光这些畜生！！”

