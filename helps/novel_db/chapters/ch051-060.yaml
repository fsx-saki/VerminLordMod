  - '然也不排除，他有其他蛊虫，可以鸟瞰营地。但不管如何，他隐蔽的地方，可以方便逃脱……”

    　　方源失去了地听肉耳草，没有侦察手段，只能依靠猜测。

    　　厮杀越加惨烈，僵尸倒下数百具，蛊师们同样伤亡惨重。在源源不断的僵'
- chapter: 57
  title: 第五十七节：原来你是大师兄
  content: '第五十七节：原来你是大师兄

    　　丁浩只觉得脑海中响起一个炸雷，让他头晕目眩。

    　　这人是谁？

    　　居然发现了我，还知道我的名字！

    　　没有可能的呀，这些年来，我都是小心谨慎，从未漏出马脚的。怎么会被他发现？！

    　　他心中掀起惊涛骇浪，心念顿时杂乱，两只青毛僵尸，以及营地周围的黑僵、白僵皆静止在原地。

    　　营地众人未料到这个情景，也楞了一楞。

    　　但旋即丁浩反应过来，急忙收束心神，营地上的战斗再次打'
