  - 我手中最好的残方，就是六成的和稀泥蛊方。
- chapter: 57
  title: 第五十七节：君子的谎言
  content: '第五十七节：君子的谎言

    　　贾富很纠结。

    　　他现在心中已经排除了方源的嫌疑，几乎确定贾贵就是幕后黑手了。

    　　“但我就算知道了真相，又能如何呢？”贾富的心头涌起一股悲愤，“我手中没有任何的证据，若是我空口无凭地到父亲面前指证贾贵，恐怕父亲还认为我要陷害他呢！”

    　　贾富很精明，他看向方源，双眼中精芒一阵爆闪。

    　　贾金生是随着他一起走南闯北，贾金生如今失踪，他贾富自然就有照顾不周的责任！既然指证'
