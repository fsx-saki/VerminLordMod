    　　“我们必须突围！”

    　　“突围'
  - '方源一直冷眼旁观着，此时忽然站出来，大喝：“都别吵了！”

    　　争吵声顿时止住。

    　　在众人眼中，他是三转巅峰的修为，属于商队中的最强者之一。尤其在如今这种生死存亡的关头，方源无疑更有发言权。

