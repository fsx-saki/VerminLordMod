  title: 第五十八节：暴利！
  content: '第五十八节：暴利！

    　　中洲时间，成功敲诈了凶雷恶人的三天之后，仙鹤门对外宣布：承认方源为狐仙福地之主，狐仙福地为仙鹤门附庸势力，并且随时可以脱离。

    　　这个惊人的消息，宛若巨石投入湖面，立即激荡起连绵浪花。

    　　一时间，中洲蛊仙界为之侧目！

