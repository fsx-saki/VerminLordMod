  title: 第五十一节：果然是魔道蛊师！
  content: '第五十一节：果然是魔道蛊师！

    　　锦上添花，怎比得上雪中送炭？

    　　疾风知劲草，板荡显人心。

    　　方源见商心慈如此表情，心中却不得意，接下来才是重点。

    　　他接着道：“只是有一件事情，须于你明说。”

    　　“阁下请说。”商心慈伸出玉葱般的手指，轻拭眼角，抚平心绪。

    　　“我和白云，皆是魔道中人。”方源道。

    　　商心慈点点头，没有意外之色。这点她也早已经有所预料，在此之前，张柱也有此猜测，让她多提防方'
