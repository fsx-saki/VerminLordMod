    　　这两具僵尸，身形高大，浑身长满了青毛。乃是青毛僵尸，比黑毛僵尸更强，在夜间战力相当于千兽王！

    　　丁浩这么多年来，也就攒了这么两具。

    　　“去吧。”他'
  - '定这支僵尸大军，应该就是丁浩在幕后操纵了。

