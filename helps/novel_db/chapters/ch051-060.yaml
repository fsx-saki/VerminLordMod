    　　例如方源，虽是仙僵，但归根究底乃是力道蛊仙，本身便是力道仙体，使用其他流派的蛊虫、杀招，效果只是一般。

    　　企图阻杀鹤'
  - '的怒意。

    　　他盘坐在半空中，面无表情地睁开双眼：“你须知每用一次破门而入，就得耗去我本体的两颗红枣仙元。”

    　　鹤风扬连忙道：“晚辈知晓，这一次回去，一定相应补偿。”

