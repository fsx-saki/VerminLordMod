    　　“好，就是这样！”方源心中欢叫一声'
- chapter: 59
  title: 第五十九节：计划中的分别
  content: '第五十九节：计划中的分别

    　　夜空中，月牙高悬，月光如水。

    　　商心慈站在一块山石上远望，她一脸的担忧：“黑土大哥，怎么还没回来？”

    　　“会不会出什么事情了？”小蝶附和着。

    　　“他怎么可能出事，不用担心。”白凝冰倚着一颗枯树，心想这方源又在搞什么鬼？

    　　时间一点一滴的过去，商心慈心中越加焦急，眉头紧锁。

    　　白凝冰也渐渐感觉不妥，这时间至少有半柱香了，难道方源那边真的出了什么事情？

    　　方源'
