    　　几天后，黑楼兰送来第一批魂魄，足有数十'
  - '第一批的胆识蛊，已经贩卖出去，刨除成本，以及分给黑楼兰、黎山仙子的四成利润，方源获得了四十三块仙元石。

    　　狐仙福地时间一个月之后，第二批胆识蛊卖出去，方源的仙元石储备又增添了四十六块。

    　　第三批'
  - '渐渐凝成胆识蛊。

