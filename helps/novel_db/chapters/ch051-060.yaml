  events:
  - '果方源耍赖，她根本找不到应对的方法。

    　　和方源一路行来，她知道方源的人品如何。方源的修为越来越接近三转，约定的期限即将到来，白凝冰心中也便越加焦躁。

    　　就在三人商量着，要赶回去支援方源的时候，后者终于'
  - '。四人马不停蹄，过了血泪山后，又接连越过千窟山、巨人山、绿藻山等六座大山。

    　　在这期间，方源修为从二转高阶晋升到巅峰境界。

    　　整个路程中，他们只在边远的村庄进行了短暂的补给。

    　　越接近商量山，山道也'
  - '商心慈心性善良，总是把人往好的方面去想。

    　　“原来是这样啊。”小蝶恍然大悟。

    　　“他们虽然是魔道蛊师，但都是好人。我决定了，我要在商家城大展拳脚。凭我的才华，必定会闯出一番天地。我虽然是凡人，不能修行'
  - '“黑土大哥，你又受伤了！”

    　　方源身上又故意增添了几处伤口，他抽了一口冷气：“你们刚走，就来了一头青毛僵尸。幸亏我跑的快，我们快走吧，说不定它正在追来。”

    　　听他这么一说，其他三人自然不敢久留，连夜赶路。'
  - '至少有半柱香了，难道方源那边真的出了什么事情？

    　　方源的死活，她一点都不在意。她在意的是方源手中的阳蛊。

    　　她心中不由地生出一丝焦躁。

    　　这种焦躁一半来源于方源的失踪，另一半则来源于白凝冰心中的无奈'
  - '无法我行我素，一举一动都将受人关注，做事束手束脚，就算是修行也得故意压制。

    　　修为增长过快，便会让骨肉团圆蛊暴露。骨肉团圆蛊一旦暴露，势必影响天下动荡，引发各方觊觎。方源心中清楚得很，骨肉团圆蛊的恐怖价值，就'
  - '大大降低。

    　　方白二人都被百家寨通缉着，自然没有前往赵家寨。四人马不停蹄，过了血泪山后，又接连越过千窟山、巨人山、绿藻山等六座大山。

    　　在这期间，方源修为从二转高阶晋升到巅峰境界。

    　　整个路程中，他们'
  - '他三人自然不敢久留，连夜赶路。

    　　至此，方源目的达到，一路上安分守己。

    　　过了墓碑山后，他们来到双将山。

    　　此山是双子峰，中间隔着一道悬壁山谷，遥相对应，气势雄浑。

    　　四人没有了商队护卫，行走在山林'
- chapter: 60
  title: 第六十节：父女相认
  content: '第六十节：父女相认

    　　商燕飞念头一动，瞬间消失在黑暗当中。

    　　再出现的时候，他已经在商家外城当中。

    　　嘈杂的人声旋即传入耳帘，街道两旁排列着各种小摊。

