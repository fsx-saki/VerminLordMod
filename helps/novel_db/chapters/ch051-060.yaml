  content: '第五十五节：尸群来袭

    　　丁浩隐藏在一处灌木丛中，俯视着山脚下的这支商队，不禁兴奋地舔了舔嘴唇。

    　　“按照洞中留下来的讯息，只要我屠杀一千人，攒够一支僵尸队伍，就能离开此地，前往沼泽山，正式成为师父的弟子了！”

    　　他原本只是一个山野村夫，被一只路过村子的商队招收进去，当做劳力。

    　　但经过墓碑山时，商队受到了大批僵尸的围杀。他就被人舍弃，当做炮灰，和其他数十位家奴一起断后。

