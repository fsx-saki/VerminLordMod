  content: '第五十四节：死的才干净

    　　天空阴沉沉的，乌云压得很低，一副山雨欲来的架势。

    　　商队在山道上沉闷的前行着。

    　　商队里原有的大型的黑皮肥甲虫，已经死的一个不剩。翼蛇剩下两只，各有残疾。倒是背囊蛤蟆剩的较多。皆因它们体型小巧，行动迅速，容易躲避野兽的冲袭。至于驼鸡，虽然和背囊蛤蟆差不多，但是它们一旦受到惊吓，都喜欢把头埋在泥土里去。这种自欺欺人的逃避方法，使得它们死伤最重。

    　　商心慈夹杂在人群中'
