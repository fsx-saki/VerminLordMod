  events:
  - 天气、地气也不能无止境的吸纳，必须和人气相互持平。
  - 即便是仙尊魔尊，如此无敌的人物，最终也难逃一死。
  - 也许这就是天灾地劫的缘由吧。不过也真因为如此，超越长生的永生才是我值得追寻的目标啊。
  - 仙尊魔尊只能长生，而他追求的目标，是更高一层的永生！
  - 吸纳他人人气，转化纯净，升仙时加持自身，提高成仙几率和根基
  - 巨阳仙尊亲手炼制，藏于无双真传中。
  - 这里面是巨阳仙尊亲手炼制的一只七转仙蛊，名为人气蛊。
  - 人气蛊的作用，就是吸纳旁人的人气，转化纯净，并在升仙的时刻，加持到自己的身上。
- chapter: 52
  title: 第五十二节：我的解释你只能接受
  content: '第五十二节：我的解释你只能接受

    　　学堂中，所有人的目光都集中在方源的身上。

    　　这些目光中有震惊，有惶恐，有嘲讽，有冷酷。

    　　方源对这些目光视若无睹，他看着学堂家老，一手指着地上昏死过去的侍卫，神情严肃。

    　　“禀告家老，这两个侍卫包藏祸心，其心可诛！他们在我冲击中阶最紧要的关头，强行破门而入。众所之知，蛊师修行不能受到干扰。尤其是冲击更高境界，更是如此。稍有不慎，不仅冲击失败，空窍更会受到损'
