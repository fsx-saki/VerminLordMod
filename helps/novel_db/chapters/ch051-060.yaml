  title: 第五十二节：子不教父之过！
  content: '第五十二节：子不教父之过！

    　　“杀人了，真的杀人了！”

    　　“发生了什么？”

    　　“这到底是怎么回事？”

    　　欧飞的尸体，就躺在地上，像一条死狗一般。怎么可能不引人注目？

    　　短短片刻的功夫，这边的动静就已经闹大，扩散到整个营地。

    　　越来越多的人，向这边汇拢。很多人看到欧飞的死尸，都不由地发出一声惊呼，然后开始打听到底发生了什么事情。

