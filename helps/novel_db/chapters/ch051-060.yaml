  - 五光十色的蝴蝶，所行之处洒下五色虹光
  - 可为自己或他人施展，具有恢复青春或延长寿命的效果（理论）
  - 只见它形如瓢虫，拳头大小，浑身碧玉也似。圆滚滚的背壳有天生纹路。一半是江河湖海，一半是山丘峰峦。
- chapter: 53
  title: 第五十三节：方源就任命你为班头
  content: '第五十三节：方源就任命你为班头

    　　一切都在方源的意料当中。

    　　事后，学堂家老就令治疗蛊师，救助了那两个侍卫。

    　　侍卫的命保住了，但是落下了重等伤残，被学堂家老驱逐出了学堂。

    　　方源没有受到任何的惩罚，反而被表扬了一通。

    　　这样的结果，更令其他少年们感到惊惧。

    　　但这事还远远没有结束，随着时间的推移，风波扩大到整个族群。

    　　方源以丙等资质率先晋升中阶，成了全族中一个不大不小的奇闻和谈资'
