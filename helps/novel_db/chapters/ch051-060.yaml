- chapter: 56
  title: 第五十六节：丁浩，你给我出来！
  content: '第五十六节：丁浩，你给我出来！

    　　此时，大部分的木墙已经坍塌，源源不断的僵尸冲进营地，和蛊师们纠缠在一起。

    　　方源看到此处，已经确定这支僵尸大军，应该就是丁浩在幕后操纵了。

    　　若是普通的僵尸群，都是一窝蜂的上，或者白毛僵尸死了，黑毛僵尸再上。哪里会有这样的战术配合，这分明就是有人在背后操纵！

    　　而操纵这个尸群的人，无疑就是丁浩了。

    　　方源记得：二代僵王屠戮了墓碑山的家族之后，在这里留下了'
