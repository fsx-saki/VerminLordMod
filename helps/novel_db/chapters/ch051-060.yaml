    　　风鞭在手，长达百丈，遥遥一抽，沿途搅碎无数飞鹤。

    　　毒道杀招——蜂罗刺！

    　　数以千百计的针刺，宛若暴雨倾盆，盖压下来。毒性之猛烈，但凡被刺中的飞鹤，无一不'
  - '音道、宇道、炎道、风道、光道、暗道、律道等等，乃是故意为之，不愿动用真正手段，以防暴露身份。”

    　　蛊师升仙，按照自身底蕴所在，以及投放何种蛊虫炸出仙窍，细分为各派蛊仙。有炎道蛊仙、风道蛊仙、智道蛊仙等等'
  - '扫视周围。

    　　原本迷雾重重，哀声连连的战场，此刻终起变化。

    　　一团团的浓雾中，凝聚出一只只的暗蓝魂兽。短短几个呼吸的功夫，魂兽数量暴涨，和鹤风扬的鹤群规模齐平。

    　　“这难道是……魂狩战场？”鹤风扬心'
  - '的战术。

    　　鹤风扬看到强敌扑来，不仅没有慌张，反而流露出一丝冷笑：“你们中计了。”

    　　他取出一只五孔玉箫蛊，凑在自己嘴边吹奏。看似青衣少年，实则万兽之君。衣摆无风而动，眼中爆闪神芒。

    　　奴道杀招——八面埋'
