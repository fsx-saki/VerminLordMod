- chapter: 58
  title: 第五十八节：家族里不是只有规矩
  content: '第五十八节：家族里不是只有规矩

    　　“族长，您找我有什么事？”学堂家老恭敬地站立在一旁。

    　　“也没什么事，坐罢，我这里有一个故事想说给你听。”古月博眯着双眼，语气悠悠。

    　　“属下洗耳恭听！”学堂家老便选择了下首，最靠近族长的位置坐下。

    　　族长古月博便说了人祖的故事。

    　　话说——

    　　自从人祖道出了正确的名字之后，就降服了规矩二蛊。他的第一个命令，就是叫它们为自己捕捉一只寿蛊。

    　　规矩二蛊'
