    　　他命令手中全部毛民，赶炼基础蛊虫。

    　　连续七天七夜，三班轮倒，紧锣密鼓，炼制出大量蛊虫。

    　　又命石人部落出动人力，'
  - '百零五丈，这个长度比一里的一半还多一点，因此石柱和圆洞天坑之间，并不接壤，双方相距四十五丈，还有一片特意遗留的空间。

    　　石柱如蚁山，里面结构复杂，四通八达。

    　　不管是石柱的外壁，还是圆洞天坑的内部，都'
  - '兰、黎山仙子开始觉得自己是个拖累。

    　　因为他们负责收集魂魄。

    　　但如今，魂魄原料的数量，渐渐成为胆识蛊贸易的最主要限制。第五十八节：暴利！'
  - '仙界为之侧目！

