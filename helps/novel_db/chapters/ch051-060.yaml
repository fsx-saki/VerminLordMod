  title: 第五十二节：智慧难用
  content: '第五十二节：智慧难用

    　　宝黄天，来源于多宝道人。

    　　此人乃是中古时代的蛊仙，修为高达八转。他一位获得一块黄天碎片，将其融入自身仙窍洞天之后，就形成了宝黄天。

    　　蛊仙的仙窍一旦吞并了太古九天的碎片，就会坐落在外界五域，再不能移动。

    　　宝黄天亦是如此，自第一次落下之后，三十多万年仍旧在原处。

    　　只是宝黄天的具体位置，究竟在哪里？这是一个巨大的谜团，没有人知晓。智道蛊仙们也曾前仆后继的推算，都'
