- chapter: 504
  title: 第五百零六节：万生春雷
  content: '第五百零六节：万生春雷

    　　得益于方源的出色发挥，豆神宫外围的最后两头太古魂兽，都被方源夺走，收入麾下。

    　　至尊仙窍当中，失去了两头太古魂兽，转眼间又新添了两头。一头是牛身豹尾，一头是独眼双手的巨人。

    　　“这算不尽不愧是智道蛊仙，我们房家世代筹谋，如今豆神宫还未夺取，这个外人反而占尽了便宜。不仅得到我族的一只七转仙蛊，而且还有收走了两头太古魂兽，拥有了八转战力！”

