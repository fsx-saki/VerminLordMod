- chapter: 507
  title: 第五百零九节：阎罗鬼手
  content: '第五百零九节：阎罗鬼手

    　　房睇长愣住了！

    　　方源扮做算不尽，不过是七转蛊仙，怎可能解决如此难局？

    　　但旋即房睇长就反应过来，朗笑一声：“仙友尽管开口，有什么要求可以让你出手相助呢？”

    　　他到底是智道大宗师，不管方源有没有什么办法，他都要试一试。而方源故意这么说，也是为了谈条件。

    　　方源也笑道：“此时情况紧急，我们无法细聊。不过，豆神宫乃是八转仙蛊屋，我若能助房家夺得此屋，什么样的酬劳能够'
