- chapter: 510
  title: 第五百一十三节：烟罗暖玉田
  content: '第五百一十三节：烟罗暖玉田

    　　南疆，东南。

    　　黄龙江以北，百兽山正南。

    　　这里本是一处山脉，延绵起伏，但如今却分崩而裂，一道巨大的沟壑横跨东西，形成一条崭新的地沟。

    　　大时代将临，五域要合一，首先就是地气动荡，地脉勾连。南疆土道道痕浓郁至极，乃是五域之首，自从第一次震荡之后，便接二连三出现覆盖南疆的巨大地震。

    　　每一次地震，对于南疆的凡人，都是一场灾难。但是对于蛊仙，却意味着崭新的机遇！'
