- chapter: 509
  title: 第五百一十二节：算计青仇
  content: '第五百一十二节：算计青仇

    　　“原来是这样。”方源当即就和房家蛊仙进行联系，得到了情报。

    　　这场围绕着豆神宫的大战，确实已经结束了。夺得豆神宫的，正是房家！

    　　天莲派的太上大长老陈衣败走前，留下话，要房家好好保管豆神宫，将来他必定亲自再来取之。

    　　至于青仇也逃出生天，它底蕴深厚，并非只有一只八转魂兽令，还有其他八转仙蛊。

    　　房家虽然夺取了豆神宫，但是三座仙蛊屋中，鸡笼犬舍、问津坞都有严重的'
