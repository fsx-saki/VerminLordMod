  title: 第五百零三节：青甲菜园
  content: '第五百零三节：青甲菜园

    　　中洲元莲派，本来就是元莲仙尊所创。在元莲时代，此派是当之无愧的中洲十大古派第一！

    　　而到了现在，却是沦为中流。

    　　世事无常，沧海桑田，不论组织和个人，都会有起起伏伏，没有至始至终的兴盛强势，也没有常年不变的衰落不堪。

    　　作为元莲派的太上大长老，陈衣掌握着元莲真传，因此对于豆神宫，有着强大的干预和影响的能力。

    　　紫薇仙子知人善用，知道如此所以也不派遣其他人来辅助陈'
