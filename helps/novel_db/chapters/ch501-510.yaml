- chapter: 503
  title: 第五百零五节：大盗仙蛊
  content: '第五百零五节：大盗仙蛊

    　　房睇长虽然生气得很，不过豆神宫近在眼前，房家世世代代的大计不容失败，而方源收服太古魂兽的手段，正是打破僵局的最好方法。

    　　房睇长便笑道：“算不尽仙友想要什么酬谢？只要你说出来，房家力所能及，必定会全力资助”

    　　方源问他有什么重谢，房睇长却是反问。

    　　方源哈哈一笑：“房大人果然快人快语，我并不贪心，一只七转仙蛊那是可以有的。”

