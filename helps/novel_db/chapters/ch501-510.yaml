- chapter: 508
  title: 第五百一十节：炼化魂兽令
  content: '第五百一十节：炼化魂兽令

    　　至尊仙窍。

    　　一只蒲扇大小的黑幽鬼手，正在半空中不断地胡乱飞舞。

    　　它五指紧握，但里面的八转仙蛊魂兽令，却是极力挣扎，想要飞出来。

    　　黑幽鬼手被这只魂兽令不断地冲撞，鬼手上不断凹凸，五个手指头都在乱颤，有把握不住的趋势。

