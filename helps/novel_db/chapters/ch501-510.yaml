- chapter: 506
  title: 第五百零八节：房家八转
  content: '第五百零八节：房家八转

    　　轰轰轰！

    　　房家的七转蛊仙强者，各施其能，正中陈衣肉身。

    　　一时间，雷霆声连绵不绝，刺眼的强光照亮整个豆神宫的大殿。

    　　气浪翻滚中，陈衣傲然挺立在原地，岿然不动。

    　　他全身上下笼罩着层层叠叠的光斑，厚实沧桑，仿佛老树的皮。房家诸多蛊仙的联手攻势，竟然被这层树皮光斑尽数抵挡，攻之不破！

    　　“这是什么防御手段？！”不提房家七转蛊仙们齐齐倒吸一口凉气，就连房睇长都瞳'
