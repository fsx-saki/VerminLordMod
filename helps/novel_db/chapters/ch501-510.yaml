- chapter: 502
  title: 第五百零四节：要挟房睇长
  content: '第五百零四节：要挟房睇长

    　　房家的仙道杀招接连不断，轰击在魂兽大军的身上。场景璀璨，宛若万千烟火爆闪。

    　　彩光映照在房家蛊仙的脸上，这些人的脸色却都不好看。

    　　“这魂兽虽有折损，但根本无伤大雅。它们身上的青甲居然可以连接一体，分摊伤害，好生了得！”

    　　房家六位蛊仙久攻不下，就在这时，又从身后的仙蛊屋鸡笼犬舍中，飞出一位紫衣女仙。

    　　“让我来！”她娇喝一声，将早已经酝酿好的仙道杀招施展出来'
