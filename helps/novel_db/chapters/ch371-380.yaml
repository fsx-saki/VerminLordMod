- chapter: 372
  title: 第三百七十三节：方源吃人
  content: '第三百七十三节：方源吃人

    　　无垠沙海，黄沙连天，一望无际。

    　　天空则是湛蓝高远，朵朵白云，线条清晰，晶莹毕现。

    　　“终于是来到了西漠了。”一道身影从西漠的界壁中飞射而出，不过却并未降低速度，而是直冲天际。

    　　此人少年模样，身着白袍，长袖飘飘，一头乌黑长发，眼眸深邃，面冠如玉。

    　　正是方源！

    　　凤九歌替他挡住了武庸，让他得以逃脱。

    　　至尊仙体拥有自由穿越界壁的特长，因此不管是南疆界壁，'
