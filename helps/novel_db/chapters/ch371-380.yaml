- chapter: 379
  title: 第三百八十节：年兽军团
  content: '第三百八十节：年兽军团

    　　沙流漩涡中心的深邃同道，似乎直插向地底。

    　　凤九歌越是深入，越感受到浓郁的宙道气息。

    　　忽然，从深沉的黑暗中，闪烁出一个亮点。

    　　在黑暗的映衬下，这个亮点分外显眼，它闪烁着黄铜一般的光泽。

    　　“是一只野生的凡蛊？”凤九歌飞近，发现这是一只三转的日蛊。

