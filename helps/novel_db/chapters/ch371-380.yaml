    　　地气蝠驼这种太古荒兽相当奇特，它有两种生'
  - '若穿越界壁，势必要休整一段时间，不过方源依仗至尊仙体，穿越界壁轻易至极，根本没有什么损失。

    　　超级梦境大战之后，方源虽然成为影宗新主，继承了紫山真君的不少遗产，但是也痛失了武遗海的这个宝贵身份，柳贯一的身份'
  - '题。”

    　　“所以我此行，必须要快！”

    　　念及于此，方源眼中闪过一抹骇人的精芒。

    　　仙道杀招——上古剑蛟变！

    　　白光绽放，下一刻，方源转变成了一头银鳞灿烂的矫健剑蛟。

    　　剑蛟甩摆蛟尾，姿态优雅，速度飞'
  - '深处。”

    　　“除此之外，还有两处天然孕蛊之地，可以孕育出了仙蛊。如同南疆的玉壶山。”

    　　白凝冰的冰魄仙蛊，就是从玉壶山中天然孕育而出的野生仙蛊。

    　　在影宗的秘密经营之下，西漠这里有不少秘密地点。其中两处'
  - '剑蛟甩摆蛟尾，姿态优雅，速度飞快地向前方飞去。

    　　很快，方源又在维持上古剑蛟变的基础上，催动剑遁仙蛊。

    　　嗖——！

