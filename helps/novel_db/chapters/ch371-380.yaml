- chapter: 377
  title: 第三百七十八节：千变老祖
  content: '第三百七十八节：千变老祖

    　　炙热的阳光，好似道道利箭，万箭齐发，普照在这片壮观的沙漠上。

    　　在这片沙漠上，伫立着无数的沙雕。

    　　这些沙硕凝聚的雕像，有的是人，有的是兽，有的在拼杀，有的躺倒在地上，似乎弥留着最后一口气息。

    　　沙雕有大有小，但最小的都有数丈之高。

    　　一座座沙雕，数量极多，汇聚成一座沙雕森林，景象极其壮观。

    　　正是万像沙漠！

    　　这座沙漠覆盖面积极广，拥有着难以计数的沙雕，'
