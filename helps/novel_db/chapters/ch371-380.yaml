- chapter: 371
  title: 第三百七十二节：截取最大的成果！
  content: '第三百七十二节：截取最大的成果！

    　　“万劫来了！”方源咬牙切齿，死死等着灰色的哀云，慢悠悠地覆盖下来。

    　　仙僵薄青也不由地眯起双眼，浑身肌肉紧紧绷住。

    　　但灰云降下，却似毫无伤害。

    　　“怎么回事？难道有无害的万劫？！”方源紧张半天，却不见动静，双手四处乱摸自己的身体，惊疑不定地大叫道。

    　　仙僵薄青没有回答他。

    　　天庭蛊仙中有人，认出了这是万劫灰忆。但方源、墨瑶残魂却不知道这点。

    　　不'
