- chapter: 372
  title: 第三百七十三节：还不归来？
  content: '第三百七十三节：还不归来？

    　　方源魂魄飞离纯梦求真体，毅然飞入眼前的这只神秘的九转仙蛊之中。

    　　刚刚接触的一刹那，方源就感到一股无以伦比的吸摄之力。

    　　这只被魔尊幽魂命名为至尊仙胎的仙蛊，似乎早已经对魂魄迫不及待。

    　　方源魂魄进入之中，就仿佛落入到落天河底的暗流漩涡之中。

    　　一时间，魂魄被仙蛊牢牢吸摄住，并以一种不可思议的速度，迅速融化！

    　　方源不能思考，只感觉进入了一股深邃无比的黑暗'
