- chapter: 371
  title: 第三百七十二节：原是天意谋划
  content: '第三百七十二节：原是天意谋划

    　　武庸主动撤退，并未让方源、凤九歌高兴，反而心头俱是一沉。

    　　武庸撤退，自然也可以前进。

    　　方源、凤九歌都希望，武庸能够和他们对拼，一直拼出个你死我活的结果来。

    　　但武庸并没有这样做，而是非常理智和冷静地选择了撤退。

    　　他是八转正道蛊仙，面对两位七转联手，居然主动撤退。

    　　这事情一旦传出去，武庸的脸面也就丢了一小半。

    　　之所以没有全丢，则是因为他面对的蛊'
