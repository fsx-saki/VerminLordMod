  title: 第三百八十一节：斗战胜伏奴
  content: '第三百八十一节：斗战胜伏奴

    　　大量的年兽，鸡羊猴狗猪马虎兔，或是张牙舞爪，或是嘶吼咆哮，向凤九歌扑去。

    　　凤九歌很快身陷重围当中。

    　　不过他艺高人胆大，面色丝毫未变，双眼中尽是从容淡定。

    　　“来的好！”他轻喝一声，身躯微微一震，催动仙道杀招。

    　　叮叮咚咚……

    　　战场上传出一阵阵清脆悦耳的声响。

    　　仿佛是无数大小玉珠，接连落在玉盘之上。

    　　仙道杀招——碧玉歌！

    　　内围的年兽接连受创'
