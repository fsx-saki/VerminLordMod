- chapter: 374
  title: 第三百七十五节：吓跑三位七转
  content: '第三百七十五节：吓跑三位七转

    　　从外形上看，这是一只独角仙。

    　　方源托在手掌中心，感觉到它沉甸如石。

    　　宽大的背甲，敦厚的头部，都带给人雄浑有力的感觉。而高高翘起的开叉尖角，就像是高举向天的长枪。

    　　律道七转仙蛊——斗！

    　　这只仙蛊正是方源，来此的主要收获。

    　　因为有着影宗新主的身份，方源很快就炼化了此蛊，并将它收入仙窍当中去。

    　　除此之外，还有一只仙蛊。

    　　只有六转，隶属土道，名'
