- chapter: 378
  title: 第三百七十九节：贩卖年兽
  content: '第三百七十九节：贩卖年兽

    　　“什么？”

    　　千变老祖闻言，顿时心生一股怒意。

    　　他虽然妻妾众多，但是在此当中，最为宠幸的便是第三房爱妾翠波仙子了。

    　　西漠的蛊仙界里，谁不知道这个情况？

    　　翠波仙子现在出事，若是人为，那动手的这些蛊仙，就是不把他千变老祖放在眼里！

    　　这其中又有两个最大的可能。

    　　第一个是动手的蛊仙，靠山强硬，也是八转大能，方才不惧他千变老祖。

    　　另外一个可能，则是西漠'
