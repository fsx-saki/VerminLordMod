- chapter: 376
  title: 第三百七十七节：影无邪换魂
  content: '第三百七十七节：影无邪换魂

    　　一头黑色的波浪长发，披到肩头。

    　　鼻梁高挺，嘴唇线条宛若刀刻，此刻他双唇轻抿，倒有一股冷酷的风姿。

    　　正是影无邪的魂魄。

    　　此时，他已经脱离了纯梦求真体，将魂魄抽离出来，悬浮在半空当中。

    　　“就是这具肉身？”影无邪皱起眉头，看着眼前的一座冰棺。

    　　这座冰棺，无时不刻不散发着冰冷的寒气，半透明，宛若水晶，里面封印着一个蛊仙。

