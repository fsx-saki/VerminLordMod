- chapter: 373
  title: 第三百七十四节：收取西漠僵盟遗藏
  content: '第三百七十四节：收取西漠僵盟遗藏

    　　方源一句话，说得三羽童人大惊失色，连忙呼救。

    　　一道身影迅速显现，来到三羽童人的面前，安抚他道：“弟弟别怕，有姐姐在呢。”

    　　这位女蛊仙，身姿玲珑较小，仿佛幼女，一身雕花的绿衣，双耳吊坠着两颗玉珠子，珠子内部仿佛含水，摇曳间，荡漾出绿水澜光。

    　　“小女子仙号翠波，阁下是谁？虚言恫吓我弟，很好玩么？”

    　　方源打量这位翠波仙子。

