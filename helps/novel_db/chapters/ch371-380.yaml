- chapter: 375
  title: 第三百七十六节：斗志昂扬
  content: '第三百七十六节：斗志昂扬

    　　“哼，一群跳梁小丑。”白凝冰冷哼。

    　　黑楼兰不语，心底则满怀感慨。

    　　雀神、美驼仙、董猎风也算七转蛊仙中的强者，放到南疆，虽然比不上树翁巴德、武家武雨伯之流，也能媲美武艺髯。

    　　那美驼仙在西漠蛊仙界的地位，和乔丝柳、妙音仙子等同。

    　　只是面对能力抗八转的方源，这些实力就都不够看了。

    　　“不知不觉间，他竟然成长到了这种程度啊。实在是快得骇人！”黑楼兰心底震动。'
