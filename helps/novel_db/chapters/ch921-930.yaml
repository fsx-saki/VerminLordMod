- chapter: 928
  title: 第九百三十四节：一剑枭首！
  content: '第九百三十四节：一剑枭首！

    　　仙道杀招——五轮肃杀转！

    　　五行大法师怒吼一声，双掌翻上，狠狠一推，推出一道五色圆环。

    　　圆环旋转飞射上空，环心爆发出强劲的吸力，被它吸引进来的种种杀招、荒兽都被直接绞杀。

