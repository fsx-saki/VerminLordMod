- chapter: 929
  title: 第九百三十五节：真正的三气归来
  content: '第九百三十五节：真正的三气归来

    　　“龙公大人！！！”耳畔传来天庭群仙的惊骇呼喊，但在龙公听来，这股声音却越来越弱，起初仿佛山呼海啸，但几乎下一刻就衰减成了天边袅娜的缕缕回音。

    　　这……就是死亡的滋味吗？

    　　我龙公终于，是要死了吗？

    　　死在这里？

    　　龙公的脑海中还有念头闪烁。

    　　死在这里？

    　　他又问自己。

    　　累，真的是太累了！

    　　一路走到现在，他担负着如山般的重担和期盼，包含着如海'
