- chapter: 923
  title: 第九百二十九节：剑毁仙墓
  content: '第九百二十九节：剑毁仙墓

    　　嗷吼——！

    　　横霸天穹的太古巨龙长鸣一声，龙尾一甩，身躯游动，速度之快竟在原地留下了一道淡白残影。

    　　轰。

    　　一声巨响，诛魔榜遭遇一记狠狠的冲撞，宛若流星般坠落下去。

    　　龙公立即赶来支援。

    　　方源冷笑一声，龙躯陡然升空，再次在原地留下一道残影。

    　　在高空，他猛地从极动变为极静，身上气势猛地一爆。

    　　仙道杀招——剑浪三叠。

