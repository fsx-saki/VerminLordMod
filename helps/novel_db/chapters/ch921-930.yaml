- chapter: 922
  title: 第九百二十八节：方源最强攻伐！
  content: '第九百二十八节：方源最强攻伐！

    　　天庭战场。

    　　仙道杀招——龙啸波。

    　　仙道杀招——随身闪。

    　　激战中，龙公身形陡然出现在万年斗飞车的右舷一侧。

    　　距离太近了！

    　　几乎在他出现的同时，环绕万年斗飞车飞舞着的破晓剑群就蜂拥而上，瞬间淹没了龙公。

    　　龙公身上浮现出无数龙形纹身，抵挡住剑群的猛烈攻击。

    　　这个正是龙公的主要防御杀招——九纹龙护身。

