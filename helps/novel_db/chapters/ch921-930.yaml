    　　“我们冲进去！”南疆的蛊仙立即抓住这个战机，催动八转仙蛊屋太宇寺见缝插针地冲进防线。

    　　天庭成员玉珠子狠狠一咬牙，手指太宇寺，喝道：“去！”

