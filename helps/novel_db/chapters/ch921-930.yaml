  title: 第九百三十一节：紫薇幽变
  content: '第九百三十一节：紫薇幽变

    　　方源的战斗体系有几个呢？

    　　就龙公目前观察来看，方源真正成熟的战斗体系只有两个。

    　　一个是宙道体系，一个是剑道体系。

    　　宙道体系是最全面的体系，拥有三息后现、年兽召来、万年斗飞车、春剪夏扇秋毫冬裘，以及春耕夏耘秋收冬藏等等杀招，覆盖了战斗、经营两大领域。王牌手段有两个，一个是缩时杀招搭配的光阴飞刃，另一个则是春秋蝉为核心的春秋必成！

    　　而剑道体系则有上古剑龙变'
