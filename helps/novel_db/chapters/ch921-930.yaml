- chapter: 924
  title: 第九百三十节：战斗体系
  content: '第九百三十节：战斗体系

    　　方源变化成太古剑龙，同样具备了速度的优势，龙公追击一阵，竟发现无法快速缩短两者之间的距离。

    　　仙道杀招——龙门！

    　　龙门陡然出现，两根赤红巨柱，各有巨龙缠绕，巨龙蜿蜒，上半身延伸，离开巨柱，在中间交汇，形成门头。巨龙嘴巴张开，一颗明珠在龙口之间熠熠生辉，形成双龙戏珠的格局。

    　　两道龙门同时出现，一个出现在龙公的面前，一个则出现在方源的身后。

    　　龙公踏入眼前的龙门'
