- chapter: 875
  title: 第八百八十一节：一下就打死
  content: '第八百八十一节：一下就打死

    　　沈从声紧紧地盯着功德碑的碑面。

    　　虽然外表不显，但他此刻的心中确实隐隐有些焦躁了。

    　　身为沈家太上大长老，他位高权重。身为八转大能，他可谓占据蛊修的巅峰。但是面对乐土真传，他的这份底蕴还是毫无悬念地被比了下去。

    　　方源能够接取中型任务，竞争乐土真传就太有优势了。沈从声被逼得只有想方设法，去追上方源的脚步。

    　　他虽然来到这里，另有目的，但是乐土真传就在眼前，他'
