- chapter: 880
  title: 第八百八十六节：阵平海域
  content: '第八百八十六节：阵平海域

    　　五团白光，在高空中骤然一闪，将方源、庙明神等五人从功德碑带到了这里。

    　　五人都熟知任务，纷纷朝下鸟瞰，各自催动侦查杀招。

    　　方源率先觅览全局，细细打量。

    　　他虽然在侦查这块，一直都是短板，但只是针对他自己而言。和庙明神等人一比起来，他的短板之处，也不是庙明神这些人能够媲美的。

    　　这是一片广阔的海域。

    　　海面上波涛汹涌，掀起万千重浪，浪花滔滔，无数海兽在波涛中'
