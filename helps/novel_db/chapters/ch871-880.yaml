- chapter: 873
  title: 第八百七十九节：下了又上
  content: '第八百七十九节：下了又上

    　　方源带着夏琳，来到小渔村，见到了村长。

    　　第一次见面，他便直接当着面搜魂。整个渔村的村民都一阵恍惚，随即就恢复过来，不疑有他。

    　　方源收集到这些情报，和上一世对比，发现小渔村这边并无什么改变。

    　　和上一世一样，他仍旧是用云游蛊师的身份接触这些凡人。

    　　先是四下挑战，将村中的蛊师轻松击败，随后就教导他们炼制水壳蛊，传授他们水壳蛊方。

    　　村民们无不感恩戴德。'
