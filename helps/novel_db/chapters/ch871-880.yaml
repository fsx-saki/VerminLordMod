- chapter: 871
  title: 第八百七十七节：一起来分析楚瀛
  content: '第八百七十七节：一起来分析楚瀛

    　　任务完成，沈从声默念几声回归，便又传送回到了接引岛。

    　　功德碑就在他的身边。

    　　他查看了一下碑面，在功德排行榜单上，果然见到了自己的名字：沈从声，九功德。

    　　沈从声眉头微蹙。

    　　完成一次任务，竟然只有九点的功德？

    　　这个报酬太少，出乎沈从声的意料。

    　　“按照这种进展，岂不是在我来之前，那个楚瀛已经接取了十个左右的任务了？”想到这里，沈从声眉头皱得更紧'
