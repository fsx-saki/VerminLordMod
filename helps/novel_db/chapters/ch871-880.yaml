- chapter: 879
  title: 第八百八十五节：老好人
  content: '第八百八十五节：老好人

    　　蜂巢岛是一座造型奇特的海岛。

    　　整个海岛就是一个体积庞大的暗黄蜂巢，蜂巢表面坑洞无数，内部更是结构精密，坑道无数。

    　　一位六转蛊仙，狼背蜂腰，身着碧绿战甲，正身处于蜂巢之中。

    　　此人正是庙明神的追随者之一——蜂将。

    　　咻咻咻！

    　　密密麻麻的赤线蚯，铺天盖地般向蜂将暴射而来。

    　　赤线蚯一曲一弹，就能将自己射出去，速度极快，蜂将也只能看到一道道的红色光线。'
