- chapter: 876
  title: 第八百八十二节：分身入梦
  content: '第八百八十二节：分身入梦

    　　见闻福地。

    　　宫殿深深，广厦万千。树荫浓郁，夏蝉鸣唱。

    　　久闭的宫门打开，沿途的羽民少女们跪倒在地上，她们恭迎这座宫殿的主人——夏槎。

    　　夏槎的脸色并不好看，神情郁郁。

    　　闭关良久，她尝试了各种办法，都没有使得自己从五转蛊师，晋升为六转。

    　　所有的方法都用了，摆在她眼前的只剩下一条路——向方源购买六转层次的第二空窍仙蛊。

    　　身为夏家的太上大长老，夏槎本有八'
