- chapter: 874
  title: 第八百八十节：中型任务
  content: '第八百八十节：中型任务

    　　小型的任务，功德奖励在一和十之间。而中型的任务，具体功德奖励则在十一只一百之内。

    　　方源兑换了一个“好人”的名号，从此便可接取中型任务。

    　　中型任务完全是蛊仙层次，方源这次收拾的虎王鲵就是六转荒兽，但事实上战力已经高达七转。

    　　这种任务难度，就绝对不是凡人所能承受的了。

    　　难度高，自然收获也高。

    　　“所以，我这一次的功德奖励是九十么……”方源心中了然，“之所以'
