- chapter: 877
  title: 第八百八十三节：积土为山
  content: '第八百八十三节：积土为山

    　　天地一片阴沉，乌云盖顶，万雷轰鸣。

    　　猩红的闪电，一次次闪烁在漆黑的滚滚烟云之中，黑云卷荡漩涡，从漩涡的中心降落下一颗颗的雷球。

    　　这些雷球形态奇异，宛若陶瓷制品，大如水缸，红光烁烁。

    　　浩劫——红瓷雷球劫！

    　　雷球砸落下来，爆发出清脆的炸响。

    　　地面上，一座仙蛊屋默默承受着雷球炸裂的伤害，大片的残屑不断飞舞，抛洒在半空中后，就还原成无数只蛊虫的尸体。'
