- chapter: 872
  title: 第八百七十八节：再救夏琳
  content: '第八百七十八节：再救夏琳

    　　光芒一闪即逝，方源骤然出现在一个小型海岛上。

    　　“又来到这里了。”方源微微一笑。

    　　他这次接取的任务，就是来到这处海岛，要在附近的海里采集地沟黑油。

    　　这是他上一世探索龙鲸乐土时，接取的第一个任务，最是熟悉不过。

    　　“这一世的龙鲸乐土，和上一世有着许多变化。”

    　　“不仅是苍蓝龙鲸出现的位置改变了，参与的蛊仙增多，任务的内容和数量也变了。”

    　　“我完成了十多'
