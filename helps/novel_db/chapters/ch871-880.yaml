- chapter: 878
  title: 第八百八十四节：大型任务
  content: '第八百八十四节：大型任务

    　　海岛，金玉屋。

    　　“小丫头，将我们邀请过来，是为了什么？”

    　　“快说吧，我还有事情呢。”

    　　“没错，每年海市开启只有这段时间。耽误了时间，就是浪费财富啊！”

    　　诸多蛊师汇聚在金玉屋中，盯着蓝鳞少女夏琳，纷纷开口。

    　　他们等的已经有些不耐烦了。

    　　夏琳环视左右，微微带笑：“在场的诸位都是有头有脸的人物，那我就长话短说。从今以后，这座海岛就是我的地盘，由我掌控'
