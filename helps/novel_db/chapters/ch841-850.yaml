- chapter: 847
  title: 第八百五十三节：各方进展
  content: '第八百五十三节：各方进展

    　　眼前是一片贫瘠的灰白土地。

    　　土地干涸龟裂，形成道道沟壑，毫无肥力可言，寸草不生。

    　　房睇长望着这一片广袤的土壤，挥手洒下一蓬黄玉豆籽。

    　　豆神宫中封存了不少豆籽，主要有黄玉豆籽、碧玉豆籽、红玉豆籽、黑玉豆籽。除此之外，还有比较特别的蓝彩豌豆籽，白霜蚕豆籽。

    　　这些豆籽种植下去，悉心照料，等待一段时间之后，就能长成各种类别的豆神兵了。

    　　所以，豆神宫的招牌手'
