  title: 第八百五十节：新道痕、尊者路！
  content: '第八百五十节：新道痕、尊者路！

    　　疯魔窟，第六层。

    　　狼狈不堪的疯魔二怪倒在地上，秘谋人跪在地上，暂且不顾自身伤势，给不是仙疗伤。

    　　不是仙缓缓睁开双眼，苏醒过来，他先是懵懂，旋即反应过来，无比的庆幸和感激道：“我居然逃出来了，老大，你又救了我一命！”

    　　随后，他疑惑地问道：“怎么不见方源？等等，难道他没有及时撤退吗？”

    　　秘谋人苦笑：“没有。他现在还留在第七层。不过，分别时他说的也没有'
