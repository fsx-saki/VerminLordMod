- chapter: 842
  title: 第八百四十八节：再走第七层
  content: '第八百四十八节：再走第七层

    　　方源一席白衣，缓缓降落到疯魔窟中。

    　　在地面，有两位蛊仙早已经站立良久，恭候多时。

    　　一位蛊仙，面容白皙，黑色胡须飘飘，宽松大袖，双目锐亮似星，风度不凡，他号称不是仙，专修律道。

    　　另一位蛊仙，则身材矮小，只及方源的膝盖，一双小眼睛精芒烁烁，乃是秘谋人，专修智道。

    　　时至今日，方源已今非昔比，琅琊守卫战、光阴长河大战两次大战，都将天庭踩在脚下。期间，还把南疆'
