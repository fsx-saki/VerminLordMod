- chapter: 849
  title: 第八百五十五节：我会负责的
  content: '第八百五十五节：我会负责的

    　　华文洞天。

    　　大江东流，一艘五牙大舰正顺江而下。

    　　“江如碧带横天去，映照人心红丹玉！古文帝才华之卓绝，真是难以想象。想当年，他竟然以七岁之身，就能做出如此之诗。”苏琪涵望着宽阔的江面，喟然兴叹。

    　　她是当朝尚书之女，身姿窈窕，清秀纯美，温文尔雅，书香气质。除了她的美貌之外，她最令人称道的，便是她的才华。她满腹诗论，通晓史籍，能教世间绝大多数的男子都自愧不如。'
