- chapter: 850
  title: 第八百五十六节：吃鸡
  content: '第八百五十六节：吃鸡

    　　东海，古族大本营。

    　　大殿中，浩大的酒宴已经持续了数天。

    　　这时，侍者端上了一盘盘的喷香烤鸡。

    　　鸡当然不是寻常的鸡，而是仙鸡，至少是荒兽层次。而古族族长、方源分身吴帅享用的，则是上古荒鸡。

    　　待在这里这么多天，吴帅已经充分感知到了兽人的习俗——大口吃肉、大口喝酒，豪迈近乎狂妄，爽快接近无脑。若是能够得到兽人的认可，那么你就是座上宾，享用最美好的酒宴。若是得不到他'
