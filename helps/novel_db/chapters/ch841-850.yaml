- chapter: 846
  title: 第八百五十二节：灵
  content: '第八百五十二节：灵

    　　“元莲仙尊、乐土仙尊还有狂蛮魔尊？”方源心头一动。

    　　按照这些人形云雾土著的描述，方源很快就将这三位圣人和历史上的三位尊者对照起来。

    　　方源脑海中各种念头如闪电般闪烁：“这三位尊者都来过这里？那么之前的第七层，我还看到了幽魂魔尊、乐土仙尊、巨阳仙尊留下来的道痕之路……这么说来，至少有五位尊者来过这里了。”

    　　方源有些恍然，更有些迷惑。

