- chapter: 848
  title: 第八百五十四节：本体突破
  content: '第八百五十四节：本体突破

    　　疯魔窟第八层远比方源料想中的，还要广阔无垠。

    　　自从得知这里有尊者道场之后，他便在这里探索了很久，但是结果并不美好。

    　　方源见到了许许多多的世界生灭，也进出过一些大的世界，却始终找寻不到他想要到达的尊者道场。

    　　不过，他也并非没有收获，这些天的探索让他对第八层有了一层更深刻的理解。

    　　“这片虚无中，毫无上下左右等等方向的概念，所以它既是有限的，也是无限的。”'
