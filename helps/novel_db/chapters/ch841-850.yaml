- chapter: 845
  title: 第八百五十一节：第八层、天道
  content: '第八百五十一节：第八层、天道

    　　这里是一片广袤的草原。

    　　绿草茵茵，蓝天白云。

    　　天空中并无太阳，但是光线明亮。

    　　野花多多，竞相绽放，繁杂绚烂。

    　　空气中飘散着浓郁的花香，和风徐徐，吹拂着方源的面庞。

    　　方源愣了愣。

    　　“这就是疯魔窟第八层？”他不免诧异。

    　　按照疯魔三怪的推算，疯魔窟的倒数三层，应当都是第七层的景象，到处都是道痕堆叠。第八层的道痕规模，必然比第七层还要庞大。而在'
