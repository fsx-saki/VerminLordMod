- chapter: 841
  title: 第八百四十七节：八转蚁穴蛊
  content: '第八百四十七节：八转蚁穴蛊

    　　东海深处，古族大本营。

    　　福地时间已经过去了大半个月，尘封已久的封印彻底打开。

    　　此时在场的有不少蛊仙，方源的龙人分身吴帅、两大龙将，还有古族族长，以及数位兽人蛊仙。

    　　见到封印彻底解开，古族族长暗暗点头，更认定了吴帅的身份。

    　　这道封印，本来就是吴帅亲自布置，而后又经过历代古族族长加固。

    　　当初，吴帅意识到自身机会不大，便将一部分遗产，布置在了古族大本营'
