  title: 第七节：蛊师有九转，花酒留遗藏
  content: '第七节：蛊师有九转，花酒留遗藏

    　　很快，一个星期就过去了。

    　　“人是万物之灵，蛊是天地之精。在这个世界上存在着成千上万种，数不胜数的蛊。它们就生活在我们的周围，在矿土里，在草丛里，甚至在野兽的体内。”

    　　“在人类繁衍生息的过程中，先贤们逐步发现了蛊虫的奥妙。已经开辟空窍，运用本身真元来喂养、炼化、操控这些蛊，达到各种目的的人，我们统称为蛊师。”

    　　“而你们在七天前的开窍大典中，都已经成功开'
