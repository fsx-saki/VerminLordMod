    　　方源听到这里，开口问道：“那么现在这福地中，究竟有多少只蛊呢？”

    　　地灵狐仙便微微仰起脖子：“如今，有一转蛊八十六万余，涉及五十二种类。二转蛊十三万余，四十八种。三转蛊五千，十二种。四转蛊六十多只，八种。五转蛊一只，为狐皮蛊。”

    　　当年狐仙死后，执念不消，结合这片天地伟力，形成了地灵这样的奇特存在。也算是某种意义上的生命延续。

