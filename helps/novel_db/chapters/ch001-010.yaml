  title: 第二节：愧疚的太白云生
  content: '第二节：愧疚的太白云生

    　　修为停滞只是最主要的弊端，除此之外，还有其他小弊端。痛觉全无，是其一。思维僵化，是其二。

    　　这个世界上，智道早已经阐明人类思考的奥秘。

    　　人思考时，从脑海中产生一个个的念头。聪明人念头产生更快更多，蠢笨的人产生的念头则相对少而慢。

    　　这些念头相互碰撞、合并或者毁灭，最终得到一个或者几个全新的念头。这些新念头，就是思考的结果。

    　　脑海便是念头产生，生命思考的关键领'
