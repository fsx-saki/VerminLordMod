- chapter: 9
  title: 第九节：渐行渐远
  content: '第九节：渐行渐远

    　　红日西沉，但还未完全落下。

    　　天空还有着光，只是所有的事物都像是被蒙上了一层灰色。透过窗户远眺，远处的山，正渐渐地向沉重的黑色靠拢。

    　　客厅内光线暗淡，舅父舅母高座在主位上，面目表情都笼罩着一层阴影，看不大分明。

