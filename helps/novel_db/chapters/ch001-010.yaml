  content: '第一节：凤九歌

    　　九天后。

    　　青葱山谷，一挂微小瀑布垂下，如一条银亮的丝绸。

    　　瀑布之水激送到古潭当中，古潭深幽如玉，水面微起波澜。

    　　水中，各色的鲤鱼游曳。

    　　水边的白色岩石上，凤金煌盘坐着，双目紧闭。

    　　她那娇美亮丽的容颜，映照在水中，使得这汪古潭骤然间多了许多动人的美妙姿彩。水中的鲤鱼，清澈的潭水，银色的瀑布，青色的山谷都成了陪衬之物。

    　　然而，凤金煌好看的眉头却越皱越深。'
