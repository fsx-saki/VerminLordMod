  content: '第五节：荡魂山胆石

    　　方源细细数了一下，金碗当中共有青提仙元七十八颗。再算上碗底的那层青绿仙液的话，就是七十八颗半。

    　　仙元之充沛，是三王福地的上百倍！

    　　方源当即从中取出一颗青提仙元，捏在手中，然后念头一动，呼唤定仙游蛊。

