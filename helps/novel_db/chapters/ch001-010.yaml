  title: 第五节：人祖三蛊，希望开窍
  content: '第五节：人祖三蛊，希望开窍

    　　霎时间，周围一静，无数道目光向自己投射而来。

    　　“真是越来越精彩了。”方源在心底笑了笑，众目睽睽之下，他淌过河水，踏上对岸。

    　　顿时，他就感到一层压力。

