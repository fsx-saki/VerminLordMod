- chapter: 3
  title: 第三节：请一边玩蛋去
  content: '第三节：请一边玩蛋去

    　　邦、邦邦，邦、邦邦。

    　　巡游的更夫，敲着有节奏的梆子。

    　　声音传入高脚吊楼，方源睁开干涩的眼皮，心中暗道：“是五更天了。”

    　　昨夜躺在床上思索了很久，计划安排了一大堆，算起来只睡了一个时辰多丁点。

    　　这个身体还没有开始修行，精力并不旺盛，因此一阵阵的疲累困乏之意，仍旧笼罩着身心。

    　　不过五百多年的经历，早就打造了方源钢铁般深沉的毅志。这点嗜睡之意，根本就算不了什'
