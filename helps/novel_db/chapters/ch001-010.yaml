  title: 第五节：人祖三蛊，希望开窍
  content: '第五节：人祖三蛊，希望开窍

    　　霎时间，周围一静，无数道目光向自己投射而来。

    　　“真是越来越精彩了。”方源在心底笑了笑，众目睽睽之下，他淌过河水，踏上对岸。

    　　顿时，他就感到一层压力。

    　　这压力来自于花海深处的灵泉，灵泉产生元气，因为元气太过于浓郁充沛，便导致了压力。

    　　但是很快，从方源脚边的花丛中，就升腾起一阵光点。

    　　光点飘摇，笼罩住方源的全身，最后悉数投入到他的体内。

    　　“这就是'
