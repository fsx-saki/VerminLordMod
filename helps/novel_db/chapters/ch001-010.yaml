- chapter: 4
  title: 第四节：古月方源！
  content: '第四节：古月方源！

    　　朝阳升起来，霞光烂漫。

    　　山雾不是很浓，被利剑般的阳光轻易洞穿。

    　　一百多位十五岁的少年，此刻汇集在家主阁前。

    　　家主阁就处在山寨的正中央，高达五层，飞檐翘角，重兵把守。阁前就是广场，阁内供奉着古月先人的牌位。每代族长也都生活起居在这里面，每逢重大典礼，或者有突发大事，也会在这里召集家老们商讨议论。这是整个山寨的权利中枢。

    　　“很好，都准时来了。今天是开窍大典，是你'
