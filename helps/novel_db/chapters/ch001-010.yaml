    　　几个呼吸后，它完全停滞悬空，在浓郁的夜幕下，静静漂浮。

    　　悄无声息地，它庞大如山丘的身躯缓缓消散，露出一个蛊仙来。

    　　这位蛊仙脸色苍白，黑发垂胸，赫然便是魔尊幽魂'
