- chapter: 2
  title: 第二节：逆光阴五百年觉悟
  content: '第二节：逆光阴五百年觉悟

    　　传说中，这个世界存在着一条光阴之河，支撑着这个世界的流转。而利用春秋蝉的力量，就能逆流而上，回到从前。

    　　对这个传闻，世人众说纷纭。很多人并不相信，有些人则将信将疑。

    　　几乎没有人真的确信。

    　　因为每一次使用春秋蝉，都必须付出生命，将整个身躯和所有的修为统统献祭，作为驱动的力量。

    　　这个代价实在太昂贵了，更让人无法接受的是——往往付出了生命，也不知道结果怎样。'
