  - 古月赤城身材矮小，满脸麻子，捏着拳头，满脸出汗，显得特别的紧张。
- chapter: 1
  title: 第一节：纵身亡魔心仍不悔
  content: '第一节：纵身亡魔心仍不悔

    　　“方源，乖乖地交出春秋蝉，我给你个痛快！”

    　　“方老魔，你不要妄图反抗了，今日我们正道各大派联合起来，就是要踏破你的魔窟。这里早已经布下天罗地网，这次你必定身首异处！”

    　　“方源你个该死的魔头，你为了练成春秋蝉，杀了千万人的性命。你已经犯下了滔天的罪孽，罪无可恕，罄竹难书！”

    　　“魔头，三百年前你侮辱了我，夺走了我的清白之身，杀光我全家，诛了我的九族。从那刻起，'
