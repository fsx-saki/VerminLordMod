- chapter: 6
  title: 第六节：未来的路，会很精彩
  content: '第六节：未来的路，会很精彩

    　　空窍玄妙异常，虽然寄托在方源体内，但是却不和五脏六腑同处一个空间。你可以说它无限大，又可以说它无限小。

    　　有人称之为紫府，有人称之为华池。不过更多人称之为元海空窍。

    　　整个空窍呈球形，空窍表面流动着白光，是一层光膜。就是先前的希望蛊炸裂开来，凝聚的一层光。

    　　正是因为有了这层光膜，才支撑着空窍，不会塌陷。

    　　空窍之中，自然就是元海。

    　　海水平滑如镜，呈现一'
