  content: '第十节：天有不测风云，炼蛊别具艰辛

    　　啪啪啪……

    　　豆大的雨点，密集地下着。打在苍翠的竹楼上，发出脆响。

    　　楼前池塘中，水面被雨点激打着，鱼儿在水里快活地穿梭着，水草在池底摇曳。

    　　阴云密布，整个视野都被一层浓密厚重的雨帘遮挡起来。

    　　在有些昏暗的房间里，窗户开着，方源静静地看着这场大雨，心中幽幽一叹：“已经三天三夜了。”

    　　三天前的那晚，他拎着两坛酒，出了山寨，在周边继续探索。'
