- chapter: 8
  title: 第八节：物是人非
  content: '第八节：物是人非

    　　学堂旁设立了一个蛊室。蛊室并不大，只有六十平方米。

    　　蛊师修行，蛊虫就是实力的关键。

    　　课程一结束，兴奋的少年们就向蛊室蜂拥而来。

    　　“排队，一个个的进来。”怒喝声骤起，蛊室门外自然有人把守。

    　　少年们一个个的进去，又出来。

    　　轮到方源走进蛊室。

    　　只见这房间内大有乾坤，四壁都做成隔洞，这些内嵌的方格子一个挨着一个。格子有大有小，大的超不过砂锅，小的小不过拳头。'
