- chapter: 765
  title: 第七百七十节：天作之合！
  content: '第七百七十节：天作之合！

    　　轰隆隆。

    　　方源悬浮高空，俯瞰脚下。

    　　巨大的山脉在崩溃坍塌，五色的光气仿佛沸腾起来，剧烈宣泄。

    　　但偏偏各色光气之间并不交融，也不相互干扰，各行其是。

    　　“要正确的摧毁五色山脉，并不是那么简单。上一世的武庸，也是得到了乔家钻研此处传承多年的积累，方能功成。”方源心道。

    　　陶铸真传要引出来，需要破坏整个五色山脉。

    　　这样的动静非常巨大，之前方源一直都按捺不'
