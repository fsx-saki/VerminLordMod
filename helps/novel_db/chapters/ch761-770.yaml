- chapter: 761
  title: 第七百六十六节：参悟尊者真传
  content: '第七百六十六节：参悟尊者真传

    　　方源的智道手段十分丰富，并不需要成竹在胸、运筹帷幄来弥补，他练习这些杀招，更多的是增加对手上的元莲真传、巨阳真传的理解。

    　　这些天来，方源本体一直在钻研着元莲真传、巨阳真传以及盗天真传。

    　　长毛老祖的炼道真传，方源已经全部掌握，理解得十分容易，毕竟他是炼道准无上境界。

    　　对于元莲真传，方源组建出了六转因果神树杀招，算是打开了局面。

    　　但因为木道仙蛊、木道境'
