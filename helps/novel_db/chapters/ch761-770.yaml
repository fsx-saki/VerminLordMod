    　　这是八转律道仙蛊——加！

    　　它以珠线水为食。

    　　珠线水是一种八转的水道仙材，表面上看去是一团清澈无垢的水，毫不出奇。但若是伸手探入水中，轻轻一捏，就能把握住一股水线，将水线提出水面。

    　　水线绵绵不断，水线上凝聚着一'
