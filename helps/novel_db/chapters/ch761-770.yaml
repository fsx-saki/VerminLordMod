- chapter: 768
  title: 第七百七十三节：怀疑重生
  content: '第七百七十三节：怀疑重生

    　　天庭。

    　　光明无限，仙殿重重。

    　　中央大殿之后，一座高塔矗立着，浑身笼罩着一层白金光晕。

    　　正是八转仙蛊屋监天塔。

    　　围绕着监天塔，数位天庭蛊仙正相互配合，紧张忙碌。

    　　在他们的劳作下，一座炼道大阵正在逐渐成型。

    　　一位高大雄健的蛊仙，站在阵外打量。虽然只是简简单单的站着，却给人巨柱擎天之感。

    　　正是龙公！

    　　“拜见龙公大人。”紫薇仙子这时赶来，站到龙'
