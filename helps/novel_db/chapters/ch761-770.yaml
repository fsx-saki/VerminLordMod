- chapter: 769
  title: 第七百七十四节：吞吞吞！
  content: '第七百七十四节：吞吞吞！

    　　至尊仙窍。

    　　杳无人烟的小黄天之中，一道身影电射而来。

    　　身影猛地顿住，落在一群蛊仙面前，正是方源的宙道分身。

    　　“拜见方源大人！”

    　　“拜见宗主！”

    　　群仙一齐施礼。

    　　放目望去，除了影无邪已经继续坐镇青鬼沙漠，方源的麾下已是到齐。

