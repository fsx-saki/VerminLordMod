- chapter: 766
  title: 第七百七十一节：律道大宗师
  content: '第七百七十一节：律道大宗师

    　　将陶铸真传收刮一空，方源便立即离撤离五界山脉。

    　　和上一世一样，这座山脉同样没有逃脱得了被毁的结局。但是对于方源而言，结果是不一样的。

    　　上一世，他埋伏设计，一力挑起五界山脉大战，意外地惹出陶铸真传，但已经没有机会，只得撤离战场。

    　　这一世，方源顾忌墨水效应，一直隐忍，直到埋伏了南疆追辑的队伍，大获全胜之后，这才觉得时机成熟，提前来收取了这份真传。

    　　再过一'
