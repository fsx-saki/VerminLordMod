- chapter: 762
  title: 第七百六十七节：第二次埋伏战
  content: '第七百六十七节：第二次埋伏战

    　　最新的情报，传达到池曲由这里时，他正站在窗前，眺望着远处的青山。

    　　“哦？这么快就堵住了方源？看来他这一次，恐怕是在劫难逃了。”池曲由目光微动了一下。

    　　“这方源居然在南疆渡劫，留下了线索。唉，就算是一心想要冲击八转，也不该如此莽撞啊。”

    　　“也是……他前番击退了天庭进攻，而后又暗中与我交易，太过顺利了啊，难免有些心态膨胀，看轻我南疆正道。”

    　　池曲由认为'
