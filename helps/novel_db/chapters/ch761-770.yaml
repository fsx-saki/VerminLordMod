- chapter: 770
  title: 第七百七十五节：又得律道八转仙蛊
  content: '第七百七十五节：又得律道八转仙蛊

    　　一只仙蛊悬浮在方源的面前，散发出八转气息。

    　　这只仙蛊如同一个蚕蛹，但并非是白色，而是浑身漆黑如铁。把握在手，也有冷硬沉重的金属质感。

    　　这是八转律道仙蛊——加！

    　　它以珠线水为食。

    　　珠线水是一种八转的水道仙材，表面上看去是一团清澈无垢的水，毫不出奇。但若是伸手探入水中，轻轻一捏，就能把握住一股水线，将水线提出水面。

    　　水线绵绵不断，水线上凝聚着一'
