    　　群仙心潮起伏，经历了一波波的震撼后，他们已'
  - '断缩减，直至消散全无。

    　　唯有搭配魂魄，才能算得上是一具分身。

    　　因此这具纯梦求真体，只能算半个梦道分身。

    　　不过这已经足够眼下的需求了。

