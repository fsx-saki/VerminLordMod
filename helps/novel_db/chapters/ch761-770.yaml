- chapter: 764
  title: 第七百六十九节：被解决的巴十八
  content: '第七百六十九节：被解决的巴十八

    　　影无邪等人顿时面色肃穆起来，眼中精芒四射。

    　　一些异人蛊仙则有些迟疑，心想：怎么现在就动用最强手段，未免有些早了点吧？

    　　方源却是有上一世的记忆，他知道夏槎其实暗中探查出许多大阵奥妙，只是隐忍不发而已。上一世她忽然爆发，结果令白兔姑娘阵亡，方源一方好生狼狈。

    　　这一世，方源当然不会犯同样的错误。

    　　“那我们先对谁下手？陆畏因，还是夏槎？”白凝冰问道。'
