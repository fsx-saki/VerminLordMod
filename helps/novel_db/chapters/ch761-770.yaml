- chapter: 767
  title: 第七百七十二节：正道头疼
  content: '第七百七十二节：正道头疼

    　　武家大本营。

    　　书房中，光线晦暗。

    　　武庸脸色铁青，直直的坐着，宛若一尊石像。

    　　他手中的信道蛊虫，因此之前的催动，还残留着一些余温。

    　　刚刚又是一场南疆正道内部的高层会议，热闹得仿佛菜市场，夏家、巴家的蛊仙几乎在尖叫，在高喊，他们的声音明显带着恐慌和无措。

    　　绝大多数的人都在嘈杂的议论，近乎争吵，似乎在宣泄着震惊和惶恐的情绪。

    　　“这怎么可能？！”'
