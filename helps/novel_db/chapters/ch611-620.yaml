- chapter: 613
  title: 第六百一十七节：攻守
  content: '第六百一十七节：攻守

    　　“呼……”方源吐出一口浊气，缓缓睁开双眼。

    　　这是一处地下的小洞，洞壁上燃烧着点点幽火，形成天然的阵法。虽然防御不强，但也有着良好的示警作用。

    　　方源在光阴长河中了天庭埋伏，拼尽全力奋斗搏杀，总算是杀出一条血路来。

    　　甩开了清夜等人之后，方源顺着一条光阴支流，来到外界南疆。

    　　南疆乃是影宗大本营，紫山真君曾经在各处布置了这种幽火小洞。方源动用定仙游杀招，随意挑选了'
