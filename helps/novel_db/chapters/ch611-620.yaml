- chapter: 620
  title: 第六百二十四节：很有意思
  content: '第六百二十四节：很有意思

    　　面对方源凝如实质的杀意，白凝冰却展颜一笑，双眼坦然地直视方源，反问一句：“我为何要逃？”

    　　顿了一顿后，她又道：“戚家蛊仙虽然逃了，那是他们对你不了解。你我同是青茅山的人，依我对你的了解，他们能逃得掉？呵呵，既然逃不掉，我又何必逃呢？我不仅不会逃，而且恰恰相反，我还要加入影宗。”

    　　方源皱起眉头：“我也曾想过，可惜你的白相杀招，实在是太精妙了，几乎能破解一切盟约。'
