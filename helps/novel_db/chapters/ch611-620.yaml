  title: 第六百一十五节：你骗我！
  content: '第六百一十五节：你骗我！

    　　仙道杀招——万蛟！

    　　嗷吼吼……

    　　一时间，万千蛟龙飞舞，银鳞似海，铺天盖地般杀向威猛老者。

