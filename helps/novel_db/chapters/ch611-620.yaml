- chapter: 618
  title: 第六百二十二节：天相争夺
  content: '第六百二十二节：天相争夺

    　　“天相？！”方源讶异，同时又恍然。

    　　一切都明白了。

    　　盗天魔尊乃是天外之魔，他擅长宇道，开创偷道，炼道方面也有极强的天赋。

    　　他一生致力于超脱蛊师世界，回到自己的家园去。

    　　他是所有尊者中最为富有的一位，四处收集仙材，大炼仙蛊。他游历地方最多，足迹几乎遍布五域两天。

    　　在某一次游历白天的时候，他意外地发现了一个奇妙的存在，研究之后，命名为自然天灵。

    　　饶'
