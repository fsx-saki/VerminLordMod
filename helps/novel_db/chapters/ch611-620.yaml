- chapter: 617
  title: 第六百二十一节：赌约至宝
  content: '第六百二十一节：赌约至宝

    　　刺眼的光辉，逐渐消散。

    　　方源定睛一瞧，周围环境已然剧变，自己被门楼挪移到了一处小世界里去。

    　　白凝冰就在他的身旁，和方源保持着传送之前的距离。

    　　忽然，白凝冰神色一动，一股神秘的信息传送到她的心底。她看了一眼方源，见他神情无动于衷，心底犹豫了一下，终究还是开口道：“这里是一片公共洞天，曾经巡天五相各捐赠了一部分的仙窍融合而成。整个洞天分为五块，各域之间不能流窜'
