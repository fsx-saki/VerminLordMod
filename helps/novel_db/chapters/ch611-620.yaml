- chapter: 614
  title: 第六百一十八节：后勤
  content: '第六百一十八节：后勤

    　　至尊仙窍。

    　　小西漠。

    　　方圆上千里地，均是一片雪白。方源的宙道分身涉足此地，弯下腰抓起一把沙子来，放在眼前端详。

    　　这些沙子颗颗饱满，晶莹如冰，透着一丝寒意。

    　　此时尚是晴朗的白日时分，小西漠的气温并不低，但在这片沙漠中却是叫人感到凉爽舒适。

    　　方源分身又拈起一小撮的雪白沙子，放到嘴里。沙子遇到口水后，立即融化，产生一股淡淡的咸味。

    　　这就是盐沙。

    　　盐沙'
  gu_mentioned:
  - 梦道凡蛊
  char_appear:
  - 夏槎
  - 方源
  events:
  - '，都是可以媲美龙鱼的生意。比如夏槎洞天的年华池就是其中之一。

    　　因此，方源仍旧是日进斗金，甚至积累仙元石的速度比之前还要迅猛数倍。

    　　而之前他苦心经营，仙蛊喂养也几乎没有什么缺口。纵然是多了一些仙蛊战'
  - '个仙窍的毛民，都聚集起来，放到市井中圈养。

    　　目前而言，圈养毛民对方源的帮助是最大的。

    　　方源将梦道的一些蛊方，以及修行之法都传授给这些毛民。这些毛民的主要任务，就是进入自己的梦境，搜刮出梦道蛊材，然'
  - '视察的倒数第二项资源点。

    　　下一刻，方源分身来到市井之中。

    　　市井里头，已经聚集了一群规模可观的毛民。

    　　这些毛民大多是方源从南疆蛊仙仙窍中俘获的，南疆蛊仙或多或少都豢养了一批毛民，用来炼制凡蛊。'
  - '城主却摆手：“衣袍再珍贵，也比不上人的命。我有备用的衣袍，这就给你。不过我的坐骑，却非得实力高超的蛊师才能驾驭。给你的话，反而是害你的命啊。”

    　　说完，城主果然将衣袍，还有大量的清水、干粮，交到老者手'
  - '之后，就变成了雪白的盐沙。城主掌握了这样一片巨大的沙漠，便将这些盐沙当做食盐贩卖，不愁销路，使得城池起死回生，更日益壮大起来。

    　　时至今日，盐沙已经不是西漠独有的产物，早已遍及其他四域。

    　　方源至尊仙窍中'
  - '备一直在缓缓上升。

    　　他自然不想白白浪费时间，便前往白天。这个时间点正是要五相封印开启，再一次进行千年赌约！第六百一十八节：后勤'
  - '方，以及修行之法都传授给这些毛民。这些毛民的主要任务，就是进入自己的梦境，搜刮出梦道蛊材，然后炼制出梦道凡蛊，交给方源使用。

    　　方源的解梦杀招，对梦道凡蛊有着巨大的损耗。

    　　之前方源大肆探索梦境，已经是将'
  - '，都是可以媲美龙鱼的生意。比如夏槎洞天的年华池就是其中之一。

