- chapter: 611
  title: 第六百一十五节：你骗我！
  content: '第六百一十五节：你骗我！

    　　仙道杀招——万蛟！

    　　嗷吼吼……

    　　一时间，万千蛟龙飞舞，银鳞似海，铺天盖地般杀向威猛老者。

    　　明白了宙道大阵的底细之后，方源无奈舍弃了威能最强的宙道手段，但却可以动用其他手段。比较起来，方源的手段反而丰富起来。

    　　威猛老者冷哼一声，脸上毫无意外之色。

    　　他来此之前，就已经做好了充分的战斗准备，熟知方源的万蛟杀招。

    　　“泥鳅样的东西，也能奈何得住老夫？”威'
