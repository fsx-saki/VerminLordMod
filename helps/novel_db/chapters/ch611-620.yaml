- chapter: 615
  title: 第六百一十九节：魔王！
  content: '第六百一十九节：魔王！

    　　太古白天。

    　　原本空无一物的苍穹之中，此刻却显露出了一座高大的门楼。

    　　门楼顶部屋檐飞扬，门楣上双面砖雕，挂着一张巨大的门匾，上书“五相赌斗门”五个大字。

    　　整座门楼好似黄铜质地，散发着威武雄阔之气。起初它只是一片虚影，但随着时间推移，逐渐凝实，越发清晰。

    　　戚家蛊仙一共六位，此刻都站在门楼外，等候着门楼最终凝成实质。

    　　领头的一位蛊仙老者，身材干瘦，但精神矍'
