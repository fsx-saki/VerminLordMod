- chapter: 612
  title: 第六百一十六节：飞刃摄敌
  content: '第六百一十六节：飞刃摄敌

    　　一番苦战，斗智斗力，方源终于突破天庭的埋伏，逃进光阴长河之中。

    　　一出大阵，方源就感觉到维持逆流护身印艰难了数倍，他连忙停用此招，换成宙道杀招冬裘。

    　　仙道杀招——见面曾相识！

    　　下一刻，方源变作了太古年兽。

    　　因为是在光阴长河中变化，变化道也受到大环境的压制。虽然成功催动了此招，但是仙元的消耗是正常情况下的数十倍！

    　　幸好见面曾相识的核心，乃是态度蛊，只需'
