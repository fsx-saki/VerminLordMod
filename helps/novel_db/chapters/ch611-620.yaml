- chapter: 616
  title: 第六百二十节：他作弊！
  content: '第六百二十节：他作弊！

    　　“大家不要慌。”戚发开口，声音干涩沙哑。往日里笔挺的身躯，此刻却好像是风中的竹竿，正在轻轻的颤抖着。

    　　无人取笑。

    　　戚家蛊仙三位七转，两位六转，联手起来也不是方源的对手。在方源面前，他们就是砧板上的鱼肉，任由宰割。

    　　戚发开了口后，又鼓起勇气继续道：“我们现在已经在赌斗门前，得到门楼的认可，能够探索那片洞天世界，所以也就受到门楼的保护。方源要来斩杀我们，就得先迈'
