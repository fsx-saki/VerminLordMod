- chapter: 619
  title: 第六百二十三节：白叛
  content: '第六百二十三节：白叛

    　　戚家蛊仙们众志成城，焦急、恐慌，又鼓起勇气，拼命死战，对抗方源。

    　　方源皱起眉头，他发现自己的意志并不能无限地灌输进来，而是达到某个极限后，就无法灌输进去了。

    　　并且自身意志灌输进去后，本体就只能旁观，任由意志独立作战。因此，海量的智道手段都在这里毫无用处。

    　　天相杀招高达九转，方源的种种智道手段，最多也只是八转。就算对天相杀招有些威胁，方源也不愿意用，因为一旦激发'
