- chapter: 67
  title: 第六十七节：你放心，我会饶了你们的
  content: '第六十七节：你放心，我会饶了你们的

    　　树，根扎山土，将翠绿的手伸向天空。

    　　一棵棵粗壮的树干，遥相对望。繁茂的枝叶则在半空中交错。

    　　在这些树木的环绕之下，有一间木屋。

    　　木屋全有粗壮的树干打造而成，透露出一股敦厚坚实的味道。木屋并不是新近打造的，而已经有些年岁，因此木屋的表面爬着青苔，甚至有些树干上还发出了细嫩的枝丫。

    　　木屋一周，是用青矛竹围成的高大的竹栅栏。前后边都是菜地，菜地中央'
