- chapter: 64
  title: 第六十四节：接见
  content: '第六十四节：接见

    　　商燕飞面含微笑，走入屋内。

    　　小蝶慌忙行礼，商心慈却坐在桌旁，一动不动，甚至连瞳眸都未转动。

    　　商燕飞也坐到桌旁，声音轻缓温和至极：“慈儿，现在感觉怎么样？”

    　　商心慈并非刁蛮性格，她站起身来，退后几步，轻轻万福一礼：“商家族长大人不用过多挂怀，小女子只是情绪过于激动才昏倒的，如今已经恢复，耳清目明，没有事了。”

    　　商燕飞连忙摆手：“呵呵呵，慈儿你没事就好，坐，坐下来'
