  - 洞天当中，有不少荒兽，甚至上古荒兽，其中就有一头星魔蝠荒兽。
  - 你该将江山如故、人如故两大仙蛊还给我了。
  - 又能贩卖胆识蛊，借此打开了一丝中洲的局面。
  - 繁星洞天的主人，是一千七百年前的八转蛊仙七星子。
  - 化解了仙鹤门进攻狐仙福地的重大危机。
  - 太白云生接过两蛊，也不查看，急冲冲地就要走。
- chapter: 62
  title: 第六十二节：蛊室再选蛊
  content: '第六十二节：蛊室再选蛊

    　　朝阳冉冉升起，又是新的一天。

    　　学员们都排好了队伍，一个个面色兴奋，站在学堂蛊室之前。

    　　今天可是选择第二蛊虫的好日子！

    　　方源是第一个晋升中阶，拥有优先选择的权利，因此站在队伍的第一位。

    　　在他的身后，依次是古月漠尘、古月方正，以及古月赤城。

    　　吱呀。

    　　蛊室的门，被侍卫们打开，方源第一个迈入其中。

    　　蛊室虽不大，却内有乾坤。四周的墙壁都打出一个个的方形'
