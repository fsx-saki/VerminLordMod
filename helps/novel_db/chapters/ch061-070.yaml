  title: 第六十三节：卖不出去
  content: '第六十三节：卖不出去

    　　三百一十？

    　　看到老者比出的数目，方源微微挑起眉头。

    　　酒虫市价五百八十块元石，书虫有时候略高一点，达到六百。黑白豕蛊也是六百块元石。但以上这些蛊，皆是一转的珍稀蛊，因为数量稀少，所以价格昂贵。

    　　普通的一转蛊，大约在二百五十块元石左右。

    　　而生机叶这种消耗类的一转蛊，则是五十块元石一片。

    　　将骨枪蛊的卖价，定为三百一十，已经算是不错。通幽商铺的这个老者，没有胡'
