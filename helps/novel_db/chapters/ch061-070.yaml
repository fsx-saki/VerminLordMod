- chapter: 69
  title: 第六十九节：命贱如草
  content: '第六十九节：命贱如草

    　　兽皮地图很厚，不像是纸张折叠起来就能方便携带。方源只能将兽皮卷起来，放回到竹筒当中，再将竹筒两端用麻绳系着，背在背上。

    　　两个猎人紧紧地盯着竹筒，眼中不可避免地流露出贪婪的神色。他们也不是蠢蛋，自然知道其中的价值。

    　　这兽皮地图虽然蛊师们看不上，但是对于凡人，尤其是他们这样的猎户来讲，就是一个至宝了。

    　　王家从祖辈开始，就传承下来的东西。王老汉能成为远近闻名的猎头，'
