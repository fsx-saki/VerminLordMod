- chapter: 65
  title: 第六十五节：还不快滚
  content: '第六十五节：还不快滚

    　　漫漫山林，方源谨慎地行进着。

    　　阳光透过高大的树木，照进来，一片斑驳零碎的树影。

    　　脚边青草茵茵，野花烂漫。

    　　耳边是鸟鸣声，或是潺潺的流水声。

    　　越远离山寨，向外围行进，就越是危险。所以方源更是小心翼翼。

    　　野外是十分危险的，蛊师至少得有三转修为，才能独自一人，在野外探险。但这并不意味着安全，很多三转蛊师都死在野外，甚至还有四转。猛兽、毒虫、人祸，还有时不时的'
