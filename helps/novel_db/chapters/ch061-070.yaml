    　　所以她心中焦躁。

    　　因为她已经预感到，方源这混蛋必定会毁约。但她偏偏拿方源没有办法，阳蛊在方源手中，她投鼠忌器得很。

    　　如今没有百家的追捕，没有兽潮，方白二人同桌吃饭，看似和谐温馨，但实'
  - '过两三步远，看似好友，但心中都在算计对方。

    　　外在的压力消退下去，他们二人间的矛盾顿时凸显出来。在商家城这相对安全的环境中，他们也有功夫可以思考这些东西了。

    　　但越是思考得深入，这两人就越觉得棘手！'
- chapter: 62
  title: 第六十二节：商家内城
  content: '第六十二节：商家内城

    　　方源缴纳了两百块元石，和白凝冰一起进入内城。

    　　内城虽然是建造在山中，但街道宽阔，足可供十辆马车并排而行。

    　　一进入这里，人流骤然减少，只剩下外城的一半不到。

    　　但是蛊师却已经随处可见，一转满地走，二转蛊师掺杂其中，偶尔有一两位三转。

    　　普通的凡人非常少，毕竟要进入这里，每人得需要一百块元石。很多蛊师纵然有贴身家奴在身边服侍，也不愿花这份冤枉钱。

    　　内城的照明，'
