- chapter: 64
  title: 第六十四节：暗事好做，明事难成
  content: '第六十四节：暗事好做，明事难成

    　　这几天，气温越来越高了。

    　　正午，烈日高照，恣意地挥洒下热情。

    　　商队走了，客栈中的生意又冷清下来。

    　　方源步入饭堂，立即引起了伙计们的注意。

    　　一个熟脸立即屁颠屁颠地跑过来，脸上堆着谄媚的笑意：“哎，公子，您来啦！快请里面坐。”

    　　“给我一坛酒，再切一斤牛肉，再来几个小菜。”方源迈进了饭堂，走向窗口的老位置。

    　　伙计的脸色露出难色：“公子，不好意思'
