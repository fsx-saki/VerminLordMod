    　　他现在对白云也多加注意，上一次在南疆，就碰到了那群讨厌的云兽。

    　　吃一堑长一智，方源对任何大面积的白云，都抱着谨慎的态度。

    　　侦查一番后，方源微微放松下来，这片白云没有任何问题。

    　　他这才飞入云中。

    　　视野中，顿时被一片白茫茫的云气覆盖。

    　　不过没有关系，方源还有其'
