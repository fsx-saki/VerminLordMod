    　　蛊虫和蛊师之间的感应，和距离有很大关系。蛊虫距离蛊师越远，感应就越弱。蛊师使用蛊虫时，心念频动，发下十个命令，'
  - '第六十八节：斩杀星魔蝠

    　　井水很快又平静下来，没有一丝波澜，仍旧熠熠生辉。

    　　但，方源投下的那只凡蛊，却在井水中彻底消'
  - '”石磊大喝一声，浑身爆发出刺眼的金色光辉。

    　　光辉迅速散去，石磊已经消失不见，取而代之的是一头荒兽铁冠鹰。

    　　铁冠鹰张开双翼，盘旋于空，铁刺利爪，散发逼人的悍勇气息。身躯之庞大，一点都不输于星魔蝠。'
