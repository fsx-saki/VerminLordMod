- chapter: 66
  title: 第六十六节：人死如猪死
  content: '第六十六节：人死如猪死

    　　“滚？”方源听了王二这话，顿时一声冷笑，挥掌朝前一切。

    　　哧。

    　　一声轻响，幽蓝色的月刃，迅速射出。

    　　同时，他脚下一蹬，猛地向这四个猎手冲杀过去。

    　　“蛊师？！”猎手们看到这月刃，顿时就有人震惊地大叫一声。

    　　月刃已经射来，他们连忙四散躲闪。

    　　噗。

    　　一人躲闪不及，右手小臂被月刃射中，顿时骨肉分离，手腕连着半个前臂被切得掉在地上。

    　　“啊啊啊！”'
