- chapter: 63
  title: 第六十三节：月下赠玉皮，地花藏白豕
  content: '第六十三节：月下赠玉皮，地花藏白豕

    　　日落月升，夜幕降临。

    　　这是古月山寨中一处隐蔽的院落里。

    　　一株高大的槐树，枝繁叶茂，雄厚宽大的树冠，宛若碧玉华盖，将整个院子都笼罩住。

    　　月光温柔如水，透过槐树的枝叶，洒在庭院中。

    　　一阵风袭来，树叶沙沙作响，树影微微晃动。

    　　就在这树影下，站着两个人。

    　　族长古月博用柔和的目光注视着方正：“方正，今天你选择了第二只蛊，不知是什么？”

    　　“禀'
