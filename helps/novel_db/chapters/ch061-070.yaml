    　　但是他不好明说，只能旁敲侧击，加以引导，让琅琊地灵自己“领悟”出答案来。

    　　太丘，北原十大凶地之一。

    　　在这里，长满了一种巨人草。这种草，极其粗壮巨大，一棵草堪比寻常的百年大树。

    　　太丘上，到处长满了这样的巨人草。

    　　巨大的草丛，连绵成一大片的原始丛林。

    　　丛林里生活着大量的荒兽、上古荒兽，甚至'
