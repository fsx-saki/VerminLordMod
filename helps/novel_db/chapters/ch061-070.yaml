  events:
  - '体型硕大，堪比大象。皮毛油光锃亮，富有野性的魅力。残留的气息，彰显出黑豹的身份——这是一头货真价实的荒兽。

    　　“这是荒兽绝影豹啊。”方源低声叹道。

    　　“是谁斩杀了这头绝影豹，却还把荒兽的尸体遗留在这里'
  - '着一个微小身影。

    　　回溯蛊只是五转凡蛊，不管是石磊或者绝影豹、万象星君，都是六转级数，仙体兽体都有道纹道痕，因此侦察的效果十分有限。

    　　黑楼兰凑过来，看了一阵。

    　　无声的战斗画面十分模糊，并不分明。'
  - '他们此时动用的，都是正统侦察、反侦察手段，线迹蛊恰巧钻了他们反侦察的空白之处。方源的手段，毕竟来源于五域乱战时期，是整个五域的智慧结晶，等若领先于现在蛊仙半个时代之多，当然优势巨大！

    　　啪啪啪。

    　　方源又'
  - '尊的宝贵真意，都让给了方源。方源也真是狠人，直接一口吞了，连口汤都没给黑楼兰留下。

    　　后来，方源做胆识蛊生意，主动让利给黑楼兰、黎山仙子。虽然过程中，需要黑楼兰的力气仙蛊，但黑楼兰却始终感觉不舒服，仿佛受'
  - '疼了一下，将回溯蛊的焦尸，又投入自家仙窍，争取不留下任何蛛丝马迹。

    　　这种回溯蛊，哪怕他最近一直在宝黄天中收集，统共只收集了五六十只。这还是五域和平时期，要是乱战中后期，回溯蛊广泛运用，十分紧俏，都是自产'
  - '方源一一动用手段，或隐身，或动用蛊虫针对，在或遁地顺水种种，晃过这些侦察蛊虫。

    　　两人原本想走到第八星殿的下面，这样一来，直线距离最短，就最为接近第八星殿。碰到机会，也能迅速反应，用最短的时间冲上第八星殿'
  - 她借力方源，成功渡过天灾，晋升成仙，原本以为可压过方源一头了。但很快，方源又向她和黎山仙子借力，将仙鹤门的蛊仙都唬住。整个过程不战而屈人之兵，令黑楼兰都没有出手的机会。既然没有战损，方源就没有双倍的补偿，
  - '两个巨大身影在剧烈战斗，旁边还远远站着一个微小身影。

    　　回溯蛊只是五转凡蛊，不管是石磊或者绝影豹、万象星君，都是六转级数，仙体兽体都有道纹道痕，因此侦察的效果十分有限。

    　　黑楼兰凑过来，看了一阵。

    　　无'
- chapter: 61
  title: 第六十一节：贵精不贵多？
  content: '第六十一节：贵精不贵多？

    　　方源一番话，有理有据，琅琊地灵听得连连点头。

    　　“有道理，有道理！”他交口称赞。

    　　“不敢。这只是我个人的一丝浅见。”方源谦虚。

    　　地灵单纯，不懂得方源的谦虚，摇头反驳：“不，这绝不是浅见，而是真知灼见。你这番话，对我启发很大，对琅琊派的贡献也很大。”

    　　“本来按照琅琊派的规矩，单凭这个功劳，你的地位就能提升一格。例如毛六就能升为毛五。但你现在还不是真正的毛民'
