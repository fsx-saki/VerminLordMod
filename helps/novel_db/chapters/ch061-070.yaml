- chapter: 61
  title: 第六十一节：草绳上的人生
  content: '第六十一节：草绳上的人生

    　　耀眼的朝阳，照亮了青茅山。

    　　学堂中，家老在详细讲述着要点：“明天，我们就要选择第二只蛊虫进行炼化。大家都有炼化蛊虫的成功经验，这一次可以进行巩固。对于第二头蛊虫的选择，大家要仔细思考。结合这些天的修行心得，以及对自身的了解，进行综合考虑。一般而言，最好是能和本命蛊搭配使用。”

    　　蛊师的第一只蛊虫，称之为本命蛊，一经选择，无疑就确立了发展的基石。随后的第二头蛊虫，'
