    　　“这可是王猎头一生经验和心血啊。我们猎户之间，虽然交流，但也是交流陷阱摆放的位置。却不会告诉对方兽群的分布情况。这竹纸上的，都是王猎头从祖上就开始积累的情报啊。”

    　　“原来这山谷中有一群野鹿，哈哈，我杀了这群野鹿，至少三个月不愁吃喝！啊，这溪流旁边，有一窝山熊？好险，我上次就在这附近狩猎的。记下来，都'
