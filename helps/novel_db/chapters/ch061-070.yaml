  events:
  - '不贵多，这是修仙界的常识，只要是蛊仙，几乎人人皆知。

    　　但对方源而言，这点却不适用。

    　　因为他是九五至尊仙窍。

    　　仙窍地方够大，不怕空间不够。时间够快，资源再生极其迅猛。

    　　这些都是潜质。

    　　方源已经看'
  - '，不知道还在不在了。

    　　在义天山大战中，惊鸿乱斗台解体，很多蛊虫都毁灭了，但还剩下一些蛊虫，保留在仙僵的仙窍之中。这些蛊虫方源都不太熟悉，样子都记得不太全了（失忆的原因），也不知道还有多少被影无邪扣下。'
  - '超出三只仙蛊以上，仙蛊就形成了负担，通常而言，是养不起，又用不起。

    　　毕竟催动仙蛊，也是要耗费仙元的。

    　　方源这样越级使用七转仙蛊的例子，还是很少的。他的经历只能算是特例，和绝大多数蛊仙不同。'
  - '元。这里的一年时间，是指仙窍时间。放到外界五域时间，就是每天自产十六颗仙元。

    　　这些仙元已经极多，十绝体都比不上。但和方源每月的盈利比起来，差距就更大了，简直是杯水车薪。

    　　这就意味着，方源有资本可以去'
  - '地沟中的荒兽、上古荒兽不计其数，正适合毛民蛊仙们对战训练。而且打杀了这些荒兽，我们可以就地取材，炼制变化道的仙蛊。捕捉这些荒兽，我们还可以用驭兽仙蛊奴役，使它们为我们所用，加强福地的防御力量。”

    　　这事情'
  - '之后，方源更不可能拿回来了。

    　　星道的蛊虫，只有星眸回到方源的手中，其余仙蛊诸如星芽、星痕、星光、星念，都烂在影无邪的手中，不知道还在不在了。

    　　在义天山大战中，惊鸿乱斗台解体，很多蛊虫都毁灭了，但还'
  - '，又有这么多的毛民蛊仙出现，这必将严重地挑战当今人族蛊仙们的神经，极大地触犯他们的底线。

    　　不管是正道、魔道还是散仙势力，都不会容许外族有这么一个强大的势力存在。

    　　琅琊地灵虽然单纯，但是并不愚蠢。他'
  - '本来按照琅琊派的规矩，单凭这个功劳，你的地位就能提升一格。例如毛六就能升为毛五。但你现在还不是真正的毛民蛊仙，所以你只能获取两百点门派贡献了。”

    　　说到最后，琅琊地灵望着方源，遗憾地叹息一声。

    　　方源'
- chapter: 62
  title: 第六十二节：流光斑斓养仙蛊
  content: '第六十二节：流光斑斓养仙蛊

    　　方源的大部分心神，此刻沉入仙窍。

    　　大量的光道凡蛊，一只只飞舞盘旋，然后带动一颗颗的流光果，飞上高空。

    　　穿过一层又一层的“天”，经过漫长的飞行，这些流光果终于来到了最上面的一层。

    　　方源的至尊仙窍，分五域九天。

    　　思考之后，方源将所有的流光果，都放入到最上面一层中去。

    　　“仙窍中的宇道道痕虽然不少，但是我却不能像地灵那样，直接运用宇道道痕，进行瞬移。毕竟'
