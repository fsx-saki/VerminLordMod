  title: 第六十四节：返实蝠翼
  content: '第六十四节：返实蝠翼

    　　一只风狼，低着头，四肢几乎匍匐着，在茂盛浓密的草地中行进。

    　　被它盯上的猎物，是一头花粉兔。

    　　兔子两只耳朵直愣愣地竖起，倾听一切的行动。而兔首则埋在硕大的花朵中，汲取着花粉吃食。

    　　清风吹拂着这处山岗，绿草茂盛，繁花盛开，带来阵阵花香。

    　　风狼慢慢接近，而花粉兔却是毫无察觉。

    　　忽然，一道漆黑的阴影，迅速地从地面掠过。

    　　花粉兔一惊，抬起头来，哪怕狐仙福地中'
