  events:
  - '蛊仙可时刻联系这里，透过假眼蛊，观察周围情形。它的范围是方圆五里之地，不能侦破隐形，维持此蛊不仅消耗真元，而且还要疲累魂魄。我们都用多种手段隐身，大摇大摆进去，也无妨。”

    　　同时，方源在心中回忆性质地补'
  - '走一步。”石磊睁开双眼，冷漠地瞟了万象星君一眼。

    　　“石大人说笑了，在下的战力降至低谷，要突破上古荒兽的防卫，还得依靠大人您呐。”万象星君呵呵一笑，不再说话。

    　　他藏在袖口中的双拳却是暗暗捏紧，若非实'
  - '同时，方源在心中回忆性质地补充一句：“这蛊虫常常搭配真视蛊一同使用，如此一来就可勘破隐形。不过那是五域乱战时的情形，现在这个时间，真视蛊还被某个小门派捏在手中，并未大肆传播流行呢。”

    　　黑楼兰看了方源一眼'
  - '实际上所谓的情报来源，就是他本身。

    　　只是现在看来，事实和自己的预想大有出入。

    　　第一个原因，是方源重生，不断影响，蝴蝶效应造成的。第二个原因，则是前世繁星洞天的坠毁本来就大有内幕，只是前世不察，今生撞见'
  - '，对黑楼兰示警道：“慢着，前面有一只五转侦察蛊。”

    　　黑楼兰小心翼翼地探去目光，便见一只眼球形状的小蛊虫，静静地悬浮在半空中。眼前缓慢转动，不断扫视周围。

    　　二人并不意外。

    　　这蛊虫，一看就不是野生'
  - '那些山上的星殿。

    　　“第八星殿，终于出现了。我的猜测果然没有错！”万象星君激动地道。

    　　石磊消去铁冠鹰的变化，恢复人身，身上伤痕弥补，血流不止。他转动金瞳，淡淡地看了一眼高空：“难怪你猜这是洞天中枢，看'
  - '分成。

    　　每一年，繁星洞天才露出一丝缝隙，容许蛊仙进入其中。每次进去，蛊仙停留在里面的时间，也只是中洲时间的两天。

    　　繁星洞天荒兽众多，资源丰富，明显是要细水长流。万象星君不就是这样，明明只是个散修，'
  - '和之前的星殿不同，这座星殿直接悬浮在高空中，形制恢弘，精致华美，更要大大胜过那些山上的星殿。

    　　“第八星殿，终于出现了。我的猜测果然没有错！”万象星君激动地道。

    　　石磊消去铁冠鹰的变化，恢复人身，身上伤痕'
- chapter: 70
  title: 第七十节：手段似小有深意，越是明白越心惊
  content: '第七十节：手段似小有深意，越是明白越心惊

    　　方源言之凿凿，黑楼兰选择了相信。

    　　二人隐去身形，大摇大摆地走过星辉假眼蛊的范围，果然没有引发蛊仙的注视。

    　　随后，两人又在途中，不断发现类似星辉假眼蛊的侦察蛊虫。

    　　这些蛊虫，有的埋在土中，有的伪装成树叶，有的潜伏在溪水中，随波逐流。

    　　方源一一动用手段，或隐身，或动用蛊虫针对，在或遁地顺水种种，晃过这些侦察蛊虫。

    　　两人原本想走到第八星殿'
