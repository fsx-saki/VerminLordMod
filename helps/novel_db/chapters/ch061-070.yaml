- chapter: 69
  title: 第六十九节：星辉假眼蛊
  content: '第六十九节：星辉假眼蛊

    　　星点缭绕飞舞一阵，汇聚在高空中，形成一座全新的星殿。

    　　和之前的星殿不同，这座星殿直接悬浮在高空中，形制恢弘，精致华美，更要大大胜过那些山上的星殿。

    　　“第八星殿，终于出现了。我的猜测果然没有错！”万象星君激动地道。

    　　石磊消去铁冠鹰的变化，恢复人身，身上伤痕弥补，血流不止。他转动金瞳，淡淡地看了一眼高空：“难怪你猜这是洞天中枢，看这气度，十有八九就是了。”'
