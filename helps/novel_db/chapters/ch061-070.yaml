    　　只是这种感应，变得极淡极弱。

    　　蛊虫和蛊师之间的感应，和距离有很大关系。蛊虫距离蛊师越远，感应就越弱。蛊师使用蛊虫时，心念频动，发下十个命令，或许漏掉九个，蛊虫只执行其中一个。

    　　当然，这只是绝大'
