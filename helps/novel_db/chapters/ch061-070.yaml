  - 东方长凡的意志却是沉静如冰：‘只要我生还，就能带领东方一族再度崛起。’
  - 东方长凡逆天而行，牺牲八位蛊仙意志，最终成功但留下隐患。
  - 东方长凡夺舍，这种智道传承还在他的脑子里。
  - 不想此次夺舍，居然会出现这么大的变故。果然，逆天而行，是要遭受天地的怒火。
  - 在碧潭福地行动前订立，但黎山仙子因身份问题压制了与东方一族的旧盟约。
- chapter: 70
  title: 第七十节：使用白豕蛊
  content: '第七十节：使用白豕蛊

    　　漆黑的夜空中，月亮如银盘高高地悬挂着，挥洒下如水的月光。

    　　在夏风之中，茂密的山林轻轻地舒展着浓绿的枝叶，瀑布哗哗地流淌着，却掩盖不住檀香蟋蟀吵闹的叫声。

    　　方源踩在绿油油的草地之上，悄悄地接近一只山猪。

    　　这只山猪正埋着头，哼哧、哼哧地拱着地上的青泥，翻找着青草和泥土中的蠕虫。

    　　野猪是一种杂食性的动物，它们不仅吃蠕虫，还偷食鸟卵，善于捕食野兔、老鼠，甚至蛇、蝎'
