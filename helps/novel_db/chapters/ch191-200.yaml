  title: 第一百九十二节：魔道联军
  content: '第一百九十二节：魔道联军

    　　时间在此刻变得分外难熬，一分一秒过去，半空中的云烟渐渐稳定下来。

    　　方源这才有了余力，在心中狠狠咒骂福地的原主人。这么个重大的关隘，居然在秘方中没有任何注释！

    　　若非他一直全神灌注，反应及时，又有风天语辅佐，这才险而又险地稳住局面，然后再一点点扳回来。否则就彻底失败了。

    　　时间流逝，一种玄而又玄的气息，弥漫开来。

    　　云烟彻底消化了三百岁寿蛊，平静下来，重新化为'
