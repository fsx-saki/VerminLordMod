    　　他循着一缕血红星芒，不断接近。

    　　随着距离的接近，星芒在眼中越来越亮，最终'
  - '就砰砰直跳，呼吸都有困难。他认出这个人的身份：“这是上古时代，三大魔尊之一的狂蛮魔尊！他面对的是太古荒兽——地元苍枭！奇怪，巨阳传承中怎么会有魔尊之物？”

