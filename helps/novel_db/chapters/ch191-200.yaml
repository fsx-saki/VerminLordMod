  title: 第一百九十一节：方正的噩梦
  content: '第一百九十一节：方正的噩梦

    　　方源的出现，出乎众人的意料。按照中洲炼蛊大会的赛制，到了第八场及其以后，每一场的比试地点，都只会有一位蛊师可以晋级。

    　　因而渐渐形成惯例，整个中洲的比试地点都化为地盘，各个强大的炼道蛊师宛若猛兽盘踞一方，霸占地盘。

    　　在没有逼不得已之前，没有哪一头猛兽提前跨界，去挑战另一头猛兽的。

    　　这绝对是不明智的。

    　　晋级越多，得到的荣耀也就越高，得到的奖励也越多，提前'
