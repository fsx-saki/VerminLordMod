    　　蛊师老者骑在白鹤之上，凌厉如刀锋的白眉之下，双眸透射出深沉的杀机。

    　　“呵呵呵，这份仇，就从你的子孙后辈身上，开始算吧。”他笑起来，俯视下方的战场，伸出枯瘦如柴的手指，往下轻轻一指。

    　　座下的白鹤，顿时仰起修长优雅的脖颈，发出一声嘹亮悠长的鸣叫。

    　　声音在广阔的天宇中扩散，余音袅袅中，无数的应和声传来。

    　　“这是什么声音？”方源正催动'
