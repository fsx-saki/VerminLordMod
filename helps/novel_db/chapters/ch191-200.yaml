  title: 第一百九十三节：三老三真传，意志可取巧
  content: '第一百九十三节：三老三真传，意志可取巧

    　　方源努力朝着一团碧光游去。

    　　这团碧光，却比先前的赤光，更加难以接近。

    　　它在缓慢地飞，不断转弯，方源追了片刻，这才追到，一把抓住。

    　　它同样有海碗大小，方源小心翼翼地探入心神。

    　　一股难以言喻的震动，从碧绿光团中，延伸到方源的身体上。

    　　“小心，这是空绝老仙的东西！”脑海中，墨瑶意志忽然认出了此物，开口示警道。

