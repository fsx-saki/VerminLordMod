  title: 第一百九十二节：方源的公然挑衅
  content: '第一百九十二节：方源的公然挑衅

    　　好似听到火工龙头内心的声音，方源继续嘲讽，甚至加大力度：“对，就是这眼神，就是这样的情绪，愤怒吧，气愤吧，如此才能拿出你全部的实力来和我拼。如此一来，这样的对手，才让我稍微可以有点儿兴趣。记住，你一定要拿出，不然你就是万龙坞的耻辱！哈哈哈。”

    　　看着方源手指着火工龙头，如此态势嚣张的发言。

    　　一时间，场上场下的蛊师们都说不出话来。

    　　这样太嚣张了吧？！'
