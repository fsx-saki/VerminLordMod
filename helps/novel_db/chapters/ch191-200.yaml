  content: '第一百九十四节：长生难难难

    　　第三个真传，价值很高，皆因里面讲述的是延寿之法。

    　　俗语曰：老死不如赖活着。

    　　除去特殊原因，没有谁不想活着，不想活得更久。

    　　蛊师这个职业，虽然能够修行，到了六转地步也能够改善生命本质，但却不能直接增长寿命。

    　　蛊道发展以来，不知多少的能人志士，千方百计地研究出各种各样的方法，去延长自己的寿命。

    　　譬如青茅山的古月一代，选择化身成僵。又比如南疆的魔道蛊师'
