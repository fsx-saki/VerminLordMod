    　　方正比同行的长老、弟子们知道更多的内幕，当初鹤风扬和苍郁联手攻打狐仙福地失败，因为胆识蛊的利益达成共识，故而双方签订了盟约。

    　　盟约中自然有一条内容，规定双方势力成员之间，不得互相攻伐。这也是方正自觉安全的原因之一。

