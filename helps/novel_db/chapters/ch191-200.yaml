  content: '第一百九十六节：捡漏

    　　“无上真传！”方源瞳孔扩张，目光灼灼。

    　　距离真传光团，还有千步之遥，方源就感觉到真传的澎湃气息。

    　　这是普通真传、无双真传都没有的感觉。

    　　在这股气息的影响下，方源脑海中念头攒动，无数念头凭空产生，记忆画面不断闪现！

    　　如果说平时里，他的脑海就像是一汪深潭。那么此刻，他的脑海中念头勃发，宛若一条恢弘瀑布，陡然砸入深潭。

    　　念头狂涌，掀起浪花重重！

    　　这种感觉'
