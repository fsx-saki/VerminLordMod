  title: 第一百九十一节：早有准备，墨瑶惊疑
  content: '第一百九十一节：早有准备，墨瑶惊疑

    　　炼道蛊师们神色严肃，迅速结阵。灰色的光芒渐渐绽放，连成一片。

    　　在众人期待的目光下，黑楼兰挥手一扬，将二角楼主令抛向半空。

    　　楼主令悬浮在空中，圆阵中凝聚起一根巨大的灰光芒刺，刺向楼主令牌。

    　　灰光闪耀，令人不可逼视。

    　　“哈哈，就是此刻。”方源一直可以处于外围，心念一动。

    　　二角楼主令瞬间消失，下一刻，出现在他的手中。

    　　他掌控此层，要挪移一个'
