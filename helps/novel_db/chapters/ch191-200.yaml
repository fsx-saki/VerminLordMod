  title: 第一百九十二节：仙缘生意
  content: '第一百九十二节：仙缘生意

    　　“什么？”听到树下两位蛊仙的交谈话语，方源的耳朵顿时支楞起来。

    　　他直接从树丛中钻出来，出现在两位蛊仙的头顶上方，蹲在一棵大树杈上往下看。

    　　对于方源现在变化的这种猴子而言，好奇心极强，这是非常正确的反应。

    　　两位蛊仙连头都没有抬。

    　　但方源清楚得很，这两位蛊仙早已经催动着侦查手段，也已经发现了方源。只是方源的见面曾相识，乃是八转仙道杀招，完全凌驾于两仙之上。'
