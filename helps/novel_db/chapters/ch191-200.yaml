  events:
  - '脚下踩着的是王逍，身边还有一个尸体，就是云家的少族长云落天。

    　　他是被白凝冰消灭的，尸体被地灵耗费仙元，挪移了过来。

    　　一想到白凝冰，方源笑声陡然一止，再笑不下去。

    　　就是这个家伙，筹谋良久，忽然反'
  - '绝境中逃出生天，一切重来的感觉真是太爽，太美妙了！

    　　他首先查看了自己的空窍。

    　　空窍中央，作为本命蛊的春秋蝉，再度萎靡虚弱。原本光滑油亮的外表，如今像是枯黄的秋叶。

    　　方源念头一动，春秋蝉便渐渐隐去'
  - '他伙同魔道蛊仙，进攻狐仙福地，攻占荡魂山。最后付出极大代价，斩杀凤金煌，险死还生。

    　　凤金煌死后，正道齐哀，为其作《凤金煌传》。传中写明生平事迹，凤金煌一生有三大奇遇。

    　　第一个奇遇，是三岁时睡觉，在'
  - '着，慢着，一切都好商量。我可以答应你，将正确的路径告诉你，但是你必须保证我的生命安全。我身上就有一只毒誓蛊……”

    　　耳边，熟悉的求饶声传来。方源循声低头望去，便看见脚下的王逍。

    　　他楞了一下，继而心脏'
  - '刹那间，春秋蝉绽放出青、橙两色光辉，一股玄奇奥妙的气息，扩散开来。

    　　方源所有的蛊虫，全部的真元，一切的血肉和魂灵，都自爆开来。

    　　每一次催动春秋蝉，都是一场豪赌。

    　　方源身处绝境，毅然赌上自'
  - '精芒一点，承载着方源仅剩下来的一点意志，破碎虚空，来到这个世界中最著名的秘禁之地——光阴长河。

    　　蛊师世界有南疆、北原、西漠、东海、中州五域环绕，这是宇。又有一条光阴长河，贯穿过去、现在、未来，便是宙。'
  - '况，不得不救场，杀了龙青天，却碍于碧空蛊毒，没有任何一丝收获。”

    　　“再之后，就是炼蛊，防守大殿，白凝冰背叛了……”

    　　方源脑中思维如电，几乎闪电般回忆了上一世，然后他双眼眯成了一条缝，两只手不由自主地紧握'
  - '了。按照上一世的发展，我是拷问王逍前往巫山的正确之路，可惜他至死都没有说。我无奈之下，只好杀之，并用兽力胎盘蛊，吞噬了他和云落天的空窍。”

    　　方源沉默不语，神情严肃如冰，脑海中迅速地回忆着接下来要发生的事情。'
