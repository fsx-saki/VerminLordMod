    　　但一片灰黑平原，如虚影飘烟，展现在众人的面前。好像是隔了一层纱，如梦似幻一样。

    　　山峰上怎么会出现平原？

    　　这是萧芒一拳洞穿福地，将其打出漏洞所致。

