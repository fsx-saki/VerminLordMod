  - 飞沙地洞这等资源点，是可以充当地脉节点之一的。
  - 房家立即收起鸡笼犬舍，驾驭土道仙蛊屋，从地底全速杀向万家大本营。
- chapter: 192
  title: 第一百九十二节：扬眉吐气
  content: '第一百九十二节：扬眉吐气

    　　“怎么找到你的？哈哈哈！”白眉老者大笑，笑声极尽欢快，目光透露狰狞。他摊开手掌，露出一只蛊。

    　　正是至亲血虫。

    　　至亲血虫晶莹剔透，宛若红玛瑙。仿佛一只蝉，此刻一阵阵的发光，蝉首直指古月一代。

    　　“师兄你虽然抢了我的机缘，暗算我，尽夺蛊虫，但我也掌握了秘法。因此就合炼了这只至亲血虫。你知道它是怎么合炼的吗？呵呵呵，是用你两个亲生儿子的心血。你的两个儿子才只有五六'
