    　　原本静止的狗群大阵，流动起来，好似一张大磨盘。而这些冲杀进来的蛊师，都成了青豆、黄豆。不消片刻，就被碾磨成豆渣，死去大半，剩余一些见机不妙，连忙撤退了出去。

