  title: 第一百九十三节：当众擒拿方正
  content: '第一百九十三节：当众擒拿方正

    　　方源前世，当方源将主意打到炼骨大会上时，上一届的炼蛊大会才过去十几年。

    　　为了参加炼蛊大会，前世的方源便提前八十多年就开始准备。

    　　每天他都抽出时间，勤加练习，日夜不缀。

    　　在这个练习的过程中，方源拿出前前世，地球上的高考少年面对题山库海的精神。将历届的大会题目全部收集起来，一边照此闷头苦练，一边企图从中中阶出出题者的用意。

    　　他十分容易就搞到全部的题目。'
