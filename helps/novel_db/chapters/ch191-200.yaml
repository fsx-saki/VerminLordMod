  title: 第一百九十四节：群攻
  content: '第一百九十四节：群攻

    　　萧芒看着眼前的迷雾，目光深沉。

    　　他靠着五转修为，取得正道统帅权利。组织了数次冲杀，但皆是大败亏输，铩羽而归。

    　　迷雾中，隐藏着无数犬兽，令每一波冲杀进去的蛊师，都损失惨重。

    　　“就算损失再重，也不能阻挡我的脚步！仙藏，这可是仙藏啊……”萧芒眼中精芒爆闪，心中兴奋地呼唤。

    　　“我们再接再励，组织下一波冲势。”萧芒呼唤一声，但这一次应者寥寥。

