- chapter: 191
  title: 第一百九十一节：燃魂爆运！
  content: '第一百九十一节：燃魂爆运！

    　　“吱吱吱！”一只黄毛母猴子，攀爬跳跃，身姿轻灵，跑到了方源的面前。

    　　黄毛猴子站在方源面前，将怀里的桃子主动塞给方源。

    　　方源无语地接过来，然后随手一丢，扔到了树下的地面上。

    　　母猴子楞了一下，随即双臂挥舞，在方源面前蹦蹦跳跳，大喊大叫，震得方源脚下的树枝不断颤抖，茂盛的树叶相互摩擦，发出沙沙之音。

    　　方源一手捂脸，低头叹息。

    　　母猴子挨上来，要靠近方源。'
