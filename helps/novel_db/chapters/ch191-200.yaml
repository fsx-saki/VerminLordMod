  title: 第一百九十一节：一拥而上
  content: '第一百九十一节：一拥而上

    　　陆畏因立即暗中传音，详细解释道：“方源大人你有所不知，你战力太强，冒然出手，恐怕会引发无极魔尊的反制。你我降临，如此明显，天庭为何增兵主动挑衅？就是要试探我方虚实，若是能引你亲自动手，那就最好不过了。”

    　　“这当中还有什么说法？”方源询问道。

    　　陆畏因苦笑一声：“具体情况我也不知，只知道无极魔尊当年费尽全力，布置出了疯魔窟，就是为了推衍天道，寻找到真正永生的途径。'
