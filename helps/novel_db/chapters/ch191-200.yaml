    　　“哼，如果我的那只六转的玲珑小挪移蛊，还在的话……”

    　　“亦或者星梭蛊、定仙游蛊、我行蛊，这场比斗就是另外一个结果了。”

    　　蛊仙们态'
  - '名，乃是兼并宇道、禁道的杀招。就算是五转的挪移蛊，也被封锁住，无法调动。

    　　“一切都结束了，方源。镇魔塔将是你的最终归宿，今后的余生你就在那里度过吧。”白凝冰叹息一声，看着眼前大敌终于落网，他的心情十分复'
- chapter: 200
  title: 第二百节：春秋蝉！
  content: '第二百节：春秋蝉！

    　　方源缓缓仰头，透过青铜大殿的窟窿，望着天空。

    　　福地的苍穹已经形成巨大漏洞，沟通着外界。以方源的角度，能够看到南疆的太阳。

    　　太阳低垂，已近黄昏。

    　　“申时三刻，这个时辰，凤金煌应该刚刚继承狐仙福地吧？”方源想着。

    　　前世，他伙同魔道蛊仙，进攻狐仙福地，攻占荡魂山。最后付出极大代价，斩杀凤金煌，险死还生。

    　　凤金煌死后，正道齐哀，为其作《凤金煌传》。传中写明生平事'
