  title: 第一百九十四节：血幕天华
  content: '第一百九十四节：血幕天华

    　　古月一代把血口獠牙咬得咔嚓作响，却挣扎不得，动弹不了。

    　　忽然，又有一团黄光从黄色符面拘拿出来，落在地上，化为一枚黑白相间的太极光球。

    　　这光球中，两只奇特的蛊虫相互盘旋，你追我逐间，太极光球不断转动，丝丝大道蕴味流转而出，让无数人侧目。

    　　“这是何蛊？”白凝冰等人惊疑。

    　　“这竟然是四转的……”方源目光一凝。

