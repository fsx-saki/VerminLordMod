  title: 第一百九十二节：真传秘境，意想不到
  content: '第一百九十二节：真传秘境，意想不到

    　　两大仙蛊的出现，着实出乎意料，让墨瑶分外吃惊。

    　　更让她心悸的是，方源准备之充足！

    　　他运用的蛊虫，都是原本收藏在水晶墙壁当中的珍宝。他用的杀招，比灰融更完美，效果更强大。

    　　要做到这一步，可不是个人的事情，也绝非几十年便能布置妥当的。非得需要大量的精力不断投入，至少数百年不断潜入，将需要的蛊虫一只只暗藏在晶壁当中。又要防止被后人拿走，每一只蛊虫恐怕得'
