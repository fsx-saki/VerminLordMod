  content: '第一百九十八节：血道魔威

    　　这事情有些麻烦。

    　　让一个人效忠，其实有很多非常规的方法。蛊师世界，从来不缺乏这种手段。比如奴道，就专门擅长处理这种难题。

    　　但要将方正炼成血神子，这些方法却不行。血神子相当于另一种生命，在转化的成功的那一刻，施加在方正原本身上的手段，都会失效。方正的本心本意，将决定血神子。

    　　血神子的强大，是完全可以预见的。

    　　因为从血神子借鉴而得的雷神子，威能就极为不俗。'
