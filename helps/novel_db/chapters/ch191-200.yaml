  title: 第一百九十四节：武家纷争
  content: '第一百九十四节：武家纷争

    　　武独秀缓缓地睁开双眼。

    　　“又是新的一天呐。”她在心中呢喃。

    　　一只八转仙蛊，在这间不大的屋子里飞绕。

    　　食道仙蛊——药香！

    　　这是一只治疗仙蛊，使得整个小屋中充斥了浓郁的药香气味。但是，武独秀身上的腐朽气息，也非常强烈，药香根本掩盖不住。

    　　两种气味混杂在一起，就算是蛊仙都有些难以忍受。

    　　过一天，便少一天。

    　　武独秀知道，她离大限已经不远。

