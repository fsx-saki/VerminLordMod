- chapter: 673
  title: 第六百七十八节：红莲真传争夺战
  content: '第六百七十八节：红莲真传争夺战

    　　“方源，我们又见面了。”凤九歌的声音从仙蛊屋中传来，饱含感慨之意。

    　　“的确好久未见。”方源兴叹。

    　　时隔数年，方源再次和凤九歌相遇，仿若老友见面，语气不带一丝火星。

    　　但两人到底不是老友，说完这话，就都沉默。

    　　一时间，只有光阴长河的水声，滚滚激荡，滔滔向前。

    　　凤九歌还记得第一次见到方源的时候，那时的方源连蛊仙都未成就，只是一届凡人，却都得了狐仙福'
