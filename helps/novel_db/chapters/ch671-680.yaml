  - '并和陆畏因接触，究竟是为了什么？

    　　一路上，陆畏因和紫薇仙子交谈，话虽不多，但气氛和谐。

    　　山路一转，从浓郁的绿荫中现出一座漆红的小亭。陆畏因便指着红色小亭道：“紫薇大人，一路登山至此，不妨先去亭中歇'
  - '真君的。

