- chapter: 671
  title: 第六百七十五节：和长生天合作
  content: '第六百七十五节：和长生天合作

    　　东海，深夜。

    　　繁星铺满夜空，原本平静的海面上忽然掀起滔天波澜。

    　　一座仙蛊屋龙宫射破海面，暴射而上，升上苍穹。

    　　高空中早有一位八转蛊仙严阵以待，正是青岳家的太上大长老青岳安。

    　　“咄！”他口中轻呼一声，双臂猛地一挥。

    　　立时，一座座青山虚影，从天而降，万重青山，绵连一片，把仙蛊屋龙宫重重包围。

    　　仙道杀招——万重山！

    　　龙宫冲势受阻，撞到青山虚影'
