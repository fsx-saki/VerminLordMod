- chapter: 678
  title: 第六百八十三节：四处袭击
  content: '第六百八十三节：四处袭击

    　　归一派，作为炼蛊大会的报名地点之一，这里同样是人山人海。

    　　“炼蛊大会终于开始了！没想到我今生还能得到第二次机会，实在是感谢上苍。”中年蛊师叹息着道。

    　　在他周围的一些蛊师认出了他，顿时议论纷纷。

    　　“快看，竟然是炼道大师罗生！”

    　　“他在上一届的炼蛊大会中，因为意外情况而遗憾落败，这一次他是要卷土重来啊。”

    　　“本来炼蛊大会每百年举办一次，罗生应当是没有机'
