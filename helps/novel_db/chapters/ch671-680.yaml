- chapter: 672
  title: 第六百七十六节：紫薇借蛊
  content: '第六百七十六节：紫薇借蛊

    　　重生以来，方源的实力一直就在突飞猛进，速度惊世骇人。

    　　尤其是最近这段时间更是如此，修为晋升八转，一身仙蛊丰富至极，举世罕有。

    　　然而，以他的实力还不足以强夺得了龙宫。

    　　争夺八转仙蛊屋龙宫的，有准仙尊实力的龙公，还有东海的多位八转蛊仙，可以说是东海一域中最为巅峰的蛊仙强者。

    　　方源到底是崛起的时间太短，在一域顶峰的强者面前，在龙公面前，抢夺仙蛊屋，尤其是这座'
