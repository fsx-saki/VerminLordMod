- chapter: 676
  title: 第六百八十一节：不胜不负
  content: '第六百八十一节：不胜不负

    　　大同风在光阴长河中肆虐。

    　　凤九歌催发大风歌的时候，会引出狂风呼啸的声音。但当真正的大同风刮起来的时候，非常平静，没有一点声音发出。

    　　悄无声息的大同风，却令在场的所有蛊仙们感到一股彻骨的冰冷。

    　　石莲岛不断地被大同风侵蚀，最终彻底消失，大同风越刮越大，起先规模就不小，摧毁了石莲岛之后，体积膨胀数倍，变得撑天拄地一般。

    　　不过，它在光阴长河中却是无法逞威，尽管'
