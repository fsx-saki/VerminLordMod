- chapter: 675
  title: 第六百八十节：风灭红莲
  content: '第六百八十节：风灭红莲

    　　“收！”龙公猛地闪现，凌驾于龙宫的屋顶。

    　　巨大的吸力用来，八转仙蛊屋极力抗衡，一寸一寸地被拖向龙公的虚窍之中。

    　　其余八转蛊仙看到这一幕，连忙奔赴过来，各种杀招一齐轰向龙公。

    　　龙公叹息一声，身形忽然消失在原地。

    　　龙宫失去了束缚，立即从海底暴射而出，再次飞上苍穹。

    　　东海八转正要联袂追击，冷不防龙公忽然出现在半空中，挡住他们前进的路。

