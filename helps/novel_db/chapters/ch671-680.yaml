- chapter: 677
  title: 第六百八十二节：杀戮开始
  content: '第六百八十二节：杀戮开始

    　　中洲界壁内。

    　　“走，快走！”

    　　“跟上来，千万不能掉队了。”

    　　一群西漠的蛊师，一边呐喊，一边狂奔。

    　　在他们的背后，大地裂开，像是巨兽张开口，欲择人而噬。

    　　“啊——！”

    　　“救我！！”

