- chapter: 680
  title: 第六百八十五节：杀八！
  content: '第六百八十五节：杀八！

    　　一群来自东海的八转蛊仙，在中洲的山脉中，低空疾飞。

    　　龙公强夺走仙蛊屋龙宫后，却使得东海的正道、魔道乃至散仙八转，都联合了起来。

    　　“应该就是这里了。”沈从声忽然停下身形，带着微微的疑惑之色，扫视脚下方的青山。

    　　这座青山十分平凡，在周围的山峰环绕中，毫不起眼。

    　　“这里？”华彩云皱起眉头，轻轻摇头，“我可没侦查出什么蹊跷来。”

    　　“嗯……我却感觉此山有些不同'
