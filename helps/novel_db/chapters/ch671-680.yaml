- chapter: 679
  title: 第六百八十四节：三人成虎
  content: '第六百八十四节：三人成虎

    　　方源悬浮在空中，像是在暴雪天气一动不动地站了一炷香的时间，身上积着一层白色的雪。

    　　远看的话，又好像是披着一层厚实的狐皮毛衣。

    　　这是改良过的宙道杀招冬裘！

    　　方源的防御杀招有不少，最强大的当然要数逆流护身印，但因为逆流河已经将近干涸，这招几乎不能再用了。

    　　除此之外，方源还掌握了阎帝、冬裘、血染征袍、紫念光护、发甲、狮毛甲、卜卦龟变化、鬼官衣等防御手段。'
