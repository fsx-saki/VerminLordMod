- chapter: 674
  title: 第六百七十九节：龙宫争夺战
  content: '第六百七十九节：龙宫争夺战

    　　年关门楼突现光阴长河，吃惊的却非方源一方，而是天庭。

    　　这是因为天庭在这里部署的，只有四座宙道仙蛊屋，这第五座宙道仙蛊屋年关门楼来自北原，乃是黄金部族之一拥有。

    　　“什么时候居然潜伏进来一座仙蛊屋？”

    　　“不好，它要对镇河锁莲大阵做什么？”

    　　“快拦住它！”

    　　天庭一方纷纷大吼，就连八转蛊仙都有惊容浮现。

    　　冰塞川大笑，全身寒气四溢，双掌狠狠一拍，将整个'
