- chapter: 479
  title: 第四百八十一节：偷袭蛊
  content: '第四百八十一节：偷袭蛊

    　　“不，爷爷，你误会我了！这火势我真的控制不住啊。”少年盗天还在演戏。

    　　“呵呵呵。你胆敢欺骗老夫，简直是不把老夫放在眼里。也罢，老夫也不取你性命了。就让这火把你也吞了吧。你以为炼蛊是简简单单，安全无比的吗？你故意在炼蛊过程中失败，这是自找死路！死吧，死吧，这是你的坚持，这都是你自找的。”沙枭冷笑连连。

    　　他话音还未落下，那火焰顿时暴涨开来，一下子就将少年盗天罩住。'
