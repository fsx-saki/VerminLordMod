- chapter: 471
  title: 第四百七十三节：盗天机缘？
  content: '第四百七十三节：盗天机缘？

    　　一片茫茫的黑暗，方源的魂魄在黑暗中饱受煎熬。

    　　这片黑暗对他的魂魄，竟然有着非同寻常的消融威能。这是方源之前探索梦境的时候，从未碰见多的情况。

    　　幸而，方源此刻的魂魄底蕴，已经超乎寻常，有着千万人魂级数，完全能经受得住梦境对魂魄的消融。

    　　梦境中的时间，难以计算。

    　　方源只感觉他守候了很久，这才见着一片茫茫然的黑暗中，出现了一个白色的光点。

    　　光点旋即延展'
