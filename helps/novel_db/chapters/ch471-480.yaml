- chapter: 475
  title: 第四百七十七节：糊眼灰
  content: '第四百七十七节：糊眼灰

    　　休整完毕，准备充分，方源再次进入盗天梦境。

    　　周围人声嘈杂，围绕着池塘，正举办一场集市。

    　　西漠资源其实并不少，至少比北原多。沙漠下潜藏着大量的资源，有蛊虫、野兽，唯有植被非常稀少，是最大的弱项。

    　　因此集市中，主要买卖的，便是奶、酒等食物，或者是兽皮、兽骨等等蛊材，只有三家有着蛊虫贩卖。

    　　少年盗天在人流中行走，他一边观览周围的买卖，一边朝着部族中心的池塘靠近'
