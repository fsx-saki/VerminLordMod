- chapter: 473
  title: 第四百七十五节：老爷爷
  content: '第四百七十五节：老爷爷

    　　少年盗天惨叫的越厉害，蛊师老者就笑的越是开怀。

    　　但很快，少年盗天发觉了这一点，开始咬紧牙关，闷声不吭。

    　　“嗯？臭小子，还想顽抗？”蛊师老者发现这一点，顿时大怒，狠狠一脚踩在少年盗天的胸膛上。

    　　咔崩崩！

    　　少年盗天的胸膛肋骨顿时被踩断数根，断裂的骨头直接扎在他的心肺上，让他一下子陷入濒死的状态。

    　　但他至始至终，都未吭一声，几乎将一口钢牙咬碎，怒目圆瞪，就'
