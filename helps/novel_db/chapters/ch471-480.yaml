- chapter: 474
  title: 第四百七十六节：休整
  content: '第四百七十六节：休整

    　　仙道蛊阵当中，方源闭目盘坐在半空中，正在潜修。

    　　黑楼兰等人连同唐方明，掌控着这座仙阵。

    　　方源在心底总结得失。

    　　“第一次探索盗天梦境，收获巨大。不仅试验了天消意散杀招，获得了圆满成果，而且还令自身的偷道境界一跃成为宗师级数！”

    　　“不过，我为此也付出了巨大代价。魂魄原本有千万人魂级数，但现在却跌落到了百万人魂，损失很大。”

    　　“原本以为，解梦杀招会用的相当频'
