- chapter: 480
  title: 第四百八十二节：准大宗师
  content: '第四百八十二节：准大宗师

    　　西漠，盗天梦境。

    　　少年盗天再一次登上擂台。

    　　他的形象让围观的族人们为之愕然。

    　　“这是什么意思？”

    　　“这个卑鄙的小子怎么全身包裹着纱布？”

    　　“好像他受了很重的伤！”

    　　没办法，少年盗天虽然在方源的帮助下，炼成了偷袭蛊，但是炼蛊过程中受过的伤势，却没有手段来治疗。所以少年盗天此时虽然继续参加小比，但却身怀重伤。

    　　少年盗天也在心底苦笑。

