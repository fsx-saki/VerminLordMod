- chapter: 476
  title: 第四百七十八节：胜了却很痛苦
  content: '第四百七十八节：胜了却很痛苦

    　　“卑鄙，太卑鄙了，居然偷袭！”

    　　“这个家伙心性卑劣，着实可恨。”

    　　“若按照双方实力，明显是他更弱一些的。”

    　　周围人纷纷谴责少年盗天。

    　　“你你你！”那对手从地上爬起来，愤怒的都口吃起来，手指指向半空中，愤怒地大喊，“你无耻！有、有种的咱们再，再比一次！”

    　　却是他被杀招糊住了眼睛，根本不晓得方源在哪里，所以手指指的方向根本不对，场面颇有喜感。'
