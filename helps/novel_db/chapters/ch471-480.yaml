- chapter: 477
  title: 第四百七十九节：想输
  content: '第四百七十九节：想输

    　　梦境之中。

    　　擂台上，方源操纵着少年盗天的身体，正和对手展开一场颇为艰难的对战。

    　　这一次，他的对手是一位身材魁梧的少年，他双手呈掌，砍劈之间都有一道道的电光闪烁，飚射向方源。

    　　这个少年乃是部族中夺取冠军的最大热门之一。

    　　若换做寻常少年来战，恐怕早就被电光触及，电得个浑身颤抖，大小便失禁，当即丧失战斗力的下场。

    　　但是此刻，却是方源掌握着占据。

    　　依照少年'
