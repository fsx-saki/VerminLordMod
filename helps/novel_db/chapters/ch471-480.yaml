- chapter: 478
  title: 第四百八十节：盗天的底线
  content: '第四百八十节：盗天的底线

    　　沙枭给了少年盗天一份蛊方，但后者却是勃然变色，坚决不肯依照蛊方行事。

    　　沙枭阴森森的声音传来：“孙子，不听爷爷的话了？你还想不想活命了？”

    　　少年盗天却很坚持：“谁不想活着？但我活着，是有底线的。这种蛊方太过阴损，我坚决不做。沙枭，你不是要让我接近那处池塘吗？如今我已经闯入八强，有资格进入其中，你现在杀了我不觉得可惜吗？”

    　　“哈哈哈。”沙枭大笑，“是有点可惜了'
