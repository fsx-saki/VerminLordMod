- chapter: 472
  title: 第四百七十四节：神秘的羊皮地图
  content: '第四百七十四节：神秘的羊皮地图

    　　仔细检查了一番，方源并没有发现什么陷阱。

    　　他便慢慢接近那具干尸，约莫距离干尸只有五六步的时候，异变忽生。

    　　方源忍不住在肚中咒骂一声，因为他又再一次失去了对少年盗天的控制，重新成为旁观者。

    　　少年盗天口中呢喃着：“这人困死在井底，难道是被那群野兽围住，无法逃生吗？”

    　　然后，他来到干尸的身边，先是默哀了片刻，这才开始动手搜索尸身。

    　　接下来并没有任何'
