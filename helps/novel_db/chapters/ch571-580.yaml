- chapter: 580
  title: 第五百八十三节：年流伏诛阵
  content: '第五百八十三节：年流伏诛阵

    　　周围空间骤然封闭，天下地上浑圆一体，形成一片湛蓝长空。

    　　南疆群仙面色皆变。

    　　“这是陷阱！”有人大叫着。

    　　许多人都惊慌失措起来。

    　　陆畏因沉默，夏槎目光越加阴冷，死死盯着方源。

    　　方源嘴角的微笑逐渐消失，面色转为淡漠，宛若高高在上的神灵，俯视着这些南疆蛊仙。

