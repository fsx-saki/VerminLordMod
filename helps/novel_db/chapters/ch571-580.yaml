- chapter: 575
  title: 第五百七十八节：光阴飞刃
  content: '第五百七十八节：光阴飞刃

    　　方源探索梦境，已非昔日新手，积累的经验已经十分丰富。

    　　蒙逼梦境进行到了此处，方源大致上也就明了了。

    　　“这是要我借助空窍中的诸多宙道蛊虫，组成宙道杀招，来解决蒙逼身上的伤势啊。”

    　　蒙逼所受伤势，乃是因为过度催动水文蛊造成的。这个宙道杀招，必须要对症下药。

    　　方源虽然宙道境界普通，但是却有幽魂真传、琅琊真传，以及黑凡真传。尤其是后者，对于方源此刻解决问题，却'
