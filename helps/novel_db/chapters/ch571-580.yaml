- chapter: 572
  title: 第五百七十五节：交易
  content: '第五百七十五节：交易

    　　“你这么迫不及待地想要见到我，看来是真想找死了。”池曲由冷笑。

    　　“是太上大长老，这下有救了！”镇守凤焰山的池家蛊仙，心中大定，口中欢呼。

    　　“我是专门等你，不知道你对我手中的梦道成果，有兴趣么？”方源忽然暗中传音。

    　　池曲由微微一愣。

    　　下一刻，方源伸手一指，仙道杀招阎罗战场忽然成型，将池曲由囊括进去。

    　　池曲由心中微微一惊，但旋即镇定下来，甚至还好整以暇地打'
