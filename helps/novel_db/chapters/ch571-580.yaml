- chapter: 574
  title: 第五百七十七节：水文蛊
  content: '第五百七十七节：水文蛊

    　　窗外月色正明，而书房内，烛光微凉。

    　　武庸在书房内踱步。

    　　他心中有着忧思烦愁，放置不下。

    　　今时今日，武庸修为八转，掌握武家权柄，携玉清滴风小竹楼以一己之力，帮助武家渡过难关。又向天庭索回南疆各大正道的仙蛊，声威无两。这段时间，他又励精图治，积极培养蛊仙种子，使得武家蒸蒸日上，有什么能值得他烦忧的呢？

    　　方源！

    　　伪装成武遗海，连武庸都欺瞒过去，哄骗了武家许'
