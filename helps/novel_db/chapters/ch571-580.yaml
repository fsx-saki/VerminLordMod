- chapter: 573
  title: 第五百七十六节：正道合谋方源
  content: '第五百七十六节：正道合谋方源

    　　“必须要铲除这个方源，竟公然袭击我正道大阵，实在是胆大包天！”罗家太上大长老在咆哮。

    　　“此次我族蛊仙壮烈牺牲，方源魔头手中已经两次沾染了我族鲜血，必定要让他付出代价！”侯家太上大长老语气深沉，充满仇恨之意。

    　　姚家太上大长老叹息一声：“方源必定是要对付的，但是此人可不同寻常的魔道蛊仙。他的身份非常复杂，不仅是天外之魔，更有春秋蝉傍身，从未来重生，捣毁八十八角'
