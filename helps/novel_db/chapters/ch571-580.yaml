- chapter: 571
  title: 第五百七十四节：天下第九太宇寺
  content: '第五百七十四节：天下第九太宇寺

    　　南疆。

    　　方源攻破云竹山脉，大肆收刮，但他亦明白此处资源对于池家的重要意义，所以早有准备，应付池家的反击。

    　　仙道杀招——大盗鬼手！

    　　隐藏于角落中的大盗鬼手，忽然飞出，抓住池家赶来的仙蛊屋。

    　　仙蛊屋中池家群仙顿时一惊。

    　　但旋即，仙蛊屋表面忽然升腾起绚烂的金芒，仙蛊屋的表面荡起涟漪，形成一个漩涡，竟将大盗鬼手吸摄进去。

