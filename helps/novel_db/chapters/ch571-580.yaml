- chapter: 577
  title: 第五百八十节：遗忘
  content: '第五百八十节：遗忘

    　　梦境终于到了第四幕。

    　　“我已杀了厉薪。”方源道。

    　　老者站在方源的面前，微微点头：“看来光阴飞刃，你已经练的颇有火候。不过你炼成的只是六转层次的光阴飞刃罢了。接下来我要传授你七转杀招光阴飞刃，你听仔细了。”

    　　方源立即沉下心来，仔细记下。

    　　七转杀招，比之前的六转，还要繁复多变数倍！

    　　方源光是听闻这些步骤，就已经脑袋隐隐作疼。这是他见过的，有史以来最复杂的杀招'
