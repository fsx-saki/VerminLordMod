- chapter: 579
  title: 第五百八十二节：埋伏反算
  content: '第五百八十二节：埋伏反算

    　　宝黄天中，价值越高的货物，散发出来的宝光就越是巨大明亮。

    　　在这块摊位上，这里的宝光一直都保持着高亮的状态，和周围摊位比较起来，它就像是大量火炬旁的篝火。

    　　南疆蛊仙铁区中的神念，就在这个摊位上停留环绕。

    　　“我要买三千头铜龙鱼。嗯……”略微犹豫了一下，铁区中又接着道，“还有两百头银龙鱼。”

    　　交易很快完成，铁区中为此付出了一笔不菲的仙元石。

    　　当他抽回神念'
