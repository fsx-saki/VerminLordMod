- chapter: 578
  title: 第五百八十一节：渡劫和神技
  content: '第五百八十一节：渡劫和神技

    　　南疆。

    　　至尊仙窍已经落下，此刻门户大开，如巨鲸吞水，海量的天地二气灌输进来。

    　　哗啦啦！

    　　疯狂的天地二气，磅礴浩荡，他人若见此盛景，早已惊骇——从未有这样的福地，能够一次吞吸如此海量的天地二气。

    　　方源至尊肉身就在门户附近悬停，看着海量天地二气灌输进来。天地二气因为太过浓郁，已经如云似雾，带着湿意。

    　　“吸吧，吸吧，这一次吸个够。”方源微笑，他明白至尊'
