- chapter: 576
  title: 第五百七十九节：宙道宗师
  content: '第五百七十九节：宙道宗师

    　　宙道梦境。

    　　方源化身成一位青年相貌的六转蛊仙，此刻他紧闭双目，全身缭绕着点点白光。

    　　随着周身白光越来越多，方源的气息也不断沉淀，越积越深。

    　　忽然，他身躯轻轻一颤，整个气息旋即不稳，宛若高楼倒塌，深潭泄底。

    　　噗。

    　　方源张口，吐出一小口的鲜血。

    　　“又失败了。”他睁开双眼，眼中精芒闪烁。

    　　这已经是他练习缩时杀招第三次失败，这个专门用来辅助光阴飞刃'
