- chapter: 663
  title: 第六百六十七节：华文洞天
  content: '第六百六十七节：华文洞天

    　　太古白天。

    　　一朵祥云承载着方源，向前飞射。

    　　方源心神一半留在至尊仙窍之中，一半则警戒外界。

    　　换做之前，心神平分两半来炼蛊，方源是做不到的。不过最近这段时间，他真的收获很大。

    　　境界、蛊方他都不缺，唯一的短板就是实践。

    　　亲自炼蛊令他飞速提升，升炼七转仙蛊的效率再次飙升一截，成功率也暴涨了一块，因此消耗的仙材也比之前少得多。

    　　炼制仙蛊从来都是一个大坑'
