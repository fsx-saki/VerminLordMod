- chapter: 670
  title: 第六百七十四节：暴露
  content: '第六百七十四节：暴露

    　　咻——！

    　　伴随着一道尖锐的音爆之声，龙宫化作一道橙金色的光虹，以迅雷不及掩耳的速度划破长空。

    　　“哪里走！”

    　　“给我死吧。”

    　　“想要阻挡我，没门！”

    　　随后，数位八转蛊仙且战且追，各施其能，激烈的战团紧随着龙宫的路线，一路狂飙卷席。

    　　所到之处，可谓山崩海裂、天地变色，无数生命惨遭池鱼之殃，六转七转蛊仙无不避之不及。

    　　这一场争斗，只有八转蛊仙才有资格'
