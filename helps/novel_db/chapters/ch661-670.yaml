- chapter: 662
  title: 第六百六十六节：尊者才情
  content: '第六百六十六节：尊者才情

    　　喳喳喳喳！

    　　一大群的眨眼鸟叽叽喳喳，围绕着一朵七色云彩，不断飞舞盘旋，向来犯的敌人警告。

    　　方源面色平静，但目光中却透露出一丝笑意。

    　　眨眼鸟的警告对于他而言，当然不算什么。

    　　这种鸟虽然乃是荒兽，但战力很低，就算是有这样一大群都不足为患。它们真正的厉害之处在于速度。

    　　眨眼鸟几乎算是速度最快的荒兽了，一旦它们的速度爆发出来，一眨眼之间就能脱离蛊仙的视野，'
