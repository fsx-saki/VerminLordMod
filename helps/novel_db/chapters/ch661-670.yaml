- chapter: 669
  title: 第六百七十三节：万物大同变
  content: '第六百七十三节：万物大同变

    　　“仙道杀招——万物大同变。”方源口中喃喃一声。

    　　他端坐在祥云之上，太古白天中一片空荡，一望无边。

    　　从兽灾洞天中主动撤离出来，他就积极地将此次行动的收获消化个干净。

    　　兽灾仙人的那一超绝手段，便是仙道杀招万物大同变，使用此招之后，便能够增添海量的变化道痕，同时将对象身上的其他异种流派的道痕，都转变成变化道痕。

    　　此招消耗大量的仙元，同时还有丰富的情感。这些'
