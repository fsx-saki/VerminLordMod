- chapter: 668
  title: 第六百七十二节：失败
  content: '第六百七十二节：失败

    　　太古白天，兽灾洞天。

    　　“牛头，吃你爷爷一招！”一头金毛暴猿咆哮着，夹裹风雷，向方源杀来。

    　　牛头魔神方源站立不动，静静地看着金毛暴猿接近，直到对方冲到自己的面前时，他的手这才微微一抬。

    　　刷！

    　　下一刻，刚刚从膝盖位置抬起的右手，忽然间就出现在了胸膛之前。

    　　挥拳直击。

    　　很平凡的一个动作，但是在方源如今的状态下，却是威能恐怖。

    　　金毛暴猿还未来得及反应，'
