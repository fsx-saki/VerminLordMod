- chapter: 667
  title: 第六百七十一节：阻挠
  content: '第六百七十一节：阻挠

    　　哞——！

    　　方源怪兽发出牛吼，巨大的身躯穿梭在森林中，将无数参天古木轻松撞倒。

    　　“撤退，快撤退！”麋鹿勇士手持长矛，一边吐血，一边大吼着迎击方源，用生命为灵泉森林中的居民争取撤退的时间。

    　　但最终，麋鹿勇士被方源扭断脖子，惨死战场。

    　　影像到此结束，大厅内响起嗡嗡之声，数十位战兽勇士一个个龙精虎猛，有男有女，有老有少，均在小声地交谈，言语和神态中都带着惊怒之色。'
