- chapter: 666
  title: 第六百七十节：怪兽肆虐
  content: '第六百七十节：怪兽肆虐

    　　“一般而言，体型如此庞大的怪兽，应当是性情蛮横，势大力沉，绝无可能有着如此敏捷的速度的！”

    　　巨鹰勇士从深坑中站起身来，满头都是冷汗，忽然间灵感一闪，想到一种可能：“等一等，难道说刚刚那一次出手，是这头怪兽的战技？”

    　　他仰望方源，方源已经化身成牛头人身的巨怪，庞大的阴影笼罩着巨鹰勇士。

    　　巨鹰勇士的心中，再战的勇气却在徐徐恢复。

