- chapter: 665
  title: 第六百六十九节：大怪兽方源！
  content: '第六百六十九节：大怪兽方源！

    　　搜索了这么多天，方源发现了一处仙窍洞天，没有吞并任何的九天碎片！

    　　“但这是一座变化道的洞天，我的变化道境界却稍微有些不足啊。”

    　　大师、宗师、大宗师、无上大宗师……变化道境界方面，方源是宗师级数，的确是差一个层次。

    　　境界的差距并不是问题，因为可以用梦境弥补。

    　　南疆那里有足够的变化道梦境，可以支持方源突破到变化道大宗师境界，只是要费一些波折。

