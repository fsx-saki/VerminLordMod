- chapter: 664
  title: 第六百六十八节：兽劫洞天
  content: '第六百六十八节：兽劫洞天

    　　中洲，地沟。

    　　嗷吼……

    　　一头荒兽巨猴发出最后一声嘶吼，它还想要站起来，但面对眼前身体渺小的人族蛊仙，它感觉到浑身的冰冷。

    　　这种冷洞彻心扉，令它沸腾的热血也冰冻起来。

    　　仙道杀招——血渐冷！

    　　出手的不是别人，正是方源的弟弟古月方正。

    　　“恭喜方正仙友，经过这些天的战斗，你的血渐冷杀招已经是如臂使指了。”赵怜云缓缓飞近，面带微笑。

    　　古月方正望着冰冷'
