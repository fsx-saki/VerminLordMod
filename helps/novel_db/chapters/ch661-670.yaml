  title: 第六百六十五节：寻洞天
  content: '第六百六十五节：寻洞天

    　　太古白天。

    　　一声悠扬的鹤呖，洁白如雪的优雅白鹤，围绕着方源团团飞旋。

    　　方源每一个心念调动，这只白鹤便随之而舞，可谓是如臂使指，操纵自如。

    　　“这记九转仙道杀招终于是为我所用了！”方源心中感慨不已，轻轻吐声道，“去吧。”

    　　白鹤宽大的双翼顿时一扇，带动整个身体极其灵敏地冲向前去，还没有飞出去多远，白鹤便围绕着一处天空，团团飞转，不时地发出鹤呖之音。

    　　方源嘴'
