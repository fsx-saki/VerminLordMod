- chapter: 499
  title: 第五百零一节：谈崩
  content: '第五百零一节：谈崩

    　　方源冷哼一声，毫无心虚地直视房化生，目光冷然，态度更加强硬。

    　　在众人的目光中，他开口道：“我算不尽乃是智道蛊仙，真以为我这么轻易就能欺瞒吗？你们房家两位蛊仙，为何之前落入到败军老鬼手中？这一次交手，房家的援军来得也太过及时，随意之间就能调动两座七转仙蛊屋，数位蛊仙。什么时候，房家的蛊仙已经多到可以随意如此调遣了？”

    　　落英馆中，顿时一片安静。

    　　方源拥有种种智道手段'
