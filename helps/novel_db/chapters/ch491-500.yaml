- chapter: 493
  title: 第四百九十五节：连套埋伏
  content: '第四百九十五节：连套埋伏

    　　吼！

    　　趁着方源和房安蕾说话之间，一头牛身豹尾的太古魂兽，就迈开四肢，拖动如山的身躯，直接撞了过来。

    　　几乎与此同时，天空中一声尖啸，一头背插双翅的黑蟒太古魂兽，也从上而下，夹裹无边的风浪，俯冲下来。

    　　“两头太古魂兽！”房云身心剧震，这种恐怖的攻势，让他心神动荡，几乎不能自已。

    　　“不，是三头。”房安蕾却是沉着冷静，还笑了一笑。

    　　果然，下一刻，地面震动，'
