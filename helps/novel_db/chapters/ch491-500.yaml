- chapter: 491
  title: 第四百九十三节：落英馆
  content: '第四百九十三节：落英馆

    　　“偷道大宗师境界……”方源深吸一口气，脸上神情有些复杂。

    　　终于有一天，他的流派境界，达到了这种程度。只是没有想到的是，不是血道、力道，也不是智道、宙道，而是偷道。

    　　偷道境界，方源原本是一片白纸也似。但是就因为这处盗天梦境，一路飙升，后来居上，竟然成为诸多流派的第一。

    　　由此可见，梦境的非凡能够让蛊师、蛊仙，极大地缩短积累时间。

    　　这也是五域乱战的乱战主因。'
