- chapter: 500
  title: 第五百零二节：桃花迷林
  content: '第五百零二节：桃花迷林

    　　房家的历史算得上源远流长。

    　　作为西漠当中的超级势力，房家以经营蛊屋闻名天下。它一直都有属于自己的智道传承。

    　　皆因蛊屋不论仙凡，本质上都是仙道杀招，是由各种蛊虫组合形成，固定下来，攻防一体。

    　　房家经营蛊屋，设计出新蛊屋，就是推演新的仙道杀招，没有智道方面的深厚造诣，显然是不行的。

    　　甚至可以说，房家的智道传承非常优秀，又经过一代代的积累，就算是得到了幽魂真传'
