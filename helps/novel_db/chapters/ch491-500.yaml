- chapter: 497
  title: 第四百九十九节：落英馆战豆神宫（下）
  content: '第四百九十九节：落英馆战豆神宫（下）

    　　落英馆到底不如豆神宫，被这么一撞，立即在西面墙壁上破开一大洞。

    　　青仇携恨，俯冲而下，豆神宫再度袭来。

    　　与此同时，那头飞蜘蛛也终于钻破落英馆表面，房家一方情势十分危急。

    　　关键时刻，房安蕾尖声长啸，施展出最强手段。

    　　仙道杀招——空谷幽兰！

    　　整个仙蛊屋居然开始剧烈缩小，几个眨眼的功夫，就缩小成袖珍，宛若玩具一般。

    　　刚刚砸在沙漠上，形成的坑'
