  title: 第四百九十七节：因果神树
  content: '第四百九十七节：因果神树

    　　就在豆神宫追杀方源不休的时候，极远处的一座低矮沙丘上，一位青年蛊仙双腿盘坐着。

    　　他一身青袍，浑身书卷气息，青年模样，但目光沧桑。

    　　正是被天庭智道大能紫薇仙子派遣过来，当今中洲十大古派之一，元莲派的太上大长老——陈衣。

    　　此时此刻，他双目紧闭，周身气息收敛至无，与周围天地似乎融合在了一起。

    　　随着他不断催谷仙道杀招，从他的肩膀、头顶上，升腾起一缕青烟。'
