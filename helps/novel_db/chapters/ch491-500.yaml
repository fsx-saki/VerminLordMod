- chapter: 498
  title: 第五百节：算计了人还要发难
  content: '第五百节：算计了人还要发难

    　　房安蕾中了紫色舌剑，顿时坚硬如石，一动不动，并且脸色迅速涌起一片诡异的紫色。

    　　那紫色舌剑穿透她的身躯，居然灵动至极，转折方向，弯曲身体，又向方源杀来。

    　　但这时房云、房棱已经反应过来，连忙催动仙蛊屋，顿时内生华光，将紫色舌剑压制住，行动迟缓下来。

    　　藤蔓伸长，围绕房安蕾周身，浓郁花香扑鼻，彩色烂漫的繁花冒出，花瓣紧贴肌肤，一股股流光顺着藤蔓，流进房安蕾的体内'
