- chapter: 492
  title: 第四百九十四节：酬谢仙蛊
  content: '第四百九十四节：酬谢仙蛊

    　　随着落英馆缓缓飘下，空中不断地飞落着花瓣，花瓣如雨，色彩各异，花香浓郁，扑鼻而来。

    　　更关键的是，这些花瓣飘落到沙硕上后，便如水滴没入湖面，消失无踪。

    　　随后，沙硕化为泥土，转眼就在几个呼吸之间。

    　　一朵朵的绿苗，从泥土中冒出头来，随后形成花苞，眨眼间又绽放开来。

    　　当落英馆飘然而落到沙漠上时，已经不是什么青鬼沙漠，而是一片千万繁花，竞相盛放的花海。

    　　方源'
