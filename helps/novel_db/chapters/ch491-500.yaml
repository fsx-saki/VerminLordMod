- chapter: 496
  title: 第四百九十八节：落英馆战豆神宫（上）
  content: '第四百九十八节：落英馆战豆神宫（上）

    　　见到方源居然在自己的合围埋伏中脱身，还进入了落英馆，传奇太古魂兽青仇顿时气得怒吼连连，一双眼睛充斥血丝，杀意沸腾到了极点，几乎要择人而噬。

    　　它对方源的仇恨，已经不是后天，而是先天。

    　　原本它的形成，就是青家蛊仙的残魂碎片，以及对幽魂深入骨髓的滔天仇恨，复仇之意。

    　　因此即便它有着人的理智，但是遇到方源，又斩杀不掉的时候，心中的复仇之情完全占据了上风'
