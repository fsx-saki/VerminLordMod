- chapter: 494
  title: 第四百九十六节：勘破真身
  content: '第四百九十六节：勘破真身

    　　“八转仙蛊屋！”遭遇到豆神宫的偷袭，方源也不由地流露出一抹惊容。

    　　“这、这是？！”

    　　“豆神宫！！”

    　　“没有搞错吧？”

    　　落英馆中，房家三仙则更加震惊。

    　　房家一代又一代的苦苦搜寻，到了这一代，终于拼凑出了足够清晰的线索，正要在广阔的青鬼沙漠中苦苦搜寻。没想到，居然豆神宫就这样出现在了他们的面前。

    　　房家世代都朝思暮想的青家遗藏，竟然如此主动，直接跳了'
