- chapter: 780
  title: 第七百八十五节：你的性命，我取走了
  content: '第七百八十五节：你的性命，我取走了

    　　关键时刻，方源忽然转守为攻，打了万家三仙一个狠狠的猝不及防。

    　　“该死！”万逍咬牙，叫喊道，“快救万豪光，他的光铠乃是杀招，支撑不了多久的。”

    　　万良翰浑身都窜寒气，方源久守不攻，一旦出动，直指万家三仙的要害。

    　　这份狠辣和犀利，让万良翰首次感到了一股悔意：“应该提前多多调查啊。万家招惹到这样的人物，不知是福是祸！”

    　　魂兽大军宛若潮水般袭来，将万家'
