    　　一转的青铜舍利蛊，二转赤铁舍利蛊，三转白银舍利蛊，四转黄金舍利蛊，五转紫晶舍利蛊。

    　　不管哪一转的舍利蛊，都是该转中的极珍！价值远超同转'
