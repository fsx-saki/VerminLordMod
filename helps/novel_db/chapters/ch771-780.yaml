- chapter: 778
  title: 第七百八十三节：算不尽中计
  content: '第七百八十三节：算不尽中计

    　　西漠。

    　　房家大本营，观园福地。

    　　噗。

    　　房睇长猛地吐出一口鲜血，一头栽倒在地上。

    　　“义父！”在他身旁，养子房云连忙上前，将房睇长搀扶起来。

    　　房睇长受伤颇重，被搀扶着站起来时，仍旧身躯摇晃，头晕眼花。

    　　他连忙视察自身情况，旋即心头苦笑。

    　　这一次受伤，他的脑海遭受重创，出现一道巨大的裂痕，几乎要将脑海分出两半。同时他的魂魄也受创，肉身中更有一团'
