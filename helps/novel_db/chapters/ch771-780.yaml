    　　天庭八转律道蛊仙从严，取来一只仙蛊。

    　　这只仙蛊宛若蜈蚣，长达一前臂，通体橙金之色，甲背上天然生长着无数颗细碎'
  - '的一次重要成长。

    　　她望着碎裂不堪的梦境碎片，仿佛是镜子被打破的样子，心头暗自震惊。

    　　凤金煌在梦道上面的进展之神速，大大出乎她的意料。

    　　凤金煌雀跃欢笑，龙公将其打发，便询问紫薇仙子来意。

    　　紫'
  - '“红莲真传的确是最大的变数，五座宙道仙蛊屋封锁光阴长河，的确是稳妥。就依你计罢。”

    　　“我虽不修行阵道，但也知道仙蛊屋搭建困难，对于从严，就不必苛责了。”

    　　“是，龙公大人。”

    　　因为琅琊福地战败，'
  - '今古亭一直在镇守光阴长河，只要方源进来，必会察觉。但就在刚刚，恒舟搭建失败，还需重来。我还计划组建出三秋黄鹤台、鲨流撬、刹那台。有这五大宙道仙蛊屋，就算寻不得红莲真传，也不会让那方源如愿！”

    　　龙公听了这番话'
  - '第五座宙道仙蛊屋！

    　　这点墨水效应，是方源不清楚的事情。

    　　至尊仙窍。

    　　“到了最关键的地方，似水流年仙蛊，去吧。”方源心念调动，一只仙蛊飞出，直射向前。

    　　到了仙蛊屋雏形中，立即掀起色彩斑斓的光辉。'
- chapter: 775
  title: 第七百八十节：纯梦分身
  content: '第七百八十节：纯梦分身

    　　方源观察着本体魂魄。

    　　经过这段时间的数次修行，他的魂魄已经回复到了六千万人魂！

    　　如今的魂魄，再无之前的颓靡虚弱，而是元气满满，栩栩如生。面容精致，体型如常，从魂魄深处散发出一股光晕，笼罩着魂魄全身，给人结实、精湛之感。

    　　盗天真传——九转杀招鬼不觉，仿佛丝绸内衣，紧贴魂魄表面。在其之上，还有一层鬼官衣。

    　　鬼官衣杀招以七转换魂仙蛊，六转净魂仙蛊为核心，此刻已'
