- chapter: 774
  title: 第七百七十九节：蛊如故大阵
  content: '第七百七十九节：蛊如故大阵

    　　天庭。

    　　组建恒舟的工作，已经到达最关键的时刻。

    　　天庭八转律道蛊仙从严，取来一只仙蛊。

    　　这只仙蛊宛若蜈蚣，长达一前臂，通体橙金之色，甲背上天然生长着无数颗细碎的小钻，紧密挨连，外形极为绚烂华贵。

    　　正是律道仙蛊——恒。

    　　此蛊原本用于天庭的恒沙洞，现在为了组建恒舟，抽调而出。

    　　“最后一步。”从严深呼吸一口气，满脸凝重之色，小心翼翼地运用手法，将恒蛊'
