- chapter: 776
  title: 第七百八十一节：勒索九转仙材
  content: '第七百八十一节：勒索九转仙材

    　　哗哗哗。

    　　海浪声传入方源的耳中，还伴有海鸟清越的鸣叫声。

    　　眼前的东海海面，在温暖的阳光下，闪闪起伏。

    　　海风拂面，令人心旷神怡。

    　　方源的心中却带着微微的失落：“果然是时机未到么……”

    　　他运用翠流珠杀招，从南疆来到东海，目的就是为了寻找苍蓝龙鲸。

    　　现在对于方源而言，掌握悔蛊是美妙的事情。

    　　因为他要升炼大量的六转仙蛊，提升自己的综合实力。悔蛊'
