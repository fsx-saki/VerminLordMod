- chapter: 777
  title: 第七百八十二节：感触命运
  content: '第七百八十二节：感触命运

    　　至尊仙窍，小南疆。

    　　轰隆！

    　　一声巨响。

    　　大地颤抖，土道杀招的氤氲光斑，覆盖了附近方圆百里。

    　　像是一只无形的大手捏动着软泥，周围的地貌开始内凹，外围的土壤则上凸，最终形成一片圆形山谷。

    　　山峰一座座围成一圈，将里面的凹地包裹起来，形成内外隔绝的环境。

    　　而在这凹地当中，并无植被，土壤也稀少，大量的钢材裸露在外，直面天地风云。

    　　“这就是白钢巨碗山谷'
