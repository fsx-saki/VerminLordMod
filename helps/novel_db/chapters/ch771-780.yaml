  events:
  - '样做，他就会泄露出一些重要的情报。

    　　上一世，方源修好荡魂山，还要在很久以后。并且荡魂山修复好了，仙元不够，魂兽、魂核也严重不足，拖慢了太多的节奏。

    　　这一世，方源不仅提前修好了荡魂山，并且魂兽、魂核'
  - '然天下会因此震动，那就更干脆一点，让他们更怕我一些好了。”

    　　“如此一来，也好方便我接下来勒索南疆正道。”

    　　果不其然，方源和天庭再度公开撕逼，让无数蛊仙为之惊呼。

    　　消息如飓风般，很快传遍整个蛊仙'
  - '，只要紧紧跟随自己，好处是受用不尽的。

    　　石狮诚终于心境稍稍平复下来，开始主持大阵。

    　　方源有着阵道、魂道造诣，又不缺仙蛊，并且当下的魂道修行乃是重中之重，便干脆在荡魂山周围一圈，布置了一座仙级大阵。'
  - '蒙蒙之光，将灰蓝的光雾迅速浸染成粉色。

    　　粉色顺着光雾，很快染遍整个大阵。

    　　大阵中囚禁着大量的魂兽，还有魂核的库存。

    　　魂核、魂兽在粉色光雾下，迅速消散，悄无声息。

    　　大阵运转片刻，一颗颗的胆识'
  - '优异，但都有后遗症，绝没有荡魂山、落魄谷这般完美无瑕。

    　　打个比方，这就好像是用其他手段增寿，和用寿蛊增寿的差距。

    　　“我的老天呐……”石狮诚发出一声呻吟般的惊叹。

    　　他终于反应过来，接受了这个梦幻'
  - '还顾忌着天庭，唯恐对方有着类似定仙游杀招的手段。

    　　当然，恢复到这种程度已经无比接近完整，荡魂山的胆识蛊产量下降得微乎其微，方源完全可以接受。

    　　石人六转蛊仙石狮诚来到山前。

    　　尽管他早已知晓方源手中'
  - '开去，短短几个呼吸，就涨成了一个小小巨人。

    　　方源魂魄便飞出大阵，来到旁边不远处的落魄谷内。

    　　迷魂雾笼罩他的魂魄，令魂魄松散开来。

    　　落魄风吹割他的魂魄，带来无数的伤口和无以伦比的痛楚！

    　　痛痛'
  - '节：名震天下！

