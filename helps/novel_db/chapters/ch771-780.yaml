  - '想了想，又问：“可去魔尊幽魂处查探了么？”

    　　紫薇仙子回答得很干脆：“他到底只是一团残魂罢了，没有仙元没有仙蛊，只是阶下之囚。琅琊福地战败后，我就对他多加‘关照’，并无问题。”

    　　龙公叹息一声：“或许'
  - '加紧凑。

    　　古月方正提前升仙只是一方面，恒舟也在加紧筹建，并且还增添了第五座宙道仙蛊屋！

    　　这点墨水效应，是方源不清楚的事情。

    　　至尊仙窍。

