  - '就是一座八转仙蛊屋。

    　　本来似水流年仙蛊，主要是用来产出年蛊。海量的年蛊作为食料，喂养着方源手中的年兽族群。

    　　但现在，因为有了年华池，有了完整稳定的食物链，方源可以让这些年兽族群在里面自给自足，似水'
