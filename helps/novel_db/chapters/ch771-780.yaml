- chapter: 771
  title: 第七百七十六节：名震天下！
  content: '第七百七十六节：名震天下！

    　　一座高大的水晶山峰，矗立在小南疆中。

    　　它通体粉红，散发着梦幻般的光辉，正是《人祖传》中记载，大名鼎鼎的天地秘境之一——荡魂山。

    　　此刻的荡魂山，已经是几乎恢复了旧观。

    　　并不是彻底修复的。

    　　原因和上一世相同，方源还顾忌着天庭，唯恐对方有着类似定仙游杀招的手段。

    　　当然，恢复到这种程度已经无比接近完整，荡魂山的胆识蛊产量下降得微乎其微，方源完全可以接受。'
