- chapter: 772
  title: 第七百七十七节：小魔尊
  content: '第七百七十七节：小魔尊

    　　“原来天庭的八转蛊仙，都栽在了琅琊福地里！”

    　　“难以置信，雷鬼真君可是传奇人物，当年抗衡过幽魂魔尊。而陈衣更是元莲派的上一任太上大长老，掌握着元莲真传啊。”

    　　“这两大人物居然死在方源的手中？难以想象！”

    　　“不只如此，方源这魔头根本没有消停，又祸害了南疆蛊仙界。南疆的夏槎、巴十八以及一干七转强者，都被他俘虏了。”

    　　“他怎么会有这么强的实力？明明只是七转啊。'
