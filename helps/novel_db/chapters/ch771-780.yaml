  events:
  - '，重生跟着他带来。

    　　方源重点修炼陶铸真传中的内容。

    　　仙道杀招——五禁玄光气！

    　　蛊虫盘旋，仙元灌溉，一道恢弘的光气喷涌而出。

    　　它呈现紫黑色，烟气的形态更多于光，让人第一眼看了就联想到南疆的瘴'
  - '界壁的消失，五域乱战的未来。

    　　“中洲炼蛊大会，天庭，咱们走着瞧！”

    　　方源关注舆论，也是在探索墨水效应。

    　　他知道，研究这方面的变化，对于他对命运，对万物，对世界的了解，都大有裨益。

    　　“回顾一下，'
  - '，防止落入他的算计之中。”

    　　“但若真的杀了方源，那收获可就太大了。”

    　　“是啊，方源手中掌握的尊者真传，还有无数的资源，春秋蝉、定仙游种种仙蛊还有数座天地秘境……完全媲美一个超级势力！”

    　　五域蛊仙界'
  - '坏宿命蛊的功劳！”

    　　和上一世相比，好的方面比比皆是，但不利的墨水效应也有不少。

    　　首先，南疆的律道八转强者巴十八被方源俘虏了，未来也会被吞窍，不得善终。

    　　这就意味着，将来武庸率领的南联攻击中洲，'
  - '这个魔头越来越可怕了。这才多久，他就伏杀了八转强者，更俘虏了一大群七转、八转。”

    　　“哈哈哈，南疆正道的脸面丢的太大了。”

    　　“也不能这么说吧，就连天庭都栽在方源的手里。”

    　　“方源明明只有七转，居'
  - '世，不仅琅琊福地被方源吞了，长生天没有捞到手，而且凤仙太子也回归天庭，北原正道出了这么大一个内奸，让黄金血脉脸上无光，长生天更是难逃，遭受牵连。

    　　外界吵的天翻地覆，都动摇不了方源。

    　　他蹲在角落里闷头发'
  - '姚家。而现在地脉震动，大变就在眼前，绝大多数的超级势力都知道到了界壁的消失，五域乱战的未来。

    　　“中洲炼蛊大会，天庭，咱们走着瞧！”

    　　方源关注舆论，也是在探索墨水效应。

    　　他知道，研究这方面的变化，对于他'
  - '了未来的变化，比如南疆的姚家。而现在地脉震动，大变就在眼前，绝大多数的超级势力都知道到了界壁的消失，五域乱战的未来。

    　　“中洲炼蛊大会，天庭，咱们走着瞧！”

    　　方源关注舆论，也是在探索墨水效应。

    　　他知'
- chapter: 773
  title: 第七百七十八节：万年斗飞车
  content: '第七百七十八节：万年斗飞车

    　　练习杀招，并不容易，稍有大意，杀招失败蛊仙还是遭受反噬，身上带伤。

    　　威力越大的杀招，风险越高，但不练还不行，总不能在激战中胡乱催动吧？战斗中的环境更是糟糕，会引发对手的强烈阻击。

    　　历史上，有过不少蛊仙的例子，他们因为催动杀招失败，遭受反噬，伤势过重而亡。

    　　其中，练习杀招死亡的例子，也有许多。

    　　偏偏方源掌握的五禁玄光气，是那种威力强大的杀招，所以他练习'
