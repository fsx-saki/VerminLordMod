- chapter: 933
  title: 第九百三十九节：追寻——自由！
  content: '第九百三十九节：追寻——自由！

    　　方源浑身浴血，伤痕累累，他冷哼一声，猛地站起，抬眼便望见伫立在自己面前的绣楼。

    　　绣楼本是凡物，乃是元始仙尊留给徒弟星宿的陪嫁的东西。只是按照当时的风俗，其实象征意义更多一点。但后来星宿成尊，便着手将绣楼转变成了仙蛊屋，便有了极其玄妙的威能。

    　　一百多万年前，狂蛮魔尊入侵天庭。他一路直闯，先后经过仙帝苑、蕴空阁、须弥泽、恒沙洞、百万天王画廊、绣楼、中央大殿，'
