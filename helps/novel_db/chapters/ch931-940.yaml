- chapter: 940
  title: 第九百四十六节：毁了又如何？
  content: '第九百四十六节：毁了又如何？

    　　宿命蛊被方源摧毁，整个战场顿时恢复了原状。

    　　命败杀招形成的白光，陡然消散一空。

    　　咔嚓嚓。

    　　一连串的脆响，整个监天塔上迅速蔓延遍布无数裂纹。然后下一刻，砰的一声，整个监天塔破碎！

    　　偌大的天庭，陷入一片死寂当中。

    　　战场上没有一丝的风，但众仙的心头却是有飓风呼啸！

