- chapter: 938
  title: 第九百四十四节：变化的人心
  content: '第九百四十四节：变化的人心

    　　“快支援龙公！”天庭蛊仙们纷纷动身，再不敢坐视下去。

    　　龙公和凤九歌乃是天庭两大支柱，一旦龙公被方源击败，彻底倒下去，整个战局恐怕又要迷离难测之态了。

    　　轰！

    　　方源忽然一个踢腿，把龙公的手臂猛地踢到一旁。

    　　龙公中门大开，方源趁势欺近，左手一把抓住龙公的紫发。

    　　然后，他抡起右拳，拳影飚飞，一拳拳宛若炮弹打在龙公的脸上、胸膛上。

