- chapter: 936
  title: 第九百四十二节：最终对决
  content: '第九百四十二节：最终对决

    　　因为方源身上的惊变，整个天庭战场的厮杀都缓了一缓。

    　　很快，龙公就第一个反应过来。

    　　仙道杀招——回旋龙牙。

    　　方源情势不明，三怪忽然化为一件血色披风披在了他的身上，龙公不敢托大，也是在之前被三怪揍得心生顾忌，当即用回旋龙牙杀招来远攻试探。

    　　龙牙飞舞，锐利如刀。方源却是不闪不避，有心试探此刻的防御力。

    　　锵锵锵！

    　　龙牙斩在他的身上，爆发出一阵阵金色火花'
