- chapter: 939
  title: 第九百四十五节：摧毁宿命！
  content: '第九百四十五节：摧毁宿命！

    　　轰！

    　　在人中豪杰的增幅下，龙宫艰难地挡下龙公。

    　　“滚开。”下一刻，龙公一记龙爪击，将龙宫打飞。

    　　龙公眼前重新开阔，但他却毫无喜悦之意，皆因此时方源已经贴近监天塔。

    　　不只是他，武庸、冰塞川、沈伤等人亦都汹涌攻去，这番攻势狂潮极其恐怖。

    　　龙公已阻挡不及，看到这一幕不禁睚眦欲裂。

    　　此时此刻，监天塔即便虚化，也不能规避危局。因为方源本身就掌握着梦道的'
