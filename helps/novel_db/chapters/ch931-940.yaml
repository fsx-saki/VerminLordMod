- chapter: 937
  title: 第九百四十三节：完整的人意
  content: '第九百四十三节：完整的人意

    　　在这彻底释放人意的一瞬间，不管双方的蛊仙，都似乎听到了无数民众的窃窃私语。

    　　“一定要平安健康的成长啊，我的孩子们。”

    　　“有情人能终成眷属，真的太好了。”

    　　“祈愿天下和平万万代。宁为太平犬，不做乱世人！”

    　　“杀光这些无法无天，无恶不作的盗贼恶徒们！”

    　　“正道一定会胜利的。”

    　　“我相信，正义和公道虽有时晚来，但从不缺席。”

