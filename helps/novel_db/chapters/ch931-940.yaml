  title: 第九百三十七节：责任和牺牲
  content: '第九百三十七节：责任和牺牲

    　　宗门后山，山青水绿，鸟鸣啾啾。

    　　“小都，躺在地上干什么呢？”一个温婉的女声传入耳畔。

    　　“是师姐啊。”少年时代的袁琼都睁开双眼，便见到一位少女俯身瞪着一双水灵灵的双眼看着他，眼眸中带着笑意。

    　　少女的目光转移到小都的手中，一声惊叹发出：“哇，小都，你又炼成了一只三转蛊。你真的很厉害呢。”

    　　“可是我一点都不开心，你知道的，我并不喜欢炼道的修行啊。”袁琼都嘟'
