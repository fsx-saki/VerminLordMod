- chapter: 934
  title: 第九百四十节：关键时刻关键人物
  content: '第九百四十节：关键时刻关键人物

    　　天庭战场，不论敌我双方的目光，都集中在了一个地方！

    　　方源环视左右，他被三头忽然出现的巨怪包围在中央。但三头巨怪并未对他怎样，反而是齐齐护卫着他，敌视周遭，态度之鲜明一望可知。

    　　“狂蛮魔尊……”方源一脸震惊之色。

    　　“就算有狂蛮魔尊的手段助你，你也必败无疑！！”龙公大吼，声音震荡百里。他从空中俯冲而下，宛若一颗赤色流星，即便是有狂蛮魔尊的手段出现，他的斗'
