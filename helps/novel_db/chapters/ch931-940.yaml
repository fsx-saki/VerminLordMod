- chapter: 935
  title: 第九百四十一节：男人一定要帅！
  content: '第九百四十一节：男人一定要帅！

    　　方源一直作战在最前线。

    　　一方面他不断出手，和龙公等人激烈对抗，另一方面他始终保持着冰雪般的冷静，筹谋着全局。

    　　但自从狂蛮魔尊的手段发动之后，他的耳畔就多了一道声音。

    　　“看好了，后辈！你眼前的这三头巨怪，乃是我三记仙招所化。这三记仙招是我阅读《人祖传》中‘追寻自由’的篇章有所心得和灵感，皆为追寻自由而开创。”

    　　“第一招——奔雷黄鸟变，以态度蛊为核心'
