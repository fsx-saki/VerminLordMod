- chapter: 932
  title: 第九百三十八节：方源倒下
  content: '第九百三十八节：方源倒下

    　　像是过了许久，又仿佛是一刹那。

    　　恢弘的监天塔开始徐徐地散发出洁白的光辉，然后光辉逐渐明亮，开始绽射。

    　　几个呼吸之后，明光冲霄，仿若君临天下，照耀整个战场！

    　　原本惨烈厮杀的混乱战场顿时僵滞。

    　　几乎所有的蛊仙都抬起头，望向监天塔。

    　　三域蛊仙无不面色惨白，一脸灰败。而天庭中许多蛊仙在这一刹那涕泪横流。

    　　“九转宿命蛊修复成功了！”

