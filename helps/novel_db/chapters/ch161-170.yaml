    　　“回狼王大人的话，战场已经打扫干净，共'
  - '行，还得有充分的资源供给，甚或是名师指点。看来这小子背景深厚啊。”

    　　之前，墨瑶已经知道，方源坐拥狐仙福地的秘密。现在再结合“双大师”的情报，她更觉得方源大有来头。

    　　“狼王大人，葛家、常家族长前来觐见了'
- chapter: 169
  title: 第一百六十九节：墨瑶的弱点
  content: '第一百六十九节：墨瑶的弱点

    　　深幽的大殿中，只站着方源一人。

    　　死一般的沉寂。

    　　昏黄的光晕链接一体，形成蛊屋形状。光屋中，躺着一地的尸体。

    　　近两百位蛊师，俱都惨死。

    　　这些尸体，有的浑身长满鳞甲，浑身僵硬如铁，有的生长怪臂，面孔狰狞。有的干脆自爆，残肢碎片各处洒落。

    　　方源脸色沉凝，在脑海中质问墨瑶：“这就是你构思出来的杀招？”

    　　墨瑶却理直气壮：“这些蛊师肯定是要死的，六臂天尸'
