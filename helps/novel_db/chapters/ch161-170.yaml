- chapter: 162
  title: 第一百六十二节：人生为何早有悟
  content: '第一百六十二节：人生为何早有悟

    　　方源看着碗壁上的墨文，微微咧嘴。

    　　这招灾蛊，品级高达七转，比方源如今的春秋蝉还要高一个档次。效用极端奇妙，居然是涉及地灾天劫。

    　　墨文中段，有详细阐述。招灾蛊能够替蛊仙招灾引难，将地灾天劫脱离原来的目标，勾连到自己的身上。

    　　方源神情不免古怪起来。

    　　这样的仙蛊，谁敢用？

    　　天灾地劫是多么麻烦的毁灭力量，多么恐怖的天地伟力。好好的日子不过，用招灾蛊吸'
