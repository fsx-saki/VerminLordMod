- chapter: 168
  title: 第一百六十八节：狡电狈
  content: '第一百六十八节：狡电狈

    　　群狼涌动，呼啸而来。

    　　情势急转直下，让两位族长以及家老们都脸色骤变。

    　　他们两家虽然成功抵挡住狼潮，但也是岌岌可危，极为勉强的。如今再出现一波如此强势的狼潮，根本就无余力抵抗了。

    　　一时间，家老和两位族长都下意识地停止了战斗。

    　　“情报上说，不是只有三头雷冠头狼的吗？”有家老失声大叫。

    　　“不对，这头雷冠头狼身上负着伤，狼群的规模也不是很大。”古月博强制镇定'
