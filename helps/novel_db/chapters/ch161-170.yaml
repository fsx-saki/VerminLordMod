- chapter: 166
  title: 第一百六十六节：二战白凝冰
  content: '第一百六十六节：二战白凝冰

    　　白衣独臂，雪发蓝眸。

    　　不是白凝冰，又是何人？

    　　冰刃还未及体，方源就感到一股森冷的寒气扑面而来，仿佛寒星坠地，杀机冷酷。

    　　方源双眸黑幽，临危不动，终身后跃，同时真元灌注到天蓬蛊中，撑起一片白光虚甲护身。

    　　砰的一声闷响，冰刃重重地劈在地上，于刹那间爆发出一堆白色冰刺，从地面激凸而出。

    　　跨擦擦！

    　　尖锐的冰刺一路突出，向方源退走的方向直线蔓延，形成一'
