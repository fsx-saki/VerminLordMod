  - 宿命蛊仍在。将来新的炼道成果，或许还能推动宿命蛊的修复。
  - 如果不败福地被摧毁，我们没有提炼出足够的成功道痕，对我们修复宿命有巨大的影响。
- chapter: 164
  title: 第一百六十四节：激战
  content: '第一百六十四节：激战

    　　要对战雷冠头狼，就得主动出击。它的力量太强大了，若是将它放入山寨当中，将会造成巨大的损失。

    　　这只队伍实力强大，以四转修为的族长古月博为箭头，其他家老为后援，极具冲击力量。

    　　狼潮汹涌，而他们则逆流而上，配合严谨，宛若一艘战船，劈开风浪，勇往直前。

    　　所到之处，简直是所向披靡！

    　　越是接近雷光头狼，来自狼潮的压力就越大。

    　　古月博满脸沉静，忽然伸出右掌，往前方凌'
