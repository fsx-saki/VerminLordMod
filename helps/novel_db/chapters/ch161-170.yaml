    　　方源本来就凶威赫赫，如今一言不发，就动辄杀人，实在凶残。

    　　这些蛊师，又都非强者，多以一二转之流，出身不好，进不得八十八角真阳楼，面对方源这样的五转巅峰强者，想要对抗只能是自找死路，只有讨饶一'
  - '性谨慎，这地魁尸蛊乃是改良蛊方所炼，出了问题怎么办？

    　　虽说和脑海中的墨瑶意志达成了妥协，对方又是正道灵缘斋仙子，且又是炼道宗师，却不可不防。

    　　“不过宗师就是宗师，我的炼道造诣，已经是大师境界。但是'
  - '脚下，从断颈处汩汩流血，血腥气味渐渐弥漫大殿。

    　　将这些蛊虫安排妥当，方源又按照墨瑶之言，接连调动真元灌注。

    　　这灌注的顺序似大有讲究，忽而选择东南角落里的蛊虫，忽而直奔西北角落，又忽的转移到左右两侧'
  - '敬且畏。

    　　经过王庭之争的洗礼，又身处高位，资源不缺，在狼王这棵大树之下，葛光、常极右已经都是四转蛊师了。

    　　方源瞥了两人一眼，没有令他们起身，而是直接问道：“我前些天，吩咐你们的事情，完成的如何了？'
  - '是。”门外，奴仆恭敬而退。

    　　不多时，两人过来，跪地而拜，连磕了三个响头，神态极敬且畏。

    　　经过王庭之争的洗礼，又身处高位，资源不缺，在狼王这棵大树之下，葛光、常极右已经都是四转蛊师了。

    　　方源瞥了两人'
  - '墨瑶每关照一句，方源就应声飞出一只蛊虫。

    　　这些蛊虫，都是组成六臂天尸王杀招的蛊虫，地魁尸蛊、修罗尸蛊、天魔尸蛊等等，或被投放到大梁上，或是安置在角落里。

    　　一只只的蛊虫划空而去，在众俘虏的眼中，留下'
  - '一眼，没有令他们起身，而是直接问道：“我前些天，吩咐你们的事情，完成的如何了？”

