  title: 第一百七十节：求人
  content: '第一百七十节：求人

    　　中洲，地渊深处。

    　　美酒佳肴，摆上庄园。

    　　“来，石兄，我早就听闻你喜好美酒。这些美酒，是我专门搜罗过来，请你品尝。”蛊仙杨峰端坐着，伸出手掌示意对面的贵宾。

    　　这位贵宾有一头白色短发，一对金瞳闪烁着锐利的光芒，穿着一身劲装武服，腰间系着蓝银腰带，小腿小臂都有灿银铠甲。

    　　他狼背蜂腰，浑身上下都散发出一股彪悍勇猛之气。只是他现在半倚半靠，姿态随意洒脱，稍稍冲淡了一些'
