- chapter: 170
  title: 第一百七十节：再探真阳楼
  content: '第一百七十节：再探真阳楼

    　　方源再度进入中枢室。

    　　顾名思义，中枢室乃是八十八角真阳楼的中枢要地。

    　　密室成圆形，闪烁星辉的墙壁围绕一圈，中央立着一张白玉圆桌。圆桌上堆砌着精致模型，类似沙盘，正是王庭福地的全貌。

    　　不仅山川河流，中央的圣宫，甚至福地中的各个小塔楼都清晰可见。

    　　“又来到这里了。”脑海中，墨瑶意志发出一声感慨。

    　　方源没有搭理她，只是将视线投向白玉圆桌。

