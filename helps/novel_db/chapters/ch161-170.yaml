- chapter: 161
  title: 第一百六十一节：以一对七（上）
  content: '第一百六十一节：以一对七（上）

    　　方源原本动用着敛息蛊，尽量收敛着气息。此时一动手，真正的气息就爆发了出来。

    　　再加上铁若男这些人先入为主，一直认为方源是四转初阶的修为。因此一时间，铁家七人都十分讶异。

    　　“四转中阶，这个小兽王年纪轻轻，居然超越了我家若男少主！”

    　　“四转中阶啊，难怪他这么狂妄。”

    　　“四转中阶又怎样？他居然敢主动找上门来，简直是自找死路！”

    　　……

    　　许许多多的念'
