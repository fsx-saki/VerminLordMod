- chapter: 162
  title: 第一百六十二节：天元宝莲
  content: '第一百六十二节：天元宝莲

    　　虽是打算探查花酒遗藏，但方源一直脱不得身，他成为家老风头正劲，狼潮又频繁活动，许多事情委派过来，让他没有机会。

    　　真正再到石缝秘洞中来时，已经是十几天之后。

    　　夏末夜晚。

    　　小雨刚停，带来秋意。

    　　天空中，一轮黄金之月，圆满如盘，高高悬挂着。

    　　耳边隐约的狼嗥声，和残留的蝉鸣相互交融。方源隐着身站在山坡上，回头一望。

    　　古月山寨中亮着无数灯火，残破的寨墙补'
