- chapter: 161
  title: 第一百六十一节：心甘情愿被剥削
  content: '第一百六十一节：心甘情愿被剥削

    　　方源放下酒杯，坐下。

    　　众人这才敢坐下。这些人，并非是全部同窗。譬如漠北、赤城等有深厚背景的，皆不再此列。

    　　“时间差不多了，我也该走了。这酒宴办的不错。”方源表明了去意。

    　　古月定宗被这一夸，顿时心花怒放，连忙站起来，从怀中掏出一个钱袋子。

    　　袋子里自然装的满满的元石。

    　　他弯腰谄笑道：“今日聆听大人一番教诲，实在叫小人茅塞顿开，大有所获。区区薄礼，'
