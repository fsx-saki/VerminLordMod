- chapter: 165
  title: 第一百六十五节：血滴子
  content: '第一百六十五节：血滴子

    　　祠堂中一片死寂，家老和族长都低垂着头，心中像是压着一块巨石。

    　　蛊师死亡之后，遗留下来的蛊虫，仍旧残存着人的意志。不能算是野生蛊虫，更失去了直接运用大自然中元气的能力。

    　　这些蛊虫，可以认作为蛊师的生命，以另外一种方式的延续。

    　　所有人都心中惴惴不安。

    　　一代族长已经仙逝近千年，他留下的手段是否还有效？这是个未知数。

    　　毕竟距离上一次的危难，也已经过去了两百年'
