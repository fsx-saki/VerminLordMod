- chapter: 167
  title: 第一百六十七节：第四头？！
  content: '第一百六十七节：第四头？！

    　　“是你逼我的！”白凝冰狠狠咬牙，凝出一柄冰刃。

    　　同时，他暗暗催动旋踵蛊、狂风蛊。

    　　白色的冰刃风暴再起！

    　　起先只是一小股，但很快，体积就膨胀起来，冰风呼啸，霜雪横溢。地面上坚冰蔓延覆盖，有效地克制了锯齿金蜈的地底突袭。

    　　这冰刃风暴，乃是白凝冰独创之招数。亦是彰显了这个北冥冰魄体的战斗才情。

    　　这乃是冰刃蛊、旋踵蛊、狂风蛊一齐使用，形成攻防一体的奥义。'
