- chapter: 170
  title: 第一百七十节：铁面无私血可冷？
  content: '第一百七十节：铁面无私血可冷？

    　　方源看着白凝冰的背影，直至他远去。

    　　“见证世间精彩……”少年黑色的双眸闪过一丝凝重。不再迷茫的白凝冰，将比先前要更加危险。

    　　生和死不再困扰他，他越接近死亡，越会爆发出北冥冰魄体无双的风采。

    　　“但是要和我择日再战，呵。”方源忽的轻笑一声，“你注定要失望了……”

    　　从滚滚狼烟中脱困的那一刻，方源就决定即刻离开青茅山。

    　　和白凝冰的战斗虽然有趣，但是毫'
