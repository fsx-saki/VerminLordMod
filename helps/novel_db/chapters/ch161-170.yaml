- chapter: 170
  title: 第一百七十节：此回福地须假戏
  content: '第一百七十节：此回福地须假戏

    　　蛊仙穿透界壁，本来千辛万苦，分外艰难。

    　　但每年到了这个时间，因为地潮，东海的界壁变得孱弱虚薄，都会有中洲、北原、南疆的蛊仙，趁机进入东海。

    　　当然，也有少部分的东海蛊仙，趁机进入中洲、北原、南疆。

    　　所以，中洲、北原、南疆的蛊仙，来到东海并不是一件奇怪的事情。

    　　唯有西漠的蛊仙，才是在东海真正罕见的。因为西漠和东海并不接壤，中间隔着中洲。西漠蛊仙一旦出现'
