- chapter: 162
  title: 第一百六十二节：进入陌生福地
  content: '第一百六十二节：进入陌生福地

    　　方源十分顺利地回到琅琊福地。

    　　此刻，他的神念萦绕在至尊仙窍之中。

    　　“前后检查了十八遍，应该是没有问题了。不过即便出现了问题，刚刚孵化出来的上极天鹰，也不过是荒兽级。就算反叛，也不要紧。”

    　　方源心中思量着。

    　　这里便是至尊仙窍中的小紫天里。

    　　一座普通的鹰巢，漂浮在空中。

    　　鹰巢中，除了一颗上极天鹰鸟蛋之外，空无一物。

    　　在方圆百里范围内，方源部'
