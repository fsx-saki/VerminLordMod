    　　方源拥有春秋蝉，她还并不知晓。方源是穿越者的最大秘密，她更无从得知。

    　　这是蛊的世界。

    　　墨瑶早已陨落，留下的只是一段意志罢了。无法催动蛊'
  - '亡，这些魂魄他就多多益善。

    　　其三，却是针对脑海中的墨瑶意志，也能起到试探之用。

    　　至于肆意斩杀蛊师的恶劣反响，方源怡然不惧。

    　　不说他前面发过公告，广而告之，已经有了铺垫。就算民意沸腾，众人怨愤仇'
  - '乃野兽，会被浓郁的血腥气息吸引，激发凶残气性，主动冒出地面。

    　　其二，大量屠戮，就能带来大量魂魄。王庭之争起初时，方源就用葬魂蟾一直收集着。他有荡魂山，只要一日荡魂山不彻底死亡，这些魂魄他就多多益善。'
  - '个如履薄冰的小人物了。

    　　在这个蛊仙进不来的王庭福地当中，他咆哮一声，万众蛊师都要颤一颤。跺跺脚，圣宫上下都要抖三抖。只消念头一动，狼群呼啸，立时便是血染千万里。

    　　地球上有句名言——枪杆子里出政权。'
  - '主动冒出地面。

    　　其二，大量屠戮，就能带来大量魂魄。王庭之争起初时，方源就用葬魂蟾一直收集着。他有荡魂山，只要一日荡魂山不彻底死亡，这些魂魄他就多多益善。

    　　其三，却是针对脑海中的墨瑶意志，也能起到试探'
  - '为，就立即妥协，城府深厚！到底是何跟脚呢？”

    　　墨瑶的这段意志，不禁暗暗猜测起来。

    　　她才刚刚从近水楼台中出来，寄托在方源的脑海中，虽然解析了方源的许多念头，一时间知道不少秘密。

    　　但方源反应敏捷，立即'
- chapter: 168
  title: 第一百六十八节：人肉试验
  content: '第一百六十八节：人肉试验

    　　花园中，银辉烂漫，草木招展。

    　　坐在凉亭里，方源把玩着手中的地魁尸蛊。

    　　此蛊形如蚯蚓，通体嫩黄，有婴孩的前臂长短，此刻盘绕在方源的手指之间，宛若蛇般蜿蜒游走。

    　　正是用了墨瑶提供的改良蛊方，在地魁万兽王的尸躯血肉的基础上，炼制而成。

    　　不过，方源却没有催动试用。

    　　他生性谨慎，这地魁尸蛊乃是改良蛊方所炼，出了问题怎么办？

    　　虽说和脑海中的墨瑶意志达成了妥'
