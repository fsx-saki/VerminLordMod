- chapter: 166
  title: 第一百六十六节：死不足惜
  content: '第一百六十六节：死不足惜

    　　轰隆隆……

    　　大地震动，如潮水般的狼群出现在天际，绵绵不绝，宛若浩荡江水，奔腾而去。

    　　万狼奇奔，狼群混杂。有风狼，奔走如飞。有水狼，洁白如雪。有夜狼，漆黑矫健。又有龟背狼，敦实稳重，朱炎狼赤焰蒸腾。

    　　百狼王、千狼王、万狼王领袖群伦，更兼有异兽狼，行于行伍，分外显眼。

    　　诸如血森狼，背负骨林，高大如山；又有鱼翅狼，批甲如象，水陆皆能；还有狂狼，银灰三眼，战痴'
  gu_mentioned: []
  char_appear:
  - 方源
  - 江暴牙
  - 马尊
  - 马鸿运
  events:
  - '的千兽王。这头兽王虽然不能战，老弱多病，但身上寄生的野蛊，却是货真价实的三转级数。

    　　凡人蛊师中，一转乃是学徒，刚刚起步，战力孱弱，最为常见。二转，则是骨干、基石，十分普遍。

    　　三转称之为长老、家老，'
  - '是寻常的百兽王，而是一头老迈的千兽王。这头兽王虽然不能战，老弱多病，但身上寄生的野蛊，却是货真价实的三转级数。

    　　凡人蛊师中，一转乃是学徒，刚刚起步，战力孱弱，最为常见。二转，则是骨干、基石，十分普遍。'
  - '上寄生的野蛊，却是货真价实的三转级数。

    　　凡人蛊师中，一转乃是学徒，刚刚起步，战力孱弱，最为常见。二转，则是骨干、基石，十分普遍。

    　　三转称之为长老、家老，乃是势力中坚，数量急剧减少。四转乃是势力首脑'
  - '声叫喊，振奋士气。

    　　众人应答参差不齐，勉强振奋精神。

    　　从开战至今，已持续了大半个时辰。蛊师们真元消耗将尽，但幸好北原风气，这些蛊师大多都兼修了力道。

    　　蛊师们奋力作战，多以肉搏为主，非到万不得已'
  - '如趁早改换，知难而退，干嘛尽做吃力不讨好的事情呢。唉，姐姐是个过来人。你要知道，道路万千，流派无数。蛊师之强，不在于走多少条道路，而在于谁走得更远。”

    　　墨瑶好言劝解，但方源冷哼一声，冷傲否决：“事在人'
  - '。

    　　旋即从天边涌起一道灰线，渐渐的线条浓重而又清晰起来。

    　　狼！

    　　怎么这么多的狼？！

    　　狼潮从天边奔涌而来，气势浩荡，宛若滔滔洪水席卷天下。

    　　千兽王顿足，呆了片刻，浑身颤抖，转身就跑。'
  - '今脚下奔腾的狼群，似江如海，规模多达五十万之众！

    　　到了他这一步，已经是货真价实的凡尘巅峰。

    　　王庭之争起初，他和江暴牙、马尊等人被称之为五大兽王。王庭之争结束之后，不谈天下公认，但已经是北原公推的当代第'
  - '少。但在王庭福地，却规模众多。譬如这片地域，方圆万里，都是地魁兽群。

    　　财帛动人心，又因为此地靠着圣宫不远，因此很多蛊师常常结伴同行，到此狩猎。

    　　这支激战中的小队，正是其中一支。

    　　队中的蛊师们，'
- chapter: 167
  title: 第一百六十七节：炼得地魁尸蛊
  content: '第一百六十七节：炼得地魁尸蛊

    　　狼群过处，如巨浪卷席，血洗福地山河。

    　　方源神情淡漠，端坐天青狼王背上，对脚下的无情杀戮视若无睹。

    　　脑海中，墨瑶意志微皱眉头。

    　　她是灵缘斋培养的一代仙子，正道人物，对方源轻易大开杀戒，自然没有欢喜之感。

    　　“这少年，能伪装身份，在北原蛊仙的眼皮子底下，潜入王庭福地，是悍勇阴鸠之人。又能破析我的传承线索，炼成仙蛊，是有机缘，又手段非凡。更能屈能伸，知道事'
