- chapter: 162
  title: 第一百六十二节：以一对七（中）
  content: '第一百六十二节：以一对七（中）

    　　战斗在如火如荼地进行着。

    　　“小兽王，居然如此可怕！我们这么多人，居然还拿不下他！”铁沐一边治疗，一边凝望战场，脸色变幻不定。

    　　“他的战力突飞猛进，竟然强大到这样的地步了！”铁刀苦看着眼前的战斗，感觉自己已经插不上手。

    　　“难怪他狂妄到拦截我们，这样的战斗力……不过就算你再凶猛，又能如何？双拳难敌四手，战斗到如今，我们仍旧是七个人！这就是团队的协作力量！'
