- chapter: 163
  title: 第一百六十三节：雷冠头狼
  content: '第一百六十三节：雷冠头狼

    　　方源看着面前的这株天元宝莲，一直以来，心中积压的疑云顿时消散了大半。推算出了历史的大概。

    　　时光回溯，将近千年之前。

    　　一位五转蛊师强者，孑然一身，来到青茅山上，偶然间发现了地下溶洞中的这道天然元泉。

    　　他大喜，于此安营扎寨，将山脚的凡人村子合并迁徙，形成了古月山寨的雏形。

    　　他大肆娶妻，妻妾上百人，播撒血脉。

    　　他就是古月一族的先祖，古月山寨的创建者。'
