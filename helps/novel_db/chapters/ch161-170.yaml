- chapter: 161
  title: 第一百六十一节：离开黑凡洞天
  content: '第一百六十一节：离开黑凡洞天

    　　一座蛊阵之中。

    　　方源静静地盘坐在地上。

    　　楚度还有胖山、不是仙的意志，在阵前伫立。

    　　“开始吧。”楚度语气淡淡地道。

    　　不是仙、胖山的意志凝聚成人形，闻言点头，纷纷调动体内仙蛊。

    　　一只律道仙蛊——不。

    　　另外一只也是律道仙蛊，名列奇蛊榜前十，名为——在乎。

    　　红枣仙元在迅速消耗，两只仙蛊各自散发出奇妙的玄光。两股玄光颜色不一，一道黑光，空空洞洞，'
