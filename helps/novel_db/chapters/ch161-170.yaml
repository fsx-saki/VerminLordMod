    　　北原，疯魔窟。

    　　“柳贯一，我们等你很久啦！”不是仙主动来到第一层，接应方源和楚度。

    　　三人一边交谈，一边往更深处前行。

    　　方源发现，这一次的路线和他上一次前来时，又稍稍有了不同的变化。

