    　　它以借力蛊为核心，六种飞僵蛊为辅，另外包含三十六只其他蛊虫，搭配巧妙，结构严谨，令方源也赞不绝口。

    　　“只是，五大飞僵蛊我是知'
  - '尤其是八十八角真阳楼自异变后，连续凝出两层楼，更激发了众人的探索欲望。

    　　至于外人，仍旧只能通过来客令进出。

    　　来客令属于一次性的消耗品，只有打通关卡之后，才有一定的可能得到。

    　　目前为止，众人手中'
- chapter: 165
  title: 第一百六十五节：妥协
  content: '第一百六十五节：妥协

    　　幽暗的密室中，萦绕着沁人心脾的檀香。

    　　方源盘坐在蒲团上，手里捏着一只东窗蛊。

    　　此蛊隶属信道，四转，形如瓢虫，但背上甲壳却是方形，宛若窗棂，专门用来储存重要的消息。

    　　这只蛊是方源花费代价，从宝黄天中特意求购而来的。

    　　里面的内容，都是关乎意志。

    　　自从墨瑶意志潜伏到自己的脑海中后，方源就一直在收购这些相关的资料，花费了许多仙元石。

    　　这只东窗蛊，早已经不是'
