- chapter: 161
  title: 第一百六十一节：近水楼台解玄秘
  content: '第一百六十一节：近水楼台解玄秘

    　　进行到这一步，方源已是叹为观止。

    　　这位布置地丘传承的神秘蛊仙，绝对是炼道宗师的造诣。整个炼蛊过程，都是借助八十八角真阳楼的伟力，巧妙而又大胆。

    　　方源虽然是主持之人，但是充其量还不如说是一位协助者。

    　　炼蛊艰难，炼就仙蛊，更是难上加难，难比登天！

    　　然而打个比喻的话，这颗巨石已经被神秘蛊仙推上了山巅。方源不过是最后出一把力气，轻轻一推，将这巨石推下山峰'
