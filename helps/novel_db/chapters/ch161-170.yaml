- chapter: 169
  title: 第一百六十九节：寻路
  content: '第一百六十九节：寻路

    　　白凝冰浑身伤痕累累，气喘吁吁，形态狼狈。

    　　当方源赶来时，两个人都楞了一楞。

    　　命运这玩意，真是奇妙。前一刻，两人还是生死仇敌，要将对方置之死地。但这一刻，他们却需要联手，才有生存逃亡的机会。

    　　和白凝冰联手？

    　　方源目光幽幽一闪，心中思量：“白凝冰虽然癫狂，也意识到自己的命运，但并不代表他不想活下去。”

    　　求生是一个人的原始本能，最基本的需求。

    　　事实上，也'
