    　　这当中，实力最强的竞争者，必然是来自中洲十大古派的蛊仙。

    　　金烈阳、洪赤明、齐云天等等。

    　　而在这十大古派仙人之中，最让人感到威胁的，还'
  - '不能留下！”

    　　“大力真武仙僵倒是其次……而那座惊鸿乱斗台，最好能归为天庭所有。尽管是在南疆，有着界壁的阻碍，这一次天庭也要尽力而为。”

    　　单单那座奇妙的仙蛊屋惊鸿乱斗台，已经完全值得天庭的蛊仙出手。'
  - '然飞落而下。

    　　却是八转水道蛊仙白沧水到了。

    　　局势立即颠覆！

    　　中洲，天庭。

    　　明光照耀着监天塔，它又重新完整，屹立在三仙面前。

    　　监天塔主、碧晨天、炼九生心中大石放下，都暗暗松了一口气。'
- chapter: 312
  title: 第三百一十三节：旷世赌斗
  content: '第三百一十三节：旷世赌斗

    　　“哈哈哈，终于大功告成了！”

    　　从地下石窟出来，方源的脸上充满了喜悦之色。

    　　这段时间内，他全力以赴，一门心思的推算仙道杀招，终于在今日得成正果。

    　　这道全新的杀招，是以吃力仙蛊、拔山仙蛊、挽澜仙蛊为核心，辅助三十三万多只凡蛊，形成一套繁芜至极，令人眼花缭乱的搭配。

    　　要催动这个杀招，方源必须要一心一意，并且至少得持续一个时辰，才能将整套蛊虫都催动起来。'
