- chapter: 312
  title: 第三百一十三节：旷世赌斗
  content: '第三百一十三节：旷世赌斗

    　　“哈哈哈，终于大功告成了！”

    　　从地下石窟出来，方源的脸上充满了喜悦之色。

    　　这段时间内，他全力以赴，一门心思的推算仙道杀招，终于在今日得成正果。

    　　这道全新的杀招，是以吃力仙蛊、拔山仙蛊、挽澜仙蛊为核心，辅助三十三万多只凡蛊，形成一套繁芜至极，令人眼花缭乱的搭配。

    　　要催动这个杀招，方源必须要一心一意，并且至少得持续一个时辰，才能将整套蛊虫都催动起来。'
