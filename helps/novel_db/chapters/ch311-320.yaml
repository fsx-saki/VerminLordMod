- chapter: 313
  title: 第三百一十四节：萧山、萧芒
  content: '第三百一十四节：萧山、萧芒

    　　落天河底，仙僵薄青转动双眸，无情的目光淡淡地注视着宋紫星、余木蠢二人。

    　　这一刻，宋紫星、余木蠢心脏都要停跳，巨大的压力，让他们瞬间冷汗淋漓。

    　　薄青号称亚仙尊，乃是当时五域公认的，九转尊者之下的第一人！

    　　如今他虽然遭劫，转为仙僵，仙窍彻底毁灭，但身上却还留有充足的八转仙元，尤其是一身剑道道痕，都未消损。

    　　因此这个战力，就恐怖了。

    　　最关键的，就是道痕'
