  title: 第三百一十七节：菇人乐土暗宗师
  content: '第三百一十七节：菇人乐土暗宗师

    　　南疆，超级梦境。

    　　“左夜灰？！”听闻眼前的巨大怪物，自己如此称呼，方源心头顿时猛震了一下。

    　　这是太古荒兽，来头极其神秘，年岁极其悠久，从一百多万年前，上古年代就已经出现。

    　　它每一次的出现，都伴随着滔天的杀戮，战力雄浑。若是论资排辈，北原出现的那头狗尾续命貂，也不过是三十万年前才崛起的后辈新秀而已。

