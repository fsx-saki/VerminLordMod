    　　这当中，实力最强的竞争者，必然是来自'
  - '心阵眼之中。

    　　监天塔主拖着老迈的身躯，缓缓踏上塔内的阶梯。

    　　踏足一层阶梯，就要耗费他一颗八转仙元。

    　　塔壁上光彩烂漫，呈现出纷杂无序的乱象，根本没有任何有益的提示。

    　　但监天塔主毫不意外。'
  - '：“我们十大古派，毕竟是同一个源头。我们联手起来，先将仙僵薄青夺到手中。我可以代表风云府，与贵派签订盟约，必定确保贵派于此事上的利益。”

    　　白晴仙子沉默不语。

    　　她心中冷笑，这金烈阳和齐云天一个扮白脸'
