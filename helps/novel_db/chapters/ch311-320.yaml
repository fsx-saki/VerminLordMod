  title: 第三百一十五节：义天山！
  content: '第三百一十五节：义天山！

    　　剑光奇速无比，划破长空。

    　　然而，天莲派的所在地天池，却仍旧在遥远的天边。

    　　“嗯？”剑光消散，露出仙僵薄青、余木蠢。

    　　依靠墨瑶残魂操纵的薄青仙僵，此刻大皱眉头，目绽剑芒，扫视周围。

    　　剑光锋锐无比，所到之处，空气都荡起涟漪，幻象被打破，真实的景象显露出来。

    　　但一个呼吸之后，真实景象又被重重幻象掩盖。

