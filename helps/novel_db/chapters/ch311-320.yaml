    　　这片区域如今笼罩了义天山方圆数千里，任何一位蛊仙进去其中，都会受到巨大的压制，一旦过于深入，就会有性命之危。

    　　赌约成立之前，南疆的蛊仙们当然都进行了试探。

    　　但就算是八转蛊仙，都铩羽而归。

    　　加之迫于竞争者太多的外在压力，这才促使了这份旷世赌约的成立。

