  title: 第三百一十四节：与天意同化
  content: '第三百一十四节：与天意同化

    　　紫山真君左顾而言他，转移了话题。

    　　白凝冰默不作声，影无邪道：“不是因为天意干扰的原因吗？”

    　　紫山真君点头：“的确是天意，不过这却是我主动为之。”

    　　“此言何意？”白凝冰听了这话，不禁流露出诧异之色。

    　　听紫山真君这样的话音，似乎他疯癫呆傻，竟然是主动刻意的行为。

    　　紫山真君幽幽一叹，双眸中似乎浮现出了往昔的烟尘：“当年，还是第一代分魂的时候，我们发现了'
