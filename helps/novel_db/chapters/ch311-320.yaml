    　　约走了六十步，壁画陡然清晰起来。'
  - '战斗幻影，也随之映入监天塔主的眼帘。

    　　这位老人忍不住扬起眉头。

    　　“八转大力真武仙僵……仙蛊屋惊鸿乱斗台……还有这个！”

    　　神秘七转蛊仙的额头上，莲花印记是如此的鲜红，是如此的刺眼。

    　　“一位红莲真传'
