    　　方源口中呢喃。

    　　消息传到他这里，在这片超级蛊阵当中，他绝对是对当时的情况，最为清楚的那位。

    　　“算算日子，也应该定局了。”

    　　“天庭远征，以长生天为代表的北原蛊仙界，给了中洲一记迎头痛击啊。”

    　　“狗尾续命貂……不愧是巨阳仙尊的坐骑，战力还真是勇猛。”

