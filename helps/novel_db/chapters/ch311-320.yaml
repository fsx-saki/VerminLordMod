  title: 第三百一十二节：薄青苏醒
  content: '第三百一十二节：薄青苏醒

    　　此时此刻，落天河源头河底的蛊仙，不下三十位。

    　　众仙目光炙热，时而凝注在包裹着仙僵薄青的光团上，时而又隐晦扫视四周，对周围的竞争者警惕万分。

    　　这当中，实力最强的竞争者，必然是来自中洲十大古派的蛊仙。

    　　金烈阳、洪赤明、齐云天等等。

    　　而在这十大古派仙人之中，最让人感到威胁的，还是白晴仙子。

    　　眼见局面坚持，齐云天徐徐道：“白晴仙子，现在这个状况已经很明了了'
