  content: '第三百一十六节：似人似兽左夜灰

    　　冷月荒山。

    　　两个猪头兽人，一前一后，抬着方源向山上爬去。

    　　方源再三打量，没有妄动。

    　　“我现在这个身体，是一位四转蛊师，空窍还在，真元也有，但是蛊虫一只都没。”

    　　“而且还身负重伤，极其虚弱。就算是完好无缺，没有蛊虫的话，也不是这两个猪头兽人的对手。”

