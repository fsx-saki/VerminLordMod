  title: 第三百一十三节：掠影
  content: '第三百一十三节：掠影

    　　一场宾主尽欢的酒宴，并不是结局，而只是一场开始。

    　　方源和池伤成为了好友。

    　　在接下来的一段时间里，方源频繁地邀请池伤，而池伤也经常来到武家驻地，造访方源。

    　　想要接近一个人，和某个人搞好关系，说难挺难，说容易也很容易。

    　　无非是屈尊降贵，顺应他心这几个字。

    　　方源老谋深算，又有态度蛊在手，池伤怎可能是他的对手？

