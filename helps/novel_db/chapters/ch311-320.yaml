    　　萧山就是萧家太上长老选定的人物。

    　　他的身上，不仅有萧家太上长老的仙蛊，还有仙元，萧家太上长老的大量战意。

    　　只是萧山区区一介凡人，看到的也只是一个仙蛊的幻影，根本察觉不出来丝毫'
  - '外溢。显然，它具备食道的精髓，组成仙蛊屋的蛊虫，都喂得饱饱的，状态良好。

    　　而那位八转仙僵，虽然是大力真武体，但却主修的智道。

    　　他当然不甘心被镇压，运用某种杀招，企图用战意炼化仙蛊屋。

    　　他没有成功。'
  - '萧芒功亏一篑，心中充满了恼怒，他奋力挣脱家老们的搀扶，站起来，大吼道：“萧山，你果然居心叵测！身为正道族长，却暗中勾连魔道蛊师！！”

    　　萧山仰头大笑，笑声中充满了悲苦和郁愤：“我真是看错你了，为了权力'
  - '他的目光，又扫射而下，穿透土壤，查看地底深处的仙蛊屋。

    　　惊鸿乱斗台镇压大力真武仙僵，牢不可破，禁仙绝境就是它的力量外溢。显然，它具备食道的精髓，组成仙蛊屋的蛊虫，都喂得饱饱的，状态良好。

    　　而那位八转'
  - '如金纸，瞪着双眼，用充满仇恨和愤怒的目光，死死地盯着山峰上的萧山。

    　　在萧山的身后，站立着两位魔道蛊师，都是五转强者，一高胖一矮瘦。

    　　数日前，萧山踏足光明山后山禁地，触犯了萧家的族规，要被严惩。萧芒'
  - '峰，正是义天山。

    　　当他第一次见到这座山峰的时候，就已经认出来了。

    　　只是他没有想到，原来前世的义天山大战，真正的起因居然是这样子的。

    　　“前世的层次太低，目光只能局限在凡尘。历史的内幕一重又一重，前世仙'
  - '打破，真实的景象显露出来。

    　　但一个呼吸之后，真实景象又被重重幻象掩盖。

    　　“这是天莲派的仙蛊屋幻景园，乃是幻道大成，由三百多年前的幻魔仙黄晓所创。”余木蠢立即解释道。

    　　仙僵薄青点点头，口中感慨道：'
- chapter: 315
  title: 第三百一十六节：瓜老借钱
  content: '第三百一十六节：瓜老借钱

    　　萧山击退萧家追兵，将此峰命名为义天山后，便开始广邀魔道，招兵买马。

    　　在他被家族逐出之前，他号称“义薄云天”，人脉十分广泛，正魔两道上都吃得开。

    　　萧山本身性格豪爽，恩怨分明，重情重义。

    　　另一方面则是萧家势弱，被武家等势力打压，必须左右逢源。要知道，有时候魔道蛊师也是得罪不起的，尤其是那些五转、四转的独行侠。

    　　这些魔道强者，和正道强者不一样。

    　　魔道强者'
