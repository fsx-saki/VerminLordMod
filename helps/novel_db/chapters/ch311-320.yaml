- chapter: 311
  title: 第三百一十二节：宾主尽欢
  content: '第三百一十二节：宾主尽欢

    　　池伤喝的有点上头，满脸通红，话变多了。

    　　似乎这一次战胜了方源之后，信心爆棚，认定自己可以抱得美人归。

    　　蛊仙当然有各种各样的手段，可以醒酒。不过如此一来，就大大丧失喝酒的乐趣，同时也是对酒友的不敬。

    　　方源连忙端起酒杯，喝下手中的这杯酒。他笑道：“如果真是那样，那我就只好自认倒霉，谁让我碰到池伤你这样的竞争对手呢！唉……”

    　　方源一声感叹，既生瑜何生亮的意思'
