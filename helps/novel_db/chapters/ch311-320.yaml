  title: 第三百一十三节：三尊气运反扑
  content: '第三百一十三节：三尊气运反扑

    　　仙道杀招——舌剑龙魂。

    　　方源雄躯一振，周边瞬间凝聚出上百头恶龙。

    　　恶龙飞舞，成群结队，将佑天光包围。

    　　这记复合杀招他早已催用过，若用来对付星宿仙尊，那肯定很有被破解或者克制的风险，但是此刻方源却是用来围困佑天光。

    　　恶龙从四面八方向佑天光扑来，有的张口撕咬，有的甩动龙尾，有的用龙角挑敌，有的用龙爪撕扯，更有一些恶龙张口呼啸，从龙舌上喷射出一股股锋锐的'
