- chapter: 469
  title: 第四百七十一节：盗天梦境
  content: '第四百七十一节：盗天梦境

    　　方源再一次见到了唐方明。

    　　这个人不简单，方源五百年前世，他在五域乱战中大放光彩，堪称是西漠的马鸿运。

    　　当然，现在方源继承了影宗传承后，知道了更多。

    　　他的五百年前世，幽魂魔尊成功重生，掌握至尊仙胎蛊，潜伏在天庭中，暗中支持五大域中的各方势力，布局天下。

    　　马鸿运的崛起，就有影宗在幕后操纵。

    　　唐方明乃至唐家的强盛，也是影宗在暗地里推波助澜。

