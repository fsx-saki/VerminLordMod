- chapter: 462
  title: 第四百六十四节：银龙鱼
  content: '第四百六十四节：银龙鱼

    　　“铁龙鱼……”尤婵深呼吸一口气，想努力平静下来，但很快她就颓然放弃。

    　　她目光动摇，神情都带着一些恍惚。

    　　方源投放了铁龙鱼进入市场，立即在宝黄天中引起一阵小轰动。

    　　龙鱼本来就有市场，需求很大。不是没有蛊仙针对龙鱼，进行过改良，但几乎都以失败告终。

    　　这是因为食道这个流派，从始至终，就根本没有得到很好的流传。

    　　但这一次，方源出手，竟然接连两次改良了龙鱼！'
