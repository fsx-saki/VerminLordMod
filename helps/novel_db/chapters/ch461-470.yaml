- chapter: 461
  title: 第四百六十三节：铁龙鱼
  content: '第四百六十三节：铁龙鱼

    　　毛六的问题，比方源想象中的要更有难度一些。

    　　他开创的这个炼道杀招，名为炼蛇寿元花，不仅蕴含炼道奥妙，更牵扯了律道中的因果。

    　　毛六能创出这一招，也是从琅琊派的库藏中，一个炼蛊残招上得到的启发。

    　　方源推算了片刻，就发现：炼蛇寿元花并不那么容易破解，若是一个不小心，还会令毛六当场丧命。

    　　所以，方源只好改变策略，徐徐图之。

