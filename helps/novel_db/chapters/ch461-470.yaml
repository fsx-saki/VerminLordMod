- chapter: 467
  title: 第四百六十九节：案发
  content: '第四百六十九节：案发

    　　一晃数天之后。

    　　白鹤海域上飞临来一位蛊仙。

    　　这位蛊仙身着青衫，青年模样，高鼻宽面，双眼若星般明亮。

    　　七转气息从他身上散发而出，他的来头更不小，姓青岳名至诚，乃是东海超级势力青岳家的蛊仙，更是当今青岳太上大长老青岳安的嫡亲血裔。

    　　“这是？”看到白鹤海域落寞的样子，青岳至诚面色一沉。

    　　他对秦百合早有倾慕之心，就算知道秦百合爱好女风，也能接受。

    　　只是他能'
