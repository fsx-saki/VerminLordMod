- chapter: 468
  title: 第四百七十节：异人豢养大计
  content: '第四百七十节：异人豢养大计

    　　这一口井，井的外围是方的，四四方方。井口的内围，则是圆的，圆圆整整。

    　　外方内圆。

    　　市井！

    　　方源考虑良久，将市井摆放在了小中洲中。

    　　继荡魂山、落魄谷、逆流河之后，这是方源得到的第四个天地秘境。

    　　纵观古今，搜集到四座天地秘境，能达到这样的成就的蛊仙，已经屈指可数了。

    　　市井记载于《人祖传》中，曾经乃是小人的生活领地。

    　　如今这座市井中，原本的那座'
