- chapter: 463
  title: 第四百六十五节：方源的仁慈
  content: '第四百六十五节：方源的仁慈

    　　至尊仙窍。

    　　小东海。

    　　龙鳞海域。

    　　一位蛊仙衣袖飘飘，悬浮在半空中，俯瞰着脚下的海面。

    　　他面容较为普通，但气质却极为出众，一双黑眸幽深，散发着沧桑气息。

    　　正是方源的宙道六转蛊仙分身。

    　　此刻，海水激荡，波涛起伏，却是没有一点的海风。

    　　“我的至尊仙窍，还没有气象的变化，所以没有风云起伏变化。而这龙鳞海域之所以有波涛滚滚，却是我本体当初布置下的仙'
