- chapter: 470
  title: 第四百七十二节：苦逼少年
  content: '第四百七十二节：苦逼少年

    　　影无邪、黑楼兰、白兔、妙音仙子都从方源的至尊仙窍中出来。

    　　“接下来，我便要亲自探索梦境了。”方源微微侧身，对唐方明道。

    　　唐方明心中一震，旋即了解方源的话外之意，苦笑一声：“请诸位仙子随我来。”

    　　这座仙道蛊阵，遮护盗天梦境，本是唐方明操控。但接下来，唐方明却是主动割舍了一部分权力，交予影宗蛊仙，让她们和自己一同掌控这座仙阵。

    　　这本是方源和唐家盟约的内容之'
