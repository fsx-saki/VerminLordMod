- chapter: 465
  title: 第四百六十七节：香消玉殒
  content: '第四百六十七节：香消玉殒

    　　在方源的强猛攻势之下，十几个呼吸下来，尤婵就越发疲累，有支撑不住的迹象。

    　　“唉……”秦百合发出一声悠长的叹息，停下一直催动的仙道杀招花香幽语。

    　　方源并没有欺诈她，花香幽语杀招果然毫无用途，秦百合亲自验证之后，带着沉重的心情，加入了战局。

    　　她乃是木道蛊仙，接连动用杀招。只见落英缤纷，花瓣挥洒。有的招数，消蚀气力，有的招数，花边如刃。

    　　秦百合衣袂飘飘，黑发'
