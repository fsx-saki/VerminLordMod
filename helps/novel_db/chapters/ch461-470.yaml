- chapter: 464
  title: 第四百六十六节：紫辰断命
  content: '第四百六十六节：紫辰断命

    　　望着面露惊惶之色的秦百合、尤婵二人，方源目光冷漠如冰。

    　　“看来蛊仙界承平已久，东海这片地域又是出了名的资源丰富，和平的年月过的太久了。我此番突袭，让她们俩着实猝不及防。”

    　　若是到了五域乱战的时期，天下动荡，每一个蛊仙的警惕性都会变得很高。但是在此之前，承平已久，蛊仙修行，都是以经营仙窍为主，很少会主动出击，去打生打死。

    　　一来，仙窍每隔一段时间，就会有灾劫产'
