- chapter: 466
  title: 第四百六十八节：搜刮战利品
  content: '第四百六十八节：搜刮战利品

    　　光辉一闪，上古剑蛟又变回人形。

    　　尤婵、秦百合已经死亡，从此之后，东海蛊仙界的六大仙子只剩下四位。

    　　方源辣手摧花，仍旧面不改色，他对准两处地方，施展仙道手段。

    　　很快，两个仙窍就被他取出来，暂时封印住。

    　　方源继承影宗遗藏，其中就包含了焚天魔女的取窍手段，还有其他诸多杀招，都能对仙窍有效。

    　　来到东海之前，方源就此推算成功，有了手段可以暂时封印仙窍，随身'
