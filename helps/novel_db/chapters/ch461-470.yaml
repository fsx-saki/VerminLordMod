  - '唐方明心中一震，旋即了解方源的话外之意，苦笑一声：“请诸位仙子随我来。”

    　　这座仙道蛊阵，遮护盗天梦境，本是唐方明操控。但接下来，唐方明却是主动割舍了一部分权力，交予影宗蛊仙，让她们和自己一同掌控这座仙'
