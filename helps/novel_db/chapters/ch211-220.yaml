  title: 第二百一十二节：自然炼蛊法
  content: '第二百一十二节：自然炼蛊法

    　　苦贝藏于深水之中。

    　　吞吃水中的沙石，能将沙石溶解，化为苦水。有人撬开它的贝壳，得到这种苦水，用来酿酒。酿造出的苦贝酒，口感又苦又香，十分独特。

    　　曾经方源获得过苦贝，而后撬开苦贝，用苦水炼酒，有用苦酒炼成了酒虫。

    　　苦贝已经比较稀罕，千年苦贝就更加少见，是炼制仙蛊的佳材。

    　　方源手中苦贝，便是千年苦贝。贝壳漆黑无比，又有一圈圈的白色纹路，仿佛树木年轮。黑白'
