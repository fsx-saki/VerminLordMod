- chapter: 211
  title: 第二百一十一节：复原荡魂山
  content: '第二百一十一节：复原荡魂山

    　　“主人，你终于回来了！”小狐仙早早地守候在星门那端，看到方源的身影后，立即跳到他的面前，一把抱住他的大腿，并且用苹果般可爱的脸蛋不断蹭蹭。

    　　“呵呵，我不在的这些天，辛苦你了。”方源脸上流露出温柔的笑容，伸出手，轻轻地抚摸小狐仙的小脑袋。

    　　小狐仙脑袋上的一对狐耳顿时微颤，脸上流露出幸福的神色，一只雪白的狐尾在小屁股后面轻轻摇摆起来。

    　　“这是……地灵？这么说'
