  title: 第二百一十五节：血战落幕
  content: '第二百一十五节：血战落幕

    　　龙公叹息一声：“是否有十转蛊仙，我亦回答不了你。不过十转仙蛊，我想应该是有的。因为这曾是乐土仙尊的亲口断言。”

    　　乐土仙尊乃是继幽魂魔尊之后的九转尊者。他生性仁厚，与人不争，爱好和平，但和巨阳仙尊一样，也没有真正入主天庭。

    　　真正入主天庭，并且将自身的仙窍洞天融入天庭的，历史上只有三位仙尊。

