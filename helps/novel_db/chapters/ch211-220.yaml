- chapter: 213
  title: 第二百一十四节：十转仙蛊！
  content: '第二百一十四节：十转仙蛊！

    　　中洲，灵缘斋。

    　　“仙道杀招——流星雨落！”赵怜云轻喝一声，浑身爆发出一股强烈的光辉。

    　　这团光辉，从她身上飞射而出，眨眼间，就没入高空，不见踪影。

    　　下一刻，这片蛊阵营造出的苍白空间，忽然像是被浸染了蓝色的墨水，变成了一片深蓝。

    　　咻咻咻……

    　　无数的流星，漫天而落，宛若千军万马齐齐射箭，景象蔚为壮观！

    　　流星宛若暴雨，打在一头小山般的荒兽乌龟身上。'
