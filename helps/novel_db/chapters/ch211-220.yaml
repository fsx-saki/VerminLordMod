  title: 第二百一十六节：修行本身就是享受
  content: '第二百一十六节：修行本身就是享受

    　　药皇的态度非常坚决。

    　　百足天君笑了笑：“这一点，仙友放心。楚度早有觉悟，已经和我沟通过，在这一点上，他可以做出让步。”

    　　“这就好。”药皇点点头。

    　　双方又交流了一阵，棋局下了一小半，时间打发得差不多，两仙便一前一后，飞下白天。

    　　随后两人当中宣布，刚刚的对决中，药皇优胜一手，此次血战武斗大会，以黄金家族的联合势力获胜告终。

