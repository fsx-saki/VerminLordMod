  title: 第二百一十二节：鸿运之因
  content: '第二百一十二节：鸿运之因

    　　轰轰轰！

    　　六头高达三丈的巨大树人，高举巨槌般的拳头，一击接着一击，狠狠地砸在光罩上。

    　　霜玉孔雀悲鸣声声。

    　　宽大的羽翼，已经被黄金死死凝固封印，地灵只剩下头部还裸露在外。

    　　“两位主人，我要支持不住了。”地灵叹息一声，修长的睫毛阵阵颤抖。光罩越来越虚弱，在树人的围攻下岌岌可危，已然濒临破碎。

    　　更恐怖的是，方源已经快速逼近！

