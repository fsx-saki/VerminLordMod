  title: 第二百一十七节：天随人愿
  content: '第二百一十七节：天随人愿

    　　轰隆隆……

    　　爆炸声已经持续了三天两夜。

    　　来自白海沙陀一行人的攻势，从开始就未停止过。

    　　无数的凡道杀招，夹杂其中的仙道杀招，屡屡轰击在仙蛊屋羽圣城上。

    　　羽圣城摇颤不止，城中军民已经死亡大半，绝望在蔓延。

    　　“失败已成定局，突围吧！”羽民蛊仙周中涩声提议道。

    　　“羽圣城已经被对方用手段定住，我们没有了这座仙蛊屋，如何突围？”另一位羽民蛊仙郑灵反问。'
