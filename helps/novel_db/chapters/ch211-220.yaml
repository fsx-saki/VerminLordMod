  title: 第二百一十四节：气海vs毓秀
  content: '第二百一十四节：气海vs毓秀

    　　在战部渡的面前，堂堂太古传奇的阮丹竟是毫无还手之力。

    　　不过下一刻，又是璀璨光辉亮起，笼罩阮丹的尸首。

    　　仙道杀招——救命大还丹！

    　　杀招之下，阮丹已经被砸破的脑壳迅速愈合，很快就又重新复活。

    　　“丹道……”战部渡此刻也面露奇异之色。

    　　阮丹的治疗杀招着实厉害，居然能令他再次复活。

    　　饶是战部渡亚仙尊战力，一时之间也难以破解。毕竟丹道，就连本体都了解不'
