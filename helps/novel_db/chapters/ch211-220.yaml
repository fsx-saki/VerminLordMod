- chapter: 215
  title: 第二百一十六节：羽圣城惊变
  content: '第二百一十六节：羽圣城惊变

    　　天空微微发绿，一年四季都不会停息的风，温柔地吹拂着。

    　　在这片小天地中，一座巨大的城池，悬浮在高空。

    　　这里是羽民的聚集地，旁人称之为空中城，羽民们则尊称为羽圣城。

    　　此刻，羽圣城中彩旗飘扬，欢呼声、呐喊声震天作响。

    　　大部分的城中羽民，都聚集在了城中的演武场中，关注着一场最为关键的比试。

    　　羽民之王已经逝去，按照羽民的习俗，新的羽民王将要在战斗中选举出来'
