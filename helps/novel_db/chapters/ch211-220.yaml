  title: 第二百一十五节：自己阻止自己？
  content: '第二百一十五节：自己阻止自己？

    　　八转鸿运齐天蛊的威能，这下方源算是真正体会到了。

    　　这是一种无奈，一种命运弄人，哭笑不得，越是挣扎就越陷越深的颓丧！

    　　情势所逼，趋利避灾，方源似乎也只有这么干，才能利益最大化。

    　　双方的距离，在迅速缩短。

    　　救，还是不救？

    　　墨瑶在方源的脑海中，连声尖叫：“救，快出手！”

    　　理智也在告诉方源：救下马鸿运，就不会和齐天的鸿运为敌，反而能借助它，对付巨'
