  title: 第二百一十四节：鸿运之威
  content: '第二百一十四节：鸿运之威

    　　黑楼兰暴露出真正的底牌，濒临自爆的十绝体，战力惊人，竟然将堂堂蛊仙太白云生压入下风，追赶撵杀。

    　　这战况叫人意外，但思考一番，也不意外。

    　　“打败不了黑楼兰，就夺不来虚情假意蛊。没有虚情假意蛊，我如何收复地灵？可恶……”方源狠狠咬牙。

    　　他的计划破灭了。

    　　“这就是鸿运齐天的厉害吗？我才刚刚想要动手，就爆发出这么一个意外！”方源回望马鸿运，面色凝重。

