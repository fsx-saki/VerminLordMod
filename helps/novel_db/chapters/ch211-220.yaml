  title: 第二百一十三节：大力真武体
  content: '第二百一十三节：大力真武体

    　　这股黑色气运，黑得阴沉沉，叫人感到分外压抑。整体呈棺椁形状，将方源牢牢地笼罩其中。

    　　不知何时起，方源的黑死气运变得更庞大，更深重了。

    　　再远远眺望，数里之外，太白云生正在和黑楼兰激战着。

    　　双方的气运，也分外明显。

    　　黑楼兰的头顶上，仍旧是青云运气，绵绵不绝，宛若青木巨柱。太白云生的头顶上，气运却比之前少了很多，不到原先的六分之一。而且不再是红艳艳的火烧云'
