  title: 第二百一十三节：中洲蛊仙集结
  content: '第二百一十三节：中洲蛊仙集结

    　　中洲。

    　　某处山村。

    　　轰隆隆！

    　　巨大的轰鸣声，回荡在山间。

    　　无数的泥石流，宛若雪崩一般，从山上往下滚落，浩浩荡荡。

    　　“快逃命啊！”

    　　“我要死了，我要死了……”

    　　“爹，你在哪里，不要丢下孩儿啊！”

    　　眼见天灾降临，原本静谧祥和的小山村，已经彻底炸开了锅，乱了套。

    　　鸡飞狗跳，无数人四处奔逃，也有人瘫痪在地上，小儿啼哭，被母亲死死地抱在怀'
