  title: 第二百一十二节：炼身
  content: '第二百一十二节：炼身

    　　“不过，用于解梦的凡蛊，却是消耗极大。如今，解梦的施展次数，只剩下十次不到。”

    　　想到这里，方源不禁轻轻地皱起了眉头。

    　　这是个问题。

    　　解梦杀招虽然非常犀利，但是对于梦道凡蛊的消耗很大。

    　　再加上这些梦道凡蛊，都是方源独自一人，炼制出来，产量方面一直无法提升。

    　　将这些梦道蛊方，透露给琅琊派，让毛民蛊仙帮助炼蛊？

    　　方源根本没有考虑过这一点。

