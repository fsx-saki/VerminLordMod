  title: 第二百一十三节：炼制成功
  content: '第二百一十三节：炼制成功

    　　星象福地。

    　　魔雾缭绕，毒血蒸腾，已经将三层蛊阵都腐蚀破坏，周围地表都化为了一层浅浅的毒泥烂沼。

    　　方源满脸郑重之色。

    　　“接下来，就是最难处理的仙材地极天罡了。”

    　　他取出一份仙材，拿在手中。

    　　这份炼蛊材料十分奇特，是由泥和气组成。泥气自发地拘束成一团。

    　　上面是淡青色的罡气，下面是黑色的泥土。

    　　罡气是九天之上的天气。太古九天之外，都有一层厚实的罡'
