- chapter: 216
  title: 第二百一十六节：对战黑楼兰
  content: '第二百一十六节：对战黑楼兰

    　　真传秘境当中，不管是哪一道真传，都有巨阳意志。否则，来到这里的有缘人，怎么能顺利接收这些真传，尤其是那些仙蛊呢？

    　　就像在八十八角真阳楼中闯关一样。

    　　每一道关卡，若有蛊虫奖励，这些蛊虫都是先前被巨阳意志炼化。

    　　蛊师们顺利闯关，获得这些蛊虫。之所以能将这些蛊虫瞬间炼化，收入空窍，都是因为蛊虫中巨阳意志的主动退让。

    　　按照这个原来，任何的蛊师只要舍得自己的蛊'
