  title: 第二百一十七节：龙女
  content: '第二百一十七节：龙女

    　　胡子蛊师不会理解方源的心情。

    　　从地球上穿越过来，蛊师的种种奇异能力，宛若超人一般。从普通人晋升成超人，当然值得方源如此兴奋，如此热情。

    　　“而且啊，我资质不行，只有丙等。不努力一些，怎么可以呐？”年轻的方源笑呵呵地道。

