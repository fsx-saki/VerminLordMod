    　　但仍旧被飞熊虚像挡住。

    　　飞熊虚像，就算是没有方源操纵，本身也有智慧，近乎狡诈，完全可以放任其自行战斗。

    　　呼。

    　　肥厚巨大的熊掌凶猛砸下，带出猛烈的风声。'
