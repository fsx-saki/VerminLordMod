  title: 第二百一十四节：炼蛊之后
  content: '第二百一十四节：炼蛊之后

    　　中洲，狐仙福地。

    　　仙蛊星光！

    　　方源傲立在一座方源石巢的顶部，心念调动，星光仙蛊催起。

    　　顿时一道星光巨柱，暴射而出，直贯进石巢当中。

    　　在方源有意的操纵下，星光并无伤人之势，十分温和。

    　　在这座石巢中，早已经做了许多蛊阵的布置。星光巨柱一射入其中，便被分化成一束束的湛蓝星光线，被接引到各层的第一号房间。

    　　第一号房间中的毛民，轻车熟路地催动手中蛊虫，将'
