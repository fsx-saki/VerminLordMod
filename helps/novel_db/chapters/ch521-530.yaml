- chapter: 529
  title: 第五百三十二节：谈谈赔偿
  content: '第五百三十二节：谈谈赔偿

    　　南疆。

    　　万蛟！

    　　龙吼声起，将整个仙道战场彻底冲垮，银鳞如海，方源电射而出。

    　　一脱困，他便收到大量的求援消息。

    　　“什么？琅琊福地被天庭突袭？还是凤九歌带队？”方源顿时一惊。

    　　他遭遇到陆畏因，暂时被困，与此同时，琅琊福地就遭受天庭突袭，这两者之间若说没有联系，鬼都不信！

