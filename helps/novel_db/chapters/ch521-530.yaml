- chapter: 527
  title: 第五百三十节：乐土传人
  content: '第五百三十节：乐土传人

    　　即便是凤九歌，面对智慧蛊，也不由地心驰神摇。

    　　这可是智慧蛊！

    　　《人祖传》中记载，曾经是星宿仙尊的本命仙蛊，其名无人不知无人不晓，没有想到居然在今天，在这样的环境下，突兀地出现在凤九歌的眼前！

    　　“琅琊福地中竟然藏有智慧蛊！”凤九歌心中剧烈震荡，一时间不能自已。

    　　不过旋即，他强自冷静下来。

    　　他眼中精芒暴涨，仔细端详眼前的智慧蛊，他吃惊地发现这只九转智慧蛊'
