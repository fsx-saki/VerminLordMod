- chapter: 524
  title: 第五百二十七节：方谋在前，九歌身危
  content: '第五百二十七节：方谋在前，九歌身危

    　　轰——！

    　　一声巨响，黑毛大陆上又一座城池崩塌，毛民瞬间伤亡无数。

    　　“凤九歌你该死！”琅琊地灵发出狂躁的怒吼，吼声中夹杂着一股痛彻心扉的悲意。

    　　凤九歌冷笑，再次飞射而去。

    　　银色巨人在琅琊地灵的驱使下，不断狂追。临走前洒下一片片的华光，那些城池废墟当中，受伤未死的普通毛民，都在华光中受益，伤势迅速转好，保存性命。

    　　但这样是对战局无用的。'
