- chapter: 528
  title: 第五百三十一节：魂爆！
  content: '第五百三十一节：魂爆！

    　　中洲，天庭。

    　　银白苍穹，万千楼宇。

    　　碧光一闪，凤九歌出现在紫薇宫中。

    　　“参见紫薇大人。”凤九歌瞬间回过神来，拱手道。

    　　偌大的宫殿中，紫薇仙子盘坐在云床之上，见到凤九歌回来，便悠悠睁开双眼。

    　　刹那间，从她的瞳眸中绽射出无边的星芒，璀璨耀眼，照耀整个殿堂。

    　　凤九歌没有说话，直接飞出一只信道蛊虫。紫薇仙子接过来，心神一扫，便知晓前后结果。

