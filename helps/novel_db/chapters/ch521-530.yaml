- chapter: 523
  title: 第五百二十六节：无聊
  content: '第五百二十六节：无聊

    　　“我真的需要它，我有必须活下去的理由！”方源大声叫喊，一力坚持。

    　　“这个世界上，谁都有活下去的理由，为什么因为你要活下去，而让我去死呢？”这位蛊仙笑着道，“当然，我了解你的理由。那魔头是你的死敌，你要向他复仇。但是他也是我的仇敌，我也要向他复仇啊。为什么你要牺牲我的理由，去成全你的理由呢？去找其他的寿蛊吧，我的寿蛊我要自己用呢。”

