- chapter: 522
  title: 第五百二十五节：人族的正道
  content: '第五百二十五节：人族的正道

    　　北原，琅琊福地。

    　　“想要杀我，你也得付出代价！”一位中洲七转蛊仙怒吼，他知道自己逃脱不了，面对银色巨人，发出临死的反击。

    　　仙道杀招威力恢弘，打得整具银色巨人都踉跄后退几步。

    　　但也只是如此了。

    　　啪。

    　　银色巨人双掌一合，将他整个人直接拍成肉酱。

    　　“哈哈哈，第三个中洲蛊仙也死了！”琅琊地灵大笑，志得意满。

