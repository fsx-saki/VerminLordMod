  title: 第五百二十四节：不过如此
  content: '第五百二十四节：不过如此

    　　琅琊福地，激战正在进行。

    　　中洲蛊仙们领命，四下分散，开始布置仙阵。只要仙阵一成，就能接引其他中洲蛊仙，源源不断地进入琅琊福地当中，支援凤九歌等人。

    　　对于琅琊地灵而言，这是绝对不利的坏消息！所以必须要阻止他们。

    　　“这凤九歌好生算计！我这边毛民蛊仙只有集结一起，形成天婆梭罗上古战阵，才能力敌八转。他就是想要我分兵，我岂能如他所愿？”琅琊地灵心中冷笑。

