- chapter: 530
  title: 第五百三十三节：四千年寿蛊！
  content: '第五百三十三节：四千年寿蛊！

    　　荡魂山乃是天地秘境，五域唯一。

    　　荡魂山产出胆识蛊，乃是垄断贸易，只要魂魄供应得上，便是开采不竭的金矿。

    　　这样的价值非常巨大，再乘以十倍，就是琅琊地灵要赔偿方源的代价。

    　　若是寻常福地，乃至是洞天，这样的赔偿，直接把自己本身都搭进去还恐怕不够。但对于琅琊福地而言，却是完全有着偿还的能力！

    　　当初，方源和琅琊地灵定下这份赔偿的盟约时，方源怎可能不考虑这一点'
