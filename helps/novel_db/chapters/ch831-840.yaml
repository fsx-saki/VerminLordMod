- chapter: 831
  title: 第八百三十七节：炼蛊交锋
  content: '第八百三十七节：炼蛊交锋

    　　南疆。

    　　巴家，大宅山。

    　　巴十八小心翼翼地拿捏着一只一转凡蛊，双眼一眨不眨，神色极为专注：“这就是第二空窍蛊？”

    　　他细细打量着，只见这只蛊虫形如甲虫，两头尖尖，中间肥大，仿佛青玉所制，只有手指头大小。摸在手中，感觉一片温润清凉。在它圆滚滚的背部，还长着一只金色的眼珠子。金色的瞳孔，闪电般游弋不定，灵性十足。

    　　为了换取这只蛊虫，巴家几乎掏空了库藏中剩下来的'
