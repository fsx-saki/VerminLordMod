- chapter: 837
  title: 第八百四十三节：全知全能
  content: '第八百四十三节：全知全能

    　　方源相当重视这一次的预感。

    　　上一世的时候，他在五界山脉中意外目睹了陶铸真传的开启，结果没有得手。事后就有了类似的感觉，冥冥中知道自己错过了一次重大的机缘。并且这一次错过，会令将来的自己十分遗憾。

    　　果不其然！

