- chapter: 834
  title: 第八百四十节：参悟气墙
  content: '第八百四十节：参悟气墙

    　　兽灾洞天，光阴支流。

    　　方源分身战部渡一次次地进入黄金光雾，将陷落在里面的蛊仙拯救出来。

    　　每一次他都要经历艰难的战斗，面对数量众多的凶兽，劳累奔波导致伤痕累累。他身边的同龄小伙伴们都渐渐接受了他的领导，因为从过往的战绩无一不证明战部渡决策的英明。

    　　“这一次有三支兽群，从东南、正北还有西南方向，向你们包围过来。”方源本体传音道。

    　　“哦，好的。我会带领他们突围'
