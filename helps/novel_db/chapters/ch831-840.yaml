  title: 第八百三十八节：好孩子
  content: '第八百三十八节：好孩子

    　　咕噜咕噜……

    　　怪鸟的声音，响彻这片天空。鸟群规模巨大，宛若乌云盖顶，逼压向山崖城。

    　　在兽灾洞天中，山崖城乃是别具特色的十大城池之一。

    　　这座城池建立在山崖顶端，最是高耸。人文风貌，别有韵味。

    　　“肥臀鸟来啦！”

    　　“快快快，做好防守准备！”

    　　“大家不要慌，咱们的战兽使者们都在场呢。”

    　　此刻，山崖城中人声鼎沸，戒备森严。

    　　名叫肥臀鸟的鸟群，发出咕'
