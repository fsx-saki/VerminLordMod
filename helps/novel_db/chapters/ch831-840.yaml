- chapter: 839
  title: 第八百四十五节：你知道的太多了
  content: '第八百四十五节：你知道的太多了

    　　房功潜伏在豆神宫附近，神情焦灼。

    　　“怎么回事？豆神宫中为何还无动静？是不是出现了什么变故？”房功掐算着时间。

    　　这一次房睇长谋算方源，自然不是他个人的行为，早就和房功等人通过气了。

    　　为了担心身为智道蛊仙的算不尽起疑心，房功一直都在宫外潜伏，防备意外发生。

    　　“大长老，还请稍安勿躁。二长老此次谋定后动，本身实力又在那算不尽之上，再加上宫外仙阵、宫内仙蛊'
