  content: '第八百三十九节：十二生肖战阵

    　　光阴的河水潺潺流淌着，逸散出色彩斑斓的光辉。

    　　和光阴长河相比，这段河水并不宽敞，只是支流而已。

    　　这是兽灾洞天的光阴支流，正是有这一段支流，兽灾洞天中才有时间轮转，而不是一片静止的世界。

    　　一个身影悄然出现。

    　　他有着白皙如玉的面庞，绝世的容颜，鼻梁高挺，黑眸深邃，一头长发垂至腰间，宛若黑亮的瀑布。

    　　正是方源本体亲至！

    　　“就在此处吧。”方源望着这'
