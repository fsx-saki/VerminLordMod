- chapter: 836
  title: 第八百四十二节：参悟盗天真传
  content: '第八百四十二节：参悟盗天真传

    　　砰！

    　　房家太上大长老房功手掌猛地一拍桌面，腾的一下从座椅上站起身来，眼中闪烁着愤怒的焰光：“这个算不尽，真是贪婪！居然敢索要我族的偷道真传，他何德何能？不过是一介散修，七转的修为而已，居然勒索到我房家的头上！该死！该杀！”

    　　听到房睇长的汇报，房功愤怒不已。

    　　房睇长却已是冷静下来：“算不尽的确是有两把刷子。我房家招揽算不尽，也是应时局而做下的决定。算不尽'
