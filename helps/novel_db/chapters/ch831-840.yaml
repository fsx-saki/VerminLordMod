  title: 第八百四十一节：我算不尽是那种人吗？
  content: '第八百四十一节：我算不尽是那种人吗？

    　　房家大本营。

    　　一座仙蛊屋青砖金瓦，巍峨若山，肃穆中夹带活泼，庄重里酝酿生机，散发出浓郁的草木的清新香气。

    　　宫门敞开，可见内里宽阔巨大的殿堂。大堂中有巨柱数十根，根根粗壮，闪烁青铜光泽。

    　　大门上端，有着一座牌匾，上书三个大字，正是——豆神宫。

    　　而在豆神宫的周围，还建设了一座月牙形的智道蛊阵，将豆神宫半包围。

    　　这座智道蛊阵闪烁着淡蓝色的光辉'
