- chapter: 840
  title: 第八百四十六节：房功释疑
  content: '第八百四十六节：房功释疑

    　　房家大本营。

    　　病榻上，“房睇长”躺着，面色仍旧有些苍白。

    　　一位模样年轻的六转蛊仙，站在床边，正是房云。

    　　房云乃是房睇长的养子，年纪的确很轻，面容俊朗，双眸如星，此刻满脸关切之色，躬身行礼道：“父亲，您受此重伤，可得好生休养。孩儿能为您做些什么，请您尽管下令罢。”

    　　房云根本不知道，此刻他眼前的父亲，已经是换了他人，是方源的一具分身。

