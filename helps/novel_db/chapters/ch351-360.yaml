  title: 第三百五十二节：事生差异超预料
  content: '第三百五十二节：事生差异超预料

    　　他的师尊，七转散仙月下老人，盘坐在蒲团上，听到陆钻风的声音，却是一动不动，仍旧双眼闭合着。

    　　良久，山洞外的萧家老祖再次开口，声音传入洞内：“月下老哥，我愿再出十枚天龙珠，请您出手相助这一次。”

    　　月下老人这才缓缓睁开双眼，对陆钻风道：“徒儿，你就先去义天山，替萧山解了这场危局罢。”

    　　陆钻风连忙跪下，向月下老人恭敬地磕了三个响头。

    　　“师尊，徒儿去了。'
