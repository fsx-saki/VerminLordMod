    　　海量的仙蛊方，数不胜数的仙道杀招，就连仙蛊屋的构造方案，就高达十二座。

    　　玄冰屋、不坏铁堡、血河车、噩耗阴宅、绿波亭、织茧阁、金霄坛、悔池、羽圣城……

    　　还有各种真传线索。

    　　比如白相真传'
