  title: 第三百五十二节：紫陨（下）
  content: '第三百五十二节：紫陨（下）

    　　紫山真君发现自己衣衫褴褛，狼狈至极，苍老的脸上，布满灰土，四肢枯瘦，又脏又乱。

    　　但旋即，他又看向眼前的蛊师少女，心道：“就是她吗？命运轨迹中的关键人物。不，这种感应似是而非，原来不是她本人，而是她的后代呀。”

    　　蛊师少女留下一份简单的食物后，随同女仆，径直离开。

    　　当天晚上，紫找上门去，在她的梦中，授予她一道真传。

    　　“这道真传有点杂乱，既有智道，也有变化'
