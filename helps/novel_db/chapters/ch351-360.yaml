    　　总之，仙蛊屋惊鸿乱斗台镇压八转大力真武仙僵这么多年，两者的状态形成了一个微妙的平衡。

    　　仙蛊屋近乎无主的状态，屋内充斥着纯净战意。

    　　如今，方源已经将战意完全化为己用，并且还将其他南疆蛊仙排挤出局。

    　　重生以来，筹谋良久，终于在此刻得偿所愿！

    　　方源心中充满了喜悦。

