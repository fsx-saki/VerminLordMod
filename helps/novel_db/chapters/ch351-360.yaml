    　　一波波的雷霆，连绵不绝地狂劈而下。

    　　上一波的无数电光还未消散，下一波的电光就洞射下来。

    　　整个天空，就像是一片深蓝丛林。

    　　这片完全由雷电组成的丛林中，阴云弥漫。

    　　十绝仙僵无生大阵，已经转变成一团阴云。里面的十位十绝仙僵，根本寻觅不到踪迹。也让方源攻打阵眼的企图，化为泡影。

    　　在这阴云当中，三颗流星似的仙蛊屋，相互围绕着团团转，时不时'
