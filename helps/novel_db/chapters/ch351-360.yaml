  content: '第三百五十八节：武庸追击

    　　拥有宿命仙蛊的九转仙蛊屋监天塔，落到梦境中，也会被梦境消融。在刚刚结束的超级梦境战役中，龙公便亲自尝试了一番，并且监天塔当时还处于虚化的状态当中，也并未幸免。

    　　监天塔如此，七转仙蛊屋海角阁，更是如此了。

    　　一旦陷入到梦境当中，整个海角阁就开始缓缓分解。翼家蛊仙们无不感到，大量的蛊虫正和他们失去联系。

    　　这情景，顿时带给这些翼家蛊仙无以伦比的惊吓。

    　　没有丝毫'
