    　　趁此良机，方源驾驭惊鸿乱斗台，在空中绕了一个圈，又掉头朝义天山砸下。

    　　沿途中，灾劫如倾盆暴雨，打在惊鸿乱斗台上，啪啪作响。

    　　惊鸿乱斗台防御，足够支撑此刻的灾劫打击，不管不顾地冲下去。

    　　此刻的义天山，已经倒塌，化为一片废墟。义天山上的魔道蛊师们，自然是伤亡惨重得很。一眼望去，哀鸿遍野，惨不忍睹。'
