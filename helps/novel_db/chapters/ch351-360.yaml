- chapter: 352
  title: 第三百五十三节：接管惊鸿乱斗台
  content: '第三百五十三节：接管惊鸿乱斗台

    　　时间流逝，一个多月过去。

    　　在南疆，不管是蛊仙界，还是凡俗红尘，都将主要的目光集中在一个地方。

    　　这个地点，便是义天山。

    　　在幕后蛊仙不断的推波助澜之下，无数正道、魔道的蛊师强征，先后加入两方。

    　　第七次正魔交锋，已然结束。

    　　魔道一方施展诡计，断掉了正道的补给线。

