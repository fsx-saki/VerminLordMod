  content: '第三百五十七节：群仙战仙屋

    　　一股澎湃浩荡的气息，扑面而来。

    　　方源等影宗众仙，俱都一惊，纷纷凝神望去。

    　　“翼家仙蛊屋之一——海角阁！”方源脱口而出，道出此屋来历。

    　　他以武遗海的身份，潜伏在武家很长一段时间。这段时间，方源除了经营仙窍、探索梦境之外，自然还干了一些其他事情。

    　　比如借助武家的渠道，深刻地了解南疆蛊仙界的各种情报。

    　　所以，当海角阁一出现，方源就立即知道了它的来历。'
