  content: '第三百五十九节：星宿手段

    　　白天。

    　　轰——！

    　　一座塔楼，冲破空气，在白天中急速飞行，拉出一道长达数丈的气尾。

    　　所到之处，白天中的兽群们无不四散奔走，皆因这座塔楼散发出浓烈的九转气息，让兽群感受到强烈的威胁。

    　　正是监天塔！

