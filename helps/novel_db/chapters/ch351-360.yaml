- chapter: 352
  title: 第三百五十三节：认方源为主
  content: '第三百五十三节：认方源为主

    　　紫山真君再无声息，成为一具彻彻底底的尸体。

    　　“死的还真够干净。”龙公冷哂一声，冷漠的龙瞳将紫山真君里里外外，都洞察清楚。

    　　紫山真君原本仙蛊众多，但暗中送走大半，剩下的蛊虫随着他丧命，也尽数自毁。

    　　不仅如此，他的魂魄亦迅速消散。

    　　龙公想要阻止，也没有手段。

    　　更叫龙公有些意外的是，紫山真君的这具仙躯，原本还残留着不少道痕。此时此刻，这些道痕也在涣散。'
