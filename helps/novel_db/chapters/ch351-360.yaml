  title: 第三百五十二节：巨阳坑子
  content: '第三百五十二节：巨阳坑子

    　　早在黄金部族的求援之前，长生天方面已经侦测到了花林禁地的暴动。

    　　长生天由冰塞川坐镇当中。

    　　冰塞川便和药皇、八极子部分蛊仙商议。

    　　“禁地暴乱非同小可，不可不救。”

    　　“以我所见，须得查明禁地暴动的缘由！”

    　　“或许是因为太阳陨灭，幽天形成，导致光道大衰，暗道昌隆。而花林禁地本身就有充沛浓郁的暗道道痕。”

