    　　狂风在耳畔呼啸，方源端坐在上极天鹰的背上，一头长发几乎向后直甩。

    　　尽管狂风有着巨大的推力，但是方源却是岿然不动，稳固如山。

    　　身为蛊仙，这点御风的能力，肯定是有的。

    　　而在他的身边，影无邪等人，或是瘫坐着，或是站着，或者看着下方的风景，或是闭目打坐疗伤。

    　　方源身上没有伤势。

    　　即便是之前，他催动仙道杀招百八十奴，失败过几次，但也通过宙道仙'
