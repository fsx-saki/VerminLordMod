  title: 第二百七十六节：光照菌
  content: '第二百七十六节：光照菌

    　　东海。

    　　一片普通海域，一座无名小岛，荒凉贫瘠，只有怪石嶙峋。

    　　几位蛊仙从高空中，飘然而至。

    　　正是方源、花蝶女仙、蜂将等一行人。

    　　“没想到这样的交易会，只是选择在如此荒芜人烟的小岛上进行。”方源踏足这座海岛，心生感慨之色。

    　　“楚兄有所不知，历来如此大宗交易会，地点都会在几天前临时决定，防止有人图谋不轨。”方源身边的一位蛊仙答道。

