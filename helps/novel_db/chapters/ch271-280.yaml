- chapter: 273
  title: 第二百七十四节：楚瀛再现
  content: '第二百七十四节：楚瀛再现

    　　“终于穿透界壁了。”影无邪吐出一口浊气，望着汪洋海面，神情极为疲惫。

    　　他身边的黑楼兰、白凝冰，亦好不到哪里去。

    　　从北原出走，影宗一行人，前往东海。他们不是至尊仙体，每穿越一次界壁，都是一场艰难的考验。

    　　好在他们个个实力不俗，乃是蛊仙中的强者精英。纵然仙窍受损不少，但是没有发生减员的情况。

    　　他们并没有着急离开。

    　　进入东海之后，他们随意选择了一处海岛。'
