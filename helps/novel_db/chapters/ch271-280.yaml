  title: 第二百七十八节：炼制星念仙蛊
  content: '第二百七十八节：炼制星念仙蛊

    　　狐仙福地，地下石窟。

    　　血芝林已经蔓延生长，不知不觉间扩张到五十亩左右的范围。

    　　在血芝林的中央，芝林散发的暗红色血光，此刻已被灿烂多姿的智慧光晕排开。

    　　此刻，方源就沐浴在智慧光晕当中，闭目盘坐。

    　　他神色平静，宛若雕塑，脑海中却是电光火石般，无数的念头此起彼伏，相互碰撞，激烈的宛若流星下雨，火山喷发。

    　　一声闷哼。

    　　方源身躯微震，缓缓地睁开双眼。'
