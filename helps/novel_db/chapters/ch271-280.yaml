- chapter: 271
  title: 第二百七十一节：天道大师
  content: '第二百七十一节：天道大师

    　　至尊仙窍。

    　　蓝白色的事实浮冰正在一寸寸地缩减着。

    　　疯魔窟之争，方源得到了好几块事实浮冰，其中一块事实浮冰体积相当之大。

    　　黄杏仙元一颗颗地剧烈消耗着。

    　　与此同时，天道道痕迅速增长！

    　　方源的天道道痕原本就超过二十四万，消解事实浮冰三个时辰后，天道道痕增长了六万。平均每个时辰增长两万，这种增长幅度已是相当可观。

    　　但不只是这个收获。

    　　方源的律道、智'
