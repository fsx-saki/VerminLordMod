  title: 第二百八十一节：大时代将临
  content: '第二百八十一节：大时代将临

    　　中洲，藏龙窟。

    　　“我等参见天庭上仙。”两位蛊仙，一齐拜服在地上。

    　　他们一老一少。

    　　爷孙两个。

    　　皆是风云府的蛊仙。

    　　年轻的蛊仙便是风禅子，而老者则是悲风老人，八转修为。在中洲十大古派中，也是大名鼎鼎，若不出意外，此刻已经成为天庭中的一员。

    　　要知道，成为天庭成员可不容易，更不寻常。

