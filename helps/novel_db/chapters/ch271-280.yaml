  title: 第二百七十七节：炎煌雷泽
  content: '第二百七十七节：炎煌雷泽

    　　花开两朵，各表一枝。

    　　不提秦百胜牺牲自己，刮起大同风，让凤九歌、凌梅傲雪三仙陷入险境。

    　　单说姜钰等五仙突围。

    　　眼看就要突出重围，黑城却被一记杀招打落。

    　　他一脸苍白，大声呼救。

    　　然而，逃亡突围之际，分秒必争，关键时刻，稍有延迟，就是天堂地狱之差。

    　　众仙充耳不闻，只将自家速度催至最高。

    　　姜钰仙子更是绝情冷漠，直言抛弃，不去管黑城的生死。

