  title: 第二百七十九节：再换
  content: '第二百七十九节：再换

    　　炼出一只六转仙蛊的难度，和炼出一只七转仙蛊的难度，也是完全不一样的。

    　　方源想要用区区一只六转仙蛊飞熊之力，换取七转的卜卦龟背仙蛊，说得好听些，是痴心妄想，说得不好听一些，是贪婪无度，想要占便宜。

    　　这种“占便宜”，还带着一点蔑视的意味。

    　　这把庙明神看成什么了？

    　　是觉得他好欺负吗？

    　　还是觉得其他人都很傻？

    　　所以，蛊仙们的脸色阴沉，也就可以理解了。'
