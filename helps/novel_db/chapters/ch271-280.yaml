  title: 第二百七十二节：太古荒兽一指流鲨
  content: '第二百七十二节：太古荒兽一指流鲨

    　　气息澎湃浩大！

    　　众人的目光，都被吸引。

    　　潮水随着气息的汹涌激荡而起。

    　　无数的海流生成，像是无数条巨大龙蟒，结群成对在海底迅速穿行。

    　　一团团暗流漩涡同时形成，并且越来越多，数量暴涨！

    　　很快，险恶的暗流漩涡就成百上千，将附近的这片海域都布满。

    　　“这是？”太白云生惊愕出声。

    　　“太古荒兽！”方源眼中精芒一闪，从口中吐出真相。

