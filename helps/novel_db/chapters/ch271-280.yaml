  title: 第二百七十六节：弃此残躯换清风
  content: '第二百七十六节：弃此残躯换清风

    　　奇异空间，光线柔和，无山无水，无风无地，一片空白。

    　　“正是这样。”凤九歌话音刚落，站在他面前的秦百胜，望着对面中洲三仙，露出深沉的笑容，“若非借助盗天魔尊的布置，怎么可能将凤兄你牵引过来呢？”

    　　的确。

    　　秦百胜虽然强悍，但碰到凤九歌这种千年不出的人物，也感到棘手。

    　　尤其是秦百胜的两大杀手锏，都并非困敌，只专注杀敌。

    　　要暂时困住凤九歌，唯有启动盗'
