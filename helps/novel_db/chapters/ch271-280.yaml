- chapter: 272
  title: 第二百七十三节：换蛊念想
  content: '第二百七十三节：换蛊念想

    　　逆流河若是搁在外面还好，若长期搁在仙窍里面，会耗损大量的天地二气。一旦天地二气缺乏，仙窍就会不稳。

    　　所以方源要时常坐落仙窍，吞吸外界的天地二气，补充自己。

    　　吞吸一阵后，方源便关闭了仙窍门户。

    　　来到逆流河畔，他手中还提着一具仙僵。

    　　正是他原先的肉身。

    　　他将仙僵肉身直接抛入到逆流河中。

    　　仙僵肉身立即顺利而下。

    　　借助坚持仙蛊，还有逆流河，方源不断'
