- chapter: 273
  title: 第二百七十三节：万物为一
  content: '第二百七十三节：万物为一

    　　宋亦诗修行了三个时辰，终于停止催动杀招。

    　　她吐出一口浊气，睁开双眼，就见一股氤氲水汽，隐隐约约，朦朦胧胧，从自己的手臂流到小腿再到胸口停驻。

    　　宋亦诗仔细观察水汽规模，心中欣喜：“按照这种程度，我只需要再修行半个月左右，便能修成流水不腐防御杀招了。”

    　　“奇怪，为什么这一次修行，效果比之前更加明显？是我的错觉吗？”

    　　宋亦诗微微摇了摇头。

    　　她又查看自家仙'
