  title: 第二百七十二节：态度蛊的麻烦
  content: '第二百七十二节：态度蛊的麻烦

    　　方源目光闪烁不定。

    　　影宗的这个消息，有点出乎他的意料。

    　　但是仔细想想的话，却也很合情合理。

    　　逆流河一战，方源虽然在修行资源上的收获并不瞩目，但战力却是得到了大幅度的成长，达到了八转之下第一人的地步，和凤九歌并驾齐驱。

    　　战力的提升，带来地位的提升。

    　　其实在这份消息之前，早就有其他的来信。

    　　比如来自楚度的信笺。楚度在信中，言语客气，首先恭喜方源'
