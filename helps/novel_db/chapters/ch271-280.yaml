- chapter: 273
  title: 第二百七十四节：百日大战落幕
  content: '第二百七十四节：百日大战落幕

    　　听到焚天魔女如此强势霸道地征召自己，方源丝毫没有生气。

    　　相反，他还有些欣喜。

    　　鲨魔、苏白曼夫妇，辛辛苦苦地攻略玉露福地，眼看着要有成果，结果被焚天魔女强行扣下，实在可怜。

    　　鲨魔、苏白曼此次付出了这么多，绝大多数的身家，都赔了进去。

    　　这次被焚天魔女摘了桃子，可谓伤筋动骨，血本无归。

    　　五百年前世，鲨魔、苏白曼陨落，鲨海被他人侵占，也许就有这一层关系'
