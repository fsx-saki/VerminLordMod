- chapter: 272
  title: 第二百七十三节：大鱼吃小鱼
  content: '第二百七十三节：大鱼吃小鱼

    　　一指流鲨飞射而来。

    　　焚天魔女却非力道蛊仙，而是专修炎道，自知难以抵挡。

    　　她战斗经验极其丰富，火焰小鸟的牺牲大有价值，方源等人看出许多情报，焚天魔女自然也不例外。

    　　炎道杀招——五指炎链！

    　　刹那间，焚天魔女已经做出最明智的选择。

    　　她身形猛地飞退，同时右手手掌张开，五根手指化作五道细长的火焰，像是鞭子，又仿佛锁链，朝着一指流鲨绞去。

    　　五根炎链眼看着'
