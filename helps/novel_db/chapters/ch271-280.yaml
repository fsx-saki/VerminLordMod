    　　无数的海流生成，像是无数条巨大龙蟒，结群成对在海底迅速穿行。

    　　一团团暗流漩涡同时形成，并且越来越多，数量暴涨！

    　　很快，险恶的暗流漩涡就成百上千，将附近的这片海域都布满。

