    　　“这一次的交易会，很不一样。”

    　　“是啊，可以说是不同寻常。以往的交易会上，虽然也有仙蛊交换，但很少会在第一轮出现。”

    　　仙蛊历来难以交易成功，交易会上每位成员的机会是有限的。所以常常会把一些，不太可能成功的交易，挪到最后出手。

    　　所以，即便是想见自己手中的仙蛊交易出去，蛊仙们也会选择在最后几轮出手。

