  title: 第二百七十七节：卜卦龟背仙蛊
  content: '第二百七十七节：卜卦龟背仙蛊

    　　方源需要光。

    　　第一个是极光，他引进过大量的炫光蛊，增长仙窍中的极光。极光越加浓郁，就能凝聚浓缩成更多的流光果。而八转仙蛊态度，便是以此为食。

    　　光照菌这种荒植，所能提供的光，自然不是五颜六色、色彩缤纷的极光。

    　　不过，这并非就是盖棺定论。

    　　人灵性最足，最懂得变通。这个世界上，亦有针对植株的改造和嫁接手段。

    　　木道蛊仙最擅长这个。

    　　每个流派都有各自'
