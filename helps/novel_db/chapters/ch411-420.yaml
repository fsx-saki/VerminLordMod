- chapter: 420
  title: 第四百二十二节：雪莲花精
  content: '第四百二十二节：雪莲花精

    　　破碎的冰块，散落一地。

    　　“咳咳咳。”方源捂住心口，用力咳出心肺中的血块。

    　　这些血块，都凝固成一小团，散发出强烈的寒意。

    　　方源的脸色也很不正常，满脸青蓝之色，受到了很大的伤害。

    　　炼蛊失败了，就在前一刻，巨大的冰山爆炸碎裂，方源一力将反噬都承受下来。

    　　仙蛊人如故！

    　　方源旋即催动仙蛊，下一刻，他回到事故发生之前的状态。

