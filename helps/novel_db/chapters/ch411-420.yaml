- chapter: 417
  title: 第四百一十九节：天庭震撼五域
  content: '第四百一十九节：天庭震撼五域

    　　中洲，天庭。

    　　汉白玉质地的宫殿巍峨林立，银白色的天空，始终光明堂皇。

    　　在这宫殿群落当中，有一座漆黑的大殿，分外显眼。

    　　殿前的牌匾上，书写着三个大字——镇魂殿！

    　　从宫殿本身外溢而出的气息，彰显着这座宫殿的不凡，毫无疑问，这是一座八转仙蛊屋！

    　　在镇魂殿的中央，矗立着五根巨大的庭柱。

