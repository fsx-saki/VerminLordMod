- chapter: 419
  title: 第四百二十一节：大梦仙尊凤金煌
  content: '第四百二十一节：大梦仙尊凤金煌

    　　北原，琅琊福地，炼蛊大厅。

    　　炼道蛊阵徐徐运转，原本幽蓝的冰焰，已经彻底化为一座冰山。

    　　方源站立在炼道仙阵的边缘处，举起双手，用掌心紧紧地贴着冰山的表面。

    　　他双目炯炯发亮，全神贯注地进行炼蛊，几乎全部心神都投入进去。

