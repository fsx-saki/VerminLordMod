- chapter: 416
  title: 第四百一十八节：这个男人与天作对
  content: '第四百一十八节：这个男人与天作对

    　　西漠。

    　　炙热的阳光，灼射天地，普照万物。

    　　碧蓝的天空万里无云，金黄的沙漠升腾着扭曲的热气。

    　　“告辞了。”方源等人和唐家两位蛊仙告别。

    　　“影宗诸君慢走。”唐烂柯笑着道。

    　　她专修宙道，修为七转，乃是光阴支流的掌控者，这一次方源从唐家的光阴支流中出来，她便是主要提供帮助的人。

    　　方源轻声而笑：“二位已然相送万里，不必再送了。”

