  title: 第四百一十三节：黄史追击
  content: '第四百一十三节：黄史追击

    　　轰！

    　　一道巨大的突泉，猛地从原本平静的河面，喷涌而出。

    　　和这道突泉相比，飞行在半空中的黄史上人，仿佛是桌腿旁的一只苍蝇。

    　　突泉还未袭近，黄史上人就感到突泉的速度越来越快！

    　　这当然不是真相，事实上突泉爆发出来，直至达到顶端，速度会越来越慢。黄史上人之所以有这样的感觉，则是因为他本身的速度变慢了。

    　　这是光阴长河，突泉的喷发会导致周围的存在，时间变缓。如'
