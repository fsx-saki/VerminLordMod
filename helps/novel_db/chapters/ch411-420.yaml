- chapter: 414
  title: 第四百一十六节：幽魂真传！
  content: '第四百一十六节：幽魂真传！

    　　片刻之后，黄史的尸体，就被白凝冰等人带到方源的面前。

    　　幽魂意志望着，叹息道：“此人也是惊才艳艳之辈，少时就有天才之名，一路成长，乃是风云人物。昔日名传中洲，乃至五域。今朝，却是陨落在此处了。”

    　　方源等人不语。

    　　幽魂意志操纵这座石莲岛，纵观古今，得知许多古往今来的秘密。这是红莲真传的宙道威能，通过光阴长河，获知情报。

