- chapter: 418
  title: 第四百二十节：赵怜云升仙
  content: '第四百二十节：赵怜云升仙

    　　“哈哈哈，方源长老，你回来了！”琅琊地灵大笑，张开双臂，迈着大步，走向方源。

    　　方源亦是大笑：“能够回到琅琊福地，就像是回到了家一般的感觉，真是安心多了。”

    　　两人用力拥抱了一下，彼此的态度都非常热情。

    　　“方源长老如今已经名震天下，可喜可贺啊。”琅琊地灵看着方源的目光，完全和之前不一样了。

