- chapter: 413
  title: 第四百一十五节：黄史阵亡
  content: '第四百一十五节：黄史阵亡

    　　轰隆！

    　　巨浪绕过太古年猴，从四面八方围拢，直接拍击黄史上人。

    　　黄史上人一颗心，在这刹那间冰凉彻底。

    　　他乃是天庭蛊仙，八转中的强者精英，在这一瞬间终于明白过来。

    　　“原来方源等人，竟然真的可用操纵这片河段？！”

    　　他心中震惊至极。

    　　这代表着，之前太古年猴困在刀剑河域中，明显是一个陷阱。而他自己一头扎进陷阱当中，之前的战斗他都被蒙在鼓里，落入算计还不自'
