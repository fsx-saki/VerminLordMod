- chapter: 412
  title: 第四百一十四节：怎么可以这样赖皮？！
  content: '第四百一十四节：怎么可以这样赖皮？！

    　　白凝冰等人正被困刀剑河域当中，暂时无法脱身，黄史上人见了这一良机，怎么可能轻易放过？

    　　他本来一路追杀，就积攒了一肚子的火气，如今见到了猎物，立即飞身扑杀过去。

    　　哗哗哗！

    　　光阴长河中掀起一阵阵的惊涛骇浪。

    　　其中夹杂、迸溅出无数的剑气、刀光，向影宗群仙攒射。

