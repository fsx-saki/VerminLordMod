- chapter: 415
  title: 第四百一十七节：回来
  content: '第四百一十七节：回来

    　　石莲岛上。

    　　幽魂意志的声音开始断断续续，并且整个形体也变得越加稀薄。

    　　方源想要出手，帮助它充实自身，但却被它阻止。

    　　“就让我消弭吧，我是幽魂意志，本体被天庭镇压，迟早会被天庭蛊仙算出来。”

    　　“至于分魂……短时间内，却是无须担心的。”

    　　“石莲岛不存，我的使命也完结了。”

    　　“现在，趁着还有最后一丝底蕴，让我为你们加速时间，尽最后的一份力量罢。”

