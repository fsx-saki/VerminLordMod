- chapter: 757
  title: 第七百六十二节：方房互算
  content: '第七百六十二节：方房互算

    　　大漠一望无边，狂风卷起黄沙，将天地遮迷。

    　　方源身形如一抹轻烟，在风沙中急速飞行。

    　　一座占地极广的绿洲，开始出现在他的视野中。

    　　这正是天露绿洲。

    　　绿洲中又有宽阔的湖泊，水源之多，几乎就是一片微小的海。

    　　湖泊周围栽种着高耸的针灸树。

    　　这种树通体深绿色，仿佛人形，有手有脚。它的双脚深深地插在沙漠深处，汲取着水分和维持生存的营养。它的双臂有的平平伸展，'
