  title: 第七百五十六节：被自己给坑了
  content: '第七百五十六节：被自己给坑了

    　　池曲由全力赶到凤焰山，便见护山大阵已是被方源攻破大半。

    　　方源正在拔取晚霞梧桐，搜刮梧桐林中的火凤凰在内的诸多鸟禽，动作熟练至极！

    　　镇守这里的蛊仙没有逃走，而是借助残存的大阵，正对方源发动猛攻。

    　　方源也应付得游刃有余。

    　　他一边对付残存大阵，一边大肆劫掠。

    　　“住手！”池曲由大喝，又惊又怒。

    　　“太上大家老，您终于来了！”镇守这里的七转蛊仙激动万分'
