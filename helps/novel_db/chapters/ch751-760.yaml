- chapter: 754
  title: 第七百五十九节：开拓青鬼沙漠
  content: '第七百五十九节：开拓青鬼沙漠

    　　南疆的这一夜，星空暗沉，阴风呼啸，似乎将有大雨倾盆。

    　　两道蛊仙身影一路疾飞，隐形匿迹，夜幕下厚实的阴云又给他们提供了一层保护。

    　　“就是这里了。”行进中，其中一道蛊仙身影蓦地开口。

    　　另外一道蛊仙身影当即停下。

    　　随后，在阴云的中央，一道仙道战场缓缓张开，将两位神秘蛊仙吸纳进去后，便又闭合消失。

    　　两位蛊仙进入仙道战场，便卸下伪装，还原本来面貌。'
