- chapter: 759
  title: 第七百六十四节：凶杀案
  content: '第七百六十四节：凶杀案

    　　房家的出击，震撼了整个西漠正道。

    　　毫无疑问，偷道杀招是一个大杀器，一时间所有的西漠正道势力都被震慑住。

    　　方源很快也得到了此战的战报，内容还很详实，有着整个战斗过程的影像。

    　　这战报当然是房家主动给他的。

    　　“房家应该掌握了一道盗天真传！”方源对这个发现也分外吃惊。

    　　方源旋即想到了大盗仙蛊。

    　　这只仙蛊便是他从房家手中索要来的。

