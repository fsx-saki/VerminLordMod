    　　上一世，掠影地沟仍在，池曲由坐镇了一段时间，直到方源进攻凤焰山，才将他单独吸引过来。

    　　这一世，方源早就将掠影地沟'
- chapter: 752
  title: 第七百五十七节：方源顿悟
  content: '第七百五十七节：方源顿悟

