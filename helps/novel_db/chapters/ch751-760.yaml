- chapter: 756
  title: 第七百六十一节：墨水效应
  content: '第七百六十一节：墨水效应

    　　至尊洞天。

    　　小南疆，一座残缺的山峦，静静地耸立在大地上。

    　　它虽然残破，但是和周围的土丘相比，绝对是鹤立鸡群。

    　　和寻常的山体完全不同，它仿佛水晶铸就，通体粉红，时刻散发着梦幻般的迷离色彩。

    　　它就是《人祖传》中记载的天地秘境之一——荡魂山！

    　　方源的神念萦绕周围，徐徐不散：“荡魂山已是修复到了八成，远比上一世同期进步太多了。”

    　　比较起来，方源的上一世'
