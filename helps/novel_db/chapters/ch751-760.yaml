- chapter: 760
  title: 第七百六十五节：掌握因果神树
  content: '第七百六十五节：掌握因果神树

    　　这几天，西漠正道的氛围，变得非常微妙。

    　　虽然表面上，还是针对房家的诋毁谣言层出不穷。

    　　但实际上针对房家的打压，已经是雷声大雨点小。

    　　毕竟杀招偷道就放在那里，八转蛊仙也不能阻止房家的强势反击。

    　　“我们前番突袭宝月绿洲的计划，已经有显著的成果了。”房家蛊仙为此欣喜。

