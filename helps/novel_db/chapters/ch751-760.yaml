  events:
  - '彻彻底底的人道杀招，而万我仙蛊本就是人道的仙蛊。

    　　方源上一世，在进攻中洲的时候，还在遗憾自己没有人道手段，在人道上没有建树。

    　　其实他早就有了，只是当时考虑太多，身处大战，自己没有察觉罢了。

    　　正所谓'
  - '着吞噬彼此壮大自身的可能性。”

    　　“我最后催动的万我杀招，已经不再是单纯的奴力合流，而是更进一步的人道杀招了！”

    　　方源宙道分身始终沐浴智慧光晕中，眼底深处精芒闪烁不定。

    　　到了这一步，万我杀招就是彻彻'
  - '智道造诣带给他相当大的帮助。

    　　这一次的重生和前几次都不相同，面对天庭这个大敌，方源必须时刻考虑到墨水效应。

    　　“方源狡诈奸猾，留下的有价值的线索真的太少！”

    　　紫薇仙子恨恨地想了想，便起身离开中央大殿'
  - '转蛊仙！

    　　当然，这是气息和层次上的突破。

    　　他本身的战力，并不那么强大，甚至还要弱于寻常的上古荒兽。

    　　因为他的身体只是虚影，没有上古荒兽那么结实强健。他的智力也有限，并不能支持他调动蛊虫作战，只'
  - '关金龙鱼的豢养之秘？”紫薇仙子先是欢喜了一下，旋即还是失望。

    　　若是之前，紫薇仙子还能打击方源的这道主要经济命脉，但是现在对方吞并了琅琊福地，里面种种的经营项目都被方源接盘。

    　　紫薇仙子得到的豢养之法'
  - '以赴蛊为核心，其余苦力蛊、借力蛊、自力更生蛊、炼精化神蛊、地力蛊、水力蛊、风力蛊、电力蛊、火力蛊、潜魂兽衣蛊、敛息蛊等为辅助。

    　　最终形成万我杀招，分化本体魂魄，在一瞬间形成大量的力道虚影！

    　　不过因'
  - '不过因为是凡级杀招，这些力道虚影远远比不上之前产出的虚影大军。

    　　但这却是源头。

    　　当初，在北原王庭之争时期，方源结合六臂天尸王、我力，参考魂道、智道、气道、奴道各大杀招所创，解决千古难题，达到奴力合流，'
  - '像。

    　　他们每一个都相貌相同，酷似方源本体，相互间隔等距，整整齐齐，密密麻麻。

    　　这是方源动用了万我仙蛊，催发而出的万我大军。

    　　方源抓住那道灵感不放，这一次却是舍弃万我仙蛊，而是动用万我杀招。

    　　不'
- chapter: 754
  title: 第七百五十九节：开拓青鬼沙漠
  content: '第七百五十九节：开拓青鬼沙漠

    　　南疆的这一夜，星空暗沉，阴风呼啸，似乎将有大雨倾盆。

    　　两道蛊仙身影一路疾飞，隐形匿迹，夜幕下厚实的阴云又给他们提供了一层保护。

    　　“就是这里了。”行进中，其中一道蛊仙身影蓦地开口。

    　　另外一道蛊仙身影当即停下。

    　　随后，在阴云的中央，一道仙道战场缓缓张开，将两位神秘蛊仙吸纳进去后，便又闭合消失。

    　　两位蛊仙进入仙道战场，便卸下伪装，还原本来面貌。'
