  - '次，不管是在摄心河滩、云竹山脉、凤焰山，你劫掠虽凶，但每一地都保留下了根基，没有破坏。”

    　　“我和太宇寺出击，也在你的预料当中。见我们出动，你便故意攻击凤焰山和褴褛洞，诱导我方分兵。”

    　　“你无非是想找'
  - '的性命？这对于你而言，并不困难。但你却从未害过一位池家蛊仙的性命。”

    　　“其次，不管是在摄心河滩、云竹山脉、凤焰山，你劫掠虽凶，但每一地都保留下了根基，没有破坏。”

