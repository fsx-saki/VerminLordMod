    　　方源叹息：“我们的时间有限，我就直接说了：我想和池家做交易，不知道贵方对我手中的梦道成果感兴趣么？”

    　　池曲由微微一愣，旋即森寒冰冷的目光发生了变化。

    　　“梦道？我刚刚没有听错？”池曲由眼中，一道热烈的光一闪即逝。

    　　方源有梦道成果，早已不是什么秘密了。

    　　方源之前伪装成武遗海，就是为了接触梦境。方源有将梦境转化成人的手段，在梦境'
