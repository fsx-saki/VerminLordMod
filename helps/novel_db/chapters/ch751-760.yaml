  - '的纯梦求真变，能凝造出最为极端的纯梦求真体，只有九个时辰的寿命，每过一个时辰，纯梦求真体的修为就提升一转，到达最后一刻，就在瞬间拥有九转的修为。

    　　但是经过义天山第一次大战后，影宗穷尽无数年的心血炼制出'
  - '是大师级，这还是我六百年左右的积累。”方源深知，单靠自身的这点人道成就，是对付不了天庭方面那些尊者的人道手段的。

    　　他活得太短，因而积累太少！

    　　红莲魔尊寿元三千年，这在尊者当中属于最短，实际上他不断重生'
  - '式。

    　　和上一世不同，这一世方源和池家的交易已经改变了很多。

    　　上一世，方源是用梦境来换取池家的仙元石、仙材等等，因为那个时候，他缺乏仙元。

    　　但这一世，方源吞并了琅琊福地，又悄悄晋升八转，拥有八转'
  - '，他要在这阴暗的夜中，会见什么人？

    　　“池曲由前辈，我们又见面了。”守候在仙道战场中的蛊仙，也带着梦道的气息，容貌平凡，掉落人群中直接找不到的那种。

    　　池曲由盯着他看了看，语气便有些不满：“方源，我还'
  - '本来面貌。

    　　修为较低的蛊仙，容貌普通，但另外一位蛊仙却是修为高达八转，位高权重，威信很高，在南疆正道中赫赫有名，正是池家太上大家老——池曲由！

    　　若是让其他的正道蛊仙见了这一幕，必定会瞪圆了眼睛，发'
  - '候池曲由的正是方源，此处的仙道战场也正是阎罗战场。

    　　不过，方源却不是本体，而是另外凝聚出来的一具纯梦求真体。

    　　方源分身笑道：“我这个人胆小怕死，还请池曲由前辈多多海涵啊。”

    　　“胆小怕死？”池曲由眉头'
  - '看到纯梦求真体回到方源的身边，他心中也松了一口气。

    　　毕竟这玩意若是在自己身旁自爆，池曲由的种种阵道手段都不好使！

    　　这场交易双方都冒很大的风险，但利益实在太诱人，双方都在铤而走险。

    　　这是第一场'
  - '蛊报酬，但方源身份暴露之后，房家就没有一点履行的意思。

    　　后来等到方源将荡魂山修复成功，他因此缺乏魂兽祭山，令胆识蛊产量受阻，又导致自身魂道修行缓慢。

    　　曾不止一次，方源在心中痛惜遗憾这方面的失败。'
- chapter: 755
  title: 第七百六十节：房家太上客卿长老
  content: '第七百六十节：房家太上客卿长老

    　　房化生的“为难”和“诉苦”，其实是对方源的刁难。

    　　方源面不改色，心湖平静无波。

    　　因为他也早就听闻了这种流言蜚语。

    　　他既然要和天庭作对，眼界就得高超。他一直尝试着凌驾于五域之上，以整个蛊世界为棋盘，来和天庭对弈。

    　　说“算不尽和方源是同一人”的流言，并非是天庭传出来的。

    　　紫薇仙子没有证据，胡乱猜测，只会堕落天庭威信！他们顶多是怀疑，暗中推波助澜。'
