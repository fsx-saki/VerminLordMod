    　　“除了那些居心叵测的正道势力，还能有谁？”

    　　池曲由心中惊怒交加，羊家很快就在他心中划过，成为头号嫌疑犯！

    　　池曲由恨啊'
  - '有这么做。

    　　从这一点上，池曲由看到了方源的“诚意”，证实了自己刚刚的猜测，同时也暗暗心惊于方源的阵道造诣！

    　　而真正让他心寒的，却是信道凡蛊中的后面部分内容。

    　　这部分内容，详细地讲述了池家的种种'
  - '光。

    　　他在上一世，用阎罗战场围困凤九歌，不仅暴露这一手段，而且还被紫薇仙子推算、破解成功。

