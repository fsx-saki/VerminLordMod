- chapter: 758
  title: 第七百六十三节：杀招偷道
  content: '第七百六十三节：杀招偷道

    　　方源知道，算不尽的身份毕竟只是伪装。要加入房家，最大的障碍就是房睇长。

    　　因为房睇长是智道大宗师。

    　　有大宗师这样境界的，往往便是八转中的强者，难缠的人物。

    　　但是要让方源动用智道手段，来应付房睇长的推算，未免太着痕迹。毕竟方源的智道境界只是宗师级数，而他在智道方面所擅长的是推算和改良杀招。

    　　借助智慧光晕，单在推算杀招方面，他可谓是世间第一人。

