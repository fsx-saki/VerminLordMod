    　　“梦道？我刚刚没有听错？”'
  - '来的梦道成果。”

    　　池曲由没有一口答应下来，而是道：“这就难办了，毕竟南疆当中几乎所有的梦境，都被正道联合看守着。”

    　　方源微笑：“池前辈，我需要是义天山那里的梦境。那里的大阵虽然彻底改变，但仍旧是由'
  - '。

    　　他虽然知晓方源已经晋升八转，但绝没有这次亲眼目睹来得震撼人心。

    　　这些火凤凰中，有不少上古荒兽，只需要一头，就能将石狮诚虐杀，毫无悬念。

    　　方源分身最后又安置了一大片的炎道鸟禽，种类繁多，杂七'
  - '鬼斧神工！

    　　他对魔尊幽魂佩服得五体投地，更对方源无一点反抗的念头。

    　　在他的身后，还有一群石人蛊师，私下议论着。

    　　“耗费了十多天的时间，我们终于将这座山丘造成了！”

    　　“可累死我了，每天都是起'
  - '足于五域之巅！

    　　“梦境之玄妙，梦道之深邃，我也只是稍稍前行了一小步而已。若是我再告诉池前辈，我的阵道境界就是从梦境中得来，池前辈不知有何想法？”方源笑着，言语轻飘飘，却仿佛是一块巨石砸在池曲由的心湖中'
  - '了宿命蛊，也绝对不会放过他，迟早有一天会找上他，将他围杀。

    　　躲避和拖延只会绝望，唯有趁着最后一届中洲炼蛊大会，中洲遭受四域齐攻，天庭最为虚弱的时刻出手，才最有成功的可能。

    　　异人们的愿望，是不可能实现的。不'
  - '果，早已不是什么秘密了。

    　　方源之前伪装成武遗海，就是为了接触梦境。方源有将梦境转化成人的手段，在梦境大战中就彰显过，令众多超级势力都羡慕得流口水。

    　　方源拥有春秋蝉，重生归来。而未来是属于梦道的，他掌握'
  - '，打压池曲由气焰，至此刻他已经完全掌握了对话的节奏。

    　　这和上一世完全不同。

    　　方源接着抛出一只信道蛊虫：“请前辈再看这个。”

    　　池曲由接过一看，眼中精芒直闪，手上不自觉地用力，暗暗捏紧信道凡蛊，深怕它'
- chapter: 753
  title: 第七百五十八节：眼底幽芒
  content: '第七百五十八节：眼底幽芒

    　　南疆。

    　　某处无名的山谷中，一道瀑布垂下，水声轰鸣，水雾弥漫。

    　　在瀑布顶的悬崖边上，方源本体盘坐在一株松树枝丫之间，闭目沉思。

    　　人道灵感来得十分突然，方源分外重视，本体和分身都放下手头上的事情，一起感悟。

    　　此刻，在至尊仙窍当中。

    　　一只大军已然成型。

    　　大约有十万多的力道虚影，静静地站在草原上，一动不动，仿佛是雕塑石像。

    　　他们每一个都相貌相同，酷'
