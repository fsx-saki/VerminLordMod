- chapter: 455
  title: 第四百五十七节：天消意散
  content: '第四百五十七节：天消意散

    　　东海海底。

    　　“真是惭愧，尤婵你千里迢迢而来，最终我却没有帮到你什么。”华安苦笑，对着尤婵道。

    　　两人此时分别在即。

    　　尤婵来华安出寻求帮助，但是由于方源完善的智道防备手段，使得华安不仅没有测算出什么来，还将尤婵自己的情况首先暴露了出去。

    　　听到华安颇显惭愧的话语，尤婵摇了摇头，她望着华安两鬓的白发，诚恳地道：“华安，你不要这么说。你为了我的事情，不惜损耗寿元'
