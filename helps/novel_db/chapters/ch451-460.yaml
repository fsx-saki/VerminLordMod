  title: 第四百五十三节：方源喜酒
  content: '第四百五十三节：方源喜酒

    　　尤婵本身就是水道蛊仙，借助海底潜流，速度比寻常蛊仙飞行还要迅猛更多。

    　　一路辗转了数道海底潜流，前后耗费数天时间，尤婵来到南宫家的领海。

    　　南宫家乃是东海的正道超级势力之一，尤婵来到领海边缘，就停驻不前，落到一座无名小岛上等候。

    　　她此番是来南宫家寻找援助，早在动身之前，就用信道手段通知了对方。

    　　果然，尤婵没有等候多久，就有一位南宫家的蛊仙前来迎接。

