- chapter: 458
  title: 第四百六十节：平炼春秋
  content: '第四百六十节：平炼春秋

    　　至尊仙窍，小南疆，封天山。

    　　这是一座山体矮小、貌不惊人的小山。山腹中空，布置了蛊阵，就是为了封印力道仙僵之躯。

    　　所以，才取名为封天山，封印天意的意思。

    　　此时，方源至尊仙躯悬浮在半空中，俯瞰着这座封天山。在他的身旁，还站着一位蛊仙，正是异人蛊仙毛六。

    　　将毛六接引到自己的至尊仙窍中，是方源经过深思熟虑的事情。

    　　一般而言，自家仙窍乃是重中之重，十分秘密的地'
