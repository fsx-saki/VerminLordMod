    　　“铜龙鱼？全新的物种么。”

    　　“听卖方所言，这铜龙鱼'
  - '是刁难方源一个人。

    　　食道真传，很多蛊仙强者都想要得到，苦于没有机缘。

    　　然而宝黄天，非常安全，天庭都无可奈何，这些蛊仙强者便直接找上方源留下的意志。

    　　他们直接谈食道真传，表明自己要收购的强烈心愿'
  - '大的潜力！

    　　不过，他们注定是要失败了。

    　　方源的智道防备手段，就连东海蛊仙界中的三大智道之一的华安，都铩羽而归。天庭方面，天意方面，都无可奈何。

    　　曾经的方源，一度为遮蔽推算，而躲躲藏藏。如今的他'
  - '手中可是掌握着食道的真传了。”不少蛊仙嫉妒羡慕，尤其是那些蛊仙强者。

    　　仙蛊喂养的难题，不只是刁难方源一个人。

    　　食道真传，很多蛊仙强者都想要得到，苦于没有机缘。

    　　然而宝黄天，非常安全，天庭都无可'
- chapter: 458
  title: 第四百六十节：平炼春秋
  content: '第四百六十节：平炼春秋

    　　至尊仙窍，小南疆，封天山。

    　　这是一座山体矮小、貌不惊人的小山。山腹中空，布置了蛊阵，就是为了封印力道仙僵之躯。

    　　所以，才取名为封天山，封印天意的意思。

    　　此时，方源至尊仙躯悬浮在半空中，俯瞰着这座封天山。在他的身旁，还站着一位蛊仙，正是异人蛊仙毛六。

    　　将毛六接引到自己的至尊仙窍中，是方源经过深思熟虑的事情。

    　　一般而言，自家仙窍乃是重中之重，十分秘密的地'
  gu_mentioned: []
  char_appear:
  - 方源
  - 毛六
  - 百花
  events:
  - '仙窍，小南疆，封天山。

    　　这是一座山体矮小、貌不惊人的小山。山腹中空，布置了蛊阵，就是为了封印力道仙僵之躯。

    　　所以，才取名为封天山，封印天意的意思。

    　　此时，方源至尊仙躯悬浮在半空中，俯瞰着这座封'
  - '置下来，形成炼道仙阵。

    　　这座炼道仙阵，已然是铺设搭建好了，就待方源催动。

    　　方源心念频起，红枣仙元不断地消耗，仙道蛊阵便徐徐发动起来。

    　　一阵阵的白色光辉，像是流水一般，荡漾在封天山上。

    　　片刻'
  - '个人，仙元不对，气息不对，对于炼蛊而言，是有很多弊端的。

    　　但是这一步骤，方源是经过了充分的推演，特意设计出来，并没有任何的不妥之处。第四百六十节：平炼春秋'
  - '嘎吱作响，时间越久，他就会越发不堪重负。

    　　所以方源抓紧时间，稳定了金罡光柱之后，就取出一头鲜活的荒兽。

    　　咔嚓。

    　　一道剑光激射过去，荒兽头颅滚落，当场丧命。

    　　噗！

    　　大量的鲜血，从荒兽的脖'
  - '五百年前世相当苦逼，没有得到过，今生却是掌握了海量的炼道仙阵的具体内容，甚至他更进一步，依靠宗师级的阵道境界，还有智慧光晕，他还能改良这些炼道仙阵，推算出最适合当下情景的炼道蛊阵出来。

    　　炼道仙阵不断运'
  - '都取出来。

    　　这些蛊材竟都是花，有鬼脸葵、钢丝棉花、天花、七宝小花、奶茶花、铁壳花、船花、血毒棠、斑斓霸王花、青蚨水莲、赤斧花、臭蝇花等等。

    　　这些花琳琅满目，有大有小，有凡级蛊材，也有仙级蛊材。

    　　毛六'
  - '一安置下来，形成炼道仙阵。

    　　这座炼道仙阵，已然是铺设搭建好了，就待方源催动。

    　　方源心念频起，红枣仙元不断地消耗，仙道蛊阵便徐徐发动起来。

    　　一阵阵的白色光辉，像是流水一般，荡漾在封天山上。

    　　片刻'
  - '的蛊材，都取出来。

    　　这些蛊材竟都是花，有鬼脸葵、钢丝棉花、天花、七宝小花、奶茶花、铁壳花、船花、血毒棠、斑斓霸王花、青蚨水莲、赤斧花、臭蝇花等等。

    　　这些花琳琅满目，有大有小，有凡级蛊材，也有仙级蛊材'
- chapter: 459
  title: 第四百六十一节：一抹微笑
  content: '第四百六十一节：一抹微笑

    　　方源休息了半盏茶的功夫，睁开双眼。

    　　他的体力恢复了，双眼也不再像之前那样隐隐发晕，神清目明，状态好转了一大截。

    　　毛六见方源来替换自己，顿时松了一口气。

    　　双方交接十分完美，事先他们也多次演练过这一步骤。

    　　此时，方源的力道仙僵肉身似乎已经完全转变成了人形的金霄神木，方源开始进行下一步。

    　　炼道仙阵再次开启一个仓门，从中飞出一只巨大的海胆。

    　　这只海胆大'
  gu_mentioned:
  - 寿蛊
  char_appear:
  - 方源
  - 毛六
  - 焚天魔女
  events:
  - '换自己，顿时松了一口气。

    　　双方交接十分完美，事先他们也多次演练过这一步骤。

    　　此时，方源的力道仙僵肉身似乎已经完全转变成了人形的金霄神木，方源开始进行下一步。

    　　炼道仙阵再次开启一个仓门，从中飞出'
  - '到中心，汇聚成一团。

    　　方源怒目圆瞪，感到非常吃力，勉强维持局面。炼道仙阵运转到了极限，大量的红枣仙元在这一刻，尽数消耗！

    　　翠绿液滴渐渐成形，最终还原成了春秋蝉。

    　　它安然无恙，唯一不同的是，经过'
  - '外界。

    　　这里乃是北原一处无名荒地，经过方源暗中考察，人迹罕至，相当安全。

    　　升仙灾劫对于大多数蛊师而言，非常恐怖，说是九死一生都是过高的评估。

    　　但是对于方源而言，就是小菜一盘。

    　　不管是天地人'
  - '此时此刻，方源运用的力转生死，更是经过了改良，更有优秀，不弱于涅槃火。

    　　仙僵肉身迅速还原，两只寿蛊被方源抛出来。

    　　仙僵肉身猛地伸手，准确地拿捏住寿蛊，直接用了。

    　　方源这副肉身，在王庭福地最后'
  - '方源的空窍原本已经裂痕满布，但此时此，却大变模样。

    　　窍壁上的裂痕已经被填满，结上一层厚实的紫金石皮，石皮上更有无数星点闪烁，还有一个个尖刺，长长凸起，和之前的紫薇星胆十分酷似。

    　　人脸光影一个个'
  - '凝聚到中心，汇聚成一团。

    　　方源怒目圆瞪，感到非常吃力，勉强维持局面。炼道仙阵运转到了极限，大量的红枣仙元在这一刻，尽数消耗！

    　　翠绿液滴渐渐成形，最终还原成了春秋蝉。

    　　它安然无恙，唯一不同的是，经过'
  - '消耗已近谷底。

    　　此时补充了寿蛊，顿时寿命充盈起来，不怕恢复人身之后，直接老死掉。

    　　空窍破碎，至尊仙窍里顿时风起云涌，天地二气都被沟通起来。

    　　但方源却不想他的这一分身，在至尊仙窍中渡劫，于是便打开了'
  - '，皆默然不语。

    　　五百年前世的辛酸和困苦，重生之后被天意安排的身不由己，面临绝境的拼死反抗，为拯救荡魂山、喂养仙蛊、经营仙窍、推算杀招的种种奔波劳累……

    　　这一切的种种，都化为微笑，浮现在方源两人的嘴角'
- chapter: 460
  title: 第四百六十二节：分身之用
  content: '第四百六十二节：分身之用

    　　分身渡劫成功，成为了宙道六转蛊仙。而方源的主体仍旧是七转蛊仙，至尊仙体，全流派兼修。

    　　有一个分身，对方源而言，很有好处。

    　　许多事情，尤其是经营仙窍这一块，就可以交给分身来打理。

    　　这是方源绝对信任的，远比什么影宗成员要得力得多。

    　　尤其是双方之间，本为一体，思想、意志等等都是完全一致的，所以沟通交流上不存在什么矛盾，甚至连误差都很少。

    　　看一看影宗的强盛'
  gu_mentioned:
  - 天机蛊
  - 智慧蛊
  - 至尊仙胎蛊
  char_appear:
  - 人祖
  - 方源
  - 毛六
  - 琅琊地灵
  events:
  - '身在洁身自好仙道蛊阵中，消除自身上的力道道痕。

    　　方源原本是第二空窍升仙，成为了力道蛊仙。而后化为仙僵，仙窍崩解，力道道痕就都留在了肉身上。

    　　方源决定，利用洁身自好杀招，帮助分身剔除不必要的力道道痕'
  - '尊仙窍，开发程度只有百分之四，地广物稀，太需要经营了。

    　　“或许多出一个仙窍，最大的作用就是有一个本命蛊的名额。”方源心中思量。

    　　本命蛊最大好处，就是将来升炼的时候，就算失败，本命蛊也不会损毁。'
  - '方源既然选择专修宙道，那么这个仙窍自然也要修行宙道，但这又有什么用呢？

    　　多出一个上等福地，或者是特等福地，对于方源而言，毫无用处。

    　　因为建设这个福地，还不如将全部的精力投入到至尊仙窍当中去。而方源的至'
  - '不是重点，但这一块上也需要投入。

    　　因为分魂，导致方源的本体魂魄，从原本的千万人魂，直接降低到了九百万人魂，可谓大缩水。

    　　这个魂魄底蕴，方源又得继续开始积累。所幸拥有两大圣地的他，这个方面的进展尤其迅速'
  - '划，至此都成功了。”

    　　第一期炼蛊，方源炼成了净魂、自爱以及小吃。第二期炼蛊，方源则炼成了春秋蝉和天机蛊。

    　　为了炼蛊，方源付出极大。总体而言，运气还是很好的，有的蛊仙甚至八百十次，都没有成功一次。'
  - '方源不能深谈，以同是琅琊派太上长老的身份，相互告别。

    　　方源没有回到自己的云城中休整，而是直接来到智慧蛊的面前。

    　　他打开仙窍门户，飞出分身来。

    　　分身乃是鲜活肉体，智慧蛊并无反应。

    　　不过很快，随'
  - '来源于这个天地，因此还要遭受宿命的束缚，这一点方源也没有办法。

    　　除非他能够效仿影宗，再炼制出一个至尊仙胎蛊来，交给分身使用。

    　　影宗上下积蓄了十万年，才炼出一只至尊仙胎蛊，要想炼第二只，基本上不可能了。'
  - '因，将来还要注意，哪怕分身修为停滞不前，也要努力维持原状，不能放弃智慧光晕！”

    　　方源有些郁闷，《人祖传》中智慧蛊通灵得很，甚至成功坑害过人祖，怎么到他手中，却是如此单纯蠢笨？一点都没有智慧蛊的风采了。'
