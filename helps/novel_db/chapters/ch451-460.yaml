- chapter: 457
  title: 第四百五十九节：成功
  content: '第四百五十九节：成功

    　　铜龙鱼投放的数天后。

    　　宝黄天已然是喧嚷起来。

    　　“这是什么龙鱼？”

    　　“铜龙鱼？全新的物种么。”

    　　“听卖方所言，这铜龙鱼的效用比普通龙鱼还要好。”

    　　“哈哈，这下有好戏看了。”

    　　“不错，我原以为这个卖家，已经被尤婵击败。没想到他偃旗息鼓这么多天，居然做出如此犀利的反击！”

    　　“能够有铜龙鱼问世，对我们大众都有好处。可以推断，这位卖家手中可是掌握着食道的'
  gu_mentioned: []
  char_appear:
  - 华安
  - 方源
  events:
  - '否则单靠普通龙鱼，她连交手的资格都没有。

    　　尤婵并非盲目自信，她也有食道的底蕴。

    　　她继承过一份食道传承，只是没有方源这般正统而已。

    　　食道虽然流传很少，但修行食道的蛊仙必然远远不止开创者一人。

    　　正'
  - '多，若是放出去，必定能够引爆市场，大赚特赚。

    　　但是这样一来，无疑就是资敌。

    　　接下来的大时代，五域乱战开启，谁都有可能是方源的敌人。而天庭，则是已然确定的死敌！

    　　“查，给我查出这个卖家的身份来。”被'
