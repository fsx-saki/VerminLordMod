- chapter: 459
  title: 第四百六十一节：一抹微笑
  content: '第四百六十一节：一抹微笑

    　　方源休息了半盏茶的功夫，睁开双眼。

    　　他的体力恢复了，双眼也不再像之前那样隐隐发晕，神清目明，状态好转了一大截。

    　　毛六见方源来替换自己，顿时松了一口气。

    　　双方交接十分完美，事先他们也多次演练过这一步骤。

    　　此时，方源的力道仙僵肉身似乎已经完全转变成了人形的金霄神木，方源开始进行下一步。

    　　炼道仙阵再次开启一个仓门，从中飞出一只巨大的海胆。

    　　这只海胆大'
