- chapter: 456
  title: 第四百五十八节：铜龙鱼
  content: '第四百五十八节：铜龙鱼

    　　这只仙蛊形似蝉虫，它的头部、腹部是棕黄色的，表面上有树木年轮般的纹理。背部的双翼很宽大，半透明，就好像是两片树叶交叠着。

    　　它无时无刻不在散发着六转仙蛊的气息。

    　　它正是六转宙道仙蛊——春秋蝉。

    　　此时的春秋蝉，处于仙僵肉身的空窍之中，遭受着方源的封印。

    　　它的身躯，散发着温润的油光。它的双翅，嫩绿嫩绿，好像是两片刚抽芽的鲜嫩树叶。这一切都表明，春秋蝉状态已经修'
