- chapter: 457
  title: 第四百五十九节：成功
  content: '第四百五十九节：成功

    　　铜龙鱼投放的数天后。

    　　宝黄天已然是喧嚷起来。

    　　“这是什么龙鱼？”

    　　“铜龙鱼？全新的物种么。”

    　　“听卖方所言，这铜龙鱼的效用比普通龙鱼还要好。”

    　　“哈哈，这下有好戏看了。”

    　　“不错，我原以为这个卖家，已经被尤婵击败。没想到他偃旗息鼓这么多天，居然做出如此犀利的反击！”

    　　“能够有铜龙鱼问世，对我们大众都有好处。可以推断，这位卖家手中可是掌握着食道的'
