  title: 第四百五十三节：方源喜酒
  content: '第四百五十三节：方源喜酒

    　　尤婵本身就是水道蛊仙，借助海底潜流，速度比寻常蛊仙飞行还要迅猛更多。

    　　一路辗转了数道海底潜流，前后耗费数天时间，尤婵来到南宫家的领海。

