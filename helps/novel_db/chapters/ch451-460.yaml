- chapter: 452
  title: 第四百五十四节：万金妙华体
  content: '第四百五十四节：万金妙华体

    　　酒宴上热闹非凡，这场订婚的酒宴，政治意义非常浓重。

    　　不仅是对异族大联盟而言，对方源来说，更是如此。

    　　对于各位异人蛊仙的敬酒，方源来者不拒，凭借他的交际手腕，令他和异人蛊仙们的距离大大拉近。

    　　方源原本的身份比较尴尬。

    　　他是纯正的人族，在异族大联盟中，天生属于政治上的孤军。异人蛊仙们对于方源，有着天然的怀疑。

    　　但这一次，方源和雪儿订婚，这就给人感观完'
