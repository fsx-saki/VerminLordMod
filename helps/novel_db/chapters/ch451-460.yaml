- chapter: 453
  title: 第四百五十五节：财富蛊
  content: '第四百五十五节：财富蛊

    　　西漠。

    　　这里是一处戈壁，地势平坦，一望无际。

    　　到处是龟裂的石质地面，寸草不生。

    　　不过在地下深处，却有别有洞天。大量的矿脉，以及搭建好的矿场。

    　　上十万的石人，在这里生存，充当矿工，为蛊仙开采各种矿物。

    　　这里就是西漠大名鼎鼎的万矿戈壁，由超级势力之一的石家掌控。

    　　这里的矿物，种类极多，又储量丰富。

    　　除去石人矿工开采的凡级矿物之外，还有许多的仙矿，'
