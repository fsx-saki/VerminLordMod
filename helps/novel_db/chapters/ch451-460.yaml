- chapter: 460
  title: 第四百六十二节：分身之用
  content: '第四百六十二节：分身之用

    　　分身渡劫成功，成为了宙道六转蛊仙。而方源的主体仍旧是七转蛊仙，至尊仙体，全流派兼修。

    　　有一个分身，对方源而言，很有好处。

    　　许多事情，尤其是经营仙窍这一块，就可以交给分身来打理。

    　　这是方源绝对信任的，远比什么影宗成员要得力得多。

    　　尤其是双方之间，本为一体，思想、意志等等都是完全一致的，所以沟通交流上不存在什么矛盾，甚至连误差都很少。

    　　看一看影宗的强盛'
