- chapter: 694
  title: 第六百九十九节：天庭苏醒
  content: '第六百九十九节：天庭苏醒

    　　紫薇仙子面沉如水。

    　　中央大殿乃是天庭所有宫殿的中枢，它被毁掉，顿时令紫薇仙子对己方的掌控力度直线下降！继续调动起来，必定耗费更多时间和精力。

    　　而往往在如此生死大战的激烈对决中，每一个呼吸的时间都非常宝贵。

    　　中央大殿成了一堆废墟，劫运坛的前方，是一座耸立的高塔。

    　　“监天塔！”劫运坛中，冰塞川目光炙热。

    　　监天塔名动天下，五域蛊仙无人不知无人不晓。此刻它'
