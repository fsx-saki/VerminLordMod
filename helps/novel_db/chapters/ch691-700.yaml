- chapter: 699
  title: 第七百零四节：穿枝拂叶
  content: '第七百零四节：穿枝拂叶

    　　紫薇仙子的分析，并没有错。

    　　因为有着宿命蛊，古代的蛊仙不能穿梭到未来，未来的蛊仙也不会能到现在。

    　　但伴随着宿命蛊的损伤，导致宙道方面的束缚松动了许多。春秋蝉就是最好的例子，虽然不能令蛊仙完整地回到过去，但是却能够将一股意志传输回去。

    　　未来身、前有古人、后有来者这些杀招也是如此，是借用了过去或者将来，某个人物的状态，投射到现在来。

