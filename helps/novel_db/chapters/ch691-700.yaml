    　　炼炉大阵虽然修复宿命蛊效用上佳'
- chapter: 695
  title: 第七百节：太古传奇第一战力
  content: '第七百节：太古传奇第一战力

    　　藏龙窟战场。

    　　原本镇压帝藏生的超级仙阵，已是被东海八转们破开，大半崩溃，只剩下大阵核心中枢残存，勉强维系局面。

    　　悲风老人身受重伤，强撑局面。他的孙子风禅子则伴随左右，苦苦等候天庭援军，却始终不见援军踪影。风禅子的面色不由地越加绝望。

    　　中枢之外，东海八转们将大阵中枢尽数包围。

    　　华家太上大长老华彩云放出太古云兽，附着在大阵中枢上，不断地碾磨着大阵。'
