- chapter: 693
  title: 第六百九十八节：无极出手
  content: '第六百九十八节：无极出手

    　　一百万年前！

    　　上古时代。

    　　无极魔尊攻上天庭，一路闯荡，天庭蛊仙奋不顾身，全力阻挡。

    　　无极魔尊信步而来，天庭蛊仙无人可与之匹敌，死伤惨重。

    　　中天门崩溃成渣，名牌宫连飞走都来不及，太阳宫、五神殿在无极魔尊面前，脆弱如纸，仿佛只是作为一个笑话存在。

    　　终于，当无极魔尊来到中央大殿之前，天庭震荡，星宿意志降临，启动星宿仙尊曾经布置的后手——九九连环不绝阵。'
