- chapter: 696
  title: 第七百零一节：前有古人
  content: '第七百零一节：前有古人

    　　“厉煌，不要告诉我这就是你的全部实力！”方源长啸，他身形如虹，纵横战场，追杀厉煌。

    　　厉煌一边后撤疾飞，一边加紧催动阳莽背火衣。

    　　春剪始终在他身边飞舞缠绕，将一撮撮的火苗从背火衣上剪裁下来。

    　　方源忽然双眼绽射一道寒芒，仙道杀招的气息一闪即逝。

    　　“该死！”厉煌心中陡生警兆，连忙转折了一个方向。

    　　方源的宙道杀招没有击中厉煌，厉煌的战斗经验还是非常丰富的。'
