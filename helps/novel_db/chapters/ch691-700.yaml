- chapter: 700
  title: 第七百零五节：龙御上宾
  content: '第七百零五节：龙御上宾

    　　一瞬间，龙公明白了，这是一道元莲真传！

    　　他明显可以感觉到自己的木道境界，暴涨到了极高的层次，同时有关于这记木道杀招穿枝拂叶的种种，都深深地印刻在他的脑海之中。

    　　那片竹林，与其说是幻境，倒不如说是一种心境。

    　　而穿枝拂叶杀招的威能，便是解脱蛊仙，消去蛊仙身上的有害束缚。

    　　“真是狼狈啊。”龙公自嘲苦笑。

    　　他再一次感受到尊者的强大。

    　　事实上，他对一缺抱憾'
