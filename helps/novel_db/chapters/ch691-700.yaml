- chapter: 697
  title: 第七百零二节：天庭乱战
  content: '第七百零二节：天庭乱战

    　　天庭战场。

    　　一道道身影或在空中飞舞，或在地上缠斗。

    　　隆隆炸响，不断回荡，火光四溢，烈芒爆闪。

    　　北原一方的蛊仙强者，和天庭成员万我地厮杀。

    　　轰！

    　　陡然间，一声巨响，巨大如山的黑熊整个右肩都炸没了，大块的血肉不翼而飞，肩骨也被炸碎。

    　　黑熊脸上凝固着痛楚之色，眼睛闭起来，当场竟被炸昏了过去。

    　　轰隆！

    　　随后，它如山般的身躯慢慢倾倒，最后一声巨响，'
