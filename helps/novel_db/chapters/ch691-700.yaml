  - 这记火道防御大杀招，还有一个难能可贵的优点，便是可以连续催动，相互叠加。当然相应的弊端就是消耗的仙元，将暴涨两倍！第七百节：太古传奇第一战力
  - '辟易。

    　　大盗鬼手可以偷取蛊虫，方源掌握的这记杀招，连八转仙蛊都能盗取出来，即便是仙蛊藏身在蛊仙的仙窍洞天之中。

    　　仙蛊屋的本质，是许多蛊虫相互组并，形成的某种固定形态。可以看做是许多仙道杀招的相互融合，'
  - '连忙围拢上去，神色多少都有些兴奋。

    　　沈从声专心对付悲风老人，也不急迫。在来之前，东海诸仙都结下了盟约，盟约束缚力度还是相当强的。盟约规定：若是东海诸仙此行获得了龙宫，那么人人有份。至于份额多寡，则视此'
  - '：“大阵破损大半，已经快要镇压不足帝藏生了，为避免夜长梦多，我们快动手吧。”

    　　帝藏生乃是传奇太古荒兽中十分独特的一头。因为它是中洲地脉的力量，结合人的怨恨、恐惧等种种消极情绪，凝聚而成。

    　　所以，它'
  - '克制仙蛊屋！

    　　方源依仗大盗鬼手，连连出手，盗取许多蛊虫。

    　　他之前也曾对仙蛊屋动过手，但那时是太宇寺，刚好有着应对大盗鬼手的手段。事实上，绝大多数的仙蛊屋都不具备，抗衡方源的大盗鬼手的能力。

    　　天庭'
  - '第七百节：太古传奇第一战力

    　　藏龙窟战场。

    　　原本镇压帝藏生的超级仙阵，已是被东海八转们破开，大半崩溃，只剩下大阵核心中枢残存，勉强维系局面。

    　　悲风老人身受重伤，强撑'
  - '则它就是不死之身。它曾经给天庭造成巨大的麻烦，东海蛊仙们可不想平白无故地和帝藏生战斗。他们都希望夺走龙宫，一洗前耻之后，就放任帝藏生逃出生天，让它继续找天庭和中洲的麻烦。

    　　“已是可以了。”宋启元点点头'
  - '不足帝藏生了，为避免夜长梦多，我们快动手吧。”

    　　帝藏生乃是传奇太古荒兽中十分独特的一头。因为它是中洲地脉的力量，结合人的怨恨、恐惧等种种消极情绪，凝聚而成。

    　　所以，它天然地对人族抱有仇恨、杀戮之心'
- chapter: 696
  title: 第七百零一节：前有古人
  content: '第七百零一节：前有古人

    　　“厉煌，不要告诉我这就是你的全部实力！”方源长啸，他身形如虹，纵横战场，追杀厉煌。

    　　厉煌一边后撤疾飞，一边加紧催动阳莽背火衣。

    　　春剪始终在他身边飞舞缠绕，将一撮撮的火苗从背火衣上剪裁下来。

    　　方源忽然双眼绽射一道寒芒，仙道杀招的气息一闪即逝。

    　　“该死！”厉煌心中陡生警兆，连忙转折了一个方向。

    　　方源的宙道杀招没有击中厉煌，厉煌的战斗经验还是非常丰富的。'
