  - '太过厉害，得了许多尊者传承，赫赫魔威实在令人心惊胆战。不过你放心，我们帝君城虽然只是凡蛊屋，但蕴藏着人道手段。关键时刻，就有仙招升腾，保护我等的。”

    　　蛊仙们相互安慰，鼓舞士气。

    　　帝君城乃是人族第一大城'
  - '转蛊仙清夜，见局势不妙，只得下场。

    　　厉煌见机，不撤反进，和清夜并肩作战。

    　　方源爆喝一声，不顾仙元消耗，连连催动杀招，悍然杀向帝君城。

    　　厉煌、清夜挡在方源的前方，被方源的一阵爆发，打得连连后退。'
  - '，和牛魔配合默契，往往能打出意想不到的强力攻击。

    　　从严每挨一次拳头，全身就震动一下。

    　　他专修律道，浑身上下的皮肤上，好似纹身一般，缠绕着许多蓝色线条。这些线条有粗有细，相互纵横，像是一张网，牢牢保'
  - '之处，立即分析出了一些长生天的底细。

    　　“冷静，一定要冷静。我若不冷静，造成自己的失误，就算是有着成功道痕，也无济于事。”

    　　“坚持住！”

    　　“仙墓中的蛊仙已经陆续苏醒，我方的战力会越来越强，强到令长生'
  - '不擅长。

    　　厉煌只得继续逃窜。

    　　方源的实力暴涨得十分厉害，让所有人都为之侧目。

    　　帝君城中，蛊师们还在进行着最后的大会决赛。帝君城里镇守的蛊仙，已经将外面的声音、光影都尽数隔绝，让这些蛊师一门心思'
  - '恐。

    　　这送友风来头极大，乃是当初一位怪杰所创。

    　　这位怪杰名为黑心道人，专修风道，但晚年参详《人祖传》大有所获。在他闭关了近十年后，送友风杀招便应运而生。

    　　这是风道手段，但掺和了人道的奥妙，使得威'
  - '战力会越来越强，强到令长生天绝望。”

    　　袁琼都正这样想着，就听到冰塞川的冷笑声：“知道为什么我要将劫运坛带过来吗？因为曾有一位魔尊的杀招，就附着在它的身上啊。”

    　　说这话的时候，劫运坛已经开始遭受天庭蛊'
  - '的宙道杀招没有击中厉煌，厉煌的战斗经验还是非常丰富的。

    　　“厉煌大人，我们来助你一臂之力！”这时，风满楼冲过来支援。

