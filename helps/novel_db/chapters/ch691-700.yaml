- chapter: 692
  title: 第六百九十七节：尊者对决
  content: '第六百九十七节：尊者对决

    　　轰轰轰……

    　　一连串的剧烈爆炸，五神殿在冲天的烈焰中，被炸得粉碎。

    　　五行大法师脚踏虚空，一步步走出，虽然面目覆盖了一些烟灰，但整个人却毫无伤势。

    　　劫运坛将他接进。

    　　五行大法师笑道：“这五神殿虽然奥妙非凡，但运转之理，正为我熟知，被我手段克制。此行竟比我原先料想中的还要容易得多！”

