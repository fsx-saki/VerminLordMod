  title: 第六百九十六节：传奇荒兽大战
  content: '第六百九十六节：传奇荒兽大战

    　　太阳宫一破，接下来便是五神殿。而五神殿之后，便是龙公、紫薇仙子等人所在的中央大殿了。

    　　长生天蛊仙来势凶恶，攻势狂猛，不计牺牲，令天庭诸仙都感到压力。

    　　“不能再让他们这些胡作非为下去了。”龙公转身面对紫薇仙子，“它们都给我调过来了么？”

    　　紫薇仙子的脸色有些难看：“只调来两位。”

    　　龙公微微一愣，旋即恍然：“想必是苍玄子没有动身？也罢，当初它答应迁入天庭'
