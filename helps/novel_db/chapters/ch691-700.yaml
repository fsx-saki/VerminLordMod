  - '人冲击万人敌阵，在众目睽睽之下，杀将斩旗，无人可挡。

    　　成为蛊仙之后，更是四处劫掠，攻敌弱点，身为正道蛊仙，却有着魔道的糟糕名声。不过这个名声，等到他修成了八转后，就有了改变。当时的北原蛊仙界，人人都惧'
  - '屋，组建出天庭里的琼楼玉宇，重重宫殿。还有一部分，发放下去，交给下宗的某些人物使用，比如交给凤九歌的命甲仙蛊。真正收藏在库藏中，闲置下来的仙蛊是很少的。

    　　天庭蛊仙都是八转当中的精英、强者，但是因为仙蛊缺乏'
  - '时时刻刻都有北原蛊仙走动。

    　　紫薇仙子若是要冲进去救人，风险极大，并且她还有重任在身。

    　　“之前一缺抱憾亭中双尊身影再现，龙公大人身上中着九转杀招，虽然被制住，但也保障了性命安全。”

    　　“我还有重任在身，'
  - '就是其中之一。

    　　“但是长生天的宙道杀招，实在是太强了，它也在不断地召唤其他人手！”紫薇仙子又望向劫运坛的方向，看着天空中的光阴长河的幻影，心头不断震动。

