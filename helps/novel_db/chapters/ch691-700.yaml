  - '有一个诨名，号称护短仙尊。”

    　　“历代尊者都有布置，想要在这个关键的时刻，发挥自己的影响。但是经过光阴长河的不断冲刷，这些布置大多数都已发生了变动。九转尊者当然不能算尽一切，都会有失误。许多布置因为沧海桑田'
  - '对，根本抵挡不住两三个回合。劫运坛乃是八转仙蛊屋，也被龙公一力镇压！

    　　长生天一行人已然胜利在望，监天塔近在眼前，但因为龙公的阻挡，胜利迅速沦为一场遥不可及的梦幻。

    　　龙公只一人，便构成了天堑，难以逾越'
- chapter: 693
  title: 第六百九十八节：无极出手
  content: '第六百九十八节：无极出手

    　　一百万年前！

    　　上古时代。

    　　无极魔尊攻上天庭，一路闯荡，天庭蛊仙奋不顾身，全力阻挡。

    　　无极魔尊信步而来，天庭蛊仙无人可与之匹敌，死伤惨重。

    　　中天门崩溃成渣，名牌宫连飞走都来不及，太阳宫、五神殿在无极魔尊面前，脆弱如纸，仿佛只是作为一个笑话存在。

    　　终于，当无极魔尊来到中央大殿之前，天庭震荡，星宿意志降临，启动星宿仙尊曾经布置的后手——九九连环不绝阵。'
