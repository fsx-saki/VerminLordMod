- chapter: 698
  title: 第七百零三节：阵中亡
  content: '第七百零三节：阵中亡

    　　“这招前有古人，应当和后有来者相差不多。它并非是真正将蛊仙，从未来或者过去召唤到现在。而是类似未来身的奥妙，召唤出的只是光阴长河中某个人物的某刻状态！”

    　　“正因如此，这些北原蛊仙一个个几乎都处于自身的巅峰状态，仙元、仙蛊一应俱全。”

    　　“破解此招，应当和我当年破解‘后有来者’差不多，就是撼动施展杀招的人！放到眼前，就是将劫运坛打残，造成的伤害达到某种程度，就能打断‘'
