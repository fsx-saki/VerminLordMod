- chapter: 84
  title: 第八十四节：狠狠地踩踏！
  content: '第八十四节：狠狠地踩踏！

    　　最后一战，古月方正对战古月方源！

    　　“哟，有意思啊。”

    　　“想不到最终，竟然是兄弟对决。”

    　　“方正……”族长看到这里，嘴角的笑容收敛了一丝，“你心中最大的阴影，就是你的哥哥方源。击败他吧，你有赤铁真元，同时还有玉皮蛊，攻防兼备，优势很大。打碎这层阴影，你将引来真正的新生！”

    　　终于迎来了决胜战。

    　　兄弟俩站在了同一个擂台上，遥相对望。

    　　残阳如血……'
