  title: 第八十六节：怀疑和试探
  content: '第八十六节：怀疑和试探

    　　擂台上，方正昏倒在地，再无动静。

    　　而方源，仍旧一脸的冷漠，站在擂台的中央。

    　　短暂的沉寂之后，全场一片哗然。

    　　“怎么会这样？”有人抱头，露出难以置信的神情。

    　　“两拳打碎玉皮蛊的防御，这，这，这……”有人看的瞠目结舌。

    　　“太凶残了，玉光都被他狂暴地轰破，他就感觉不到疼痛吗？”许多女蛊师都倒吸一口冷气。

    　　“没有用任何防御性的蛊虫，直接用手轰击玉光，这是'
