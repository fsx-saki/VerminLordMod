  title: 第八十七节：态度就是心的面具
  content: '第八十七节：态度就是心的面具

    　　方源已经看出此举的背后深意，这是来自族长的一次小小的试探。

    　　他扫视了演武场一圈，整个家族中最优秀的三支小组都在这里。分别是代表族长一系的青书组，代表赤脉的赤山组，代表漠脉的漠颜组。

    　　若是寻常学员，加入这三组中的任何一个，都意味着榜上了大靠山，前途一片光明。

    　　但是对于方源来讲，却恰恰相反。

    　　在家族高层的心目中，他已经被打上了一个势力的标签。冒然加入这'
