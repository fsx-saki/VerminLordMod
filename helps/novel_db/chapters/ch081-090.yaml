- chapter: 86
  title: 第八十六节：吃心
  content: '第八十六节：吃心

    　　漫无边际的苍云，波起峰涌，浪花飞溅，惊涛拍岸。似海非海，云山雾绕，幻化不休，意象万千。

    　　这是一记杀招。

    　　这记杀招是方源的杀手锏，是他的底牌，甚至可算是他如今最强大的攻伐手段！

    　　正是仙道杀招——无量气海！！！

    　　这一招——奇！

    　　经过方源的改良后，它不仅以八转仙蛊大气为核心，近十只气道仙蛊为辅助，数十万凡蛊奠基。而且还囊括气道仙材，可以通过消耗仙材气流，助长此招'
