  title: 第九十节：不过是些许风霜罢了
  content: '第九十节：不过是些许风霜罢了

    　　厅堂中，灯火明亮。

    　　圆形的饭桌上，酒已冷，菜已凉。

    　　红艳艳的烛火跳动着，将舅父舅母的影子照在墙壁上。

    　　两人的影子连成一片，随着烛光，阴沉地晃动着。

    　　在他们的面前，跪着沈嬷嬷。

    　　舅父打破沉寂：“不想这方源，真的是死心踏地地要和我作对啊。唉，原本是想好言相劝，想稳住他，让他先住在家中，再找理由将他逐出家门。没想到那小崽子居然不上当！他是铁了心，居然'
