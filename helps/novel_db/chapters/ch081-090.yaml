  - 我力仙蛊已经被方源炼化，只需要一个念头，就会毁掉。
- chapter: 82
  title: 第八十二节：年末考核开始
  content: '第八十二节：年末考核开始

    　　雪后自是晴空。

    　　一大早，陆续就有蛊师，走入学堂。

    　　“一年一届的年末考核，又开始了。呵呵呵，想想看，十几年前离开学堂的情形，还历历在目呢。”一个中年男蛊师，一头青色长发垂在背后，站在学堂门前，发出一声感慨。

    　　“头儿，快进去吧，你就爱多愁善感。”他身边一个年轻女蛊师，双唇如血，双手插在裤子两边的口袋，嘴里叼着一根草，翻了一下白眼。

    　　“呵呵呵，药红，不要着急'
