    　　一方是正魔联手，人多势众，另一方黑家蛊仙占据地利，且拥有大量荒兽合鸣鹰为帮手。

    　　战斗如火如荼。

    　　黑家蛊仙们几乎都心存死志，保卫家园，战意极高。

    　　正魔蛊仙'
  - '一声，笼罩下来。

    　　八转蛊仙，百足天君！

    　　众仙心神震荡不已，脑海中同时浮现起同一个名号。

    　　黑家大战至此，终于有八转蛊仙现身了！

    　　说是现身还不准确，只能说只闻其声，未见其人。

    　　“不是说，八转大'
  - '惹恼了围攻黑家的诸多蛊仙。

    　　阻人财路，如杀人父母！

    　　这仇大到天边去了，更何况黑家孱弱，唯一的仙蛊屋黑牢都没有了，唯一忌惮的就只有青城纵横。眼下大局早定，黑家蛊仙不过是垂死挣扎而已。

    　　“我来会会你！”'
  - '再度出手，抓向身后鹰巢。

    　　忽然间，惊变再生。

    　　一座仙蛊屋出现，狠狠地砸向楚度的额头。

    　　“凡草屋！”有蛊仙惊呼，认出这座曾经是东方一族的仙蛊屋！

    　　“滚！”楚度扬起巴掌，舌绽春雷。

    　　砰！！'
  - '你就动不了乔冬。”刘转身看向来人，流露出强烈的敌意。

    　　蛊仙们纷纷躁动起来。

    　　不管是龙鹰，还是合鸣鹰，都已经不重要了。

    　　重要的是黑家蛊仙终于现身！

    　　以七转蛊仙黑铁生为首，七八位六转蛊仙随后，站'
- chapter: 89
  title: 第八十九节：八转蛊仙岂容算
  content: '第八十九节：八转蛊仙岂容算

    　　“哈哈，好一个霸仙，我也去了。”沉默中，忽然传出回风子的大笑。

    　　随即，他身绕狂风，带动着整个人，飞速离开。

    　　无数道目光，同样集中在他的身上。

    　　回风子乃是当今北原公认的移速第一，曾经药皇出手，追捕他，都未得逞。这是回风子最为骄傲的战绩。

    　　楚度、回风子胆大包天，都不卖百足天君的面子，众仙心思活泛，却无一人行动。

    　　百足天君也没有声响，坐视这两人离开。'
