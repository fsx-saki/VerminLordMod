    　　然'
  - '安土重山堡防御极其出众，这不假。但是蛊仙流派众多，偏偏食道流传很少，很少有针对食道的防御。所以在宿命大战中，西漠一方的众多仙蛊屋面对天庭两仙联合施展出的——坐吃山空食道杀招，尽数中招，无可奈何。

    　　方源'
