  title: 第八十八节：下马威、刁难和打压
  content: '第八十八节：下马威、刁难和打压

    　　雪地中，五人小组在奔跑。

    　　古月角三看了一下天空，便道：“天色不早了，此行任务要采集腐泥冻土，虽然简单，但是耗时长久。我们必须加快速度，大家都跟紧我，尽量不要掉队。方源，你若是坚持不住，就和我们说一声，没有关系的。你是新人，我们会照顾你的。”

    　　古月角三的笑容十分和善。

    　　方源点点头，没有说话。

    　　其他三个组员却是相互交换了一下眼神，其实天色尚早，角三此'
