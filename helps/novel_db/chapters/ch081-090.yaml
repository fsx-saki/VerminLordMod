  title: 第八十九节：反制幽冥
  content: '第八十九节：反制幽冥

    　　哧——！

    　　幽魂巨人身体上的一些地方，破漏开来，竟形成大大小小的破洞。从破洞中不断地有漆黑的魂气，向外急速喷射。

    　　而随着魂气的剧烈外泄，幽魂巨人的庞大身形也以肉眼可见的速度，迅速缩小。

    　　看到这一幕，陆畏因眼中精芒爆闪：“难怪幽魂之前，一直都操纵肉身作战，没有直接变化魂魄巨人。原来此招只是他的爆发状态，难以持久，并且大有隐患！”

    　　幽魂巨人连忙疗伤，封堵周身破洞'
