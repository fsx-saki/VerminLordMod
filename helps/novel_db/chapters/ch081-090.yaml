  content: '第八十二节：熊力虚影

    　　当方源站在演武场的时候，已经将脑海中纷杂混乱的思绪排除。

    　　他凝神静气，打量眼前的对手。

    　　汤雄。

    　　他身高八尺，膀大腰圆，手臂能有方源的大腿粗，坦胸赤脚。

    　　他的胸口长满了黑色的胸毛，散发出彪悍之气。

    　　“小兔崽子，就是你杀了我弟弟？今天我要让你给他陪葬！”汤雄怒目圆瞪，紧紧地盯着方源，眼中燃烧着仇恨的火焰。

