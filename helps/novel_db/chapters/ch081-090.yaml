    　　除此之外，还有其余山峦上百座。其中最重大的损失是内景雨山、铜印山、骨鸟峰。

    　　内景雨山'
  - '一时间，安土重山堡动弹不得。屋内的方源面色微变，呼吸再不流畅。更糟糕的是，他不断地灌输向安土重山堡的仙元也断断续续起来。

    　　仙蛊屋发威，是需要消耗大量的仙元。安土重山堡同样如此，如今被这样一招击中，顿时'
  - '些资源损毁，对我其实有不少帮助。天道至衡，我的这些资源点损毁，万劫威能就要相应有所降低。因此，我炼化天道道痕的效率会不断上涨！嗯？”

