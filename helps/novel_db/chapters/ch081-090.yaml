    　　魔尊幽魂浑身黑烟浩荡，忽攻忽守，时而抛出数头太古魂兽，时而催发诡异魂道杀招。他不仅护住了气绝，给气绝争取到了充沛的时机和空间，而且他还进一步试探幻沙转影'
