- chapter: 81
  title: 第八十一节：剑影蛊
  content: '第八十一节：剑影蛊

    　　说时迟，那时快！

    　　方源身形如电，扑向汤青。

    　　呼啦！

    　　劲风骤起，汤青眼前一黑，还没来得及反应，方源一拳便捣中他的胸膛。

    　　刹那间，汤青只觉得一阵剧烈的痛疼骤然袭来，差点让他当场疼晕过去。

    　　耳畔风声呼呼，视野快速倒退，他整个人都被方源这蓄势一击，揍得飞出去。

    　　然后他落到地上，视野天旋地转，一会儿是草地，一会儿是演武场的棚顶。他擦着地面，一路翻滚，草皮都被他'
