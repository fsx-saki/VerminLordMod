    　　古月角三温和地笑着，对方源道：“方源老弟啊，你的表现真是让我们大家刮目相看。看来，我们能邀请你加入，真是做对了。你刚刚从学堂出来，有些东西不太了解。下面我就跟你介绍一下。”

    　　“首先家族任务，每个蛊师至少每个月完成一个。完成的越多，完成的越完美，评价就越高。”

    　　“第二，任务由内务堂或者外事堂发布，蛊师每次只能选择一个，一旦接受就必须完'
