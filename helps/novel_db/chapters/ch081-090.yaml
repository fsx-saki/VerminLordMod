- chapter: 83
  title: 第八十三节：扫强敌方正展风采
  content: '第八十三节：扫强敌方正展风采

    　　方正和漠尘双双走上了擂台。

    　　“方正，别以为你有二转修为，我就会输！今天我就要越级挑战。”漠北咬着牙，脸色凝重，在心中默默地为自己打气。面对二转修为的方正，他的确感到了一股压力。

    　　“来吧。”方正低喝一声，猛地冲出。

    　　漠北心头一跳，这方正不按套路出牌啊。一般都是先对射，再拳脚。他这一次，居然一出手就冲过来，是想比拼拳脚吗？

    　　“他不怕在比斗拳脚的时候，被'
