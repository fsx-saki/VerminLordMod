- chapter: 81
  title: 第八十一节：二转初阶！
  content: '第八十一节：二转初阶！

    　　脚步声越来越近，很快陡坡边缘的深绿树丛被强硬地分开，一个高大的大汉踏上陡坡，现身在方源的视野中。

    　　他一头黑色短发，每一根头发都刚劲笔直。赤裸着上身，虎背熊腰，浑身肌肤都是赤红色的。

    　　他身高近两米，深秋寒意重，但是他给人的感觉，就像是一个移动的火炉，似乎他的每一次鼻息，都能将周围的温度提升。

    　　他的腰间挂着一群的野兽尸体。有狐狸，有野兔，有山鸡，还有那只刚刚离去'
