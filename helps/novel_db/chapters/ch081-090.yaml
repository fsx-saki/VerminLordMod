    　　能够改良出狮毛甲这等移动杀招，平衡三道流派的道痕，已经是变化道大师境界的极限。

    　　还要再兼顾狮毛甲，这就太难为方源了。

    　　若他是变化道宗师级人物，还有可能。但'
  - '自信，要和我赌斗炼蛊？难道说，她已经发现了梦翼仙蛊的真正作用了？”

    　　方源心中一沉。

    　　“梦翼，梦道……”方源目光如烟云，想起了前世的种种。

    　　前世他为什么要伙同一干魔道蛊仙，千方百计地进攻狐仙福地'
  - '这个新得来的凡道杀招。

    　　组合杀招的蛊虫，基本上都是由狐仙地灵从宝黄天中收购来的。少部分则是自家的毛民所炼。

    　　在杀招的作用下，方源蝠翼收起，八只粗壮的手臂也只剩下一对。口中的獠牙大为收敛，赤红的眼珠'
  - '第八十四节：承认自己的平凡

    　　因为有前一次的炼制经验，这一次方源凝练荒兽蝠翼，却是驾轻就熟。

    　　狐仙福地时间的大半个月后，他就将这对荒兽蝠翼，移植到自己的后背。按照之前的'
  - '闪，取来信蛊，探入心神。

    　　不一会儿功夫，他抽回心神，脸上闪过一抹思索的神色：“凤金煌居然要我参加炼道大会，比拼炼道？我记得她早年，对炼道根本就没有兴趣，这方面的底蕴堪比一张白纸。她怎么有这么强烈的自信，要'
  - '。否则要积累到宗师境界，也得花费两三百年的长时间积累。

    　　到达蛊仙这一层次，已经有实力搜寻并且把握寿蛊，或者有其他种种手段来延寿。寻常凡人，寿命为一百岁。但蛊仙只要经营有加，都是数百岁，甚至上千岁。'
- chapter: 85
  title: 第八十五节：两大盛事
  content: '第八十五节：两大盛事

    　　“想不到，只是四百多年前的今天，梦境就已经显现端倪。”方源捏着手中的报信青鸟蛊，心中叹了一口气。

    　　一时间，他再无试验杀招的兴致。

    　　方源前世，中洲首先掀起浩大的战争序幕，以一洲之地力压其他四域，闪电般扩张。随后四域联手，艰难地抵抗住了中洲的进攻。

    　　整个战局陷入僵持阶段，正当四域联手，企图反攻中洲的时候，梦境在五域各个地方外显。

    　　在这个世界上，自从人祖衍化出第'
