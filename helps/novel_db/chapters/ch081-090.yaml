- chapter: 85
  title: 第八十五节：热血和冷血！！
  content: '第八十五节：热血和冷血！！

    　　“看来他们兄弟俩的确不太和睦啊。”药红呢喃。

    　　“这个方源也太残忍了，居然这样对待亲弟弟啊。”很多人不悦地皱起眉头。

    　　“方源太凶残了，勒索我们的元石整整一年！现在把他的亲弟弟都成这个样子。”学员们咬牙切齿，方源如今的冷酷，激发了他们的同仇敌忾。

    　　“方正，站起来，站起来！打倒方源。”不知道是哪个学员叫了一声。

    　　“打倒方源，打倒方源！”瞬间，无数的少年开始'
