  events:
  - '吃了个大瘪。

    　　他此行不惜调动金晓大殿来助阵，但收益却和付出不成比例。本来，宫迩是想撑着虎皮，充当正道领袖，但其余黄金血脉的蛊仙，都不鸟他。

    　　百足家的三位蛊仙，响应他的号召，到金晓大殿中做客。虽然给'
  - '天庭掌控。

    　　至于这甄别天外之魔的仙道侦查杀招，也有来源。

    　　黑家曾经出现一位天外之魔。他在凡人蛊师时期，屡屡有惊人表现，吸引了高层的注意。

    　　他发明的麻雀四方战法，连黑家四大太上长老，都玩得有些乐'
  - '他此行不惜调动金晓大殿来助阵，但收益却和付出不成比例。本来，宫迩是想撑着虎皮，充当正道领袖，但其余黄金血脉的蛊仙，都不鸟他。

    　　百足家的三位蛊仙，响应他的号召，到金晓大殿中做客。虽然给了宫迩一个台阶下，但'
  - '大机遇，结果没引出方源过来。这点出乎诸仙意料，毕竟有定仙游的话，往来真的很方便。

    　　他们却不知道，义天山大战的后续曲折。如今的定仙游，其实已经被天庭掌控。

    　　至于这甄别天外之魔的仙道侦查杀招，也有来源。'
  - '仙联袂而来。

    　　众仙视之，均有恍然之感。

    　　原来这三仙不是旁人，正是百足家的三位蛊仙。

    　　整个黑家大战中，他们至始至终都袖手旁观，原来是听从百足天君的安排，做大战收尾的工作。

    　　接着，百足家三位蛊仙一'
  - '回风子这样的例外。

    　　除开这两人，或许还有其他人。就比如在黑家大战中，惊鸿一现的神秘蛊仙，那个驾驭凡草屋的存在。也不知道他是隐藏在众仙之中，还是早已经悄悄溜了。

    　　正道蛊仙们，大多是参加了第一天的庆典，'
  - '视这两人离开。

    　　黑家太上大长老急忙大叫：“启禀天君大人，这回风子也就罢了！关键是那楚度，抢夺走了第十三座鹰巢。这鹰巢中可是藏有黑凡真传！”

    　　众仙闻言，顿时骚动起来，暗中纷纷交流。

    　　黑凡之名，众仙如雷贯'
  - '，但面对八转存在，也不得不恭敬，只是心情很是郁闷。

    　　在黑家大战的最后关头，宫迩原本想要催动仙蛊屋金晓大殿，抢夺修行资源。

    　　但百足家的蛊仙，却笑着告诉他，最好不要轻举妄动。

    　　宫迩自然不会听从他们的建'
- chapter: 90
  title: 第九十节：方源的第三次地灾
  content: '第九十节：方源的第三次地灾

    　　南疆。

    　　群山耸立，青黛连绵。山风不断呼啸。

    　　十多位蛊仙，相距数千里，围成一个巨大的圆。

    　　在这圆心的高空之上，一位蛊仙老者不断调动仙元，聚精会神，正在布阵。

    　　一座大阵，已具雏形，覆盖了十数万里的超大范围，正将一团瑰丽梦幻的光团，罩在阵中。

    　　这个巨大的光团，五光十色，绚烂多姿，正是超级梦境。

    　　义天山自大战之后，已成一片废墟。魔尊幽魂被天意算计，被'
  gu_mentioned: []
  char_appear:
  - 商心慈
  - 商青青
  - 方源
  - 池曲由
  events:
  - '呼啸。

    　　十多位蛊仙，相距数千里，围成一个巨大的圆。

    　　在这圆心的高空之上，一位蛊仙老者不断调动仙元，聚精会神，正在布阵。

    　　一座大阵，已具雏形，覆盖了十数万里的超大范围，正将一团瑰丽梦幻的光团，罩'
  - '跟脚。

    　　别看它体型极小，类似麻雀，但却是货真价实的荒兽！

    　　“此鸟在荒兽中十分特殊，身负大量的律道‘生’道痕。但它寿命极短，从蛋中孵出后，即可翱翔苍穹。所到之处，身上道痕逸散而出，令天地改易，焕发无'
  - '知道义天山大战的内幕，但却明白这处超级梦境所代表的巨大利益。

    　　场上这些蛊仙，都分别来自南疆的各大正道超级势力。

    　　经过一场艰难的谈判，他们达成协议，共同掌控这处超级梦境。

    　　这片梦境实在太过重要，'
  - '春晓翠鹂。”方源眼眸微微一缩，认出了这种飞鸟的跟脚。

    　　别看它体型极小，类似麻雀，但却是货真价实的荒兽！

    　　“此鸟在荒兽中十分特殊，身负大量的律道‘生’道痕。但它寿命极短，从蛋中孵出后，即可翱翔苍穹。'
  - '，知道许多秘辛，更知道眼前的美貌仙子，乃是高高在上，傲视凡俗的蛊仙！

    　　这位蛊仙居然和她谈一位凡人蛊师，怎么不叫她疑惑？

    　　商青青一脸严肃地道：“心慈，接下来我的话，你要好好地听，一字一句都很重要。”'
  - '够单独吃下。又担心魔道、散仙过来占便宜，所以正道蛊仙们提前就联合起来，将这里霸占，并在这里布置出一座超级蛊阵来，以便在将来慢慢瓜分梦境的好处。

    　　“起！”最高空的蛊仙老者，忽然大喝一声，全身绽射出无边的华光'
  - '被天意算计，被方源夺得胜利果实，而他的本体则受困在梦境中，不断被梦境损耗。

    　　南疆蛊仙们虽然不知道义天山大战的内幕，但却明白这处超级梦境所代表的巨大利益。

    　　场上这些蛊仙，都分别来自南疆的各大正道超级势力。'
  - '是我们商家蛊仙客气得太久了，别人都以为我们不善战斗了呢。”

    　　局势在不断地变化着。

    　　北原这边，黑家大战已经结束，尚有一些余韵缭绕。正魔两大阵营，还有散仙，都各有收获。黑家灭亡，百足家取而代之，改变蛊仙界'
- chapter: 81
  title: 第八十一节：大意
  content: '第八十一节：大意

    　　当紫薇仙子等人紧追而来的时候，他们见到的是漫漫无际的黑蝠群。

    　　在地底深渊的这一层中，黑蝠群是凌驾于万物之上的唯一霸主。而今它们遭受到了侵犯，彻底陷入到了疯狂和暴怒之中。

    　　太古黑蝠驱动着上古黑蝠，上古黑蝠们奴役着荒兽黑蝠，荒兽黑蝠卷席亿万的普通黑蝠。当影宗、长生天、天庭三方追杀进来，狂怒的黑蝠群便将无处发泄的愤怒全都向他们倾泻。

    　　饶是三方蛊仙，当今世间最顶尖的强者，'
  gu_mentioned:
  - 仁蛊
  char_appear:
  - 元始仙尊
  - 冰塞川
  - 方源
  - 星宿仙尊
  - 正元老人
  - 秦鼎菱
  - 紫薇仙子
  - 陆畏因
  events:
  - '为紫薇仙子抵御兽群。

    　　紫薇仙子浑身笼罩紫金光雾，光雾弥漫，不断扩散。

    　　紫薇仙子面色逐渐发白，仙元剧烈消耗，直至身躯也微微颤抖起来，她这才猛地睁开双眼，露出被紫光完全充斥的双眸。

    　　紫金光雾迅速消'
  - '扶持势力。

    　　天庭是元始仙尊、星宿仙尊、元莲仙尊相继入主，苦心经营出来的势力。长生天本是巨阳仙尊的仙窍洞天，他留下的遗产打造出来的基业。影宗是幽魂魔尊死后，魂魄在暗中经营无数岁月，以僵盟为壳，悄然积累出来的'
  - '主。而今它们遭受到了侵犯，彻底陷入到了疯狂和暴怒之中。

    　　太古黑蝠驱动着上古黑蝠，上古黑蝠们奴役着荒兽黑蝠，荒兽黑蝠卷席亿万的普通黑蝠。当影宗、长生天、天庭三方追杀进来，狂怒的黑蝠群便将无处发泄的愤怒全'
  - '领袖，南疆蛊仙陆畏因号称是乐土传人，也无人反驳。当初宿命大阵之前，紫薇仙子还亲自进入菇人乐土，借走了仁蛊。

    　　众仙一时间难以猜测。

    　　乐土如此做派，导致很多势力、蛊仙都能和乐土挂钩。究竟当中是哪一股势'
  - '当代顶尖的八转，黑蝠群虽然规模惊人，但真较力起来，还是难挡诸仙锋芒。

    　　只是诸仙杀出血路来，却不见万年斗飞车、幽魂、青仇等人的踪影。

    　　“怎么回事？”

    　　“他们在哪里？竟然一点线索都没有留下！”

    　　“这'
  - '有留下！”

    　　“这不可能，我们明明顺着他们打斗的痕迹，一路追踪过来的。”

    　　群仙一阵惊疑。

    　　劫运坛猛地爆涌金芒，消融周围万千黑蝠，瞬间清空出了一大片的空间。

    　　劫运坛中接着传出冰塞川不耐烦的声音：'
  - '窍改造成乐土的手段，他在生前帮助过了大量的蛊仙，许许多多的洞天福地。

    　　他甚至连太古传奇都帮，比如苍蓝龙鲸。

    　　乐土仙尊帮助的对象，不仅是人族，还囊括了异人，甚至包含万物生灵。

    　　所以，在这点上，他是所'
  - '个情况一定超出了主上的预料。”

    　　“但还有更糟糕的情况。那就是这一切都是方源的阴谋暗算。他不惜放弃龙宫、万年斗飞车，也要将主上诱骗到这处战场中来。”

    　　“不管真实情况是如何的，我一定要拼尽全力，尽快救'
- chapter: 82
  title: 第八十二节：幻沙转影
  content: '第八十二节：幻沙转影

    　　幽魂不愧是一路杀上来的魔尊！

    　　换做他人，必定第一时间戒备，伺机突围。而他的战斗经验太丰富了，落入陷阱，竟在第一时间顺势利用了这个机会！

    　　不得不说，他选择的时机太好。

    　　方源一直遭受三方追杀，压力巨大，到了这里终于安全，松懈乃是人之常情。

    　　幽魂以言语迷惑，暗中酝酿杀招。他的这一招毫无声息，当今五域也就南疆武庸的敛息手段可以有望比拼一二。因此一经催使，幽魂立即改'
  gu_mentioned: []
  char_appear:
  - 成龙
  - 方源
  - 武庸
  - 气绝魔仙
  - 陆畏因
  events:
  - '，满脸警惕之色。而在他的身边，无数军团蚁汇聚成一个空心的圆球，将他和方源护卫在内。

    　　至尊仙窍中，万劫已经转化成了滔天的洪水！

    　　洪水倾泻，吞没万里。

    　　方源的小五域都受到殃及，大量小型资源点被彻底'
  - '非得近身，肉身相搏方能发动。

    　　要知道蛊仙争斗，鲜少肉搏。绝大多数都是远攻遥战，唯有极少数流派诸如变化道、力道以肉搏为主。碎魂手杀招施展的范围极短，弊端很大，但仍旧被幽魂掌握，不忍割舍，正是因为它一旦中招'
  - '损失惨重！

    　　没有办法，他已经拼尽全力。

    　　幸运的一点是，他的努力和牺牲并非劳而无功。被他炼化的天道道痕，已经多达二十多道！

    　　最初的万劫是万灭雷森劫，方源好不容易拿出了应对措施。天道道痕在天意的执掌操'
  - '儡！

    　　漫天的黄沙飞舞，从中传出方源的赞叹声：“果然精彩！陆仙友，不枉费你消耗如此大的精力和时间，特意布置了这座幻沙转影战场。”

    　　方源的声音毫不遮掩，魔尊幽魂冷哼一声，立即寻觅声迹，穿透漫天飞沙，杀'
  - '蛊气息浓郁至极，让幽魂也不由心头一跳。

    　　就这样，时而是气海老祖，时而是气绝魔仙，时而又是太古传奇荒兽青仇。

    　　他们在漫天黄沙中时隐时现，对魔尊幽魂展开车轮战！

    　　魔尊幽魂战力卓绝，超出他们任何一位'
  - '越来越多的天道道痕被方源炼化，并且他炼化的效率迅速拔高！

    　　第一步是最难的，方源不惜牺牲了全部的魂兽群来凿开这场人生最大困境的边角。

    　　他成功了！

    　　万劫虽然仍旧肆虐，但方源已经得到了喘息，开始逐'
  - '多。

    　　眼下，不仅是魔尊幽魂被困在幻沙转影战场中，方源也同样如此。

    　　而且方源的两座仙蛊屋龙宫、万年斗飞车都已损毁，蛊虫损失极多，拿回来的核心仙蛊稀少，且各个带伤。

    　　幽魂狞笑：“方源，你可要乖乖藏好。也'
  - '被动应战。

    　　在战场的后方，方源正在全力渡劫。吴帅则在他身侧护卫，满脸警惕之色。而在他的身边，无数军团蚁汇聚成一个空心的圆球，将他和方源护卫在内。

    　　至尊仙窍中，万劫已经转化成了滔天的洪水！

    　　洪水倾'
- chapter: 83
  title: 第八十三节：幽魂堵得慌
  content: '第八十三节：幽魂堵得慌

    　　一座仙蛊屋陡然现身，横亘战场。

    　　它像是一座山，并不高。山体从下往上，分出了明显的层次，表面圆润。所以它又像是一座塔，用数十座大小递减的巨鼓堆叠起来。这座仙蛊屋通体黄褐，还有一层氤氲的沙土笼罩表面，带给人厚重和安稳的强烈感觉。

    　　八转仙蛊屋——安土重山堡！

    　　这座土道仙蛊屋乃是方源探索梦境的意外收获。它和绝大多数的仙蛊屋都有所区别，最本质的不同，是这座仙蛊屋并无一'
  gu_mentioned: []
  char_appear:
  - 方源
  - 气绝魔仙
  - 陆畏因
  events:
  - '且这座战场如今位于地渊，结合了地脉，借助无穷无尽的地力，让幽魂、气绝都感到了困窘。

    　　至尊仙窍中，万劫仍旧在持续着。

    　　万劫的内容再次发生了变化，从倾天洪水，浩荡滚滚变成了燎原烈火，灼烧覆盖，升腾无穷'
  - '内容再次发生了变化，从倾天洪水，浩荡滚滚变成了燎原烈火，灼烧覆盖，升腾无穷热浪。

    　　“我炼化成功的天道道痕，已经突破半百了！”方源有了新的进展。

    　　每一次万劫的变化，都是他的危机。

    　　危机——既有危险，'
  - '怕在你看来，唯有尊者传承才算亮点。”

    　　“这是当然。”气绝魔仙语气相当直接，“能入我法眼的，也唯有尊者真传。说实话，幽魂真传我就很感兴趣！”

    　　气绝魔仙乃是积年老魔头，在此情景下，竟狮子大开口直接索要幽魂'
  - '腾挪、治疗等等威能。此招之下，蛊仙能够随意堆叠土道蛊虫，使得它们自行组成仙蛊屋。即便催动杀招的蛊仙的阵道境界一片空白！

    　　掌握了这个杀招，也就掌握了安土重山堡这座仙蛊屋的根！

    　　所以，每座安土重山堡的'
  - '成安土重山堡已有许久。他从梦境中得到完整的建设图纸，又从苍蓝龙鲸等处得到大量的土道仙蛊。事实上，他在宿命大战之前，就已经拥有了这座八转仙蛊屋！

    　　此刻安土重山堡被方源拿出来，立即改变了战局。

    　　魔尊幽魂对'
  - '他只得先行应付。

    　　“原以为方源他之前所言，只是虚张声势。他是被我逼迫太甚，这才不得不舍弃了龙宫、万年斗飞车两座仙蛊屋。现在看来，他竟真有意诱使我陷入埋伏之中！”魔尊幽魂不免心头微沉。

    　　说实话，方源舍弃两'
  - '来。这座仙蛊屋通体黄褐，还有一层氤氲的沙土笼罩表面，带给人厚重和安稳的强烈感觉。

    　　八转仙蛊屋——安土重山堡！

    　　这座土道仙蛊屋乃是方源探索梦境的意外收获。它和绝大多数的仙蛊屋都有所区别，最本质的不同，是这'
  - '，而产生不同形态和威能上的差异。

    　　方源建成安土重山堡已有许久。他从梦境中得到完整的建设图纸，又从苍蓝龙鲸等处得到大量的土道仙蛊。事实上，他在宿命大战之前，就已经拥有了这座八转仙蛊屋！

    　　此刻安土重山堡被'
- chapter: 84
  title: 第八十四节：这还怎么打？
  content: '第八十四节：这还怎么打？

    　　收获成果的同时，方源当然也付出了沉重的代价。

    　　小五域中最为富庶的小南疆，已然损毁大半。

    　　继仙山毁了，被洪水冲刷个干净。这座仙山本身就是一座中级资源点，方源从黑凡洞天中取来，曾经具备接引凡人成仙之能。

    　　还有封天山。这座山是方源打造，山体矮小，貌不惊人。山腹中空，曾经方源在这里布置蛊阵，封印了力道仙僵之躯。

    　　除此之外，还有其余山峦上百座。其中最重大的损失是'
