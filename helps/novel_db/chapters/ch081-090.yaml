    　　“不能再这样下去，吴帅'
  - '方源现在外界的压力不大，也更忌惮幽魂，所以毫不犹豫地将火力对准幽魂。

    　　吴帅参战！

    　　一时间，军团蚁汇集成一道蚁河，滚滚东流，绞向幽魂。

    　　幽魂分出一部分的精力，施展杀招对抗。

    　　吴帅是方源的龙人'
  - '低。因此，我炼化天道道痕的效率会不断上涨！嗯？”

    　　方源神色忽然一变。

    　　轰隆！

    　　一声巨响，安土重山堡狠狠震动，数以百千的蛊虫被震碎成渣。

    　　是气绝魔仙蓄势已久后，酿造出来的一击！

    　　气绝魔仙！'
