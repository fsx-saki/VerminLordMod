  content: '第八十五节：幽魂巨人

    　　换做其他蛊仙，此时恐怕已经绝望。

    　　“方源这崽子太能龟缩了。如何能杀得了他？”气绝魔仙询问，语气中很有一种骂娘的冲动。

    　　幽魂也不禁沉默了一会儿，然后微微冷笑。

    　　一瞬间，恐怖的杀机凝如实质，从他身上逸散而出，让人手足冰冷，心中凛然。

    　　受此挫折，幽魂斩杀方源的决心却是更加坚定！

    　　“让我来拆了这座乌龟壳！你去应付其他人，掩护我。”幽魂话音刚落，便呼啸一声，遁出'
