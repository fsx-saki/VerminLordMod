- chapter: 87
  title: 第八十七节：置之死地而后生
  content: '第八十七节：置之死地而后生

    　　灾劫持续不断，人祖的骨架开始显露出金芒。

    　　灾劫越发狂暴，人祖的骨架被不断烧灼，变得金光灿烂。

    　　人祖开始挺直腰板，昂首挺胸，忍受万千折磨，浑身骨骼宛若黄金浇筑，直直地站在灾劫当中。正是万劫金骨。

    　　而在人祖的骷髅脑袋上，也逐渐生长出了一个冠冕，便是通天骨冠。

    　　人们所承受的灾难，将成为他们来日的桂冠。

    　　虽然灾劫仍旧持续着，但人祖这时终于有了开口的能力：'
