- chapter: 481
  title: 第四百八十三节：魂魄缺乏
  content: '第四百八十三节：魂魄缺乏

    　　西漠，唐家仙阵空间。

    　　方源盘坐着，正闭目静养。

    　　心神扫视自家魂魄，原本千万人魂级的魂魄底蕴，此时已经跌落到了百万人魂，并且只是一百多万。

    　　“之前闯荡梦境中的第一幕，魂魄底蕴能剩余九百多万人魂。现在第二幕过去，居然只有一百多万，差一点就要沦落到了十万人魂一级。”

    　　方源在心中，默默比较两者差距。

    　　第二幕梦境比第一幕要冗长一些，并且魂魄的消耗程度更加严重'
