  events:
  - '方源的战力，要消灭这些荒级魂兽、上古魂兽，已是手到擒来之事。

    　　他来到青鬼沙漠，这一路上，有不少荒兽、上古荒兽来寻他麻烦。方源闯入它们的领地，自然要遭受它们的反击。

    　　这其中，绝大多数都是魂兽。'
