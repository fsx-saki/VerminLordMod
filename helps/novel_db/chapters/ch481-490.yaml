- chapter: 489
  title: 第四百九十一节：方源被擒
  content: '第四百九十一节：方源被擒

    　　盗天梦境。

    　　“蛊虫选取好了。来让我看看罢。”方源深呼吸一口气，驾驭着少年盗天的身躯。

    　　他首先催动偷袭蛊。

    　　二转蛊虫一发，便见得一个蓝色小孩光影，猛地窜出，直扑向前。

    　　眨眼间，篮婴便没入到洞壁当中，不见踪影。并且整个过程悄然无声，似乎什么都没有发生过一样。

    　　方源心底感叹一声：“这偷袭蛊的确是极品，不仅威力在二转中相当出色，而且悄无声息。这处洞穴按照梦'
