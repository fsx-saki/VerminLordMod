- chapter: 488
  title: 第四百九十节：三入盗天梦境
  content: '第四百九十节：三入盗天梦境

    　　方源感叹不已，几多波折，他终于达到了亿人魂。

    　　“荡魂山、落魄谷不愧是魂修的圣地，再加上幽魂真传中的世间顶级魂修手段，让我的魂魄底蕴突飞猛进。”

    　　“不过……我现在才是一亿人魂，接下来还得继续积蓄，两亿、三亿、四亿……直至九亿。”

    　　九亿之后，就不是十亿，若是要突破到荒魂。达到荒魂，方源单凭魂魄，就能和荒级魂兽对战。

    　　虽然方源目前的战力，打发荒级魂兽玩一样'
