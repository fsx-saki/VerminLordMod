    　　从唐家离开后，方源耗费了数天功夫，来到这里。

    　　这里是青鬼沙漠。

    　　西漠中有名的险地。十多万年来，西漠蛊仙折损在这里的，不在少数。

    　　青鬼沙漠的高空，终年笼罩'
  - '过。

