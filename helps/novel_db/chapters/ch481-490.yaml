  events:
  - '魂级数。

    　　“第三幕盗天梦境，势必更加困难。千万人魂，并不安全。”方源思量后，决定继续修行，冲刺到亿人魂。

    　　若是魂魄底蕴不足，魂魄在梦境中消融耗尽，也就等若是死了。即便是还有一副肉身，没有了魂魄，就等'
  - '至于大宗师之上，还有一层境界，那就是无上大宗师。

    　　大宗师是穷尽天地此道的奥妙，若是方源成为偷道大宗师，那么他对整个天地的偷道奥妙，就会了然于胸，关于偷道几乎没有他不理解的。

    　　所以说，大宗师就是将天'
  - '往往只需要耗费一些凡蛊，就能在特定的地点，布置出仙级蛊阵。

    　　至于大宗师之上，还有一层境界，那就是无上大宗师。

    　　大宗师是穷尽天地此道的奥妙，若是方源成为偷道大宗师，那么他对整个天地的偷道奥妙，就会了然于胸'
  - '，这么多年努力，就像是一个刚出生的婴孩，来啃这么一块坚硬如铁的巨石。

    　　“唐方明仍旧能开创那么多的梦道凡蛊来，可见此人的确有着才情和天赋，并且相当不俗。”

    　　方源想到前世，五百年前世唐方明开创出了梦道'
  - '间。

    　　方源盘坐着，正闭目静养。

    　　心神扫视自家魂魄，原本千万人魂级的魂魄底蕴，此时已经跌落到了百万人魂，并且只是一百多万。

    　　“之前闯荡梦境中的第一幕，魂魄底蕴能剩余九百多万人魂。现在第二幕过去，居然'
  - '一旦开头过了，接下来按部就班，也会有迅猛的发展。

    　　对于方源而言，指点唐方明的原因，除了履行盟约，方便他继续探索梦境之外，就是布局未来，仿造幽魂谋略，扶植四域，形成包围中洲，对抗天庭的旷世大局。'
  - '生产原料了。

    　　之前胆识蛊能够连续大规模产生，是因为方源命令影宗等人，前往太丘探索，很是斩杀了一些荒兽、上古荒兽。

    　　现在影宗这群人，都在方源的身边，之前留在琅琊派的魂魄库存，也在他们离开的这些天里，'
  - '如。之前在逆流河战役中，他就是巧妙地将招牌战场杀招，直接拆解开来，对付天庭等强敌，占据上风。

    　　而阵道的大宗师，就能直接利用天地自然中存在的道痕，进行布阵。往往只需要耗费一些凡蛊，就能在特定的地点，布置'
- chapter: 482
  title: 第四百八十四节：魂兽军团
  content: '第四百八十四节：魂兽军团

    　　方源驾驭着祥云，在天空中划过。

    　　他的速度并不快，但是周围却是洋溢着浓郁的仙蛊气息。

    　　他脚下的祥云，并不普通。源头是来自黑凡洞天中的某个运道真传，而今在方源的推算改良之后，已经功效大增。

    　　祥云的方向并不是随着方源的意念而动，而是遵循着运道的奥妙。

    　　就连方源都不知道，这朵祥云会在何时转折方向，会跑到哪里去，但方源清楚一点，那就是这“随意祥云”杀招，飞行的路'
