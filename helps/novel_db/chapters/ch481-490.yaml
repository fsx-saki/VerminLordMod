- chapter: 487
  title: 第四百八十九节：豆神宫
  content: '第四百八十九节：豆神宫

    　　青鬼沙漠。

    　　一道狼狈的身影，紧紧贴着沙漠，低空疾飞。

    　　“算不尽！你居然真的没有追杀我，如此狂妄自大！哼，这笔账我早晚要找你讨回来！！”败军老鬼面色扭曲，一想到方源，眼中就要喷火。

    　　他原本被魂爆炸得断了三肢，不过现在，却都已恢复。

    　　由此可见，败军老鬼的疗伤手段十分不俗。

    　　忽然，他身躯一颤，猛地张口，噗的一声，吐出一小口鲜血。

    　　败军老鬼的脸上再次充斥'
