- chapter: 486
  title: 第四百八十八节：青家传承
  content: '第四百八十八节：青家传承

    　　“哦？还有这样的事。看来此人也有际遇。不过我说放过他，就会放过他，难道你想要我违背自己的话不成？”方源神色微动，微微侧身，看着房云、房棱二人，目光如冷电，直射过来。

    　　房云和方源对视一眼，就感觉方源的目光，锋利无比，仿佛直刺入心，他连忙转移视线，不敢和方源对视。

    　　同时，心中惊道：“我遇到的这位贵人，好生霸道，并不好相处啊。”

    　　相反，房棱却是心中大定：“好，此'
