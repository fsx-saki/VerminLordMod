- chapter: 485
  title: 第四百八十七节：魂爆！
  content: '第四百八十七节：魂爆！

    　　“房家的蛊仙？”听到房云的叫喊声，方源顿时耳朵微动。

    　　虽然他之前侦查到，房云、房棱、败军老鬼这三位蛊仙之间的关系，似乎比较紧张。但是方源也没有料到，这三人关系敌对，并且其中有房家的蛊仙似乎被俘虏了。

    　　方源之所以直接动手，是看中了败军老鬼。

    　　这人是魂道七转蛊仙，杀了他，方源可以取窍，为自己的至尊仙窍增添资产，为自己增添魂道道痕。若是能活捉，方源可以将他的肉身给'
