- chapter: 484
  title: 第四百八十六节：直接就动手
  content: '第四百八十六节：直接就动手

    　　轰隆隆……

    　　滚滚浩荡的魂兽大军，在青鬼沙漠上奔腾，掀起一股股巨大的烟尘。

    　　而在魂兽大军的前面远方，一朵洁白祥云在徐徐飞驰着。

    　　正是方源的仙道杀招随意祥云，方源来到青鬼沙漠，不过是为了搜寻魂核，此行并没有什么精确目标。所以这些日子，就都让随意祥云在前头领路。

    　　收效不错，很是吞并了一些小型的魂兽族群。

    　　所以，这支魂兽大军的规模，比较之前又庞大了一分，'
