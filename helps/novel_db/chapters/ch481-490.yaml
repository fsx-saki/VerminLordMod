    　　依照幽魂真传中所述，亿人魂之上，便是荒魂！'
  - '有八转级别的太上大长老，这一代的二长老房睇长更是智道大能，方源前世相当有名，智道造诣极其深厚，拥有着智道大宗师的境界，在影宗的情报中也是着重标注了的。

    　　所以方源的路，只有一条。

