- chapter: 490
  title: 第四百九十二节：偷道大宗师！
  content: '第四百九十二节：偷道大宗师！

    　　池塘的水，咕咚作响，水温也在迅速地升高。

    　　“小贼，你到底做了什么？！”三转的守卫，对方源怒目而视，一把抓住方源的脖子，狠狠掐住。

    　　尽管有剧痛的感觉，但对方源来讲，却不算什么。

    　　他看都不看守卫一眼，而是细心打量这异变当中的池水。

    　　“那羊皮地图，正合我之前猜测，定然是一件仙材，经过了处理，表面上看不出跟脚。此时经过这池水浸泡，顿时发生反应。”

    　　“原'
