- chapter: 483
  title: 第四百八十五节：路遇贵人
  content: '第四百八十五节：路遇贵人

    　　青鬼沙漠，天空永远是乌云盖顶，光线晦暗。

    　　一小群魂兽，在沙漠上前行。

    　　与众不同的是，这魂兽群中还有着三位蛊仙。

    　　两人被俘，一人做主。

    　　“嘿嘿嘿，房家的两个小子，你们想通了没有？”做主的这位蛊仙，一身灰白袍子，尖鼻细眼，山羊胡，此刻端坐在一头牛形上古魂兽的背上，望着身边的两位蛊仙俘虏，眼眸中闪烁着阴沉得意的光。

    　　房棱、房云都是六转修为，浑身上下干净清'
