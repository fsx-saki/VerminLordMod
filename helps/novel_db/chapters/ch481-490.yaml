    　　在仙窍中，已经有了一小盆的魂核了。

    　　绝大多数都是六转魂核，也有一部分是七转层数，八转的魂'
  - '从太古、远古、上古，直至现在，五域天地已经改变了很多很多。

    　　所以，这些魂核完全可以取代魂魄，丢入荡魂山上，就能被荡魂山消化，从而产出大量的胆识蛊。

