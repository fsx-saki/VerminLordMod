- chapter: 482
  title: 第四百八十四节：魂兽军团
  content: '第四百八十四节：魂兽军团

    　　方源驾驭着祥云，在天空中划过。

    　　他的速度并不快，但是周围却是洋溢着浓郁的仙蛊气息。

    　　他脚下的祥云，并不普通。源头是来自黑凡洞天中的某个运道真传，而今在方源的推算改良之后，已经功效大增。

    　　祥云的方向并不是随着方源的意念而动，而是遵循着运道的奥妙。

    　　就连方源都不知道，这朵祥云会在何时转折方向，会跑到哪里去，但方源清楚一点，那就是这“随意祥云”杀招，飞行的路'
