- chapter: 41
  title: 第四十一节：楚度的短板
  content: '第四十一节：楚度的短板

    　　听到方源想要索回飞剑仙蛊，楚度笑了笑，立即答道：“只要达成交易，本人不仅将飞剑仙蛊双手奉上，更会付出其他，必定让阁下满意。”

    　　开玩笑，这飞剑仙蛊当然要扣在自己手中，这是要挟对方的上佳筹码。

    　　楚度怎可能轻易就将其交还？

    　　楚度态度虽然温和客气，但心中却冷静清醒。

    　　方源呵呵一笑，脸上毫无失落、失望之色。

    　　他问出这个问题的时候，就已经知道答案，当即脸色一冷道'
