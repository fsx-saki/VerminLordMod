- chapter: 41
  title: 第四十一节：解石
  content: '第四十一节：解石

    　　“我要购买一些石头。”选择好了目标，方源便对那位女蛊师道。

    　　“新手！”女蛊师心中顿时冒出一个词。

    　　就算是再烂的赌徒，若想要购买，也得先掌眼。先仔细观察，然后将石块放在手中多摩挲，体会石皮的触感和重量。

    　　这样观摩几下后，若觉得感觉有些不对了，赌徒们就会放弃。不会一开口，就说买的。

    　　而像方源这种，一开口就要买的人，无疑都是第一次赌石的新手。

    　　不过女蛊师虽然这么'
