  title: 第四十九节：不愁方源脱离掌控
  content: '第四十九节：不愁方源脱离掌控

    　　一对深沉的目光，遥遥地注视着演武场。

    　　学堂家老站在三楼的窗口，将演武场中发生的一切，都看在眼中。

    　　他深深地皱起了眉头。

    　　方源主动下场的一瞬间，他的心中也是不由地诧异了一下。他也没有料到方源会这么干。

    　　“这个小子，有些滑溜啊。本身精通学堂规定，平时又没有犯错。课上虽然常常睡觉，但是一旦被提问，回答总是面面俱到，让人挑不出错误来。想抓住他的把柄，把他的'
