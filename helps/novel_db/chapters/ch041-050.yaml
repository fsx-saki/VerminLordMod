- chapter: 48
  title: 第四十八节：有些可爱
  content: '第四十八节：有些可爱

    　　这场大雨连下了四天，这才停息。

    　　太阳高高地升上天空，掀开这雨帘，仿佛在为夏季揭幕。

    　　夏天的气息，已经若有若无地传来。

    　　天气变得越加晴朗，一扫春天的缠绵悱恻的气息，温度也渐渐升高。

    　　春夜中，活跃的龙丸蛐蛐退场了，它们潜伏到地底深处进行产卵。青茅山上特有的青矛竹，则开始疯长，几乎每天都有明显的增高。

    　　草木树叶开始由翠绿色，往深绿色转变。青山绵延，看起来更加'
