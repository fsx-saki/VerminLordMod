  title: 第四十七节：贾金生，其实我不想杀你的
  content: '第四十七节：贾金生，其实我不想杀你的

    　　雨哗哗地下着。

    　　天空中乌云盖顶，远方的群山绵延，融成一团墨色。

    　　雨帘将天地交织在一起。

    　　咔嚓！

    　　天空骤然一亮，一道闪电如银蛇划破天空，又骤然消失不见。

    　　要到夏天了，这番春末的大雨也似乎带上了一丝夏天的热烈。

