  content: '第五十节：灿烂的笑容

    　　西漠。

    　　阴云盖天，雷声滚滚，莫家蛊仙和神秘巨兽的激战正在持续。

    　　“畜生，给我死！”

    　　“我要把你抽筋扒皮，弥补我莫家遭受的损失。”

    　　两位莫家蛊仙都有些气急败坏，这一次巨兽为祸，让莫家损失惨重。这两人负责的地域更是重中之重。

    　　“想要我死？”激斗的过程中，神秘巨兽忽然口吐人言。

    　　莫家双仙顿吃一惊，心头大跳。

    　　说时迟那时快，巨兽忽然张开大口，射出紫红色'
