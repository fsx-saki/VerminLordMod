- chapter: 41
  title: 第四十一节：目标华文洞天
  content: '第四十一节：目标华文洞天

    　　嗷吼！

    　　一头巨大的太古魂兽，头生双脚，体格如山，发出整天的吼叫。

    　　但是它并非在威势凌人，而是正疯狂地挣扎，拼尽全力想要逃窜。

    　　它的尾巴被一只普通的手掌牢牢抓住。

    　　然后，从手掌中传出一股极其恐怖的吸力。轰隆隆，仿佛飓风呼啸的声音，只用了几个呼吸的时间，整个太古魂兽就被这只手掌给吞吸个干干净净。

    　　手掌的主人打了一个饱嗝。

    　　正是八转魂道，安魂洞天之主'
