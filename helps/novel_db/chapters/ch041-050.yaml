- chapter: 41
  title: 第四十一节：魂道蛊仙名鬼王
  content: '第四十一节：魂道蛊仙名鬼王

    　　夜空中，明月朗照。

    　　一片庞大的阴云似缓实快，从方源等人的头顶掠过，向南急行五千里，飘到一处无名的小山丘的上空。

    　　阴云遮盖了清丽的月光，投下大片的阴影，黑暗覆盖着这片山丘。

    　　阴云悬停不动，从中飞出一道剑光，正是飞剑传书蛊。

    　　飞剑传书蛊射到山丘上，忽然遁入某个空间，消失不见。

    　　须臾，小山丘微微一震，一抹红光徐徐绽放而出。

    　　红光灿烂，赤如晚霞，又凝'
