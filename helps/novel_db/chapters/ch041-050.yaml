  content: '第四十二节：变化道！

    　　望着方源的身影，已远在天边，缩成一个小点，楚度却仍旧目送着他，停留在原地。

    　　“就这样放走了他，我此举是对还是错？”楚度眼神闪烁。

    　　但很快，他苦笑一声，暗道：“我就算不想放走他，又能如何？”

    　　“我的手段，根本抓不住他，也追不上他。”

    　　“若是来硬的，此人跟脚神秘，并不好惹不说，真落到我手中，自爆了魂魄，我又从哪里得到那个法门？”

    　　“不过，看他态度，应当是真'
