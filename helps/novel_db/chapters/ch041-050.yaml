- chapter: 42
  title: 第四十二节：蛛丝马迹蛊
  content: '第四十二节：蛛丝马迹蛊

    　　谈到葛家一事，原本热烈的晚宴氛围，就忽然冷却下来。

    　　葛家老族长连忙站起身，做出解释。

    　　葛光坐在一旁，看着自己的父亲，心中满是苦涩和悲伤。

    　　自己的亲妹妹死了，父亲心中已经哀伤至极，他多么希望这一切不是真的。但是如今，他却要向外人百般证实，自己的女儿千真万确已经死了。

    　　这是一场多么痛苦的折磨啊。

    　　但蛮图做出一副倾听状，却是不接受的态度。

    　　常山阴是正道'
