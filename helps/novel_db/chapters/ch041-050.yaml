  content: '第四十六节：房睇长之陨

    　　神帝城，壁画世界。

    　　宽阔的广场上，萧七星为首的大股人马正和一群豆神兵卒对峙。

    　　这群豆神兵卒的规模，比萧七星这一方还要庞大。

    　　“怎么打？”孙元化刚问，对面的豆神兵卒已然展开了冲锋。

    　　萧七星拦住准备动手的诸人，微笑道：“诸位暂且充当后援，且看我来对付它们。”

    　　萧七星言罢，呼啸一声，手指连连弹动，大量蛊虫飞出空窍。

    　　这些蛊虫落到地上，迅速化为一个个的人'
