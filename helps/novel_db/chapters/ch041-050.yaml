- chapter: 41
  title: 第四十一节：掰手腕
  content: '第四十一节：掰手腕

    　　匪猴身强体壮，大如象。成年的匪猴高达一丈，浑身肌肉贲发，上臂比下肢粗壮两倍有余，猴尾如铁棍，能砸碎山石。

    　　匪猴浑体皮毛如金，上面布满黑色的老虎斑纹。令人感到奇特的是，从它们的腰部会自然生长出皮毛，遮盖住裆部和尾部，宛若皮裙。

    　　吼！

    　　这只匪猴群的猴王，忽然张开巨口，发出洪亮的吼声。

    　　它们的吼叫声，如狮虎一般雄浑。

    　　吼吼吼……

    　　猴王的吼声，引得群猴响应。'
