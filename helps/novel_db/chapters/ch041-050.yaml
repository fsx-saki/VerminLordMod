  content: '第四十四节：影响五域

    　　华文洞天。

    　　一场茶会正在召开。

    　　华语老仙只坐副位，他将主位让给了方源。

    　　方源以气海老祖的身份，和诸多蛊仙交谈，了解到了东海白天这一块的第一手情报。

    　　参与茶会的并不只是华文洞天中的蛊仙。在气海老祖击退了吴帅大军之后，就陆续有蛊仙赶来支援。

    　　这些蛊仙都来自华文洞天的周边势力，对于支援华文洞天他们是姗姗来迟，但却都被华语老仙留下来作客，参加了这场茶会。'
