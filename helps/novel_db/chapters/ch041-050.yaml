- chapter: 41
  title: 第四十一节：北原风波起，智道有传承
  content: '第四十一节：北原风波起，智道有传承

    　　大雪山第三支峰，静室。

    　　窗外天气正好，晴空万里，空气冰爽，白雪高山，结合辽阔的碧空，汇成一幅宁静旷远的画面。

    　　静室中，茶香渐渐弥漫。

    　　方源半躺着，浑身伤痕累累，喘着粗气，一股股细小的尸血从他身上的大小伤口，流淌下来，落到地上，汇成一滩。

    　　但他毫不在乎，一点疼痛的感觉都没有，一直闭目养神着，已经快要一盏茶的功夫了。

    　　除他之外，静室中还有三人'
