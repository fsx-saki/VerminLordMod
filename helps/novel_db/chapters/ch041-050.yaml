- chapter: 50
  title: 第五十节：中阶！
  content: '第五十节：中阶！

    　　夜幕降临下来。

    　　月亮如一块银盘，出现在云间。稀疏的星辰，点缀在周围。

    　　古月漠北站在院子里，仰首看着月亮，双目炯炯发亮。

    　　“小弟，听说你今天受伤了。”身后忽然传来姐姐古月漠颜的声音。

    　　“姐姐，你是担心我今天被打得吐血，会因此有了阴影吗？”漠北转身，嘴角一翘。

    　　漠颜看着弟弟笑着，心中顿时舒了一口气。她虽然真的有这份担忧，但是嘴上却道：“哪里有，姐姐我最了解你的'
