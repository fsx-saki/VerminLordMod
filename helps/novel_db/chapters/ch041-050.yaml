    　　一股真元哗的一声，逆冲而上，直入酒雾当中。待落下时，已经少了一半，颜色更加深邃。从初阶的翠绿，转变成了中阶的苍绿之色。

    　　中阶的真元落入元海，却并不和初阶真元相互混杂。仿佛更重一些，沉淀到下面去了。

    　　元海便形成了上半层是初阶真元水，下半层是中阶真元的格局。

    　　随'
