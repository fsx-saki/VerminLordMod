  title: 第四十六节：沙鸥死蛋
  content: '第四十六节：沙鸥死蛋

    　　落日的余晖，洒在粥稀绿洲之上。

    　　往日里袅袅的炊烟，在今日却是被浓烟、火焰所取代。

    　　宁静安详荡然无存，房屋建筑塌毁倒塌，化为一片片的废墟。废墟中，街道上，湖畔，树下，血泊接连，横尸遍地。

    　　方源重新又回到家主阁，站在一堆碎瓦破砖上，他满意地将毒道仙蛊妇人心收回仙窍。

    　　屠杀了大半天，终将妇人心喂饱了。

    　　妇人心养炼合一，再继续喂下去，妇人心就进入炼蛊过程中。吃'
