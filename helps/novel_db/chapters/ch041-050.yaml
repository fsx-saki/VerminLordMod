  title: 第四十二节：麻雀四方战法
  content: '第四十二节：麻雀四方战法

    　　黑家，铁鹰福地。

    　　这里是黑家的大本营，福地中浩瀚广博，上大下小。

    　　得益于黑家第一代先贤的独特精英，铁鹰福地的地面只是一隅，越往上空，空间越大。

    　　远超寻常福地的旷远苍空中，漂浮着无数的圆球木鹰巢。

    　　这些鹰巢各个小山，无数的铁鹰栖息其中。鹰啼阵阵，群鹰飞翔时，数以百万计，遮天蔽日，雄奇壮美。

    　　在福地的最上空，悬空漂浮着一座庭院。

    　　庭院花园的假山上，'
