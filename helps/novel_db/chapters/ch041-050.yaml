- chapter: 42
  title: 第四十二节：竟然真的开出了蛊？！
  content: '第四十二节：竟然真的开出了蛊？！

    　　“咦？”

    　　“不会又是石中石吧。”

    　　“看样子应该是的。不过有些奇怪，这黄土被坚硬的紫金石皮包裹在里面，应该被挤压的圆滑，怎么表面凹凸不平呢？”围观的蛊师们疑惑不解。

    　　看到手中的黄泥土球，方源表情不变，心中却微微一动。

    　　他继续磨搓，蓝色光辉如水，泥土成粉落下。粉状的泥土中，还夹杂着了不少的土疙瘩，接连掉落在他脚边的石粉堆上。

    　　“不会真有料吧？！'
