- chapter: 46
  title: 第四十六节：杀人不要想太多
  content: '第四十六节：杀人不要想太多

    　　依照记忆，方源带着贾金生，再次来到那处山壁石缝。

    　　两人进了石缝，道路越来越窄，视野中一片黑暗，贾金生越走越惊疑，毕竟人生地不熟的。

    　　终于，他按捺不住：“我有一个疑问，贾富那厮向来以诚信示人，和善亲切，有信誉。而我则是坑蒙拐骗，强买强卖。你为什么选我做这笔买卖，而不选他呢？”

    　　石缝中传来方源的回答：“因为他修为太高了，若是看到了影壁，他可以选择和我交易，也'
