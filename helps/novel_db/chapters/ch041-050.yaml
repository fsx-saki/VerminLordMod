  events:
  - 这场每十年一次，就波及整个北原，令无数人家破人亡，令无数人飞黄腾达的战争，实质上是掠食者们合伙猎食的一场游戏。
  - 功倍蛊，属于律道，专门辅助其他蛊虫，能使得该蛊虫的效果加倍。
  - 形体是一抹刀刃寒光，非得寄居在刀上才可。
  - 一旦催发，便有一定可能无视同级的防御；以刀为食，被寄生的刀会渐渐缩减消散。
  - 单刀蛊威能独到，一旦催发，便有一定可能无视同级的防御。乃是由蛊仙刀魔所创，形体特殊，只是一抹刀刃寒光，非得寄居在刀上才可。此蛊以刀为食，被它寄生的刀会渐渐缩减，最终消散一空。
  - 寿蛊难寻，纵然东方部族乃是超级家族。
  - 使江河湖泊溪流泉瀑还原本来风貌。
  - 一只名为“江如故”，皆是宙道蛊虫。
- chapter: 45
  title: 第四十五节：洞心机，已在瓮中不自觉
  content: '第四十五节：洞心机，已在瓮中不自觉

    　　“你好，这位年轻的蛊师，有什么问题吗？”贾富走到人群中央，和颜悦色地问道。

    　　青年蛊师有些受宠若惊，又行了一礼。他看了一眼周围的族人们，便壮着胆子，将整个事情和盘托出。

    　　“原来是这么一回事！”贾富听了，点点头。他又问一旁的贾金生，“弟弟，是有这么一回事吗？”

    　　贾金生别过头，冷哼一声，不去看他。

    　　贾富沉吟起来。

    　　周围人群静悄悄的，不敢打扰他的'
