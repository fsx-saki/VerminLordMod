  events:
  - 再转身来到野生万狼王的跟前，瞧准时机，催动四转驭狼蛊。
  - 全力以赴蛊可以将蛊师一身的力量，全部自由地发挥出来，是当之无愧的力道核心蛊。
  - 就像之前，方源用了四转的无常骨蛊，使得肉身能承担更强的魂魄。
  - 盟约商定了各个方面，力图保证各方部族的利益。方源看了内容，发现没有问题，便和众人一起使用了毒誓蛊。
  - 他提起双掌，由下而上，动作沉重，像是提起万钧之物。随着他的动作，磅礴的水汽形成一道蓝色的瀑布，从地面上升腾起来。瀑布逆冲而上，在半空中，席卷而下，形成一道拱形的厚实水壁。
  - 若要照顾奴道的话，方源就不该用龟玉狼皮，而是另一只五转蛊，名为狼图蛊。
  - 他催动起狼魂蛊，千人魂在蛊的力量下，缓缓地向着狼人魂转变着。
  - 神清蛊！方源心念一动，唤出一只神清蛊。这是四转蛊虫，被真元灌输进去，立即化为一道清风。清风徐徐，吹拂全场。原本受到二转葱爆蛊影响，而变得暴躁的野生夜狼群，被这清风一吹，立即清醒过来。
- chapter: 42
  title: 第四十二节：黄金山
  content: '第四十二节：黄金山

    　　“居然是他，嘿嘿，老天开眼啊。”强哥一伙人看到方源的身影，顿时眼光发亮，兴奋起来。

    　　“我已经等不及看到他手臂被折断的样子了。”

    　　“张家小姐心善，他冲撞了张家，也没有把他处死。原来是要在这里派他上场。”

    　　方源缓步上前，走到石桌旁，径直坐下。

    　　猴王盯着他，伸出手臂。

    　　双方的手搭在一起，在无数双目光的注视下，开始了较量。

    　　猴王使出力气，但方源的手臂如钢铁浇'
