  title: 第四十六节：龟背狼群
  content: '第四十六节：龟背狼群

    　　“急报！前方三千里外，出现大批的龟背狼。数量众多，疑似是一支万狼群！”葛家的侦察蛊师急速奔行，来到葛家老族长面前大声禀告。

    　　葛家老族长面色严肃，向来人挥了挥手：“再探。”

    　　早在之前不久，他就已经收到侦察蛊师发送的信蛊。但在战场上，为了防止信蛊被敌人半途截获，通常还会有侦察蛊师来往奔行，亲自传信。

    　　“龟背狼乃是野狼当中，防御最强的狼种。上万只的龟背狼，是一块硬骨'
