    　　这里一旦下雨，颗颗雨滴都大如酒坛，冲击力巨大。因此，巨雨山上的童家寨，是建于山体空洞之中。若是露天建造，几场雨下来，就会被雨滴砸毁掉了。

    　　在童家寨子里，方源在黄金山'
