- chapter: 135
  title: 第一百三十五节：以一对三！
  content: '第一百三十五节：以一对三！

    　　方源飞上天空。

    　　“杨破缨、江暴牙、马尊，今日便是尔等授首之日。”他淡淡地道，声音却恢弘洪亮，响彻万人耳畔。

    　　马尊：“……”

    　　江暴牙冷笑“哼，大言不惭！”

    　　“居然是五转巅峰，常山阴你隐藏得好深。”杨破缨面色沉凝，双眼迸发出火焰，“不过这更加激发我的斗志！这样的战斗，才有意思！”

    　　然而下一刻，当狼群蜂拥而出，他的战意凝结了。

    　　多。

    　　好多。'
