    　　塔名监天，出自星宿仙尊之手，意为伫立此塔，监察天下！

    　　然而风流逸散，世事无常，星宿仙尊纵然才智比天，也逃脱不得寿元耗尽而消陨的结果。其后，又经历了三位魔尊的进攻，元莲仙尊、'
