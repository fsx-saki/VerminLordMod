    　　话说。

    　　人祖的四女儿森海轮回，从大树上掉落下来，没有跟上人祖的步伐，困在了平凡深渊之中。

    　　一天，她在睡觉，遇到了一位小人。

    　　小人嚎啕大哭，森海轮回便问为什么。

    　　小人说：“我是我们部族中体型最大的了，我常常因此而勇敢、骄傲、得意。今天我打算攀爬一座山，没想到这座山居然是一个人。天底下居然有你这么大的人，我还是头一次看到，忍不住就哭了！”

    　　从此之后，森海轮'
