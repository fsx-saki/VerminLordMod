  title: 第一百三十六节：斗力斗智
  content: '第一百三十六节：斗力斗智

    　　寒气四溢，冰刃飞舞。铁拳在咆哮，獠牙在嘶吼。

    　　熊力等人和白凝冰的战斗，已经进入白热化阶段。

    　　战斗的时间，其实并不久。但随着来自白凝冰的压力越来越大，让熊力等人无不觉得时间变得漫长和难熬。

    　　熊姜脸色阴沉如水，熊林满头的冷汗，熊力的目光中也充斥着凝重。

