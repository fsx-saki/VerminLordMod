- chapter: 133
  title: 第一百三十三节：挑将
  content: '第一百三十三节：挑将

    　　哗啦啦。

    　　一道水蓝激流，爆射而出。吊睛大虎一吼嗓子，爆发出雷霆般的声响。

    　　这是四转的虎吼蛊！

    　　虎吼音波，激荡空气，形成肉眼可见的涟漪。音波撞在激流上，将这股激流击溃成漫天的大雨。

    　　成虎自变身成吊睛大虎，攻势绝伦，立即就有了纵横捭阖之气象。

    　　虎吼蛊，爆发音波。虎爪蛊，犀利无端。虎皮蛊，防御卓绝！

    　　虎牙蛊，尖锐如枪，洞穿逞威。虎尾蛊，硬如钢鞭，甩摆如意'
