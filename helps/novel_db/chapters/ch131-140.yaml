  title: 第一百三十九节：断臂
  content: '第一百三十九节：断臂

    　　白凝冰是谁？

    　　青茅山第一天才，以一人之力改变三大家族格局，甫一修行就独占鳌头，让万马齐喑，让甲等天才们都黯然失色。谁也不会怀疑他的未来成就，哪怕是他的敌人，也不得不承认这一点。

    　　但现在，居然有人追杀他，让他如此狼狈逃窜。

    　　这是青书等人，都料想不到的。

    　　更叫他们的惊讶的是，追杀白凝冰的人，居然就是同族中的方源。

    　　对于方源的印象，他们还停留在以前的擂台，以'
