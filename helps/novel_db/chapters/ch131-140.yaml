- chapter: 131
  title: 第一百三十一节：大决战
  content: '第一百三十一节：大决战

    　　方源将常飚三人的神情，尽收眼底。

    　　对于狼王常山阴的过往，方源大多是通过《常山阴传》得知，却不知道当初陷害狼王的真凶。

    　　不过他即便知道，也没有心思去为死去的狼王报仇雪恨。

    　　他是方源，所谓的常山阴，不过是一张面具罢了。

    　　“从今日起，我便是常家部族唯一的太上家老。”方源开口，打破沉寂。

    　　常飚浑身一颤，睁开双眼，连忙叩首道：“常飚拜见太上家老大人。”

    　　“'
