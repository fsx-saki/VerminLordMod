- chapter: 133
  title: 第一百三十三节：谢谢你让我杀你
  content: '第一百三十三节：谢谢你让我杀你

    　　急速地奔驰！

    　　眼前的一棵棵树木，似乎都在向方源撞击而来。方源灵活地闪避着，拔腿飞奔。

    　　他的右耳参须飘飘，在他的身后，是一只被他故意激怒的豪电狼，以及数百头健壮的普通电狼。

    　　电狼的速度，比他快得多。尤其是豪电狼，矫健的狼躯在复杂的地形中腾挪电闪，速度极快。

    　　眼看着方源就要被它追上，忽然，方源的身形一阵波光泛动，紧接着，就消失不见了。

    　　豪电狼只得'
