  title: 第一百三十四节：火雷真传
  content: '第一百三十四节：火雷真传

    　　曾经，武庸追杀方源，直接把他从南疆撵到西漠去。而现在武庸则十分担忧方源找上门来，来抢夺乎地！

    　　武庸知道，若是方源上门来抢，他一定拦不住。

    　　仙蛊很容易摧毁，让方源投鼠忌器，但这种天地秘境可就难销毁了，几乎是一抢一个准。

    　　“方源拥有至尊仙体，各种流派都能修行，这点着实恐怖。乎地对他是绝对有用的。如果这个秘密泄露出去，我武家必定守不住，肯定会被夺走。到那时不仅是'
