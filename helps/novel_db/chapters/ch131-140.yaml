  title: 第一百三十五节：仙蛊道可道
  content: '第一百三十五节：仙蛊道可道

    　　片刻之后，方源控制住藏娇蚌，成为它的新主人。

    　　啪啪啪。

    　　他拍拍青年蛊仙的脸颊：“小子，算你识相。”

    　　青年蛊仙神情僵硬，不敢动弹，眼眸中都是羞愤和仇恨。

    　　方源却视若不见。

    　　随后，他跳上藏娇蚌，坐在青年蛊仙曾经的位置上，扬长而去。

    　　临走之前，还留下一句话：“本大人姓名楚瀛，就是我抢了你的藏娇蚌，记得回去告诉你爷爷。”

    　　望着藏娇蚌贝壳合上，投入'
