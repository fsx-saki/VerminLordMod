- chapter: 133
  title: 第一百三十三节：花蝶女仙
  content: '第一百三十三节：花蝶女仙

    　　既然追查不到对方位置，方源就明智地放弃了追杀。

    　　重获新生之后，这是方源第二次和影宗交锋。第一次是影无邪被迫，和方源交易，结果被方源大占便宜。

    　　第二次交锋，方源却只是稍占优势。尽管方源的实力，因为黑凡真传的原因，暴涨了许多倍数。但最终，方源没有达到本来的目的，只是斩杀了影宗一位成员，对影无邪等人稍有削弱。

    　　方源的实力在增长，影无邪的实力也在增长！

    　　并且，'
