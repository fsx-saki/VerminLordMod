- chapter: 132
  title: 第一百三十二节：隔空交锋
  content: '第一百三十二节：隔空交锋

    　　眼前是一片深蓝色的大幕，几乎占据了影无邪等人的全部视野。

    　　苍水界壁！

    　　五域之间，各有界壁，好像是一层膜，护卫着一方。

    　　苍水界壁，就是东海的保护膜。

    　　乱流海域本来就离着苍水界壁较近。正因如此，当初方源从南疆赶往北原的路上，就很接近乱流海域，碰到了刘青玉等人。

    　　影无邪等四仙运用上古战阵四通八达，直接传送到了这里。

    　　“又要离开了吗？”黑楼兰叹息。'
