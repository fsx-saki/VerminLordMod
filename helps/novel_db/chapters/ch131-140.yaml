- chapter: 131
  title: 第一百三十一节：仙蛊宿命
  content: '第一百三十一节：仙蛊宿命

    　　中洲，天上之天，天庭！

    　　银白的天空，一片光洁。

    　　无数白玉堆砌的宫殿，精致华美，空寂幽静。

    　　在宫殿群中，有一处苍老的，周身布满伤痕的洁白塔楼，如鹤立鸡群，高耸矗立，分外惹人注目。

    　　塔名监天，出自星宿仙尊之手，意为伫立此塔，监察天下！

    　　然而风流逸散，世事无常，星宿仙尊纵然才智比天，也逃脱不得寿元耗尽而消陨的结果。其后，又经历了三位魔尊的进攻，元莲仙尊、'
