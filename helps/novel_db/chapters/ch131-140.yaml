  - 陆畏因
  events:
  - 此风是大同风！是天下第一风，能同化一切，鲜有手段能够克制。
  - 不知为什么，这样的仙尊居然没有选择天庭，最终他留在了南疆，并将乐土真传也留在这片土地上。
  - 这记以七转定仙游为核心的仙道杀招，名为‘人来人往’，乃是宇道大能梁凉开创。
  - 非是亲眼所见，我绝不会信。这是九转仙蛊智慧？！
  - 江山如故！他催动六转仙蛊，对准早就保存下来的一大块山石。
  - 这定真树乃是太古传奇荒植，历史上赫赫有名。
  - 这大殿牌匾上，书写着三个大字——镇魂殿。
  - 这座粉色水晶铸就的山峦，原本非常巨大，但是落到紫薇宫中，却是被压制住，缩减成巴掌大小。
- chapter: 131
  title: 第一百三十一节：卫德馨
  content: '第一百三十一节：卫德馨

    　　“这……方正大人，您真的确定要买下他们？”负责的蛊师语气迟疑地道。

    　　“怎么，你质疑我的决定？”方源淡淡地瞥了这蛊师一眼。

    　　这蛊师呵呵一笑，他是商家族人，不像雄家三兄弟对方源这般惧怕。

    　　“不敢，不敢。”他拱拱手，转向商心慈，“如果我所料不差，方大人想购买这些人，是为了给心慈小姐添加人手。但这些人对于竞争少主之位，着实有些不利。心慈小姐，您如此聪颖，是怎么看的呢'
