- chapter: 131
  title: 第一百三十一节：获取五光山
  content: '第一百三十一节：获取五光山

    　　呱呱呱！

    　　刘青玉的福地中，一只呆头鸭子，正对着方源叫喊。

    　　这就是刘青玉死后，执念结合福地中的天地伟力，从而形成的地灵。

    　　地灵的外表，千奇百怪，一头鸭子地灵并不算稀奇。

    　　方源仔细聆听。

    　　虽然他耳中听到的是鸭子呱呱的声音，但反应到内心世界中，却玄妙地变换成了能够让方源自如理解的意思。

    　　事实上，黑凡天灵虽然外形是一座黄铜大钟，也可以和其他人交流。可'
