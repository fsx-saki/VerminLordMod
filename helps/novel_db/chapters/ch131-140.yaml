  title: 第一百三十六节：歼灭
  content: '第一百三十六节：歼灭

    　　来人虽然气势汹汹，死死盯着方源，但他身上却带着伤，披头散发，十分狼狈。

    　　一个念头，在方源的脑海中闪过：“丁齐。”

    　　数天前，花蝶女仙曾经关照过方源，说乱流海域中来了一位血道魔仙丁齐。此人弟弟丁言，便是死在刘青玉手中的那位血道魔仙。

    　　现在，方源见到此人，很自然便对他的身份产生了联想。

    　　随后，另外一群蛊仙，也纷纷杀入这片气泡之中。

    　　为首的两位，还是方源的熟人'
