  - 阎罗杀招大变模样，方源将其重新命名为阎帝！
- chapter: 132
  title: 第一百三十二节：晋升四转
  content: '第一百三十二节：晋升四转

    　　卫德馨怀有身孕，也是最近从自己的反应中，推算出来的。

    　　这个肚子中的新生命，带给她巨大的人生希望。

    　　这是她最大的秘密，但想不到竟然不到几天后，就被一个外人一语道破。

    　　这让她如何不震惊，如何不恐慌呢？

    　　在方源的前世记忆中，正是卫德馨此人，帮助商蒲牢战胜了商囚牛，一度成为少族长的热门人选。

    　　但在正魔大战中，卫德馨和卫神经秘密接洽，帮助武家在背后谋算了商家'
