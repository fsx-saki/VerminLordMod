- chapter: 134
  title: 第一百三十四节：离开商家城
  content: '第一百三十四节：离开商家城

    　　他原以为，方源是想教训他一顿。但没想到，方源是想杀他，甚至心甘情愿地付出紫荆令牌这般昂贵的代价！

    　　“为了区区的我，如此好勇斗狠，值得吗？”得到方源这般的“重视”，周全想哭！

    　　他是个正常人。

    　　他也怕死。

    　　要不然，周家灭亡之后，他成了孤家寡人，又受重伤，早就趁机死去了。

    　　但他活了下来。

    　　求生是每个生命的本能。

    　　他拒绝商心慈，是因为看不上她。他'
