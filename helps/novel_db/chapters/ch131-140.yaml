- chapter: 132
  title: 第一百三十二节：雪松子
  content: '第一百三十二节：雪松子

    　　巍峨的雪山主峰，高耸入云。

    　　在它周围，其余支峰，如群星拱月一般，围绕着它。

    　　天空中，透着淡蓝的明光。纷纷扬扬的细雪，窸窸窣窣地下着。

    　　这是一片洁白无瑕的地方，就连山峰上的建筑都是冰晶雕缀。

    　　这里便是大雪山福地。

    　　北原魔道蛊仙的老巢，拥有蛊仙数十人，分别占据雪山的各处峰巅。

    　　在一座长满苍青松柏的雪山支峰上，坐落着一座冰晶七塔楼阁。楼阁的牌匾上，上书'
