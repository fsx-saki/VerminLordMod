  content: '第一百三十九节：气运交感难觅迹

    　　总体而言，方源的至尊仙窍有了长足的进步，但是还需要继续大力的发展！

    　　至尊仙窍的潜力实在太庞大了。五域九天的格局，只小南疆一域，吞并了黑凡洞天中的全部资源，都还没有铺满。说出去，估计无人相信。

    　　而每层小九天的面积，都是小五域的总和。

    　　方源早就意识到，至尊仙窍的开发和建设，将是无以伦比的浩大工程。

