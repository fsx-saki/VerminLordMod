- chapter: 134
  title: 第一百三十四节：追杀
  content: '第一百三十四节：追杀

    　　“你放心，你只是二转修为，我不讨你的便宜。我也会将修为压制到二转，来吧，来一场真正的公平较量！”白凝冰狂笑着大喊道。

    　　面对神色癫狂的白凝冰，方源面色平静。他凝望着白凝冰，语气淡淡：“想要杀我，那就来吧。”

    　　话音刚落，方源微微向前迈出一步，身形如柳絮般从高处落下。

    　　白凝冰大笑声戛然而止，恼羞成怒起来：“你不要跑！”

    　　他顿时拔腿，对方源紧追不舍。

    　　方源无声'
