  content: '第一百三十六节：虚兽拦道仙更烦

    　　轰轰轰！

    　　巨大的爆炸声，不绝于耳。

    　　天空中，到处是蛊仙们战斗的身姿。

    　　既然寻找到了真正的传承之地，魔道蛊仙们向来都是务实实干，没有犹豫多久，便有人动身飞下。

    　　东方长凡既然选择太古墟蝠的尸体，作为智道传承之地，自然有着他的道理。

    　　漫漫无比的虚兽大军被惊动，像是一大蓬的黑云，从魔道蛊仙们的脚下升腾而起。

    　　这些虚兽，各个形容古怪，悍不畏死。偏偏'
