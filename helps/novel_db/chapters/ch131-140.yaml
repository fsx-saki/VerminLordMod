  title: 第一百三十七节：英雄救美
  content: '第一百三十七节：英雄救美

    　　山石迸溅，群鳄哀嚎。

    　　一场大战已经步入尾声，方源和白凝冰二人傲立火炭山，脚下的地面附近都是熔岩鳄的尸体。

    　　而那只千兽王级的熔岩鳄王，浑身的骨架都被打折，背部的两个火山凸起，被硬生生地击垮。

    　　它低声哀嚎着，趴在地面上，鲜血汩汩，从身上无数的伤口处流淌出来。它脚爪微微颤动，扒着土地想要钻回地底去，却已经力不从心。

    　　它挣扎的幅度越来越小，最终死亡降临到它的身'
