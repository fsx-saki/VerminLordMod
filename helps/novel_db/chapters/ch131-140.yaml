- chapter: 132
  title: 第一百三十二节：太丘非是传承地
  content: '第一百三十二节：太丘非是传承地

    　　北原，太丘。

    　　一场激战，已经到了最关键的时刻。

    　　一方是三位蛊师，另一方则是一群万兽规模的羊群。

    　　两位蛊师顶在前方，在气势汹汹的羊群面前，节节败退。而后一人，一身白衣已染上层层血迹，面冠如玉，但神色委顿疲惫，气喘吁吁，眼帘低垂。

    　　忽听一声吼叫，一头万兽盘山羊王，率领身边精锐羊群，向这三位蛊师展开冲锋。

    　　冲锋速度越来愈快，两边的羊群像是激流汹涌的'
