  content: '第一百三十七节：兼修两道！

    　　面对周围人的力劝，马尊脸色铁青，断然拒绝：“不，我马家只有战死的勇士，没有逃跑的懦夫。我是马家的旗帜之一，我如果逃跑，对大军士气是惨重的打击！我不能走，我们还没有输，我的手中还有天马群！”

    　　说着，他心念调动，一时间天马飞舞而上，像是升腾起的一团白云。

    　　神骏无比的天马，各个皮毛若雪，鬃毛在风中飞扬，洁白的羽翼尽情舒展。

    　　这些天马，乃是马家人的骄傲。

