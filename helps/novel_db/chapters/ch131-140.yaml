    　　来自方源的杀机，让他有一种喘不过气来的感觉。

    　　这对他来讲，是前所未有的体验。

    　　死亡的浓郁气息，更让他浑身战栗，生出一种病态的兴奋感。

    　　身后，方源越追越近。

    　　“接我这招！”他忽然甩手，抛出一只黑色蛊虫'
