- chapter: 134
  title: 第一百三十四节：百假当中有一真
  content: '第一百三十四节：百假当中有一真

    　　方源大手印一出，效果惊人，立即引得许多蛊仙，纷纷投来惊异的目光。

    　　事实上，这种囤积数量，再一次爆发的杀招设计思路，十分普遍常见。

    　　就好像是用最普通的丹火蛊，发出一道火球。怎么样才能威力更大？绝大多数的正常人，都会这样想：将一颗颗火球积累起来，等到对战的时候，一同发出。

    　　如此，数量增多，招数的威力就得到的增长。

    　　这是最平常，最简单不过的思路。'
