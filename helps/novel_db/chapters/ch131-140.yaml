- chapter: 133
  title: 第一百三十三节：周全的震骇
  content: '第一百三十三节：周全的震骇

    　　“怎么办，主人？”管家颤颤巍巍地跑到周全面前，请求指示。

    　　周全早就被惊醒，看着方源一众大闹自己的家，脸色铁青。

    　　“这个方正，简直无法无天。居然敢在商家城动武！等等……这个气息，明明是四转。天，他才多大，竟然也晋升到了四转？”

    　　周全暗中观察，忽然瞪大了双眼，眼中流露出震骇之色。

    　　他曾经也是四转蛊师，一代族长。但他是四五十岁的时候，才修行到四转境界。方源'
