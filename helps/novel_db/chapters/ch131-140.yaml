- chapter: 135
  title: 第一百三十五节：仙鹤门，方正
  content: '第一百三十五节：仙鹤门，方正

    　　蛊师世界，广袤非凡。

    　　东面，是沧海滔滔，海岛星罗棋布，点缀其中。名为东海。

    　　西面，是戈壁沙漠，绿洲如珍珠，洒在漫天黄沙内里。号称西漠。

    　　北面，是苍莽草地，人称北原。南面，是十万大山，俗称南疆。

    　　而在东海、西漠、北原、南疆的包拢下，有一处中央地带，名为中洲。

    　　中洲幅员辽阔，绵延亿里，元气最为充裕，门派林立。多少英雄豪杰，正道魔道隐藏其中，可谓人杰'
