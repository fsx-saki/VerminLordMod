  content: '第一百四十节：试用道可道仙蛊

    　　道可道仙蛊！

    　　这只仙蛊头尾圆润，通体漆黑，分有多节，一被方源催动起来，便开始绽射着微微星芒。

    　　湛蓝的星光，映照在方源的全身。

    　　方源屏气凝神，细心观察，全神戒备，以防任何不测。

    　　蛊师用蛊，并不安全。很多蛊虫，都有后遗症或者弊端。

    　　仙蛊同样如此，甚至因为极端强大，后遗症、弊端也随之更大。

    　　这尚是方源第一次运用道可道仙蛊，虽然事先用过智道手段进行'
