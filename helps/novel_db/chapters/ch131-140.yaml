  content: '第一百三十五节：寻常荒兽非我敌

    　　“好了，我们也下去吧，看看有什么线索。”东方万休一边说着，一边撤销了隐身手段，来到东方余亮消失的地面。

    　　“太上大长老，不是被东方长凡大人临死前，特意关照过吗？”身边的家族蛊仙，就有很疑惑。

    　　“是啊，大长老特意召集我们一同前来，如今整个部族都没有留守的蛊仙战力。”

    　　“我还以为大长老手中，早就有线索了。”

    　　蛊仙们纷纷表示隐忧。

    　　东方万休长叹一口气'
