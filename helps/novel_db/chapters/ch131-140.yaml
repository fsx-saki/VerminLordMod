- chapter: 136
  title: 第一百三十六节：白狐蛊仙传承
  content: '第一百三十六节：白狐蛊仙传承

    　　中洲门派林立，和南疆家族制度不同。

    　　家族中，以亲情维系，族人为栽培对象。但在门派里，师徒关系取代血脉亲情。门派广收门徒，只要有资质，有品性，就可收录门内。

    　　正因为如此，方正才能被吸收到仙鹤门中，成为其中一员。

    　　仙鹤门中，从下到上，分为外门弟子、内门弟子、精英弟子、真传弟子、门派长老、门派掌门人，以及太上长老。

    　　三年小考，可选取得内门弟子的身份。八年'
