  title: 第一百三十六节：四臂地王！
  content: '第一百三十六节：四臂地王！

    　　很快，黑楼兰等人，便感压力如山！

    　　“不好，对方发疯了，我快要支撑不住了！”

    　　“黑旗军，快来支援！！”

    　　“裴燕飞、仲费尤、唐妙鸣，你们也速来保护狼王！”

    　　“不能再这样被动防守下去，我们必须主动出击。否则激斗的余波，也会对狼王造成危害！！”

    　　马家绝不甘心失败。

    　　一旦失败，他们就彻底完了！

    　　他们开始拼命，更多的是重赏之下的勇夫。于是局面迅速脱离'
