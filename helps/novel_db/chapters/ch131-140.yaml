- chapter: 134
  title: 第一百三十四节：夺蚌
  content: '第一百三十四节：夺蚌

    　　和花蝶女仙的交谈，只是一个小插曲。

    　　方源正式闯入乱流海域。

    　　海水中，无数股动乱的水流，好像是纠缠一起的麻花，又仿佛混乱至极的线团，充斥方源的视野。

    　　力道大手印！

    　　见左右无人，方源使出这个仙道杀招。

    　　大手拍碎了十多股乱流，使得海水一片混乱。

    　　方源循着某个方向，横冲直闯。

    　　这只是乱流海域的外围，所以可以强行突破。

    　　但片刻之后，一道巨大的淡黄色乱'
