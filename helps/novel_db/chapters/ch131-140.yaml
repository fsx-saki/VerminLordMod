  title: 第一百三十四节：五转巅峰！
  content: '第一百三十四节：五转巅峰！

    　　见常飚上了战场，马家也随即派出一位女性强者。

    　　此人名为奚雪，乃是四转巅峰修为，著名的冰道强者。拥有一只五转的漫天飞雪蛊，一旦发动，鹅毛大雪狂暴飞舞，数千步的范围内，都会化为寒冷冰域。

    　　常飚见到此人，暗道一声：“苦也。”

    　　若换做他巅峰状态时，对上此女，也得小心翼翼。如今他身怀伤势，更是不敌。

    　　两人交手，奚雪攻势凌厉，常飚则以躲闪、拖延为主，这样一来，不'
