- chapter: 135
  title: 第一百三十五节：北冥冰魄，十绝天资
  content: '第一百三十五节：北冥冰魄，十绝天资

    　　“什么？！”熊林顿时失声。

    　　“强取蛊？青茅山上只有一人有这蛊虫，就是我的表弟熊毡！！”熊姜的脸色也顿时阴沉下来。

    　　熊力捏紧了双眼，眼中凶芒闪烁，别人怕白凝冰，他当然也忌惮。但是忌惮并不代表软弱和惧怕。在他的心中，早有为家族捐躯，死战白凝冰的觉悟！

    　　“白凝冰，强取蛊到底在不在你的手上？”他大步跨出，任由方源错身而过，直面白凝冰。

    　　白凝冰呵呵冷笑'
