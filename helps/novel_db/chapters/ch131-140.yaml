  title: 第一百三十七节：影之殇
  content: '第一百三十七节：影之殇

    　　眼看着熊力的拳头就要砸中白凝冰，熊林、熊姜都不由地露出喜色。

    　　惟独方源站在远处，眼中闪过一抹深沉的光。

    　　以他对白凝冰的了解，怎么可能犯下如此低级的失误？

    　　果然，就在下一刻！

    　　白凝冰忽然暴起，他的右手和前臂的血肉，陡然间化为透明的淡蓝寒冰，从外面便可清晰地看到他的根根手骨。

    　　他手指并拢，形成掌刀，闪电般出手，直接戳穿熊力的心脏！

    　　“呃——！”熊力飞'
