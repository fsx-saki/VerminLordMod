- chapter: 131
  title: 第一百三十一节：孤独是最深邃的黑暗
  content: '第一百三十一节：孤独是最深邃的黑暗

    　　大雨倾盆而下，天空中电蛇乱舞，整整持续了一夜。

    　　方源躺在床上，不断听到屋外蛊师们的叫喊声，在雨水中踏水而行的脚步声。

    　　他半眯着双眼，脑海中又不禁浮现出前世的记忆。

    　　前世中，当狼潮来临时，他还是一转蛊师，因此作为后勤力量，躲避在山寨当中，反而逃过了一劫。

    　　但是今生，他则已经是二转中阶，并且有了四味酒虫，目前正在向高阶大步地前行。因此，就必须和其'
  gu_mentioned:
  - 定仙游仙蛊
  - 智慧蛊
  - 江山如故仙蛊
