- chapter: 132
  title: 第一百三十二节：三步芳草
  content: '第一百三十二节：三步芳草

    　　悬崖上，白凝冰饶有兴趣地看着。

    　　在他坐着的峭壁下，一场生死激战正在上演。

    　　豪电狼踱着步子，慢慢接近。

    　　两位蛊师，满脸的凝重，挡在它的面前。

    　　在他们的身后，熊毡半蹲在地上，左手抓在右手腕上，右手呈现爪状，遥遥对准着豪电狼。

    　　“强取蛊！”忽然，他猛地大喝一声，体内真元尽数涌向强取蛊。

    　　一股无形的摄取力，顿时爆发出来。

    　　熊毡右手虚抓，一种错觉，让'
