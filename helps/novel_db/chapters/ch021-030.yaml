  title: 第三十节：大小气功果
  content: '第三十节：大小气功果

    　　漫天的气潮，滚滚浩荡，很快就卷席整个冰晶洞天。

    　　魔尊幽魂深深叹息，这太遗憾了。他原本还打算让双方死斗，最终自己收拾一切，吞食蛊仙魂魄可比吸收魂核更有帮助得多。

    　　可惜他的图谋，都别这一场气潮给破坏掉了。

    　　“我手中没有荡魂山，缺乏胆识蛊，只能吞食魂兽和魂核。但这些却是需要一定的消化时间，远不如胆识蛊可以直接助长魂魄底蕴。”

