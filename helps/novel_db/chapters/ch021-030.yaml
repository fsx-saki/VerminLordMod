- chapter: 22
  title: 第二十二节：你就从了我吧
  content: '第二十二节：你就从了我吧

    　　尽管方源的意图就是如此，葛谣也主动提出加入，但方源还是对她道：“照应？我需要你什么照应？”

    　　说着，目光扫视她一眼，语气带着些微的傲然。

    　　少女立即扬起脖子：“你知不知道，腐毒草原上飘散着紫色的毒雾，长期呼吸，就会中毒。我身上的蛊虫，正可以解毒。还有，越到草原的深处，毒雾就越浓，还有幽魂冤鬼。到那时，你不能分辨方向，只有我的归心蛊，才能指明正确的归途。”

    　　咕…'
