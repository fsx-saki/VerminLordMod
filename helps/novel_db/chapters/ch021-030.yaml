  title: 第二十六节：东海追逃战（中）
  content: '第二十六节：东海追逃战（中）

    　　追，还是不追？

    　　东海众仙面面相觑。

    　　最先反应过来的，是七转蛊仙汤诵。

    　　“休走！”他身形如电，追赶方源，口中大叫。

    　　方源冷哼：“得寸进尺之徒！莫要以为我怕了你，若非身负重任，我必定将你斩于阵前。”

    　　汤诵闻言更怒：“放屁！”

    　　他手中的仙道杀招已经差不多能催发出来了，就要挽回脸面，偏偏这个时候，方源跑了。

    　　他居然跑了！

    　　汤诵当然不愿善罢甘'
