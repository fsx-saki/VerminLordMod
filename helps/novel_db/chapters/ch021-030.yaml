  content: '第三十节：仙蛊喊饿

    　　方源思考了一下，对黎山仙子道：“这份毒气吐纳杀招，还有上古力道蛊方我都要了。多少仙元石？”

    　　黎山仙子答道：“毒气吐纳需要两块仙元石，群力蛊的蛊方则也卖两块仙元石。一共四块仙元石。”

    　　方源点点头，认可了黎山仙子的报价。

    　　毒气吐纳杀招不俗，的确值两块仙元石的价。

    　　群力蛊虽然只是五转的凡蛊，但早已经绝迹。物以稀为贵，其蛊方高达两块仙元石，也很正常。

