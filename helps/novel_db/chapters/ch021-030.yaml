- chapter: 24
  title: 第二十四节：近战蛊师
  content: '第二十四节：近战蛊师

    　　三天之后。

    　　“矮身闪躲，是克制摆拳的通常技法。当敌人进攻过来的时候，迅速下蹲，并且趁势做出反击，攻击他的裆部和腹部。不要害怕摆拳，常常一上来就使摆拳的，都是些没脑子，又冲动的人。”

    　　演武场上，学堂的拳脚教头一边说着，一边做出动作进行示范。

    　　一个木人傀儡右拳横扫过来，拳脚教习猛地下蹲，躲过攻击，然后出拳击打傀儡腹部，砰砰砰几下，就将木人傀儡击倒。

    　　学员们围成'
