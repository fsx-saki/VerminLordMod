  content: '第二十六节：死了

    　　方源哈哈怪笑，八只巨手或成拳轰砸捣击，或成掌横切竖拍，或成指，或成爪，展现出精湛勇悍的格斗造诣。

    　　肥娘子平日里仗着演武沙铠皮糙肉厚，悍勇性格，欺负欺负其他蛊仙。但在方源面前，却渐渐落于下风。

    　　方源拳影如飞，动作敏捷，打得肥娘子疲于应付，只有招架之功，没有还手之力。

    　　忽然间，方源觑得破绽，猛地贴身上去，双臂如怪蟒攀附，带动两只怪爪如钻头，一下子搅碎沙巨人的两只手臂。'
