- chapter: 22
  title: 第二十二节：欢迎来到白骨山
  content: '第二十二节：欢迎来到白骨山

    　　百家族长的脸色糟糕至极。

    　　一切都明了了！

    　　原本她还有些迟疑犹豫，但看到彩色烟雾中的画面，傻子才会分不清楚。

    　　百家族长不是傻子，反而她比常人更加英明。方源前世的历史中，正是她带领着百家完成了迁徙，为下一代的鼎盛打下坚实的基础。

    　　“该死！怎么会这样？”

    　　“这两个贼子，竟然是魔道蛊师。真是太能演了！”

    　　“少主，两位少主都在他们的手上，我们该怎么办？'
