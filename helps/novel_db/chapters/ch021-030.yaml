- chapter: 21
  title: 第二十一节：气功果
  content: '第二十一节：气功果

    　　“天庭到底是天庭啊……”夜天狼君看着手中的信道蛊虫，满怀感慨。

    　　果然不出他的所料，天庭真的出手来对付两天联军了。

    　　之前他就预估到会有这样的情形。

    　　人在江湖身不由己，夜狼洞天不得不参加两天联军。若不这样做，它必遭围攻，直至毁灭。

    　　然而加入这个势力，也只是将灭亡延缓了一些罢了。

    　　到时候，五域反攻，两天联军只怕要分崩离析，伤亡惨重。覆巢之下无完卵，到那时夜狼洞'
