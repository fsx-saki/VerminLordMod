  title: 第二十八节：无本生意！
  content: '第二十八节：无本生意！

    　　“为什么要阻止？”学堂家老眉头扬起，笑了起来。他伸出手指，遥遥指着方源，又道，“此子已经掌控全局，下手极有分寸。你们看他砍人脖颈，都只劈砍左右侧，从不砍人的后脑后颈。这是因为他也知道，砍左右侧脖颈，能让人当场昏厥。砍后脑后颈却有致死的可能，所以就主动放弃了这样的攻击方式。”

    　　“你们看这些倒在地上的少年，哪一个是受了重伤的？没有！就算有重伤，又怎么样，凭借我们学堂中的'
