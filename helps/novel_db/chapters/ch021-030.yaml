  title: 第二十九节：奇蛊榜排行第四
  content: '第二十九节：奇蛊榜排行第四

    　　“又一只仙蛊！”雪松子面色一变，目光灼热，又嫉又妒。

    　　想他自己为了谋夺一只木鸡仙蛊，不知费了多少功夫和算计，最终还是一场空。

    　　眼前这个区区仙僵，竟然掌握了正常蛊仙都没有的仙蛊，而且还是两只！

    　　“呵呵呵，黑城、雪松子，今天就暂且为止。好好享受接下来的生活吧，因为你们的时间不多了。”方源语气冰寒彻人。

