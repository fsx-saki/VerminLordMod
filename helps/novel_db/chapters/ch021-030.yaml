    　　“你受伤了？！”葛谣跑过来，目光饱含关切之色。

    　　“不妨事。”方源伤势看似恐怖，其实都在他有效的掌控之下。当即他催动自力更生蛊，让伤口迅速痊愈。

    　　但自力更生蛊只是三转蛊，到了北原这里，只当二转效用。方源伤势减轻之后，它的效用立即就衰弱下去。

