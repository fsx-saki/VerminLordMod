  - 光虹蛊乃是三转蛊，能令蛊师化光遁走，在三转移动类的蛊虫中，号称第一迅速
- chapter: 23
  title: 第二十三节：养蛊就像养情妇
  content: '第二十三节：养蛊就像养情妇

    　　太阳落山了。

    　　晚霞却还在天边燃烧着，放眼望去远处的群山，都蒙上了一层厚厚的灰，并且正在向黑色过渡。

    　　学堂中一天的课程结束了，学员们三三两两地走出学堂。

    　　“今天真是开心，学到了不少东西。尤其是学会了使用月光蛊。”

    　　“月刃飞在空中，真是帅呆了。可惜我资质不够，将来只能做后勤蛊师，不能上战场呢。”少年们兴趣盎然地交谈着。

    　　一些人则呼朋引伴。

    　　“一起'
