- chapter: 21
  title: 第二十一节：冰钻星尘
  content: '第二十一节：冰钻星尘

    　　星萤蛊宛若蜂群一般，盘旋在半空中，绽放着湛蓝星芒。

    　　星光受到一股无形之力的牵引，最终汇聚到一扇星门之中。

    　　这是一道巨大的圆形拱门，完全是由星光构成，灿烂如梦，优雅如幻。

    　　随着时间的推移，星萤蛊群中不断减员，死去的星萤蛊从半空中无力地坠落到地上。

    　　一只脚从星门中踏进狐仙福地，旋即整个人都走出星门。

    　　老者是个老人，雪发苍苍，皱纹如沟，双眼沧桑却又明亮，正是'
