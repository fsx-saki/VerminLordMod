- chapter: 29
  title: 第二十九节：不择手段
  content: '第二十九节：不择手段

    　　“把酒都放到床下。”方源指挥着客栈的四个伙计。

    　　他们每人手中都提着数坛青竹酒。这是方源勒索了其他学员之后，就来到客栈，一口气又购买了二十坛。

    　　每坛两块元石，方源为了酒虫，一下子砸出四十块元石。

    　　刚刚鼓起来的钱袋，瞬间就瘪了一半，只剩下三十九块元石。不过也算是物有所值，这些酒能够支撑酒虫一段较长的时间了。

    　　“好咧。”伙计们连忙应道，对蛊师他们不敢有丝毫的不敬'
