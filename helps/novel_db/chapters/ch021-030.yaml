- chapter: 25
  title: 第二十五节：春光正明媚
  content: '第二十五节：春光正明媚

    　　“他是方源，还是方正？”有些学员在嘀咕，仍旧有人分辨不出方源和方正这两个孪生兄弟。

    　　“是方正。方源总是一脸冷漠，脸上绝不会出现紧张的神情。”有人解答道。

    　　“哦，那就有看头了。方正可是我们山寨三年唯一的甲等天才呢。”众人纷纷投去目光。

    　　方正感受到了这些目光中蕴含的压力，这让他更加紧张。

    　　站在场上，他手指都在微微颤抖。

    　　他打出第一记月刃，原本是瞄准的草人'
