  content: '第二十二节：惊喜发现

    　　五界山脉，五股华光，常年弥漫冲天。

    　　整个山脉，被五色华光，划分为泾渭分明的五块地域。

    　　紫黑色的华光，是当初禁师陶铸仿造的南疆瘴气界壁，青绿色的山脉，是仿造的北原甘草界壁。赤红色的部分，来源于西漠的狂炎界壁。深蓝色，则是东海苍水界壁。

    　　至于白金色山脉，就是中洲圣贤界壁。

    　　七转气道蛊仙戚灾，如今就死在五界山脉中白金色的地域里。

    　　方源吐出一口浊气，抽出插在他'
