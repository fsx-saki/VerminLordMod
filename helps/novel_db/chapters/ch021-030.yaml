- chapter: 21
  title: 第二十一节：原来是魔道贼子！
  content: '第二十一节：原来是魔道贼子！

    　　“重要的情报？”百家族长微微皱眉，但什么样的重要情报，比元泉更重要呢？

    　　“既然不是紧急情报，就让他们先在帐外听命。”族长吩咐了一声，又将目光集中到烟雾画面中去。

    　　画面一闪，显现出山洞中的情形。

    　　方源等一行七人深入，很快就探到洞底。

    　　这处山洞并不大，百家族长很快就失望了，她没有看到元泉，元泉也不可能在这种地方。

    　　“看来要找到元泉，还需要时间。”百'
