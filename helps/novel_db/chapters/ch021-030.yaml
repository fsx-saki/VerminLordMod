- chapter: 25
  title: 第二十五节：东海追逃战（上）
  content: '第二十五节：东海追逃战（上）

    　　方源气息只是六转蛊仙，在他没有出手之前，并无非凡之处。

    　　再加上两番避让，不由地让东海蛊仙们心生轻视之情。

    　　但当他暴然出手之后，顿时让人心头一震。

    　　东海众仙惊诧，来势顿滞，无不重新打量方源。

    　　但见方源一身白衣，长发在狂风中飘扬。飘逸绝伦，英俊多姿，别有一番气度。此时方源满脸怒色，宛如雷霆森然，杀意好似冰霜凝聚，让人感到分外压抑。

    　　东海蛊仙人多势众'
