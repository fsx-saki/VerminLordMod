  - 要求后来人，须得斩杀千人，同时攒出一只僵尸大军。
  - 丁浩僵尸大军中的炮灰，数量最多。
  - 这种白毛僵尸，战力最弱，还不如寻常野兽。
  - 白毛僵尸行动迟缓，会受到阳光的伤害
  - 二代僵王收徒标准中要求一个蓝毛即可，方源自称有两头。
  - 蓝毛僵，直需一个，就算达到入门标准
  - 这样的伤势，就算是万兽王级的蓝毛僵也要灭亡。
- chapter: 22
  title: 第二十二节：月刃飞舞
  content: '第二十二节：月刃飞舞

    　　天空蓝得空明，纯净得仿佛洗过一般。

    　　太阳金灿灿的。

    　　朵朵白云飘浮着，一群彩雀鹦鹉喳喳地叫着，在蓝天白云下组成箭矢阵型，振翅翱翔。

    　　这种彩雀鹦鹉，只有在春天才会大群出没。它们浑身羽毛七彩斑斓，体型如鹰般大小，头颅鸟喙都是鹦鹉，尾部则像是孔雀的尾巴，拖得长长的。

    　　距离方源在炼化本命蛊的考核中夺得第一，已经有十来天过去了。

    　　春风吹绿了满山的青草，野花争相绽放'
