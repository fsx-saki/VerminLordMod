- chapter: 25
  title: 第二十五节：磐石气运
  content: '第二十五节：磐石气运

    　　整个西漠，几乎都是茫茫沙漠。而绿洲如颗颗繁星，点缀其中。

    　　人族在这里生存，基本上都依凭绿洲。

    　　西漠，沙井绿洲。

    　　黄家作为一个上等势力，坐落在这里已经有数百年的历史，霸占着绿洲最中心的精华资源。

    　　绿洲外部，则是一些小型势力，作为附庸依附这黄家。

    　　更外部，在沙井绿洲的边缘，则围绕着凡人村庄。这些凡人生活困苦，人口众多，受到黄家等蛊师势力的掌控。

    　　在这些'
