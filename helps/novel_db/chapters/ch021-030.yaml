- chapter: 27
  title: 第二十七节：公然勒索
  content: '第二十七节：公然勒索

    　　少年们顿时又惊又怒。

    　　“什么，我没听错吧？”

    　　“方源，你脑袋烧糊涂了吧，竟然站在学堂大门口来勒索我们？！”

    　　“你是穷疯了吧？谁给你的胆子，把主意都打在我们身上了。”

    　　“滚开，你区区一个丙等，也敢挡小爷我的路。再不滚，小爷我一脚踹飞你……呃！”

    　　方源突然出手。

    　　他右手成掌，狠狠一切。动作又准又快，手掌下沿劈中一人的脖颈左侧。

    　　这不幸的少年，哪里料'
