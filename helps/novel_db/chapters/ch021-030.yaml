- chapter: 26
  title: 第二十六节：一切组织的本质
  content: '第二十六节：一切组织的本质

    　　临近傍晚，天边残阳如血。

    　　余晖照在学堂之中，五十多位学员正襟危坐着，台上学堂家老在一一个念名字，分发补贴。

    　　这是学堂每隔七天分发下来的元石补贴，算是对这些少年们的资助。毕竟以他们的实力，要独自喂养蛊虫，还是有很大的经济压力的。

    　　“古月方源。”家老念道。

    　　方源从最后一排的窗边座位上起身，走上台来，接过两个钱袋子。

    　　一个袋子里，是三块元石的家族补贴。'
