  title: 第二十四节：吴帅疗伤
  content: '第二十四节：吴帅疗伤

    　　大智仙母的惊呼，让全场的异人蛊仙们都分外震惊。

    　　很快，他们反应过来。

    　　“必须去营救他们。这可是咱们的大本营啊。”

    　　“大智仙友，你可知究竟是什么人入侵了你的洞天？”

    　　“是天庭！”大智仙母脸色阴沉，咬牙含恨地道，“来犯的蛊仙催动着诛魔榜，这是天庭的八转仙蛊屋，作不了假的。”

    　　“哼，原来是天庭！”

    　　“天庭未免也太卑鄙无耻了。竟然做出不宣而战的举动。”'
