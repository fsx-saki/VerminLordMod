- chapter: 22
  title: 第二十二节：封印春秋蝉
  content: '第二十二节：封印春秋蝉

    　　半月之后，方源再次来到琅琊福地。

    　　眼前云雾飘渺，纯白茫茫，云海翻腾中十二云阁屹立不动。又有数条大江大河，宛若游龙，行于云土之上。

    　　琅琊福地在太白云生的治疗下，已经重塑过往盛景。

    　　方源被接引着，进入一处云阁，见到了琅琊地灵。

    　　琅琊地灵身上，仍旧覆盖着层层气道封印。不过原来是十八层封印，在墨人王的帮助下，已经削减了三层，剩下十五层。

    　　墨人王就站在琅琊地灵'
