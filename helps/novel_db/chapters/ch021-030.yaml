    　　原来这气宗狮，本是受到戚灾的节制奴役。但戚灾一死，气宗狮也就回归自由之身。

    　　气宗狮'
  - '仙，并不针对仙蛊。

    　　当初，凤九歌深入北原，寻找八十八角真阳楼真凶，传递家书的时候，就用了一只六转信道仙蛊，往来穿梭北原、中洲两大界壁，轻松自如。

    　　“如果这个猜想是真的话，我何须在去赶炼定仙游呢？”方源'
