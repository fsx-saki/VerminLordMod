  content: '第二十七节：迷雾中的方源

    　　至尊仙窍，小南疆。

    　　一处山谷之中，石狮诚俯身查看谷内的石菇。

    　　这些石菇若是长势良好，都会高达半丈，形如矮树，菌盖如伞。然而眼下的这些石菇，却个个矮小，宛若大树被砍伐后留下的木桩。并且浑身上下也不是健康的灰石之色，而是呈现一种扭曲的五色斑斓，一看就知道大为古怪。

