- chapter: 21
  title: 第二十一节：天意为难便斩难！
  content: '第二十一节：天意为难便斩难！

    　　戚灾脑海中，思绪起伏不定，连带着脸色也变得凝肃起来。

    　　方源也是眉头紧皱。

    　　他之前动用飞剑蛊，绞碎的阴气，转眼间又都恢复如初。

    　　碧沉沉的阴气长索，再次向方源绞来。大有不纠缠上方源，誓不罢休之势。

    　　“飞剑蛊虽强，但对付这种聚散如意的敌人，却不拿手。”方源心中闪过一丝明悟。

    　　之前，他对付荒兽泥怪的时候，就有同感。

    　　如今面对气道蛊仙，这种感觉再度浮'
