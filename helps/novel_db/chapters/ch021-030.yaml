    　　方源边打边退，他就随战随进，阴险狡诈，难缠至极。'
  - '，随着时间推移，整个战场就会越发偏向于气道。

    　　到那时，戚灾不仅使用仙蛊时，威能更快更大，而且消耗仙元也相应缩减，有利无弊，十分了得。

