  content: '第二十一节：踏足北原

    　　嗷呜！

    　　黑夜的草原上，毒须狼王仰起脖子，发出悠长的狼嚎。

    　　在它身边的数百只毒须狼，耳朵动了动，身子如利箭一般射出去。

    　　狼群分成两边包抄，组织严密，竟如军队一般。

    　　少女葛谣拼命地向外奔逃。

    　　但是她的马早已经丧生，红色的小皮靴踩在泥泞的沼地上，已经如灌了铅似的沉重。

    　　奔腾的毒须狼群成功地将她包围住，然后迅速向内合拢。但又忌惮着少女的蛊虫厉害，只是围绕着'
