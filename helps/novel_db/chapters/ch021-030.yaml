  title: 第二十六节：常山阴之死
  content: '第二十六节：常山阴之死

    　　方源将心神探入空窍。

    　　白骨车轮进入空窍之后，漂浮在真金真元的海面之上，随着波涛，半沉半浮，一片死气沉沉的模样。

    　　蛊虫当然也会受伤、损毁、灭亡。

    　　“这只白骨车轮，已经濒临破碎，不能再用。除非我接下来能寻到骨竹蛊，再结合鬼火蛊，将它修复治疗。”方源在心中琢磨着。

    　　有许多治疗蛊，并不是针对人族身躯。

    　　有些蛊，比如狼烟蛊，专门用来治疗豺狼身上的伤势。又有些蛊'
