- chapter: 25
  title: 第二十五节：老祖高义
  content: '第二十五节：老祖高义

    　　夏家太上大家老夏瑞之听了气海老祖问话，大感惊愕。

    　　楞了一下后，他谨慎地回答道：“启禀老祖，我夏家的确在秘密打造人道秘境，名为人海。只是这处人道秘境，并无攻伐威能啊。我们夏家之所以建设这个秘境，是为了将来面临战乱，好让我家的蛊仙有复活的途径。”

    　　夏瑞之说得比较含糊，但也不是谎话。夏家打造人海的真正用途，就是复活夏家蛊仙。

    　　方源五百年前世的记忆中，夏家蛊仙在外战死'
