- chapter: 30
  title: 第三十节：方源！你又来抢？
  content: '第三十节：方源！你又来抢？

    　　几乎与此同时，在另一边。

    　　“父亲母亲大人，事情基本就是这样子的。”方正站在笔直，口中恭谨地道。

    　　堂中，方源的舅父古月冻土，以及舅母坐在宽背大椅上，均皱着眉头。

    　　舅母咬牙切齿，一边为方正抱打不平，一边又有些幸灾乐祸：“方源这个小兔崽子，他勒索其他人也就罢了，想不到他连亲弟弟都不放过。竟然如此绝情绝义！不过他这次放下如此大错，估计不久后就要被学堂开除了。”'
