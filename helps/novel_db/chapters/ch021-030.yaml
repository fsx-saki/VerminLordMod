  content: '第二十六节：玉骨铁骨

    　　轰、轰、轰……

    　　炸响声中，骨壁坍塌，一条条新的路线展现在众人的面前。

    　　破坏总比建设来得容易的多。尤其是这处传承，也无人主持。

    　　“前方传来消息。第五条路线已经勘探完毕，没有发现目标人物。”

    　　“禀告族长，属下进入第六条路线之后，发现一处白骨大厅。里面有一具骸骨，还有一本巨大的骨书。”

