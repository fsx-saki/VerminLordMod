  title: 第三十节：三道无上真传
  content: '第三十节：三道无上真传

    　　不管是荡魂山，还是落魄谷，亦或者智慧蛊，都是无价之宝，天底下独一份，绝世无双。

    　　方源说可以交易，但琅琊地灵拿什么出来交易呢？

    　　方源并非拒绝，而是饱含期待。

    　　琅琊福地底蕴深厚，绝非普通存在。经历两位尊者，从中古时代屹立至今。王庭福地毁灭之后，更可以说是五域第一的福地！

    　　地灵生前的身份，更是号称古往今来炼道第一，隐隐超越之前的天难老怪、空绝老仙。

    　　这等人'
