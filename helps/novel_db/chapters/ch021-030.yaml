  content: '第二十二节：吴帅战气海老祖

    　　轰隆！

    　　一声巨响，炸雷般震荡天地。无穷气浪喷涌中，龙宫绽射璀璨华光，不断后退。

    　　气海老祖也不追击，身边的气浪又堆叠积累了无数，如山如海。

    　　双方交战已经一天一夜，互有往来，暂时都奈何不了对方。

    　　围绕着战场，无数双眼睛眺望着。东海各大正道，以及魔道、散修都有蛊仙闻讯赶来观战，更别说两天联军中的蛊仙了。

