- chapter: 896
  title: 第九百零二节：认我作爹
  content: '第九百零二节：认我作爹

    　　兽灾洞天。

    　　天空已经消失了数个月，整个洞天中充斥着黑色的毒烟。

    　　海量的毒烟遮蔽苍穹，烟云翻腾不休，时而凝聚成龙形，伸出毒烟，为祸世间。

    　　兽灾洞天中，已经是一片哀鸣，前景惨淡。

    　　星罗城是兽灾洞天中的第一大城，如今也是人族最大的聚集地点。

    　　星罗城城墙高耸，城内塔楼林立。

    　　战部渡就站在最高层的塔楼上，仰头望着天空的滚滚毒烟。

    　　他一脸疲惫之色，遍体鳞'
