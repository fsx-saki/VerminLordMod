- chapter: 894
  title: 第九百节：沈伤传承
  content: '第九百节：沈伤传承

    　　黑火并没有悬空燃烧，它附着在一根根的巨骨上。

    　　巨骨乳白色，有圣洁之感。

    　　巨骨有一根主干，从东往西，贯穿天地，宛若九天长龙，一直延伸到方源的视野之外。而在主干的两侧，是无数根排列整齐，向外延展的分支巨骨，仿佛巨大的象牙。

    　　整副骨架就仿佛是巨人的脊椎和肋骨，撑住苍穹！

    　　“天穹脊背……”方源口中呢喃，眼前的景象气魄万千，他身处在巨骨之下，仿佛是蚊虫般渺小。

