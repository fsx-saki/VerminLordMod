- chapter: 893
  title: 第八百九十九节：超级任务
  content: '第八百九十九节：超级任务

    　　对于超级世家而言，这世间从未有永恒的朋友，亦从未有永远的敌人。

    　　这是超级势力的生存之道。

    　　若不遵循这样的道理，超级势力往往长存不久。沈家自然不是这样的势力，因为它从乐土仙尊之前就已经存在，乐土仙尊时期发展壮大，长存至今。

    　　作为曾经沈家的一员，沈伤对于沈家和方源联手，并不反对，甚至还感到欢喜。

    　　因为沈家来的这批人中，都没有阵道蛊仙。沈伤要借助大阵封印自己'
