- chapter: 895
  title: 第九百零一节：终极任务
  content: '第九百零一节：终极任务

    　　龙鲸乐土。

    　　功德碑下，方源和沈从声并肩而立，凝神望着碑面。

    　　有关清缴黑火的超级任务仍在，但明日便是三百天的最终时限了。

    　　方源的功德傲居榜首，这是一笔庞大的数字。他发现黑火任务难度太大后，便只选择大型任务以及中型任务，一笔笔收获功德。

    　　庙明神一伙人一直为他打下手，也是收获颇丰。

    　　沈从声等人在意识到超级任务的难度后，也明智地转向，学习方源，如今功德也积累'
