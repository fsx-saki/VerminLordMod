- chapter: 897
  title: 第九百零三节：关键人物
  content: '第九百零三节：关键人物

    　　天庭。

    　　星宿棋盘离地半尺，在紫薇仙子和凤金煌之间缓缓旋转着，绽放出绚烂的星光。

    　　点点星光，璀璨夺目，宛若蓝色的萤火，轻盈跳跃，时而在两人身边旋舞，时而钻入两人的脑海之中。

    　　二女盘坐相对，皆是闭目，紧蹙眉头，思考着什么难题。

    　　星光缓缓消失，星宿棋盘飞落到紫薇仙子的手中。

    　　紫薇仙子缓缓睁开双眼，她眼前的凤金煌却是没有睁眼，而是软倒在地，当场昏迷过去。'
