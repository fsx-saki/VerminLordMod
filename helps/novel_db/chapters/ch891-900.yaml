  title: 第八百九十七节：大炼仙蛊
  content: '第八百九十七节：大炼仙蛊

    　　方源之前就有一个组建三座仙蛊屋的宏大计划。

    　　如今，他已经成功搭建了万年斗飞车、煮运锅，还剩下最后一座仙蛊屋的目标没有完成。

    　　虽然他在这个过程中，又收获了豆神宫、龙宫这些仙蛊屋。但这些仙蛊屋都被安置在分身手上，是方源布局天下的关键，不是镇压场面，就是以此为支点撬动大局，都有重要的作用。

    　　最关键的是，豆神宫、龙宫并不符合方源的设想。

