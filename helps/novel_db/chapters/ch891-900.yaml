- chapter: 899
  title: 第九百零五节：大会开启
  content: '第九百零五节：大会开启

    　　光阴长河奔流不息。

    　　天庭。

    　　议事大厅。

    　　天庭蛊仙济济一堂，鲜少有未到达的蛊仙，这是天庭上千年来人数最多的一次集会。

    　　龙公坐在最高的一层，环视全场：“商议既定，那就去做吧。能否恢复天庭的荣光，就全赖在场诸位的奋斗了。”

    　　“我等必定竭尽所能！”全场众仙齐声回应，众志成城。

    　　事关五域格局，天下大势，万众期待的中洲炼蛊大会，终于开始！

