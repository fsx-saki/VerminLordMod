- chapter: 892
  title: 第八百九十八节：焰云巨柱
  content: '第八百九十八节：焰云巨柱

    　　至尊仙窍。

    　　长毛炼道大阵嗡嗡作响，阵内火光冲天，一股股热浪四处冲击。

    　　一只六转仙蛊沐浴在火光之中，悬浮半空，表面宛若蜡般逐渐融化。

    　　“稳住！”琅琊地灵主阵，口中低呼，“开仓门，放仙材。”

    　　主持另外阵眼的毛民蛊仙立即打开仓门。

    　　于是，一团团狗屎从仓门中缓缓飞出。

    　　这些狗屎都是仙材。

    　　有的闪烁着星光，仿佛镶嵌着诸多蓝钻，乃是星荒犬的屎。

