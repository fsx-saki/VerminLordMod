- chapter: 900
  title: 第九百零六节：烽火四起
  content: '第九百零六节：烽火四起

    　　中洲炼蛊大会举办得如火如荼，方源一伙儿却已经踪影全无。

    　　方源下令撤退是如此的彻底，以至于让五域蛊仙都有一种错觉，仿佛之前方源大举破坏屠戮，只是一个假象。

    　　“方源究竟在做什么？”

    　　“中洲炼蛊大会还在举办呢，你倒是出手啊！”

    　　“你可是小魔尊，别弱了你的名头。”

    　　四域超级势力腹诽不已，都很着急，盼着方源出手，好为他们打头阵。

    　　但一直和天庭势如水火的方源'
