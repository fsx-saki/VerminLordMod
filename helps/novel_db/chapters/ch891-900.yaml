- chapter: 898
  title: 第九百零四节：仙蛊应运
  content: '第九百零四节：仙蛊应运

    　　至尊仙窍。

    　　小北原。

    　　“都准备好了？”雪儿坐镇雪晶大阵，细心观察着数十团寒气。

    　　“都准备好了，太上族老。”一位雪民五转女蛊师跪在地上，极其恭敬。

    　　“那就去吧。记住，要热情招待。当然，若有委屈也不能平白受着。”雪儿想了想，关照道。

    　　“是。”雪民女蛊师退下。

    　　雪儿叹了一口气。

    　　自从她被方源安排在这里，一直致力于雪民部族的发展。在方源的雪晶大阵的辅'
