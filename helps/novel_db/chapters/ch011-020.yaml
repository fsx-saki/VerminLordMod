  events:
  - '心中不无庆幸。

    　　早在泥沼蟹刚刚出现时，地灵就动手，施加天地伟力，禁锢了它一身的蛊虫。

    　　不管是一转还是五转的蛊，都不能展现威能。

    　　问题的关键是，这只荒兽身上有没有仙蛊。如果这只泥沼蟹拥有仙蛊，那'
  - '它的身上，寄生着大量的蛊虫，多为水、土两道蛊虫。有时候，甚至是整整一支蛊群。

    　　“幸好狐仙福地中，仙元充沛！”方源咬了咬牙，心中不无庆幸。

    　　早在泥沼蟹刚刚出现时，地灵就动手，施加天地伟力，禁锢了它一'
  - '。

    　　问题的关键是，这只荒兽身上有没有仙蛊。如果这只泥沼蟹拥有仙蛊，那又要看究竟是什么仙蛊。

    　　仙蛊唯一，超凡脱俗，福地根本禁锢不住。

    　　仙蛊，是影响整个大局的关键因素！

    　　泥沼蟹完全伸展开肢足后，开'
  - '耀着刺眼的光辉，一头巨大的怪兽，浑身黄褐色，好像是块巨大的岩石。从光门中徐徐而降。

    　　“看这架势，荒兽之灾？！”方源眯起双眼，一瞬不瞬地盯着。

    　　巨石不断地降落，悄无声息。

    　　方源忍不住舔了舔干燥的'
  - '色冷酷，仍旧指挥着狐狸上前送死。

    　　他繁衍这么多，就是要用来牺牲的。伤害都是积少成多，此刻哪怕阻止魂兽一丝前进的步伐也是好的。

    　　但泥沼蟹以碾压之势，缓缓行进，岿然不动。好像是一座山峰在行走，对待脚下'
  - '是荒兽不断地生产，海量的螃蟹源源不断。

    　　方源连忙将潜伏在山外的狐群，都调动过来。

    　　“幸亏我将发情蛊消耗光，大量的繁殖狐群，否则兵力绝对不够！”

    　　这么短短的片刻，方源就感到脑袋眩晕。

    　　他指挥的'
  - '的时间。

    　　这时间实在太短了，他只能尽量准备。凿开运河，调和水火是一；栽培狐群，大力繁殖是二；留着定仙游蛊，随时准备撤退是三。

    　　至于漫空的云海，以及西部的那头魅蓝电影，他真的是有心无力。

    　　微风渐渐停'
  - '着，十八只细长的螯足，分别从两侧探出，落在地上，然后轻而易举地将它沉重的身躯撑高，远离地面。

    　　“泥沼蟹！”看到这一幕，方源脱口而出，认出这只荒兽的真面目。

    　　这是一只巨大的螃蟹，有山一样的雄阔身躯。当'
- chapter: 12
  title: 第十二节：渡地灾（下）
  content: '第十二节：渡地灾（下）

    　　它抱着头，发出痛嚎声。蓝色的闪电也散乱无章，过了好半天才重新稳定下来。

    　　显然，电影进入荡魂山，受到了魂魄震动的伤害。

    　　荡魂行宫中，烟影如实地反映了这一幕，方源脸色铁青地看着。

    　　刚刚那一下，若不是地灵及时挪移，恐怕他就栽了。

    　　小狐仙拍着胸口，面目刷白，一阵后怕。

    　　屋漏偏逢连夜雨，魅蓝电影也赶来参战，无疑对整个局面雪上加霜！

    　　魅蓝电影没有偷袭成功，恼'
