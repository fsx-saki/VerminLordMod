  title: 第十三节：月下竹林，一点珠雪
  content: '第十三节：月下竹林，一点珠雪

    　　大约是在三百多年前，古月一族中出现了一个天才人物。

    　　他才华横溢，还是青年，就已经修炼到了五转蛊师的地步，还有更进一步的可能。名扬青茅山，风光无限，被族人们寄托希望和重任。

    　　他就是古月族史上，最为人传诵的四代族长。

    　　可惜的是，四代族长为保护族人，对战同样是五转蛊师的魔头花酒行者。虽然一场大激战后，他击败了花酒行者，并且让这个魔头跪地求饶。

