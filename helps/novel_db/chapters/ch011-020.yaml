  title: 第十三节：鲛庭恶客
  content: '第十三节：鲛庭恶客

    　　东海，鲛人王庭。

    　　乐声连绵，美酒佳肴。

    　　盛大的酒宴上，鲛人王庭的三位掌权女仙，皆在主位，共同应酬着一位意外的贵客。

    　　“好酒，好歌，更是好舞！”贵客将杯中的美酒一饮而尽后，啪的一声，重重地放下酒杯，哈哈一笑。

    　　他国字脸，身材魁梧，皮肤雪白，眼眸和头发都是冰蓝之色。

    　　八转的气息缭绕全身。

    　　他正是雪民蛊仙，来自黑天的冰晶洞天，当代的冰晶仙王。

    　　自从上一'
