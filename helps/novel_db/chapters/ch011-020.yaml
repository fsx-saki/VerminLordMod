  title: 第十三节：墨人王
  content: '第十三节：墨人王

    　　琅琊地灵心疼地看着自己的泥沼蟹。

    　　这头泥沼蟹，瘫倒在地上，爬不起身来。九对螯足被卸了七七八八，甚至就连最大的钢钳螯足，都被打碎一只。

    　　这样的战果，让墨人蛊仙，以及太白云生都心底发凉。

    　　方源打出上万力道虚影，所剩三千有余。他好整以暇，将剩余的虚影收入仙窍。

    　　这虚影只能存一段时间，过了时限，拳气就会消散，虚影便随之消失。但能利用方源便利用，不会有一丝浪费。

