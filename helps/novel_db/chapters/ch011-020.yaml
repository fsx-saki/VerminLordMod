  - '古月一族，要迁徙到白骨山上来。是这样子的吗？”满载而归的途中，百盛景似乎是随口问道。

    　　“这些都是空穴来风罢了。”方源笑了笑道。

    　　“公子你温文尔雅，是正人君子，可比那个什么百战猎好多了。唉，如果将来'
  - '的手，冷若冰霜，“我还有事，你先走吧。”

    　　“今天的狩猎大比，就要开始了，你还有什么事情？又是去找古月家的那个小白脸了对吗？”百战猎愤怒地低吼道。

    　　“你说什么话呢！方正少爷人很善良，清热蛊说借就借了。'
- chapter: 20
  title: 第二十节：跋涉白骨山
  content: '第二十节：跋涉白骨山

    　　片刻之后。

    　　百家族长将目光从地图上收回，她无奈地放弃了。

    　　白骨山很大，虽然范围缩减到了后山，但是距离准确的定位，还差距很远。

    　　“古月家的小子，顾忌我百家，肯定不会直接问地点。看来要测算出元泉的位置，还得再加把劲！”百家族长咬咬牙，心中思量着。

    　　一旦得到元泉的位置，百家就会进行详细的侦察。

    　　“如果元泉周围的兽群，并不多，剿杀它们的代价不大，那么我就直接动'
