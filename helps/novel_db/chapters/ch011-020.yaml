  title: 第十三节：人祸
  content: '第十三节：人祸

    　　南疆，烂泥山。

    　　临近正午，旭日在高空照耀，晴空万里无云。

    　　烂泥山的后山林某处，一位小小少年正和一只大熊对峙。

    　　气氛紧张。

    　　大熊高达九尺，膘肥体壮，浑身的皮毛呈现棕色，浓密而且油亮。此时熊口大张，露出尖锐的兽牙，赤红的双眼紧紧盯着眼前的少年，凶光毕露。

    　　和这大熊对峙的少年，恐怕只有十五六岁的年纪。

    　　他身高不过五尺，和大熊比起来，更显得娇小细嫩。

    　　少年浓'
