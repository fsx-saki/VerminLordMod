  title: 第十四节：辨认仙蛊
  content: '第十四节：辨认仙蛊

    　　一时间，众人的目光，都被方源掌中的蛊虫吸引。

    　　蛊虫仙气洋溢，蕴藏着澎湃法则，毫无疑问，它是一只仙蛊。但究竟是什么仙蛊，众人皆是不知。

    　　唯有太白云生心中一动，想起了方源曾经对他透露过的事情。

    　　“这只蛊，这只蛊……”琅琊地灵看得双眼发光，“这只蛊我从未见过，这是一只新蛊啊。”

    　　他跳到方源的面前，鼻尖距离蛊虫只有两三寸的距离，随后他像是闻花一样，用劲嗅了嗅。'
