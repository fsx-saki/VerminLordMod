  title: 第十一节：不过是色诱罢了
  content: '第十一节：不过是色诱罢了

    　　方源眉头微微地皱起来，凭借直觉和五百年的人生体验，他闻到了一种阴谋的味道。

    　　他眼中冷芒一闪即逝，眉头舒展开来：“我正有些饿，你来的好，给我端进来吧。”

    　　门外沈翠提着食盒，听到这话，嘴角泄露出一丝不屑的冷笑。

    　　但当她推开房门时，她的脸上就只剩下柔顺之色。

    　　“方源少爷，这酒菜可香了，奴婢隔着食盒都闻到了呢。”她的声音甜腻腻的，透着一股春情媚意。

