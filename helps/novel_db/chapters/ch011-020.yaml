  title: 第十二节：渡地灾（下）
  content: '第十二节：渡地灾（下）

    　　它抱着头，发出痛嚎声。蓝色的闪电也散乱无章，过了好半天才重新稳定下来。

    　　显然，电影进入荡魂山，受到了魂魄震动的伤害。

    　　荡魂行宫中，烟影如实地反映了这一幕，方源脸色铁青地看着。

    　　刚刚那一下，若不是地灵及时挪移，恐怕他就栽了。

    　　小狐仙拍着胸口，面目刷白，一阵后怕。

    　　屋漏偏逢连夜雨，魅蓝电影也赶来参战，无疑对整个局面雪上加霜！

