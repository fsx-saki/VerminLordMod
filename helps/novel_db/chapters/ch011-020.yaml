  content: '第十九节：六转本命春秋蝉！

    　　炼化过程中，竟遭蛊虫反噬！

    　　酒虫继承着花酒行者的强大意志，此时入侵空窍，悍然反噬方源。

    　　这股强大的意志力量，从上而下，向空窍底部的青铜元海狠狠地冲击下来。

    　　而青铜元海，亦是波涛翻滚，掀起一阵阵的高潮。在方源的意志下，大股的真元逆天而起，汇聚一起，形成一股冲天狂浪，悍然迎上酒虫的意志。

    　　眼看着双方就要在空窍的中央，凶狠地碰撞到一起。但就在这时，两股力量'
