  title: 第十四节：坑
  content: '第十四节：坑

    　　这个世界上，可不仅仅只有人类才会酿酒。

    　　关于酒的最早记载，出于人祖的传说。

    　　人祖挖去左右双眼，分别化为大儿子太日阳莽，二女儿古月阴荒。

    　　太日阳莽和古月阴荒朝夕相处，不禁对自己的妹妹动了情思。但古月阴荒却屡屡拒绝了太日阳莽的追求。

    　　太日阳莽为此困恼不已。

    　　他知道自己需要帮助，因此求教智慧蛊。

    　　起先，智慧蛊并不搭理他，能躲多远就躲多远。但是太日阳莽锲而不舍，智'
