- chapter: 11
  title: 第十一节：渡地灾（上）
  content: '第十一节：渡地灾（上）

    　　数月之后。

    　　狐仙福地，狐群集结成千重军阵，紧紧地包裹着荡魂山。

    　　方源背负双手，矗立在山巅之上，仰望着天空，满脸的凝重。

    　　时间悄然逝去，今天便是第六次地灾降临之日！

    　　饶是方源五百年前世，也是一位蛊仙，面对地灾，心中也颇不平静。

    　　每一次地灾，都会越来越强，对于福地、蛊仙是生死攸关的严峻考验。方源执掌福地时，只剩下一年零三个月的时间。

    　　这时间实在太短了'
  gu_mentioned:
