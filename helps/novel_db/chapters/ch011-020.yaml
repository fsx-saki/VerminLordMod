  title: 第十一节：宝黄天输送蛊虫
  content: '第十一节：宝黄天输送蛊虫

    　　“怎么样？有没有考虑好？你可是琅琊派的客卿太上长老，完全可以用你的门派贡献，来换取其中的法门。”琅琊地灵笑道。

    　　中洲方面，黑楼兰已被影无邪强逼投靠，方源并不知情，还在和琅琊地灵联络。

    　　双方谈论到克制春秋蝉的方法，琅琊地灵不愧是源自长毛老祖，琅琊福地家大业大，底蕴深厚。

    　　通过刚刚的交谈，方源惊讶的发现：琅琊地灵手中掌握的方法，不下十种！都是可以克制春秋蝉的有'
