  title: 第十一节：李小白纠结
  content: '第十一节：李小白纠结

    　　李小白的期盼没有落空。

    　　在他咏出名篇之后，很快就有三人相继脱颖而出。

    　　一位壮汉，带着金色面具，浑身笼罩在一层绚烂夺目的金光之中。

    　　一位老翁，头戴斗笠，手拄拐杖，一道青气缭绕周身。

    　　还有一位女子，身姿曼妙，一身粉裙，面带薄纱，咏了诗词之后，身边形成无数光蝶飞舞，美不胜收。

    　　这三人都创造出了名篇层次的诗词，和李小白的月夜一个档次。

    　　李小白暗自松了一口气'
