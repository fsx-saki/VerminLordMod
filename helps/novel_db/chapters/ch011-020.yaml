  title: 第十三节：有失有得
  content: '第十三节：有失有得

    　　方源从荡魂行宫走出来。

    　　粉红色的水晶山，坑洞满布，碎石遍地，狼藉不堪。赤红的鲜血，黄褐的泥浆，狐群和螃蟹的尸体堆砌在一起。

    　　荒兽泥沼蟹巨大的身躯，压在荡魂山的山腰上。仿佛是凸起的一座小山头，异常的显眼。

    　　微风吹拂着方源的黑色长发，他那幽深的眸子，缓缓扫视战场。

    　　刺鼻的血腥气味，刺激着方源的鼻腔。

    　　紧跟在他身后的，是地灵小狐仙，眼眶通红，粉嫩的小脸蛋上犹有'
