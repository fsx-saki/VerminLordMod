- chapter: 17
  title: 第十七节：初炼酒虫
  content: '第十七节：初炼酒虫

    　　“以我丙等资质，空窍中能存储的元海最多只有四成四。蛊虫排斥真元的速度，比我自我恢复真元的速度还要快很多。我要炼化蛊虫，就必须借助外力，也就是说要消耗元石。”

    　　“蛊虫的意志越弱，抵抗力就小，我炼化就越容易。不过但凡生灵，总有求生的意志。我要炼化月光蛊，最少需要五块元石，最多八块。”靠着丰富的修行经验，方源估算出自己将要消耗的元石总量。

    　　“现在要炼化酒虫，至少需十一块，'
