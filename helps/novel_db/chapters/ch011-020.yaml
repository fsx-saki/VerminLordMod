    　　不管是魅蓝电影，还是泥沼蟹，'
  - '的蛊。

    　　尤其是这头泥沼蟹，防御之强，在荒兽中也隶属上流层次。方源的五转蛊有不少，点金蛊、松骨蛊、乌七蛊等，作用在泥沼蟹的身上，宛若在湖中投下小石子，只能荡起微微的涟漪。需要持续不断地攻击，才能渐渐收到一'
