  title: 第十四节：山缝之中藏玄机
  content: '第十四节：山缝之中藏玄机

    　　酒虫体型如蚕宝宝，通体散发着珍珠一样的白光，有点胖胖的，外形很可爱。

    　　它以酒水为食物，能够凌空飞行。飞行时，会把身躯团成一团，速度还很快。

    　　它虽然是一转蛊虫，但是其价值，却比一些二转蛊虫还要珍贵。

    　　若用它来作为本命蛊，可比月光蛊要好得多。

    　　此时，这样的一只酒虫就贴在一根距离方源，仅仅只有五六十步远的青矛竹上。

    　　方源屏住呼吸，没有冒然接近，而是慢慢地'
