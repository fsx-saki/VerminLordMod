  content: '第十九节：星罗小仙

    　　和平时期，蛊仙养蛊，对凡蛊需求量不高。购买只是次要手段，更主要的手段是福地自产。福地时间和外界时间有着流速差，外界一天，福地就许多天。外界一年，福地就过去很多年，每年都有产量。蛊仙们通常不会选择气泡鱼，因为价格太高。他们宁愿等一段时间。

    　　而战争时期，蛊仙之间交手次数多了，作为底牌的仙蛊并不常用，凡蛊作为寻常手段，消耗巨大。气泡鱼在五域大战中，也就成了各大蛊仙竞相追逐的物'
