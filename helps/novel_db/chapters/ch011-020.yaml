    　　方源躺了一'
- chapter: 14
  title: 第十四节：方正的痛苦
  content: '第十四节：方正的痛苦

    　　高耸入云的天梯山，高达百万丈。

    　　它位居中洲正中央，是传承之地，圣贤之山。古时，更是仙凡之梯，可以上达天庭。

    　　仙鹤门的一群精英弟子，如今站在天梯山的山脚，已经等待了有半个时辰。

    　　“我们还要再等多久呢？”

    　　“这个方源未免也太端架子了吧？”

    　　“嘘，小声点。他可是古月方正的亲哥哥，如今更是狐仙福地的主人！”

    　　“说起来，方正的这个哥哥真是太厉害了，居然连凤金'
