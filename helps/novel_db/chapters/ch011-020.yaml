  title: 第十二节：再面泥沼蟹
  content: '第十二节：再面泥沼蟹

    　　“找到了。”方源双眼一亮，驻足在一根紫色的石柱之前。

    　　太白云生循声望去，只见这根关键的石柱，却也普通平凡。唯独石柱根部，有一块石头，平滑如凳，看起来有些特别。

    　　“就是这里。”方源伸出粗壮的怪手，将石凳顶部的残雪拂开，再次确认。

    　　待太白云生钻入他的仙窍后，方源便坐在石凳上，动用蛊虫割开自己的手臂，将血液涂在这根紫色石柱上。

