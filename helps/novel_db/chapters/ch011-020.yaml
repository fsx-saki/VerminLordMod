  title: 第十二节：人道改运
  content: '第十二节：人道改运

    　　至尊仙窍，小中洲。

    　　方源站在千愿树下，仰望苍穹，只见天空中升腾着炙热光斑，点点团团，时隐时现，绚烂夺目至极。

    　　再看地面周围，沙尘滚滚，风声呼啸。

    　　方源眼眸中闪烁着冷光。

    　　天道道痕的数量正在增长！

    　　原本他因为炼蛊而得了三千多道道痕，如今已经逼近三千五百道。

    　　伴随着天道道痕的增长，方源仙窍中原本的各大道痕，正不断减少。

    　　这一幕，不禁让方源回想起了他在'
