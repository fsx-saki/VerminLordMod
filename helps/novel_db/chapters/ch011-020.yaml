  title: 第十九节：我们要屠仙
  content: '第十九节：我们要屠仙

    　　狐仙福地，西部广袤的草原。

    　　辽阔的绿地，连绵一片，伸展出去。一只新生的小狐狸，正在和翩跹飞舞的蝴蝶嬉闹玩耍。

    　　在狐仙福地中，狐狸算是最强大的掠食者，因此生活无忧。

    　　虽说第六次地灾时，损失极为惨重，但终究是保留了火种。广袤的草原上，狐群缓慢而又坚定地延续着。

    　　忽然，空间一阵波动，两个身影陡然出现，将小狐狸惊得飞逃。

