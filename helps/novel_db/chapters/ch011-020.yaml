  - '，粉嫩的小脸蛋上犹有泪痕，仍旧一噎一噎的抽泣着。

    　　“主人，我们损失太惨重了。丧失了一百多万亩地，仙元只剩下六十八颗。四百七十万的狐群，只剩下三十一万。还有蛊虫，一下子损失了七十多万。”

