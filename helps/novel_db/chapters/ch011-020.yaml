  title: 第十一节：谋划
  content: '第十一节：谋划

    　　土石飞溅，烟尘升腾。

    　　白凝冰被炸翻在地，一个鲤鱼打挺，又站了起来。

    　　她有天蓬蛊的防护，毫发无损，但空窍中的天蓬蛊却受到震荡，身上的白光虚甲也黯淡了三分。

    　　“什么东西作鬼？”白凝冰咒骂一声，凝神望去。

    　　但见爆炸的原处，已经化为一个小型的深坑，直径有两三米。

    　　山洞内，那魔道女蛊师得意的哈哈大笑：“好！这次炸不死你，小娘皮你有种的再冲来啊？”

