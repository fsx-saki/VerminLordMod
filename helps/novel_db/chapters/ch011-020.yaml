  title: 第二十节：鹤风扬之谋
  content: '第二十节：鹤风扬之谋

    　　这处洞穴大若广场，弥漫层层血光，血腥气味浓郁扑鼻。洞穴中央，人为挖开一个圆坑，里面血液滚滚，不断咕咕地冒着热气。

    　　方正深吸一口气，轻车熟路地脱去衣服，赤身走入血池。滚烫的血液，一时间让他不断大口呼吸。

    　　他适应了血温，在血池中央站定，血液漫过他的腰际，露出他的胸膛，和大半个手臂。

    　　“开始吧。咱们一个个来，不要着急。先是铁血蛊。”天鹤上人提醒道。

    　　方正缓缓闭起'
