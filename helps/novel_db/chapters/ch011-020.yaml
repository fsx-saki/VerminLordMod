  title: 第十三节：猴脑美食
  content: '第十三节：猴脑美食

    　　哗哗哗……

    　　空窍中，海潮起伏不断，持续地冲刷着周围窍壁。

    　　海潮一片翠绿，浪花翻腾不休。这是一转初阶的真元。

    　　一转蛊师拥有青铜真元，初阶为翠绿色，中阶为苍绿色，高阶为深绿，巅峰为墨绿。

    　　周围的窍壁，明光灿烂，在翠绿浪潮的冲刷下，底蕴一丝丝的增加着。

    　　蓦地，白色的光辉骤然一盛，旋即晦暗下来。白色的光芒相互凝练，形成如水般的光辉波纹。

    　　这一刻，窍壁光膜深化'
