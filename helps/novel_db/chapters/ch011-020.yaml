  title: 第十二节：如今迈步从头越
  content: '第十二节：如今迈步从头越

    　　南疆，一处无名的山峰顶端。

    　　方源左手一只剑遁仙蛊，右手一只飞剑仙蛊。

    　　他左右观察。

    　　剑遁仙蛊形如金针蜜蜂，飞剑仙蛊则好像银翅蜻蜓。

    　　两者各有千秋。

    　　前者乃是移动仙蛊，移速之快，不逊色于七转的气遁仙蛊。后者则在历史赫赫有名，是剑仙薄青生前最常用的攻防蛊虫。

    　　七转的气息，四下洋溢。

    　　方源嘴角含笑，将两只仙蛊收起来。

    　　经过义天山的这段时间，剑'
