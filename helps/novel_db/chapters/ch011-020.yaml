  content: '第十六节：石人族大发展

    　　鹤风扬仔细看着，闪着电光的信笺上，内容密密麻麻。

    　　方源要求的东西，无非三样，一是元石，二是蛊虫，三是材料。

    　　“要求五百万块元石？可以！别说是五百万，就是一千万，五千万也给得。”鹤风扬冷笑着。

    　　到了蛊仙这一层次，注重的是仙元。元石要多少有多少，根本不在意。

