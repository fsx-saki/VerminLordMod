    　　地灵也会灭亡，它一旦被魅蓝电影摧毁，那方源连动用定仙游蛊撤退的能力都没有了。

    　　真正能够改变局势的，只有仙蛊。

    　　方源虽然有两只仙蛊，但都没有攻击之能。'
  - '许多五转的蛊。

    　　尤其是这头泥沼蟹，防御之强，在荒兽中也隶属上流层次。方源的五转蛊有不少，点金蛊、松骨蛊、乌七蛊等，作用在泥沼蟹的身上，宛若在湖中投下小石子，只能荡起微微的涟漪。需要持续不断地攻击，才能渐'
