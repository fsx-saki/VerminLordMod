- chapter: 383
  title: 第三百八十四节：紫薇控局
  content: '第三百八十四节：紫薇控局

    　　叮叮咚咚……

    　　悦耳动听的脆响声不绝于耳，凤九歌在这一刻拼尽全力。

    　　仙道杀招——碧玉歌。

    　　歌声笼罩方圆数百步距离，太古虎形年兽的虎爪被染上一层碧色。

    　　但它的虎爪太过于庞大，仍旧轰击过来。

    　　凤九歌咬牙，连忙躲闪。

    　　千钧一发之际，他几乎和年兽虎爪擦肩而过。即便没有被击中，恐怖的巨力带动的风浪，也是狠狠地袭上凤九歌。

