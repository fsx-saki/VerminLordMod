  - '全力的！”影无邪表现得斗志昂扬。

    　　方源点点头：“那你先来罢。”

    　　影无邪当即盘坐下来，开始灌输仙元。

    　　酝酿片刻之后，他浑身气势陡然一震，仙道杀招燃魂爆运，成功催动出来。

    　　一瞬间，影无邪的气运'
  - '，反而让方源更加担忧。

    　　蛊阵闭合，营造出一个简单的临时空间。

    　　蛊阵空间非常简陋，和南疆梦境的超级蛊阵中，营造出来的重重宫殿，完全无法相比。

    　　空间白茫茫一片，只有方源和影无邪二人。

    　　“宗主，让我'
  - '，暴涨规模，宛若狼烟冲霄。

    　　他点了点，然后通知毛六，可以开始炼蛊了。

    　　毛六和影无邪之间，也是连运的关系。

    　　在逆流河大战之前，方源追杀影无邪等人，将他们从东海一直撵到北原去。

    　　在北原的僵盟地'
  - '个仙道蛊阵。

    　　以防备仙蛊为核心，整个蛊阵的原有版本，是紫山真君遗藏中的一个凡道蛊阵。

    　　方源是阵道宗师，改善一个凡道蛊阵，并不困难。添加了防备仙蛊之后，这个蛊阵的防护之力，也不容小觑。

    　　当然，破'
  - '丈，简直是要一夜回到解放前。

    　　方源修行魂魄的时间，由来已久。

    　　从他扮演常山阴，行走北原，参加王庭之争，就已经开始。借助荡魂山、落魄谷，方源的魂魄修行一日千里，效率极高。

    　　长久的修行，在他的魂魄上积'
  - '招，想要炼出定仙游。可惜被天庭抢炼成功。

    　　而他的努力其实并没有白费，而是便宜了方源，让方源炼成了变形仙蛊。

    　　这段情报，方源从紫山真君的遗赠中得知，便想到应用在如今的这个情况下。

    　　毕竟，运气可是辅助'
  - '成功，不仅代表着影无邪的气运暴涨，而且还意味着他的魂魄虚弱到了极致。

    　　不过没有关系，方源直接掏出胆识蛊。

    　　修行的过程中，方源一直留意，不断囤积胆识蛊在自己的身上，以防不测。

    　　他这一谨慎之举，为他'
  - '六驾驭着阴流巨城阻挠方源。

    　　影无邪和毛六的连运，就在那个时候发生了。

    　　当时，影无邪手中掌握着连运仙蛊。

    　　为了尽量地拖延方源，影无邪自然要在各个方面，加强毛六的实力。气运正是其中的一方面。

    　　果然'
- chapter: 385
  title: 第三百八十六节：自爱炼成
  content: '第三百八十六节：自爱炼成

    　　“上极天鹰居然逃脱了，怎么会出现这样的情况？”天庭中，紫薇仙子依靠星宿棋盘，很快就发现了白天中的状况。

    　　她皱起好看的双眉，眼中迅速闪过一丝犀利的光。

    　　“是运道么。”

    　　一个猜测浮现在她的心头。

    　　她想到了八十八角真阳楼。此楼倒塌的真凶就是方源，方源继承巨阳真传的可能性有多少呢？

    　　“可惜我的侦查杀招，只能标注方源等人的位置，不能视察出他们此时的情境。”'
