- chapter: 387
  title: 第三百八十八节：不灭星标
  content: '第三百八十八节：不灭星标

    　　这一天，是令整个南疆仙凡，都震动惊慌的一天。

    　　地脉的全面震动，影响了整个南疆，重点区域更是天翻地覆，高山崩塌，流水阻断，天坑掩埋。天地伟力在这一刻，展现出了无以伦比的恐怖力量。

    　　不幸的凡人们，惨死在这场浩大而又突然的地劫之中，各个超级势力都在统计损失。

    　　很多凡人势力，都在顷刻泯灭。就连超级家族，都有不少的资源点彻底损毁，损失颇重。

