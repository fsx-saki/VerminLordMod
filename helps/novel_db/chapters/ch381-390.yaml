- chapter: 386
  title: 第三百八十七节：彻底脱离武家
  content: '第三百八十七节：彻底脱离武家

    　　七转自爱仙蛊！

    　　方源手中握着这只仙蛊，心中喜悦。

    　　不枉费他几乎耗尽了一直苦修而来的魂魄底蕴，终于是得到了成果。

    　　运道，不愧是能够成就蛊仙，达到九转层次的流派。

    　　“我本身有狗屎运仙蛊，又连运了叶凡、洪易、韩立三位强运之人。再加上燃魂爆运了两次，那一刻的运道恐怕是达到了前所未有的程度。”

    　　“所以，炼成了自爱仙蛊，并不奇怪。”

