  title: 第三百八十三节：自爱仙蛊
  content: '第三百八十三节：自爱仙蛊

    　　北原，琅琊福地。

    　　甲字号炼蛊大厅之中，持续了数月之久的炼蛊，已经到了最关键的时刻。

    　　琅琊地灵亲自站在一座炼道超级蛊阵的边缘，双目紧紧地注视着蛊阵中燃烧着的熊熊烈火。

    　　这火焰呈现冰蓝之色，一点也不炙热，反而非常寒冷。

