- chapter: 385
  title: 第三百八十六节：自爱炼成
  content: '第三百八十六节：自爱炼成

    　　“上极天鹰居然逃脱了，怎么会出现这样的情况？”天庭中，紫薇仙子依靠星宿棋盘，很快就发现了白天中的状况。

    　　她皱起好看的双眉，眼中迅速闪过一丝犀利的光。

    　　“是运道么。”

    　　一个猜测浮现在她的心头。

    　　她想到了八十八角真阳楼。此楼倒塌的真凶就是方源，方源继承巨阳真传的可能性有多少呢？

    　　“可惜我的侦查杀招，只能标注方源等人的位置，不能视察出他们此时的情境。”'
