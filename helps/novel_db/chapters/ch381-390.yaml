- chapter: 389
  title: 第三百九十节：阵道仙蛊和真传
  content: '第三百九十节：阵道仙蛊和真传

    　　西漠。

    　　方源睁开双眼，入目的是一片翠绿的棕榈树林。

    　　一汪湖泊，蓝的透心，宛若一颗镶嵌在黄沙当中的蓝宝石，精致动人。

    　　这是一片小型的绿洲，有着天然生成的一道元泉。

    　　像这种小绿洲，往往是一个凡俗家族的基石。若是有蛊师生存在这里，刻意保养元泉，发展得好的话，甚至还能形成中型，乃在大型的绿洲。

    　　人选择适宜的自然环境居住，同时自然环境也在被人改造。'
