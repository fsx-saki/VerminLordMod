- chapter: 384
  title: 第三百八十五节：燃魂爆运！
  content: '第三百八十五节：燃魂爆运！

    　　西漠。

    　　夜幕笼罩，繁星璀璨。

    　　沙漠中，日夜温差很大，白天热的要死，夜里则是冰冷刺骨。

    　　方源轻轻地落到了一处无名的小沙丘上。

    　　“飞行了大半个夜晚，也不见天庭的追杀者出现。难道凤九歌，就真的是唯一追杀我的人吗？”

    　　方源心中萦绕着一股疑惑。

    　　“算了，不管这些了。”

    　　方源定下心来，开启仙窍门户，将身边的黑楼兰、白凝冰等人都放出来。

