  title: 第三百八十二节：凤九歌，永别了
  content: '第三百八十二节：凤九歌，永别了

    　　在仙道杀招斗战胜伏奴的效果下，任何的生命只要被方源正面强势击败，就会有极大的可能臣服于方源，被方源奴役。

    　　这招的核心，便是方源刚刚得手的七转仙蛊——斗。再得到了种种智道蛊虫的辅助之后，这只律道仙蛊开始展现出自己独到的价值。

    　　斗战胜伏奴乃是仙僵大荔所创。

    　　大荔仙僵，乃是幽魂本体的二代分魂之一，号称是武斗天王。他力道、智道同修，本身是大力真武体。

