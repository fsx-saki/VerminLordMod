    　　一个猜测浮现在她的心头。

    　　她想到了八十八角真阳楼。此楼倒塌的真凶就是方源，方源继承巨阳真传的可能性有多少呢？

    　　“可惜我的侦查杀招，只能标注方源等人的位置，不能视察出他们此时的情境。”'
  - '凤九歌点点头，优雅一礼：“劳烦了。”

    　　黄史上人正要开口，忽然神色一变。

    　　“那头虎形太古年兽又追来了吗？”凤九歌也微微色变。

    　　“不是！”黄史上人目不转睛地望向远处，在那里的光阴河面上，忽然'
  - '再次混入超级蛊阵。

