- chapter: 390
  title: 第三百九十一节：青爪鬼翼狮
  content: '第三百九十一节：青爪鬼翼狮

    　　这是一座青铜材质的宫殿。

    　　宫殿中央，仅有着一个黄铜鹤颈落地宫灯。鹤颈修长，划出圆润的弧线，笔直的鹤喙的最尖端，屹立着一颗桃子般大小的火烛。

    　　正是这一点烛光，照耀着整个大殿。

    　　烛光微弱，青铜宫殿的许多角落，都沉浸在黑暗当中。

